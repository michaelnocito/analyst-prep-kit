}
function checkQuiz(i,ans,id){
  const opts=document.querySelectorAll('#quizOpts .quiz-opt');
  opts.forEach(o=>o.onclick=null);
  if(i===ans){opts[i].classList.add('correct');markDone('lesson'+id);celebrate(true,'Correct! ✨');}
  else{opts[i].classList.add('wrong');opts[ans].classList.add('correct');}
  document.getElementById('quizExp').classList.add('show');
}

// ─── GUIDED PRACTICE (lesson → its drills → next lesson) ──────────────────────
const DRILL_TYPES=[
  {key:'fills',label:'Fill in the Blank',icon:'<i data-lucide="pencil"></i>',data:'FILLS'},
  {key:'esql',label:'Pick the Method',icon:'<i data-lucide="message-square"></i>',data:'ESQL'},
  {key:'bugs',label:'Fix the Forecast',icon:'<i data-lucide="bug"></i>',data:'BUGS'},
  {key:'wrong',label:"What's Wrong?",icon:'<i data-lucide="search"></i>',data:'WRONG'},
  {key:'parsons',label:'Put It In Order',icon:'<i data-lucide="puzzle"></i>',data:'PARSONS'}
];
let guided=null;let drillState={type:null,idx:null,parsPlaced:[],parsBank:[]};
function startGuided(lessonId){
  const seq=(LESSON_DRILLS[lessonId]||[]).filter(s=>{const dt=DRILL_TYPES.find(d=>d.key===s[0]);return dt&&DATA[dt.data]&&DATA[dt.data][s[1]];});
  if(!seq.length){gotoNext(lessonId);return;}
  guided={lessonId,seq,pos:0};activateView('view-practice');renderGuidedStep();
}
function renderGuidedStep(){
  if(!guided)return;
  const {seq,pos,lessonId}=guided;const step=seq[pos];
  const lesson=DATA.LESSONS.find(l=>l.id===lessonId);const isLast=pos===seq.length-1;
  const dt=DRILL_TYPES.find(d=>d.key===step[0]);const idx=step[1];const item=DATA[dt.data][idx];
  drillState={type:step[0],idx,parsPlaced:[],parsBank:[]};
  const done=S.done[`${step[0]}${idx}`];
  const dots='<div class="dots">'+seq.map((_,i)=>`<span class="dot${i<=pos?' on':''}"></span>`).join('')+'</div>';
  const header=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <button class="btn btn-sm" onclick="${lesson?('openLesson('+lessonId+')'):"navigate('practice')"}">${lesson?'← Back to lesson':'← Back to practice'}</button>
      <span style="color:var(--dim);font-size:13px">${lesson?('Practice '+(pos+1)+'/'+seq.length+' · '+esc(lesson.title)):('Free practice · '+esc(dt.label)+' '+(pos+1)+'/'+seq.length)}</span></div>${dots}`;
  let body='';
  if(step[0]==='fills')body=renderFill(item,done);
  else if(step[0]==='bugs')body=renderBug(item,done);
  else if(step[0]==='wrong')body=renderWrong(item,done);
  else if(step[0]==='parsons')body=renderParsons(item,done);
  else if(step[0]==='esql')body=renderEsql(item,done);
  const nav=`<div style="display:flex;justify-content:space-between;gap:10px;margin-top:16px">
      <button class="btn" onclick="${pos>0?'guidedPrev()':(lesson?('openLesson('+lessonId+')'):"navigate('practice')")}">${pos>0?'← Back':(lesson?'← Lesson':'← Practice')}</button>
      <button class="btn btn-primary" onclick="guidedNext()">${isLast?(lesson?'Finish → next lesson':'Finish'):'Next drill →'}</button></div>`;
  document.getElementById('view-practice').innerHTML=header+body+nav;
  if(step[0]==='parsons'&&!done)initParsons(item);
  window.scrollTo(0,0);
}
function guidedNext(){if(!guided)return;if(guided.pos<guided.seq.length-1){guided.pos++;renderGuidedStep();}else{const l=guided.lessonId;guided=null;if(l===null){navigate('practice');celebrate(true,'Nice — drill set complete!');}else gotoNext(l);}}
function guidedPrev(){if(guided&&guided.pos>0){guided.pos--;renderGuidedStep();}}
function gotoNext(lid){const n=nextLessonId(lid);if(n!==null)openLesson(n);else{navigate('home');celebrate(true,'\u{1F389} You finished every lesson!');}}

// ─── DRILL: FILLS (tap the choice) ─────────────────────────────────────────────
function renderFill(item,done){
  const correct=item.choices[0];const opts=_shuf(item.choices);
  return `<div class="card"><p style="color:var(--text)">${esc(item.q)}</p>
    ${item.partial?`<div class="code-block" style="margin:10px 0">${esc(item.partial).replace('___','<span style="color:var(--accent);font-weight:700">[ ? ]</span>')}</div>`:''}
    <div id="fillChoices">${opts.map(c=>`<button class="fill-choice${done&&c===correct?' correct':''}" onclick="pickFill(this)" ${done?'disabled':''}>${esc(c)}</button>`).join('')}</div>
    <div id="fillFb" style="margin-top:10px;${done?'':'display:none'}">${done?`<span style="color:var(--success)">✓ ${esc(item.hint)}</span>`:''}</div></div>`;
}
function pickFill(btn){
  const item=DATA.FILLS[drillState.idx];const fb=document.getElementById('fillFb');
  if(btn.textContent.trim()===item.choices[0].trim()){
    btn.classList.add('correct');document.querySelectorAll('#fillChoices .fill-choice').forEach(b=>b.disabled=true);
    fb.innerHTML=`<span style="color:var(--success)">✓ ${esc(item.hint)}</span>`;fb.style.display='block';
    markDone('fills'+drillState.idx);celebrate(true,'Correct! ✨');
  }else{btn.classList.add('wrong');btn.disabled=true;fb.innerHTML=`<span style="color:var(--err)">Not quite — try another.</span>`;fb.style.display='block';}
}
function _shuf(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ─── DRILL: ESQL (Name That Chart) ─────────────────────────────────────────────
function renderEsql(item,done){
  const correct=item.choices?item.choices[0]:item.ans;const opts=_shuf(item.choices||[item.ans]);
  return `<div class="card"><p style="color:var(--text)">${esc(item.q)}</p>
    <div id="esqlChoices">${opts.map(c=>`<button class="fill-choice${done&&c===correct?' correct':''}" onclick="pickEsql(this)" ${done?'disabled':''}>${esc(c)}</button>`).join('')}</div>
    <div id="esqlFb" style="margin-top:10px;${done?'':'display:none'}">${done?`<span style="color:var(--success)">✓ ${esc(item.hint||'')}</span>`:''}</div></div>`;
}
function pickEsql(btn){
  const item=DATA.ESQL[drillState.idx];const fb=document.getElementById('esqlFb');const correct=item.choices?item.choices[0]:item.ans;
  if(btn.textContent.trim()===correct.trim()){
    btn.classList.add('correct');document.querySelectorAll('#esqlChoices .fill-choice').forEach(b=>b.disabled=true);
    fb.innerHTML=`<span style="color:var(--success)">✓ ${esc(item.hint||'')}</span>`;fb.style.display='block';
    markDone('esql'+drillState.idx);celebrate(true,'Correct! ✨');
  }else{btn.classList.add('wrong');btn.disabled=true;fb.innerHTML=`<span style="color:var(--err)">Not quite — try another.</span>`;fb.style.display='block';}
}

// ─── DRILL: BUGS (Fix the Chart) ───────────────────────────────────────────────
function renderBug(item,done){
  const correct=item.choices[0];const opts=_shuf(item.choices);
  return `<div class="card"><p style="color:var(--text)">This chart setup is broken — tap the correct fix:</p>
    <div class="code-block" style="margin:10px 0">${esc(item.config)}</div>
    <div id="bugChoices">${opts.map(c=>`<button class="fill-choice${done&&c===correct?' correct':''}" onclick="pickBug(this)" ${done?'disabled':''}>${esc(c)}</button>`).join('')}</div>
    <div id="bugFb" style="margin-top:10px;${done?'':'display:none'}">${done?`<span style="color:var(--success)">✓ ${esc(item.broken)}</span>`:''}</div></div>`;
}
function pickBug(btn){
  const item=DATA.BUGS[drillState.idx];const fb=document.getElementById('bugFb');
  if(btn.textContent.trim()===item.choices[0].trim()){
    btn.classList.add('correct');document.querySelectorAll('#bugChoices .fill-choice').forEach(b=>b.disabled=true);
    fb.innerHTML=`<span style="color:var(--success)">✓ ${esc(item.broken)}</span>`;fb.style.display='block';
    markDone('bugs'+drillState.idx);celebrate(true,'Fixed! \u{1F41B}✓');
  }else{btn.classList.add('wrong');btn.disabled=true;fb.innerHTML=`<span style="color:var(--err)">Not quite — try another.</span>`;fb.style.display='block';}
}

// ─── DRILL: WRONG (What's Wrong?) ──────────────────────────────────────────────
function renderWrong(item,done){
  return `<div class="card"><p style="color:var(--text)">${esc(item.q)}</p>
    <div id="wrongOpts">${item.opts.map((o,i)=>`<button class="quiz-opt" onclick="checkWrong(${i})" ${done?'disabled':''}>${esc(o)}</button>`).join('')}</div>
    <div class="quiz-exp${done?' show':''}" id="wrongFb">${done?esc(item.exp):''}</div></div>`;
}
function checkWrong(i){
  const item=DATA.WRONG[drillState.idx];const fb=document.getElementById('wrongFb');const btns=document.querySelectorAll('#wrongOpts .quiz-opt');
  btns.forEach(b=>b.disabled=true);
  if(i===item.ans){btns[i].classList.add('correct');markDone('wrong'+drillState.idx);celebrate(true,'Spotted it! \u{1F50D}');}
  else{btns[i].classList.add('wrong');btns[item.ans].classList.add('correct');}
  fb.textContent=item.exp;fb.classList.add('show');
}

// ─── DRILL: PARSONS (Put It In Order) ──────────────────────────────────────────
function renderParsons(item,done){
  if(done){return `<div class="card"><p style="color:var(--text)">${esc(item.q)}</p>
    <div class="code-block">${item.ans.map(s=>esc(s)).join('\\n')}</div>
    <div style="margin-top:10px;color:var(--success)">✓ Complete</div></div>`;}
  return `<div class="card"><p style="color:var(--text)">${esc(item.q)}</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px">
      <div><div style="font-size:.78rem;color:var(--dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em">Bank</div>
        <div id="parsBank" style="min-height:80px;background:var(--surf2);border-radius:6px;padding:8px;display:flex;flex-direction:column;gap:6px"></div></div>
      <div><div style="font-size:.78rem;color:var(--dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em">Your order</div>
        <div id="parsPlaced" style="min-height:80px;background:var(--surf2);border-radius:6px;padding:8px;display:flex;flex-direction:column;gap:6px"></div></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px"><button class="btn btn-primary" onclick="checkParsons()">Check order</button>
      <button class="btn" onclick="resetParsons()">Reset</button></div>
    <div id="parsFb" style="margin-top:10px;display:none"></div></div>`;
}
function initParsons(item){drillState.parsBank=item.ans.map((_,i)=>i).sort(()=>Math.random()-0.5);drillState.parsPlaced=[];renderParsonsUI(item);}
function renderParsonsUI(item){
  const bank=document.getElementById('parsBank'),placed=document.getElementById('parsPlaced');if(!bank||!placed)return;
  bank.innerHTML=drillState.parsBank.map(i=>`<div class="pars-piece" draggable="true" data-idx="${i}" data-from="bank" ondragstart="parsMove(event)">${esc(item.ans[i])}</div>`).join('');
  placed.innerHTML=drillState.parsPlaced.map(i=>`<div class="pars-piece placed" draggable="true" data-idx="${i}" data-from="placed" ondragstart="parsMove(event)">${esc(item.ans[i])}</div>`).join('');
  [bank,placed].forEach(z=>{
    z.ondragover=e=>{e.preventDefault();z.style.outline='2px dashed var(--accent)';};
    z.ondragleave=()=>{z.style.outline='';};
    z.ondrop=e=>{e.preventDefault();z.style.outline='';
      const idx=parseInt(e.dataTransfer.getData('idx'));const from=e.dataTransfer.getData('from');const to=z.id==='parsBank'?'bank':'placed';
      if(from===to)return;
      if(from==='bank'){drillState.parsBank=drillState.parsBank.filter(x=>x!==idx);drillState.parsPlaced.push(idx);}
      else{drillState.parsPlaced=drillState.parsPlaced.filter(x=>x!==idx);drillState.parsBank.push(idx);}
      renderParsonsUI(DATA.PARSONS[drillState.idx]);};
  });
}
function parsMove(e){e.dataTransfer.setData('idx',e.target.dataset.idx);e.dataTransfer.setData('from',e.target.dataset.from);}
function resetParsons(){initParsons(DATA.PARSONS[drillState.idx]);}
function checkParsons(){
  const item=DATA.PARSONS[drillState.idx];const fb=document.getElementById('parsFb');
  const ok=drillState.parsPlaced.join(',')===item.ans.map((_,i)=>i).join(',');
  if(ok){fb.innerHTML=`<span style="color:var(--success)">✓ Perfect order!</span>`;fb.style.display='block';markDone('parsons'+drillState.idx);celebrate(true,'Solved! \u{1F9E9}');}
  else{fb.innerHTML=`<span style="color:var(--err)">Not quite — keep arranging.</span>`;fb.style.display='block';}
}

// ─── PRACTICE LIST ─────────────────────────────────────────────────────────────
function renderDrillList(){
  document.getElementById('view-practice').innerHTML=`<h1>Practice</h1>
    <p>Drills are woven into each lesson's guided path. Jump into any type below to free-practice.</p>
    <div class="drill-grid">${DRILL_TYPES.map(dt=>`<div class="drill-tile" onclick="freeDrill('${dt.key}')">

// ─── CARDS ──────────────────────────────────────────────────────────────────
let cardIdx=0,cardFlipped=false;
function renderCards(){cardIdx=0;cardFlipped=false;renderCardAt(0);}
function renderCardAt(i){
  const c=DATA.CARDS[i];if(!c)return;
  document.getElementById('view-cards').innerHTML=`<h1>Flashcards</h1>
    <p>Card ${i+1} of ${DATA.CARDS.length} — tap to flip.</p>
    <div class="fc-outer" onclick="flipCard()"><div class="fc-inner${cardFlipped?' flipped':''}" id="fcInner">
      <div class="fc-face"><div class="fc-term">${esc(c.front)}</div><div style="color:var(--dim);font-size:12px;margin-top:10px">tap to reveal</div></div>
      <div class="fc-face fc-back">${esc(c.back)}</div></div></div>

      <button class="btn" onclick="cardPrev()">← Prev</button>

}

// ─── GLOSSARY ─────────────────────────────────────────────────────────────────
function renderGlossary(){
  document.getElementById('view-glossary').innerHTML=`<h1>Glossary</h1>
    <input class="gloss-search" id="glossSearch" placeholder="Search terms…" oninput="filterGloss(this.value)">
    <div id="glossList"></div>`;
  filterGloss('');
}
function filterGloss(q){
  q=(q||'').toLowerCase();
  const items=DATA.GLOSSARY.filter(g=>!q||g[0].toLowerCase().includes(q)||g[1].toLowerCase().includes(q));
  document.getElementById('glossList').innerHTML=items.map(g=>`<div class="gloss-item"><div class="gloss-term">${esc(g[0])}</div><div class="gloss-def">${esc(g[1])}</div></div>`).join('')||'<p>No matches.</p>';
}

<script src="https://unpkg.com/lucide@latest"></script>
<script>
// This Lucide build leaves data-lucide ON the generated <svg>, so createIcons
// re-matches its own output. Strip it AND disconnect the observer during refresh
// so createIcons's own mutations never re-trigger it (no loop). (Stats' robust loader.)
function grainRefreshIcons(){
  if(!window.lucide) return;
  if(window._grainObs) window._grainObs.disconnect();
  lucide.createIcons();
  document.querySelectorAll('svg[data-lucide]').forEach(function(s){ s.removeAttribute('data-lucide'); });
  if(window._grainObs) window._grainObs.observe(document.body,{childList:true,subtree:true});
}
(function(){
  function init(){
    grainRefreshIcons();
    if(window.MutationObserver && !window._grainObs){
      window._grainObs=new MutationObserver(grainRefreshIcons);
      window._grainObs.observe(document.body,{childList:true,subtree:true});
    }
  }
  init();
  // Retry briefly if the Lucide CDN hadn't finished on first run.
  if(typeof window.lucide==='undefined'){
    var n=0, t=setInterval(function(){ if(window.lucide||++n>60){ clearInterval(t); init(); } },50);
  }
})();
</script>

      document.body.appendChild(s);old.remove();

async function handleLogout(){await signOut();location.reload();}
async function initAuthUI(){
  const lb=document.getElementById('loginBtn'),lo=document.getElementById('logoutBtn'),em=document.getElementById('userEmail');
  try{
    const u=await getCurrentUser();
    if(u){lb.style.display='none';lo.style.display='inline-block';if(u.email){em.textContent=u.email;em.style.display='inline-block';}}
    else{lb.style.display='inline-block';lo.style.display='none';em.style.display='none';}
  }catch(e){lb.style.display='inline-block';}
}
setTimeout(initAuthUI,600);
