<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Final Exam Kit · Analyst Prep Kit</title>
<meta name="description" content="A 28-question final exam covering Excel, SQL, Python, Tableau, Statistics, Power BI, and interview essentials. Plus a study guide with the bare basics for each.">
<style>
/* Calm-analyst design system. :root = restrained dark variant; [data-theme="light"] = light default. */
:root{--bg:#0f141b;--surf:#161c26;--surf2:#222b38;--surf3:#2b3543;--accent:#5b8cf5;--accdim:#2f4a7a;--text:#e6edf3;--dim:#98a3b2;--dim2:#6f7c8c;--border:#28303c;--border2:#3a4453;--good:#5b8cf5;--warn:#d2a24a;--bad:#f47984;--font:-apple-system,"Segoe UI",Roboto,system-ui,sans-serif;--mono:"Consolas",ui-monospace,monospace;--r-sm:6px;--r-md:8px;--r-lg:12px}
[data-theme="light"]{--bg:#eef1f5;--surf:#ffffff;--surf2:#f3f5f8;--surf3:#e8edf4;--accent:#2f6df0;--accdim:#d4e1ff;--text:#1f2328;--dim:#5b6470;--dim2:#7a8492;--border:#d6dce4;--border2:#c3ccd8;--good:#2f6df0;--warn:#9a6700;--bad:#cf222e}

/* Per-section colors — match other kits' palette */
:root{--c-excel:#3B6D11;--c-sql:#1D9E75;--c-python:#185FA5;--c-tableau:#B07517;--c-stats:#D4537E;--c-powerbi:#9B6B12;--c-interview:#7F77DD}

*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;line-height:1.6;font-size:15px}
a{color:var(--accent);text-decoration:none}
button{cursor:pointer;font-family:var(--font);color:inherit}

nav{display:flex;align-items:center;gap:10px;padding:12px 20px;background:var(--surf);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;flex-wrap:wrap}
.nav-btn{background:var(--surf2);border:1px solid var(--border);color:var(--dim);padding:6px 12px;border-radius:var(--r-md);font-size:13px;transition:.15s}
.nav-btn:hover{border-color:var(--accent);color:var(--text)}
.nav-btn.active{background:rgba(47,109,240,.15);color:var(--accent);border-color:var(--accent)}
.nav-title{font-size:15px;font-weight:700;color:var(--text);display:inline-flex;align-items:center;gap:9px}
.nav-title::before{content:"▦";color:var(--accent);background:var(--surf2);width:30px;height:30px;display:inline-grid;place-items:center;border-radius:9px;font-size:17px}
.nav-spacer{flex:1}

main{max-width:780px;margin:0 auto;padding:32px 20px 80px}

/* HOME */
.hero{text-align:center;margin-bottom:36px}
.hero-eyebrow{font-size:11px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase;margin-bottom:14px}
.hero h1{font-size:clamp(1.8rem,4.5vw,2.4rem);font-weight:700;line-height:1.2;margin-bottom:14px;letter-spacing:-.01em}
.hero h1 span{color:var(--accent)}
.hero p{color:var(--dim);font-size:15px;line-height:1.75;max-width:520px;margin:0 auto}

.cta-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px}
@media(max-width:560px){.cta-row{grid-template-columns:1fr}}
.cta-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-lg);padding:22px;cursor:pointer;text-align:left;transition:.15s;text-decoration:none;color:inherit;display:block}
.cta-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.cta-card.primary{border-color:var(--accent);background:linear-gradient(135deg,var(--surf),rgba(47,109,240,.06))}
.cta-icon{font-size:28px;margin-bottom:10px}
.cta-title{font-size:17px;font-weight:700;margin-bottom:6px}
.cta-desc{font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:12px}
.cta-link{font-size:13px;color:var(--accent);font-weight:600}

.method-callout{background:var(--surf);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--r-md);padding:14px 18px;font-size:13.5px;line-height:1.65;color:var(--dim);margin-bottom:28px}
.method-callout strong{color:var(--accent)}

.section-overview{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:20px}
.section-chip{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 12px;text-align:center;font-size:13px;color:var(--text);position:relative}
.section-chip .chip-num{font-size:18px;font-weight:700;color:var(--accent);display:block;margin-bottom:2px}
.section-chip .chip-label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em}

/* STUDY GUIDE */
.study-intro{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 22px;margin-bottom:22px}
.study-intro p{font-size:14.5px;line-height:1.7;color:var(--text);margin-bottom:8px}
.study-intro p:last-child{margin-bottom:0;color:var(--dim);font-size:13px}

.study-section{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:14px;overflow:hidden}
.study-head{display:flex;align-items:center;gap:12px;padding:14px 20px;cursor:pointer;user-select:none}
.study-head:hover{background:var(--surf2)}
.study-pill{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:3px 9px;border-radius:20px;border:1px solid currentColor}
.study-title{flex:1;font-size:16px;font-weight:600}
.study-toggle{color:var(--dim);font-size:13px;transition:transform .15s}
.study-section.open .study-toggle{transform:rotate(90deg)}
.study-body{display:none;padding:0 22px 18px 22px;border-top:1px solid var(--border)}
.study-section.open .study-body{display:block}
.study-body ul{list-style:none;padding:0;margin:14px 0 0 0}
.study-body li{padding:8px 0 8px 22px;font-size:14px;line-height:1.6;color:var(--text);position:relative;border-bottom:1px dashed var(--border)}
.study-body li:last-child{border-bottom:none}
.study-body li::before{content:'▸';position:absolute;left:0;color:var(--accent);font-size:13px;top:9px}
.study-body code{background:var(--surf2);padding:1px 6px;border-radius:4px;font-family:var(--mono);font-size:13px;color:var(--accent)}
.study-link{display:inline-block;margin-top:12px;font-size:13px;color:var(--accent)}
.study-link:hover{text-decoration:underline}
.study-viz{background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin:14px 0 2px}
.study-viz .sv-cap{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);font-weight:700;margin-bottom:9px}
.study-viz em{color:var(--text);font-style:italic}

.expand-all{font-size:13px;background:none;border:1px solid var(--border);color:var(--dim);padding:6px 14px;border-radius:var(--r-md);margin-bottom:16px}
.expand-all:hover{border-color:var(--accent);color:var(--text)}

/* EXAM */
.exam-header{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 22px;margin-bottom:22px;position:sticky;top:65px;z-index:50}
.exam-header-row{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:10px;flex-wrap:wrap}
.exam-title-block{flex:1}
.exam-mini-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:2px}
.exam-q-progress{font-size:18px;font-weight:700}
.exam-q-progress span{color:var(--accent)}
.exam-submit-btn{background:var(--accent);color:#fff;border:none;padding:10px 18px;border-radius:var(--r-md);font-size:14px;font-weight:600;white-space:nowrap}
.exam-submit-btn:hover{opacity:.9}
.exam-submit-btn:disabled{opacity:.45;cursor:not-allowed}
.exam-progress-bar{height:4px;background:var(--surf2);border-radius:2px;overflow:hidden}
.exam-progress-fill{height:100%;background:linear-gradient(90deg,var(--accdim),var(--accent));width:0;transition:width .3s}

.section-header{display:flex;align-items:center;gap:10px;margin:28px 0 14px 0;padding-bottom:10px;border-bottom:1px solid var(--border)}
.section-header:first-child{margin-top:0}
.section-header .section-pill{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:3px 10px;border-radius:20px;border:1px solid currentColor}
.section-header .section-name{font-size:15px;font-weight:600;color:var(--text)}
.section-header .section-count{font-size:12px;color:var(--dim);margin-left:auto}

.q-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 22px;margin-bottom:14px;transition:border-color .2s}
.q-card.answered{border-color:var(--accent)}
.q-card.correct{border-color:var(--good);background:linear-gradient(180deg,var(--surf),rgba(47,109,240,.04))}
.q-card.incorrect{border-color:var(--bad);background:linear-gradient(180deg,var(--surf),rgba(200,80,80,.04))}
.q-num{font-size:11px;font-weight:700;color:var(--dim);letter-spacing:.06em;margin-bottom:6px}
.q-text{font-size:15px;line-height:1.6;margin-bottom:14px;color:var(--text)}
.q-text code{background:var(--surf2);padding:2px 7px;border-radius:4px;font-family:var(--mono);font-size:13.5px;color:var(--accent);border:1px solid var(--border)}
.q-text pre{background:var(--surf2);padding:10px 14px;border-radius:var(--r-md);font-family:var(--mono);font-size:13px;margin:10px 0;overflow-x:auto;border:1px solid var(--border);color:var(--text)}

.choices{display:flex;flex-direction:column;gap:8px}
.choice{background:var(--surf2);border:1px solid var(--border);border-radius:var(--r-md);padding:11px 14px;font-size:14px;text-align:left;color:var(--text);transition:.15s;line-height:1.5;display:flex;gap:10px;align-items:flex-start;width:100%}
.choice:hover{border-color:var(--accent)}
.choice.selected{background:rgba(47,109,240,.12);border-color:var(--accent);color:var(--text)}
.choice.correct-answer{background:rgba(47,109,240,.15);border-color:var(--good);color:var(--text)}
.choice.wrong-answer{background:rgba(200,80,80,.1);border-color:var(--bad);color:var(--text)}
.choice-letter{font-weight:700;color:var(--dim);min-width:18px;font-family:var(--mono);font-size:13px;flex-shrink:0;margin-top:1px}
.choice.selected .choice-letter,.choice.correct-answer .choice-letter{color:var(--accent)}
.choice.wrong-answer .choice-letter{color:var(--bad)}
.choice-text{flex:1}

.fill-input{width:100%;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r-md);padding:11px 14px;font-size:14px;color:var(--text);font-family:var(--mono);outline:none;transition:.15s}
.fill-input:focus{border-color:var(--accent)}
.fill-input:disabled{opacity:.7}
.fill-hint{font-size:11px;color:var(--dim);margin-top:6px;font-style:italic}

.explanation{display:none;margin-top:12px;padding:12px 14px;background:var(--surf2);border-left:3px solid var(--accent);border-radius:var(--r-md);font-size:13.5px;line-height:1.65;color:var(--text)}
.explanation.show{display:block}
.explanation strong{color:var(--accent)}

/* RESULTS */
.results-hero{text-align:center;margin-bottom:28px}
.results-eyebrow{font-size:11px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase;margin-bottom:10px}
.score-big{font-size:64px;font-weight:800;line-height:1;color:var(--accent);margin-bottom:6px}
.score-big small{font-size:24px;font-weight:600;color:var(--dim)}
.score-verdict{font-size:18px;font-weight:600;margin-bottom:4px}
.score-sub{color:var(--dim);font-size:14px;line-height:1.6;max-width:480px;margin:0 auto}

.results-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.results-row{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 18px}
.results-row-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.results-pill{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:3px 10px;border-radius:20px;border:1px solid currentColor}
.results-section-name{font-weight:600;font-size:14px;color:var(--text)}
.results-score{font-size:14px;font-weight:600;font-family:var(--mono);color:var(--text)}
.results-bar{height:6px;background:var(--surf2);border-radius:3px;overflow:hidden}
.results-bar-fill{height:100%;border-radius:3px;transition:width .8s ease-out}
.results-hint{font-size:12.5px;color:var(--dim);margin-top:8px;line-height:1.55}
.results-hint a{color:var(--accent)}

.results-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:24px}
.btn{padding:11px 22px;border-radius:var(--r-md);font-size:14px;font-weight:600;border:none;transition:.15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}

/* FOOTER */
footer{margin-top:50px;padding-top:24px;border-top:1px solid var(--border);text-align:center;color:var(--dim);font-size:12px}
.footer-links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
.footer-links a{color:var(--dim)}
.footer-links a:hover{color:var(--accent)}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent);color:#fff;padding:12px 22px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.3);opacity:0;transition:.3s;z-index:300}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>
<nav>
  <button class="nav-btn" onclick="window.location='../index.html'" title="Back to all kits">← All Kits</button>
  <span class="nav-title">Final Exam Kit</span>
  <button class="nav-btn" id="navHome" onclick="setView('home')">Home</button>
  <button class="nav-btn" id="navStudy" onclick="setView('study')">Study Guide</button>
  <button class="nav-btn" id="navExam" onclick="setView('exam')">Exam</button>
  <button class="nav-btn" id="navResults" onclick="setView('results')" style="display:none">Results</button>
  <div class="nav-spacer"></div>
  <button class="nav-btn" onclick="resetAll()" title="Reset progress">↺ Reset</button>
  <button class="nav-btn" onclick="toggleTheme()"><span id="themeIcon">☀</span></button>
</nav>

<main id="app"></main>

<div class="toast" id="toast"></div>

<script>
/* ============== STATE ============== */
const STORE = 'apk-final';
const state = JSON.parse(localStorage.getItem(STORE) || '{}');
state.answers = state.answers || {};
state.submitted = state.submitted || false;
state.submittedSections = state.submittedSections || {}; // {sectionKey:true} — per-section submit (GR-C)
state.sectionScores = state.sectionScores || {}; // {sectionKey:{correct,total}} — persisted so the hub can show "Exam ✓"
state.openSections = state.openSections || {};
// On a cold entry (no URL hash deep-link), always start on Home so the
// user finds the two big CTAs ("Here's what you should know" + "Take
// the Exam"). Saved state.view is still used within a session for
// back-button continuity, but it doesn't carry over across cold visits.
// Hash routing (#study, #study-sql, #exam, #home, #results) below
// overrides this default.
state.view = location.hash ? (state.view || 'home') : 'home';
function save(){ localStorage.setItem(STORE, JSON.stringify(state)); }

/* ============== STUDY GUIDE — bare basics per section ============== */
const STUDY = [
  {key:'excel', color:'var(--c-excel)', label:'Excel', kitPath:'../excel/',
    must:[
      `<strong>Absolute vs relative refs</strong>: <code>$A$1</code> stays put when copied; <code>A1</code> shifts. Mix them like <code>$A1</code> or <code>A$1</code>.`,
      `<strong>Lookups</strong>: <code>VLOOKUP</code> (and the newer, better <code>XLOOKUP</code>) let you pull a value from another table by a key.`,
      `<strong>Conditional aggregates</strong>: <code>COUNTIF</code>, <code>SUMIF</code>, <code>AVERAGEIF</code> — count/sum/average only rows matching a condition.`,
      `<strong>PivotTables</strong>: drop a field into Rows, Columns, Values, Filters — fastest way to summarize a dataset.`,
      `<strong>Text vs number gotcha</strong>: <code>"$50,000"</code> with a dollar sign is text, not a number. <code>ISNUMBER()</code> catches it.`,
      `<strong>Cleaning helpers</strong>: <code>TRIM</code>, <code>UPPER</code>/<code>LOWER</code>, <code>SUBSTITUTE</code>, <code>VALUE</code> — the first ones you reach for on messy data.`
    ]},
  {key:'sql', color:'var(--c-sql)', label:'SQL', kitPath:'../sql/',
    must:[
      `<strong>The order of clauses</strong>: <code>SELECT</code> → <code>FROM</code> → <code>JOIN</code> → <code>WHERE</code> → <code>GROUP BY</code> → <code>HAVING</code> → <code>ORDER BY</code> → <code>LIMIT</code>.`,
      `<strong>WHERE vs HAVING</strong>: <code>WHERE</code> filters rows before grouping; <code>HAVING</code> filters groups after.`,
      `<strong>JOIN types</strong>: <code>INNER</code> = matches only; <code>LEFT</code> = all left + matching right (nulls if no match).`,
      `<strong>Aggregates</strong>: <code>COUNT(*)</code> counts rows; <code>COUNT(col)</code> ignores nulls; <code>COUNT(DISTINCT col)</code> counts unique values.`,
      `<strong>NULL is not 0</strong>: use <code>IS NULL</code>, not <code>= NULL</code>. <code>COALESCE(col, 0)</code> swaps nulls for a default.`,
      `<strong>Date filtering</strong>: <code>WHERE date BETWEEN '2026-01-01' AND '2026-03-31'</code> is inclusive on both ends.`
    ]},
  {key:'python', color:'var(--c-python)', label:'Python', kitPath:'../python/',
    must:[
      `<strong>Load data</strong>: <code>df = pd.read_csv('file.csv')</code>. Quick look: <code>df.head()</code>, <code>df.info()</code>, <code>df.describe()</code>.`,
      `<strong>Filter rows</strong>: <code>df[df['region'] == 'West']</code>. Multiple conditions use <code>&amp;</code> and <code>|</code> with parentheses.`,
      `<strong>.loc vs .iloc</strong>: <code>.loc</code> uses labels (column names); <code>.iloc</code> uses integer positions.`,
      `<strong>Group + aggregate</strong>: <code>df.groupby('region')['revenue'].sum()</code> is 80% of what you'll write.`,
      `<strong>Nulls</strong>: <code>df.isnull().sum()</code> for counts; <code>df.fillna(0)</code> to replace; <code>df.dropna()</code> to remove.`,
      `<strong>List vs dict</strong>: list = ordered, indexed by integers; dict = key→value lookup. Pandas Series is list-like; DataFrame is dict-of-Series.`
    ]},
  {key:'tableau', color:'var(--c-tableau)', label:'Tableau', kitPath:'../tableau/',
    must:[
      `<strong>Dimensions vs Measures</strong>: dimensions are categorical (region, product, date); measures are numeric (revenue, count).`,
      `<strong>Chart type rules</strong>: trends → line; comparisons → bar; relationships → scatter; parts-of-whole with few slices → stacked bar (almost never pie).`,
      `<strong>Discrete (blue) vs Continuous (green)</strong>: discrete creates headers; continuous creates axes.`,
      `<strong>Calculated fields</strong>: new fields derived from existing ones, e.g. <code>[Revenue] - [Cost]</code> for profit.`,
      `<strong>Filters shelf</strong>: filters limit which rows the visual sees. Context filters are computed first and affect downstream filters.`,
      `<strong>Visual hierarchy</strong>: top-left = most important. Don't put 8 charts on a dashboard — pick the 3 that answer the actual question.`
    ]},
  {key:'stats', color:'var(--c-stats)', label:'Statistics', kitPath:'../stats/',
    must:[
      `<strong>Mean vs median</strong>: mean is the average; median is the middle. Right-skewed data → mean &gt; median. Outliers pull the mean.`,
      `<strong>Standard deviation</strong>: a measure of spread around the mean. Small SD = tightly clustered; large SD = spread out.`,
      `<strong>p-value</strong>: probability of seeing data this extreme if there were no real effect. p &lt; 0.05 is the convention, not a law.`,
      `<strong>Correlation ≠ causation</strong>: variables can move together without one causing the other. Confounders are sneaky.`,
      `<strong>A/B test basics</strong>: random assignment, one variable at a time, enough sample size for statistical power.`,
      `<strong>Distributions</strong>: normal = bell curve; the Central Limit Theorem says sample means tend to be normally distributed even when the data isn't.`
    ]},
  {key:'powerbi', color:'var(--c-powerbi)', label:'Power BI', kitPath:'../powerbi/',
    must:[
      `<strong>Power Query (M)</strong> loads and transforms data BEFORE it enters the model. DAX is for measures and calculated columns AFTER.`,
      `<strong>Star schema</strong>: one fact table (e.g. sales) in the middle, dimension tables (customers, products, dates) around it. Avoid one giant flat table.`,
      `<strong>Measures vs calculated columns</strong>: measures are calculated at query time (efficient); calculated columns are stored row-by-row (use sparingly).`,
      `<strong>SUM vs SUMX</strong>: <code>SUM(table[col])</code> aggregates a column directly; <code>SUMX</code> iterates row-by-row evaluating an expression.`,
      `<strong>Filter context</strong>: every measure runs inside a context of active filters. <code>CALCULATE</code> changes that context.`,
      `<strong>Time intelligence</strong>: <code>TOTALYTD</code>, <code>SAMEPERIODLASTYEAR</code>, <code>DATEADD</code> — built-in functions that need a marked Date table to work.`
    ]},
  {key:'interview', color:'var(--c-interview)', label:'Interview', kitPath:'../interview/',
    must:[
      `<strong>STAR method</strong>: Situation, Task, Action, Result. Use it for any behavioral question — keeps you concrete.`,
      `<strong>Lead with the answer</strong>: state the conclusion or finding first, then the supporting reasoning. Don't bury the lede.`,
      `<strong>Push back constructively</strong>: when a request is vague, ask one clarifying question and offer a smaller faster deliverable instead of arguing.`,
      `<strong>Quantify your impact</strong>: "automated a report" is weak; "automated a 4-hour weekly report, freeing the team for analysis" is strong.`,
      `<strong>Salary talk</strong>: discuss after you have an offer or strong signal of interest, not in the first conversation.`,
      `<strong>Questions to ask them</strong>: "what's a great 90-day outcome for this role?" beats "what's the company culture like?" every time.`
    ]}
];

/* ============== EXAM QUESTIONS — 4 per section ============== */
const QUESTIONS = [
  // EXCEL
  {id:'e1', section:'excel', type:'mc', q:`The difference between <code>$A$1</code> and <code>A1</code> in Excel is:`,
    choices:[
      `One is read-only; the other can be edited.`,
      `<code>$A$1</code> is an absolute reference that doesn't shift when copied; <code>A1</code> is relative and shifts.`,
      `<code>$A$1</code> formats the value as currency.`,
      `There is no functional difference.`
    ], correct:1,
    explain:`Absolute refs (with <code>$</code>) freeze the row and/or column when you copy a formula. Mix them — <code>$A1</code> freezes the column but lets the row shift, and vice versa.`},
  {id:'e2', section:'excel', type:'mc', q:`You need to pull a customer's region from another sheet using their Customer ID. The right tool is:`,
    choices:[`<code>SUMIF</code>`, `<code>COUNTIF</code>`, `<code>VLOOKUP</code> or <code>XLOOKUP</code>`, `A PivotTable`],
    correct:2,
    explain:`<code>XLOOKUP</code> is the modern, more flexible replacement for <code>VLOOKUP</code>. Both look up a key and return a value from another table.`},
  {id:'e3', section:'excel', type:'fill', q:`Write the formula that counts cells in <code>A2:A100</code> equal to the text <code>"USA"</code>:`,
    answer:`=COUNTIF(A2:A100,"USA")`, accept:[/^=?countif\(\s*a2:a100\s*,\s*"?usa"?\s*\)$/i],
    explain:`<code>COUNTIF(range, criteria)</code> is the most common conditional aggregate. Quote text criteria.`},
  {id:'e4', section:'excel', type:'mc', q:`A PivotTable is the right tool when you want to:`,
    choices:[`Clean inconsistent text values`, `Summarize and group a dataset interactively by dimensions`, `Write a custom function`, `Apply conditional formatting`],
    correct:1,
    explain:`PivotTables shine for "group by region by category, sum the revenue" — interactively, without writing a single formula.`},

  // SQL
  {id:'s1', section:'sql', type:'mc', q:`<code>SELECT</code> in SQL does what?`,
    choices:[`Removes rows from a table`, `Returns columns from a table (a read)`, `Updates a column's value`, `Creates a new table`],
    correct:1,
    explain:`<code>SELECT</code> is the read operation. <code>INSERT</code>, <code>UPDATE</code>, <code>DELETE</code> are the others.`},
  {id:'s2', section:'sql', type:'mc', q:`The difference between <code>WHERE</code> and <code>HAVING</code>:`,
    choices:[
      `<code>WHERE</code> works on text, <code>HAVING</code> works on numbers.`,
      `<code>WHERE</code> filters rows before grouping; <code>HAVING</code> filters groups after grouping.`,
      `They are identical — older syntax preferred <code>HAVING</code>.`,
      `<code>HAVING</code> is only used inside subqueries.`
    ], correct:1,
    explain:`Use <code>WHERE</code> to limit which rows enter the aggregation; use <code>HAVING</code> to filter the aggregated results (e.g. "only show categories with more than 10 sales").`},
  {id:'s3', section:'sql', type:'mc', q:`A <code>LEFT JOIN</code> returns:`,
    choices:[
      `Only rows that match in both tables.`,
      `All rows from the left table; matching rows from the right (nulls where no match exists).`,
      `All rows from the right table; matching rows from the left.`,
      `Every possible combination of left and right rows.`
    ], correct:1,
    explain:`<code>LEFT JOIN</code> keeps every row from the left side regardless of whether the right side has a match — non-matches show <code>NULL</code>. <code>INNER JOIN</code> would drop those rows entirely.`},
  {id:'s4', section:'sql', type:'fill', q:`Complete the query: get the top 5 products by total revenue, biggest first. Fill in the missing keywords (just the keywords, e.g. <code>ORDER BY x DESC LIMIT 5</code>):<br><pre>SELECT product, SUM(revenue) AS total
FROM sales
GROUP BY product
________</pre>`,
    answer:`ORDER BY total DESC LIMIT 5`,
    accept:[/order\s+by\s+(total|sum\(revenue\))\s+desc\s+limit\s+5/i, /order\s+by\s+(total|sum\(revenue\))\s+desc[\s\S]*limit\s+5/i],
    explain:`<code>ORDER BY total DESC</code> sorts biggest first, <code>LIMIT 5</code> takes only the top five. (Some databases use <code>TOP 5</code> or <code>FETCH FIRST 5 ROWS ONLY</code> instead of <code>LIMIT</code>.)`},

  // PYTHON
  {id:'p1', section:'python', type:'mc', q:`The pandas method to load a CSV file is:`,
    choices:[`<code>pd.load_csv()</code>`, `<code>pd.read_csv()</code>`, `<code>pd.open_csv()</code>`, `<code>pd.import_csv()</code>`],
    correct:1,
    explain:`<code>pd.read_csv('file.csv')</code>. The <code>read_*</code> family also covers Excel, JSON, parquet, SQL queries, and more.`},
  {id:'p2', section:'python', type:'mc', q:`To select rows where the <code>region</code> column equals <code>'West'</code> in a pandas DataFrame called <code>df</code>:`,
    choices:[
      `<code>df.select('region == West')</code>`,
      `<code>df[df['region'] == 'West']</code>`,
      `<code>df.where(region='West')</code>`,
      `<code>df.find('region', 'West')</code>`
    ], correct:1,
    explain:`Pandas uses boolean indexing: a boolean Series inside <code>[]</code> filters the DataFrame to matching rows.`},
  {id:'p3', section:'python', type:'mc', q:`The difference between <code>.loc</code> and <code>.iloc</code>:`,
    choices:[
      `They are identical.`,
      `<code>.loc</code> selects by label (row/column names); <code>.iloc</code> selects by integer position.`,
      `<code>.loc</code> is for rows; <code>.iloc</code> is for columns.`,
      `<code>.iloc</code> is faster and should always be preferred.`
    ], correct:1,
    explain:`<code>.loc[0]</code> gives you the row labeled 0 (which may not be the first row); <code>.iloc[0]</code> always gives the first row positionally.`},
  {id:'p4', section:'python', type:'fill', q:`Write the pandas one-liner that groups <code>df</code> by <code>region</code> and sums <code>revenue</code>:`,
    answer:`df.groupby('region')['revenue'].sum()`,
    accept:[/df\.groupby\(\s*['"]region['"]\s*\)\s*\[\s*['"]revenue['"]\s*\]\.sum\(\s*\)/i, /df\.groupby\(['"]region['"]\)\.revenue\.sum\(\)/i],
    explain:`The <code>groupby → column → aggregate</code> pattern is the workhorse of pandas analysis. <code>.agg()</code> lets you do multiple aggregates at once.`},

  // TABLEAU
  {id:'t1', section:'tableau', type:'mc', q:`The best chart for showing how a metric changes over time is:`,
    choices:[`Pie chart`, `Stacked bar`, `Line chart`, `Heatmap`],
    correct:2,
    explain:`Time → line. The slope is the message. Bars work but force the viewer to read magnitudes; lines emphasize trend.`},
  {id:'t2', section:'tableau', type:'mc', q:`"Dimensions vs. Measures" in Tableau means:`,
    choices:[
      `Dimensions are large fields; measures are small fields.`,
      `Dimensions are categorical (region, product, date); measures are numerical aggregates (revenue, count, average).`,
      `Dimensions go on rows; measures go on columns.`,
      `They are interchangeable terms.`
    ], correct:1,
    explain:`Dimensions answer "by what?" — by region, by category, by month. Measures answer "how much?" — revenue, units, average price. Tableau auto-classifies fields, but you can convert between the two.`},
  {id:'t3', section:'tableau', type:'mc', q:`The strongest reason to avoid a pie chart with 7+ slices:`,
    choices:[
      `Pie charts can't show colors.`,
      `Humans are bad at comparing angles, especially when slices are similar in size.`,
      `Tableau can't render them properly.`,
      `They use too much screen space.`
    ], correct:1,
    explain:`Angle comparison is one of the weakest visual encodings (per Cleveland & McGill's research). A sorted bar chart almost always wins for ranking.`},
  {id:'t4', section:'tableau', type:'mc', q:`A calculated field is:`,
    choices:[
      `A new field created using a formula on existing fields.`,
      `A field Tableau computes automatically based on context.`,
      `A filter applied to a measure.`,
      `The same thing as a parameter.`
    ], correct:0,
    explain:`Calculated fields let you derive new dimensions or measures — e.g. <code>[Revenue] - [Cost]</code> for profit, or <code>IF [Region] = "West" THEN ...</code> for a custom group.`},

  // STATS
  {id:'st1', section:'stats', type:'mc', q:`When a distribution is right-skewed (long tail on the right), the mean is usually:`,
    choices:[`Less than the median`, `Greater than the median`, `Exactly equal to the median`, `Equal to the mode`],
    correct:1,
    explain:`Outliers on the right pull the mean upward. The median is more robust to outliers — that's why income is usually reported as median, not mean.`},
  {id:'st2', section:'stats', type:'mc', q:`A p-value of <code>0.03</code> in an A/B test means:`,
    choices:[
      `The probability the hypothesis is true is 97%.`,
      `If there were no real effect, you'd see data this extreme about 3% of the time.`,
      `The effect size is 3%.`,
      `The test had a 3% error rate.`
    ], correct:1,
    explain:`A p-value is the probability of seeing data this extreme assuming the null hypothesis (no effect) is true. It's NOT the probability that your hypothesis is correct — that's one of the most common interview-killing misinterpretations.`},
  {id:'st3', section:'stats', type:'mc', q:`Standard deviation measures:`,
    choices:[`The most common value`, `The middle value`, `The spread of values around the mean`, `The total of all values`],
    correct:2,
    explain:`Small SD = data points cluster near the mean; large SD = they spread out. Two datasets can share the same mean and tell completely different stories — SD captures that.`},
  {id:'st4', section:'stats', type:'mc', q:`Ice cream sales and drownings both rise in summer — they correlate strongly. What's the safe conclusion?`,
    choices:[
      `Ice cream causes drowning.`,
      `Drownings cause people to buy ice cream.`,
      `Both are likely caused by a third variable (hot weather → more swimming, more ice cream).`,
      `The correlation must be a measurement error.`
    ], correct:2,
    explain:`This is the classic "confounder" — a third variable drives both. Correlation can suggest a relationship but doesn't establish direction or cause.`},

  // POWER BI
  {id:'b1', section:'powerbi', type:'mc', q:`DAX is primarily used for:`,
    choices:[
      `Loading and transforming data when it enters the model.`,
      `Writing measures and calculated columns for analysis.`,
      `Building visualizations on the canvas.`,
      `Publishing reports to the Power BI Service.`
    ], correct:1,
    explain:`DAX (Data Analysis Expressions) is the formula language for measures and calculated columns. Loading/transforming data is Power Query's job (using M).`},
  {id:'b2', section:'powerbi', type:'mc', q:`The recommended data model shape for Power BI is generally:`,
    choices:[
      `One giant flat table with everything joined together.`,
      `A star schema: one fact table in the middle, dimension tables around it.`,
      `A heavily normalized snowflake schema with many levels.`,
      `It doesn't matter as long as the visuals work.`
    ], correct:1,
    explain:`Star schemas are faster, easier to understand, and play nicely with DAX time intelligence. The fact table holds events (sales, transactions); dimension tables hold context (customers, products, dates).`},
  {id:'b3', section:'powerbi', type:'mc', q:`<code>SUM</code> vs <code>SUMX</code> in DAX:`,
    choices:[
      `They are identical — <code>SUMX</code> is just shorter to type.`,
      `<code>SUM(table[col])</code> aggregates a single column; <code>SUMX(table, expression)</code> iterates row-by-row, evaluates the expression, then sums.`,
      `<code>SUM</code> works in DAX; <code>SUMX</code> works only in Power Query.`,
      `<code>SUMX</code> is always faster.`
    ], correct:1,
    explain:`Use <code>SUM</code> when you have a column to aggregate directly. Use <code>SUMX</code> when you need a row-level calculation first (e.g. <code>SUMX(Sales, Sales[Quantity] * Sales[Price])</code>).`},
  {id:'b4', section:'powerbi', type:'mc', q:`Power Query (the M language) is used to:`,
    choices:[
      `Write measures.`,
      `Load, shape, and transform data BEFORE it enters the model.`,
      `Create dashboards visually.`,
      `Schedule the dataset refresh.`
    ], correct:1,
    explain:`Power Query is the ETL layer — connecting to sources, cleaning, reshaping, and merging. By the time data hits the model for DAX to operate on, the heavy lifting should already be done in Power Query.`},

  // INTERVIEW
  {id:'i1', section:'interview', type:'mc', q:`The STAR method structures behavioral answers as:`,
    choices:[
      `Story, Theme, Argument, Result`,
      `Situation, Task, Action, Result`,
      `State, Test, Adjust, Resolve`,
      `Strategy, Tactics, Audit, Review`
    ], correct:1,
    explain:`<strong>S</strong>ituation, <strong>T</strong>ask, <strong>A</strong>ction, <strong>R</strong>esult. The Action and Result are where most candidates underweight — be specific about what YOU did and what changed.`},
  {id:'i2', section:'interview', type:'mc', q:`"Lead with the answer" means:`,
    choices:[
      `Always start by saying "yes" to whatever is asked.`,
      `State your conclusion or finding first, then walk through the reasoning.`,
      `Speak before the interviewer finishes the question.`,
      `Bring up salary expectations early.`
    ], correct:1,
    explain:`Senior people skim. Lead with the conclusion ("revenue dropped 12% in EMEA Enterprise"), then the supporting evidence. Burying the answer in a long preamble loses the room.`},
  {id:'i3', section:'interview', type:'mc', q:`A stakeholder Slacks: "Send me ALL the data on EMEA enterprise customers by EOD today." Best response:`,
    choices:[
      `Comply immediately to show responsiveness.`,
      `Refuse — they should know what they actually want.`,
      `Ask one clarifying question to find the real need; offer a smaller faster deliverable (e.g. "I can send a 1-pager with the answer in 45 min").`,
      `Forward the request to your manager and wait for direction.`
    ], correct:2,
    explain:`"All the data" almost always hides a specific question. Surfacing the real need saves both of you time and makes you look senior — push back constructively, don't just push back.`},
  {id:'i4', section:'interview', type:'mc', q:`The best time to discuss salary in an interview process:`,
    choices:[
      `In the first phone screen, to avoid wasting time.`,
      `After you have an offer or strong signal of interest from the company.`,
      `Never — let them bring it up first, always.`,
      `In your application cover letter.`
    ], correct:1,
    explain:`Discussing salary too early anchors you to a number before they've decided how much they want you. Once they've committed via offer (or near-offer signal), your leverage is highest. Recruiters who push for your number on call one are doing their job — you can defer politely.`}

  excel:{label:'Excel', color:'var(--c-excel)', kitPath:'../excel/'},
  sql:{label:'SQL', color:'var(--c-sql)', kitPath:'../sql/'},
  python:{label:'Python', color:'var(--c-python)', kitPath:'../python/'},
  tableau:{label:'Tableau', color:'var(--c-tableau)', kitPath:'../tableau/'},
  stats:{label:'Statistics', color:'var(--c-stats)', kitPath:'../stats/'},
  powerbi:{label:'Power BI', color:'var(--c-powerbi)', kitPath:'../powerbi/'},
  interview:{label:'Interview', color:'var(--c-interview)', kitPath:'../interview/'}
};

const SECTION_ORDER = ['excel','sql','python','tableau','stats','powerbi','interview'];

/* ============== RENDER ============== */
function render(){
  document.querySelectorAll('nav .nav-btn').forEach(b=>b.classList.remove('active'));
  const navId = 'nav' + state.view.charAt(0).toUpperCase() + state.view.slice(1);
  document.getElementById(navId)?.classList.add('active');
  document.getElementById('navResults').style.display = anySubmitted() ? '' : 'none';

  const app = document.getElementById('app');
  if(state.view === 'home') app.innerHTML = renderHome();
  else if(state.view === 'study') app.innerHTML = renderStudy();
  else if(state.view === 'exam') app.innerHTML = renderExam();
  else if(state.view === 'results') app.innerHTML = renderResults();
  attachFooter(app);
}

function setView(v, opts){
  if(v === 'results' && !anySubmitted()){ toast('Submit at least one section to see results.'); return; }
  state.view = v;
  save();
  render();
  if(opts && opts.scrollToSection){
    const el = document.getElementById('study-' + opts.scrollToSection);
    if(el){ el.scrollIntoView({behavior:'smooth', block:'start'}); return; }
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

/* Deep-link routing — supports /final/#study and /final/#study-<section> */
function handleHash(){
  const h = location.hash.replace(/^#/, '');
  if(!h) return;
  if(h === 'study'){
    setView('study');
    return;
  }
  if(h.startsWith('study-')){
    const key = h.slice('study-'.length);
    if(SECTION_INFO[key]){
      state.openSections[key] = true;
      save();
      setView('study', {scrollToSection: key});
    }
    return;
  }
  if(h.startsWith('exam-')){
    const key = h.slice('exam-'.length);
    if(SECTION_INFO[key]){
      setView('exam');
      setTimeout(()=>{ document.getElementById('sec-'+key)?.scrollIntoView({behavior:'smooth', block:'start'}); }, 80);
    }
    return;
  }
  if(h === 'exam') setView('exam');
  else if(h === 'home') setView('home');
}
window.addEventListener('hashchange', handleHash);

      <p>One test, every tool. Twenty-eight questions covering the bare basics from Excel, SQL, Python, Tableau, Statistics, Power BI, and Interview prep. Take it cold to find your gaps, or use the study guide first.</p>

       <div style="border:1px solid var(--border);border-radius:6px;padding:6px;background:var(--surf)">📦 Products</div>
       <div></div><div style="border:1px solid var(--border);border-radius:6px;padding:6px;background:var(--surf)">🌐 Region</div><div></div>
     </div><div style="color:var(--dim);font-size:12px;margin-top:7px">One fact table in the middle, dimensions around it = star schema</div>`,
    interview: `<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">`+
       [['S','Situation'],['T','Task'],['A','Action'],['R','Result']].map((p,i)=>`${i?arrow:''}<span style="padding:4px 9px;border-radius:6px;background:var(--surf);border:1px solid var(--border);font-size:12px"><b style="color:var(--accent)">${p[0]}</b> ${p[1]}</span>`).join('')+
       `</div>`
  };
  return M[key] ? wrap(M[key]) : '';
}

function allStudyOpen(){ return STUDY.every(s => state.openSections[s.key]); }
function toggleStudy(key){
  state.openSections[key] = !state.openSections[key];
  save(); render();
}
function toggleAllStudy(){
  const open = !allStudyOpen();
  STUDY.forEach(s => state.openSections[s.key] = open);
  save(); render();
}

function renderExam(){
  const answered = Object.keys(state.answers).length;
  const total = QUESTIONS.length;
  const pct = Math.round(100*answered/total);
  const allAns = answered === total;
  const subCount = SECTION_ORDER.filter(isSectionSubmitted).length;

  let topBtn;
  if(allSubmitted())      topBtn = `<button class="exam-submit-btn" onclick="setView('results')">View results →</button>`;
  else if(allAns)         topBtn = `<button class="exam-submit-btn" onclick="submitExam()">Submit all &amp; finish</button>`;
  else if(anySubmitted()) topBtn = `<button class="exam-submit-btn" onclick="setView('results')">View results so far →</button>`;
  else                    topBtn = `<button class="exam-submit-btn" disabled>Submit a section below ↓</button>`;

  let html = `
    <div class="exam-header">
      <div class="exam-header-row">
        <div class="exam-title-block">
          <div class="exam-mini-title">Final exam</div>
          <div class="exam-q-progress"><span>${answered}</span> of ${total} answered · ${subCount}/${SECTION_ORDER.length} sections submitted</div>
        </div>
        ${topBtn}
      </div>
      <div class="exam-progress-bar"><div class="exam-progress-fill" style="width:${pct}%"></div></div>
      <div style="font-size:13px;color:var(--muted,#888);margin-top:8px">Submit each subject on its own — lock in a section as soon as you've answered it, or do the whole exam and submit it all at once.</div>
    </div>
  `;

  for(const sectionKey of SECTION_ORDER){
    const info = SECTION_INFO[sectionKey];
    const qs = QUESTIONS.filter(q => q.section === sectionKey);
    const subd = isSectionSubmitted(sectionKey);
    const ansd = sectionAnswered(sectionKey);
    const sc = subd ? sectionScoreFor(sectionKey) : null;
    const sectBtn = subd
      ? `<span style="font-weight:700;font-size:13px;color:${info.color};border:1px solid ${info.color};border-radius:6px;padding:4px 12px">✓ ${sc.correct}/${sc.total}</span>`
      : `<button id="secbtn-${sectionKey}" onclick="submitSection('${sectionKey}')" ${ansd?'':'disabled'} style="font-size:13px;font-weight:600;font-family:inherit;cursor:${ansd?'pointer':'not-allowed'};border:1px solid ${ansd?info.color:'var(--border,#ccc)'};color:${ansd?info.color:'var(--muted,#999)'};background:none;border-radius:6px;padding:5px 14px;opacity:${ansd?1:.6}">${ansd?'Submit this section':'Answer all '+qs.length}</button>`;
    html += `
      <div class="section-header" id="sec-${sectionKey}">
        <span class="section-pill" style="color:${info.color}">${info.label}</span>
        <span class="section-name">${studyTitleFor(sectionKey)}</span>
        <span class="section-count">${qs.length} questions</span>
        <span style="margin-left:auto">${sectBtn}</span>
      </div>
      ${qs.map(q => renderQuestion(q)).join('')}
    `;
  }

  return html;
}

function renderQuestion(q){
  const idx = QUESTIONS.findIndex(x=>x.id===q.id) + 1;
  const ans = state.answers[q.id];
  const submitted = isSectionSubmitted(q.section);
  let stateCls = '';
  if(submitted){
    stateCls = isCorrect(q) ? ' correct' : ' incorrect';
  } else if(ans !== undefined){
    stateCls = ' answered';
  }

  let body;
  if(q.type === 'mc'){
    body = `<div class="choices">${q.choices.map((c,i)=>{
      let cls = 'choice';
      if(submitted){
        if(i === q.correct) cls += ' correct-answer';
        else if(ans === i) cls += ' wrong-answer';
      } else if(ans === i){
        cls += ' selected';
      }
      const letter = String.fromCharCode(65+i);
      return `<button class="${cls}" onclick="answerMc('${q.id}',${i})" ${submitted?'disabled':''}>
        <span class="choice-letter">${letter}</span>
        <span class="choice-text">${c}</span>
      </button>`;
    }).join('')}</div>`;
  } else {
    const value = ans || '';
    body = `<input class="fill-input" type="text" value="${escapeAttr(value)}" oninput="answerFill('${q.id}', this.value)" placeholder="Type your answer…" ${submitted?'disabled':''}>
      <div class="fill-hint">Type the formula/code as you'd actually write it. Capitalization and spaces are flexible.</div>`;
  }

  const explanation = submitted
    ? `<div class="explanation show"><strong>${isCorrect(q) ? 'Correct.' : (q.type==='fill' ? `Expected something like: <code>${escapeHtml(q.answer)}</code>. ` : 'Heads up: ')}</strong> ${q.explain}</div>`
    : '';

  return `
    <div class="q-card${stateCls}" id="q-${q.id}">
      <div class="q-num">Question ${idx}</div>
      <div class="q-text">${q.q}</div>
      ${body}
      ${explanation}
    </div>
  `;
}

function answerMc(qid, idx){
  if(isSectionSubmitted(sectionOf(qid))) return;
  state.answers[qid] = idx;
  save();
  render();
}
function answerFill(qid, val){
  const sect = sectionOf(qid);
  if(isSectionSubmitted(sect)) return;
  if(val.trim()) state.answers[qid] = val;
  else delete state.answers[qid];
  save();
  // Don't re-render on every keystroke (would drop input focus) — update live bits only.
  const answered = Object.keys(state.answers).length;
  const total = QUESTIONS.length;
  document.querySelector('.exam-q-progress span').textContent = answered;
  document.querySelector('.exam-progress-fill').style.width = (100*answered/total)+'%';
  document.getElementById('q-'+qid)?.classList.toggle('answered', !!state.answers[qid]);
  // Enable this section's submit button once all its questions are answered.
  const sbtn = document.getElementById('secbtn-'+sect);
  if(sbtn){
    const ansd = sectionAnswered(sect);
    sbtn.disabled = !ansd;
    sbtn.textContent = ansd ? 'Submit this section' : ('Answer all '+QUESTIONS.filter(q=>q.section===sect).length);
    if(ansd){ const c=SECTION_INFO[sect].color; sbtn.style.cursor='pointer'; sbtn.style.opacity=1; sbtn.style.color=c; sbtn.style.borderColor=c; }
  }
}

function isCorrect(q){
  const ans = state.answers[q.id];
  if(ans === undefined) return false;
  if(q.type === 'mc') return ans === q.correct;
  // fill
  const norm = String(ans).trim().replace(/\s+/g,' ');
  if(q.accept){
    return q.accept.some(rx => rx.test(norm));
  }
  return norm.toLowerCase() === q.answer.toLowerCase();
}

/* ===== Per-section submit (GR-C) ===== */
function isSectionSubmitted(k){ return !!state.submittedSections[k]; }
function sectionOf(qid){ const q = QUESTIONS.find(x=>x.id===qid); return q ? q.section : null; }
function allSubmitted(){ return SECTION_ORDER.every(isSectionSubmitted); }
function anySubmitted(){ return SECTION_ORDER.some(isSectionSubmitted); }
function sectionAnswered(k){ return QUESTIONS.filter(q=>q.section===k).every(q=>state.answers[q.id]!==undefined); }
function sectionScoreFor(k){ const qs=QUESTIONS.filter(q=>q.section===k); return {correct:qs.filter(isCorrect).length, total:qs.length}; }
function submitSection(k){
  if(!sectionAnswered(k) || isSectionSubmitted(k)) return;
  state.submittedSections[k] = true;
  state.sectionScores[k] = sectionScoreFor(k);
  if(allSubmitted()) state.submitted = true;
  save();
  render();
  document.getElementById('sec-'+k)?.scrollIntoView({block:'start',behavior:'smooth'});
}

function submitExam(){
  for(const k of SECTION_ORDER){ if(sectionAnswered(k)){ state.submittedSections[k] = true; state.sectionScores[k] = sectionScoreFor(k); } }
  state.submitted = allSubmitted();
  save();
  setView('results');
}

function calcScore(){
  // Scores only the sections the user has actually submitted (GR-C).
  const bySection = {};
  let total = 0, outOf = 0;
  for(const s of SECTION_ORDER){
    if(!isSectionSubmitted(s)) continue;
    const qs = QUESTIONS.filter(q=>q.section===s);
    const correct = qs.filter(isCorrect).length;
    bySection[s] = {correct, total: qs.length};
    total += correct; outOf += qs.length;
  }
  return {total, bySection, outOf, submittedKeys: Object.keys(bySection)};
}

function verdictFor(pct){
  if(pct >= 90) return {label:'Strong showing — you know the basics cold.', tone:'good'};
  if(pct >= 75) return {label:'Solid — a few gaps worth closing.', tone:'good'};
  if(pct >= 60) return {label:'Foundation is there — sharpen the weak sections.', tone:'warn'};
  if(pct >= 40) return {label:'Real gaps. Use the study guide and the weakest kits next.', tone:'warn'};
  return {label:'Cold start. Work through the kits first, then come back.', tone:'bad'};
}

function renderResults(){
  const score = calcScore();
  if(score.outOf === 0){
    return `<div class="results-hero"><div class="results-eyebrow">Final Exam · Results</div><div class="score-verdict">No sections submitted yet.</div><p class="score-sub">Answer a subject's questions and hit "Submit this section" to see your score here.</p></div><div class="results-actions"><button class="btn btn-primary" onclick="setView('exam')">Go to the exam →</button></div>`;
  }
  const pct = Math.round(100 * score.total / score.outOf);
  const v = verdictFor(pct);
  const subCount = score.submittedKeys.length;
  const allDone = subCount === SECTION_ORDER.length;
  return `
    <div class="results-hero">
      <div class="results-eyebrow">Final Exam · Results${allDone?'':' · in progress'}</div>
      <div class="score-big">${score.total}<small>/${score.outOf}</small></div>
      <div class="score-verdict">${pct}% — ${v.label}</div>
      <p class="score-sub">${allDone
        ? `A junior analyst interview won't ask exactly these questions, but it'll lean on the same fundamentals. Use the section breakdown below to decide where to spend your next study hour.`
        : `Your score so far across the <strong>${subCount} of ${SECTION_ORDER.length}</strong> sections you've submitted. Finish the remaining sections for your full result.`}</p>
    </div>

    <div class="results-grid">
      ${score.submittedKeys.map(k=>{
        const info = SECTION_INFO[k];
        const s = score.bySection[k];
        const p = Math.round(100*s.correct/s.total);
        const hint = p === 100 ? 'Clean sweep. Move on.'
          : p >= 75 ? `Mostly there — one quick lap through the ${info.label} kit closes the gap.`
          : p >= 50 ? `Foundation visible but shaky. <a href="${info.kitPath}">Open the ${info.label} Kit</a> and redo the lessons.`
          : `This is the one to focus on next. <a href="${info.kitPath}">Open the ${info.label} Kit</a>.`;
        return `
          <div class="results-row">
            <div class="results-row-top">
              <span class="results-pill" style="color:${info.color}">${info.label}</span>
              <span class="results-section-name">${studyTitleFor(k)}</span>
              <span class="results-score">${s.correct}/${s.total}</span>
            </div>
            <div class="results-bar"><div class="results-bar-fill" style="width:${p}%;background:${info.color}"></div></div>
            <div class="results-hint">${hint}</div>
          </div>
        `;
      }).join('')}
    </div>

    ${!allDone ? `<div class="results-hint" style="text-align:center;margin:18px 0">You've submitted ${subCount} of ${SECTION_ORDER.length} sections — <a href="#exam" onclick="setView('exam');return false;">go back to the exam</a> to finish the rest and get your full grade.</div>` : ''}

    <div class="results-actions">
      <button class="btn btn-ghost" onclick="setView('exam')">Review the exam</button>
      <button class="btn btn-ghost" onclick="setView('study')">Open study guide</button>
      <button class="btn btn-primary" onclick="retake()">Retake exam ↺</button>
    </div>
  `;
}

function retake(){
  if(!confirm('Clear your answers and retake the exam?')) return;
  state.answers = {};
  state.submitted = false;
  state.submittedSections = {};
  state.sectionScores = {};
  state.view = 'exam';
  save();
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ============== UTIL ============== */
function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escapeAttr(s){
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;');
}

function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('apk-theme', next);
  document.getElementById('themeIcon').textContent = next === 'dark' ? '☀' : '☾';
}
(function initTheme(){
  const saved = localStorage.getItem('apk-theme');
  if(saved) document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('themeIcon').textContent = document.documentElement.getAttribute('data-theme')==='dark'?'☀':'☾';
})();

function resetAll(){
  if(!confirm('Clear all answers and reset the exam + study guide?')) return;
  localStorage.removeItem(STORE);
  location.reload();
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._t);
  window._t = setTimeout(()=>t.classList.remove('show'), 2200);
}

render();
handleHash();
