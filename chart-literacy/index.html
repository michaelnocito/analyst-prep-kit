<style>
/* GRAIN design system. The kit's own semantic vars are re-pointed onto Grain
   tokens (assets/grain/) — no one-off hex. :root = warm dark variant;
   [data-theme="light"] = the full Grain cream look (the default). A dedicated
   Grain dark palette is a later token job (out of scope). */
:root{
  --bg:var(--stone-900);--surf:var(--stone-800);--surf2:var(--stone-700);--accent:var(--clay-400);--accent2:var(--clay-300);
  --text:var(--stone-50);--dim:var(--stone-300);--border:var(--stone-700);--success:var(--leaf-400);--err:var(--rust-400);
  --warn:var(--amber-300);--radius:8px;--font:var(--font-sans);--mono:var(--font-mono);
}
[data-theme="light"]{
  --bg:var(--color-bg);--surf:var(--color-surface);--surf2:var(--stone-100);--accent:var(--clay-500);--accent2:var(--clay-600);
  --text:var(--stone-900);--dim:var(--stone-600);--border:var(--stone-200);--success:var(--leaf-500);--err:var(--rust-500);--warn:var(--amber-600);
}
h1,h2,h3,h4{font-family:var(--font-display);letter-spacing:var(--tracking-tight)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}
a{color:var(--accent);text-decoration:none}
code,.mono{font-family:var(--mono)}
nav{background:var(--surf);border-bottom:1px solid var(--border);padding:0 18px;display:flex;align-items:center;gap:4px;height:56px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.nav-logo{font-weight:700;font-size:14px;margin-right:12px;color:var(--text);padding-right:12px;border-right:1px solid var(--border);white-space:nowrap;display:inline-flex;align-items:center;gap:9px}
.logo-mark{color:var(--accent);background:var(--surf2);width:30px;height:30px;display:inline-grid;place-items:center;border-radius:9px;flex-shrink:0}
.logo-mark .lucide{width:17px;height:17px}
.nav-btn{background:none;border:none;color:var(--dim);cursor:pointer;padding:14px 10px;font-size:13px;font-family:var(--font);border-bottom:2px solid transparent;transition:.15s;white-space:nowrap}
.nav-btn:hover{color:var(--text)}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.spacer{flex:1}
.theme-btn,.settings-btn{background:none;border:1px solid var(--border);color:var(--dim);cursor:pointer;padding:4px 10px;border-radius:6px;font-size:13px;font-family:var(--font)}
.theme-btn:hover,.settings-btn:hover{color:var(--text);border-color:var(--accent)}
.view{display:none;max-width:900px;margin:0 auto;padding:28px 20px}
.view.active{display:block}
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:600;background:var(--surf2);color:var(--dim);border:1px solid var(--border)}
.tag.accent{background:var(--accent);color:#fff;border-color:var(--accent)}
h1{font-size:24px;font-weight:700;margin-bottom:6px}
h2{font-size:19px;font-weight:700;margin-bottom:12px}
h3{font-size:15px;font-weight:600;margin-bottom:8px}
p{line-height:1.6;color:var(--dim);margin-bottom:10px}
p strong{color:var(--text)}
.lead{color:var(--text);font-size:15px}
.btn{display:inline-block;padding:9px 18px;border-radius:6px;border:none;cursor:pointer;font-size:14px;font-family:var(--font);font-weight:600;transition:.15s;background:var(--surf2);color:var(--text)}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:5px 12px;font-size:13px}
.resume-card{background:var(--accent);border-radius:var(--radius);padding:24px 28px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:16px;cursor:pointer}
.resume-card h2{color:#fff;margin-bottom:4px}
.resume-card p{color:rgba(255,255,255,.85);margin:0}
.path-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.path-tile{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:.15s}
.path-tile:hover{border-color:var(--accent);transform:translateY(-1px)}
.path-tile h3{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--dim);margin-bottom:6px}
.path-tile .count{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--text)}
.path-tile .sub{font-size:12px;color:var(--dim);margin-top:2px}
.prog-bar{height:4px;background:var(--surf2);border-radius:2px;margin-top:8px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s}
.ral-block{background:var(--surf2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin:12px 0}
.ral-title{font-family:var(--mono);font-size:13px;margin-bottom:10px;padding:8px 12px;background:var(--bg);border-radius:4px;border-left:3px solid var(--accent);line-height:1.6;font-weight:600}
.ral-say{font-size:14px;font-style:italic;color:var(--text);background:var(--bg);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;padding:9px 13px;margin-bottom:12px;line-height:1.55}
.ral-say::before{content:'\1F5E3\FE0F ';font-style:normal;margin-right:4px}
.ral-line{display:flex;gap:10px;align-items:baseline;padding:5px 0;font-size:13px;border-bottom:1px solid var(--border)}
.ral-line:last-child{border:none}
.ral-chunk{font-family:var(--mono);color:var(--accent);flex-shrink:0;min-width:190px;font-weight:600}
.ral-arrow{color:var(--border);flex-shrink:0}
.ral-desc{color:var(--text)}
.gotcha{background:var(--surf2);border-left:3px solid var(--warn);padding:10px 14px;border-radius:0 6px 6px 0;margin:12px 0;font-size:13.5px;color:var(--text)}
.gotcha strong{color:var(--warn)}
.viz-cap{font-size:12.5px;color:var(--dim);margin-top:8px;line-height:1.55}
.quiz-wrap{background:var(--surf2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-top:18px}
.quiz-opt{display:block;width:100%;text-align:left;background:var(--surf);border:1px solid var(--border);border-radius:6px;padding:11px 16px;margin-bottom:8px;cursor:pointer;font:inherit;font-size:14px;color:var(--text);transition:.15s}
.quiz-opt:hover{border-color:var(--accent)}
.quiz-opt.correct{background:rgba(46,158,107,.16);border-color:var(--success);color:var(--success)}
.quiz-opt.wrong{background:rgba(207,34,46,.12);border-color:var(--err);color:var(--err)}
.quiz-exp{margin-top:12px;padding:12px 14px;background:var(--surf);border-radius:6px;font-size:13px;color:var(--dim);display:none}
.quiz-exp.show{display:block}
.lesson-row{display:flex;align-items:center;gap:14px;padding:13px 16px;background:var(--surf);border:1px solid var(--border);border-radius:6px;margin-bottom:8px;cursor:pointer;transition:.15s}
.lesson-row:hover{border-color:var(--accent);transform:translateX(3px)}
.lesson-num{width:28px;height:28px;border-radius:50%;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--dim);flex-shrink:0}
.lesson-num.done{background:var(--accent);color:#fff}
.lesson-info{flex:1;min-width:0}
.lesson-title{font-weight:600;font-size:14px}
.lesson-sub{font-size:12px;color:var(--dim)}
.unit-label{font-size:12px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;padding:14px 0 6px}
.fill-choice{display:block;width:100%;text-align:left;background:var(--surf);border:1px solid var(--border);border-radius:6px;padding:11px 16px;margin-bottom:8px;cursor:pointer;font:inherit;font-size:14px;color:var(--text);transition:.15s}
.fill-choice:hover{border-color:var(--accent)}
.fill-choice.correct{background:rgba(46,158,107,.16);border-color:var(--success);color:var(--success)}
.fill-choice.wrong{background:rgba(207,34,46,.12);border-color:var(--err);color:var(--err);opacity:.7}
.code-block{font-family:var(--mono);font-size:13px;background:var(--surf2);border:1px solid var(--border);border-radius:6px;padding:14px 16px;white-space:pre-wrap;line-height:1.6;color:var(--text)}
.pars-piece{font-family:var(--mono);font-size:13px;background:var(--surf);border:1px solid var(--border);border-radius:6px;padding:9px 12px;cursor:grab;user-select:none}
.pars-piece:hover{border-color:var(--accent)}
.pars-piece.placed{border-color:var(--accent)}
.drill-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.drill-tile{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:.15s;text-align:center}
.drill-tile:hover{border-color:var(--accent);transform:translateY(-2px)}
.drill-tile .icon{font-size:1.5rem;margin-bottom:6px}
.drill-tile .icon .lucide{width:26px;height:26px;color:var(--accent)}
.drill-tile h3{font-size:.9rem;margin:0 0 4px}
.drill-tile p{font-size:11px;margin:0}
.fc-outer{perspective:1000px;height:210px;margin:18px 0;cursor:pointer}
.fc-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:.5s;border-radius:var(--radius)}
.fc-inner.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px;text-align:center;border:1px solid var(--border);background:var(--surf)}
.fc-back{background:var(--surf2);border-color:var(--accent);transform:rotateY(180deg);white-space:pre-line;font-size:.95rem;color:var(--text);line-height:1.7}
.fc-term{font-size:1.2rem;font-weight:700}
.gloss-search{width:100%;background:var(--surf2);border:1px solid var(--border);border-radius:6px;padding:11px 14px;color:var(--text);font:inherit;font-size:14px;outline:none;margin-bottom:14px}
.gloss-search:focus{border-color:var(--accent)}
.gloss-item{border-bottom:1px solid var(--border);padding:13px 0}
.gloss-item:last-child{border:none}
.gloss-term{font-weight:700;font-size:14px;color:var(--accent);margin-bottom:4px}
.gloss-def{font-size:13px;color:var(--dim)}
.kit-links{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
.kit-link{padding:8px 14px;border:1px solid var(--border);border-radius:6px;font-size:13px;color:var(--dim);transition:.15s}
.kit-link:hover{border-color:var(--accent);color:var(--accent)}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent);color:#fff;padding:12px 24px;border-radius:var(--radius);font-weight:600;font-size:14px;z-index:1000;transition:.35s;opacity:0;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.dots{margin-bottom:16px}
.dot{width:22px;height:6px;border-radius:3px;display:inline-block;background:var(--surf2);margin-right:5px}
.dot.on{background:var(--accent)}
@media(max-width:600px){.path-grid,.drill-grid{grid-template-columns:1fr 1fr}.ral-chunk{min-width:120px}}
.signin-btn{background:var(--accent);border:1px solid var(--accent);color:#fff;cursor:pointer;padding:5px 12px;border-radius:6px;font:600 12px var(--font-sans,var(--font,system-ui));white-space:nowrap}
.signin-btn:hover{opacity:.85}
.signin-btn.ghost{background:transparent;color:var(--dim);border-color:var(--line,var(--border))}
.signin-btn.ghost:hover{border-color:var(--accent);color:var(--accent)}
.user-email{font-size:12px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
</style>

<script>
// ─── DATA (filled in by build steps) ───────────────────────────────────────
const DATA = {
LESSONS:[
 {id:101,unit:"Unit 0: How Charts Work",title:"What a Chart Is Really Doing",sub:"Turning numbers into shapes your eye can compare.",core:true,
  story:"Before you pick bar, line, or pie, step back. A chart has exactly one job: take numbers that are hard to compare in a table and turn them into shapes — lengths, positions, slices — that your eye compares instantly. Every good chart decision starts from that idea. Get it, and 'which chart?' stops being guesswork.",
  intro:"A chart <strong>encodes</strong> data: it maps each number onto a visual property like the <em>length</em> of a bar, the <em>position</em> of a dot, or the <em>angle</em> of a slice. Your eye decodes those shapes far faster than it reads a column of digits. So the real question behind every chart is: <em>which visual property makes this comparison easiest to see?</em>",
  ral:[
   {title:"Table vs. chart — same data, different speed",say:"A table stores exact values. A chart makes the comparison jump out. Use a table when people need the precise number; use a chart when they need the pattern.",
    lines:[
     ["Table","exact values — good for looking up one number"],
     ["Chart","encoded shapes — good for comparing many numbers at a glance"],
     ["Encoding","the rule that maps a number to a shape (longer bar = bigger value)"],
     ["The question","every chart answers one comparison — name it before you build"]
    ]},
   {title:"The decode test",say:"A chart works if a stranger can answer your question in under five seconds without reading the numbers. If they have to study it, the encoding is wrong.",
    lines:[
     ["Biggest / smallest","can the eye find the extremes instantly?"],
     ["Trend","is it going up, down, or flat over time?"],
     ["Part of whole","how big is this slice of the total?"]
    ]}
  ],
  notes:"A chart that needs a paragraph to explain it has usually failed. The shape should carry the message; labels and titles only confirm it.",
  viz:{html:`<h3 style="margin-bottom:10px">Same four numbers, two ways</h3>
   <div style="display:flex;gap:24px;flex-wrap:wrap;align-items:flex-end">
    <div style="font-family:var(--mono);font-size:13px;background:var(--surf2);border:1px solid var(--border);border-radius:6px;padding:12px 16px">West&nbsp;&nbsp;412<br>East&nbsp;&nbsp;388<br>South&nbsp;284<br>North&nbsp;195</div>
    <div style="flex:1;min-width:200px;display:flex;flex-direction:column;gap:8px">
     ${[["West",412],["East",388],["South",284],["North",195]].map(r=>`<div style="display:flex;align-items:center;gap:8px;font-size:12px"><span style="width:42px;color:var(--dim)">${r[0]}</span><span style="height:18px;background:var(--accent);border-radius:3px;width:${r[1]/412*100}%"></span></div>`).join('')}
    </div>
   </div>`,caption:"The table holds the exact numbers; the bars let you rank the regions instantly. Bar length is the encoding — longer means more. That swap from digits to length is the whole point of a chart."},
  quiz:{q:"What is the single best way to describe what a chart does?",opts:["It makes data look professional","It encodes numbers as visual shapes the eye can compare quickly","It stores exact values for lookup","It replaces the need for any data table"],ans:1,exp:"A chart maps numbers onto visual properties (length, position, angle) so your eye can compare them at a glance. Tables are still better when someone needs the exact value — charts win when they need the pattern."}
 },
 {id:102,unit:"Unit 0: How Charts Work",title:"The Visual Encodings (and Which the Eye Reads Best)",sub:"Position and length beat color, area, and angle.",core:true,
  story:"Not all encodings are equal. Decades of perception research found a clear ranking: the eye judges <em>position</em> and <em>length</em> accurately, but is sloppy with <em>area</em>, <em>angle</em>, and <em>color shade</em>. That ranking is why a bar chart almost always beats a pie chart — and it's the reason behind half the chart choices you'll ever make.",
  intro:"An encoding is the visual channel that carries a number. The common ones, from most to least accurately read: <strong>position</strong> (where a dot sits on an axis) → <strong>length</strong> (how long a bar is) → <strong>angle/slope</strong> → <strong>area</strong> (size of a circle or tile) → <strong>color shade</strong>. Pick the highest channel your data allows, and the chart almost designs itself.",
  ral:[
   {title:"The accuracy ranking",say:"Position and length are the precise channels — use them for the comparison that matters most. Color and area are for rough, secondary signals, not exact values.",
    lines:[
     ["Position","most accurate — scatter dots, the top of a bar"],
     ["Length","very accurate — bar charts live here"],
     ["Angle / slope","moderate — line-chart direction, pie slices"],
     ["Area","weak — bubble size, treemap tiles (rough magnitude only)"],
     ["Color shade","weakest for value — great for category, poor for amount"]
    ]},
   {title:"What this means in practice",say:"Put your most important number on a position or length channel. Save color and size for a second, less-precise layer.",
    lines:[
     ["Exact comparison","→ bar (length) or scatter (position)"],
     ["Rough magnitude","→ bubble or treemap (area) is acceptable"],
     ["Category label","→ color does this job well"]
    ]}
  ],
  notes:"This is why pie charts struggle: people judge angle and area poorly, so slices of similar size are nearly impossible to rank. A bar chart of the same data uses length — and the ranking becomes obvious.",
  viz:{html:`<h3 style="margin-bottom:10px">Which is bigger: 27% or 24%?</h3>
   <div style="display:flex;gap:24px;flex-wrap:wrap;align-items:center">
    <div style="text-align:center"><svg width="120" height="120" viewBox="0 0 32 32" style="transform:rotate(-90deg)">
      <circle r="16" cx="16" cy="16" fill="var(--surf2)"/>
      <circle r="8" cx="16" cy="16" fill="transparent" stroke="var(--accent)" stroke-width="16" stroke-dasharray="13.6 36.7"/>
      <circle r="8" cx="16" cy="16" fill="transparent" stroke="var(--accent2)" stroke-width="16" stroke-dasharray="12 38.3" stroke-dashoffset="-13.6"/>
     </svg><div style="font-size:12px;color:var(--dim);margin-top:4px">pie — hard to tell</div></div>
    <div style="flex:1;min-width:180px;display:flex;flex-direction:column;gap:8px">
     ${[["A · 27%",27],["B · 24%",24]].map(r=>`<div style="display:flex;align-items:center;gap:8px;font-size:12px"><span style="width:60px;color:var(--dim)">${r[0]}</span><span style="height:18px;background:var(--accent);border-radius:3px;width:${r[1]/27*100}%"></span></div>`).join('')}
     <div style="font-size:12px;color:var(--dim)">bars — obvious</div></div>
   </div>`,caption:"On the pie, the 27% and 24% slices look identical — angle and area are weak channels. As bars, length makes the winner instant. Same numbers, very different readability."},
  quiz:{q:"Why does a bar chart usually beat a pie chart for comparing categories?",opts:["Bars use color, which the eye reads best","Bars use length/position, which the eye judges far more accurately than angle or area","Pie charts can't show more than two categories","Bar charts take less space"],ans:1,exp:"The eye reads position and length precisely but judges angle and area poorly. Bars encode value as length, so ranking is easy. Pie slices encode value as angle/area, so similar slices are hard to tell apart."}
 },
 {id:103,unit:"Unit 0: How Charts Work",title:"Reading Any Axis",sub:"Scale, zero baseline, and what a truncated axis hides.",core:true,
  story:"The axis is where charts quietly lie. Before you trust any chart — yours or someone else's — read the axis. Does it start at zero? Is the scale linear? Are the intervals even? A chart with a beautiful trend and a misleading axis is worse than no chart, because it looks authoritative while being wrong.",
  intro:"An axis defines the <strong>scale</strong> that turns positions into values. Two things to check every time: the <strong>baseline</strong> (bar charts must start at zero, or length lies) and the <strong>interval spacing</strong> (even steps, no skipped ranges). Line charts may start above zero to show detail — but bars never should.",
  ral:[
   {title:"The axis checklist",say:"Read the axis before the shape. A truncated baseline can turn a 3% change into what looks like a doubling.",
    lines:[
     ["Baseline","bars start at zero — always; line charts may start higher"],
     ["Linear vs log","even steps, or a ratio scale? log compresses big ranges"],
     ["Even intervals","gaps in the scale exaggerate or hide change"],
     ["Dual axes","two scales on one chart — easy to mislead, read both"]
    ]},
   {title:"Bar vs. line on the baseline rule",say:"A bar's message is its length, so cutting the baseline distorts it. A line's message is its slope, so a non-zero start is acceptable when you label it.",
    lines:[
     ["Bar chart","length = value → must start at zero"],
     ["Line chart","slope = change → may zoom in, but label it clearly"],
     ["Rule of thumb","if cutting the axis changes the story, you're misleading"]
    ]}
  ],
  notes:"Truncating a bar chart's y-axis is the single most common way charts mislead — accidentally or on purpose. A 5% difference can be drawn to look like 5x. When you see a dramatic bar chart, check the baseline first.",
  viz:{html:`<h3 style="margin-bottom:10px">Same data, two baselines</h3>
   <div style="display:flex;gap:24px;flex-wrap:wrap;align-items:flex-end">
    <div style="text-align:center"><div style="display:flex;align-items:flex-end;gap:10px;height:120px">
      <div style="width:34px;background:var(--accent);height:120px;border-radius:3px 3px 0 0"></div>
      <div style="width:34px;background:var(--accent2);height:114px;border-radius:3px 3px 0 0"></div>
     </div><div style="font-size:12px;color:var(--err);margin-top:4px">baseline 800 — looks huge</div></div>
    <div style="text-align:center"><div style="display:flex;align-items:flex-end;gap:10px;height:120px">
      <div style="width:34px;background:var(--accent);height:104px;border-radius:3px 3px 0 0"></div>
      <div style="width:34px;background:var(--accent2);height:99px;border-radius:3px 3px 0 0"></div>
     </div><div style="font-size:12px;color:var(--success);margin-top:4px">baseline 0 — true gap</div></div>
   </div>`,caption:"Both pairs are 860 vs 820 — about a 5% difference. Cut the baseline to 800 (left) and it looks like one bar towers over the other. Start at zero (right) and you see the small, honest gap."},
  quiz:{q:"You see a bar chart where one bar looks three times taller than another, but the values are 102 and 98. What should you check first?",opts:["The color palette","Whether the y-axis starts at zero","The chart title","Whether it's a 3D chart"],ans:1,exp:"A truncated baseline is the usual culprit. If the axis starts at, say, 95 instead of 0, a tiny 4-unit gap gets stretched into a dramatic height difference. Bars must start at zero because their message is length."}
 },
 {id:1,unit:"Unit 1: The Charts You'll Use Most",title:"The Bar Chart",sub:"Comparing categories — the workhorse of BI.",core:true,
  story:"If you learn one chart deeply, make it the bar chart. It's the most-used chart in business analytics for a reason: it encodes value as length, the channel the eye reads most accurately, so comparing categories is effortless. Master when to use it, how to sort it, and the zero-baseline rule, and you've covered most of your reporting.",
  intro:"A bar chart compares a numeric value across <strong>categories</strong> — revenue by region, sales by product, tickets by team. One axis lists the categories; the other is a value axis that <strong>must start at zero</strong>. Sorting bars by value (not alphabetically) is what turns a decent bar chart into a great one.",
  ral:[
   {title:"When to reach for a bar chart",say:"Use a bar chart whenever you're comparing a number across a handful of named categories. It's the default — only switch away if you have a specific reason.",
    lines:[
     ["Best for","comparing a value across categories (regions, products, teams)"],
     ["Value axis","must start at zero — length is the message"],
     ["Sort by value","rank descending so the eye reads the order instantly"],
     ["Horizontal bars","use when category names are long — labels stay readable"]
    ]},
   {title:"Bar chart variations",say:"Grouped bars compare a few series side by side; stacked bars show parts of a whole — but only the bottom segment is easy to compare.",
    lines:[
     ["Grouped (clustered)","two-plus series per category, side by side"],
     ["Stacked","segments sum to a total — bottom segment reads best"],
     ["100% stacked","every bar fills to 100% — compares composition, not totals"]
    ]}
  ],
  notes:"Don't sort bars alphabetically when the question is 'which is biggest?' — alphabetical order hides the ranking. And never truncate the value axis: bars must start at zero.",
  viz:{html:`<h3 style="margin-bottom:10px">Revenue by region (sorted)</h3>
   <div style="display:flex;flex-direction:column;gap:9px">
    ${[["West",412],["East",388],["South",284],["North",195]].map(r=>`<div style="display:flex;align-items:center;gap:10px;font-size:13px"><span style="width:46px;color:var(--dim)">${r[0]}</span><span style="height:22px;background:var(--accent);border-radius:3px;width:${r[1]/412*100}%"></span><span style="color:var(--dim);font-size:12px">$${r[1]}</span></div>`).join('')}
   </div>`,caption:"Categories on one axis, value on the other, sorted from largest to smallest. The eye reads bar length precisely, so the ranking is obvious. This is the chart you'll build most often."},
  quiz:{q:"You want to compare total revenue across 6 product categories. Which chart and setup is best?",opts:["A pie chart with all 6 slices","A bar chart sorted descending by revenue, axis starting at zero","A line chart connecting the 6 categories","A 3D bar chart for visual impact"],ans:1,exp:"Six categories compared by value is the textbook bar-chart case. Sort descending so the ranking is instant, and keep the value axis at zero so the lengths are honest. A line implies a trend that categories don't have; a pie makes 6 slices hard to rank."}
 },
 {id:2,unit:"Unit 1: The Charts You'll Use Most",title:"The Line Chart",sub:"Showing change over time — trends and direction.",core:true,
  story:"When the question has the word 'over time' in it — revenue over months, signups over weeks — the line chart is the answer. It encodes change as slope, so the eye follows the trend naturally. The key rule: lines are for continuous, ordered data like dates. Use one for categories and you imply a trend that isn't there.",
  intro:"A line chart plots a value against a <strong>continuous, ordered axis</strong> — almost always time. Points are connected, so the <strong>slope</strong> between them shows the rate of change. Multiple lines compare a few series over the same period. Unlike bars, a line chart's axis doesn't have to start at zero — its message is the shape of the trend, not absolute height.",
  ral:[
   {title:"When to reach for a line chart",say:"Use a line chart for a value moving over time. The connection between points is a promise that the x-axis is continuous and ordered.",
    lines:[
     ["Best for","a value changing over a continuous axis (usually time)"],
     ["Slope","the message — rising, falling, steep, flat"],
     ["Multiple lines","compare 2–4 series; more becomes spaghetti"],
     ["Zero baseline","optional — zoom in to show detail, but label it"]
    ]},
   {title:"Line chart pitfalls",say:"Never connect categories with a line — it falsely implies they flow into each other. And keep the number of lines small enough to follow.",
    lines:[
     ["Categories on x","→ use bars, not a line (no continuous order)"],
     ["Too many lines","→ highlight one, grey the rest, or use small multiples"],
     ["Uneven time gaps","→ space the axis by real dates, not by row"]
    ]}
  ],
  notes:"A line chart connecting discrete categories (like 'West, East, South') is a classic mistake — it implies a continuous progression between regions that doesn't exist. Lines are for things with a natural order: dates, ages, sequential steps.",
  viz:{html:`<h3 style="margin-bottom:10px">Monthly revenue trend</h3>
   <svg viewBox="0 0 320 120" width="100%" height="130" style="max-width:380px">
    <polyline fill="none" stroke="var(--accent)" stroke-width="2.5" points="10,90 60,72 110,78 160,50 210,40 260,26 310,18"/>
    ${[[10,90],[60,72],[110,78],[160,50],[210,40],[260,26],[310,18]].map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="var(--accent)"/>`).join('')}
    <line x1="10" y1="105" x2="310" y2="105" stroke="var(--border)"/>
   </svg>
   <div style="font-size:12px;color:var(--dim)">Jan → Jul</div>`,caption:"Time runs along the x-axis; the connected line makes the upward trend and its dips easy to follow. Slope is the message — you instantly see growth accelerating in the second half."},
  quiz:{q:"Which question is the line chart the RIGHT choice for?",opts:["How does revenue compare across our 5 regions?","How has monthly revenue changed over the past year?","What share of total sales is each product?","Which sales rep had the most orders?"],ans:1,exp:"'Changed over the past year' is continuous, ordered, time-based data — exactly what a line chart shows. The other three compare discrete categories or parts of a whole, which call for bars or a part-to-whole chart."}
 },
 {id:3,unit:"Unit 1: The Charts You'll Use Most",title:"The Scatter Plot",sub:"Relationships between two numeric variables.",
  story:"When you want to know whether two numbers move together — does more ad spend bring more sales? do bigger orders take longer to ship? — the scatter plot is the tool. It uses position on two axes, the most accurate encoding there is, so correlations and outliers pop out immediately.",
  intro:"A scatter plot puts one numeric variable on the x-axis and another on the y-axis, then draws a dot for each item. The <strong>pattern of the cloud</strong> reveals the relationship: an upward cloud means positive correlation, a downward cloud means negative, a shapeless blob means no relationship. Dots far from the crowd are <strong>outliers</strong> worth investigating.",
  ral:[
   {title:"Reading a scatter plot",say:"Look at the shape of the cloud first, then the outliers. The tighter the cloud hugs a line, the stronger the relationship.",
    lines:[
     ["Two numeric axes","x and y are both measures — e.g. spend vs. revenue"],
     ["Upward cloud","positive relationship — they rise together"],
     ["Downward cloud","negative relationship — one up, the other down"],
     ["Outliers","lone dots far from the pack — often the interesting story"]
    ]},
   {title:"Correlation is not causation",say:"A scatter shows that two things move together. It never proves one caused the other — a third factor often drives both.",
    lines:[
     ["Correlation","the variables move together — what a scatter shows"],
     ["Causation","one variable makes the other change — a scatter can't prove this"],
     ["Trend line","optional overlay summarizing the direction and strength"]
    ]}
  ],
  notes:"A scatter plot showing correlation is not proof of causation. Ice cream sales and drowning deaths correlate — because both rise in summer, not because one causes the other. Always ask what else could explain the pattern.",
  viz:{html:`<h3 style="margin-bottom:10px">Ad spend vs. revenue</h3>
   <svg viewBox="0 0 300 140" width="100%" height="150" style="max-width:360px">
    <line x1="20" y1="120" x2="290" y2="120" stroke="var(--border)"/>
    <line x1="20" y1="10" x2="20" y2="120" stroke="var(--border)"/>
    ${[[50,100],[80,92],[95,80],[120,84],[140,66],[165,60],[185,50],[210,44],[240,30],[265,22],[150,40]].map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="4" fill="var(--accent)" opacity="0.8"/>`).join('')}
   </svg>
   <div style="font-size:12px;color:var(--dim)">x: ad spend → &nbsp; y: revenue ↑</div>`,caption:"Each dot is one campaign, placed by its ad spend (x) and revenue (y). The upward-trending cloud signals a positive relationship — more spend tends to go with more revenue — but it doesn't prove spend caused it."},
  quiz:{q:"Your scatter plot of hours-studied vs. test-score shows a clear upward cloud. What can you correctly conclude?",opts:["Studying more causes higher scores","The two variables are positively correlated — they tend to rise together","There is no relationship between them","Hours studied is an outlier"],ans:1,exp:"An upward cloud shows positive correlation — the variables move together. It does not prove causation: motivated students might both study more AND score higher for other reasons. A scatter reveals relationship, never cause."}
 },
 {id:4,unit:"Unit 1: The Charts You'll Use Most",title:"Pie & Donut Charts",sub:"Part-to-whole — and why to use them sparingly.",
  story:"Pie charts get a bad reputation, and mostly they earn it. But they're not useless: for showing one or two slices as a fraction of a whole, a pie reads fine. The skill is knowing the narrow case where a pie works — and reaching for a bar chart everywhere else.",
  intro:"A pie (or donut) chart shows <strong>parts of a whole</strong> — each slice is a category's share of 100%. The catch: it encodes value as <strong>angle and area</strong>, the channels the eye reads worst. So pies only work when there are very few slices and the message is roughly 'this part is about half / a quarter,' not a precise ranking.",
  ral:[
   {title:"The narrow case where a pie works",say:"Two or three slices, where the story is one clear majority. Beyond that, a sorted bar chart always reads better.",
    lines:[
     ["Best for","2–3 categories that sum to a meaningful whole"],
     ["The message","'one slice dominates' — not exact comparison"],
     ["Donut","a pie with a hole — same rules, room for a total in the center"],
     ["Hard limit","more than ~4 slices → switch to a bar chart"]
    ]},
   {title:"Why bars usually win",say:"Similar-sized slices are nearly impossible to rank by eye. The same shares as sorted bars are instantly clear.",
    lines:[
     ["Many slices","→ unreadable; bars sorted by value instead"],
     ["Comparing two pies","→ very hard; use grouped or 100% stacked bars"],
     ["Need exact %","→ label every slice, or just use a bar chart"]
    ]}
  ],
  notes:"Never use a pie chart with more than about four slices, and never compare two pies side by side — the eye can't track changing angles across them. When in doubt, a 100% stacked bar shows composition more clearly.",
  viz:{html:`<h3 style="margin-bottom:10px">When a pie is fine: one clear majority</h3>
   <div style="display:flex;gap:24px;align-items:center;flex-wrap:wrap">
    <svg width="120" height="120" viewBox="0 0 32 32" style="transform:rotate(-90deg)">
     <circle r="16" cx="16" cy="16" fill="var(--accent2)"/>
     <circle r="8" cx="16" cy="16" fill="transparent" stroke="var(--accent)" stroke-width="16" stroke-dasharray="34 16.3"/>
    </svg>
    <div style="font-size:13px;color:var(--dim)"><span style="color:var(--accent);font-weight:700">68% Subscriptions</span><br><span style="color:var(--accent2);font-weight:700">32% One-time</span><br><span style="font-size:12px">Two slices, one obvious majority — a pie reads fine here.</span></div>
   </div>`,caption:"Two slices with a clear majority is the one case a pie handles well — you instantly see subscriptions dominate. Add a third or fourth similar slice and that clarity collapses; switch to bars."},
  quiz:{q:"When is a pie chart an acceptable choice?",opts:["Whenever you have categorical data","For 2–3 slices where one clearly dominates the whole","To compare values across many products","To show a trend over 12 months"],ans:1,exp:"Pies only work for a few parts of a whole where the message is a rough majority — angle and area are weak channels. Many slices, precise ranking, or trends over time all call for bars or lines instead."}
 },
 {id:5,unit:"Unit 1: The Charts You'll Use Most",title:"Treemaps & Heatmaps",sub:"Showing magnitude across many categories at once.",
  story:"Sometimes you have too many categories for bars and the value matters more than precision — say, revenue across 40 products, or activity by hour and day. Treemaps and heatmaps trade exactness for density: they pack many values into a compact space using area and color, so you see the big picture and the hot spots fast.",
  intro:"A <strong>treemap</strong> shows part-to-whole for many categories as nested rectangles — bigger tile = bigger value. A <strong>heatmap</strong> arranges values in a grid and encodes each cell's value as color intensity. Both use weaker channels (area, color), so they're for spotting <em>patterns and standouts</em>, not reading exact numbers.",
  ral:[
   {title:"Treemap — area for many parts",say:"Use a treemap when a bar chart would have too many bars and you mainly need to see which categories are biggest.",
    lines:[
     ["Encoding","tile area = value; nesting = hierarchy (category → product)"],
     ["Best for","many categories where rough size and grouping matter"],
     ["Reads","biggest tiles instantly; similar tiles are hard to rank"]
    ]},
   {title:"Heatmap — color in a grid",say:"Use a heatmap to find hot and cold spots across two dimensions, like day-of-week by hour-of-day.",
    lines:[
     ["Encoding","cell color intensity = value; two axes = two categories"],
     ["Best for","spotting patterns across a grid (busy hours, weak regions)"],
     ["Reads","clusters and extremes pop; exact values need labels"]
    ]}
  ],
  notes:"Treemaps and heatmaps look impressive but sacrifice precision — area and color can't be read exactly. Use them to surface 'where should I look?', then a bar chart or table for the precise follow-up.",
  viz:{html:`<h3 style="margin-bottom:10px">Treemap: revenue by product</h3>
   <div style="display:flex;gap:4px;height:120px">
    <div style="flex:5;background:var(--accent);border-radius:4px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px">Latte</div>
    <div style="flex:3;display:flex;flex-direction:column;gap:4px">
     <div style="flex:2;background:var(--accent2);border-radius:4px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px">Cold Brew</div>
     <div style="flex:1;background:var(--surf2);border:1px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--dim)">Mocha</div>
    </div>
    <div style="flex:2;background:var(--surf2);border:1px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--dim)">Espresso</div>
   </div>`,caption:"Each tile's area is its revenue, so the biggest sellers fill the most space — Latte dominates at a glance. Great for many products at once, but you can't read exact dollars from tile size alone."},
  quiz:{q:"What are treemaps and heatmaps best used for?",opts:["Reading exact values precisely","Spotting which categories or cells stand out across many at once","Showing a trend over time","Comparing exactly two numbers"],ans:1,exp:"Both pack many values into a compact space using area or color — weak channels for precision but strong for pattern-spotting. Use them to find the big tiles or hot cells, then follow up with a bar or table for exact figures."}
 },
 {id:6,unit:"Unit 1: The Charts You'll Use Most",title:"The Waterfall Chart",sub:"How a starting value becomes an ending value.",
  story:"Finance and ops love one chart above all: the waterfall. It answers 'how did we get from last quarter's number to this quarter's?' by showing each gain and loss as a floating step. When someone asks you to 'bridge' two totals — start, plus this, minus that, equals end — the waterfall is the answer.",
  intro:"A waterfall chart starts at an initial total, then shows a series of <strong>increases and decreases</strong> as floating bars, ending at a final total. It makes the <strong>contribution of each step</strong> visible — which factors pushed the number up, which dragged it down. It's the standard 'bridge' chart for explaining a change.",
  ral:[
   {title:"Anatomy of a waterfall",say:"Anchor bars sit on the baseline at the start and end; the floating bars in between show what added to or subtracted from the total.",
    lines:[
     ["Start anchor","the opening total, on the baseline"],
     ["Floating bars","each up (gain) or down (loss) step, color-coded"],
     ["End anchor","the closing total — start plus all the steps"],
     ["Color","one color for increases, another for decreases"]
    ]},
   {title:"When to use it",say:"Reach for a waterfall whenever the question is 'what drove the change between these two numbers?'",
    lines:[
     ["Best for","bridging a start total to an end total via gains/losses"],
     ["Common uses","revenue bridge, profit drivers, headcount change"],
     ["Not for","simple category comparison — that's a bar chart"]
    ]}
  ],
  notes:"A waterfall is for explaining a change between two totals, not for comparing independent categories. If your bars don't 'flow' from a start to an end value, you want a regular bar chart.",
  viz:{html:`<h3 style="margin-bottom:10px">Revenue bridge: Q1 → Q2</h3>
   <div style="display:flex;align-items:flex-end;gap:8px;height:130px;font-size:10px;text-align:center;color:var(--dim)">
    <div style="display:flex;flex-direction:column;justify-content:flex-end;height:100%"><div style="width:34px;background:var(--dim);height:80px;border-radius:3px"></div>Q1<br>400</div>
    <div style="display:flex;flex-direction:column;justify-content:flex-end;height:100%"><div style="width:34px;background:var(--success);height:30px;border-radius:3px;margin-bottom:80px"></div>New<br>+60</div>
    <div style="display:flex;flex-direction:column;justify-content:flex-end;height:100%"><div style="width:34px;background:var(--err);height:20px;border-radius:3px;margin-bottom:90px"></div>Churn<br>−25</div>
    <div style="display:flex;flex-direction:column;justify-content:flex-end;height:100%"><div style="width:34px;background:var(--accent);height:95px;border-radius:3px"></div>Q2<br>435</div>
   </div>`,caption:"Start at Q1 (400), add new revenue (+60, green), subtract churn (−25, red), land at Q2 (435). The floating steps show exactly what drove the change — far clearer than two side-by-side totals."},
  quiz:{q:"A stakeholder asks: 'Why did profit drop from $2M to $1.6M — what drove it?' Which chart answers this best?",opts:["A pie chart of expense categories","A waterfall chart bridging $2M to $1.6M with each gain and loss","A scatter plot of profit vs. time","A single bar showing $1.6M"],ans:1,exp:"'What drove the change between two totals?' is the exact waterfall use case. It shows each factor as a floating step from the $2M start to the $1.6M end, so you see which items added and which subtracted."}
 },
 {id:7,unit:"Unit 2: How Charts Mislead",title:"How Charts Lie",sub:"The tricks that distort — spot them and avoid them.",core:true,
  story:"Half of being chart-literate is defensive: recognizing when a chart is misleading you, whether by accident or design. The same handful of tricks show up again and again — truncated axes, inverted scales, cherry-picked ranges, 3D distortion. Learn to spot them and you'll never be fooled by a slick-looking chart again — and you won't accidentally make one.",
  intro:"Most misleading charts use one of a few moves: a <strong>truncated axis</strong> that exaggerates small differences, a <strong>cherry-picked date range</strong> that hides the real trend, a <strong>dual axis</strong> that fakes a correlation, or <strong>3D / area effects</strong> that distort the encoding. None require lying about the numbers — they just distort how the eye reads them.",
  ral:[
   {title:"The common distortion tricks",say:"Each of these keeps the data honest but breaks the encoding, so the shape tells a stronger story than the numbers support.",
    lines:[
     ["Truncated axis","baseline above zero → small gaps look huge"],
     ["Cherry-picked range","zoom to the dates that flatter the story"],
     ["Dual-axis fakery","two scales lined up to imply a correlation"],
     ["3D / area","perspective and area inflate some values over others"],
     ["Inverted axis","flipping the scale to reverse the apparent trend"]
    ]},
   {title:"Your defense",say:"Before trusting a chart, run the same checks every time — most distortions fail the first one.",
    lines:[
     ["Check the baseline","does the value axis start at zero? (bars must)"],
     ["Check the range","is the time window suspiciously narrow?"],
     ["Check both axes","on a dual-axis chart, read each scale"],
     ["Distrust 3D","decorative depth almost always distorts"]
    ]}
  ],
  notes:"The most dangerous misleading charts aren't fake data — they're real data with a distorted encoding. That's why they survive fact-checking. Always read the axes before you read the shape.",
  viz:{html:`<h3 style="margin-bottom:10px">Cherry-picking the range</h3>
   <div style="display:flex;gap:20px;flex-wrap:wrap">
    <div style="flex:1;min-width:150px"><svg viewBox="0 0 160 90" width="100%" height="90"><polyline fill="none" stroke="var(--err)" stroke-width="2.5" points="10,30 50,20 90,38 130,15"/></svg><div style="font-size:11px;color:var(--err)">"Sales are soaring!" (4 cherry-picked weeks)</div></div>
    <div style="flex:1;min-width:150px"><svg viewBox="0 0 160 90" width="100%" height="90"><polyline fill="none" stroke="var(--dim)" stroke-width="2.5" points="10,20 35,25 60,18 85,55 110,30 135,38 150,15"/></svg><div style="font-size:11px;color:var(--dim)">Full year: actually flat and volatile</div></div>
   </div>`,caption:"The left chart shows four hand-picked weeks and screams growth. The right shows the full year of the same data — flat and choppy. Same numbers; the cherry-picked range manufactures a trend that isn't real."},
  quiz:{q:"A chart shows real, accurate numbers but is still misleading. What is the MOST likely reason?",opts:["The data must be fake after all","The encoding is distorted — e.g. a truncated axis or cherry-picked range","Charts can't be misleading if the numbers are real","The colors are wrong"],ans:1,exp:"The most common misleading charts use accurate data with a distorted encoding: a baseline above zero, a cherry-picked window, a manipulated dual axis, or 3D effects. The numbers check out, but the shape tells a stronger story than the data supports."}
 },
 {id:8,unit:"Unit 2: How Charts Mislead",title:"Misleading Comparisons",sub:"Apples-to-oranges, missing context, and bad baselines.",
  story:"Beyond axis tricks, charts mislead through unfair comparisons: a number with no baseline, parts that don't sum to the whole, or two groups of wildly different size shown as equals. These are subtler than a truncated axis because the chart itself looks fine — the problem is what's being compared.",
  intro:"A comparison is only fair when the things compared are truly comparable. Watch for <strong>missing context</strong> (a number with nothing to compare against), <strong>unequal bases</strong> (comparing raw counts from groups of very different size), and <strong>part-to-whole that doesn't add up</strong>. The fix is usually to normalize — use rates and percentages, not raw counts.",
  ral:[
   {title:"Unfair-comparison red flags",say:"When a comparison feels off, check whether the two things share the same base and the same context.",
    lines:[
     ["No baseline","a single number with nothing to compare to is just trivia"],
     ["Unequal bases","raw counts from a big group vs. a small group mislead"],
     ["Rates vs. counts","compare per-capita / per-100 when group sizes differ"],
     ["Doesn't sum","'parts' that exceed 100% break the part-to-whole idea"]
    ]},
   {title:"How to make it fair",say:"Normalize so the comparison is apples to apples, and always give a number something to be measured against.",
    lines:[
     ["Add context","vs. last year, vs. target, vs. the average"],
     ["Normalize","convert raw counts to rates or percentages"],
     ["Match the base","compare like-sized groups, or per-unit figures"]
    ]}
  ],
  notes:"'Region A had 500 complaints, Region B had 100' tells you nothing if Region A has ten times the customers. Per-customer, Region A may be doing far better. Always ask: comparison to what, and out of how many?",
  viz:{html:`<h3 style="margin-bottom:10px">Raw counts vs. rate</h3>
   <div style="display:flex;gap:20px;flex-wrap:wrap">
    <div style="flex:1;min-width:150px"><div style="font-size:11px;color:var(--dim);margin-bottom:6px">Complaints (raw)</div>
     <div style="display:flex;align-items:flex-end;gap:12px;height:80px"><div style="width:34px;background:var(--err);height:80px;border-radius:3px"></div><div style="width:34px;background:var(--accent);height:24px;border-radius:3px"></div></div>
     <div style="font-size:11px;color:var(--err)">A looks far worse</div></div>
    <div style="flex:1;min-width:150px"><div style="font-size:11px;color:var(--dim);margin-bottom:6px">Per 1,000 customers</div>
     <div style="display:flex;align-items:flex-end;gap:12px;height:80px"><div style="width:34px;background:var(--accent);height:30px;border-radius:3px"></div><div style="width:34px;background:var(--err);height:60px;border-radius:3px"></div></div>
     <div style="font-size:11px;color:var(--success)">A is actually better</div></div>
   </div>`,caption:"By raw count, Region A (left bars) looks like the problem. But A serves 10x the customers — normalized per 1,000, A's complaint rate is half of B's. Same data; the fair comparison flips the conclusion."},
  quiz:{q:"Region A reports 500 complaints, Region B reports 100. Why might concluding 'A is worse' be a misleading comparison?",opts:["500 is not really bigger than 100","The groups may be different sizes — compare complaints per customer, not raw counts","Complaints can't be charted","Region B's number is too small to matter"],ans:1,exp:"Raw counts mislead when the bases differ. If A has 10x the customers, its per-customer complaint rate could be far lower than B's. Normalize to a rate (per 1,000 customers) to make the comparison fair."}
 },
 {id:9,unit:"Unit 3: Choosing & Communicating",title:"Choosing the Right Chart",sub:"A simple decision path from question to chart.",core:true,
  story:"Everything so far builds to this: given a question and some data, which chart? You don't need to memorize 50 chart types. You need one decision path that starts from the <em>question</em> — comparison, trend, relationship, part-to-whole, or distribution — and lands on the right answer almost every time.",
  intro:"Pick the chart from the <strong>question</strong>, not the data. Five question-shapes cover almost everything: <strong>comparison</strong> (→ bar), <strong>trend over time</strong> (→ line), <strong>relationship</strong> (→ scatter), <strong>part-to-whole</strong> (→ bar or limited pie), and <strong>distribution</strong> (→ histogram/box). Match the shape of your question to the chart and you're right far more often than not.",
  ral:[
   {title:"The question → chart map",say:"Say your question out loud, find its shape in this list, and the chart follows.",
    lines:[
     ["'Compare across categories'","→ bar chart, sorted by value"],
     ["'How has it changed over time?'","→ line chart"],
     ["'Do these two numbers relate?'","→ scatter plot"],
     ["'What share of the whole?'","→ bar (or pie if 2–3 slices)"],
     ["'How is it spread out?'","→ histogram or box plot"]
    ]},
   {title:"Tie-breakers",say:"When two charts could work, default to the one on the stronger encoding — usually the bar.",
    lines:[
     ["Many categories","→ bar (or treemap if you only need rough size)"],
     ["Few, clear parts","→ pie is acceptable; otherwise bar"],
     ["When unsure","→ a sorted bar chart is the safe, honest default"]
    ]}
  ],
  notes:"Don't start from 'I want a cool chart' and look for data to fit it. Start from the question. A boring, correct bar chart beats an impressive chart that answers the wrong question.",
  viz:{html:`<h3 style="margin-bottom:10px">Question → chart</h3>
   <div style="display:flex;flex-direction:column;gap:6px;font-size:12.5px">
    ${[["Compare categories","Bar"],["Change over time","Line"],["Relationship between 2 numbers","Scatter"],["Part of a whole","Bar / Pie (≤3)"],["Distribution / spread","Histogram / Box"]].map(r=>`<div style="display:flex;gap:10px;align-items:center"><span style="flex:1;background:var(--surf2);border:1px solid var(--border);border-radius:6px;padding:7px 12px">${r[0]}</span><span style="color:var(--accent)">→</span><span style="width:130px;font-weight:600;color:var(--accent)">${r[1]}</span></div>`).join('')}
   </div>`,caption:"The whole decision in one table: name the shape of your question on the left, read the chart on the right. Five patterns cover the vast majority of real analyst work."},
  quiz:{q:"Your stakeholder asks: 'Is there a relationship between customer age and order size?' Which chart fits?",opts:["Bar chart","Line chart","Scatter plot","Pie chart"],ans:2,exp:"'Is there a relationship between two numbers?' is the scatter-plot question. Age on one axis, order size on the other; the shape of the cloud reveals whether they move together. Bars compare categories, lines show time trends, pies show parts of a whole."}
 },
 {id:10,unit:"Unit 3: Choosing & Communicating",title:"Explaining a Chart to Stakeholders",sub:"From 'here's a chart' to 'here's what it means.'",core:true,
  story:"The last skill is the one that gets analysts promoted: turning a chart into a sentence a busy executive remembers. A chart on a slide is not insight — your explanation is. Lead with the takeaway, point to the evidence, and end with the 'so what.' Do this well and people trust your charts because you've already told them what they mean.",
  intro:"A great chart explanation has a simple structure: <strong>takeaway first</strong> (the one sentence you want remembered), then <strong>the evidence</strong> (point to the specific mark on the chart), then the <strong>'so what'</strong> (the decision or action it implies). Titles should state the insight, not just label the axes — 'West revenue fell 18% in Q3,' not 'Revenue by Region.'",
  ral:[
   {title:"The explain-a-chart structure",say:"Say the conclusion before the detail. Busy people decide whether to keep listening in the first sentence.",
    lines:[
     ["Takeaway first","one sentence: the single thing to remember"],
     ["Point to evidence","'see this bar / this dip' — tie words to a mark"],
     ["The 'so what'","the decision or action the chart supports"],
     ["Insight titles","title states the finding, not just the axes"]
    ]},
   {title:"Habits that build trust",say:"Make the chart easy to believe: label clearly, show context, and don't make people hunt for the point.",
    lines:[
     ["Annotate the point","call out the key mark directly on the chart"],
     ["Give context","vs. last year, vs. target — never a number alone"],
     ["One chart, one message","if it makes two points, split it in two"]
    ]}
  ],
  notes:"'Revenue by Region' is a label, not a finding. 'West is our only shrinking region' is what the stakeholder remembers. Spend your title on the insight — it's the most-read text on the slide.",
  viz:{html:`<h3 style="margin-bottom:10px">Label vs. insight title</h3>
   <div style="display:flex;flex-direction:column;gap:10px">
    <div style="background:var(--surf2);border:1px solid var(--border);border-radius:6px;padding:10px 14px"><span style="color:var(--dim);font-size:11px">WEAK TITLE</span><br><span style="font-weight:700">Revenue by Region</span><br><span style="font-size:12px;color:var(--dim)">…makes the reader do the work</span></div>
    <div style="background:var(--surf2);border:1px solid var(--accent);border-radius:6px;padding:10px 14px"><span style="color:var(--accent);font-size:11px">STRONG TITLE</span><br><span style="font-weight:700">West is our only region with falling revenue</span><br><span style="font-size:12px;color:var(--dim)">…hands the reader the takeaway</span></div>
   </div>`,caption:"Same chart, two titles. The weak one labels the axes and leaves the thinking to the reader. The strong one states the finding — so the message lands even if they only read the title."},
  quiz:{q:"What's the best way to title and explain a chart for a stakeholder?",opts:["Label the axes neutrally and let them draw their own conclusion","Lead with the takeaway: state the insight in the title and say the conclusion first","Show the chart with no title to avoid bias","Include every number so nothing is left out"],ans:1,exp:"Lead with the takeaway. An insight title ('West is our only shrinking region') plus a conclusion-first explanation means the message lands even for a skimming reader. Neutral axis labels make people do the analytical work you were hired to do."}
 }
],

WRONG:[
 {id:1,q:"You want to show revenue for 6 regions so a reader can rank them. Which approach is best — and why?",opts:["A pie chart, because it shows parts of a whole","A sorted bar chart, because length is read accurately and sorting reveals the ranking","A line chart, because it looks modern","A 3D bar chart, for visual impact"],ans:1,exp:"Ranking categories is the bar-chart job: length is a precise channel and sorting puts the order right in front of the reader. A pie hides ranking in angles; a line implies a trend regions don't have; 3D distorts."},
 {id:2,q:"A colleague's chart shows sales 'doubling,' but you notice the y-axis starts at 480 (values are 500→520). What's really happening?",opts:["Sales really doubled","The truncated baseline exaggerates a ~4% rise into a visual doubling","The chart type is wrong","The data is fake"],ans:1,exp:"500 to 520 is a 4% increase. With the axis starting at 480, that tiny gap fills most of the chart and looks like a doubling. The numbers are real; the truncated baseline distorts how they read. Always check the baseline."},
 {id:3,q:"Someone shows ice-cream sales and sunburn cases rising together and concludes ice cream causes sunburns. What's the flaw?",opts:["The chart should be a pie","Correlation isn't causation — summer (a third factor) drives both","Ice cream really does cause sunburns","The axis is truncated"],ans:1,exp:"Both rise in summer, so they correlate — but neither causes the other. A scatter or dual line can show variables moving together; it can never prove cause. Always ask what hidden factor might drive both."},
 {id:4,q:"A dashboard compares 'complaints' as raw bars: Region A 500, Region B 100. A serves 50,000 customers; B serves 5,000. What's misleading?",opts:["Nothing — 500 is worse than 100","Unequal bases: per-customer, A's rate (1%) is half of B's (2%)","Region B's bar is too short","Complaints shouldn't be charted"],ans:1,exp:"Raw counts ignore that A serves 10x the customers. Normalized, A has 10 complaints per 1,000 and B has 20 — A is actually doing better. Compare rates, not raw counts, when group sizes differ."},
 {id:5,q:"You need to explain a revenue chart to executives who'll skim it in 5 seconds. What matters most?",opts:["Including every data point so nothing's missing","An insight-stating title and a takeaway-first explanation","A neutral axis-label title so you don't bias them","A large, colorful 3D chart"],ans:1,exp:"Skimmers read the title and maybe one sentence. An insight title ('West is our only shrinking region') plus a conclusion-first explanation lands the message immediately. Neutral labels and data dumps make them do your analysis."},

CARDS:[
 {front:"Encoding",back:"The rule mapping a number to a visual property.\nLength, position, angle, area, color.\nLonger bar = bigger value.\nEvery chart choice is really an encoding choice."},
 {front:"Encoding accuracy ranking",back:"How well the eye reads each channel:\nPosition > Length > Angle > Area > Color shade.\nPut your key comparison on a high channel.\nWhy bars beat pies."},
 {front:"Zero baseline rule",back:"A bar's message is its length.\nSo the value axis must start at zero.\nA truncated baseline exaggerates small gaps.\nLine charts may zoom in — bars never."},
 {front:"Bar chart",back:"Compares a value across categories.\nEncodes value as length (accurate).\nSort descending by value; axis at zero.\nThe BI workhorse — your default."},
 {front:"Line chart",back:"Shows a value over a continuous axis (time).\nSlope = rate of change.\n2–4 lines max before spaghetti.\nNever connect categories with a line."},
 {front:"Scatter plot",back:"Relationship between two numeric variables.\nUses position — the most accurate channel.\nUpward cloud = positive correlation.\nCorrelation ≠ causation."},
 {front:"Pie / donut chart",back:"Parts of a whole.\nUses angle/area (weak channels).\nOnly for 2–3 slices with a clear majority.\nMore than ~4 slices → use bars."},
 {front:"Treemap",back:"Many parts of a whole as nested rectangles.\nTile area = value.\nGreat for rough size across many categories.\nCan't be read exactly — area is imprecise."},
 {front:"Heatmap",back:"Values in a grid, encoded as color intensity.\nTwo categorical axes, one value.\nFinds hot/cold spots (busy hours, weak regions).\nLabel cells for exact numbers."},
 {front:"Waterfall chart",back:"Bridges a start total to an end total.\nFloating bars = each gain (up) or loss (down).\nColor-code increases vs. decreases.\nThe 'what drove the change?' chart."},
 {front:"Histogram",back:"Distribution of one numeric variable.\nBars = counts within value ranges (bins).\nShows spread, center, and skew.\nNot the same as a bar chart of categories."},
 {front:"Box plot",back:"Summary of a distribution.\nShows median, quartiles, and outliers.\nGreat for comparing spread across groups.\nCompact when you have many distributions."},
 {front:"Truncated axis",back:"A value axis that doesn't start at zero.\nExaggerates small differences.\nThe #1 misleading-chart trick.\nAlways check the baseline first."},
 {front:"Cherry-picking",back:"Choosing a narrow date range that flatters a story.\nReal data, distorted message.\nFix: show the full, relevant range.\nCheck the window before trusting a trend."},
 {front:"Correlation vs. causation",back:"Correlation: two variables move together.\nCausation: one makes the other change.\nA scatter shows correlation only.\nAlways ask what third factor could drive both."},
 {front:"Normalizing",back:"Converting raw counts to rates/percentages.\nMakes groups of different sizes comparable.\n'Per 1,000 customers' instead of raw totals.\nThe fix for unfair comparisons."},
 {front:"Question → chart",back:"Compare → bar.\nTrend over time → line.\nRelationship → scatter.\nPart of whole → bar/pie.\nDistribution → histogram/box."},
 {front:"Insight title",back:"A title that states the finding, not the axes.\n'West is shrinking' > 'Revenue by Region'.\nThe most-read text on a slide.\nSpend it on the takeaway."},
 {front:"Takeaway-first",back:"Lead with the conclusion, then the evidence.\nBusy readers decide in one sentence.\nStructure: takeaway → evidence → 'so what'.\nMakes your charts trusted."},
 {front:"Small multiples",back:"A grid of small charts, same scale.\nCompare many series without spaghetti.\nEach mini-chart tells one slice's story.\nThe fix for too many lines."}
],
GLOSSARY:[
 ["Encoding","The rule that maps a data value onto a visual property — length, position, angle, area, or color. The core idea behind every chart."],
 ["Visual channel","A single visual property used to encode data. Ranked by accuracy: position and length are read best; area and color shade worst."],
 ["Baseline","The starting value of an axis. Bar charts must use a zero baseline because their message is length; a truncated baseline exaggerates differences."],
 ["Bar chart","Compares a numeric value across categories using bar length. Sorted descending with a zero baseline, it's the most reliable comparison chart."],
 ["Line chart","Plots a value against a continuous, ordered axis (usually time). The slope between points shows the rate of change."],
 ["Scatter plot","Plots two numeric variables as dots on two axes. The shape of the cloud reveals correlation; lone dots are outliers."],
 ["Pie chart","Shows parts of a whole as slices (angle/area). Readable only for a few slices with a clear majority; bars are usually better."],
 ["Donut chart","A pie chart with a hole in the center, often used to display a total. Same strengths and limits as a pie."],
 ["Treemap","Shows many parts of a whole as nested rectangles sized by value. Good for rough magnitude across many categories; imprecise for exact values."],
 ["Heatmap","Encodes values as color intensity in a grid of two categories. Best for spotting patterns and hot/cold spots, not exact figures."],
 ["Waterfall chart","Bridges a starting total to an ending total via floating bars for each increase and decrease. Explains what drove a change."],
 ["Histogram","Shows the distribution of one numeric variable by binning values into ranges and counting each bin. Reveals spread, center, and skew."],
 ["Box plot","A compact summary of a distribution showing median, quartiles, and outliers — useful for comparing spread across groups."],
 ["Correlation","A statistical tendency for two variables to move together. Visible in a scatter plot, but it never proves causation."],
 ["Causation","One variable actually causing a change in another. A chart can suggest it but cannot prove it; controlled analysis is required."],
 ["Truncated axis","An axis that doesn't start at zero, exaggerating small differences. The most common way charts mislead."],
 ["Cherry-picking","Selecting a narrow data range that flatters a particular story while hiding the fuller, less convenient picture."],
 ["Normalizing","Converting raw counts into rates or percentages so groups of different sizes can be compared fairly (e.g. per 1,000 customers)."],
 ["Part-to-whole","A comparison showing how categories sum to a total. Shown with bars, a limited pie, or a 100% stacked bar."],
 ["Distribution","How values of a variable are spread out. Shown with a histogram or box plot — center, spread, and outliers."],
 ["Small multiples","A grid of small charts sharing the same axes and scale, used to compare many series without clutter."],
 ["Insight title","A chart title that states the finding ('West is shrinking') rather than just labeling the axes ('Revenue by Region')."],
 ["Dual axis","A chart with two value scales (left and right). Useful for related measures but easily manipulated to fake a correlation — read both scales."]
]
};

function updateThemeBtn(){const b=document.getElementById('themeBtn');if(!b)return;b.innerHTML=(S.theme==='light')?'<i data-lucide="sun" style="width:14px;height:14px;vertical-align:-2px"></i> Light':'<i data-lucide="moon" style="width:14px;height:14px;vertical-align:-2px"></i> Dark';if(window.grainRefreshIcons)grainRefreshIcons();else if(window.lucide)lucide.createIcons();}
function showToast(msg){const t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);}
function celebrate(ok,msg){showToast(msg);}
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ─── NAV ───────────────────────────────────────────────────────────────────
function activateView(id){document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===id));}
function navigate(view,arg){
  guided=null;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.v===view));
  window.scrollTo(0,0);
  if(view==='home'){activateView('view-home');renderHome();}
  else if(view==='lessons'){activateView('view-lessons');renderLessons();}
  else if(view==='practice'){activateView('view-practice');renderDrillList();}
  else if(view==='cards'){activateView('view-cards');renderCards();}
  else if(view==='glossary'){activateView('view-glossary');renderGlossary();}
  else if(view==='settings'){activateView('view-settings');renderSettings();}
}

// ─── LESSON DETAIL ─────────────────────────────────────────────────────────────

function openLesson(id){
  const l=DATA.LESSONS.find(x=>x.id===id);if(!l)return;

    <div id="quizOpts">${l.quiz.opts.map((o,i)=>`<button class="quiz-opt" onclick="checkQuiz(${i},${l.quiz.ans},${id})">${esc(o)}</button>`).join('')}</div>
    <div class="quiz-exp" id="quizExp">${esc(l.quiz.exp)}</div></div>`:'';

    ${l.story?`<p class="lead">${esc(l.story)}</p>`:''}

function checkQuiz(i,ans,id){
  const opts=document.querySelectorAll('#quizOpts .quiz-opt');
  opts.forEach(o=>o.onclick=null);
  if(i===ans){opts[i].classList.add('correct');markDone('lesson'+id);celebrate(true,'Correct! ✨');}
  else{opts[i].classList.add('wrong');opts[ans].classList.add('correct');}
