   story:"You can nest queries. Your manager wants a ranking: 'Show each product's revenue and its rank — but keep every row.' GROUP BY would collapse everything into one row per product. Window functions aggregate without collapsing: each row keeps its detail and also gets a calculated value across the full set.",
   intro:"A window function is like ranking runners without pulling anyone off the track — every row keeps its place but also gets a label (its rank, a running total). Window functions compute a value across a set of rows (a 'window') without collapsing them like GROUP BY does.",
   ral:{
     sql:"SELECT name,\n  ROW_NUMBER() OVER (ORDER BY order_date) AS rn\nFROM orders;",
     say:"Give me each order's name and a sequential row number — numbered in the order the order dates occurred. Label the number column 'rn'.",
     lines:[
       ["ROW_NUMBER()","assign a sequential number to each row"],
       ["OVER (...)","defines the window — which rows to consider and how to sort them"],
       ["ORDER BY order_date","within the window, number rows by date"],
       ["AS rn","alias for the new column"]
     ]
   },
   notes:"Other window functions: <code>RANK()</code>, <code>DENSE_RANK()</code>, <code>LAG()</code>, <code>LEAD()</code>, <code>SUM() OVER (...)</code> for running totals. Add <code>PARTITION BY col</code> to restart numbering per group.",
   viz:{columns:["amount","ROW_NUMBER","RANK","DENSE_RANK","LAG(amount)"],rows:[["260","1","1","1","NULL"],["260","2","1","1","260"],["195","3","3","2","260"],["150","4","4","3","195"]],caption:"Window functions keep every row but number it differently: ROW_NUMBER is always unique, RANK ties-then-skips (1,1,3), DENSE_RANK ties without skipping (1,1,2), and LAG pulls the previous row's value. LEAD and SUM() OVER follow the same OVER() pattern."},
   quiz:{q:"What makes window functions different from GROUP BY aggregates?",opts:["They are faster","They don't collapse rows — each row keeps its own output","They only work on numbers","They require a subquery"],ans:1,exp:"It's like writing each student's class rank on their own report card — nobody's card disappears to make room for the ranking. Window functions calculate across rows but return a value for every row — no collapsing."},
   parsons:{prompt:"Assign row numbers to orders, numbered in order of their order date.",lines:["FROM orders;","SELECT order_date,","  ROW_NUMBER() OVER (ORDER BY order_date) AS rn"],answer:[1,2,0]},
   compare:"The OVER() clause is what makes it a window function. Without OVER(), ROW_NUMBER() would be an invalid call. The window function goes in SELECT — the FROM and clause order are otherwise the same as any query.",
   build:{q:"You need each order's revenue ranked highest to lowest, with ties getting the same rank and no gaps. Which function?",opts:["DENSE_RANK() OVER (ORDER BY revenue DESC)","ROW_NUMBER() OVER (ORDER BY revenue DESC)","RANK() OVER (ORDER BY revenue DESC)","SUM(revenue) OVER (ORDER BY revenue DESC)"],ans:0,exp:"DENSE_RANK gives tied rows the same rank and never skips the next number (1, 1, 2). ROW_NUMBER always assigns unique integers — ties get arbitrary different numbers. RANK ties but skips (1, 1, 3). SUM OVER computes a running total, not a rank."},
   close:"You can rank, number, and compute running values without collapsing rows. Window functions appear in almost every senior analyst SQL interview.",
   unlock:"PARTITION BY splits the window into sub-groups before ranking — like GROUP BY but without collapsing rows. ROW_NUMBER() OVER (PARTITION BY region ORDER BY revenue DESC) restarts the numbering at 1 for each region."},
  {id:11, unit:"Unit 3: Advanced SQL", title:"CTEs", sub:"Name a query for reuse with WITH",
   story:"You can write subqueries. But deep nesting gets unreadable fast. CTEs let you name a query result and reference it by name in the next query. Same logic, readable structure: WITH gives each step a name, and the final SELECT reads from those names like tables.",
   intro:"A CTE is like prepping your ingredients before you cook: you name and set aside a result up front, then the main query uses it like any other table. A Common Table Expression (CTE) names a subquery so you can reference it like a table. It makes complex queries readable.",
   ral:{
     sql:"WITH active AS (\n  SELECT * FROM customers WHERE status = 'active'\n)\nSELECT name FROM active;",
     say:"First, build a temporary set called 'active' that holds only the customers whose status is 'active'. Then give me the names from that set.",
     lines:[
       ["WITH active AS (...)","define a named result set — the CTE"],
       ["SELECT * FROM customers WHERE status='active'","the CTE's query — runs first"],
       ["SELECT name FROM active","reference the CTE by name as if it were a table"]
     ]
   },
   notes:"CTEs are great for multi-step logic: clean data in one CTE, aggregate in another, filter in the final SELECT. They don't improve performance vs subqueries — just readability.",
   viz:{columns:["name"],rows:[["Maya Chen"],["Jordan Lee"],["Alex Kim"]],caption:"The 'active' CTE is built first, then the final SELECT reads from it like a table — same result as a subquery, far more readable."},
   quiz:{q:"What is the main benefit of a CTE over an inline subquery?",opts:["Faster execution","Can be used across multiple databases","Readability — name complex logic and reference it cleanly","Stores data permanently"],ans:2,exp:"CTEs improve readability. You name the logic once and reference it like a table — much cleaner than nesting subqueries."},
   parsons:{prompt:"Build a CTE for active customers, then select names from it.",lines:["SELECT name FROM active_cust;","WITH active_cust AS (","  SELECT * FROM customers WHERE status = 'active'",")"],answer:[1,2,3,0]},
   compare:"WITH must come first — before SELECT, FROM, everything. The CTE is defined in full (WITH name AS (...) ), then the main query immediately follows. Putting SELECT before WITH is a syntax error.",
   build:{q:"You write a CTE named 'high_rev'. How do you use it after closing the parenthesis?",opts:["WITH high_rev AS (SELECT …) SELECT * FROM high_rev;","SELECT * FROM high_rev WITH (SELECT …);","SELECT * FROM (WITH high_rev AS (SELECT …));","WITH high_rev AS (SELECT …), SELECT * FROM high_rev;"],ans:0,exp:"WITH ... AS (...) defines the CTE first; the main SELECT follows immediately after the closing parenthesis. Options B and C invert the order. Option D has a comma after the closing parenthesis — that syntax is for chaining multiple CTEs (WITH a AS (...), b AS (...) SELECT…), not for the final query."},
   close:"You can name complex logic and reference it like a table. CTEs are the cleaner alternative to deep subquery nesting — especially for multi-step analysis.",
   unlock:"You can chain multiple CTEs: WITH a AS (...), b AS (...) SELECT ... FROM b. Each CTE can reference the ones defined before it. This lets you build multi-step logic as a readable pipeline instead of a deeply nested subquery."},
  {id:12, unit:"Unit 3: Advanced SQL", title:"Reconciliation Queries", sub:"Find gaps, dupes, and mismatches",
   story:"You can write clean, readable SQL. Now the real-world trust check: 'Is this data actually right?' Reconciliation queries are the analyst's QA patterns — find duplicates, count NULLs, spot mismatches between two datasets. You can't trust an analysis until you've confirmed the data underneath it.",
   intro:"Reconciliation is like balancing a checkbook — you cross-check two records against each other to catch anything missing, doubled, or mismatched. Reconciliation means checking that data is complete, consistent, and correct. These are the patterns analysts use to QA datasets.",
   ral:{
     sql:"SELECT a.id\nFROM customers_old a\nLEFT JOIN customers b ON a.id = b.id\nWHERE b.id IS NULL;",
     say:"Find the IDs from customers_old that don't exist in the customers table — useful for spotting rows that were dropped between versions.",
     lines:[
       ["FROM customers_old a","the 'source' table — what we expect to exist"],
       ["LEFT JOIN customers b","try to match each row in the new table"],
       ["WHERE b.id IS NULL","keep only rows with no match — these are missing from the new table"]
     ]
   },
   notes:"Core recon patterns: missing rows (LEFT JOIN + IS NULL), duplicate keys (GROUP BY id HAVING COUNT > 1), value mismatches (JOIN + WHERE a.col != b.col), row counts (SELECT COUNT(*)).",
   viz:{columns:["Recon pattern","SQL shape","What it finds"],rows:[["Missing rows","LEFT JOIN … WHERE b.id IS NULL","IDs 107, 112, 118"],["Duplicate keys","GROUP BY id HAVING COUNT(*) > 1","ID 104 (appears twice)"],["Value mismatch","JOIN … WHERE a.amt <> b.amt","ID 109: 90 vs 95"]],caption:"The three core reconciliation patterns at a glance — find missing rows, duplicate keys, and value mismatches — each a different join/filter shape."},
   quiz:{q:"To find rows in table A that are missing from table B, you use:",opts:["INNER JOIN + WHERE b.id IS NULL","LEFT JOIN + WHERE b.id IS NULL","RIGHT JOIN + GROUP BY","FULL OUTER JOIN"],ans:1,exp:"LEFT JOIN keeps all of A. WHERE b.id IS NULL isolates rows that had no match in B — those are the missing ones."},
   parsons:{prompt:"Find customer IDs in the old table that are missing from the new table.",lines:["WHERE b.id IS NULL;","FROM customers_old a","LEFT JOIN customers b ON a.id = b.id","SELECT a.id"],answer:[3,1,2,0]},
   compare:"The anti-join pattern: SELECT → FROM (source) → LEFT JOIN (target) → ON (key) → WHERE (target key IS NULL). WHERE IS NULL is what isolates unmatched rows — without it you get all rows, not just the missing ones.",
   build:{q:"You need to find duplicate customer_ids in the customers table. Which query does that?",opts:["SELECT customer_id, COUNT(*) AS n FROM customers GROUP BY customer_id HAVING COUNT(*) > 1;","SELECT * FROM customers WHERE customer_id > 1;","SELECT DISTINCT customer_id FROM customers;","SELECT customer_id FROM customers c1 JOIN customers c2 ON c1.customer_id = c2.customer_id;"],ans:0,exp:"GROUP BY the key + HAVING COUNT(*) > 1 is the standard duplicate-detection pattern — returns each duplicated key and how many times it appears. Option B misreads 'duplicate' as 'greater than 1'. Option C removes duplicates — the opposite of finding them. Option D self-joins without a condition to exclude the same row — returns every row paired with itself."},
   close:"You have the three core recon patterns: missing rows (LEFT JOIN + IS NULL), duplicates (GROUP BY + HAVING > 1), value mismatches (JOIN + WHERE a.col != b.col). These cover most data-quality checks you will ever face.",
   unlock:"NOT IN with a subquery behaves unexpectedly when the subquery returns any NULLs — it makes the entire NOT IN false for every outer row. LEFT JOIN + WHERE IS NULL never has that problem. Always prefer the anti-join pattern for 'find rows missing from another table.'"},
  {id:15, unit:"Unit 3: Advanced SQL", title:"SQL Indexing", sub:"Speed up queries — and know when not to",
   story:"Your query runs fine on 1,000 rows. On 10 million rows, it times out. An index is the fix — a separate data structure the database uses to jump directly to the rows you need instead of reading every single row. Understanding when to use (and when NOT to use) an index is the difference between a query that runs in milliseconds and one that takes minutes.",
   intro:"An index in SQL is like the index at the back of a textbook — it doesn't hold the actual content, but it tells you exactly which page to turn to. Databases build indexes using a B-Tree structure (or Hash for equality lookups). Adding an index on a WHERE column turns a full table scan into a targeted lookup.",
   ral:{
     sql:"-- Create an index on department_id\nCREATE INDEX idx_emp_dept ON employees(department_id);\n\n-- This query now uses the index instead of scanning all rows\nSELECT * FROM employees\nWHERE department_id = 10;\n\n-- Composite index: column order matters\nCREATE INDEX idx_country_city ON addresses(country, city);",
     say:"Build an index on department_id so lookups by department skip the full table scan. Then create a composite index on (country, city) — the leftmost column is always searched first.",
     lines:[
       ["CREATE INDEX idx_name ON table(col)","build a B-Tree index on this column"],
       ["Full table scan","what happens WITHOUT an index — every row is checked sequentially"],
       ["B-Tree index","good for: WHERE =, WHERE >, WHERE BETWEEN, ORDER BY, JOIN ON"],
       ["Composite index (col1, col2)","covers queries filtering on col1 or (col1 + col2); column order matters"],
       ["Index trade-off","reads faster; writes slower — INSERT/UPDATE/DELETE must also update the index"]
     ]
   },
   notes:"Rule of thumb: index high-cardinality columns used in WHERE, JOIN, or ORDER BY. Don't index low-cardinality columns (gender, status with 2–3 values) — the full scan is actually faster because the index lookup itself has overhead. Never index small tables or columns that are updated constantly.",
   viz:{columns:["Scenario","Index it?","Why"],rows:[["WHERE email = 'x@y.com'","Yes","email is unique — index cuts millions of rows to 1 lookup"],["WHERE gender = 'F'","No","Only 2 values; scans ~50% of table anyway — overhead beats the gain"],["JOIN ON customer_id","Yes","Connecting on a key is the most common index use case"],["Frequently updated column","No","Every update must rebuild the index — write cost outweighs read benefit"],["Small 50-row table","No","Full scan of 50 rows is faster than the index overhead"]],caption:"Choose indexes by cardinality and access pattern. High-cardinality WHERE/JOIN columns win. Low-cardinality and write-heavy columns lose."},
   quiz:{q:"Which column is the best candidate for an index?",opts:["is_deleted (TRUE/FALSE only)","gender (M/F/Other)","customer_email (unique per customer)","status (active/inactive/pending)"],ans:2,exp:"customer_email has high cardinality — nearly every value is unique. Searching by email with an index jumps directly to the matching row. The other options all have 2–3 distinct values, so the database scans nearly the whole table anyway — index overhead doesn't help."},
   parsons:{prompt:"Create a composite index named idx_emp_name on last_name and first_name from the employees table.",lines:["last_name,","CREATE INDEX idx_emp_name","first_name);","ON employees ("],answer:[1,3,0,2]},
   compare:"The pattern is CREATE INDEX name ON table (col1, col2). Column ORDER in a composite index matters — the database can use this index for queries filtering on last_name alone OR both columns. A query filtering on first_name alone cannot use this index because last_name is the leftmost prefix and must be included.",
   build:{q:"You add an index on a column called is_active with only two values: TRUE or FALSE. What should you expect?",opts:["Query performance improves significantly","The index has no benefit — low-cardinality columns don't benefit from indexing","An error — you cannot index boolean columns","The index doubles query speed on large tables"],ans:1,exp:"Low-cardinality columns (few distinct values) don't benefit from indexes. With only TRUE and FALSE, half the table matches either value — the database reads almost every row regardless, making the index overhead a net cost. Index high-cardinality columns like email or customer_id instead."},
   close:"Indexes speed up WHERE, JOIN, and ORDER BY on high-cardinality columns. Low-cardinality, frequently updated, and small tables don't benefit. Know when NOT to index as much as when to index.",
   unlock:"A covering index includes all columns a query needs — the database never touches the base table at all. Example: CREATE INDEX idx_cov ON orders(customer_id, order_date, total) lets SELECT order_date, total FROM orders WHERE customer_id = 42 run entirely from the index."},
  {id:16, unit:"Unit 3: Advanced SQL", title:"Temp Tables vs Views", sub:"Intermediate storage choices and when to use each",
   story:"You're building a multi-step analysis — calculate intermediate results, then need them again in the next step. A CTE handles this inside a single query. But for heavier work across multiple queries in a session, you have two tools: a Temporary Table physically stores the result (like a whiteboard you erase when done); a View saves only the query definition (like a saved formula that re-runs every time you call it).",
   intro:"A Temporary Table stores actual data for the duration of your session — deleted automatically when the connection closes. A View stores a SQL query, not data. Every time you SELECT from a view, it re-runs the underlying query against the current data. Both are alternatives to CTEs, but they live at different scopes.",
   ral:{
     sql:"-- Temp Table: physically store the result\nCREATE TEMPORARY TABLE temp_top AS\nSELECT customer_id, SUM(revenue) AS total\nFROM orders\nGROUP BY customer_id\nHAVING total > 10000;\n\nSELECT * FROM temp_top;  -- reuse multiple times this session\n\n-- View: save the query definition\nCREATE VIEW high_value AS\nSELECT customer_id, SUM(revenue) AS total\nFROM orders\nGROUP BY customer_id\nHAVING total > 10000;\n\nSELECT * FROM high_value;  -- always fresh data",
     say:"The temp table stores today's snapshot of high-value customers for use later this session. The view re-runs the same query every time — so it always reflects the latest orders.",
     lines:[
       ["CREATE TEMPORARY TABLE","stores data physically; auto-deleted when session ends"],
       ["CREATE VIEW","stores only the SQL query definition — no physical data"],
       ["SELECT from view","re-runs the underlying query — always sees current data"],
       ["SELECT from temp table","reads the stored snapshot — fast for heavy intermediate results"],
       ["CTE vs Temp vs View","CTE = single query scope; Temp = session scope; View = permanent until dropped"]
     ]
   },
   notes:"Views are permanent (until you DROP VIEW). Temp tables are session-scoped — they disappear when the connection closes. CTEs exist only within the single query that defines them. Use CTEs for readability, temp tables for heavy multi-step ETL, and views for shared business logic or column-level access control.",
   viz:{columns:["Feature","Temp Table","View","CTE"],rows:[["Stores data?","Yes — physically","No — query only","No — inline"],["Lifetime","Current session","Permanent (until dropped)","Single query"],["Supports DML?","Yes","Usually read-only","No"],["Performance","Fast re-use of stored result","Re-runs on every SELECT","Evaluated inline"],["Best for","Multi-step ETL, heavy transforms","Shared logic, access control","Readability in one query"]],caption:"Three tools for intermediate logic — each at a different scope. CTE is per-query, Temp Table is per-session, View is permanent."},
   quiz:{q:"You want to give another analyst access to customer data but hide the salary column. Which tool fits best?",opts:["Temporary Table","CTE","View","Subquery"],ans:2,exp:"A View lets you define exactly which columns are exposed and restrict access via database permissions. The analyst queries the view and never sees the underlying salary column. A Temp Table is session-specific — it disappears when your connection closes and isn't accessible to others."},
   parsons:{prompt:"Create a view named vw_open_orders that selects all columns from orders where status is 'open'.",lines:["WHERE status = 'open';","CREATE VIEW vw_open_orders AS","SELECT *","FROM orders"],answer:[1,2,3,0]},
   compare:"The pattern is CREATE VIEW name AS [your SELECT]. The view stores only the query definition — no data. Every SELECT from vw_open_orders re-runs the underlying query against current orders data. DROP VIEW removes the definition. DELETE FROM a view is usually blocked because there is no physical table to delete from.",
   build:{q:"You run a heavy 10-million-row aggregation. You need the result five more times this session. Which is the best choice?",opts:["Run the query 6 times — just write it clearly","Create a TEMP TABLE from the aggregation, then SELECT from it 5 times","Create a VIEW and SELECT from it 5 times — views cache the result","Use a CTE — it persists across multiple queries in the session"],ans:1,exp:"A TEMP TABLE stores the physical result once. The five follow-up queries read that stored result instantly. A VIEW re-runs the full 10M-row aggregation every SELECT — 5 more full scans. A CTE only lives inside the single query that defines it and does not persist across separate queries."},
   close:"Temp Table = stored data, session-scoped, fast for repeated use. View = saved query, permanent, always fresh. CTE = query-scoped, readability only. Match the tool to your scope.",
   unlock:"Materialized Views (available in PostgreSQL, not MySQL) store the query result physically like a temp table but can be refreshed on a schedule. They give you the best of both worlds for heavy reporting queries — but require an explicit REFRESH MATERIALIZED VIEW when source data changes."},
  {id:501, unit:"Unit 4: Data Migration", title:"Profiling: Counts & Uniqueness", sub:"COUNT(*), COUNT(DISTINCT) — the first thing you run.",
   story:"You've been handed a legacy customers table to migrate. Before touching it, you profile it. The very first numbers any migration analyst pulls: how many rows are there, how many are actually unique, and how many are missing a key field. Three counts tell you the shape of the mess.",
   ral:{sql:"SELECT\n  COUNT(*)               AS rows,\n  COUNT(DISTINCT email)  AS distinct_emails,\n  COUNT(email)           AS non_null_emails\nFROM legacy_customers;", say:"Count every row, count the distinct emails, and count the non-null emails — three numbers that reveal duplicates and gaps.",
     lines:[["COUNT(*)","counts every row, including duplicates and rows with NULLs"],["COUNT(DISTINCT email)","how many unique email values exist"],["COUNT(email)","counts non-NULL emails only — NULLs are skipped"],["COUNT(*) - COUNT(email)","the gap = how many rows are missing an email"],["COUNT(*) vs COUNT(DISTINCT id)","if these differ, your 'unique' key isn't unique"]]},
   notes:"Pro tip: this is the first thing to run on any unfamiliar source table. The gap between COUNT(*) and COUNT(DISTINCT primary_key) tells you whether the source has duplicate keys; the gap between COUNT(*) and COUNT(col) gives you the null rate for each column.",
   viz:{columns:["metric","value","what it means"], rows:[["rows","10,000","total records in source"],["distinct_emails","9,840","160 emails are shared/duplicated"],["non_null_emails","9,900","100 rows have no email at all"]], caption:"Three counts on one column expose two problems at once: 100 missing emails (10,000 - 9,900) and 60 duplicate emails among the rest. You now know the cleanup scope before writing a line of migration code."},
   quiz:{q:"COUNT(*) returns 10,000 but COUNT(DISTINCT customer_id) returns 9,980. What does that tell you?", opts:["The table contains 20 NULL customer ids","20 customer_ids are duplicated — not unique","The query was written incorrectly","20 rows silently failed to load in"], ans:1, exp:"COUNT(*) counts every row; COUNT(DISTINCT customer_id) counts unique ids. A 20-row gap means 20 customer_ids repeat — the key you planned to migrate on isn't actually unique. Fix before you migrate."},
   parsons:{prompt:"Arrange the profiling query that counts rows, distinct emails, and non-null emails.",lines:["FROM legacy_customers;","COUNT(DISTINCT email) AS distinct_emails,","SELECT","COUNT(*) AS rows,"],answer:[2,3,1,0]},
   compare:"The gap between COUNT(*) and COUNT(email) is your null count; the gap between COUNT(*) and COUNT(DISTINCT key) is your duplicate count. Run both gaps before you trust a 'unique' key.",
   build:{q:"You need to know how many rows in customers are missing a phone value. Which query gets you that count directly?",opts:["SELECT COUNT(*) - COUNT(phone) FROM customers;","SELECT COUNT(phone) FROM customers WHERE phone IS NULL;","SELECT COUNT(DISTINCT phone) FROM customers;","SELECT COUNT(*) FROM customers GROUP BY phone;"],ans:0,exp:"COUNT(*) counts every row; COUNT(phone) skips NULLs. Subtracting gives the exact count of missing phones in one pass — no separate IS NULL query needed. Option B reads almost right but COUNT(phone) WHERE phone IS NULL is always zero, since COUNT only counts non-null values of the named column."},
   close:"Three counts in one query expose nulls and duplicates before you write a single migration line. That's the profiling habit every legacy-table handoff starts with.",
   unlock:"Run this same three-count pattern on every column you plan to use as a join key, not just the obvious primary key — a 'mostly unique' foreign key is one of the most common migration surprises."},
  {id:502, unit:"Unit 4: Data Migration", title:"Profiling: Finding Duplicates", sub:"GROUP BY … HAVING COUNT(*) > 1.",
   story:"Your counts showed 60 duplicate emails. Now you need to SEE them — which emails repeat, and how many times. GROUP BY collapses rows by email; HAVING keeps only the groups that appear more than once. This is the exact query every analyst writes to surface duplicate keys.",
   ral:{sql:"SELECT email, COUNT(*) AS n\nFROM legacy_customers\nGROUP BY email\nHAVING COUNT(*) > 1\nORDER BY n DESC;", say:"Group rows by email, count each group, and keep only the emails that appear more than once — worst offenders first.",
     lines:[["GROUP BY email","collapse rows into one group per distinct email"],["COUNT(*) AS n","how many rows share that email"],["HAVING COUNT(*) > 1","keep only groups with more than one row — the duplicates"],["HAVING vs WHERE","HAVING filters groups after aggregation; WHERE filters rows before it"],["ORDER BY n DESC","put the worst duplicates at the top"]]},
   notes:"WHERE can't see COUNT(*) — aggregates don't exist yet when WHERE runs, so duplicate-finding always uses HAVING. Pro tip: this is really about SQL's order of execution — WHERE filters rows first, HAVING filters groups after they're aggregated.",
   viz:{columns:["email","n"], rows:[["jordan@co.com","3"],["maya@co.com","2"],["sam@co.com","2"]], caption:"Only emails appearing more than once survive the HAVING filter. jordan@co.com shows up 3 times — these are the rows you must dedupe or merge before migrating."},
   quiz:{q:"Why must you use HAVING (not WHERE) to filter COUNT(*) > 1?", opts:["HAVING simply performs better here","WHERE runs before aggregation; HAVING after","The two clauses are interchangeable","WHERE cannot be used alongside GROUP BY"], ans:1, exp:"You can't count heads in a group before the groups exist. SQL evaluates WHERE before it groups and aggregates, so COUNT(*) is not available there. HAVING runs after GROUP BY, when the counts exist — that is why it is the clause for filtering aggregates."},
   parsons:{prompt:"Arrange the query that finds emails appearing more than once.",lines:["HAVING COUNT(*) > 1","FROM legacy_customers","ORDER BY n DESC;","SELECT email, COUNT(*) AS n","GROUP BY email"],answer:[3,1,4,0,2]},
   compare:"WHERE can't see COUNT(*) because aggregates don't exist until after grouping — that's the whole reason HAVING exists as a separate clause.",
   build:{q:"You want to find every product_sku that appears more than twice in an inventory table. Which clause filters on that repeated count?",opts:["WHERE COUNT(*) > 2","HAVING COUNT(*) > 2","GROUP BY COUNT(*) > 2","ORDER BY COUNT(*) > 2"],ans:1,exp:"COUNT(*) only exists after GROUP BY has aggregated the rows, so the filter on it has to be HAVING — WHERE runs too early in SQL's order of execution to see it."},
   close:"Counting told you how many duplicates exist; this query shows you exactly which ones, worst offenders first — the list you hand to whoever owns the dedup decision.",
   unlock:"HAVING isn't limited to COUNT — you can filter on any aggregate (HAVING SUM(amount) > 10000, HAVING AVG(score) < 50). Same rule: anything computed by GROUP BY belongs in HAVING, not WHERE."},
  {id:503, unit:"Unit 4: Data Migration", title:"Profiling: Nulls & Format Chaos", sub:"IS NULL, COUNT FILTER, MIN/MAX(LENGTH), LIKE.",
   story:"Counts and duplicates done. Now the messy part: missing values and inconsistent formats. How many phone numbers are missing? And of the ones present, are they all the same shape — or a mix of '5551234' and '(555) 123-4567'? You quantify both in one pass.",
   ral:{sql:"SELECT\n  SUM(CASE WHEN phone IS NULL THEN 1 ELSE 0 END) AS missing_phone,\n  MIN(LENGTH(phone))                              AS min_len,\n  MAX(LENGTH(phone))                              AS max_len\nFROM legacy_customers;", say:"Count how many phones are missing, and find the shortest and longest phone length — a wide length range means inconsistent formats.",
     lines:[["phone IS NULL","tests for missing values — never use = NULL"],["SUM(CASE WHEN phone IS NULL THEN 1 ELSE 0 END)","MySQL's way of filtering inside an aggregate — counts only the rows where phone is null"],["LENGTH(phone)","the character count of each value"],["MIN/MAX(LENGTH(…))","the spread of lengths exposes format chaos (7 vs 14 chars)"],["LIKE / REGEXP","WHERE phone NOT LIKE '___-___-____' finds malformed entries"]]},
   notes:"= NULL is always false — NULL means 'unknown', so it never equals anything, including itself. Use IS NULL / IS NOT NULL. And a MIN length of 7 with a MAX of 14 is your signal that formats are inconsistent and need a cleansing rule before load.",
   viz:{columns:["missing_phone","min_len","max_len"], rows:[["240","7","14"]], caption:"240 rows have no phone at all. Among those that do, lengths run 7 to 14 characters — some are bare digits, others carry area codes and dashes. Both findings become explicit rules in your cleansing step."},
   quiz:{q:"Why does WHERE phone = NULL return no rows, even when phones are missing?", opts:["NULL is secretly stored as a zero","NULL never equals anything; use IS NULL","The phone column is stored as text","The = operator only works on numbers"], ans:1, exp:"NULL represents 'unknown', so any comparison with = (even = NULL) evaluates to false/unknown and returns nothing. IS NULL is the only correct test for missing values."},
   parsons:{prompt:"Arrange the query that profiles missing phones and format spread.",lines:["MAX(LENGTH(phone)) AS max_len","FROM legacy_customers;","SELECT","SUM(CASE WHEN phone IS NULL THEN 1 ELSE 0 END) AS missing_phone,","MIN(LENGTH(phone)) AS min_len,"],answer:[2,3,4,0,1]},
   compare:"= NULL silently returns nothing because NULL never equals anything — IS NULL is the only test that works, and it's why the SUM(CASE WHEN ... IS NULL) pattern shows up instead of a simple WHERE count.",
   build:{q:"A column shows MIN(LENGTH(zip)) = 5 and MAX(LENGTH(zip)) = 10. What does that range tell you?",opts:["The zip column has mixed formats — some plain 5-digit, some ZIP+4","The zip column contains NULL values","The query has a syntax error","All zip codes are exactly 5 digits"],ans:0,exp:"A spread between MIN and MAX length is the signature of format inconsistency — here, plain 5-digit zips mixed with 9-digit ZIP+4 (10 chars with the dash). That spread is your signal to write a cleansing rule before load."},
   close:"Missing values and inconsistent formats are now both quantified in one query — two concrete rules to write into your cleansing step, not vague suspicions.",
   unlock:"LENGTH() catches format chaos in fixed-shape fields like phone or zip. For free-text fields, pair it with a LIKE pattern check (NOT LIKE '___-___-____') to catch malformed rows LENGTH alone would miss."},
  {id:504, unit:"Unit 4: Data Migration", title:"Cleansing: Standardize Text", sub:"TRIM, UPPER/LOWER, REPLACE.",
   story:"Profiling found trailing spaces on names and a mix of 'CA', 'ca', and 'Ca' for state. To a human those look equal; to SQL they're different strings that land in separate groups and break joins to your reference tables. One cleansing pass standardizes them.",
   ral:{sql:"SELECT\n  TRIM(name)              AS name,\n  UPPER(state)            AS state,\n  REPLACE(phone, '-', '') AS phone\nFROM legacy_customers;", say:"Strip surrounding spaces off the name, force the state to uppercase, and remove dashes from the phone — one clean pass.",
     lines:[["TRIM(name)","remove leading/trailing spaces: ' Maya ' becomes 'Maya'"],["UPPER(state)","force one case so 'ca', 'CA', 'Ca' all become 'CA' and match"],["REPLACE(phone, '-', '')","swap every dash for nothing, normalizing the format"],["why it matters","trailing spaces and mixed case silently break joins and GROUP BY"]]},
   notes:"'CA' and 'ca ' look identical to a person but are different strings to SQL — they fall into separate groups and fail key matches against a target reference table. Standardizing case and whitespace is a core cleansing step in any migration.",
   viz:{columns:["raw","cleaned"], rows:[["' Maya Chen '","Maya Chen"],["ca","CA"],["555-123-4567","5551234567"]], caption:"Same three values before and after TRIM / UPPER / REPLACE. Now every state code matches the target standard and the phone is a consistent digit string ready to validate."},
   quiz:{q:"Two rows with customer 'Maya' fail to join — one is stored as 'Maya', the other as 'Maya ' (trailing space). Best fix?", opts:["Delete one of the two Maya rows","TRIM both sides so the values match","Switch the query to a LEFT JOIN","Change the column's data type"], ans:1, exp:"The trailing space makes 'Maya ' a different string from 'Maya', so the join fails. TRIM removes surrounding whitespace on both sides so the keys match."},
   parsons:{prompt:"Arrange the query that standardizes name, state, and phone.",lines:["REPLACE(phone, '-', '') AS phone","SELECT","FROM legacy_customers;","TRIM(name) AS name,","UPPER(state) AS state,"],answer:[1,3,4,0,2]},
   compare:"'CA' and 'ca ' look identical to a person but are different strings to SQL — they land in separate groups and fail key matches until TRIM and UPPER force them onto one standard.",
   build:{q:"A join between legacy_customers.state and a reference table fails to match rows where the state is stored as 'ca' instead of 'CA'. What's the fix?",opts:["Wrap the join column in UPPER() on both sides","Switch the join to a RIGHT JOIN","Add an ORDER BY on state","Change the column's data type to CHAR(2)"],ans:0,exp:"'ca' and 'CA' are different strings to SQL even though they mean the same thing. Forcing both sides of the join through UPPER() normalizes the case so the match succeeds — the same fix as standardizing state before migration."},
   close:"One pass through TRIM, UPPER, and REPLACE turns three inconsistent raw formats into one standard — the difference between data that joins cleanly and data that silently fails to match.",
   unlock:"REPLACE only swaps one exact substring. For messier patterns (multiple separators, extra spaces between words) reach for REGEXP_REPLACE where your database supports it — same idea, more power."},
  {id:505, unit:"Unit 4: Data Migration", title:"Mapping: CASE WHEN (source → target)", sub:"The workhorse for source-to-target value mapping.",
   story:"Your source stores status as 'A', 'active', and '1' — all meaning the same thing. The target system only accepts 'Active' or 'Inactive'. You need to map every messy source value to the one standard target value. CASE WHEN is how you implement that mapping in SQL.",
   ral:{sql:"SELECT raw_status,\n  CASE\n    WHEN raw_status IN ('A','active','1') THEN 'Active'\n    WHEN raw_status IN ('I','inactive','0') THEN 'Inactive'\n    ELSE 'Unknown'\n  END AS status\nFROM legacy_customers;", say:"Map every messy source status to one of the target's standard values — anything unrecognized becomes 'Unknown'.",
     lines:[["CASE","start a rule that returns a value based on conditions"],["WHEN … IN ('A','active','1') THEN 'Active'","many source spellings collapse to one target value"],["ELSE 'Unknown'","the catch-all for source values you didn't plan for"],["END AS status","close the CASE and name the output column"],["the big idea","each WHEN is one source-to-target mapping rule, in SQL"]]},
   notes:"This is literally how you implement a source-to-target mapping document: each WHEN is one mapping rule, and the ELSE is your safety net that surfaces unmapped values instead of letting them slip through. Pro tip: always review everything landing in 'Unknown' — it catches gaps in the mapping spec.",
   viz:{columns:["raw_status","mapped status"], rows:[["A","Active"],["active","Active"],["1","Active"],["I","Inactive"],["X","Unknown"]], caption:"Five different source values, mapped to the target's three allowed values. 'X' was never in the spec, so the ELSE routes it to 'Unknown' — visible, not silently dropped."},
   quiz:{q:"Why include ELSE 'Unknown' rather than leaving it off?", opts:["It makes the CASE expression run faster","It surfaces unmapped values instead of NULL","CASE syntax requires an ELSE branch","It removes duplicate rows from output"], ans:1, exp:"Without ELSE, unmatched values return NULL and disappear into the noise. An explicit ELSE 'Unknown' makes unmapped source values visible so you can review and extend the mapping."},
   parsons:{prompt:"Arrange the CASE that maps messy source statuses to target values.",lines:["FROM legacy_customers;","ELSE 'Unknown' END AS status","WHEN raw_status IN ('I','inactive','0') THEN 'Inactive'","SELECT raw_status,","CASE","WHEN raw_status IN ('A','active','1') THEN 'Active'"],answer:[3,4,5,2,1,0]},
   compare:"Each WHEN is one source-to-target mapping rule. Without an ELSE, any source value you didn't anticipate returns NULL and slips through silently instead of surfacing as 'Unknown' for review.",
   build:{q:"Your mapping CASE has no ELSE branch. A source row holds raw_status = 'pending', a value never in the spec. What happens to it?",opts:["It returns NULL and disappears from review","It throws a syntax error","It defaults to 'Active'","SQL automatically maps it to 'Unknown'"],ans:0,exp:"Without an explicit ELSE, an unmatched CASE returns NULL — not an error, not an automatic 'Unknown'. That NULL blends into the rest of the output and the gap in your mapping spec goes unnoticed unless you add ELSE yourself."},
   close:"CASE WHEN is the SQL implementation of a source-to-target mapping document — every WHEN is one rule, and ELSE is the safety net that surfaces what the spec missed.",
   unlock:"Always query WHERE status = 'Unknown' after running a mapping CASE — it's a one-line audit that tells you exactly which source values your mapping spec forgot to cover."},
  {id:506, unit:"Unit 4: Data Migration", title:"Type Coercion & Defaults: CAST + COALESCE", sub:"CAST/CONVERT for types, COALESCE for NULL defaults.",
   story:"The target columns are strictly typed: signup_date is a DATE, amount is DECIMAL, and region is NOT NULL. But your source holds them all as text, with some regions blank. Load it as-is and the migration rejects the rows. CAST coerces the types; COALESCE supplies defaults.",
   ral:{sql:"SELECT\n  CAST(signup_date AS DATE)         AS signup_date,\n  CAST(amount AS DECIMAL(10,2))     AS amount,\n  COALESCE(region, 'Unassigned')    AS region\nFROM legacy_customers;", say:"Convert the text date into a real date, the text amount into a decimal number, and replace any missing region with 'Unassigned'.",
     lines:[["CAST(signup_date AS DATE)","coerce text like '2026-03-15' into a true DATE type"],["CAST(amount AS DECIMAL(10,2))","text '144.50' becomes a number you can SUM"],["COALESCE(region, 'Unassigned')","return the first non-NULL value: region, else the default"],["why it matters","typed target columns reject text; NOT NULL columns reject blanks"]]},
   notes:"Migrations fail at load when a text column meets a typed target column. CAST (or CONVERT in SQL Server) does the coercion; COALESCE supplies a default so NOT NULL target columns don't reject the row. COALESCE returns the first non-NULL argument and can be chained across several fallbacks.",
   viz:{columns:["source (text)","after CAST / COALESCE","target type"], rows:[["'2026-03-15'","2026-03-15","DATE"],["'144.50'","144.50","DECIMAL(10,2)"],["(blank)","Unassigned","VARCHAR NOT NULL"]], caption:"Each text value is coerced to the type the target demands, and the blank region is backfilled with a default so the NOT NULL column accepts the row. The data is now load-ready."},
   quiz:{q:"COALESCE(region, 'Unassigned') returns what when region is NULL?", opts:["NULL, returned unchanged","'Unassigned' — first non-NULL value","It raises a runtime error","An empty string is returned instead"], ans:1, exp:"COALESCE returns its first non-NULL argument. When region is NULL it falls through to 'Unassigned', giving a NOT NULL target column a valid value instead of rejecting the row."},
   parsons:{prompt:"Arrange the query that coerces types and fills a default region.",lines:["COALESCE(region, 'Unassigned') AS region","FROM legacy_customers;","CAST(amount AS DECIMAL(10,2)) AS amount,","SELECT","CAST(signup_date AS DATE) AS signup_date,"],answer:[3,4,2,0,1]},
   compare:"CAST coerces a text value into the type the target demands; COALESCE supplies a fallback so a NOT NULL target column doesn't reject a blank source value. They solve two different load-time failures.",
   build:{q:"The target column order_amount is DECIMAL(10,2) and NOT NULL. The source has it as text, and some rows are blank. Which combination loads cleanly?",opts:["COALESCE(CAST(amount AS DECIMAL(10,2)), 0)","CAST(amount AS DECIMAL(10,2))","COALESCE(amount, 0)","TRIM(amount)"],ans:0,exp:"You need both fixes: CAST converts the text into a number the typed column accepts, and COALESCE supplies 0 for any blank that would otherwise violate NOT NULL. Either alone solves only half the problem — CAST on a blank value still leaves a NULL the target column rejects."},
   close:"CAST handles the type mismatch; COALESCE handles the missing value. Migrations fail at load on exactly these two gaps — now you can fix both before the row ever hits the target.",
   unlock:"COALESCE can chain more than two arguments — COALESCE(preferred_region, billing_region, 'Unassigned') tries each in order and returns the first non-NULL. Useful when you have a fallback hierarchy, not just one default."},
  {id:507, unit:"Unit 4: Data Migration", title:"Validation: Row Counts & Control Totals", sub:"COUNT(*) and SUM(col), source vs target.",
   story:"The data is loaded into the target. Now you prove it migrated correctly. The two baseline checks every migration sign-off requires: did every row arrive (row count), and did the values inside survive intact (control total)? You run identical aggregates on both sides and compare.",
   ral:{sql:"-- source\nSELECT COUNT(*) AS rows, SUM(amount) AS total FROM legacy_orders;\n-- target\nSELECT COUNT(*) AS rows, SUM(amount) AS total FROM orders;", say:"Count rows and sum the amount on both source and target — the two numbers must match after the migration.",
     lines:[["COUNT(*) source vs target","the row-count check: did every record arrive?"],["SUM(amount) source vs target","the control total: did the values arrive intact?"],["run identical aggregates on both","so the comparison is apples to apples"],["count matches but sum differs","rows arrived but values were truncated or converted wrong"]]},
   notes:"Row count answers 'did all records migrate?'; the control total (SUM of a key money or quantity column) answers 'did the data inside them survive?'. Pro tip: these two matching numbers are the baseline sign-off every reconciliation starts with.",
   viz:{columns:["check","source","target","match?"], rows:[["COUNT(*)","18,402","18,402","yes"],["SUM(amount)","$1,240,118","$1,240,118","yes"]], caption:"Identical counts and identical control totals on both sides = the migration reconciles. If the count matched but the sum did not, you would know rows arrived but values were corrupted."},
   quiz:{q:"Row counts match between source and target, but SUM(amount) is lower in the target. Most likely cause?", opts:["Some rows were silently dropped in transit","Values mis-cast on load — decimals lost","The query itself is written wrong","Sums never match; that's expected"], ans:1, exp:"A matching row count means every record arrived; a lower SUM means the values inside some rows changed — classic truncation or a bad type conversion (e.g. dropping cents). The control total caught a corruption the row count could not."},
   parsons:{prompt:"Arrange the source and target row-count/control-total checks.",lines:["-- target","SELECT COUNT(*) AS rows, SUM(amount) AS total FROM orders;","-- source","SELECT COUNT(*) AS rows, SUM(amount) AS total FROM legacy_orders;"],answer:[2,3,0,1]},
   compare:"Row count answers 'did everything arrive'; control total (SUM of a key numeric column) answers 'did the values survive intact'. Matching counts with a mismatched sum means rows arrived but data inside them was corrupted.",
   build:{q:"Source and target row counts match exactly, but SUM(amount) is lower on the target side. What's the most likely cause?",opts:["A type conversion truncated decimal values on load","Some rows were dropped during the migration","The SUM function behaves differently on the target database","This is expected — sums never have to match"],ans:0,exp:"Matching row counts rule out dropped or duplicated rows — every record arrived. A lower SUM with the same count means the values inside some rows changed in transit, classically a bad CAST or truncated decimal precision on load."},
   close:"Two matching numbers — count and control total — are the baseline every migration sign-off starts with. Run both, on both sides, before anyone calls it done.",
   unlock:"Pick a control total column carefully: SUM(amount) on a financial table is the obvious choice, but COUNT(DISTINCT customer_id) or SUM(quantity) work just as well as a second, independent check when one total alone wouldn't catch everything."},
  {id:508, unit:"Unit 4: Data Migration", title:"Reconciliation: What Didn’t Make It", sub:"EXCEPT / MINUS and the LEFT JOIN orphan check.",
   story:"Your control total is off by a few rows. Now you find exactly which records didn't make it — and confirm nothing is orphaned. EXCEPT lists source rows missing from the target; a LEFT JOIN with a NULL check finds child rows whose parent never came across (broken referential integrity).",
   ral:{sql:"-- rows in source missing from target\nSELECT id FROM legacy_orders\nEXCEPT\nSELECT id FROM orders;\n\n-- orphans: orders with no matching customer\nSELECT o.id\nFROM orders o\nLEFT JOIN customers c ON o.customer_id = c.id\nWHERE c.id IS NULL;", say:"List the source IDs that aren't in the target, then list any orders whose customer is missing from the customers table.",
     lines:[["EXCEPT","return rows from the first query that are not in the second (MINUS in Oracle)"],["source EXCEPT target","pinpoints exactly which records failed to migrate"],["LEFT JOIN customers … WHERE c.id IS NULL","the no-match pattern: orders with no parent customer"],["orphans","child rows pointing at a parent that did not come across — broken integrity"]]},
   notes:"EXCEPT/MINUS pinpoints dropped records; the LEFT JOIN … WHERE parent IS NULL pattern finds orphans that violate referential integrity. Pro tip: the full reconciliation sequence is — tie out counts and control totals, then use EXCEPT to find missing rows and a left-join null-check to confirm no orphaned foreign keys.",
   viz:{columns:["check","result","meaning"], rows:[["source EXCEPT target","id 4471, 4489","2 orders never migrated"],["orphan order ids","id 5012","order points at a missing customer"]], caption:"EXCEPT surfaces the two dropped order ids; the left-join null-check surfaces one order whose customer_id has no matching parent. Both must be resolved before sign-off."},
   quiz:{q:"A LEFT JOIN from orders to customers with WHERE c.id IS NULL returns rows. What did you find?", opts:["Customers who placed no orders at all","Orphaned orders — no parent customer","Orders that were entered in twice","Nothing especially useful here"], ans:1, exp:"A LEFT JOIN keeps all orders; WHERE c.id IS NULL keeps only those with no matching customer. Those are orphans — order rows whose foreign key points at a customer that did not migrate, violating referential integrity."},
   parsons:{prompt:"Arrange the LEFT JOIN check that finds orphaned orders.",lines:["WHERE c.id IS NULL;","LEFT JOIN customers c ON o.customer_id = c.id","SELECT o.id","FROM orders o"],answer:[2,3,1,0]},
   compare:"EXCEPT pinpoints exactly which source ids never reached the target; the LEFT JOIN ... WHERE parent IS NULL pattern catches a different failure — child rows whose foreign key points at nothing. Both checks matter; neither replaces the other.",
   build:{q:"You run a LEFT JOIN from orders to customers and filter WHERE c.id IS NULL. The query returns 3 rows. What have you found?",opts:["3 orders with no matching customer — orphaned foreign keys","3 customers who placed no orders","3 duplicate orders","Nothing meaningful — this pattern always returns 0 rows"],ans:0,exp:"A LEFT JOIN keeps every order row regardless of match; filtering to c.id IS NULL keeps only the ones where no customer row matched. Those 3 orders point at a customer_id that doesn't exist in the customers table — broken referential integrity that needs to be resolved before sign-off."},
   close:"Counts and control totals told you something was off. EXCEPT and the LEFT JOIN orphan check show you exactly which rows — the last step before reconciliation is complete and the migration can be signed off.",
   unlock:"The LEFT JOIN ... WHERE right.key IS NULL pattern works in both directions — run it customers→orders to find customers with no orders, and orders→customers to find orphaned orders. Same shape, opposite question."},
  {id:601, unit:"Unit 5: From Question to Metric", title:"Define the Metric Before You Compute It", sub:"A number means nothing without its grain, filter, and time window.",
   story:"A stakeholder asks for \"our revenue this quarter.\" Before you touch SQL, the real work is pinning the definition: revenue from what — every order, or only paid ones? Per what — the whole company, or one region? When — order date or ship date, and which quarter exactly? A metric is a measure plus a grain plus a filter plus a time window. Nail those four and the query writes itself; skip them and you will hand back a confident, wrong number.",
   ral:{sql:"SELECT SUM(amount) AS q3_paid_revenue\nFROM orders\nWHERE status = 'paid'\n  AND order_date >= '2024-07-01'\n  AND order_date <  '2024-10-01';", say:"Sum the order amount, but only paid orders, only in the third quarter — defined by order date, with a half-open date range so nothing is double-counted at the boundary.",
     lines:[["SUM(amount)","the measure — what number are we actually producing"],["WHERE status = 'paid'","the filter — which rows count toward it (paid, not every order)"],["order_date >= '2024-07-01' AND < '2024-10-01'","the time window — half-open so Sept 30 is in and Oct 1 is out, no overlap"],["(no GROUP BY)","the grain — one number for the whole company; add GROUP BY region to change it"]]},
   notes:"The single most valuable analyst habit: restate a vague request as measure + grain + filter + window before writing SQL. Pro tip in an interview — when asked for \"revenue,\" ask back \"paid or booked? by when — order or ship date? at what grain?\" That one question signals you think in definitions, not just syntax. Use half-open date ranges (>= start AND < next-start) instead of BETWEEN to avoid the classic last-day, timestamp-boundary double-count.",
   viz:{columns:["definition part","this metric","the SQL that encodes it"], rows:[["Measure","revenue (dollars)","SUM(amount)"],["Filter","paid orders only","WHERE status = 'paid'"],["Time window","Q3 2024, by order date","order_date >= '07-01' AND < '10-01'"],["Grain","whole company","no GROUP BY"]]},
   quiz:{q:"Why use order_date >= '2024-07-01' AND order_date < '2024-10-01' instead of BETWEEN those two dates?", opts:["BETWEEN is slower on every modern database engine","Half-open ranges avoid a boundary double-count","BETWEEN cannot be used with date columns","There is no real difference between them"], ans:1, exp:"BETWEEN is inclusive on both ends, so a row timestamped exactly at the upper bound — or any time on that last day — can fall into two adjacent periods. A half-open range (>= start, < next start) puts every row in exactly one window, which is what makes period totals reconcile."},
   parsons:{prompt:"Arrange the query that defines Q3 paid revenue.",lines:["AND order_date < '2024-10-01';","WHERE status = 'paid'","SELECT SUM(amount) AS q3_paid_revenue","AND order_date >= '2024-07-01'","FROM orders"],answer:[2,4,1,3,0]},
   compare:"The filter (paid only), the time window (half-open, by order date), and the grain (no GROUP BY = whole company) are three separate decisions baked into this one query — change any one and 'revenue' means something different.",
   build:{q:"A stakeholder asks for 'Q3 revenue.' Before writing SQL, what's the single most important question to ask back?",opts:["Paid or booked, by what date field, and at what grain?","What font should the report use?","Which database server hosts the orders table?","How many rows does the orders table have?"],ans:0,exp:"'Revenue' is ambiguous until you pin down the measure (paid vs all orders), the time window (which date field, exact boundaries), and the grain (company-wide or by region). Asking that question up front is what separates a defensible number from a confident guess."},
   close:"A metric is a measure plus a filter plus a time window plus a grain. Pin down all four before you write SQL, and the query becomes the easy part.",
   unlock:"Half-open date ranges (>= start AND < next-start) aren't just a syntax preference — they're the only pattern that guarantees every row lands in exactly one period, which is what makes monthly or quarterly totals add up to the annual total without gaps or double-counts."},
  {id:602, unit:"Unit 5: From Question to Metric", title:"Segment Customers with CASE", sub:"Bucket rows into named groups, then aggregate per group.",
   story:"\"How many customers are high, medium, and low value?\" There is no value_tier column — you have to derive it. CASE turns a continuous number (lifetime spend) into named buckets, and grouping by that expression counts each bucket. This is segmentation, the move behind every \"customers by tier,\" \"orders by size band,\" or \"users by tenure\" breakdown a business asks for.",
   ral:{sql:"SELECT\n  CASE\n    WHEN lifetime_spend >= 1000 THEN 'High'\n    WHEN lifetime_spend >= 250  THEN 'Medium'\n    ELSE 'Low'\n  END AS tier,\n  COUNT(*)        AS customers,\n  SUM(lifetime_spend) AS revenue\nFROM customers\nGROUP BY 1\nORDER BY revenue DESC;", say:"Label each customer High, Medium, or Low by their lifetime spend, then count the customers and total the revenue inside each label.",
     lines:[["CASE WHEN … THEN … END AS tier","derive a named bucket from a number — the segmentation rule"],["WHEN >= 1000 … WHEN >= 250 … ELSE","ordered top-down; the first matching branch wins, so bands can't overlap"],["GROUP BY 1","group by that first expression (the tier) — one row out per bucket"],["COUNT(*), SUM(lifetime_spend)","the per-segment measures: how many, and how much"]]},
   notes:"CASE branches are evaluated in order and short-circuit, so list them high-threshold first — flip the order and everyone falls into the first loose band. GROUP BY 1 references the first SELECT expression, which keeps you from repeating the whole CASE. Interview-ready framing: segmentation is \"derive a dimension that doesn't exist in the table, then aggregate by it\" — the same pattern whether the buckets are spend tiers, age bands, or RFM scores.",
   viz:{columns:["Category","Customers by value tier"], rows:[["High","420"],["Medium","1,180"],["Low","2,640"]], caption:"Customers by value tier"},
   quiz:{q:"The CASE lists WHEN lifetime_spend >= 250 before WHEN lifetime_spend >= 1000. What happens?", opts:["The query errors on overlapping conditions","Everyone over 250 is labeled 'Medium'","High and Medium counts simply swap","Nothing changes — order is ignored"], ans:1, exp:"CASE returns the first branch that matches, top to bottom. A customer with 5,000 spend hits the >= 250 branch first and is tagged 'Medium' — the 'High' branch below never runs. Always order CASE thresholds from most to least restrictive."},
   parsons:{prompt:"Arrange the query that segments customers into spend tiers.",lines:["FROM customers","GROUP BY 1 ORDER BY revenue DESC;","WHEN lifetime_spend >= 1000 THEN 'High'","COUNT(*) AS customers, SUM(lifetime_spend) AS revenue","SELECT CASE","WHEN lifetime_spend >= 250 THEN 'Medium' ELSE 'Low' END AS tier,"],answer:[4,2,5,3,0,1]},
   compare:"CASE evaluates top to bottom and stops at the first match, so thresholds must be ordered highest first — list >= 250 before >= 1000 and every high-value customer gets caught by the looser branch first.",
   build:{q:"You need to bucket orders into 'Large' (>= $500), 'Medium' (>= $100), and 'Small'. Which CASE ordering is correct?",opts:["WHEN amount >= 500 THEN 'Large' WHEN amount >= 100 THEN 'Medium' ELSE 'Small'","WHEN amount >= 100 THEN 'Medium' WHEN amount >= 500 THEN 'Large' ELSE 'Small'","WHEN amount >= 0 THEN 'Small' WHEN amount >= 100 THEN 'Medium' WHEN amount >= 500 THEN 'Large'","Order doesn't matter as long as all three branches are present"],ans:0,exp:"CASE returns the first matching branch. Listing the highest threshold first (>= 500) ensures a $600 order is caught as 'Large' before it ever reaches the looser >= 100 check. Reverse the order and every large order gets mislabeled 'Medium'."},
   close:"You just derived a dimension — value tier — that doesn't exist as a column anywhere in the table, then aggregated by it. That's segmentation, and it's the same move behind every 'customers by X' breakdown a business asks for.",
   unlock:"GROUP BY 1 references the first SELECT expression by position instead of repeating the whole CASE — handy here, but fragile: if you ever reorder the SELECT list, GROUP BY 1 silently groups by the wrong thing. Many analysts prefer naming the alias in GROUP BY when the database allows it."},
  {id:603, unit:"Unit 5: From Question to Metric", title:"Month-over-Month Growth with LAG", sub:"Compare each period to the one before it, in one pass.",
   story:"\"Are we growing?\" needs each month set next to the month before it. The clumsy way is a self-join; the analyst way is LAG — a window function that reaches back a row to pull the previous month's value into the current row. With the prior value in hand, the growth rate is just arithmetic. Period-over-period is the most-asked metric in any business review, and LAG is how you produce it.",
   ral:{sql:"SELECT\n  month,\n  revenue,\n  LAG(revenue) OVER (ORDER BY month) AS prev,\n  ROUND(100.0 * (revenue - LAG(revenue) OVER (ORDER BY month))\n        / LAG(revenue) OVER (ORDER BY month), 1) AS mom_pct\nFROM monthly_revenue\nORDER BY month;", say:"For each month, look back one row to grab the previous month's revenue, then express the change as a percentage of that previous month.",
     lines:[["LAG(revenue) OVER (ORDER BY month)","pull the value from the previous row, in month order — no self-join"],["revenue - prev","the absolute change month over month"],["100.0 * change / prev","express it as a percent of the prior month; 100.0 forces decimal division"],["first row's prev is NULL","there's nothing before month one, so its growth is undefined"]]},
   notes:"LAG(col) OVER (ORDER BY ...) is the period-over-period workhorse; LEAD looks forward. Two interview traps: the earliest period has a NULL prior (guard it or expect a blank), and integer division silently floors — write 100.0 (not 100) so the percentage isn't truncated to zero. Same pattern gives you year-over-year by ordering on year, or week-over-week by ordering on week.",
   viz:{columns:["Period","Revenue ($K)"], rows:[["Jan",180],["Feb",196],["Mar",188],["Apr",214],["May",247],["Jun",268]], caption:"Monthly revenue"},
   quiz:{q:"A month-over-month percent built with 100 * (rev - prev) / prev returns 0 for clearly growing months. The fix?", opts:["Add a WHERE clause to drop the very first month","Use 100.0 so the division is decimal","Replace LAG with a slow correlated subquery","Sort the months in descending order"], ans:1, exp:"When every operand is an integer, SQL does integer division and truncates the fraction toward zero — a real 8% growth becomes 0. Forcing one operand to a decimal (100.0) makes the whole expression floating-point, so the percentage survives."},
   parsons:{prompt:"Arrange the query that computes month-over-month growth with LAG.",lines:["ORDER BY month;","ROUND(100.0 * (revenue - prev) / prev, 1) AS mom_pct","FROM monthly_revenue","SELECT month, revenue,","LAG(revenue) OVER (ORDER BY month) AS prev,"],answer:[3,4,1,2,0]},
   compare:"LAG reaches back one row in month order with no self-join required. The first month has no prior row, so its prev is NULL and its growth rate is undefined — that's expected, not a bug.",
   build:{q:"A month-over-month growth query returns 0.0% for several months you know are growing. The formula is 100 * (revenue - prev) / prev. What's wrong?",opts:["All operands are integers, so the division truncates — needs 100.0","LAG should be replaced with LEAD","The ORDER BY is missing from the OVER clause","prev should be compared with a CASE statement"],ans:0,exp:"When every value in the expression is an integer, SQL performs integer division and truncates the fractional part — a true 8% growth rate becomes 0. Writing 100.0 instead of 100 forces decimal division so the real percentage survives."},
   close:"LAG pulls last period's value into the current row without a self-join — the single function behind every month-over-month, week-over-week, or year-over-year comparison you'll be asked to build.",
   unlock:"LAG takes an optional offset and default: LAG(revenue, 1, 0) OVER (...) reaches back one row and returns 0 instead of NULL when there's nothing before it — useful when you'd rather show 0% growth than a blank for the first period."},
  {id:604, unit:"Unit 5: From Question to Metric", title:"Running Totals with a Window Frame", sub:"Accumulate a measure across ordered rows — cumulative, MTD, YTD.",
   story:"A revenue chart shows each month in isolation; the business wants the line that climbs — total raised so far, cumulative through today. SUM() as a window function with an ORDER BY adds up every row from the start through the current one, giving a running total without collapsing the rows. It is how you build cumulative revenue, year-to-date, and \"progress toward goal\" lines.",
   ral:{sql:"SELECT\n  month,\n  revenue,\n  SUM(revenue) OVER (\n    ORDER BY month\n    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW\n  ) AS running_total\nFROM monthly_revenue\nORDER BY month;", say:"Keep each month's own revenue, and beside it carry a sum of every month from the first one through this one — the cumulative total to date.",
     lines:[["SUM(revenue) OVER (ORDER BY month …)","a windowed sum — aggregates without collapsing rows the way GROUP BY would"],["ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW","the frame: everything from the start up to and including this row"],["row stays, total accumulates","you still get one line per month, now with a climbing total"],["partition for per-group resets","add PARTITION BY year to restart the running total each year (YTD)"]]},
   notes:"A window aggregate keeps the detail rows and adds a calculated column — that's the difference from GROUP BY, which collapses them. The frame clause (ROWS BETWEEN …) is what makes it a running total rather than a grand total on every row; the explicit UNBOUNDED PRECEDING → CURRENT ROW also dodges a subtle default-frame gotcha when there are duplicate sort keys. Add PARTITION BY year to get year-to-date that resets each January — the standard \"progress against an annual goal\" line.",
   viz:{columns:["Period","Running total ($K)"], rows:[["Jan",180],["Feb",376],["Mar",564],["Apr",778],["May",1025],["Jun",1293]], caption:"Cumulative revenue to date"},
   quiz:{q:"How does SUM(revenue) OVER (ORDER BY month) differ from SUM(revenue) with GROUP BY month?", opts:["It keeps every row and adds a running total","It is just a slower way to write the same thing","It returns only the single grand total","It requires a primary key to work"], ans:0, exp:"Picture a bank statement: every transaction stays listed, with the running balance printed beside each one. GROUP BY would collapse the rows into one total per month; the window version leaves all the detail rows in place and attaches an accumulating sum alongside each — which is exactly what a cumulative or year-to-date line needs."},
   parsons:{prompt:"Arrange the query that builds a running total with a window frame.",lines:["FROM monthly_revenue","ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) AS running_total","ORDER BY month;","SELECT month, revenue,","SUM(revenue) OVER (ORDER BY month"],answer:[3,4,1,0,2]},
   compare:"GROUP BY collapses rows into one per group; a window SUM keeps every detail row and attaches an accumulating total alongside it — that's the whole difference, and it's why running totals need OVER, not GROUP BY.",
   build:{q:"You want year-to-date revenue that resets to 0 each January instead of accumulating across years forever. What do you add to the window function?",opts:["PARTITION BY year","GROUP BY year","WHERE year = CURRENT_YEAR","HAVING year = CURRENT_YEAR"],ans:0,exp:"PARTITION BY restarts the window's calculation within each group while still keeping every row — adding PARTITION BY year makes the running total reset at the start of each year, giving you true year-to-date instead of an all-time cumulative."},
   close:"A windowed SUM with an ORDER BY accumulates down the rows without collapsing them — the exact shape behind every cumulative-revenue or progress-to-goal line a dashboard shows.",
   unlock:"The frame clause has more options than ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW — swap to a fixed window like ROWS BETWEEN 2 PRECEDING AND CURRENT ROW for a rolling 3-period average instead of an all-time running total."},
  {id:605, unit:"Unit 5: From Question to Metric", title:"Funnel Conversion with Conditional Counts", sub:"Count distinct users at each step, then divide to get rates.",
   story:"Product asks: \"Of everyone who visited, how many signed up, activated, and paid?\" That is a funnel — counts that shrink at each stage, and the rates between them. You count distinct users who reached each step using conditional aggregation (COUNT of a CASE), all in one scan of an events table, then the conversion rate is one step over the previous. This single query answers most \"where are we losing people?\" questions.",
   ral:{sql:"SELECT\n  COUNT(DISTINCT user_id) AS visited,\n  COUNT(DISTINCT CASE WHEN step IN ('signup','activate','pay')\n        THEN user_id END) AS signed_up,\n  COUNT(DISTINCT CASE WHEN step IN ('activate','pay')\n        THEN user_id END) AS activated,\n  COUNT(DISTINCT CASE WHEN step = 'pay'\n        THEN user_id END) AS paid\nFROM events;", say:"In one pass over the events, count the distinct users who reached each stage — everyone who visited, then those who signed up or deeper, then activated or deeper, then paid.",
     lines:[["COUNT(DISTINCT user_id)","the top of the funnel — every unique visitor"],["COUNT(DISTINCT CASE WHEN … THEN user_id END)","count a user only if they reached this step or beyond — conditional aggregation"],["step IN ('activate','pay')","\"this stage or deeper\" so the funnel is monotonic — each level ⊆ the one above"],["rate = step / previous step","divide adjacent counts for the conversion between stages"]]},
   notes:"Conditional aggregation — COUNT/SUM wrapped around a CASE — pivots an event log into stage columns in a single scan, far cheaper than four separate queries joined together. The key correctness rule: each stage's condition must include all deeper stages ('activate' OR 'pay'), or a user who skipped straight to paying drops out of the middle and your funnel stops being monotonic. Conversion rate is just adjacent columns divided; the biggest drop-off is where you focus.",
   viz:{columns:["Category","Signup funnel (distinct users)"], rows:[["Visited","12,000"],["Signed up","4,200 · 35%"],["Activated","2,100 · 50%"],["Paid","760 · 36%"]], caption:"Signup funnel (distinct users)"},
   quiz:{q:"Why does the 'activated' count use step IN ('activate','pay') rather than step = 'activate'?", opts:["To make the query run faster","So users who paid still count as activated","Because = cannot be used on text-type columns","It is only a stylistic preference"], ans:1, exp:"A funnel must be monotonic: anyone who paid necessarily passed activation, even if no explicit 'activate' event was logged. Counting only step = 'activate' would exclude paying users from the activated stage, making a later stage look larger than an earlier one — a broken funnel."},
   parsons:{prompt:"Arrange the query that builds a signup funnel with conditional counts.",lines:["FROM events;","COUNT(DISTINCT CASE WHEN step = 'pay' THEN user_id END) AS paid","COUNT(DISTINCT CASE WHEN step IN ('activate','pay') THEN user_id END) AS activated,","SELECT COUNT(DISTINCT user_id) AS visited,","COUNT(DISTINCT CASE WHEN step IN ('signup','activate','pay') THEN user_id END) AS signed_up,"],answer:[3,4,2,1,0]},
   compare:"Each stage's CASE condition must include every deeper stage too — 'activate' OR 'pay' — or a user who jumped straight to paying falls out of the middle of the funnel and the counts stop being monotonic.",
   build:{q:"Your activated-stage count uses step = 'activate' instead of step IN ('activate','pay'). What breaks?",opts:["Users who paid without a separate 'activate' event vanish from the activated count","The query throws a syntax error","The paid count becomes too high","Nothing — the two conditions are equivalent"],ans:0,exp:"A funnel must be monotonic — every stage should include everyone who reached deeper stages too. step = 'activate' alone misses users who paid without logging a distinct activate event, making the activated count too low and possibly smaller than the paid count below it, which is a broken funnel."},
   close:"One scan of an events table, four conditional counts, and you have the entire funnel — visited, signed up, activated, paid — ready to divide into conversion rates.",
   unlock:"Conditional aggregation (COUNT/SUM wrapped in a CASE) isn't just for funnels — it's the same pattern that pivots any event log or transaction table into stage, status, or category columns in one pass instead of four separate queries."},
  {id:606, unit:"Unit 5: From Question to Metric", title:"Cohort Retention", sub:"Group users by when they joined, then track who comes back.",
   story:"Growth can hide churn: you add users every month while older ones quietly leave. Cohort analysis catches it. The source is a <code>cohort_activity</code> table — one row per user per period, with columns <code>user_id</code>, <code>cohort_month</code> (their signup month), and <code>months_since_signup</code> (0 in the month they joined, 1 a month later). You stamp each user with their cohort, then measure how many are still active at each offset. Reading down a column tells you whether retention is improving for newer cohorts — the question every subscription and product business lives or dies on. This is the capstone: a derived dimension, a time offset, and a rate, together.",
   ral:{sql:"WITH cohort_counts AS (\n  SELECT\n    cohort_month,\n    months_since_signup,\n    COUNT(DISTINCT user_id) AS active\n  FROM cohort_activity\n  GROUP BY cohort_month, months_since_signup\n)\nSELECT\n  cohort_month,\n  months_since_signup,\n  active,\n  ROUND(100.0 * active\n        / FIRST_VALUE(active) OVER (\n            PARTITION BY cohort_month\n            ORDER BY months_since_signup\n          ), 1) AS retention_pct\nFROM cohort_counts\nORDER BY cohort_month, months_since_signup;", say:"For each signup cohort and each month after they joined, count who is still active, and divide by that cohort's starting size to get the percent retained.",
     lines:[["cohort_month","the derived dimension: the month a user first signed up — their cohort"],["months_since_signup","the time offset: 0 at join, 1 a month later, and so on"],["WITH cohort_counts AS (…)","CTE that aggregates first — required so FIRST_VALUE can reference the computed count"],["active / FIRST_VALUE(active) OVER (…)","divide each month's active count by the cohort's month-0 size to get the retention rate"]]},
   notes:"Cohorting is segmentation by start date plus a time offset — the same \"derive a dimension, then aggregate\" muscle from the CASE lesson, now across time. Always normalize to each cohort's own month-0 size, or a big cohort and a small one aren't comparable. Read a retention table two ways: across a row to see one cohort decay, and down a column (same months-since) to see whether newer cohorts retain better than older ones — that diagonal-vs-vertical read is the insight interviewers look for.",
   viz:{columns:["cohort","month 0","month 1","month 2","month 3"], rows:[["Jan","100%","62%","48%","41%"],["Feb","100%","66%","53%","47%"],["Mar","100%","71%","59%","—"],["Apr","100%","74%","—","—"]]},
   quiz:{q:"In a retention table, newer cohorts (Mar, Apr) show higher month-1 retention than older ones (Jan). What does that suggest?", opts:["Nothing — cohorts are never comparable","Retention is improving for newer users","The older cohorts must be miscounted","Total user count is going down"], ans:1, exp:"Reading down the month-1 column holds the time-since-signup constant, so the cohorts are directly comparable. Rising values for later signup months mean each new cohort is sticking around better than the last — onboarding or product changes are working."},
   parsons:{prompt:"Arrange the CTE-and-window query that computes cohort retention.",lines:["FROM cohort_counts ORDER BY cohort_month, months_since_signup;","PARTITION BY cohort_month ORDER BY months_since_signup ), 1) AS retention_pct","FROM cohort_activity GROUP BY cohort_month, months_since_signup )","WITH cohort_counts AS ( SELECT cohort_month, months_since_signup, COUNT(DISTINCT user_id) AS active","SELECT cohort_month, months_since_signup, active,","ROUND(100.0 * active / FIRST_VALUE(active) OVER ("],answer:[3,2,4,5,1,0]},
   compare:"Reading across a row shows one cohort decaying over time; reading down a column (same months-since-signup) holds time constant and shows whether newer cohorts retain better than older ones — that vertical read is the real insight.",
   build:{q:"You want each cohort's retention normalized to its own starting size, not a fixed number. Which window function gets you the 'month 0' value to divide by?",opts:["FIRST_VALUE(active) OVER (PARTITION BY cohort_month ORDER BY months_since_signup)","LAG(active) OVER (ORDER BY months_since_signup)","SUM(active) OVER (PARTITION BY cohort_month)","COUNT(active) OVER ()"],ans:0,exp:"FIRST_VALUE partitioned by cohort and ordered by months-since-signup returns each cohort's own month-0 count on every row of that cohort, so dividing by it normalizes retention to that cohort's actual starting size instead of a one-size-fits-all denominator."},
   close:"Cohorting is segmentation by signup date plus a time offset — the same 'derive a dimension, then aggregate' instinct from the CASE lesson, now stretched across time. This is the capstone pattern of the unit.",
   unlock:"The diagonal read matters too: tracing a fixed cohort_month down through increasing months_since_signup shows decay; tracing a fixed months_since_signup across cohort_month shows whether retention is improving release over release. Interviewers who ask about cohorts are usually listening for which read you reach for first."},
  {id:701, unit:"Unit 6: Financial Analysis", title:"Build the P&L from the Ledger", sub:"Pivot a general ledger into an income statement with conditional sums.",
   story:"Finance hands you a ledger: thousands of rows, each tagged with a statement line — Revenue, COGS, Operating Expense. They want an income statement: revenue at the top, cost of goods subtracted to gross profit, operating expense subtracted to operating income. You don't loop or run a query per line — one pass with conditional aggregation pivots the long ledger into the cascade. This is the move behind every P&L an analyst ever assembles from raw transactions.",
   ral:{sql:"SELECT\n  SUM(CASE WHEN line = 'Revenue' THEN amount ELSE 0 END) AS revenue,\n  SUM(CASE WHEN line = 'COGS'    THEN amount ELSE 0 END) AS cogs,\n  SUM(CASE WHEN line = 'Revenue' THEN amount\n           WHEN line = 'COGS'    THEN -amount\n           ELSE 0 END)                                  AS gross_profit\nFROM ledger\nWHERE fiscal_year = 2024;", say:"Total each account group into its own statement line in one pass, signing costs negative, so revenue, cost of goods, and gross profit come out side by side.",
     lines:[["SUM(CASE WHEN line = 'Revenue' THEN amount ELSE 0 END)","conditional aggregation — count a row toward this line only if it belongs to it"],["WHEN 'COGS' THEN -amount","sign the cost negative so the same SUM nets to gross profit (revenue − COGS)"],["ELSE 0","never leave it NULL — a single NULL would make the whole SUM return NULL"],["one scan, many lines","the P&L is just the ledger pivoted by account — not one query per line"]]},
   notes:"An income statement is a cascade: revenue − COGS = gross profit, − operating expense = operating income, − interest & tax = net income. Each subtotal isolates a different question — gross profit is production and pricing efficiency, operating income is the core business before financing. Interview-ready framing: 'a P&L is the ledger pivoted by statement line and cascaded into subtotals.' The conditional-sum pattern (SUM around a CASE) is the same one that builds a funnel or any pivot — learn it once, reuse it everywhere.",
   viz:{columns:["Step","Amount"], rows:[["Revenue","$4.0M"],["COGS","−1.6"],["Gross profit","$2.4M"],["Opex","−1.5"],["Operating income","$0.9M"]], caption:"The grey anchors are subtotals; the red bars are costs subtracting from the line above. The ledger's thousands of rows collapse into this five-step cascade with one conditional-sum query."},
   quiz:{q:"Why does the gross-profit expression use THEN -amount for COGS rows instead of a second SUM?", opts:["COGS rows are stored as negative numbers already","So one SUM nets revenue minus cost directly","SUM cannot add a column to itself twice","CASE is required before any aggregate function"], ans:1, exp:"Gross profit is revenue minus COGS. Signing the cost rows negative inside one CASE lets a single SUM net them together in the same pass, instead of computing two totals and subtracting them afterward. Same scan, fewer moving parts."},
   parsons:{prompt:"Arrange the query that pivots the ledger into revenue and COGS lines.",lines:["WHERE fiscal_year = 2024;","SUM(CASE WHEN line = 'COGS' THEN amount ELSE 0 END) AS cogs","FROM ledger","SELECT","SUM(CASE WHEN line = 'Revenue' THEN amount ELSE 0 END) AS revenue,"],answer:[3,4,1,2,0]},
