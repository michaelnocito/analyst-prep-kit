   compare:"Signing COGS rows negative inside one CASE lets a single SUM net revenue and cost together — gross profit comes out of the same scan instead of two separate totals subtracted afterward.",
   build:{q:"You're pivoting a ledger into an opex line: SUM(CASE WHEN line = 'OpEx' THEN amount END). Why is this risky without an ELSE 0?",opts:["A row that doesn't match returns NULL, and combining several such CASE-based SUMs in one arithmetic expression can produce a NULL total","The query will not run at all without ELSE","SUM cannot be used inside a CASE expression","OpEx rows will be double-counted"],ans:0,exp:"SUM does ignore NULLs safely on its own — but the real danger shows up when you combine several CASE-based SUMs in one arithmetic expression, like the gross-profit cascade. There, a single NULL anywhere breaks the whole expression. ELSE 0 is the safe default once you start combining conditional sums."},
   close:"A P&L is just the ledger pivoted by statement line and cascaded into subtotals — revenue minus COGS minus opex. One conditional-sum query, the whole income statement.",
   unlock:"The same conditional-sum shape that builds a P&L also builds any pivot: stage funnels, status breakdowns, region columns. Learn 'SUM wrapped around a CASE' once and it shows up in half the analyst questions you'll ever get."},
  {id:702, unit:"Unit 6: Financial Analysis", title:"Margins: Gross, Operating, Net", sub:"Normalize each profit line to revenue so you can compare across size and time.",
   story:"Two companies both book $4M in revenue. One keeps 22¢ of every dollar; the other keeps 6¢. Raw profit dollars hide that — a margin doesn't. A margin is a profit line divided by revenue, expressed as a percent, and it's how analysts compare a business to its past, its plan, and its peers regardless of size. The three that matter most strip out more cost at each step.",
   ral:{sql:"SELECT\n  ROUND(100.0 * gross_profit     / revenue, 1) AS gross_margin_pct,\n  ROUND(100.0 * operating_income / revenue, 1) AS operating_margin_pct,\n  ROUND(100.0 * net_income       / revenue, 1) AS net_margin_pct\nFROM income_statement\nWHERE fiscal_year = 2024;", say:"Divide each profit line by revenue to get the cents of profit kept per sales dollar — gross at the top, then operating, then net after everything.",
     lines:[["gross_profit / revenue","gross margin — efficiency of making the product (price vs cost of goods)"],["operating_income / revenue","operating margin — profitability of running the core business, before financing & tax"],["net_income / revenue","net margin — what's left after every cost, including interest and tax"],["100.0 * …","force decimal division — plain 100 would integer-truncate the percent to 0"]]},
   notes:"Each margin removes one more layer of cost, so they always step down: gross ≥ operating ≥ net. Gross margin moves on pricing and input costs; operating margin moves on overhead and efficiency; net margin moves on debt load and tax. A margin alone says nothing — read it against last year, against the budget, and against the industry (a grocer lives on 2% net, software on 25%). The integer-division trap (use 100.0) bites here exactly as it does in growth math.",
   viz:{columns:["Category","2024 margins (% of revenue)"], rows:[["Gross","60%"],["Operating","22%"],["Net","14%"]], caption:"2024 margins (% of revenue)"},
   quiz:{q:"A company's gross margin is healthy but its net margin is near zero. Where is the profit going?", opts:["Into the cost of producing each unit sold","To overhead, interest, and tax below the line","Nowhere — the two margins must always match","Into revenue that has not yet been collected"], ans:1, exp:"A healthy gross margin means the product itself is profitable. If net margin collapses anyway, the money is being eaten between gross profit and the bottom line — operating overhead, interest on debt, and taxes. The margin cascade points you straight at which layer to investigate."},
   parsons:{prompt:"Arrange the query that computes gross, operating, and net margin.",lines:["WHERE fiscal_year = 2024;","ROUND(100.0 * net_income / revenue, 1) AS net_margin_pct","FROM income_statement","SELECT","ROUND(100.0 * gross_profit / revenue, 1) AS gross_margin_pct,","ROUND(100.0 * operating_income / revenue, 1) AS operating_margin_pct,"],answer:[3,4,5,1,2,0]},
   compare:"Each margin strips out one more layer of cost, so they always step down in order: gross ≥ operating ≥ net. A margin alone means nothing — read it against last year, the budget, or the industry peer.",
   build:{q:"Two companies both report 60% gross margin. Company A has 22% net margin; Company B has 4%. Where should you look next?",opts:["Operating expenses, interest, and tax — the layers below gross profit","Revenue recognition policy — gross margin must be miscalculated","Nothing — equal gross margin means the companies are equally healthy","The unit price each company charges customers"],ans:0,exp:"Equal gross margin means the product economics are similar — pricing versus cost of goods. The gap opens up below that: operating overhead, debt-driven interest, and tax. Same gross margin with very different net margin always points you down the cascade, not back up to revenue or COGS."},
   close:"Three margins, one query — gross for product economics, operating for the core business, net for everything including financing and tax. The cascade tells you which layer to investigate when profit falls short.",
   unlock:"Margins only mean something next to a benchmark. A 2% net margin is healthy for a grocery chain and alarming for a software company — always read a margin against its own industry, not a universal threshold."},
  {id:703, unit:"Unit 6: Financial Analysis", title:"Liquidity & Leverage Ratios", sub:"The balance-sheet checks: can you pay the bills, and how much is borrowed?",
   story:"The income statement says whether you're profitable; the balance sheet says whether you'll survive the quarter. Two questions decide it. Liquidity: can you cover what's due soon with what you can turn to cash soon? Leverage: how much of the company is financed by debt versus owned outright? Three ratios answer both, and every credit analyst and CFO reads them first.",
   ral:{sql:"SELECT\n  ROUND(current_assets / current_liabilities, 2)                AS current_ratio,\n  ROUND((current_assets - inventory) / current_liabilities, 2)  AS quick_ratio,\n  ROUND(total_debt / total_equity, 2)                           AS debt_to_equity\nFROM balance_sheet\nWHERE as_of = '2024-12-31';", say:"Compare what you own to what you owe — current assets over current liabilities for liquidity, the same without inventory for the stricter test, and debt over equity for leverage.",
     lines:[["current_assets / current_liabilities","current ratio — above 1.0 means short-term assets cover short-term bills"],["(current_assets − inventory) / current_liabilities","quick ratio — drops inventory, the slowest current asset to turn to cash"],["total_debt / total_equity","debt-to-equity — how many dollars are borrowed for each dollar owned"],["ROUND(…, 2)","ratios are read to two decimals — 1.8, not 1.83274"]]},
   notes:"A ratio means nothing without a benchmark. A current ratio near 1.5–3 is comfortable for most industries; far above that can mean idle cash earning nothing. The quick ratio is the stress test — if inventory is hard to sell, can you still pay? Debt-to-equity above roughly 2 signals heavy financing risk for most non-financial firms, though capital-intensive industries run higher. Always compare to the same company over time and to peers in the same sector.",
   viz:{columns:["ratio","value","healthy range","read"], rows:[["Current ratio","1.80","1.5 – 3.0","Comfortable"],["Quick ratio","1.10","≥ 1.0","Covers bills without inventory"],["Debt-to-equity","0.70","< 2.0","Modestly leveraged"]], caption:"Each ratio is read against a benchmark, not in isolation. The quick ratio strips inventory out of the current ratio to ask the harder question: could you pay if nothing on the shelf sold?"},
   quiz:{q:"Why does the quick ratio subtract inventory from current assets?", opts:["Inventory is recorded on a separate statement","Inventory is the slowest asset to turn to cash","Inventory always loses value over a quarter","Including it would double-count current assets"], ans:1, exp:"The quick ratio is the stricter liquidity test. Inventory can take weeks or months to sell and collect on, so removing it asks whether the company could meet its short-term obligations from cash and receivables alone — the assets it could realize quickly."},
   parsons:{prompt:"Arrange the query that computes liquidity and leverage ratios.",lines:["WHERE as_of = '2024-12-31';","ROUND(total_debt / total_equity, 2) AS debt_to_equity","FROM balance_sheet","SELECT","ROUND(current_assets / current_liabilities, 2) AS current_ratio,","ROUND((current_assets - inventory) / current_liabilities, 2) AS quick_ratio,"],answer:[3,4,5,1,2,0]},
   compare:"The quick ratio is the current ratio's stricter sibling — subtracting inventory asks whether the company could pay its near-term bills even if nothing on the shelf sold this month.",
   build:{q:"A company's current ratio is 2.4 but its quick ratio is only 0.6. What does that gap most likely mean?",opts:["A large share of current assets is tied up in inventory that may be slow to sell","The company has no current liabilities","The two ratios were calculated using different time periods","The company is debt-free"],ans:0,exp:"The only difference between the two ratios is inventory in the numerator. A current ratio that looks healthy but collapses once inventory is removed means most of those 'current assets' are inventory sitting on shelves, not cash or receivables the company could quickly turn into payments."},
   close:"Three ratios from one balance sheet — can you cover near-term bills, can you cover them without selling inventory, and how much of the company is borrowed. Read each against a benchmark, never alone.",
   unlock:"Debt-to-equity above roughly 2.0 is a flag for most non-financial companies, but capital-intensive industries (utilities, airlines, manufacturing) routinely run higher and it's normal there — always compare leverage within the same sector, not against a universal cutoff."},
  {id:704, unit:"Unit 6: Financial Analysis", title:"Time Value of Money: NPV", sub:"Discount a stream of future cash flows back to today's dollars.",
   story:"A project costs $500K up front and returns cash over five years. Should you fund it? You can't just add the inflows — a dollar arriving in year 5 is worth less than a dollar today, because today's dollar could be invested. Net present value discounts every future cash flow back to the present with a rate that reflects your required return, then sums the stream. Positive NPV means the project beats the hurdle; negative means it destroys value.",
   ral:{sql:"SELECT\n  ROUND(SUM(cash_flow / POWER(1 + 0.10, year)), 0) AS npv\nFROM project_cash_flows\nWHERE project = 'Line Expansion';\n-- year 0 = -500000 (upfront), years 1..5 = inflows; rate = 10%", say:"Divide each year's cash flow by one-plus-the-rate raised to that year, then add the discounted stream — the result is the project's value in today's dollars.",
     lines:[["POWER(1 + 0.10, year)","the discount factor — grows with the year, shrinking far-off cash flows more"],["cash_flow / factor","each year's cash flow restated in today's dollars (its present value)"],["year 0 ÷ POWER(…,0) = ÷1","the upfront cost isn't discounted — it's already in today's dollars"],["SUM(…) > 0","positive net present value means the stream clears the required return"]]},
   notes:"The discount rate is your required return — the cost of capital or the return you'd get on a comparable investment. A higher rate punishes distant cash flows harder, so risky long-dated projects need bigger payoffs to clear. The decision rule is simple: NPV > 0, accept. IRR is the cousin metric — the rate that makes NPV exactly zero — but it needs iteration to solve, which SQL doesn't do cleanly, so NPV at a chosen hurdle is the SQL-native call. Always state the rate you used; the same cash flows flip from accept to reject as it changes.",
   viz:{columns:["year","cash flow","factor (10%)","present value"], rows:[["0","−500,000","1.00","−500,000"],["1","150,000","1.10","136,364"],["2","160,000","1.21","132,231"],["3","170,000","1.33","127,724"],["4","180,000","1.46","122,940"],["5","190,000","1.61","117,971"]], caption:"Each inflow is divided by its discount factor to land in today's dollars. Summing the present-value column gives NPV ≈ +$137,230 — positive, so the project clears the 10% hurdle."},
   quiz:{q:"A project's NPV at a 10% discount rate is +$137,000. What does that tell you?", opts:["The project returns exactly 10% per year","It earns more than the 10% required return","It will pay back the cost within ten years","Its cash flows are larger every single year"], ans:1, exp:"A positive NPV at a given discount rate means the project's discounted cash flows more than cover the upfront cost at that required return — it creates value above the 10% hurdle. The rate at which NPV would hit exactly zero is the IRR, which here is above 10%."},
   parsons:{prompt:"Arrange the query that discounts a cash-flow stream to net present value.",lines:["WHERE project = 'Line Expansion';","FROM project_cash_flows","SELECT","ROUND(SUM(cash_flow / POWER(1 + 0.10, year)), 0) AS npv"],answer:[2,3,1,0]},
   compare:"POWER(1 + rate, year) is the discount factor — it grows with the year, so cash flows further in the future get divided down harder. Year 0's upfront cost divides by 1 (POWER(...,0)) and isn't discounted at all.",
   build:{q:"You raise the discount rate from 10% to 15% on the same project cash flows. What happens to NPV?",opts:["It decreases — a higher rate shrinks future cash flows more","It increases — a higher rate always boosts NPV","It stays exactly the same","It becomes impossible to calculate"],ans:0,exp:"A higher discount rate divides future cash flows by a larger factor, shrinking their present value more. Distant cash flows take the biggest hit. NPV falls as the rate rises — which is why riskier projects, discounted at a higher required return, need bigger raw payoffs to still clear zero."},
   close:"Discounting every future cash flow back to today's dollars and summing them is how you compare a project's value against its cost in one number. Positive NPV at your required return — fund it. Negative — it destroys value.",
   unlock:"NPV needs a rate you choose; IRR is the rate that makes NPV exactly zero, and it's solved by iteration — something SQL doesn't do natively. In practice analysts run NPV at the company's known hurdle rate and leave IRR to a spreadsheet or BI tool that can iterate."},
  {id:705, unit:"Unit 6: Financial Analysis", title:"Budget vs Actual: Variance Analysis", sub:"The FP&A heartbeat — and the favorable/unfavorable sign trap.",
   story:"Every month, FP&A puts plan next to reality: what we budgeted versus what actually happened. The gap is the variance, and the whole conversation hangs on whether it's favorable or unfavorable. Here's the trap that catches juniors: the sign flips by line type. Beating the plan on revenue is good; beating it on cost is bad. A raw dollar variance without that judgment is only half an answer.",
   ral:{sql:"SELECT\n  a.line,\n  b.budget,\n  a.actual,\n  a.actual - b.budget                                AS variance,\n  ROUND(100.0 * (a.actual - b.budget) / b.budget, 1) AS variance_pct,\n  CASE\n    WHEN a.line_type = 'revenue' AND a.actual >= b.budget THEN 'Favorable'\n    WHEN a.line_type = 'cost'    AND a.actual <= b.budget THEN 'Favorable'\n    ELSE 'Unfavorable'\n  END AS verdict\nFROM actuals a\nJOIN budget b ON a.line = b.line\nWHERE a.period = '2024-Q4';", say:"Join each actual to its budget, take the difference for the variance, scale it to a percent, then label it favorable or unfavorable depending on whether the line is revenue or cost.",
     lines:[["a.actual − b.budget","the dollar variance — what reality did versus the plan"],["100.0 * variance / b.budget","percent variance — scales it so a $10K miss on $1M reads differently than on $20K"],["CASE … line_type = 'revenue' … 'cost' …","the verdict flips by line: revenue over plan is good, cost over plan is bad"],["JOIN budget ON line","line up each actual with its matching budgeted line before comparing"]]},
   notes:"A dollar variance with no favorable/unfavorable label is ambiguous — overspending and overearning are both 'positive' numbers, and only the line type tells them apart. Encode that judgment in the query so the report can't be misread. Then triage by materiality: chase variances that are big in both dollars and percent, not every small wiggle. This exact CASE-by-line-type is what an FP&A interviewer is listening for when they ask you to 'walk me through a variance report.'",
   viz:{columns:["line","budget","actual","variance","verdict"], rows:[["Revenue","1,000,000","1,080,000","+80,000","Favorable"],["COGS","400,000","445,000","+45,000","Unfavorable"],["Marketing","120,000","104,000","−16,000","Favorable"],["Headcount","260,000","290,000","+30,000","Unfavorable"]], caption:"Notice rows 1 and 2 both show a positive variance, yet one is favorable and one is not — revenue over plan is good, cost over plan is bad. The verdict column is the analyst's value-add over a raw subtraction."},
   quiz:{q:"Marketing spend came in $16K under budget. Why is that variance labeled favorable?", opts:["Any negative variance is always favorable","Spending under plan on a cost line saves money","Marketing is treated as a revenue line here","The percent variance happened to be small"], ans:1, exp:"On a cost line, coming in under budget means you spent less than planned, which is favorable. The sign of the dollar variance alone can't tell you that — the line type does. A negative variance is favorable for costs but unfavorable for revenue."},
   parsons:{prompt:"Arrange the query that joins actuals to budget and verdicts each variance.",lines:["FROM actuals a JOIN budget b ON a.line = b.line","WHERE a.period = '2024-Q4';","a.actual - b.budget AS variance,","CASE WHEN a.line_type = 'revenue' AND a.actual >= b.budget THEN 'Favorable'","SELECT a.line, b.budget, a.actual,","WHEN a.line_type = 'cost' AND a.actual <= b.budget THEN 'Favorable' ELSE 'Unfavorable' END AS verdict"],answer:[4,2,3,5,0,1]},
   compare:"A raw dollar variance is ambiguous on its own — overspending and overearning both show up as 'positive' numbers. The CASE on line_type is what turns a subtraction into a judgment: favorable or not depends on whether the line is revenue or cost.",
   build:{q:"Headcount actual spend is $30K over budget. Is that variance favorable or unfavorable?",opts:["Unfavorable — a cost line spending more than planned","Favorable — any positive variance is good","Neutral — only revenue variances get a verdict","It depends on which quarter it is"],ans:0,exp:"Headcount is a cost line. Spending $30K more than budgeted on a cost is unfavorable — the business spent more than planned. The same positive-dollar variance on a revenue line would be favorable. The sign alone never tells you which; the line type does."},
   close:"A dollar variance becomes a real verdict only once you encode whether the line is revenue or cost — that one CASE is what an FP&A interviewer is listening for when they ask you to walk through a variance report.",
   unlock:"After labeling favorable/unfavorable, triage by materiality — a $2K miss on a $2M line and a $2K miss on a $5K line are not equally urgent. Look at both the dollar variance and the percent variance together before deciding what's worth investigating."},
  {id:706, unit:"Unit 6: Financial Analysis", title:"Unit Economics: Contribution Margin & Break-Even", sub:"Does each sale make money, and how many sales cover the fixed base?",
   story:"Before the P&L nets out, ask the per-unit question: does one more sale make money after the costs that scale with it? Contribution margin is price minus variable cost — what each unit contributes toward fixed costs and profit. Divide the fixed costs by it and you get break-even: the volume where the business stops losing money. This is the model behind pricing, discount floors, and 'can we afford this promo?'",
   ral:{sql:"SELECT\n  price,\n  variable_cost,\n  price - variable_cost                             AS cm_per_unit,\n  ROUND(100.0 * (price - variable_cost) / price, 1) AS cm_ratio_pct,\n  CEIL(fixed_costs / (price - variable_cost))       AS breakeven_units\nFROM product_economics\nWHERE product = 'Pro Grinder';", say:"Subtract variable cost from price to get each unit's contribution, express it as a share of price, then divide the fixed costs by it to find how many units cover the fixed base.",
     lines:[["price − variable_cost","contribution margin per unit — what one sale adds toward fixed costs and profit"],["100.0 * cm / price","contribution-margin ratio — the contribution as a percent of price"],["fixed_costs / cm_per_unit","break-even units — how many sales it takes just to cover the fixed base"],["CEIL(…)","round up — you can't break even on a fraction of a unit"]]},
   notes:"The crucial split is fixed versus variable: only variable costs subtract in contribution margin, because only they scale with each unit. Fixed costs sit in the break-even denominator instead. Past break-even, every additional unit drops its full contribution margin straight to profit — that's operating leverage, and it's why high-fixed-cost businesses are scary below break-even and lucrative above it. Interview-ready: contribution margin answers 'should we take this order at this price?' — if price beats variable cost, the order still contributes.",
   viz:{columns:["Period","Revenue ($K)","Total cost ($K)"], rows:[["0",0,60],["200",40,84],["400",80,108],["600",120,132],["800",160,156],["1,000",200,180]], caption:"Break-even: total cost vs revenue"},
   quiz:{q:"Fixed costs are $60K and each unit contributes $150. What is break-even in units?", opts:["About 9,000 units, fixed times contribution","400 units — fixed costs over contribution","It cannot be found without the sale price","$60,000, the same as the fixed-cost base"], ans:1, exp:"Break-even units = fixed costs ÷ contribution margin per unit = 60,000 ÷ 150 = 400. Each unit throws off $150 toward the fixed base, so it takes 400 of them to cover $60,000; the 401st unit is the first to add profit."},
   parsons:{prompt:"Arrange the query that computes contribution margin and break-even units.",lines:["WHERE product = 'Pro Grinder';","CEIL(fixed_costs / (price - variable_cost)) AS breakeven_units","FROM product_economics","SELECT price, variable_cost,","price - variable_cost AS cm_per_unit,","ROUND(100.0 * (price - variable_cost) / price, 1) AS cm_ratio_pct,"],answer:[3,4,5,1,2,0]},
   compare:"Contribution margin only subtracts variable cost — the costs that scale with each unit. Fixed costs never enter that subtraction; they sit in the break-even denominator instead, because they don't change no matter how many units you sell.",
   build:{q:"A product's price is $40, variable cost is $25, and fixed costs are $30,000. How many units to break even?",opts:["2,000 units — fixed costs ÷ $15 contribution per unit","750 units — fixed costs ÷ price","1,200 units — fixed costs ÷ variable cost","It cannot be determined from this information"],ans:0,exp:"Contribution margin per unit is $40 − $25 = $15. Break-even units = fixed costs ÷ contribution margin = $30,000 ÷ $15 = 2,000. Each unit sold contributes $15 toward the fixed base; it takes 2,000 of them to cover it before any unit adds profit."},
   close:"Contribution margin answers the per-sale question — does this order make money after the costs that scale with it — and break-even tells you the volume where the business stops losing money. Both come from one split: fixed versus variable.",
   unlock:"Past break-even, every additional unit drops its full contribution margin straight to profit — that's operating leverage. It's why a high-fixed-cost business looks scary below break-even and very lucrative above it; the same unit economics, read at two different volumes."},
  {id:801, unit:"Unit 7: Advanced Analyst Toolkit", title:"Profile the Data First", sub:"Before you trust a table, measure its shape and health in one pass.",
   story:"You're handed a table you've never seen and asked for a number by end of day. The rookie move is to start querying. The analyst move is to profile first: how many rows, how complete is each column, how many distinct entities, what range do the dates cover? Five minutes of profiling catches the nulls, duplicates, and stale data that would otherwise poison every answer you build on top.",
   ral:{sql:"SELECT\n  COUNT(*)                     AS rows,\n  COUNT(email)                 AS email_filled,\n  COUNT(*) - COUNT(email)      AS email_nulls,\n  COUNT(DISTINCT customer_id)  AS distinct_customers,\n  MIN(order_date)              AS first_date,\n  MAX(order_date)              AS last_date\nFROM orders;", say:"Count the rows, count how many fill each column, count the distinct keys, and read the earliest and latest dates — one pass that tells you the size, completeness, and range of the table before you trust it.",
     lines:[["COUNT(*)","total rows — the size of what you're working with"],["COUNT(email) vs COUNT(*)","COUNT(column) skips NULLs, so COUNT(*) − COUNT(email) is the count of missing emails"],["COUNT(DISTINCT customer_id)","how many unique entities — compare to COUNT(*) to sense duplication"],["MIN / MAX(order_date)","the date range — surfaces stale data or impossible future dates"]]},
   notes:"Profiling is the cheap insurance every good analyst buys before analysis. The three things it catches: completeness (nulls you'd otherwise average over), uniqueness (duplicates that inflate every total), and range (dates or values outside what's plausible). COUNT(*) counts rows; COUNT(column) counts only non-null values in that column — the gap between them is your null count, no separate query needed. Many databases also expose this through a profiling tool, but knowing the SQL means you can profile anything, anywhere.",
   viz:{columns:["check","result","read"], rows:[["rows","48,210","table size"],["email nulls","1,902","~4% missing — handle before grouping by email"],["distinct customers","31,544","fewer than rows — repeat buyers exist"],["date range","2021-01 → 2024-12","4 full years, no future dates"]], caption:"One profiling query, four health checks. The distinct-customer count below the row count tells you a customer appears on many orders — critical to know before you COUNT(*) and call it 'customers'."},
   quiz:{q:"Why does COUNT(*) - COUNT(email) return the number of rows missing an email?", opts:["COUNT(email) counts only the rows where email is not null","COUNT(*) counts twice as fast as a column count","Subtracting any two counts gives the null total","COUNT(email) includes a row only when email is null"], ans:0, exp:"COUNT(*) counts every row, while COUNT(email) counts only rows where email is non-null. The difference is exactly the rows where email is NULL — the missing-email count, with no separate IS NULL query needed."},
   parsons:{prompt:"Arrange the query that profiles size, completeness, uniqueness, and range.",lines:["FROM orders;","COUNT(*) - COUNT(email) AS email_nulls,","MIN(order_date) AS first_date, MAX(order_date) AS last_date","SELECT COUNT(*) AS rows,","COUNT(DISTINCT customer_id) AS distinct_customers,","COUNT(email) AS email_filled,"],answer:[3,5,1,4,2,0]},
   compare:"Five minutes profiling — size, completeness, uniqueness, range — catches the nulls, duplicates, and stale dates that would otherwise poison every number you build on top, before you've written a single real query.",
   build:{q:"COUNT(*) on a table returns 50,000. COUNT(DISTINCT customer_id) returns 31,000. What should you check before you treat customer_id as a unique key?",opts:["Whether the table's grain is actually finer than one row per customer","Whether the table needs to be re-imported","Whether MIN/MAX dates are correct","Nothing — this gap is always expected and safe to ignore"],ans:0,exp:"Far fewer distinct customer_ids than total rows means customers repeat — the table likely holds one row per order or event, not one row per customer. Before joining or aggregating on customer_id as if it's unique, confirm what one row actually represents."},
   close:"One profiling query — size, completeness, uniqueness, range — is the cheap insurance every analyst buys before trusting a table they've never seen.",
   unlock:"Profile every table the first time you touch it, not just the ones that look suspicious — the tables that look clean are exactly where an unnoticed null rate or duplicate key does the most damage later."},
  {id:802, unit:"Unit 7: Advanced Analyst Toolkit", title:"Validate the Grain", sub:"Know exactly what one row represents before you sum anything.",
   story:"Every table has a grain — the thing one row represents. One row per order? Per order line? Per shipment? Get it wrong and every total is wrong: join a one-row-per-order table to a one-row-per-line table and your revenue silently doubles. Before you trust that a key is unique, test it. Group by the supposed key and look for any group that appears more than once.",
   ral:{sql:"SELECT order_id, COUNT(*) AS rows\nFROM order_lines\nGROUP BY order_id\nHAVING COUNT(*) > 1\nORDER BY rows DESC;", say:"Group by the column you believe is unique and keep only the groups that appear more than once — any rows that come back mean the grain is finer than you assumed.",
     lines:[["GROUP BY order_id","collapse the table to one row per supposed key"],["HAVING COUNT(*) > 1","keep only the keys that repeat — the duplicates"],["any rows returned","order_id is NOT one row per order here — the grain is finer"],["the fix","either dedupe, or carry the true grain (order_id + line_no) through every join"]]},
   notes:"Grain is the single most common source of silently wrong numbers. A query that returns zero rows confirms the key is unique at that grain; any rows returned tell you it isn't — and that joining on it will fan out and inflate every downstream SUM and COUNT. Establish the grain before you aggregate, and when you join, make sure you know the grain of both sides. This check closes the loop with the reconciliation lesson: a tie-out that's off by a clean multiple is almost always a grain problem.",
   viz:{columns:["order_id","rows","meaning"], rows:[["10455","3","3 line items — one row per line, not per order"],["10473","2","2 line items"],["10488","2","2 line items"]], caption:"The query was supposed to return nothing. It returned these — proof that order_id repeats, so the table's grain is the order LINE, not the order. SUM(amount) grouped by order_id would be fine; joining orders to this on order_id would double-count."},
   quiz:{q:"The grain-check query returns several rows. What has it just told you?", opts:["The table is empty and needs reloading","The supposed key repeats, so the grain is finer","Every order has exactly one line item","The GROUP BY clause referenced the wrong column"], ans:1, exp:"Rows come back only for keys that appear more than once. So order_id is not unique — the table holds multiple rows per order, meaning its true grain is finer (the order line). Joining another table on order_id would fan out and inflate totals."},
   parsons:{prompt:"Arrange the query that validates whether order_id is truly unique.",lines:["HAVING COUNT(*) > 1","ORDER BY rows DESC;","FROM order_lines","SELECT order_id, COUNT(*) AS rows","GROUP BY order_id"],answer:[3,2,4,0,1]},
   compare:"A grain-check query that returns zero rows confirms the key is unique. Any rows returned tell you the table holds more than one row per key — and joining on that key elsewhere will fan out and inflate every downstream total.",
   build:{q:"You run a grain-check on customer_id in a customers table and it returns several rows. What should you conclude?",opts:["customer_id repeats — the table's true grain is finer than one row per customer","The table is missing some customers","The query has a syntax error","customer_id is confirmed unique"],ans:0,exp:"Rows returned from a grain-check (GROUP BY key HAVING COUNT(*) > 1) mean the key is not unique — it repeats. Whatever grain those duplicate rows represent (maybe one row per address, or per signup event) is finer than 'one row per customer,' and any join assuming uniqueness will double-count."},
   close:"Grain — what one row represents — is the single most common source of silently wrong totals. Test it before you trust it: group by the supposed key, and anything HAVING COUNT(*) > 1 tells you the grain is finer than you assumed.",
   unlock:"A reconciliation diff that's a clean multiple of the truth — exactly 2× or 3× — is almost always a grain problem hiding behind a join, not a calculation error. Recognizing that pattern instantly is what separates someone who debugs fast from someone who re-checks the arithmetic for an hour."},
  {id:803, unit:"Unit 7: Advanced Analyst Toolkit", title:"Distribution & Outliers", sub:"The average lies on skewed data — read center, spread, and the extremes.",
   story:"A stakeholder asks for 'the typical order value.' You could return AVG(amount) and be confidently wrong: one $50,000 enterprise order drags the mean far above what a normal customer spends. The average alone hides the shape of the data. Read the median next to the mean, measure the spread, and flag the outliers that pull them apart — then you know whether 'average' even means anything here.",
   ral:{sql:"SELECT\n  AVG(amount)                                          AS mean,\n  PERCENTILE_CONT(0.5) WITHIN GROUP (ORDER BY amount)  AS median,\n  STDDEV(amount)                                       AS sd,\n  AVG(amount) + 3 * STDDEV(amount)                     AS high_fence\nFROM orders;", say:"Compute the mean and the median together, the standard deviation for spread, and a fence three standard deviations above the mean to flag the outliers that pull the two apart.",
     lines:[["AVG vs PERCENTILE_CONT(0.5)","mean vs median — a wide gap between them signals a skewed distribution"],["STDDEV(amount)","spread — the mean alone hides how dispersed the values are"],["AVG + 3 * STDDEV","a common high fence — rows above it are worth a closer look"],["mean ≫ median","right-skewed — a few large values are inflating the average"]]},
   notes:"When the mean and median diverge, the median is the more honest 'typical' value — it isn't dragged by extremes. Spread matters as much as center: two datasets with the same mean can behave completely differently. Outliers are a question, not a verdict: they may be data errors (fix them) or genuine extremes like that enterprise whale (keep them, but segment so they don't distort the everyday picture). Never silently delete an outlier — investigate why it's there first. Dialect note: <code>PERCENTILE_CONT</code> is PostgreSQL / SQL Server syntax and is supported in analytics warehouses (BigQuery, Snowflake, Redshift). MySQL 8.0+ added it as a window function with slightly different syntax; in older MySQL environments a CTE with <code>LIMIT</code> and <code>OFFSET</code> is the common workaround.",
   viz:{columns:["Statistic","Value"], rows:[["Min",5],["Q1",38],["Median",60],["Q3",95],["Max",180],["Outliers","540"]], caption:"Order value — the mean ($88) sits right of the median ($60), pulled by the $540 whale"},
   quiz:{q:"The mean order value is $88 but the median is $60. What does that gap tell you?", opts:["The data is right-skewed by a few large orders","Exactly half of all orders are above $88","There is a calculation error in one of the two","The orders are spread evenly across the range"], ans:0, exp:"The mean sitting well above the median is the signature of right skew: a handful of large orders pull the average up while the median — the true midpoint — stays near where most orders actually fall. Here the median ($60) is the more honest 'typical' value."},
   parsons:{prompt:"Arrange the query that compares mean, median, spread, and an outlier fence.",lines:["FROM orders;","STDDEV(amount) AS sd,","SELECT","AVG(amount) + 3 * STDDEV(amount) AS high_fence","AVG(amount) AS mean,","PERCENTILE_CONT(0.5) WITHIN GROUP (ORDER BY amount) AS median,"],answer:[2,4,5,1,3,0]},
   compare:"When mean and median diverge, the median is the more honest 'typical' value — it isn't dragged by extremes the way an average is. A wide gap between them is itself the signal that the data is skewed.",
   build:{q:"A dataset's mean is $88 and its median is $60. What's the most accurate read?",opts:["The distribution is right-skewed — a few large values are pulling the mean up","There must be a calculation error since the two should always match","The data is evenly and symmetrically distributed","The median is wrong because it's always less than the mean"],ans:0,exp:"Mean sitting well above median is the textbook signature of right skew: a handful of unusually large values pull the average up while the median — the actual midpoint of the data — stays where most values really cluster. Here, $60 is the more representative 'typical' order."},
   close:"Mean alone can lie on skewed data. Reading it alongside the median, the spread, and a defined outlier fence tells you whether 'average' even means anything for this dataset before you report it.",
   unlock:"Never delete an outlier just because it's far from the mean — investigate first. It might be a data-entry error worth fixing, or it might be a real enterprise customer worth segmenting out so it stops distorting the everyday picture, but either way the decision comes after you understand why it's there."},
  {id:804, unit:"Unit 7: Advanced Analyst Toolkit", title:"Pareto: Find the Vital Few", sub:"A small share of items usually drives most of the total — rank and accumulate.",
   story:"Roughly 80% of revenue tends to come from 20% of products; most of your support tickets from a few issue types. The Pareto principle turns a long list into a short one worth acting on. The technique: rank the items, take a running total as a share of the grand total, and read down until the cumulative percent crosses 80%. Everything above that line is the 'vital few' you focus on.",
   ral:{sql:"SELECT\n  product,\n  revenue,\n  ROUND(100.0 * SUM(revenue) OVER (ORDER BY revenue DESC)\n              / SUM(revenue) OVER (), 1)  AS cum_pct\nFROM product_sales\nORDER BY revenue DESC;", say:"Order products by revenue, take a running total of revenue divided by the grand total, and read the cumulative percent down the ranked list to see how few products it takes to reach most of the sales.",
     lines:[["SUM(revenue) OVER (ORDER BY revenue DESC)","a running total down the ranked list — revenue captured so far"],["SUM(revenue) OVER ()","the grand total — an empty OVER () window spans every row"],["running ÷ grand","cumulative percent of revenue captured by the top N products"],["crosses 80% early","the vital few — the short list worth your attention"]]},
   notes:"This is Pareto (or ABC) analysis, and the two window functions are the whole trick: SUM(...) OVER (ORDER BY ... DESC) accumulates down the sorted list, while SUM(...) OVER () with an empty window returns the grand total on every row to divide by. The payoff is focus — instead of treating 200 products equally, you act on the handful driving most of the value and manage the long tail by exception. Watch for a flat curve: if no small group dominates, the distribution is even and Pareto isn't the right lens.",
   viz:{columns:["Category","Revenue ($K)","Cumulative %"], rows:[["A",480,"48%"],["B",250,"73%"],["C",110,"84%"],["D",80,"92%"],["E",50,"97%"],["F",30,"100%"]], caption:"Revenue by product, with cumulative %"},
   quiz:{q:"In the Pareto query, what does SUM(revenue) OVER () — with empty parentheses — return?", opts:["A running total that resets on each product","The grand total of revenue across every row","The revenue of only the current product","The average revenue per product in the list"], ans:1, exp:"An empty OVER () window has no ORDER BY and no partition, so it spans the entire result set — giving the grand total on every row. Dividing the ordered running total by that grand total is what produces the cumulative percentage."},
   parsons:{prompt:"Arrange the query that ranks products and accumulates a cumulative percent.",lines:["ORDER BY revenue DESC;","/ SUM(revenue) OVER (), 1) AS cum_pct","FROM product_sales","SELECT product, revenue,","ROUND(100.0 * SUM(revenue) OVER (ORDER BY revenue DESC)"],answer:[3,4,1,2,0]},
   compare:"SUM(...) OVER (ORDER BY ... DESC) accumulates a running total down the ranked list; SUM(...) OVER () with empty parentheses returns the grand total on every row. Dividing the first by the second is the entire cumulative-percent trick.",
   build:{q:"In a Pareto query, what would happen if you replaced SUM(revenue) OVER () with just SUM(revenue) (no OVER, with a GROUP BY product)?",opts:["The query would collapse to one row per product with no running total — the cumulative-percent logic would break","The result would be identical either way","It would run faster with no change in output","It would return the same grand total, just written differently"],ans:0,exp:"A plain SUM with GROUP BY product aggregates and collapses rows — exactly what a window function avoids. The whole Pareto pattern depends on keeping every detail row while still being able to reference both a running total and a grand total alongside it, which only an OVER clause provides."},
   close:"Rank by revenue, run a cumulative total down the list, divide by the grand total, and read down until you cross 80%. That short list above the line is the vital few worth your attention.",
   unlock:"Watch for a flat cumulative curve — if it takes 60% of your items to reach 80% of revenue, there's no small group dominating and Pareto isn't the right lens for this dataset. The technique tells you that just as clearly as it identifies a true 80/20 split."},
  {id:805, unit:"Unit 7: Advanced Analyst Toolkit", title:"Correlation ≠ Causation", sub:"Quantify which drivers move with an outcome — and don't overclaim.",
   story:"Someone asks what's driving revenue. Correlation is the first tool: CORR measures how tightly two variables move together, from −1 to +1. It's a fast way to rank candidate drivers. But it comes with the most important caveat in analytics — a strong correlation is a hypothesis, not a conclusion. Ice-cream sales correlate with drownings; neither causes the other. Heat drives both.",
   ral:{sql:"SELECT\n  CORR(marketing_spend, revenue) AS r_spend,\n  CORR(discount_pct,    revenue) AS r_discount\nFROM weekly_metrics;", say:"Use CORR to measure how tightly each candidate driver tracks revenue on a scale from minus one to one, then compare the coefficients — while remembering a strong relationship still isn't proof of cause.",
     lines:[["CORR(x, y)","Pearson coefficient, −1 to +1 — near ±1 is a tight linear relationship"],["r near 0","little LINEAR relationship — a curved relationship can still hide here"],["compare |r|","the driver with the larger magnitude tracks revenue more closely"],["correlation ≠ causation","a lurking third variable can drive both — always the first thing to suspect"]]},
   notes:"Correlation ranks where to look; it never proves why. Three traps to name out loud: confounding (a third variable drives both), reverse causation (Y actually drives X), and coincidence (with enough variables, some will correlate by chance). Always eyeball a scatter alongside the number — a single outlier can manufacture a correlation that isn't real, and a strong curved relationship can read as r≈0. Treat a high r as 'worth a controlled test,' not 'case closed.' Dialect note: <code>CORR()</code> is PostgreSQL / analytics warehouse syntax (BigQuery, Snowflake, Redshift). MySQL has no built-in <code>CORR()</code> — you'd compute the Pearson formula manually or use a warehouse tool. The concept and the interview value of knowing what correlation measures are fully portable.",
   viz:{columns:["Marketing spend ($K)","Revenue ($K)"], rows:[[10,55],[14,62],[18,70],[22,74],[25,88],[30,95],[34,103],[40,120]], caption:"r ≈ 0.97 — a tight positive correlation. But spend and revenue might both rise in busy seasons; the scatter justifies a controlled test, not a 'spend more, earn more' claim."},
   quiz:{q:"Weekly ice-cream sales correlate with drowning incidents at r = 0.9. What is the right conclusion?", opts:["Buying ice cream raises the risk of drowning","A third factor — hot weather — likely drives both","The correlation must be a calculation mistake","Drownings cause people to buy more ice cream"], ans:1, exp:"This is the classic confounding case. Hot weather independently raises both ice-cream sales and swimming (hence drownings), producing a strong correlation with no causal link between the two. A high r tells you to look for the mechanism — it never supplies one."},
   parsons:{prompt:"Arrange the query that compares two candidate drivers against revenue.",lines:["FROM weekly_metrics;","CORR(discount_pct, revenue) AS r_discount","SELECT","CORR(marketing_spend, revenue) AS r_spend,"],answer:[2,3,1,0]},
   compare:"A correlation near ±1 ranks where to look; it never explains why. The same r = 0.9 could reflect a real driver or a third variable, like weather, quietly moving both sides at once — the number can't tell you which.",
   build:{q:"CORR(ice_cream_sales, drowning_incidents) returns 0.9. What's the correct interpretation?",opts:["A third variable — likely hot weather — drives both, with no direct causal link between them","Buying more ice cream causes more drownings","The correlation function must have a bug","Drowning incidents cause higher ice cream sales"],ans:0,exp:"This is the textbook confounding example. Hot weather independently increases both ice cream purchases and swimming activity, producing a strong correlation between two variables that don't cause each other at all. A high r is a prompt to look for the mechanism, not a substitute for one."},
   close:"CORR ranks candidate drivers fast — but a strong coefficient is a hypothesis worth a controlled test, never proof of cause. Naming confounding, reverse causation, and coincidence out loud is what separates a careful read from an overclaim.",
   unlock:"Always eyeball a scatter plot alongside the correlation number — a single extreme outlier can manufacture a high r that isn't representative of the real relationship, and a genuinely strong curved (non-linear) relationship can score near r ≈ 0 even though the two variables are tightly connected."},
  {id:806, unit:"Unit 7: Advanced Analyst Toolkit", title:"Sanity-Check & Reconcile", sub:"Tie your number to a trusted control before anyone else sees it.",
   story:"The last step before you publish is the one juniors skip: does the number make sense, and does it tie to something already trusted? A reconciliation puts your computed figure next to a control — finance's closed total, last month's report, the source-system number — and subtracts. Zero means you tie out. Anything else means stop and find the gap, because the stakeholder will find it for you if you don't.",
   ral:{sql:"SELECT\n  computed,\n  control,\n  computed - control AS diff\nFROM (\n  SELECT\n    (SELECT SUM(amount) FROM orders        WHERE fy = 2024) AS computed,\n    (SELECT total       FROM control_totals WHERE fy = 2024) AS control\n) t;", say:"Put your computed total next to the trusted control figure and subtract — a difference of zero means you tie out, and anything else means find the gap before you publish.",
     lines:[["computed","the number your query produces"],["control","an independently trusted figure — finance's close, last report, the source system"],["diff = computed − control","zero is the goal; a non-zero diff is a flag, not a rounding excuse"],["reconcile before you publish","catch a bad join or filter before a stakeholder does"]]},
   notes:"A number that matches a known control earns trust; a number that doesn't is a bug you haven't found yet. When the diff is non-zero, the usual suspects are the ones from this whole unit: a join that fanned out (grain), a filter that quietly dropped rows, or duplicates. A diff that's a clean multiple of the truth (2×, 3×) screams grain problem. Reconciliation is what separates a number you can defend in a meeting from one you're hoping is right — always close this loop.",
   viz:{columns:["metric","computed","control","diff","status"], rows:[["2024 revenue","4,021,880","4,021,880","0","✓ ties out"],["2024 orders","96,420","48,210","+48,210","✕ exactly 2× — grain"],["Active customers","31,544","31,544","0","✓ ties out"]], caption:"Revenue and customers tie out; the order count is exactly double the control — the tell-tale clean multiple of a grain problem (counting order lines as orders). Reconciliation caught it before the report shipped."},
   quiz:{q:"Your computed order count comes back exactly double the trusted control total. What's the most likely cause?", opts:["The control total is simply out of date","A join fanned out and doubled the grain","Rounding accumulated across many rows","The database recorded each order twice on purpose"], ans:1, exp:"A clean 2× difference is the classic fingerprint of a grain problem — typically a join to a finer-grained table (like order lines) that fanned each order into multiple rows. Rounding never produces an exact doubling; the first thing to check is the grain of every joined table."},
   parsons:{prompt:"Arrange the query that reconciles a computed total against a trusted control.",lines:[") t;","(SELECT total FROM control_totals WHERE fy = 2024) AS control","FROM (","SELECT computed, control,","computed - control AS diff","SELECT (SELECT SUM(amount) FROM orders WHERE fy = 2024) AS computed,"],answer:[3,4,2,5,1,0]},
   compare:"A diff of zero earns trust; a non-zero diff is a flag to investigate, not a rounding excuse — and the usual suspects are exactly the ones from this unit: a fanned-out join, a dropped filter, or duplicates.",
   build:{q:"Your computed total reconciles to zero against the control for revenue, but the order count is exactly double the control. What's the most efficient next step?",opts:["Check the grain of every table joined into the order-count query — a clean 2× points straight at a fan-out","Assume the control total itself is wrong and move on","Re-run the same query again to see if the number changes","Round both numbers to the nearest thousand and call it close enough"],ans:0,exp:"An exact 2× difference is the signature fingerprint of a grain problem — a join that fanned each row into two, typically from joining to a finer-grained table like order lines. Checking the grain of each joined table is the fast, targeted fix; re-running or rounding wastes time without addressing the cause."},
   close:"Reconciliation is the last step before anyone else sees your number — put it next to a trusted control, and a diff of zero is what lets you defend it in the room instead of hoping it's right.",
   unlock:"Build reconciliation into your workflow as a habit, not a one-time check at the end of a big project — running it on small, routine queries too is what catches a broken join or filter while it's still a five-minute fix, not a published-and-wrong report."}
  ],

// ─── STATE ──────────────────────────────────────────────────────────────────
const SK = 'sqlkit-v1';
let state = {
  doneLessons: [],
  doneFills: [],
  doneBugs: [],
  doneParsons: [],
  doneCards: [],
  flagged: [],
  theme: 'light'
};
function loadState(){
  try { const s = JSON.parse(localStorage.getItem(SK)); if(s) state = {...state, ...s}; } catch(e){}
  document.documentElement.classList.toggle('light', state.theme === 'light');
  updateThemeBtn();
}
function saveState(){ localStorage.setItem(SK, JSON.stringify(state)); }
function markDone(arr, id){
  if(!state[arr].includes(id)){
    state[arr].push(id);
    saveState();
    // Sync to cloud
    syncProgress('sqlkit-v1', id, arr, { done: true, timestamp: new Date().toISOString() }).catch(err => console.log('Sync failed (offline?):', err));
  }
}

const DRILL_TYPES = [

function renderFlagged(){
  const el = document.getElementById('flaggedList');
  if(!el) return;
  const wrap = document.getElementById('flaggedCard');
  const conf = state.confidence || {};
  const rows = Object.keys(conf).filter(id => conf[id]==='low' || conf[id]==='mid')
    .map(id => DATA.LESSONS.find(x => x.id === +id)).filter(Boolean)
    .map(l => ({id:l.id, title:`Lesson ${lessonPos(l.id)+1} — ${l.title}`, sub: conf[l.id]==='low' ? 'Not yet' : 'Almost'}));
  if(wrap) wrap.style.display = rows.length ? '' : 'none';
  el.innerHTML = rows.map(r=>`<div class="flag-row" onclick="navigate('lesson',${r.id})">
      <div><span style="font-size:11px;color:var(--warn,#d9963a);font-family:var(--mono);margin-right:8px">${r.sub}</span><span class="flag-row-title" style="font-size:14px;font-weight:600">${r.title}</span></div>
      <div style="display:flex;gap:10px;align-items:center;flex-shrink:0"><button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();confGotIt(${r.id})" title="Mark as 'Have it' — removes from review list">✓ Got it now</button><span style="color:var(--accent);font-weight:700">→</span></div>
    </div>`).join('');
}
function confGotIt(lessonId){
  state.confidence = state.confidence || {};
  state.confidence[lessonId] = 'high';
  saveState();
  renderFlagged();
}

let currentView = 'home';
function navigate(view, ...args){
  guided = null; // any normal navigation exits the guided practice flow
  currentView = view;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const map = {home:0,lessons:1,practice:2,lab:3,'lab-join':3,'lab-agg':3,'lab-dates':3,'lab-clean':3,cards:4,glossary:5};
  const btns = document.querySelectorAll('.nav-btn');
  if(map[view] !== undefined && btns[map[view]]) btns[map[view]].classList.add('active');
  const main = document.getElementById('main');
  main.innerHTML = '';
  window.scrollTo(0,0);
  if(view==='home') renderHome();
  else if(view==='lessons') renderLessons();
  else if(view==='lesson') renderLesson(args[0]);
  else if(view==='practice') renderPractice();
  else if(view==='fill') renderFill(args[0]);
  else if(view==='bug') renderBug(args[0]);
  else if(view==='parsons') renderParsons(args[0]);
  else if(view==='lab') renderLab();
  else if(view==='lab-join') renderLabJoin();
  else if(view==='lab-agg') renderLabAgg();
  else if(view==='lab-dates') renderLabStub('dates');
  else if(view==='lab-clean') renderLabStub('clean');
  else if(view==='cards') renderCards();
  else if(view==='glossary') renderGlossary();
  else if(view==='settings') renderSettings();
}

function toggleTheme(){
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.classList.toggle('light', state.theme === 'light');
  updateThemeBtn();
  saveState();
}
function updateThemeBtn(){
  const b = document.getElementById('theme-btn');
  if(b){ b.innerHTML = state.theme === 'dark'
    ? '<i data-lucide="sun" style="width:15px;height:15px;vertical-align:-3px"></i> Light'
    : '<i data-lucide="moon" style="width:15px;height:15px;vertical-align:-3px"></i> Dark';
    if(window.lucide) lucide.createIcons(); }
}

// Per-lesson confidence self-rating (Grain). Persists to state.confidence; complements
// the 🚩 flag. Purely additive — never blocks progress.
function rateConf(lessonId, level, btn){
  state.confidence = state.confidence || {};
  state.confidence[lessonId] = level;
  saveState();
  const wrap = btn.closest('.conf-chips');
  if(wrap) wrap.querySelectorAll('.conf-chip').forEach(c => c.classList.toggle('is-on', c===btn));
  if(window.lucide) lucide.createIcons();
  // Re-sync the spaced-recall queue to the (possibly changed) confidence.
  const _rl = DATA.LESSONS.find(x=>x.id===lessonId);
  if(_rl) _queueRecalls(lessonId, _rl);
}

function answerQuiz(lessonId, chosen){
  const l = DATA.LESSONS.find(x => x.id === lessonId);
  document.querySelectorAll('.quiz-opt').forEach((b,i) => {
    b.disabled = true;
    if(i === l.quiz.ans) b.classList.add('correct');
    else if(i === chosen && chosen !== l.quiz.ans) b.classList.add('wrong');
  });
  document.getElementById('quiz-exp').classList.add('show');
  if(chosen === l.quiz.ans){
    celebrate();
    setTimeout(() => finishLesson(lessonId), 1200);
  } else {
    const qw = document.getElementById('quiz-wrap');
    if(qw) qw.innerHTML += `<div class="mt row" style="gap:10px;margin-top:14px"><button class="btn btn-primary btn-sm" onclick="retryQuiz(${lessonId})">Try Again</button><button class="btn btn-ghost btn-sm" onclick="finishLesson(${lessonId})">Continue anyway</button></div>`;
  }
}
function retryQuiz(lessonId){
  const l = DATA.LESSONS.find(x => x.id === lessonId);
  const qw = document.getElementById('quiz-wrap');
  if(!qw) return;
  qw.innerHTML = `<h3>Quick Check</h3>
    <p class="text-muted text-sm" style="margin-bottom:14px">${l.quiz.q}</p>

}

// ─── INLINE-SVG CHARTS (Medium #6: real visuals on chart-centric lessons) ────
// Zero-dependency parametric SVG. All colors via CSS vars so charts adapt to
// dark + light. Rendered in the Worked Example stage AFTER the result table —
// the table stays the query-output ground truth; the chart is what an analyst
// would actually put in front of a stakeholder.
const _svgNS='xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif" style="width:100%;height:auto;max-width:520px;display:block"';
function _chartScale(vals, H, pad){ // returns y(v) mapping onto [pad, H-pad], 0-based floor
  const max=Math.max(...vals,0), min=Math.min(...vals,0), span=(max-min)||1;
  return { y:v=>pad+(max-v)/span*(H-2*pad), zero:pad+(max-0)/span*(H-2*pad), max, min };
}
function svgLineChart(c){
  const W=520,H=280,P=36,L=64,vals=c.values,n=vals.length;
  const s=_chartScale(vals,H,P), x=i=>L+i*(W-L-20)/(n-1);
  const pts=vals.map((v,i)=>`${x(i)},${s.y(v).toFixed(1)}`).join(' ');
  const dots=vals.map((v,i)=>`<circle cx="${x(i)}" cy="${s.y(v).toFixed(1)}" r="3.5" fill="var(--accent)"/><text x="${x(i)}" y="${(s.y(v)-10).toFixed(1)}" fill="var(--text)" font-size="11" text-anchor="middle">${c.fmt?c.fmt(v):v}</text>`).join('');
  const lbls=c.labels.map((t,i)=>`<text x="${x(i)}" y="${H-8}" fill="var(--muted)" font-size="11" text-anchor="middle">${t}</text>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" ${_svgNS} role="img"><title>${c.title}</title><text x="${L}" y="20" fill="var(--text)" font-size="12" font-weight="600">${c.title}</text><line x1="${L}" y1="${H-P+6}" x2="${W-16}" y2="${H-P+6}" stroke="var(--border)" stroke-width="1.5"/><polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2.5"/>${dots}${lbls}</svg>`;
}
function svgBarChart(c){
  const W=520,H=280,P=40,L=64,vals=c.values,n=vals.length;
  const s=_chartScale(vals,H,P), bw=Math.min(72,(W-L-24)/n*0.62), gap=(W-L-24)/n;
  const bars=vals.map((v,i)=>{
    const bx=L+12+i*gap+(gap-bw)/2, y0=s.zero, y1=s.y(v);
    const top=Math.min(y0,y1), h=Math.max(2,Math.abs(y0-y1));
    const col=c.colors?`var(--${c.colors[i]})`:'var(--accent)';
    return `<rect x="${bx.toFixed(1)}" y="${top.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="2" fill="${col}"/>
      <text x="${(bx+bw/2).toFixed(1)}" y="${(top-6).toFixed(1)}" fill="var(--text)" font-size="11" text-anchor="middle">${c.fmt?c.fmt(v):v}</text>
      <text x="${(bx+bw/2).toFixed(1)}" y="${H-8}" fill="var(--muted)" font-size="11" text-anchor="middle">${c.labels[i]}</text>`;
  }).join('');
  const zero=`<line x1="${L}" y1="${s.zero.toFixed(1)}" x2="${W-12}" y2="${s.zero.toFixed(1)}" stroke="var(--muted)" stroke-width="1.5"/>`;
  return `<svg viewBox="0 0 ${W} ${H}" ${_svgNS} role="img"><title>${c.title}</title><text x="${L}" y="20" fill="var(--text)" font-size="12" font-weight="600">${c.title}</text>${zero}${bars}</svg>`;
}
function svgParetoChart(c){
  const W=520,H=280,P=40,L=64,vals=c.values,n=vals.length;
  const s=_chartScale(vals,H,P), gap=(W-L-24)/n, bw=Math.min(64,gap*0.62);
  const yPct=p=>P+(100-p)/100*(H-2*P);
  const bars=vals.map((v,i)=>{
    const bx=L+12+i*gap+(gap-bw)/2;
    return `<rect x="${bx.toFixed(1)}" y="${s.y(v).toFixed(1)}" width="${bw}" height="${(s.zero-s.y(v)).toFixed(1)}" rx="2" fill="var(--accent)"/><text x="${(bx+bw/2).toFixed(1)}" y="${H-8}" fill="var(--muted)" font-size="11" text-anchor="middle">${c.labels[i]}</text>`;
  }).join('');
  const cx=i=>L+12+i*gap+gap/2;
  const line=c.cumPct.map((p,i)=>`${cx(i).toFixed(1)},${yPct(p).toFixed(1)}`).join(' ');
  const dots=c.cumPct.map((p,i)=>`<circle cx="${cx(i).toFixed(1)}" cy="${yPct(p).toFixed(1)}" r="3" fill="var(--warn)"/><text x="${cx(i).toFixed(1)}" y="${(yPct(p)-8).toFixed(1)}" fill="var(--warn)" font-size="10" text-anchor="middle">${p}%</text>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" ${_svgNS} role="img"><title>${c.title}</title><text x="${L}" y="20" fill="var(--text)" font-size="12" font-weight="600">${c.title}</text><line x1="${L}" y1="${s.zero.toFixed(1)}" x2="${W-12}" y2="${s.zero.toFixed(1)}" stroke="var(--muted)" stroke-width="1.5"/>${bars}<polyline points="${line}" fill="none" stroke="var(--warn)" stroke-width="2"/>${dots}</svg>`;
}
function svgBoxPlot(c){ // {title,min,q1,med,q3,max,outliers:[],fmt}
  const W=520,H=170,L=40,R=30,mid=92;
  const lo=Math.min(c.min,...(c.outliers||[])), hi=Math.max(c.max,...(c.outliers||[]));
  const x=v=>L+(v-lo)/((hi-lo)||1)*(W-L-R);
  const f=v=>c.fmt?c.fmt(v):v;
  const tick=(v,lab)=>`<line x1="${x(v).toFixed(1)}" y1="${mid-26}" x2="${x(v).toFixed(1)}" y2="${mid+26}" stroke="var(--accent)" stroke-width="2"/><text x="${x(v).toFixed(1)}" y="${mid+44}" fill="var(--muted)" font-size="10" text-anchor="middle">${lab} ${f(v)}</text>`;
  const outs=(c.outliers||[]).map(o=>`<circle cx="${x(o).toFixed(1)}" cy="${mid}" r="4" fill="var(--red)"/><text x="${x(o).toFixed(1)}" y="${mid-12}" fill="var(--red)" font-size="10" text-anchor="middle">${f(o)}</text>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" ${_svgNS} role="img"><title>${c.title}</title><text x="${L}" y="18" fill="var(--text)" font-size="12" font-weight="600">${c.title}</text>
    <line x1="${x(c.min).toFixed(1)}" y1="${mid}" x2="${x(c.q1).toFixed(1)}" y2="${mid}" stroke="var(--muted)" stroke-width="1.5"/>
    <line x1="${x(c.q3).toFixed(1)}" y1="${mid}" x2="${x(c.max).toFixed(1)}" y2="${mid}" stroke="var(--muted)" stroke-width="1.5"/>
    <rect x="${x(c.q1).toFixed(1)}" y="${mid-22}" width="${(x(c.q3)-x(c.q1)).toFixed(1)}" height="44" rx="3" fill="color-mix(in srgb, var(--accent) 18%, transparent)" stroke="var(--accent)" stroke-width="1.5"/>
    ${tick(c.min,'min')}${tick(c.med,'median')}${tick(c.max,'max')}
    <text x="${((x(c.q1)+x(c.q3))/2).toFixed(1)}" y="${mid-30}" fill="var(--muted)" font-size="10" text-anchor="middle">Q1 ${f(c.q1)} — Q3 ${f(c.q3)}</text>${outs}</svg>`;
}
function sqlChartHTML(c){
  const svg = c.type==='line'?svgLineChart(c) : c.type==='bar'?svgBarChart(c) : c.type==='pareto'?svgParetoChart(c) : c.type==='box'?svgBoxPlot(c) : '';
  if(!svg) return '';
  return `<div class="card" style="margin-top:16px"><div class="lesson-eyebrow"><i data-lucide="bar-chart-3"></i> See the chart</div>${svg}${c.caption?`<p class="text-muted text-sm" style="margin:10px 0 0">${c.caption}</p>`:''}</div>`;
}

const SQL_REINFORCES = {
  101:["In one sentence: what is a table, a row, and a column?","Why does a database beat a spreadsheet once several people need the same data?"],
  102:["What question does 'what is the grain of this table?' actually ask?","Why is knowing the grain the first step before summing or counting anything?"],

// ─── SPACED RECALL QUEUE (Phase D port from Excel: +1/+3/+7 lesson positions) ─
let _pendingRecalls = [], _recallLesson = null;
function _getRecallQ(){ return JSON.parse(localStorage.getItem('sqlkit-recalls')||'[]'); }
function _saveRecallQ(a){ localStorage.setItem('sqlkit-recalls',JSON.stringify(a)); }
function _queueRecalls(id, l){
  if(!l.reinforces||!l.reinforces.length) return;
  // Idempotent: drop any prior pending recalls for this lesson, then re-queue
  // only if confidence is low/mid. Re-rating to 'high' clears them entirely.
  let arr=_getRecallQ().filter(e=>e.srcId!==id);
  const conf=(state.confidence||{})[id];
  if(conf==='low'||conf==='mid'){
    const pos=lessonPos(id);
    for(const off of [1,3,7]) arr.push({cues:l.reinforces, srcId:id, dueAt:pos+off});
  }
  _saveRecallQ(arr);
}
function _dequeueRecalls(id){
  const pos=lessonPos(id), arr=_getRecallQ();
  const due=arr.filter(e=>e.dueAt===pos);
  _saveRecallQ(arr.filter(e=>e.dueAt!==pos));
  return due;
}
// Dequeue only when the viewed lesson changes — stage advances re-render the
// same lesson and must not re-consume the queue.
function _syncRecalls(id, l){
  if(_recallLesson===id) return;
  if(l) _queueRecalls(id, l);
  _pendingRecalls = _dequeueRecalls(id);
  _recallLesson = id;
}
function _recallsHTML(){
  return _pendingRecalls.map((e,i)=>`<div class="recall-card">
    <div class="recall-header"><i data-lucide="repeat-2"></i> Quick recall — no peeking</div>
    <ul class="recall-cues">${e.cues.map(c=>`<li>${c}</li>`).join('')}</ul>
    <div class="recall-btns">
      <button class="btn btn-primary btn-sm" onclick="recallGotIt(${i})">I remembered it</button>
      <button class="btn btn-ghost btn-sm" onclick="recallNope(${i})">Nope, remind me again</button>
    </div>
  </div>`).join('');
}
function _refreshRecalls(){
  const el=document.getElementById('v2-recalls');
  if(!el) return;
  if(!_pendingRecalls.length){el.style.display='none';return;}
  el.innerHTML=_recallsHTML();
  if(window.lucide) lucide.createIcons();
}
function recallGotIt(i){
  _pendingRecalls.splice(i,1);
  const w=parseInt(localStorage.getItem('sqlkit-recall-wins')||'0')+1;
  localStorage.setItem('sqlkit-recall-wins',String(w));
  _refreshRecalls();
}
function recallNope(i){
  const e=_pendingRecalls.splice(i,1)[0];
  const arr=_getRecallQ();
  arr.push({cues:e.cues, srcId:e.srcId, dueAt:lessonPos(_recallLesson)+1});
  _saveRecallQ(arr);
  _refreshRecalls();
}

let _v2ParsAttempt = {};
let _v2ParsWasWrong = {};

function v2ParsChipTap(lid, chip){
  const pool = document.getElementById('v2sql-pool-'+lid);
  const ans  = document.getElementById('v2sql-ans-'+lid);
  if(!pool||!ans) return;
  if(pool.contains(chip)) ans.appendChild(chip);
  else pool.appendChild(chip);
}

function v2ParsCheck(lid){
  const l = DATA.LESSONS.find(x=>x.id===lid);
  if(!l||!l.parsons) return;
  const ans = document.getElementById('v2sql-ans-'+lid);
  if(!ans) return;
  const chips = [...ans.querySelectorAll('.v2-pars-chip')];
  if(chips.length !== l.parsons.answer.length){
    const fb = document.getElementById('v2sql-pars-fb-'+lid);
    if(fb) fb.innerHTML='<span style="color:var(--warn);font-size:13px">Move all pieces to the answer area first.</span>';
    return;
  }
  const userOrder = chips.map(c=>+c.dataset.idx);
  const correct = l.parsons.answer.every((v,i)=>v===userOrder[i]);
  _v2ParsAttempt[lid] = {lines: chips.map(c=>c.textContent)};
  _v2ParsWasWrong[lid] = !correct;
  if(correct){
    delete _v2ParsWasWrong[lid];
    celebrate();
    const fb = document.getElementById('v2sql-pars-fb-'+lid);
    if(fb) fb.innerHTML=`<span style="color:var(--ok,#3a9d6a);font-size:13px;font-weight:600">Correct — that's the right order.</span>
      <div class="row mt" style="gap:10px;margin-top:14px"><button class="btn btn-primary btn-sm" onclick="setSqlStage(${lid},3)">Continue &rarr;</button></div>`;
  } else {
    const fb = document.getElementById('v2sql-pars-fb-'+lid);
    if(fb) fb.innerHTML='<span style="color:var(--red);font-size:13px;font-weight:600">Not quite — try reordering the pieces.</span>';
    const btn = document.getElementById('v2sql-coach-try-'+lid);
    if(btn) btn.style.display='';
  }
}

function v2BuildPick(btn, lid){
  const l = DATA.LESSONS.find(x=>x.id===lid);
  if(!l||!l.build) return;
  const wrap = document.getElementById('v2sql-build-'+lid);
  if(!wrap) return;
  wrap.querySelectorAll('.quiz-opt').forEach(b=>b.disabled=true);
  const isCorrect = btn.dataset.correct==='1';
  btn.classList.add(isCorrect?'correct':'wrong');
  if(!isCorrect) wrap.querySelectorAll('.quiz-opt')[l.build.ans].classList.add('correct');
  const fb = document.getElementById('v2sql-build-fb-'+lid);
  if(fb) fb.innerHTML=`<div class="quiz-exp show" style="margin-top:10px">${l.build.exp}</div>`;
  if(!isCorrect){ const cb=document.getElementById('v2sql-coach-build-'+lid); if(cb) cb.style.display=''; }
  const row = isCorrect
    ? `<div class="row mt" style="gap:10px;margin-top:14px"><button class="btn btn-primary btn-sm" onclick="setSqlStage(${lid},5)">Continue &rarr;</button></div>`
    : `<div class="row mt" style="gap:10px;margin-top:14px"><button class="btn btn-primary btn-sm" onclick="setSqlStage(${lid},4)">Try Again</button><button class="btn btn-ghost btn-sm" onclick="setSqlStage(${lid},5)">Continue anyway</button></div>`;

}

function v2QuizAnswer(lid, chosen){
  const l = DATA.LESSONS.find(x=>x.id===lid);
  if(!l) return;
  const wrap = document.getElementById('v2sql-quiz-'+lid);
  if(!wrap) return;
  wrap.querySelectorAll('.quiz-opt').forEach((b,i)=>{
    b.disabled=true;
    if(i===l.quiz.ans) b.classList.add('correct');
    else if(i===chosen) b.classList.add('wrong');

  const exp = document.getElementById('v2sql-quiz-exp-'+lid);

    markDone('doneLessons', lid);
    wrap.insertAdjacentHTML('beforeend',`<div class="row mt" style="gap:10px;margin-top:14px">

function v2ResetLesson(id){
  const i = state.doneLessons.indexOf(id);

async function _v2CoachCall(prompt, model, targetId){
  const key = getCoachKey();
  const el = document.getElementById(targetId);
  if(!key){
    if(el){ el.textContent='Add your Anthropic API key in Settings → AI Coach to enable hints.'; el.classList.add('show'); }
    return;
  }
  if(el){ el.textContent='Thinking…'; el.classList.add('show'); }
  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'x-api-key':key,'anthropic-version':'2023-06-01','content-type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model,max_tokens:350,messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    if(el) el.textContent = data.content?.[0]?.text || 'No response — check your key.';
  } catch(e){ if(el) el.textContent='Request failed — check your key in Settings.'; }
}

  const l = DATA.LESSONS.find(x=>x.id===lid);

  const p = l.parsons;

    ? `You are a concise SQL tutor. A student is arranging SQL lines in order. Puzzle: "${p.prompt}"\nLines available:\n${p.lines.map((t,i)=>`${i}: ${t}`).join('\n')}\nGive ONE short hint (1-2 sentences) that nudges them toward the right order without revealing it.`
    : `You are a concise SQL tutor. A student answered a multiple-choice question about "${l.title}" incorrectly. Question: "${l.build.q}"\nGive ONE short hint (1-2 sentences) pointing toward the correct answer without stating it.`;

  const l = DATA.LESSONS.find(x=>x.id===lid);

  const p = l.parsons;

  const correctLines = p.answer.map(i=>p.lines[i]).join('\n');

// ─── GUIDED PATH (lesson → its drills → next lesson) ────────────────────────
// Every drill linked to the FIRST lesson it applies to — all 36 (FILLS/BUGS/
// PARSONS ×12) appear exactly once across the guided path.
const LESSON_DRILLS = {
  1:  [['fills',0],['bugs',1],['parsons',0]],
  2:  [['fills',1],['bugs',0],['bugs',7],['parsons',1]],
  3:  [['fills',2],['fills',3],['bugs',2],['parsons',6]],
  4:  [['bugs',5],['parsons',3]],
  5:  [['fills',4],['fills',5],['bugs',4],['bugs',6],['parsons',2]],
  6:  [['fills',6],['bugs',3],['parsons',5]],
  7:  [['fills',7],['parsons',4]],
  8:  [['fills',8],['bugs',8],['parsons',8]],
  9:  [['fills',9],['bugs',9],['parsons',7]],
  10: [['fills',11],['bugs',11],['parsons',10]],
  11: [['fills',10],['bugs',10],['parsons',9]],
  12: [['parsons',11]],
  13: [['fills',12],['bugs',12],['parsons',12]],
  14: [['fills',13],['bugs',13],['parsons',13]],
  15: [['fills',14],['bugs',14]],
  16: [['fills',15],['bugs',15]]
};
let guided = null;
let _parsonsAttempts = {}; // tracks wrong-attempt count per drill idx for progressive scaffolding
function startGuided(lessonId){
  const M = {fills:'FILLS', bugs:'BUGS', parsons:'PARSONS'};
  const seq = (LESSON_DRILLS[lessonId] || []).filter(s => M[s[0]] && DATA[M[s[0]]] && DATA[M[s[0]]][s[1]]);
  if(!seq.length){ gotoNextLesson(lessonId); return; }
  guided = {lessonId, seq, pos:0};
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const pb = document.querySelectorAll('.nav-btn')[2]; if(pb) pb.classList.add('active');
  renderGuidedStep();
}
function renderGuidedStep(){
  if(!guided) return;
  const step = guided.seq[guided.pos];
  if(step[0]==='fills') renderFill(step[1]);
  else if(step[0]==='bugs') renderBug(step[1]);
  else if(step[0]==='parsons') renderParsons(step[1]);
  injectGuidedHeader();
}
function injectGuidedHeader(){
  if(!guided) return;
  const main = document.getElementById('main');
  const row = main.querySelector('.row.mb');
  if(!row) return;
  const {seq, pos, lessonId} = guided;
  const lesson = DATA.LESSONS.find(l => l.id === lessonId);
  const step = seq[pos];
  const fb = '';
  row.innerHTML = `<button class="btn btn-ghost btn-sm" onclick="navigate('lesson',${lessonId})">← Back to lesson</button><span style="margin-left:auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap">${fb}<span class="text-muted text-sm">Practice ${pos+1}/${seq.length} · ${lesson.title}</span></span>`;
  const dots = document.createElement('div');
  dots.style.cssText = 'display:flex;gap:4px;align-items:center;margin:0 0 14px';
  dots.innerHTML = seq.map((_,i) => `<span style="width:20px;height:6px;border-radius:3px;background:${i<=pos?'var(--accent)':'rgba(127,127,127,.28)'};opacity:${i<=pos?1:.5}"></span>`).join('') + `<button class="btn btn-ghost btn-sm" style="margin-left:8px" onclick="guidedNext()">Skip →</button>`;
  row.after(dots);
}
function guidedNext(){
  if(!guided) return;
  if(guided.pos < guided.seq.length-1){ guided.pos++; renderGuidedStep(); }
  else { gotoNextLesson(guided.lessonId); }
}
function gotoNextLesson(lid){
  guided = null;
  const _nxt=nextLessonId(lid);
  if(_nxt!==null) navigate('lesson', _nxt);
  else { navigate('home'); showToast('You finished every SQL lesson!'); }
}

let draggedChip = null;
function dragStart(e){
  draggedChip = e.target;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function dragOver(e){ e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function dropChip(e, target){
  e.preventDefault();
  if(!draggedChip) return;
  draggedChip.classList.remove('dragging');
  const container = document.getElementById('parsons-' + target);
  container.appendChild(draggedChip);
  draggedChip = null;
}

function checkParsons(idx){
  const p = DATA.PARSONS[idx];
  const answer = document.getElementById('parsons-answer');
  const chips = [...answer.querySelectorAll('.parsons-chip')];
  if(chips.length !== p.answer.length){
    document.getElementById('parsons-result').innerHTML = `<span style="color:var(--yellow)">Move all lines to the answer area first.</span>`;
    return;
  }
  const userOrder = chips.map(c => parseInt(c.dataset.line));
  const correct = p.answer.every((v,i) => v === userOrder[i]);
  const res = document.getElementById('parsons-result');
  if(correct){
    res.innerHTML = `<span style="color:var(--green);font-weight:600">✓ Correct order!</span>`;
    celebrate();
    markDone('doneParsons', p.id);
    delete _parsonsAttempts[idx];
    setTimeout(() => {
      if(guided) guidedNext();
      else if(idx+1 < DATA.PARSONS.length) navigate('parsons', idx+1);
      else navigate('practice');
    }, 1200);
  } else {
    if(!_parsonsAttempts[idx]) _parsonsAttempts[idx] = 0;
    _parsonsAttempts[idx]++;
    const attempts = _parsonsAttempts[idx];
    if(attempts === 1){
      // 1st wrong: scaffold the first half in correct order, leave rest for user
      const half = Math.ceil(p.answer.length / 2);
      scaffoldParsons(idx, half);
      res.innerHTML = `<span style="color:var(--yellow)">✗ Not quite — the first ${half} line${half>1?'s are':' is'} placed for you. Drag the rest into order.</span>`;
    } else {
      // 2nd wrong: show the full correct answer locked
      scaffoldParsons(idx, p.answer.length);
      const nxtBtn = guided
        ? `<button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="guidedNext()">Next →</button>`
        : idx+1 < DATA.PARSONS.length
          ? `<button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="navigate('parsons',${idx+1})">Next →</button>`
          : `<button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="navigate('practice')">Done →</button>`;
      res.innerHTML = `<span style="color:var(--accent)">Full answer shown — study the order, then move on.</span><br>${nxtBtn}`;
    }
  }
}
// Place the first `count` lines of the correct answer into the answer zone (locked/dimmed),
// return the rest to the pool in original line order.
function scaffoldParsons(idx, count){
  const p = DATA.PARSONS[idx];
  const pool = document.getElementById('parsons-pool');
  const answer = document.getElementById('parsons-answer');
  // collect all chips from both zones by their data-line index
  const allChips = {};
  [...pool.querySelectorAll('.parsons-chip'), ...answer.querySelectorAll('.parsons-chip')]
    .forEach(c => { allChips[parseInt(c.dataset.line)] = c; });
  pool.innerHTML = '';
  answer.innerHTML = '';
  const inAnswer = new Set();
  for(let i = 0; i < count; i++) inAnswer.add(p.answer[i]);
  // place scaffolded chips in correct order, visually locked
  for(let i = 0; i < count; i++){
    const chip = allChips[p.answer[i]];
    if(!chip) continue;
    chip.setAttribute('draggable','false');
    chip.style.opacity = '0.65';
    chip.style.cursor = 'default';
    chip.style.borderColor = 'rgba(47,109,240,.5)';
    chip.style.background = 'rgba(47,109,240,.10)';
    answer.appendChild(chip);
  }
  // remaining chips back to pool in original line-array order (don't reveal ordering)
  p.lines.forEach((_,lineIdx) => {
    if(inAnswer.has(lineIdx)) return;
    const chip = allChips[lineIdx];
    if(!chip) return;
    chip.setAttribute('draggable','true');
    chip.style.opacity = '';
    chip.style.cursor = '';
    chip.style.borderColor = '';
    chip.style.background = '';
    pool.appendChild(chip);
  });
  // Restack layout: Answer on top, Available Lines below (reads top→bottom naturally)
  const wrap = answer.closest('.parsons-wrap');
  if(wrap){
    wrap.style.flexDirection = 'column';
    const answerCol = answer.closest('.parsons-col');
    const poolCol = pool.closest('.parsons-col');
    if(answerCol && poolCol && wrap.firstElementChild !== answerCol){
      wrap.insertBefore(answerCol, poolCol);
    }
  }
}
