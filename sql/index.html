<style>
/* GRAIN design system. The kit's own semantic vars are re-pointed onto
   Grain tokens (assets/grain/) — no one-off hex. :root = warm dark
   variant; .light = the full Grain cream look (toggled via JS class).
   A dedicated Grain dark palette is a later token job (out of scope). */
:root{
  --bg:var(--stone-900);--surf:var(--stone-800);--surf2:var(--stone-700);
  --accent:var(--clay-400);--accent2:var(--clay-300);
  --text:var(--stone-50);--muted:var(--stone-300);--border:var(--stone-700);
  --red:var(--rust-400);--green:var(--leaf-400);--yellow:var(--amber-300);--warn:var(--amber-400);
  --font:var(--font-sans);--mono:var(--font-mono);
  --r:var(--radius-lg);--r2:var(--radius-sm);--shadow:var(--shadow-lg);
}
.light{
  --bg:var(--color-bg);--surf:var(--color-surface);--surf2:var(--stone-100);
  --accent:var(--clay-500);--accent2:var(--clay-600);
  --text:var(--stone-900);--muted:var(--stone-600);--border:var(--stone-200);
  --red:var(--rust-500);--green:var(--leaf-500);--yellow:var(--amber-600);--warn:var(--amber-600);
  --shadow:var(--shadow-md);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.6;min-height:100vh}
a{color:var(--accent);text-decoration:none}

/* NAV */
nav{background:var(--surf);border-bottom:1px solid var(--border);padding:0 18px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;position:sticky;top:0;z-index:100;height:56px}
.nav-brand{font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--text);margin-right:6px;white-space:nowrap;display:inline-flex;align-items:center;gap:9px;letter-spacing:var(--tracking-tight)}
.nav-logo{color:var(--accent);background:var(--surf2);width:30px;height:30px;display:inline-grid;place-items:center;border-radius:9px;flex-shrink:0}
.nav-logo .lucide{width:17px;height:17px}
.nav-btn{background:none;border:none;color:var(--muted);font:inherit;font-size:13px;padding:14px 10px;cursor:pointer;border-bottom:2px solid transparent;transition:.15s;white-space:nowrap}
.nav-btn:hover{color:var(--text)}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.nav-spacer{flex:1}
.nav-icon{font-size:16px;padding:14px 8px}

/* LAYOUT */
main{max-width:860px;margin:0 auto;padding:28px 20px 60px}
h1,h2,h3{font-family:var(--font-display);letter-spacing:var(--tracking-tight)}
h1{font-size:1.6rem;font-weight:700;margin-bottom:6px}
h2{font-size:1.15rem;font-weight:600;margin-bottom:14px}
h3{font-size:1rem;font-weight:600;margin-bottom:10px}
p{margin-bottom:12px;color:var(--muted)}
p strong{color:var(--text)}

/* CARDS */
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:22px 24px;margin-bottom:16px;box-shadow:var(--shadow)}
.card-sm{padding:14px 18px}
.card-accent{border-color:var(--accent)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--r2);font:600 14px var(--font);cursor:pointer;border:none;transition:.15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--text)}
.btn-sm{padding:7px 14px;font-size:13px}
.flag-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 2px;border-top:1px solid var(--border);cursor:pointer}
.flag-row:hover .flag-row-title{color:var(--accent)}

/* BADGE / PILL */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600}
.badge-unit{background:var(--surf2);color:var(--muted)}
.badge-done{background:var(--leaf-50);color:var(--leaf-700)}

/* PROGRESS BAR */
.prog-wrap{height:6px;background:var(--surf2);border-radius:3px;overflow:hidden;margin:6px 0}
.prog-bar{height:100%;background:var(--accent);border-radius:3px;transition:.4s}

/* HOME — resume card */
.resume-card{background:linear-gradient(135deg,var(--accent)18%,var(--accent2));border-radius:var(--r);padding:24px 28px;margin-bottom:20px;color:#fff}
.resume-card h2{color:#fff;margin-bottom:4px}
.resume-card p{color:rgba(255,255,255,.8);margin:0 0 16px}
.resume-card .btn{background:rgba(255,255,255,.2);color:#fff}
.resume-card .btn:hover{background:rgba(255,255,255,.35)}

/* HOME — path grid */
.path-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.path-tile{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:18px;cursor:pointer;transition:.15s;text-align:center}
.path-tile:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.path-tile .icon{font-size:1.8rem;margin-bottom:8px;color:var(--accent);line-height:1}
.path-tile h3{font-size:.95rem;margin:0 0 4px}
.path-tile p{font-size:12px;margin:0}

/* SKILL BARS */
.skill-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.skill-label{width:110px;font-size:13px;color:var(--muted);flex-shrink:0}
.skill-bar-wrap{flex:1;height:8px;background:var(--surf2);border-radius:4px;overflow:hidden}
.skill-bar{height:100%;background:var(--accent);border-radius:4px;transition:.6s}
.skill-pct{width:34px;font-size:12px;color:var(--muted);text-align:right}

/* LESSON LIST */
.unit-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:10px 0 4px;margin-top:8px}
.lesson-row{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--surf);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:8px;cursor:pointer;transition:.15s}
.lesson-row:hover{border-color:var(--accent);transform:translateX(3px)}
.lesson-num{width:28px;height:28px;border-radius:50%;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);flex-shrink:0}
.lesson-num.done{background:var(--accent);color:#fff}
.lesson-info{flex:1}
.lesson-title{font-weight:600;font-size:14px}
.lesson-sub{font-size:12px;color:var(--muted)}
.lesson-arrow{color:var(--muted);font-size:18px}

/* PATH MAP (playtest Batch 5) — Duolingo-style vertical rail. States are
   done / current / upcoming; upcoming is DIMMED, never locked (soft-guide). */
.pmap{position:relative}
.pmap:before{content:'';position:absolute;left:24px;top:8px;bottom:8px;width:3px;background:var(--surf2);border-radius:2px}
.pmap-unit{display:flex;align-items:center;gap:12px;position:relative;padding:16px 0 8px;margin-top:6px}
.pmap-unit-name{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.pmap-unit-sub{font-size:12px;color:var(--muted)}
.pmap-ring{flex-shrink:0;background:var(--bg);border-radius:50%;position:relative;z-index:1;margin-left:8px}
.pmap-node{display:flex;gap:14px;align-items:flex-start;position:relative;padding:10px 12px 10px 0;margin:4px 0;cursor:pointer;border-radius:var(--r2);transition:.15s}
.pmap-node:hover .pmap-title{color:var(--accent)}
.pmap-dot{width:34px;height:34px;border-radius:50%;background:var(--surf2);color:var(--muted);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;border:2px solid var(--border);position:relative;z-index:1;margin-left:8px}
.pmap-node.done .pmap-dot{background:var(--accent);border-color:var(--accent);color:#fff}
.pmap-node.current{background:var(--surf);border:1px solid var(--accent);padding:12px;margin-left:-4px;box-shadow:var(--shadow)}
.pmap-node.current .pmap-dot{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 0 5px color-mix(in srgb,var(--accent) 22%, transparent)}
.pmap-node.up{opacity:.55}
.pmap-node.up:hover{opacity:.9}
.pmap-title{font-weight:600;font-size:14px}
.pmap-sub{font-size:12px;color:var(--muted)}

/* MASTERY BADGES (playtest Batch 5) — competence-framed, visible progress */
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(122px,1fr));gap:10px}
.badge-tile{border:1px solid var(--border);border-radius:var(--r2);padding:12px 8px;text-align:center;background:var(--surf2);opacity:.75}
.badge-tile.got{background:var(--surf);border-color:var(--accent);opacity:1}
.badge-tile.secret{border-style:dashed}
.badge-ico{font-size:22px;line-height:1.2}
.badge-name{font-size:12px;font-weight:700;margin-top:4px}
.badge-prog{font-size:11px;color:var(--muted);font-family:var(--mono)}

/* STREAK + REVIEW CHIPS on the resume card (playtest Batch 5) */
.loop-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.18);border-radius:20px;padding:3px 12px;font-size:12.5px;font-weight:600;color:#fff;margin:0 6px 10px 0}

/* READ-ALOUD → Grain "Say It Out Loud" card */
.ral-block{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin:0;box-shadow:var(--shadow)}
.ral-head{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--surf2);border-bottom:1px solid var(--border);font-family:var(--font);font-weight:600;font-size:13px;color:var(--text)}
.ral-head .lucide{width:16px;height:16px;color:var(--accent)}
.ral-sql{font-family:var(--mono);font-size:13px;background:var(--stone-900);color:var(--stone-100);padding:16px 18px;margin:0;white-space:pre;overflow-x:auto;line-height:1.7}
.ral-body{padding:16px 18px}
.ral-say{font-size:14px;font-style:italic;color:var(--clay-800);background:var(--clay-50);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;padding:9px 13px 9px 11px;margin-bottom:14px;line-height:1.55;display:flex;gap:7px;align-items:flex-start}
.ral-say .lucide{width:15px;height:15px;color:var(--accent);flex-shrink:0;margin-top:3px}
.ral-line{display:flex;flex-wrap:wrap;align-items:baseline;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)}
.ral-line:last-child{border:none}
.ral-chunk{font-family:var(--mono);font-size:12.5px;color:var(--clay-700);background:var(--clay-50);padding:2px 7px;border-radius:4px;flex-shrink:1;min-width:0;word-break:break-word;overflow-wrap:anywhere}
.ral-arrow{color:var(--muted);flex-shrink:0}
.ral-desc{font-size:13px;color:var(--muted);min-width:0}

/* Grain lesson-view helpers (story bridge, section eyebrow, auto-miss panel) */
.lesson-story{display:flex;gap:11px;align-items:flex-start;background:var(--amber-50);border:1px solid var(--amber-100);border-radius:var(--r2);padding:13px 15px;margin-bottom:18px;font-size:.9rem;line-height:1.65;color:var(--stone-800)}
.lesson-story .lucide{width:18px;height:18px;color:var(--amber-600);flex-shrink:0;margin-top:2px}
.lesson-eyebrow{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:var(--tracking-caps);color:var(--muted);margin:0 0 9px;display:flex;align-items:center;gap:7px}
.lesson-eyebrow .lucide{width:15px;height:15px;color:var(--accent)}
.card h3 .lucide{width:17px;height:17px;color:var(--accent);vertical-align:-3px;margin-right:6px}
.quiz-wrap h3 .lucide{width:17px;height:17px;color:var(--accent);vertical-align:-3px;margin-right:6px}
/* Auto-recorded misses (replaces the old self-rating). */
.miss-panel{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-top:16px;box-shadow:var(--shadow)}
.miss-panel.is-clean{border-color:var(--green)}
.miss-head{display:flex;align-items:center;gap:8px;font-family:var(--font);font-weight:600;font-size:15px;color:var(--text);margin-bottom:4px}
.miss-head .lucide{width:17px;height:17px;color:var(--accent);flex-shrink:0}
.miss-panel.is-clean .miss-head .lucide{color:var(--green)}
.miss-sub{font-size:13.5px;line-height:1.55;color:var(--muted);margin:0}
.miss-items{margin:12px 0 0;padding-left:20px;display:flex;flex-direction:column;gap:7px}
.miss-items li{font-size:14.5px;line-height:1.5;color:var(--text)}
.miss-clear{margin-top:14px}
/* Task instructions. Mobile learning apps keep the prompt large, full-contrast
   and pinned to the top of the exercise so it stays readable while you work;
   16-18px at ~1.5 line-height is the mobile body-copy floor for readability. */
.drill-instruction{font-size:17px;line-height:1.55;color:var(--text);font-weight:500;margin:0 0 14px}
@media(max-width:640px){
  .drill-instruction{position:sticky;top:56px;z-index:90;background:var(--surf);padding:10px 0 9px;border-bottom:1px solid var(--border)}
}

/* QUIZ */
.quiz-wrap{background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px;margin-top:20px}
.quiz-wrap h3{margin-bottom:14px}
.quiz-opt{display:block;width:100%;text-align:left;background:var(--surf);border:1px solid var(--border);border-radius:var(--r2);padding:11px 16px;margin-bottom:8px;cursor:pointer;font:inherit;font-size:14px;color:var(--text);transition:.15s;overflow-wrap:anywhere}
.quiz-opt:hover{border-color:var(--accent)}
.quiz-opt.correct{background:var(--leaf-50);border-color:var(--green);color:var(--leaf-700)}
.quiz-opt.wrong{background:var(--rust-50);border-color:var(--red);color:var(--rust-700)}
.quiz-exp{margin-top:12px;padding:12px 14px;background:var(--surf);border-radius:var(--r2);font-size:13px;color:var(--muted);display:none}
.quiz-exp.show{display:block}

/* PRACTICE — drill picker */
.drill-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.drill-tile{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:18px;cursor:pointer;transition:.15s;text-align:center}
.drill-tile:hover{border-color:var(--accent);transform:translateY(-2px)}
.drill-tile .icon{font-size:1.6rem;margin-bottom:8px;color:var(--accent);line-height:1}
.drill-tile h3{font-size:.9rem;margin:0 0 4px}
.drill-tile p{font-size:11px;margin:0}
.drill-count{font-size:11px;color:var(--accent);font-weight:600;margin-top:4px}

/* FILLS */
.fill-prompt{font-size:17px;line-height:1.55;color:var(--text);font-weight:500;margin-bottom:10px}
.fill-partial{font-family:var(--mono);font-size:14px;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r2);padding:12px 16px;margin-bottom:16px;white-space:pre;overflow-x:auto}

/* BUGS */
.code-broken{font-family:var(--mono);font-size:13px;background:var(--rust-50);border:1px solid var(--red);border-radius:var(--r2);padding:14px 16px;margin:10px 0;white-space:pre;overflow-x:auto;color:var(--rust-700)}
.code-fixed{font-family:var(--mono);font-size:13px;background:var(--leaf-50);border:1px solid var(--green);border-radius:var(--r2);padding:14px 16px;margin:10px 0;white-space:pre;overflow-x:auto;color:var(--leaf-700);display:none}
.code-fixed.show{display:block}
.bug-issue{font-size:13px;color:var(--red);margin:8px 0}
.hint-btn{background:none;border:none;color:var(--muted);font:inherit;font-size:12px;cursor:pointer;padding:0;text-decoration:underline}
.drill-tables{font-size:12.5px;color:var(--muted);margin:8px 0 4px;line-height:1.6}
.drill-tables code{font-family:var(--mono);color:var(--accent);background:var(--surf2);padding:1px 5px;border-radius:4px}
.hint-text{font-size:13px;color:var(--yellow);margin-top:8px;display:none}
.hint-text.show{display:block}

/* PARSONS */
.parsons-wrap{display:flex;gap:16px;margin:14px 0;flex-wrap:wrap}
.parsons-col{flex:1;min-width:200px}
.parsons-col label{font-size:12px;color:var(--muted);font-weight:600;display:block;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em}
.parsons-pool,.parsons-answer{min-height:80px;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r2);padding:8px;display:flex;flex-direction:column;gap:6px}
.parsons-answer{border-color:var(--accent)}
.parsons-chip{font-family:var(--mono);font-size:13px;background:var(--surf);border:1px solid var(--border);border-radius:var(--r2);padding:9px 12px;cursor:pointer;user-select:none;transition:.15s;display:flex;align-items:center;gap:10px}
.parsons-chip .pars-txt{flex:1;min-width:0;overflow-wrap:anywhere;word-break:break-word}
/* ↑ ↓ nudge controls on a placed line — thumb-sized, touch is the primary input */
.pars-move{display:flex;gap:4px;flex:0 0 auto}
.pars-move button{font:inherit;line-height:1;min-width:36px;min-height:36px;padding:0;color:inherit;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r2);cursor:pointer}
.pars-move button:disabled{opacity:.3;cursor:default}
.parsons-chip:hover{border-color:var(--accent);background:var(--surf2)}
.parsons-chip.dragging{opacity:.4}

/* LAB / TERMINAL */
.terminal-wrap{background:var(--stone-900);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.terminal-toolbar{background:var(--stone-800);padding:8px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--stone-700)}
.terminal-dot{width:12px;height:12px;border-radius:50%}
.terminal-title{font-size:12px;color:var(--stone-400);margin-left:4px}
.terminal-editor{width:100%;min-height:120px;background:transparent;border:none;color:var(--stone-100);font-family:var(--mono);font-size:13px;padding:14px 16px;resize:vertical;outline:none}
.terminal-actions{padding:10px 14px;display:flex;gap:10px;border-top:1px solid var(--stone-700);background:var(--stone-800)}
.terminal-results{padding:14px 16px;font-family:var(--mono);font-size:12px;min-height:60px;color:var(--stone-100);border-top:1px solid var(--stone-700);overflow-x:auto}
.terminal-results table{border-collapse:collapse;width:100%}
.terminal-results th{text-align:left;padding:4px 12px 4px 0;color:var(--clay-300);font-weight:600;border-bottom:1px solid var(--stone-700)}
.terminal-results td{padding:4px 12px 4px 0;color:var(--stone-100)}
.terminal-error{color:var(--red)}
.terminal-info{color:var(--stone-400);font-style:italic} /* fixed primitive: the terminal surface is always dark, so semantic --muted goes near-invisible in light mode */

/* FLASHCARDS */
.flashcard-outer{perspective:1000px;height:200px;margin:20px 0;cursor:pointer}
.flashcard-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:.5s;border-radius:var(--r)}
.flashcard-inner.flipped{transform:rotateY(180deg)}
.flashcard-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r);display:flex;align-items:center;justify-content:center;padding:28px;text-align:center}
.flashcard-front{background:var(--surf);border:1px solid var(--border)}
.flashcard-back{background:var(--surf2);border:1px solid var(--accent);transform:rotateY(180deg)}
.flashcard-term{font-size:1.2rem;font-weight:700}
.flashcard-def{font-size:.95rem;color:var(--muted);line-height:1.7}
.flashcard-nav{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:12px}
.fc-hint{font-size:12px;color:var(--muted);text-align:center;margin-top:8px}

/* GLOSSARY */
.gloss-search{width:100%;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r2);padding:11px 14px;color:var(--text);font:inherit;font-size:14px;outline:none;margin-bottom:16px}
.gloss-search:focus{border-color:var(--accent)}
.gloss-item{border-bottom:1px solid var(--border);padding:14px 0}
.gloss-item:last-child{border:none}
.gloss-term{font-weight:700;font-size:14px;color:var(--accent);margin-bottom:4px}
.gloss-def{font-size:13px;color:var(--muted)}

/* CROSS-KIT LINKS */
.kit-links{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
.kit-link{padding:8px 16px;border:1px solid var(--border);border-radius:var(--r2);font-size:13px;color:var(--muted);transition:.15s}

<script>

// ─── Interview Prep Pass (premium gate) ──────────────────────────────────────
if(window.apkPass) apkPass.setKit('sql');

// ─── DATA ──────────────────────────────────────────────────────────────────
const DATA = {

LESSONS: [
  // UNIT 0
  {id:101, unit:"Unit 0: Orientation", title:"What a Database Is", sub:"Tables, rows, columns — the mental model behind every query.",
   story:"You've used Excel to answer questions from a spreadsheet. Now your company says the real data lives in the database — and SQL is how you ask it questions. Before you write a single query, you need the mental model: a database is a collection of tables, each one shaped like a spreadsheet but potentially holding millions of rows.",
   intro:"A database is an organized collection of tables. Each table has rows (one record each) and columns (one field each) — exactly like a spreadsheet, but built for fast querying at scale. Databases separate concerns: an <code>orders</code> table stores orders, a <code>customers</code> table stores customer details, a <code>products</code> table stores products. SQL is the language you use to ask questions across any of them.",
   ral:{sql:"-- A database is a collection of tables\n-- orders table  →  one row per order\n-- customers table →  one row per customer\n-- products table  →  one row per product",say:"Each table has one job. SQL lets you ask questions across all of them.",
     lines:[["Table","a 2D grid of rows × columns — the basic unit of a database"],["Row","one record — one order, one customer, one product"],["Column","one field — order_id, region, revenue, date"],["Database","a container that holds many related tables"],["Schema","the blueprint — the names and types of every column in every table"]]},
   notes:"A database is not one big flat table. The data is intentionally split across many tables so it can be stored efficiently and updated without duplicating information. SQL's job is stitching those tables back together to answer a question.",
   viz:{columns:["table_name","one_row_represents","example_columns"],rows:[["orders","one sale transaction","order_id, customer_id, product_id, revenue, date"],["customers","one unique customer","customer_id, name, region, email"],["products","one product SKU","product_id, name, category, price"]],caption:"Three tables, each with a single job. Notice that order rows reference customer_id and product_id — those are the keys that will link the tables together."},
   quiz:{q:"In a relational database, why is customer data stored in a separate table from order data?",opts:["It's a limitation of SQL","Separating them avoids duplication — each customer's details are stored once, not repeated on every order row","SQL can only read one table at a time","Databases can't store different data types in one table"],ans:1,exp:"Storing customer details on every order row would repeat the same name/email/region data thousands of times. A separate customers table stores each customer once — and orders just reference the customer_id. SQL joins reconnect them on demand."},
   parsons:{prompt:"Every query names what you want, then where to get it. Arrange these two clauses.",lines:["FROM customers;","SELECT name, email"],answer:[1,0]},
   compare:"SQL always leads with what you want (SELECT) before naming the source (FROM). 'What columns' before 'which table' — that's the order every query follows.",
   build:{q:"Which query shows every column from the products table?",opts:["SELECT * FROM products;","GET * FROM products;","FROM products SELECT *;","SHOW products;"],ans:0,exp:"SELECT * pulls every column — * is shorthand for 'all columns'. FROM names the table. SELECT always leads."},
   close:"You have the mental model behind every query. Next: the grain — what one row in a table actually represents.",
   unlock:"Once you see a database as intentionally separated tables, you start noticing when someone has stuffed too much into one — the telltale sign of a schema that causes silent aggregation errors later."},
  {id:105, unit:"Unit 0: Orientation", title:"Set Up a SQL Database", sub:"Turn a raw CSV file into a real table you can query.",
   story:"Good news first: this kit needs zero setup — every lesson, practice, and lab runs right here in your browser. This lesson is about the day you want SQL on YOUR OWN data: you downloaded a dataset and it's a CSV file, not a database. The bridge is a one-time, three-part move — create a database, import the CSV into a table, verify it loaded. You don't need to do it today; just learn the shape of it, and come back when your first portfolio project needs it. Before you look at the example, commit to a guess: which has to happen first — importing the CSV, or creating the table? Even a wrong guess makes the answer stick.",
   intro:"<strong>What you're creating:</strong> with <strong>SQLite</strong>, a database is just one file on your computer (like <code>portfolio.db</code>) holding your tables. <strong>Where you type:</strong> a free desktop app called <em>DB Browser for SQLite</em> — its <em>Execute SQL</em> tab is where SQL like the example below gets typed, and its menus (File → Import → Table from CSV) do the importing for you. Name the imported table with a <code>_raw</code> suffix (the untouched original — clean into a copy later, never the original), then verify with a row count. <strong>Want the full click-by-click walkthrough?</strong> Follow the companion guide: <a href=\"../guides/set-up-a-sql-database/\" target=\"_blank\" rel=\"noopener\">Set Up a SQL Database for Beginners</a> — it takes about 15 minutes with free tools. <strong>Got a file too big for Excel?</strong> See <a href=\"../guides/handle-large-datasets/\" target=\"_blank\" rel=\"noopener\">How to Handle Large Datasets</a>. <strong>Want a second take?</strong> This AI walkthrough answers this lesson's two recall questions in depth: <a href=\"https://gemini.google.com/share/2ed9adf22a9e\" target=\"_blank\" rel=\"noopener\">CSV to Queryable Table: Steps &amp; Verification</a>.",
   ral:{sql:"CREATE TABLE steam_games_raw (\n  app_id INTEGER,\n  name TEXT,\n  price REAL,\n  release_date TEXT,\n  owners TEXT\n);\n-- then import the CSV into it, and verify:\nSELECT COUNT(*) FROM steam_games_raw;",say:"Make an empty table with the right column names and types, load the CSV into it, then count the rows to confirm everything arrived.",
     lines:[["CREATE TABLE steam_games_raw (","make a new, empty table named steam_games_raw — the _raw suffix marks the untouched original you never edit"],["app_id INTEGER, name TEXT, price REAL, …","name and type each column — whole numbers, text, decimals; wrong types break math and sorting later"],[");","close the column list and end the statement"],["-- then import the CSV","the GUI (DB Browser) or a command (.import in sqlite3) loads the CSV rows into the table"],["SELECT COUNT(*) FROM steam_games_raw;","count every row — the verify step; the count should match the source file"],["why this order?","(your guess from above) — the import needs typed columns to land in, so CREATE comes first, verify comes last"]]},
   notes:"Import traps that bite everyone once: the CSV's first row is usually headers, not data (tick 'column names in first row'); numbers with $ signs or commas import as TEXT until cleaned; and a row count that's off by more than the header row means quoting/delimiter problems. Same idea elsewhere: MySQL uses LOAD DATA INFILE, Postgres uses COPY — the workflow (create table → import → verify) is identical. You'll know it worked when: the COUNT matches the source file's row count, and SELECT * FROM steam_games_raw LIMIT 5 shows real values in every column (no blank columns, no header text sitting in row 1).",
   quiz:{q:"You import a 125,000-row CSV into steam_games_raw. What's the FIRST thing to run?",opts:["SELECT * to look at all the data","SELECT COUNT(*) — and compare it to the source file's row count","A JOIN to another table","DELETE the rows you don't need"],ans:1,exp:"Verify before you trust. COUNT(*) against the source row count catches silent import failures (dropped rows, delimiter problems) immediately. SELECT * on 125k rows tells you much less, and deleting from a _raw table breaks the whole point of keeping an untouched original."},
   parsons:{prompt:"Arrange the setup workflow as SQL + verify.",lines:["SELECT COUNT(*) FROM steam_games_raw;","-- import the CSV into the table","CREATE TABLE steam_games_raw (app_id INTEGER, name TEXT, price REAL);"],answer:[2,1,0]},
   compare:"Create the table first, load into it second, verify third. Importing before the table exists (or letting the tool guess every type) is how price columns end up as TEXT that won't sum.",
   build:{q:"Your price column imported as TEXT and SUM(price) returns garbage. What went wrong?",opts:["The column type — values like \"$4.99\" imported as text, so math doesn't work on them","SUM only works on INTEGER columns","The table name has _raw in it","SQLite can't do SUM"],ans:0,exp:"Column types are the second big import decision. Currency symbols and thousands commas force a column to TEXT; you clean those into a REAL column (in a new table — never the _raw one) before doing math."},
   close:"You can now take any CSV and make it queryable — the bridge between 'downloaded a dataset' and everything else in this kit. Next: your first real query.",
   unlock:"The create → import → verify workflow is universal: SQLite today, Postgres COPY or MySQL LOAD DATA on the job. Keeping an untouched _raw table plus a cleaned working table is the habit that separates portfolio projects that survive scrutiny from ones that don't."},
  // UNIT 1
  {id:1, core:true, unit:"Unit 1: First Queries", title:"SELECT & FROM", sub:"Pull columns from a table",
   story:"You know the mental model: databases are tables, rows have a grain, keys connect tables, queries return tables. Now write your first actual question. SELECT names the columns you want; FROM names the table to get them from. That's the whole skeleton. Every query you'll ever write starts with these two words.",
   intro:"A SELECT query is like ordering at a deli counter: you name what you want (the columns) and which counter to get it from (the table). Every SQL query starts with <code>SELECT</code> to choose columns and <code>FROM</code> to name the table. Think of it as: &ldquo;Give me <em>these columns</em> from <em>this table</em>.&rdquo;",
   ral:{
     sql:"SELECT name, email\nFROM customers;",
     say:"Give me the name and email columns from the customers table.",
     lines:[
       ["SELECT","display — start the query by listing the columns you want back"],
       ["name, email","the two columns to display, separated by a comma"],
       ["FROM","pull from — names the table to read"],
       ["customers","the table holding one row per customer"],
       [";","ends the statement"]
     ]
   },
   notes:"Use <code>SELECT *</code> to grab every column — handy for exploration, but name columns explicitly in real queries.",
   viz:{columns:["name","email"],rows:[["Maya Chen","maya@co.com"],["Jordan Lee","jordan@co.com"],["Sam Rivera","sam@co.com"],["Alex Kim","alex@co.com"]],caption:"Two columns, one row per customer — exactly the columns you named in SELECT."},
   quiz:{q:"Which clause tells SQL which table to read from?",opts:["SELECT","FROM","WHERE","ORDER BY"],ans:1,exp:"FROM names the table. SELECT names the columns you want back."},
   parsons:{prompt:"Put these two clauses in the correct order to select name and email from customers.",lines:["FROM customers;","SELECT name, email"],answer:[1,0]},
   compare:"The order is fixed: SELECT always leads, FROM always follows. Even though you think of the table first, the query names the columns before the source.",
   build:{q:"Which query returns just the name column from the customers table?",opts:["SELECT name FROM customers;","SELECT customers FROM name;","GET name FROM customers;","SELECT name, customers;"],ans:0,exp:"SELECT names the columns you want; FROM names the table. The order is always SELECT → FROM. The other options have the words in wrong order or use keywords that don't exist in SQL."},
   close:"You can pull any column from any table. Every query you'll ever write starts with exactly this.",
   unlock:"Naming columns explicitly instead of SELECT * is a production habit — it makes queries self-documenting and immune to breaking when someone later adds a column to the table."},
  {id:2, core:true, unit:"Unit 1: First Queries", title:"WHERE", sub:"Filter rows by condition",
   story:"You can pull columns from a table. Your manager's first real question isn't 'show me everything' — it's 'show me just the West region.' WHERE is the filter: it checks a condition row by row and only returns the rows where it's true. SELECT tells SQL what to show; WHERE tells it which rows.",
   intro:"WHERE is like a guest list at the door — only the rows whose name is on it (the condition is true) get in. <code>WHERE</code> filters which rows come back. Only rows where the condition is TRUE are returned.",
   ral:{
     sql:"SELECT name\nFROM customers\nWHERE status = 'active';",
     say:"Give me the names of customers whose status is 'active'.",
     lines:[
       ["SELECT name","display the name column"],
       ["FROM customers","pull from the customers table"],
       ["WHERE status = 'active'","keep only rows where the status column equals the text 'active'"],
       ["= 'active'","single quotes wrap text values; SQL uses = for equality, not =="]
     ]
   },
   notes:"Common operators: <code>=</code> <code>!=</code> <code>&gt;</code> <code>&lt;</code> <code>BETWEEN</code> <code>LIKE</code> <code>IN</code>. Combine with <code>AND</code> / <code>OR</code>.",
   viz:{columns:["name"],rows:[["Maya Chen"],["Jordan Lee"],["Alex Kim"]],caption:"Only rows where status = 'active' survive the WHERE filter — Sam (inactive) and Taylor (pending) drop out."},
   quiz:{q:"What does WHERE do?",opts:["Picks which columns to show","Filters which rows are returned","Sorts the results","Groups rows together"],ans:1,exp:"WHERE works like a bouncer at the door — each row gets checked against the condition, and only the ones that pass get in. WHERE filters rows; only rows where the condition is true survive."},
   parsons:{prompt:"Order these lines to select active customers sorted by name.",lines:["ORDER BY name;","FROM customers","WHERE status = 'active'","SELECT name"],answer:[3,1,2,0]},
   compare:"WHERE goes after FROM, not before it. The clause order is always SELECT → FROM → WHERE → ORDER BY. Swapping WHERE and FROM is a syntax error.",
   build:{q:"You want orders where the amount is over 100. Which WHERE clause is correct?",opts:["WHERE amount > 100","WHERE amount = 100","FILTER amount > 100","WHERE amount GREATER 100"],ans:0,exp:"WHERE amount > 100 is the filter. > means 'greater than'. SQL uses standard math operators: >, <, >=, <=, =, !=. FILTER and GREATER are not SQL keywords."},
   close:"You can filter to exactly the rows you need. WHERE is the single most-used clause in real analyst work.",
   unlock:"WHERE short-circuits as soon as a row fails the condition — the database stops evaluating that row immediately. Putting the most selective condition first can speed up queries on large tables, a small habit that matters at scale."},
  {id:104, unit:"Unit 1: First Queries", title:"A Query Returns a Table; NULL = Unknown", sub:"The output shape of every SQL query — and the special case of missing data.",
   story:"Keys connect the tables. One more idea before you query: SQL always returns a result set shaped like a table — even a single number is wrapped in a 1×1 table. And empty cells in a database aren't blank — they're NULL, which means 'unknown.' NULL is not zero and not empty string. It has its own comparison rules, and ignoring them causes silent wrong totals.",
   intro:"Every SQL query returns a table — rows and columns, even if it's one row or one column. That's the contract. And when a value is missing or unknown, databases store NULL — a special sentinel meaning 'we don't know.' NULL is NOT zero. NULL is NOT an empty string. NULL doesn't equal NULL. Comparisons with NULL require <code>IS NULL</code> / <code>IS NOT NULL</code>, not <code>= NULL</code>.",
   ral:{sql:"SELECT name, revenue\nFROM orders\nWHERE region IS NULL;",say:"Show me every order where the region is unknown (NULL).",
     lines:[["SELECT name, revenue","display the name and revenue columns"],["FROM orders","pull from the orders table"],["WHERE region IS NULL","keep only rows where region is unknown — IS NULL is the only test that works; = NULL never matches, because NULL equals nothing"],["NULL","means 'unknown' — not zero, not blank; NULL + anything = NULL"],["COUNT(*) vs COUNT(col)","COUNT(*) counts every row; COUNT(col) skips NULLs — the gap is your missing-value count"]]},
   notes:"COUNT(*) and COUNT(column) return different numbers when a column has NULLs. COUNT(*) counts every row; COUNT(revenue) skips rows where revenue is NULL. If your totals seem low, check for NULLs with SELECT COUNT(*) vs SELECT COUNT(revenue) — a difference tells you how many NULL rows there are.",
   viz:{columns:["order_id","region","revenue","COUNT(*) sees this row?","COUNT(revenue) sees this?"],rows:[["1001","West","150","yes ✓","yes ✓"],["1002","NULL","200","yes ✓","yes ✓"],["1003","East","NULL","yes ✓","no — NULL skipped"]],caption:"COUNT(*) counts all 3 rows. COUNT(revenue) counts only 2 (skips the NULL). COUNT(region) counts only 2 (skips the NULL row 1002). These distinctions change your totals silently if you're not expecting them."},
   quiz:{q:"You run SELECT COUNT(*) and get 500. You run SELECT COUNT(revenue) and get 480. What does this tell you?",opts:["The query has a bug","20 rows have a NULL value in the revenue column","revenue has 20 duplicate values","You should use SUM instead"],ans:1,exp:"COUNT(*) counts every row. COUNT(column) skips NULLs. A difference of 20 means 20 rows have revenue = NULL. Those rows are silently excluded from COUNT(revenue) — and will also be excluded from SUM(revenue) and AVG(revenue)."},
   parsons:{prompt:"Find rows where the region is missing (NULL). Arrange these clauses.",lines:["WHERE region IS NULL;","FROM orders","SELECT order_id, revenue"],answer:[2,1,0]},
   compare:"IS NULL is the only correct test for missing values. The common mistake is writing = NULL — but NULL means 'unknown', so NULL = NULL evaluates to unknown (false), not true. IS NULL bypasses that.",
   build:{q:"Which query finds rows where the email column is missing?",opts:["SELECT * FROM customers WHERE email IS NULL;","SELECT * FROM customers WHERE email = NULL;","SELECT * FROM customers WHERE email = '';","SELECT * FROM customers WHERE email != '';"],ans:0,exp:"IS NULL is the only correct test for missing values. = NULL always returns false — unknown can't equal anything, including itself. An empty string ('') is not the same as NULL."},
   close:"You know what SQL returns and how NULL behaves — that prevents a whole class of silent wrong answers. Next: your first real query.",
   unlock:"NULL propagation is the most silent source of wrong totals in SQL. Once you know that NULL + anything = NULL and that COUNT(col) skips NULLs, you'll catch calculation errors that fool most junior analysts."},
  {id:3, unit:"Unit 1: First Queries", title:"ORDER BY & LIMIT", sub:"Sort and cap your results",
   story:"You can filter rows. Your manager wants the highest-revenue orders first, not whatever order the database stored them in. ORDER BY sorts the result — ASC for smallest to largest, DESC for largest to smallest. LIMIT caps how many rows come back. Two small clauses that make query output readable.",
   intro:"ORDER BY and LIMIT are like a leaderboard: sort everyone by score, then show just the top few. <code>ORDER BY</code> sorts results. <code>LIMIT</code> caps how many rows come back — essential for large tables.",
   ral:{
     sql:"SELECT name, order_date\nFROM orders\nORDER BY order_date DESC\nLIMIT 5;",
     say:"Give me the name and order date from orders, sorted by most recent first, and just the top 5 results.",
     lines:[
       ["SELECT name, order_date","display the name and order date columns"],
       ["FROM orders","pull from the orders table"],
       ["ORDER BY order_date DESC","sort by order date — DESC = descending, newest first"],
       ["LIMIT 5","return only the first 5 rows after sorting"]
     ]
   },
   notes:"<code>ASC</code> (ascending, A→Z, 0→9) is the default. <code>DESC</code> reverses it. Always use LIMIT when exploring large data.",
   viz:{columns:["name","order_date"],rows:[["Maya Chen","2026-05-30"],["Alex Kim","2026-05-28"],["Jordan Lee","2026-05-21"],["Sam Rivera","2026-05-14"],["Maya Chen","2026-05-02"]],caption:"Sorted newest-first by order_date, then LIMIT caps it at the top 5 rows."},
   quiz:{q:"What does DESC do in ORDER BY?",opts:["Filters duplicates","Sorts largest/newest first","Limits row count","Joins two tables"],ans:1,exp:"DESC = descending order — largest number or most-recent date appears first."},
   parsons:{prompt:"Get the 3 most recent orders — sort newest first, then cap the result.",lines:["LIMIT 3;","FROM orders","SELECT order_date","ORDER BY order_date DESC"],answer:[2,1,3,0]},
   compare:"LIMIT must come after ORDER BY, not before it. The sort happens first, then the cap is applied. Swapping them would cap before sorting — you'd get a random 3 rows sorted, not the 3 most recent.",
   build:{q:"Get the 10 oldest orders. Which query is correct?",opts:["SELECT * FROM orders ORDER BY order_date ASC LIMIT 10;","SELECT * FROM orders ORDER BY order_date DESC LIMIT 10;","SELECT * FROM orders LIMIT 10 ORDER BY order_date;","SELECT TOP 10 * FROM orders ORDER BY order_date;"],ans:0,exp:"ASC sorts oldest first (smallest date first). DESC would give newest. LIMIT must come after ORDER BY — not before. TOP 10 is SQL Server syntax, not MySQL."},
   close:"You can sort results and cap them to a useful size. ORDER BY + LIMIT is behind every leaderboard, top-N report, and 'show me the latest' query.",
   unlock:"NULL values sort to the end in ASC and the beginning in DESC in most databases. If your top-10 results look wrong, check whether NULLs are sneaking in before real values."},
  {id:102, unit:"Unit 2: Aggregation & Shaping", title:"The Grain of a Table", sub:"What one row represents — the most important question before you query.",
   story:"You can picture what a database is. But before you write a single query, you need to ask: what does one row in this table mean? That's the grain. A row in orders is one sale. A row in customers is one customer. Confuse the grain — especially when joining tables — and your aggregations double-count silently.",
   intro:"The grain of a table is what one row represents. Before you query anything, state the grain out loud: 'one row = one order.' This becomes critical when you join tables. If your <code>orders</code> table has one row per order and your <code>products</code> table has one row per product, a join that doesn't respect the grain can fan out rows and silently multiply your revenue totals.",
   ral:{sql:"-- ALWAYS ask: what does one row mean?\n-- orders grain: one row = one sale transaction\n-- customers grain: one row = one unique customer\n-- daily_agg grain: one row = one day's totals",say:"State the grain before you query. It's the check that prevents silent double-counting.",
     lines:[["Grain","what one row represents — 'one row = one sale'"],["Grain mismatch","joining two tables at different grains → rows fan out → totals get multiplied"],["Check the grain","SELECT COUNT(*) vs SELECT COUNT(DISTINCT order_id) — if they differ, you have duplicates"],["Aggregation & grain","GROUP BY collapses to a new grain — by region, by month, etc."],["Why it matters","JOIN double-counting is the #1 silent error in SQL analytics"]]},
   notes:"Before any JOIN, confirm the grain of both tables. If orders has one row per line item (not per order) and you join on order_id, you'll get one row per line item — not per order. Your SUM(revenue) will count revenue once per item, not once per order. Always check.",
   viz:{columns:["scenario","COUNT(*)","COUNT(DISTINCT order_id)","conclusion"],rows:[["Clean orders table","500","500","grain is one row per order ✓"],["Line-item orders table","1,840","500","grain is one row per line item — totals will be inflated if you don't GROUP right"]],caption:"COUNT(*) vs COUNT(DISTINCT primary_key) is the grain check. When they match, you have one row per entity. When they differ, you're at a finer grain — factor that in before aggregating."},
   quiz:{q:"You join orders (500 rows) to a promotions table where each order can have multiple promotions. After the join you have 1,200 rows. What happened?",opts:["500 orders + 700 promotions were added as new rows","The join fanned out — each order now appears once per promotion it matched, so revenue totals will be inflated","SQL always adds extra rows on a join","You need to use DISTINCT to get 500 rows"],ans:1,exp:"When one table has multiple matching rows in the join table, the result fans out — one order row becomes multiple. This is grain mismatch: orders are at order grain but the result is now at order-promotion grain. SUM(revenue) now totals revenue once per promotion match — silently wrong."},
   parsons:{prompt:"Arrange to run the grain check — compare total rows to unique order IDs.",lines:["FROM orders;","SELECT COUNT(*) AS total_rows,","COUNT(DISTINCT order_id) AS unique_orders"],answer:[1,2,0]},
   compare:"The grain check needs both COUNT(*) and COUNT(DISTINCT key) in the same query. A single COUNT doesn't tell you whether duplicates exist — you need to compare the two numbers.",
   build:{q:"You need to check if customer_id is truly unique in the customers table. Which query does that?",opts:["SELECT COUNT(*) AS rows, COUNT(DISTINCT customer_id) AS unique_ids FROM customers;","SELECT DISTINCT customer_id FROM customers LIMIT 1;","SELECT customer_id FROM customers WHERE customer_id IS UNIQUE;","SELECT COUNT(customer_id) FROM customers;"],ans:0,exp:"Comparing COUNT(*) to COUNT(DISTINCT customer_id) reveals duplicates. If they match, each customer_id is unique. If they differ, some IDs appear more than once — and your joins will fan out."},
   close:"You can check the grain of any table before trusting it. Next: the keys that link tables together.",
   unlock:"The grain check — COUNT(*) vs COUNT(DISTINCT key) — is the first thing senior analysts run on any table they've never touched. Asking 'what does one row mean?' out loud in a meeting immediately signals analytical rigor."},
  {id:5, core:true, unit:"Unit 2: Aggregation & Shaping", title:"COUNT, SUM & GROUP BY", sub:"Summarize data by category",
   story:"You can join tables and filter rows. Now your manager wants summaries: 'How many orders per region? What's total revenue per product?' GROUP BY collapses rows into groups; COUNT and SUM run the math on each group. The same data, now aggregated — the move you'll make on almost every stakeholder question.",
   intro:"GROUP BY is like sorting a shoebox of receipts into stacks by store, then totalling each stack. Aggregate functions collapse many rows into one number. <code>GROUP BY</code> tells SQL which column to group on before aggregating.",
   ral:{
     sql:"SELECT status, COUNT(*) AS total\nFROM customers\nGROUP BY status;",
     say:"For each distinct status, count how many customers have it — and label that count 'total'.",
     lines:[
       ["SELECT status,","display each group's status value"],
       ["COUNT(*) AS total","count every row in the group — AS total names (aliases) the new column"],
       ["FROM customers","pull from the customers table"],
       ["GROUP BY status","collapse rows sharing a status value into one summary row, so the count runs per status"]
     ]
   },
   notes:"<code>SUM(col)</code> adds values. <code>AVG(col)</code> averages. <code>MAX / MIN</code> find extremes. Every non-aggregate column in SELECT must appear in GROUP BY. <strong>Fuzzy on what COUNT actually counts?</strong> The companion guide breaks down <a href=\"../guides/sql-count-function/\" target=\"_blank\" rel=\"noopener\">COUNT(*) vs COUNT(column) vs COUNT(DISTINCT)</a> — the difference interviewers love to ask about, plus how analysts use COUNT to verify a data migration.",
   viz:{columns:["status","COUNT(*)","SUM(amt)","AVG(amt)","MAX(amt)","MIN(amt)"],rows:[["active","3","540","180","260","95"],["inactive","1","120","120","120","120"],["pending","1","80","80","80","80"]],caption:"GROUP BY collapses each status to one row — and the same grouping feeds every aggregate at once: COUNT, SUM, AVG, MAX, and MIN."},
   quiz:{q:"Which column must appear in GROUP BY if it's in SELECT without an aggregate?",opts:["The primary key","Any column used in WHERE","Every non-aggregate column in SELECT","Only text columns"],ans:2,exp:"GROUP BY is like sorting mail into labeled bins — every label you print on the report needs its own bin. Any non-aggregate column in SELECT must be in GROUP BY so SQL knows how to group the rows."},
   parsons:{prompt:"Arrange to count customers by status.",lines:["GROUP BY status;","SELECT status, COUNT(*) AS total","FROM customers"],answer:[1,2,0]},
   compare:"Every non-aggregate column in SELECT must appear in GROUP BY. The most common fix when a GROUP BY query errors: check whether the SELECT lists a column that isn't aggregated and isn't in GROUP BY.",
   build:{q:"You need total revenue per region. Which query is correct?",opts:["SELECT region, SUM(revenue) FROM orders GROUP BY region;","SELECT SUM(revenue) FROM orders GROUP BY region;","SELECT region, SUM(revenue) FROM orders;","SELECT region, SUM(revenue) FROM orders GROUP BY SUM(revenue);"],ans:0,exp:"SELECT region names the group; SUM(revenue) aggregates it; GROUP BY region makes one row per region. Option B drops region from SELECT — groups exist but have no label. Option C has no GROUP BY — SQL errors. Option D groups by an aggregate — impossible."},
   close:"You can summarize any data set by category. GROUP BY + aggregate is behind every pivot table, every category breakdown, every 'by region / by month' your manager will ask for.",
   unlock:"The rule 'every non-aggregate column in SELECT must be in GROUP BY' has one exception: you can SELECT a constant expression. Everything else must be either aggregated or grouped."},
  {id:7, core:true, unit:"Unit 2: Aggregation & Shaping", title:"HAVING & Duplicates", sub:"Filter groups and remove dupes",
   story:"You can aggregate with GROUP BY. But WHERE filters rows before grouping — you can't use it to filter on an aggregated result like COUNT or SUM. HAVING filters after grouping: 'show me only regions where total revenue > 1000.' HAVING is WHERE for groups.",
   intro:"If WHERE bounces people at the club door, HAVING checks the groups already inside — it filters after everyone's been sorted into tables. You've already used <code>WHERE</code> to filter rows. <code>HAVING</code> works the same way — but it filters <em>after</em> grouping, so you can filter on aggregate results like COUNT or SUM. <code>DISTINCT</code> removes duplicate rows.",
   ral:{
     sql:"SELECT status, COUNT(*) AS n\nFROM customers\nGROUP BY status\nHAVING COUNT(*) > 2;",
     say:"For each status, count the customers — but only show statuses that have more than 2 customers.",
     lines:[
       ["SELECT status, COUNT(*) AS n","display each status and its row count, named n"],
       ["FROM customers","pull from the customers table"],
       ["GROUP BY status","collapse rows sharing a status into one summary row"],
       ["HAVING COUNT(*) > 2","keep only groups whose count is greater than 2 — HAVING filters after grouping, where WHERE cannot see aggregates"]
     ]
   },
   notes:"<code>SELECT DISTINCT col</code> deduplicates by that column. To find duplicate rows: GROUP BY all columns + HAVING COUNT(*) > 1.",
   viz:{columns:["Technique","What it does","Result"],rows:[["HAVING COUNT(*) > 2","filters GROUPS after aggregating","active (3) — others dropped"],["SELECT DISTINCT status","removes DUPLICATE rows","active, inactive, pending"]],caption:"Two different jobs: HAVING filters groups after GROUP BY (keeps only 'active'), while DISTINCT removes duplicate rows from the result."},
   quiz:{q:"What is the key difference between WHERE and HAVING?",opts:["WHERE is faster","WHERE filters before grouping; HAVING filters after","HAVING works with any column","They are interchangeable"],ans:1,exp:"WHERE screens individuals at the door; HAVING judges whole teams after they've formed. WHERE runs before GROUP BY, HAVING after — so use HAVING to filter on aggregate results."},
   parsons:{prompt:"Filter groups with more than 2 members — one status group per row.",lines:["HAVING COUNT(*) > 2;","SELECT status, COUNT(*) AS n","GROUP BY status","FROM customers"],answer:[1,3,2,0]},
   compare:"Clause order is fixed: SELECT → FROM → WHERE → GROUP BY → HAVING → ORDER BY. HAVING must follow GROUP BY — it filters the groups that GROUP BY created. Placing HAVING before GROUP BY is a syntax error.",
   build:{q:"You want only regions with more than $10,000 in total revenue. Which is correct?",opts:["SELECT region, SUM(revenue) FROM orders GROUP BY region HAVING SUM(revenue) > 10000;","SELECT region, SUM(revenue) FROM orders WHERE SUM(revenue) > 10000 GROUP BY region;","SELECT region, SUM(revenue) FROM orders HAVING revenue > 10000 GROUP BY region;","SELECT region FROM orders WHERE revenue > 10000 GROUP BY region;"],ans:0,exp:"HAVING filters on the aggregate after grouping. Option B uses WHERE with an aggregate — syntax error, WHERE runs before aggregation. Option C puts HAVING before GROUP BY — wrong clause order. Option D filters individual rows, not group totals."},
   close:"You can filter summaries, not just raw rows. HAVING is to GROUP BY what WHERE is to individual rows — the filter that runs after the math is done.",
   unlock:"SELECT DISTINCT is simpler than GROUP BY for pure deduplication, but GROUP BY is more versatile — you can add COUNT(*) or HAVING to it. Use DISTINCT when you only want unique values; use GROUP BY when you also need counts or group-level filters."},
  {id:8, unit:"Unit 2: Aggregation & Shaping", title:"CASE & COALESCE", sub:"Conditional logic in SQL",
   story:"You can filter groups. Your manager wants a new column: 'label orders over $200 as High, under as Low.' That's conditional logic inside the query — CASE is SQL's IF/ELSE. And COALESCE replaces NULLs with a fallback value so they don't disappear from your aggregations silently.",
   intro:"CASE is SQL's choose-your-own-adventure: depending on the answer to a question, it returns a different result. <code>CASE</code> is SQL's if/else. <code>COALESCE</code> returns the first non-NULL value from a list.",
   ral:{
     sql:"SELECT name,\n  CASE WHEN status='active' THEN 'Yes' ELSE 'No' END AS is_active\nFROM customers;",
     say:"Give me each customer's name and a 'Yes' or 'No' label — 'Yes' if their status is 'active', otherwise 'No'. Label that column 'is_active'.",
     lines:[
       ["SELECT name,","display the name column, plus the calculated column below"],
       ["CASE WHEN status='active' THEN 'Yes'","start the conditional — if the status is 'active', return 'Yes'"],
       ["ELSE 'No'","the fallback value when no condition matches"],
       ["END AS is_active","close the CASE and name (alias) the new column is_active"],
       ["FROM customers;","pull from the customers table"]
     ]
   },
   notes:"<code>COALESCE(email, phone, 'no contact')</code> — returns the first non-NULL. Useful for fallback values when data is incomplete.",
   viz:{columns:["name","is_active (CASE)","contact (COALESCE)"],rows:[["Maya Chen","Yes","maya@co.com"],["Jordan Lee","Yes","555-0182"],["Sam Rivera","No","no contact"],["Alex Kim","Yes","alex@co.com"]],caption:"Two conditional tools side by side: CASE builds the Yes/No column from status, while COALESCE(email, phone, 'no contact') fills the contact column with the first value that isn't NULL."},
   quiz:{q:"What does COALESCE(a, b, c) return?",opts:["The sum of a, b, c","The last non-NULL value","The first non-NULL value","Always returns a"],ans:2,exp:"COALESCE works like calling down a phone list and taking the first person who picks up. It returns the first non-NULL value in the list — great for providing fallbacks."},
   parsons:{prompt:"Label each customer's tier using CASE, then pull from the customers table.",lines:["FROM customers;","  ELSE 'Standard' END AS tier","SELECT name,","  CASE WHEN orders > 5 THEN 'VIP'"],answer:[2,3,1,0]},
   compare:"CASE always closes with END. The alias (AS tier) goes after END, not inside the expression. ELSE is optional but always add it — without it, unmatched rows return NULL silently.",
   build:{q:"You need a column that shows 'Missing' wherever phone is NULL. Which is correct?",opts:["SELECT name, COALESCE(phone, 'Missing') AS phone FROM customers;","SELECT name, CASE WHEN phone = NULL THEN 'Missing' END FROM customers;","SELECT name, IF phone IS NULL THEN 'Missing' FROM customers;","SELECT name, REPLACE(phone, NULL, 'Missing') FROM customers;"],ans:0,exp:"COALESCE(phone, 'Missing') returns phone if not NULL, otherwise 'Missing'. Option B uses = NULL — always false; should be IS NULL. Option C uses IF as a statement — not valid inside a SELECT. Option D: REPLACE operates on strings, not NULLs."},
   close:"You can branch logic inside a query and handle missing values cleanly. CASE and COALESCE appear in nearly every real analyst query.",
   unlock:"CASE WHEN can nest inside aggregate functions: SUM(CASE WHEN status='active' THEN 1 ELSE 0 END) counts active rows without a WHERE filter — letting you compute multiple conditional counts in a single pass over the table."},
  {id:103, unit:"Unit 3: Joins", title:"Keys & Why Tables Relate", sub:"How tables connect — and what a JOIN is actually doing.",
   story:"You know the grain of each table. Now you need to connect them. An orders row knows the customer_id — but the customer's name lives in the customers table. The key is the bridge: match the customer_id in orders to the id in customers and you can pull name, region, anything. That's what makes a database more powerful than one giant flat spreadsheet.",
   intro:"A <strong>primary key</strong> uniquely identifies every row in a table — like an order_id or customer_id. A <strong>foreign key</strong> is a column in one table that references the primary key of another. That's the link. When you write a JOIN, you're telling SQL: 'for every row in orders, find the matching row in customers where orders.customer_id = customers.id.' Keys make that match possible.",
   ral:{sql:"SELECT o.order_id, c.name, o.revenue\nFROM orders o\nJOIN customers c ON o.customer_id = c.id;",say:"For every order, find the matching customer and pull their name alongside the order's revenue.",
     lines:[["SELECT o.order_id, c.name, o.revenue","display the order ID and revenue from orders, plus the name from customers — the prefixes say which table each column comes from"],["FROM orders o","pull from the orders table, nicknamed (aliased) o"],["JOIN customers c","bring in the customers table, nicknamed c"],["ON o.customer_id = c.id","match rows where the order's customer_id (the foreign key) equals the customer's id (the primary key)"],["One-to-many","one customer → many orders — the reason customer data lives in its own table"]]},
   notes:"The JOIN condition is where most SQL errors are made. Make sure you're joining on the right columns — the FK in one table to the PK in the other. Joining on a non-unique column can fan out your rows. And never join without an ON clause — that's a cross join, which returns every possible combination of rows from both tables.",
   viz:{columns:["orders row","orders.customer_id","→ match →","customers.id","customers.name"],rows:[["order #1001","C-45","matches","C-45","Maya Chen"],["order #1002","C-88","matches","C-88","Jordan Lee"],["order #1003","C-45","matches","C-45","Maya Chen (again)"]],caption:"The FK (orders.customer_id) bridges to the PK (customers.id). Maya appears twice because she placed two orders — one row in customers, two rows in orders. That's the one-to-many relationship."},
   quiz:{q:"In a JOIN between orders and customers, the ON clause should match which columns?",opts:["Any two columns with the same name","The foreign key in orders (customer_id) to the primary key in customers (id)","The revenue column to the price column","ORDER BY columns"],ans:1,exp:"Think of it like a hotel: every room key (order) has the room number of exactly one room (customer) printed on it. A JOIN connects the FK in one table to the PK it references — orders.customer_id is the FK; customers.id is the PK. Matching these two columns is what stitches the tables together correctly."},
   parsons:{prompt:"Arrange this JOIN to pull customer names onto each order row.",lines:["ON o.customer_id = c.id;","FROM orders o","JOIN customers c","SELECT o.order_id, c.name, o.revenue"],answer:[3,1,2,0]},
   compare:"The ON clause must match the foreign key to the primary key — orders.customer_id references customers.id. Joining on any other column pair produces wrong or empty results.",
   build:{q:"Which JOIN condition correctly links the orders table to the customers table?",opts:["ON o.customer_id = c.id","ON o.id = c.customer_id","ON orders = customers","ON o.customer_id = o.id"],ans:0,exp:"The foreign key (orders.customer_id) must match the primary key it references (customers.id). This pair is the bridge. Swapping sides gives you nothing — or the wrong rows."},
   close:"You can connect two tables on their shared key. Next: what a query returns as a shape, and what NULL means.",
   unlock:"Primary and foreign keys are the invisible skeleton of every database. Understanding them lets you read an entity-relationship diagram and figure out how to join any two tables — even ones you've never queried before."},
  {id:4, core:true, unit:"Unit 3: Joins", title:"INNER JOIN", sub:"Match rows across two tables",
   story:"You can query one table cleanly. Your manager asks: 'Show me order revenue with the customer name.' The customer name lives in a different table. INNER JOIN stitches two tables together on a shared key — every order row gets its customer row glued on. The grain warning from the Aggregation unit applies here: mismatched grains silently double your totals.",
   intro:"An INNER JOIN is like matching socks from two laundry piles — you only keep the ones that have a partner in both piles. <code>INNER JOIN</code> links two tables on a shared column. Only rows with a match in both tables appear.",
   ral:{
     sql:"SELECT c.name, o.order_date\nFROM customers c\nINNER JOIN orders o ON c.id = o.customer_id;",
     say:"Give me each customer's name alongside their order dates by matching customers to their orders. Drop rows that don't have a match on both sides.",
     lines:[
       ["SELECT c.name, o.order_date","display the customer's name and the order's date — the prefixes are the table aliases"],
       ["FROM customers c","pull from customers, aliased c"],
       ["INNER JOIN orders o","bring in the orders table, aliased o — only rows with a match on both sides survive"],
       ["ON c.id = o.customer_id","match rows where the customer's id equals the order's customer_id"]
     ]
   },
   notes:"If a customer has no orders, they won't appear — that's what makes it an INNER join. Use aliases (short letters) to keep queries readable.",
   viz:{columns:["name","order_date"],rows:[["Maya Chen","2026-05-30"],["Maya Chen","2026-05-02"],["Jordan Lee","2026-05-21"],["Alex Kim","2026-05-28"]],caption:"Only customers who have orders appear — Sam and Taylor (no orders) are dropped by the INNER JOIN."},
   quiz:{q:"What happens to customers with no matching orders in an INNER JOIN?",opts:["They appear with NULLs","They are excluded","The query errors","They appear twice"],ans:1,exp:"An INNER JOIN is like a party where you only get in if your name is on both guest lists. It keeps rows with a match in both tables — no match, excluded."},
   parsons:{prompt:"Arrange this JOIN to pull customer names alongside their order dates.",lines:["SELECT c.name, o.order_date","INNER JOIN orders o ON c.id = o.customer_id;","FROM customers c"],answer:[0,2,1]},
   compare:"The ON clause is required. Without it you get a cross join — every customer paired with every order. The alias is essential too: 'id' without a table prefix is ambiguous when both tables have that column.",
   build:{q:"Which query correctly adds customer names to each order row?",opts:["SELECT c.name, o.amount FROM customers c INNER JOIN orders o ON c.id = o.customer_id;","SELECT name, amount FROM customers, orders;","SELECT c.name, o.amount FROM customers c INNER JOIN orders o;","SELECT c.name FROM customers c JOIN orders o WHERE c.id = o.customer_id;"],ans:0,exp:"INNER JOIN with an ON clause is the correct pattern. Option B is a cross join (every customer × every order). Option C is missing the ON clause — syntax error. Option D uses WHERE instead of ON, which works but is old style and confusing."},
   close:"You can join two tables and pull columns from both. INNER JOIN is the engine behind most multi-table analyst queries.",
   unlock:"Most analysts eventually alias every table (c for customers, o for orders) — not just for readability, but because the moment a query involves three or more tables, unaliased column names become impossible to parse."},
  // UNIT 2
  {id:6, core:true, unit:"Unit 3: Joins", title:"LEFT JOIN & NULLs", sub:"Keep all rows from the left table",
   story:"INNER JOIN only keeps rows that match in both tables. Your manager asks: 'Show me all customers, even the ones who never placed an order.' INNER JOIN would drop them. LEFT JOIN keeps every row from the left table — and fills NULL into the right-table columns when there's no match. That's when the NULL lesson from Unit 1 becomes critical.",
   intro:"A LEFT JOIN is like taking class attendance: every student on your roster stays on the list, even the ones who turned in no homework (those columns just come back blank/NULL). <code>LEFT JOIN</code> keeps every row from the left table. If there's no match on the right, you get NULLs.",
   ral:{
     sql:"SELECT c.name, o.order_date\nFROM customers c\nLEFT JOIN orders o ON c.id = o.customer_id;",
     say:"Give me every customer's name and any matching order dates — keep customers even if they've never placed an order (their order_date will just be empty).",
     lines:[
       ["SELECT c.name, o.order_date","display each customer's name and any matching order date"],
       ["FROM customers c","pull from customers — the left table, whose rows are all kept"],
       ["LEFT JOIN orders o","bring in orders; customers with no match still appear, with NULL in the order columns"],
       ["ON c.id = o.customer_id","match on the shared customer key"]
     ]
   },
   notes:"Use <code>WHERE o.customer_id IS NULL</code> after a LEFT JOIN to find customers with zero orders — a classic gap-finding pattern.",
   viz:{columns:["name","order_date"],rows:[["Maya Chen","2026-05-30"],["Jordan Lee","2026-05-21"],["Alex Kim","2026-05-28"],["Sam Rivera","NULL"],["Taylor Brooks","NULL"]],caption:"Every customer stays — the ones with no orders get NULL on the right. That's the LEFT JOIN keeping the whole left table."},
   quiz:{q:"What value fills the right-side columns when a LEFT JOIN finds no match?",opts:["0","Empty string","NULL","The row is dropped"],ans:2,exp:"It's like a class roster with an optional sign-up sheet — every student stays on the list, and those who never signed up just have a blank next to their name. NULL fills unmatched columns in a LEFT JOIN; the left row still appears."},
   parsons:{prompt:"Find all customers and their orders — keep customers even if they have no orders.",lines:["SELECT c.name, o.order_date","LEFT JOIN orders o ON c.id = o.customer_id;","FROM customers c"],answer:[0,2,1]},
   compare:"LEFT JOIN goes after FROM, just like INNER JOIN. Clause order: FROM (left table) → LEFT JOIN (right table) → ON. Swapping FROM and LEFT JOIN reverses which side gets kept.",
   build:{q:"You need all customers, including those with no purchases. Which query works?",opts:["SELECT c.name FROM customers c LEFT JOIN orders o ON c.id = o.customer_id;","SELECT c.name FROM customers c INNER JOIN orders o ON c.id = o.customer_id;","SELECT c.name FROM orders o LEFT JOIN customers c ON c.id = o.customer_id;","SELECT c.name FROM customers c WHERE o.customer_id IS NULL;"],ans:0,exp:"LEFT JOIN keeps every row from the LEFT table (customers). Customers with no orders appear with NULL on the order columns. Option B is INNER JOIN — drops unmatched customers. Option C flips the tables — orders become the kept side. Option D has no join at all and references an undefined alias."},
   close:"You can return every row from a table regardless of whether it matches the other side. LEFT JOIN + IS NULL is the pattern behind every 'find customers with no orders' question.",
   unlock:"LEFT JOIN + WHERE right.key IS NULL is the anti-join — it finds rows that exist in one table but NOT in another. It's cleaner and safer than NOT IN when the subquery might return NULLs."},
  {id:13, unit:"Unit 3: Joins", title:"RIGHT JOIN & FULL OUTER JOIN", sub:"Keep all rows from the right table — or from both",
   story:"You've used LEFT JOIN to keep all rows from the left table. But sometimes the question flips: 'Show me all orders, even if their customer record was deleted.' That keeps the right table complete. And occasionally you need everything from BOTH tables — customers with no orders AND orders with no customer. That's a FULL OUTER JOIN.",
   intro:"RIGHT JOIN is a mirror of LEFT JOIN — it keeps every row from the right table, filling NULLs on the left side when there's no match. FULL OUTER JOIN combines both: all rows from both tables, NULLs wherever a side has no match. MySQL doesn't support FULL OUTER JOIN directly, but you can simulate it with UNION.",
   ral:{
     sql:"-- RIGHT JOIN: keep all orders even if customer is gone\nSELECT c.name, o.order_id, o.amount\nFROM customers c\nRIGHT JOIN orders o ON c.id = o.customer_id;\n\n-- FULL OUTER JOIN (MySQL workaround)\nSELECT c.name, o.amount\nFROM customers c\nLEFT JOIN orders o ON c.id = o.customer_id\nUNION\nSELECT c.name, o.amount\nFROM customers c\nRIGHT JOIN orders o ON c.id = o.customer_id;",
     say:"Get every order with its customer name — even orphaned orders where the customer no longer exists. Then combine both directions with UNION to see every customer and every order at once.",
     lines:[
       ["SELECT c.name, o.order_id, o.amount","display the customer's name plus the order's id and amount"],
       ["FROM customers c","start from customers on the left"],
       ["RIGHT JOIN orders o ON c.id = o.customer_id","keep every row from the right table (orders) — orphaned orders show NULL for the customer name"],
       ["LEFT JOIN … UNION … RIGHT JOIN","the MySQL workaround for FULL OUTER JOIN — one half keeps all customers, the other keeps all orders"],
       ["UNION","stack the two result sets into one, removing exact duplicates"]
     ]
   },
   notes:"In practice, most analysts rewrite RIGHT JOINs as LEFT JOINs by swapping the table order — it reads more naturally and avoids confusion. FULL OUTER JOIN is rare in day-to-day work but a common interview question. The key is knowing WHEN each join is needed, not just the syntax.",
   viz:{columns:["JOIN type","Rows returned","NULLs where"],rows:[["INNER JOIN","Only matching rows","No NULLs from join"],["LEFT JOIN","All left + matching right","Right side when no match"],["RIGHT JOIN","Matching left + all right","Left side when no match"],["FULL OUTER JOIN","All rows from both","Either side when no match"]],caption:"All four join types at a glance. In practice, rewrite RIGHT JOINs as LEFT JOINs by flipping table positions — same result, more readable."},
   quiz:{q:"Some orders have a customer_id that no longer exists in the customers table. Which JOIN keeps all orders regardless?",opts:["INNER JOIN","LEFT JOIN with customers on left","RIGHT JOIN with customers on left, orders on right","CROSS JOIN"],ans:2,exp:"RIGHT JOIN keeps every row from the right table (orders) and fills NULLs for unmatched left-table columns. Equivalently: swap tables and use LEFT JOIN orders LEFT JOIN customers — same data, more readable."},
   parsons:{prompt:"Get all orders with their customer names — keep orphaned orders where no customer match exists.",lines:["RIGHT JOIN orders o ON c.id = o.customer_id;","FROM customers c","SELECT c.name, o.order_id"],answer:[2,1,0]},
   compare:"Clause order: SELECT → FROM (left) → RIGHT JOIN (right) → ON. RIGHT JOIN keeps the RIGHT table complete. Most analysts rewrite RIGHT JOINs as LEFT JOINs by flipping table positions — same result, more readable.",
   build:{q:"Some orders have no matching customer record. Which query keeps ALL orders?",opts:["SELECT o.order_id FROM customers c RIGHT JOIN orders o ON c.id = o.customer_id;","SELECT o.order_id FROM customers c INNER JOIN orders o ON c.id = o.customer_id;","SELECT o.order_id FROM customers c LEFT JOIN orders o ON c.id = o.customer_id;","SELECT o.order_id FROM orders o LEFT JOIN customers c ON c.id = o.customer_id;"],ans:0,exp:"RIGHT JOIN keeps every row from the right table (orders). INNER JOIN drops unmatched rows. LEFT JOIN with customers on the left keeps all customers — orphaned orders drop. Option D flips the tables for a LEFT JOIN equivalent — also correct, but not listed as Option A. In a real exam, both RIGHT JOIN and the flipped LEFT JOIN are valid answers."},
   close:"You understand all four join types. In practice, LEFT JOIN covers most needs — rewrite RIGHT JOINs by swapping table positions for cleaner code.",
   unlock:"MySQL lacks native FULL OUTER JOIN. The workaround — LEFT JOIN UNION RIGHT JOIN — works but UNION removes exact duplicates. If rows from both sides match exactly, they appear once. Use UNION ALL + dedup logic when you need every row from both sides without any removal."},
  {id:14, unit:"Unit 4: Advanced SQL", title:"Date Functions", sub:"Filter, extract, and calculate with dates",
   story:"Almost every real analysis has a time dimension. 'Revenue last 30 days', 'orders by month', 'customers inactive for 90+ days' — all require date math. SQL has a small set of date functions that show up in nearly every production query. Learn these and you can answer any time-based question your manager throws at you.",
   intro:"Date functions let you filter by time period, group by month or year, and calculate how long ago something happened. The workhorses: CURDATE() for today, DATE_SUB() to go back in time, DATE_FORMAT() to group by month, and DATEDIFF() to measure gaps. These examples use MySQL syntax — PostgreSQL uses the same concepts with slightly different names.",
   ral:{
     sql:"-- Filter: last 30 days\nSELECT * FROM orders\nWHERE order_date >= DATE_SUB(CURDATE(), INTERVAL 30 DAY);\n\n-- Group by month\nSELECT DATE_FORMAT(order_date, '%Y-%m') AS month,\n       SUM(revenue) AS monthly_rev\nFROM orders\nGROUP BY month\nORDER BY month;",
     say:"First: filter orders to only the last 30 days by subtracting 30 days from today. Then: group revenue by month using DATE_FORMAT to extract year-month.",
     lines:[
       ["SELECT * FROM orders","display every column from the orders table"],
       ["WHERE order_date >= DATE_SUB(CURDATE(), INTERVAL 30 DAY)","keep only rows from the last 30 days — CURDATE() = today; DATE_SUB steps it back 30 days"],
       ["SELECT DATE_FORMAT(order_date, '%Y-%m') AS month,","display the order date reformatted as year-month text like '2024-03', named month"],
       ["SUM(revenue) AS monthly_rev","add up the revenue inside each group, named monthly_rev"],
       ["GROUP BY month","collapse rows sharing a month into one summary row"],
       ["ORDER BY month;","sort the summary rows by month, oldest first"]
     ]
   },
   notes:"These are MySQL-specific. PostgreSQL equivalents: NOW() for today, date - INTERVAL '30 days' for subtraction, TO_CHAR(date, 'YYYY-MM') for formatting. Concepts are universal; only function names differ. Always confirm which database you're using before an interview.",
   viz:{columns:["Function","Example call","Result"],rows:[["CURDATE()","CURDATE()","2024-03-15 (today)"],["DATE_SUB()","DATE_SUB(CURDATE(), INTERVAL 1 MONTH)","2024-02-15"],["DATE_FORMAT()","DATE_FORMAT('2024-03-15', '%Y-%m')","'2024-03'"],["DATEDIFF()","DATEDIFF('2024-03-15', '2024-01-01')","74 (days)"],["YEAR() / MONTH()","YEAR('2024-03-15')","2024"]],caption:"Five date functions you'll use in nearly every time-series query. DATE_FORMAT is the most versatile — use it to group by any time granularity you need."},
   quiz:{q:"Which function returns today's date in MySQL?",opts:["TODAY()","NOW() — returns date+time","CURDATE() — returns date only","GETDATE()"],ans:2,exp:"CURDATE() returns today's date without a time component. NOW() returns the current date AND time. GETDATE() is SQL Server syntax. TODAY() doesn't exist in standard SQL."},
   parsons:{prompt:"Get revenue per month for the past 30 days, newest month first.",lines:["ORDER BY month DESC;","WHERE order_date >= DATE_SUB(CURDATE(), INTERVAL 30 DAY)","FROM orders","SELECT DATE_FORMAT(order_date,'%Y-%m') AS month, SUM(revenue) AS rev","GROUP BY month"],answer:[3,2,1,4,0]},
   compare:"Clause order: SELECT → FROM → WHERE → GROUP BY → ORDER BY. DATE_FORMAT must appear in GROUP BY (or use the alias if your database supports it). ORDER BY comes last — always after GROUP BY.",
   build:{q:"Which query gets total revenue for the past 7 days?",opts:["SELECT SUM(revenue) FROM orders WHERE order_date >= DATE_SUB(CURDATE(), INTERVAL 7 DAY);","SELECT SUM(revenue) FROM orders WHERE order_date > 7;","SELECT SUM(revenue) FROM orders WHERE DATEDIFF(order_date, CURDATE()) = 7;","SELECT SUM(revenue) FROM orders WHERE order_date = DATE_SUB(CURDATE(), 7);"],ans:0,exp:"DATE_SUB(CURDATE(), INTERVAL 7 DAY) gives the date 7 days ago; >= includes that boundary day. Option B compares a date to an integer — always false. Option C: DATEDIFF = 7 only matches the row from exactly 7 days ago, not a range. Option D: DATE_SUB requires the INTERVAL keyword."},
   close:"You can filter any time window and group by any date granularity. These date functions cover the vast majority of time-series questions in analyst work.",
   unlock:"CURDATE() returns a DATE, but NOW() returns a DATETIME. If your order_date column includes time (DATETIME or TIMESTAMP), use NOW() or CAST(NOW() AS DATE) for comparisons — otherwise midnight-of-today cutoffs silently exclude today's records."},
  // UNIT 3
  {id:9, unit:"Unit 4: Advanced SQL", title:"Subqueries", sub:"Nest a query inside another",
   story:"You can add conditional logic inside a query. Now your manager asks: 'Show me customers who ordered more than the average revenue per customer.' The average is itself a query result. You embed one query inside another — the inner query runs first and hands its result to the outer. That's a subquery.",
   intro:"A subquery is like a sticky note inside a bigger task: SQL does the little note first, then uses that answer to finish the main job. A subquery is a SELECT inside another SELECT (or WHERE). The inner query runs first and its result is used by the outer query.",
   ral:{
     sql:"SELECT name\nFROM customers\nWHERE id IN (\n  SELECT customer_id FROM orders\n);",
     say:"Give me the names of customers whose ID appears in the orders table — in other words, customers who have placed at least one order.",
     lines:[
       ["SELECT name","display the name column"],
       ["FROM customers","pull from the customers table"],
       ["WHERE id IN (…)","keep only rows whose id appears in the inner query's result — IN checks membership in a list"],
       ["SELECT customer_id FROM orders","the inner query runs first — every customer ID that has an order"]
     ]
   },
