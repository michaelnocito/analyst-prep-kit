async function ensureDb(statusEl){
  if(sqlDb) return true;
  if(statusEl) statusEl.innerHTML = '<span class="terminal-info">Loading SQL engine…</span>';
  try {
    const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}` });
    sqlDb = new SQL.Database();
    sqlDb.run(DATA.SCHEMA);
    return true;
  } catch(e){
    if(statusEl) statusEl.innerHTML = `<span class="terminal-error">Failed to load SQL engine: ${e.message}</span>`;
    return false;
  }
}

// ─── SHARED LAB RUN + PROGRESSIVE SCAFFOLD ─────────────────────────────────
// Wrong-attempt counter per "<kind><taskIdx>" so each task escalates help
// the same way the Parsons drill does: miss 1 → auto-hint, miss 2 → first
// half of the answer filled in, miss 3 → full answer filled in.
let _labAttempts = {};

function _labOpenHint(kind){
  if(kind==='join') _joinHintOpen = true; else _aggHintOpen = true;
  const el = document.getElementById(kind+'-hint');
  const btn = document.getElementById(kind+'-hint-btn');
  if(el) el.style.display = 'block';
  if(btn) btn.style.color = 'var(--accent)';
}

function _labFillPartial(editorId, answer, frac){
  const lines = answer.split('\n');
  const keep = Math.max(1, Math.round(lines.length * frac));
  const ed = document.getElementById(editorId);
  if(ed){ ed.value = lines.slice(0, keep).join('\n') + '\n'; ed.focus(); }
}

function _runLabQuery(kind, taskIdx){
  const cfg = {
    join: { arr: JOIN_TASKS, editor:'join-editor', results:'join-results',
            norows:'Query ran — no rows returned. Check your JOIN condition and make sure the ON clause matches the right columns.' },
    agg:  { arr: AGG_TASKS,  editor:'agg-editor',  results:'agg-results',
            norows:'Query ran — no rows returned. Check your GROUP BY clause.' }
  }[kind];
  const editor = document.getElementById(cfg.editor);
  const results = document.getElementById(cfg.results);
  if(!results) return;
  if(!sqlDb){ results.innerHTML = '<span class="terminal-error">SQL engine not ready yet.</span>'; return; }
  const sql = editor ? editor.value.trim() : '';
  if(!sql){ results.innerHTML = '<span class="terminal-info">Enter a query above.</span>'; return; }
  const t = cfg.arr[taskIdx];
  let res, syntaxErrMsg = null;
  try { res = sqlDb.exec(sql); }
  catch(e){ syntaxErrMsg = e.message; res = []; }

  // Syntax error OR empty result → count as a miss and escalate help.
  if(syntaxErrMsg || !res.length){
    const key = kind + taskIdx;
    const att = (_labAttempts[key] || 0) + 1;
    _labAttempts[key] = att;
    let help;
    if(att === 1){
      _labOpenHint(kind);
      help = `Not quite — ${syntaxErrMsg ? 'your query had a syntax error' : 'no rows returned'}. <i data-lucide="lightbulb" style="width:14px;height:14px;vertical-align:-2px"></i> <strong>Hint opened below</strong> — adjust and Run again.`;
    } else if(att === 2){
      _labFillPartial(cfg.editor, cfg.arr[taskIdx].answer, 0.5);
      help = `Still off — I filled in the <strong>first half</strong> of the query for you. Finish it and Run again.`;
    } else {
      const ed = document.getElementById(cfg.editor);
      if(ed){ ed.value = cfg.arr[taskIdx].answer; ed.focus(); }
      help = `<strong>Full answer filled in</strong> — Run it to see the target result, then compare it line-by-line with the prompt.`;
    }
    const head = syntaxErrMsg
      ? `<div style="color:var(--red);font-family:var(--mono);font-size:12px;margin-bottom:8px">Error: ${syntaxErrMsg}</div>`
      : `<div style="color:var(--muted);margin-bottom:8px">Query ran — no rows returned.</div>`;
    results.innerHTML = head + `
      <div style="color:var(--text);font-size:12px;line-height:1.55;background:rgba(212,160,64,.12);border:1px solid rgba(212,160,64,.3);border-radius:6px;padding:8px 11px">${help}</div>`;
    return;
  }
  const {columns, values} = res[0];
  const thead = `<tr>${columns.map(c=>`<th>${c}</th>`).join('')}</tr>`;
  const tbody = values.map(row=>`<tr>${row.map(v=>`<td>${v==null?'<em style="color:var(--red);font-style:italic">NULL</em>':v}</td>`).join('')}</tr>`).join('');
  const tableHTML = `<table><thead>${thead}</thead><tbody>${tbody}</tbody></table>`;
  const n = values.length;

  // Correctness: compare the user's rows against the model answer's rows.
  let correct = false;
  try {
    const ar = sqlDb.exec(t.answer);
    if(ar.length) correct = JSON.stringify(ar[0].values) === JSON.stringify(values);
  } catch(e){ /* answer should always parse; fall through to wrong path */ }

  const key = kind + taskIdx;
  if(correct){
    _labAttempts[key] = 0;
    results.innerHTML = `${tableHTML}
      <div style="margin-top:10px;display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap">
        <span style="color:var(--green);font-weight:700">✓ Correct — ${n} row${n!==1?'s':''}</span>
        <span style="color:var(--muted);font-size:12px">— ${t.note}</span>
      </div>`;
    if(typeof celebrate === 'function') celebrate();
    return;
  }

  // Wrong → escalate help by attempt number.
  const att = (_labAttempts[key] || 0) + 1;
  _labAttempts[key] = att;
  let help;
  if(att === 1){
    _labOpenHint(kind);
    help = `Not quite — your result doesn't match the target yet. <i data-lucide="lightbulb" style="width:14px;height:14px;vertical-align:-2px"></i> <strong>Hint opened below</strong> — adjust and Run again.`;
  } else if(att === 2){
    _labFillPartial(cfg.editor, t.answer, 0.5);
    help = `Still off — I filled in the <strong>first half</strong> of the query for you. Finish it and Run again.`;
  } else {
    const ed = document.getElementById(cfg.editor);
    if(ed){ ed.value = t.answer; ed.focus(); }
    help = `<strong>Full answer filled in</strong> — Run it to see the target result, then compare it line-by-line with the prompt.`;
  }
  results.innerHTML = `${tableHTML}
    <div style="margin-top:10px;display:flex;flex-direction:column;gap:6px">
      <span style="color:var(--muted)">${n} row${n!==1?'s':''} <span style="font-size:11px">(expected ~${t.expectedRows})</span></span>
      <span style="color:var(--text);font-size:12px;line-height:1.55;background:rgba(212,160,64,.12);border:1px solid rgba(212,160,64,.3);border-radius:6px;padding:8px 11px">${help}</span>
    </div>`;
}

  content.innerHTML = `
    <p class="text-muted text-sm" style="margin-bottom:14px">Same two tables, same ON clause — only the JOIN keyword changes. Count the rows.</p>

      ${col('LEFT JOIN','var(--accent)',
        'SELECT c.name, o.order_id, o.amount\nFROM customers c\nLEFT JOIN orders o\n  ON c.id = o.customer_id',
        _joinResultTable(SQ_LEFT,'var(--accent)'),

const AGG_TASKS = [
  { id:1, title:"Count by group", concept:"GROUP BY + COUNT",
    prompt:"How many customers are in each status group? Show status and the count, sorted by count highest first.",
    scaffold:"-- Count customers per status, highest first\n\n",
    answer:"SELECT status, COUNT(*) AS customer_count\nFROM customers\nGROUP BY status\nORDER BY customer_count DESC;",
    hint:"GROUP BY splits rows into groups — one per distinct status value. COUNT(*) counts every row in each group. ORDER BY the alias (customer_count) DESC puts the biggest group first.",
    expectedRows:3,
    note:"3 rows — one per status (active, inactive, pending if present). GROUP BY collapsed all 8 customers into 3 summary rows." },
  { id:2, title:"Total revenue per customer", concept:"SUM + GROUP BY",
    prompt:"Show each customer's name and their total order revenue. Only include customers who have placed at least one order.",
    scaffold:"-- Each customer's total revenue\n-- Only customers with at least one order\n\n",
    answer:"SELECT c.name, SUM(o.amount) AS total_revenue\nFROM customers c\nINNER JOIN orders o ON c.id = o.customer_id\nGROUP BY c.name;",
    hint:"INNER JOIN first to connect customers to their orders. GROUP BY c.name collapses multiple order rows per customer into one. SUM(o.amount) totals their spend.",
    expectedRows:4,
    note:"4 rows — one per customer with orders. Alice's two orders are collapsed and summed into a single total." },
  { id:3, title:"Filter groups with HAVING", concept:"HAVING — filter after grouping",
    prompt:"Show only the customer statuses that have more than 1 customer. (Tip: HAVING filters groups; WHERE filters rows.)",
    scaffold:"-- Statuses with more than 1 customer\n-- Tip: use HAVING, not WHERE\n\n",
    answer:"SELECT status, COUNT(*) AS n\nFROM customers\nGROUP BY status\nHAVING COUNT(*) > 1;",
    hint:"WHERE runs before grouping — you can't use it to filter on COUNT(*). HAVING runs after GROUP BY, so you CAN filter on the aggregated result. Think of it as WHERE for groups.",
    expectedRows:2,
    note:"Returns only the statuses where more than 1 customer exists. Statuses with a single customer are filtered out by HAVING." },
  { id:4, title:"Multiple aggregates at once", concept:"COUNT + SUM + AVG + MAX in one query",
    prompt:"For each customer status, show the count of customers, total orders placed (sum of the orders column), average orders, and the highest order count in that group.",
    scaffold:"-- Summary stats per status: count, sum, avg, max\n\n",
    answer:"SELECT status,\n  COUNT(*) AS customers,\n  SUM(orders) AS total_orders,\n  ROUND(AVG(orders), 1) AS avg_orders,\n  MAX(orders) AS top_customer_orders\nFROM customers\nGROUP BY status\nORDER BY total_orders DESC;",
    hint:"All four aggregate functions — COUNT, SUM, AVG, MAX — run on the same GROUP BY grouping. They each collapse the rows in each group into one number. ROUND keeps the average tidy.",
    expectedRows:3,
    note:"3 rows — one per status. Each row now carries four aggregated facts about that group. This is the shape of nearly every summary report you'll build on the job." }
];

var _hd={hint:'',ans:'',state:0};
function cycleHint(){
  _hd.state++;
  var hp=document.getElementById('drill-hint');
  var ap=document.getElementById('drill-answer');
  var btn=document.getElementById('hint-cycle-btn');
  if(_hd.state===1){
    hp.textContent='\u{1F4A1} '+_hd.hint;
    hp.classList.add('show');
    if(btn)btn.textContent='Show Answer';
  } else {
    var esc=(_hd.ans+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    var match=findGlossaryTerm(_hd.ans+'');
    var matchTerm=match?(match.term!==undefined?match.term:match[0]):null;
    var learnHtml=matchTerm?'<button class="learn-more-link" onclick="openGlossaryFor(\''+matchTerm.replace(/'/g,"\\'")+'\')">&#x1F4D6; '+matchTerm+'</button>':'';
    ap.innerHTML='<pre class="answer-code">'+esc+'</pre><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><button class="copy-btn" onclick="doCopy(event)">&#x1F4CB; Copy</button>'+learnHtml+'</div>';
    ap.classList.add('show');
    if(btn)btn.style.display='none';
  }
}
function findGlossaryTerm(ansText){
  if(typeof DATA==='undefined'||!DATA.GLOSSARY)return null;
  var lower=(ansText+'').toLowerCase();
  return DATA.GLOSSARY.find(function(e){var t=(e.term!==undefined?e.term:e[0]).toLowerCase();return t.length>2&&lower.indexOf(t)!==-1;});
}
function openGlossaryFor(term){
  if(typeof navigate==='function')navigate('glossary');
  else if(typeof show==='function')show('glossary');
  setTimeout(function(){
    var s=document.getElementById('gloss-search')||document.getElementById('glossSearch');
    if(s){s.value=term;try{filterGlossary(term);}catch(e){try{filterGlossary();}catch(e2){}}}
  },80);
}
function doCopy(e){
  var btn=e.currentTarget||e.target,orig=btn.textContent;
  function done(){btn.textContent='✓ Copied!';setTimeout(function(){btn.textContent=orig;},1500);}
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(_hd.ans).then(done).catch(function(){_fbCopy(_hd.ans);done();});}
  else{_fbCopy(_hd.ans);done();}
}

// ─── Lucide icons: render now + re-render after any #main view change ───────
(function(){
  // createIcons() in this Lucide build leaves data-lucide ON the generated <svg>,
  // so it re-matches its own output. Strip it after rendering, otherwise the
  // MutationObserver below would re-fire on createIcons's own mutations forever.
  function refresh(){
    if(!window.lucide) return;
    lucide.createIcons();
    document.querySelectorAll('svg[data-lucide]').forEach(function(s){ s.removeAttribute('data-lucide'); });
  }
  refresh();
  var main=document.getElementById('main');
  if(main && 'MutationObserver' in window){
    var queued=false;
    new MutationObserver(function(){
      if(queued) return; queued=true;
      queueMicrotask(function(){ queued=false; refresh(); });
    }).observe(main,{childList:true,subtree:true});
  }
})();

/* --- Auth UI --- */
fetch('../assets/auth_modal.html')
  .then(r=>r.text())
  .then(html=>{
    const c=document.getElementById('authModal');
    c.innerHTML=html;
    c.querySelectorAll('script').forEach(old=>{
      const s=document.createElement('script');
      if(old.src)s.src=old.src;else s.textContent=old.textContent;
      document.body.appendChild(s);old.remove();
    });
  });
async function handleLogout(){await signOut();location.reload();}
async function initAuthUI(){
  const lb=document.getElementById('loginBtn'),lo=document.getElementById('logoutBtn'),em=document.getElementById('userEmail');
  try{
    const u=await getCurrentUser();
    if(u){lb.style.display='none';lo.style.display='inline-block';if(u.email){em.textContent=u.email;em.style.display='inline-block';}}
    else{lb.style.display='inline-block';lo.style.display='none';em.style.display='none';}
  }catch(e){lb.style.display='inline-block';}
}
setTimeout(initAuthUI,600);
