// ─── SPACED-RECALL CUES (Phase D) ────────────────────────────────────────────
// Two retrieval questions per lesson, resurfaced +1/+3/+7 lessons later when
// the learner rated the lesson "Not yet"/"Almost". Kept in one map (instead of
// inline reinforces: fields) so the whole set is auditable in one place; the
// merge loop below puts them on l.reinforces so the engine matches Excel's.
const SQL_REINFORCES = {
  101:[{q:"In one sentence: what is a table, a row, and a column?",a:"A table is one grid of data about one kind of thing; each row is one record (one customer), and each column is one attribute of it (their city)."},
       {q:"Why does a database beat a spreadsheet once several people need the same data?",a:"A database gives everyone one shared copy with rules that keep it consistent, instead of emailed spreadsheet copies quietly drifting apart."}],
  102:[{q:"What question does 'what is the grain of this table?' actually ask?",a:"It asks: what does ONE row stand for \u2014 one order, one customer, one line of an order?"},
       {q:"Why is knowing the grain the first step before summing or counting anything?",a:"Until you know what a row represents you can't tell whether SUM or COUNT will double-count \u2014 the grain decides what's safe to add up."}],
  103:[{q:"What is a primary key, and what makes a foreign key different?",a:"A primary key uniquely identifies each row in its own table; a foreign key is another table's column that points at those key values."},
       {q:"What is a JOIN actually doing when it matches rows across two tables?",a:"For each row it finds the rows in the other table whose values satisfy the ON condition and glues the two rows' columns side by side."}],
  104:[{q:"What shape does every SQL query return its answer in?",a:"A table \u2014 even a single number comes back as a one-row, one-column table."},
       {q:"What does NULL mean \u2014 and why isn't it the same as 0 or an empty string?",a:"NULL means 'unknown / missing'. It is not 0 and not ''; testing it needs IS NULL, because = NULL never matches anything."}],
  105:[{q:"What are the three steps for turning a CSV into a queryable table?",a:"Create or open the database file, import the CSV as a table (File \u2192 Import), then verify the load with SELECT COUNT(*)."},
       {q:"Why keep the imported table untouched with a _raw name \u2014 and what do you run to verify an import?",a:"The _raw copy is your untouched backup, so cleaning mistakes can never destroy the original. Verify with SELECT COUNT(*) FROM table_raw; and compare it to the file's row count."}],
  1:[{q:"Say the two clauses every query starts from, and what each one names.",a:"SELECT names the columns you want back; FROM names the table they come from."},
     {q:"How do you pull only the name and city columns from a customers table?",a:"SELECT name, city FROM customers;"}],
  2:[{q:"Which clause filters rows, and where does it sit relative to FROM?",a:"WHERE filters rows, and it comes right after FROM: SELECT \u2026 FROM \u2026 WHERE \u2026"},
     {q:"Write (out loud) a WHERE condition for orders over 100 placed in Texas.",a:"WHERE amount > 100 AND state = 'TX'"}],
  3:[{q:"Which clause sorts results, and what does DESC change?",a:"ORDER BY sorts the results; DESC flips the sort to largest-first."},

  501:[{q:"What do COUNT(*) vs COUNT(DISTINCT id) tell you about a key column?",a:"If they're equal, every id is unique and the column can act as a key; a gap means duplicates."},

       {q:"Say the LEFT JOIN \u2026 IS NULL pattern that finds orphaned rows.",a:"SELECT s.key FROM source s LEFT JOIN target t ON s.key = t.key WHERE t.key IS NULL;"}],
  601:[{q:"Name the three things a metric definition must pin down before you compute it.",a:"Who counts, over what time window, counted how (distinct users? events?) \u2014 leave any of the three loose and the number is ambiguous."},

DATA.LESSONS.forEach(l=>{ if(SQL_REINFORCES[l.id]) l.reinforces=SQL_REINFORCES[l.id]; });

// ─── SPACED RECALL QUEUE (Phase D port from Excel: +1/+3/+7 lesson positions) ─
let _pendingRecalls = [], _recallLesson = null;
function _getRecallQ(){ return JSON.parse(localStorage.getItem('sqlkit-recalls')||'[]'); }
function _saveRecallQ(a){ localStorage.setItem('sqlkit-recalls',JSON.stringify(a)); }
function _queueRecalls(id, l){
  if(!l.reinforces||!l.reinforces.length) return;
  // Idempotent: drop any prior pending recalls for this lesson, then re-queue
  // only if something was actually missed. Clearing the misses clears these.
  let arr=_getRecallQ().filter(e=>e.srcId!==id);
  if(missesFor(id).length){
    const pos=lessonPos(id);
    for(const off of [1,3,7]) arr.push({cues:l.reinforces, srcId:id, dueAt:pos+off});
  }
  _saveRecallQ(arr);
}
function _dequeueRecalls(id){
  const pos=lessonPos(id), arr=_getRecallQ();
  const due=arr.filter(e=>e.dueAt===pos);
  _saveRecallQ(arr.filter(e=>e.dueAt!==pos));
  return due;
}
// Dequeue only when the viewed lesson changes — stage advances re-render the
// same lesson and must not re-consume the queue.
function _syncRecalls(id, l){
  if(_recallLesson===id) return;
  if(l) _queueRecalls(id, l);
  _pendingRecalls = _dequeueRecalls(id);
  _recallLesson = id;
}
function _recallsHTML(){
  // Cues may be legacy strings (question only) or {q,a} pairs. Answer reveal is
  // Anki-style flip: attempt first, then the answer inline — never a dead end.
  return _pendingRecalls.map((e,i)=>{
    // Prefer the cue set the lesson carries TODAY. Entries queued before answers
    // were authored stored bare strings, and a stored snapshot can never gain an
    // answer - which is why Tableau's cards showed no answers while Excel's did
    // (playtest T6). Fall back to the snapshot if the lesson is gone.
    const _live = (DATA.LESSONS.find(l=>l.id===e.srcId)||{}).reinforces;
    const cues = ((_live&&_live.length)?_live:e.cues).map(c=>typeof c==='string'?{q:c,a:null}:c);
    const open = !!e._open;
    const hasAns = cues.some(c=>c.a);
    return `<div class="recall-card">
    <div class="recall-header"><i data-lucide="repeat-2"></i> Quick recall — no peeking</div>
    <ul class="recall-cues">${cues.map(c=>`<li>${c.q}${open&&c.a?`<div class="recall-ans">${c.a}</div>`:''}</li>`).join('')}</ul>
    ${open&&!hasAns?`<p class="text-muted text-sm" style="margin:0 0 10px">This one predates stored answers — the lesson below has it.</p>`:''}
    ${open?`<div style="margin-bottom:10px"><button class="btn btn-ghost btn-sm" onclick="recallOpenLesson(${i})">Open that lesson →</button></div>`:''}
    <div class="recall-btns">
      ${open
        ? `<button class="btn btn-primary btn-sm" onclick="recallGotNow(${i})">Got it now</button>
           <span class="text-muted" style="font-size:12px;align-self:center">This one will come back tomorrow for a real check.</span>`
        : `<button class="btn btn-primary btn-sm" onclick="recallGotIt(${i})">I remembered it</button>
           <button class="btn btn-ghost btn-sm" onclick="recallShowAns(${i})">Show answer</button>`}
    </div>
  </div>`;}).join('');
}
function _refreshRecalls(){
  // Cards render in two homes: inline at a lesson (#v2-recalls) or the
  // on-demand Review view (#review-recalls), which gets an empty state.
  const el=document.getElementById('v2-recalls')||document.getElementById('review-recalls');
  if(!el) return;
  if(!_pendingRecalls.length){
    if(el.id==='review-recalls'){ el.innerHTML=_reviewEmptyHTML(); }
    else el.style.display='none';
    if(window.lucide) lucide.createIcons();
    return;
  }
  el.innerHTML=_recallsHTML();
  if(window.lucide) lucide.createIcons();
}

// ─── REVIEW NOW (on-demand recall surface) ─────────────────────────────────
// Recalls normally fire when the path reaches their due position — which also
// means a skipped position strands them silently. This view pulls everything
// due (dueAt <= current position) on demand, and can pull the rest early.
function renderReview(){
  const p=_pathPos(), q=_getRecallQ();
  // Entries stay in storage until actually answered (_consumeStored) — closing
  // the tab mid-review must not lose them.
  _pendingRecalls=q.filter(e=>e.dueAt<=p);
  // "Got it now" re-queues relative to this lesson; anchor it at the path front.
  const next=DATA.LESSONS.find(l=>!state.doneLessons.includes(l.id));
  _recallLesson=next?next.id:DATA.LESSONS[DATA.LESSONS.length-1].id;
  document.getElementById('main').innerHTML=`
    <div class="row mb">
      <button class="btn btn-ghost btn-sm" onclick="navigate('home')">← Home</button>
    </div>
    <h1>Review</h1>
    <p class="text-muted" style="margin-bottom:16px">Every recall that's due, in one place — answer from memory first, flip when you can't.</p>
    <div id="review-recalls"></div>`;
  _refreshRecalls();
}
function _reviewEmptyHTML(){
  const n=_getRecallQ().length;
  return n>0
    ? `<div class="card"><p style="margin:0 0 10px">🎉 Nothing due right now — ${n} review${n>1?'s':''} queued for later spots on the path.</p>
       <button class="btn btn-primary btn-sm" onclick="reviewAhead()">Practice ahead — review ${n>1?'them':'it'} early</button></div>`
    : `<div class="card"><p style="margin:0">🎉 Nothing queued. Miss a question in a lesson and the kit files it here automatically — spaced out over the next few lessons.</p></div>`;
}
function reviewAhead(){
  _pendingRecalls=_getRecallQ().slice();
  _refreshRecalls();
}
// Remove ONE stored copy of an answered entry. In the lesson flow entries were
// already dequeued from storage, so this is a no-op there; in the Review view
// they stay stored until answered, and this is what consumes them.
function _consumeStored(e){
  const arr=_getRecallQ();
  const i=arr.findIndex(x=>x.srcId===e.srcId&&x.dueAt===e.dueAt);
  if(i>=0){ arr.splice(i,1); _saveRecallQ(arr); }
}
function recallGotIt(i){
  const e=_pendingRecalls.splice(i,1)[0];
  if(e) _consumeStored(e);
  const w=parseInt(localStorage.getItem('sqlkit-recall-wins')||'0')+1;
  localStorage.setItem('sqlkit-recall-wins',String(w));
  _refreshRecalls();
}
function recallShowAns(i){
  if(_pendingRecalls[i]) _pendingRecalls[i]._open = true;
  _refreshRecalls();
}
function recallOpenLesson(i){
  const e=_pendingRecalls[i];
  if(e && e.srcId!=null) navigate('lesson', e.srcId);
}
// A revealed answer is not a successful recall: it re-queues for one more
// spaced check and does NOT count toward the recall-wins streak.
function recallGotNow(i){
  const e=_pendingRecalls.splice(i,1)[0];
  _consumeStored(e);
  const arr=_getRecallQ();
  arr.push({cues:e.cues, srcId:e.srcId, dueAt:lessonPos(_recallLesson)+1});
  _saveRecallQ(arr);
  _refreshRecalls();
}

// ─── RETURN LOOP + MASTERY BADGES (playtest Batch 5) ────────────────────────
// Review-due queue is the primary return hook (spaced retrieval is real
// learning); streak with one free freeze/week is secondary. All localStorage.
// Template for the other kits.

// The recall queue is keyed by LESSON POSITION (dueAt = pos + 1/3/7), so
// "due" means: will surface on or before the lesson you'd open next.
function _pathPos(){
  const n = DATA.LESSONS.find(l => !state.doneLessons.includes(l.id));
  return n ? lessonPos(n.id) : DATA.LESSONS.length;
}
function reviewsDue(){
  const p = _pathPos(), q = _getRecallQ();
  return {
    now:  q.filter(e => e.dueAt <= p).length,      // fires on your next lesson
    soon: q.filter(e => e.dueAt <= p + 1).length,  // fires within the next two
  };
}

// Streak: one count per LOCAL calendar day the kit is opened. A single missed
// day is absorbed by one free freeze per rolling week (gentle copy — a broken
// streak should never feel like a reset of the learning itself).
function getStreak(){
  try { return JSON.parse(localStorage.getItem('sqlkit-streak')) || {}; } catch(e){ return {}; }
}
function _localDay(d = new Date()){
  const p = n => String(n).padStart(2,'0');
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());
}
function _dayDiff(a, b){ return Math.round((new Date(b+'T12:00') - new Date(a+'T12:00')) / 86400000); }
function bumpStreak(){
  const s = getStreak(), today = _localDay();
  if(s.last === today) return s;
  delete s.froze;
  if(!s.last){ s.n = 1; }
  else {
    const gap = _dayDiff(s.last, today);
    if(gap === 1) s.n = (s.n||0) + 1;
    else if(gap === 2 && (!s.lastFreeze || _dayDiff(s.lastFreeze, today) >= 7)){
      s.n = (s.n||0) + 1; s.lastFreeze = today; s.froze = true; // freeze absorbed the missed day
    }
    else s.n = 1;
  }
  s.last = today;
  localStorage.setItem('sqlkit-streak', JSON.stringify(s));
  return s;
}

// Competence-framed mastery badges: each marks something you can now DO, with
// visible progress toward it. A few surprise badges (hidden until earned) for
// delight. Deliberately NO attendance trinkets — the streak above is shown as
// a count, never converted into a reward.
function _unitProg(re){
  let d=0, t=0;
  DATA.LESSONS.forEach(l => { if(re.test(l.unit)){ t++; if(state.doneLessons.includes(l.id)) d++; } });
  return [d, t];
}

  {id:'u3',      icon:'🔗', label:'Join Master',      desc:'Finish every Joins lesson',                          prog:()=>_unitProg(/Unit 3:/)},
  {id:'u4',      icon:'🪟', label:'Window Walker',    desc:'Finish every Advanced SQL lesson',                   prog:()=>_unitProg(/Unit 4:/)},
  {id:'drills',  icon:'🛠️', label:'Drill Polisher',   desc:'Complete every fill, bug hunt, and ordering drill',

  {id:'recall25',icon:'🧠', label:'Steel Trap',       desc:'Nail 25 spaced-recall checks from memory',
    prog:()=>[Math.min(25, parseInt(localStorage.getItem('sqlkit-recall-wins')||'0')), 25]},
  {id:'early',   icon:'🌅', label:'Early Bird',       desc:'Finish a lesson before 8am',        secret:true, prog:()=>[(state.badgeMarks||{}).early?1:0, 1]},
  {id:'night',   icon:'🌙', label:'Night Owl',        desc:'Finish a lesson after 10pm',        secret:true, prog:()=>[(state.badgeMarks||{}).night?1:0, 1]},
  {id:'weekend', icon:'🧺', label:'Weekend Analyst',  desc:'Finish a lesson on a weekend',      secret:true, prog:()=>[(state.badgeMarks||{}).weekend?1:0, 1]},

function checkBadges(quiet){
  state.badgesEarned = state.badgesEarned || [];
  let changed = false;
  BADGES.forEach(b => {
    const [d, t] = b.prog();
    if(t > 0 && d >= t && !state.badgesEarned.includes(b.id)){
      state.badgesEarned.push(b.id);
      changed = true;
      if(!quiet) showToast(`${b.icon} Badge earned: ${b.label}!`);
    }
  });
  if(changed) saveState();
}
function badgesCardHTML(){
  const earned = state.badgesEarned || [];
  const tiles = BADGES.filter(b => !b.secret || earned.includes(b.id)).map(b => {
    const [d, t] = b.prog();
    const got = earned.includes(b.id) || (t > 0 && d >= t);
    return `<div class="badge-tile${got?' got':''}" title="${b.desc}">
      <div class="badge-ico">${got ? b.icon : '○'}</div>
      <div class="badge-name">${b.label}</div>
      <div class="badge-prog">${got ? 'Earned' : d+'/'+t}</div>
    </div>`;
  }).join('');
  const secretN = BADGES.filter(b => b.secret && !earned.includes(b.id)).length;
  return `<div class="card">
    <h2>Badges</h2>
    <p class="text-sm text-muted" style="margin:0 0 10px">Each badge marks a skill you can now do — the count fills as you learn, not as you show up.</p>
    <div class="badge-grid">${tiles}${secretN ? `<div class="badge-tile secret"><div class="badge-ico">✦</div><div class="badge-name">${secretN} surprise badge${secretN>1?'s':''}</div><div class="badge-prog">found by playing</div></div>` : ''}</div>

let _v2ParsAttempt = {};
let _v2ParsWasWrong = {};

function v2ParsChipTap(lid, chip){
  const pool = document.getElementById('v2sql-pool-'+lid);
  const ans  = document.getElementById('v2sql-ans-'+lid);
  if(!pool||!ans) return;
  if(pool.contains(chip)) ans.appendChild(chip);
  else pool.appendChild(chip);
  v2ParsSyncControls(pool, ans);
}

// ↑ ↓ on a placed piece: fixing one line out of order costs one tap instead of
// clearing the answer and re-tapping everything (playtest S3, 2026-07-20).
function v2ParsMove(ev, dir){
  ev.stopPropagation();
  const chip = ev.currentTarget.closest('.v2-pars-chip');
  if(!chip) return;
  const zone = chip.parentElement;
  const sib = dir < 0 ? chip.previousElementSibling : chip.nextElementSibling;
  if(!sib) return;
  if(dir < 0) zone.insertBefore(chip, sib);
  else zone.insertBefore(sib, chip);
  v2ParsSyncControls(null, zone);
}
function v2ParsSyncControls(pool, ans){
  if(pool) pool.querySelectorAll('.pars-move').forEach(m => m.remove());
  if(!ans) return;
  const chips = [...ans.querySelectorAll('.v2-pars-chip')];
  chips.forEach((c, i) => {
    let ctl = c.querySelector('.pars-move');
    if(!ctl){
      ctl = document.createElement('span');
      ctl.className = 'pars-move';
      ctl.innerHTML = '<button type="button" aria-label="Move this piece up">&uarr;</button>' +
                      '<button type="button" aria-label="Move this piece down">&darr;</button>';
      ctl.children[0].onclick = e => v2ParsMove(e, -1);
      ctl.children[1].onclick = e => v2ParsMove(e, 1);
      c.appendChild(ctl);
    }
    ctl.children[0].disabled = i === 0;
    ctl.children[1].disabled = i === chips.length - 1;
  });
}

function v2ParsCheck(lid){
  const l = DATA.LESSONS.find(x=>x.id===lid);
  if(!l||!l.parsons) return;
  const ans = document.getElementById('v2sql-ans-'+lid);
  if(!ans) return;
  const chips = [...ans.querySelectorAll('.v2-pars-chip')];
  if(chips.length !== l.parsons.answer.length){
    const fb = document.getElementById('v2sql-pars-fb-'+lid);
    if(fb) fb.innerHTML='<span style="color:var(--warn);font-size:13px">Move all pieces to the answer area first.</span>';
    return;
  }
  const userOrder = chips.map(c=>+c.dataset.idx);
  const correct = l.parsons.answer.every((v,i)=>v===userOrder[i]);
  _v2ParsAttempt[lid] = {lines: chips.map(c=>(c.querySelector('.pars-txt')||c).textContent)};
  _v2ParsWasWrong[lid] = !correct;
  if(correct){
    delete _v2ParsWasWrong[lid];
    celebrate();
    const fb = document.getElementById('v2sql-pars-fb-'+lid);
    if(fb) fb.innerHTML='<span style="color:var(--ok,#3a9d6a);font-size:13px;font-weight:600">Correct — that\'s the right order.</span>';
    // Check order/Skip are moot once solved — swap the row in place so
    // Continue is the only, obvious next tap instead of stacking a second
    // button row above the old one.
    const actions = document.getElementById('v2sql-pars-actions-'+lid);
    if(actions) actions.innerHTML=`<button class="btn btn-ghost btn-sm" onclick="setSqlStage(${lid},1)">← Back</button>
      <button class="btn btn-primary" onclick="setSqlStage(${lid},3)">Continue &rarr;</button>`;
  } else {
    recordMiss(lid, l.parsons.prompt);
    const fb = document.getElementById('v2sql-pars-fb-'+lid);
    if(fb) fb.innerHTML='<span style="color:var(--red);font-size:13px;font-weight:600">Not quite — try reordering the pieces.</span>';
    const btn = document.getElementById('v2sql-coach-try-'+lid);
    if(btn) btn.style.display='';
  }
}

function v2BuildPick(btn, lid){
  const l = DATA.LESSONS.find(x=>x.id===lid);
  if(!l||!l.build) return;
  const wrap = document.getElementById('v2sql-build-'+lid);
  if(!wrap) return;
  wrap.querySelectorAll('.quiz-opt').forEach(b=>b.disabled=true);
  const isCorrect = btn.dataset.correct==='1';
  btn.classList.add(isCorrect?'correct':'wrong');
  if(!isCorrect) wrap.querySelectorAll('.quiz-opt')[l.build.ans].classList.add('correct');
  const fb = document.getElementById('v2sql-build-fb-'+lid);
  if(fb) fb.innerHTML=`<div class="quiz-exp show" style="margin-top:10px">${l.build.exp}</div>`;
  if(!isCorrect){ recordMiss(lid, l.build.q); const cb=document.getElementById('v2sql-coach-build-'+lid); if(cb) cb.style.display=''; }
  const row = isCorrect
    ? `<div class="row mt" style="gap:10px;margin-top:14px"><button class="btn btn-primary btn-sm" onclick="setSqlStage(${lid},4)">Continue &rarr;</button></div>`
    : `<div class="row mt" style="gap:10px;margin-top:14px"><button class="btn btn-primary btn-sm" onclick="setSqlStage(${lid},3)">Try Again</button><button class="btn btn-ghost btn-sm" onclick="setSqlStage(${lid},4)">Continue anyway</button></div>`;

}

function v2QuizAnswer(lid, chosen){
  const l = DATA.LESSONS.find(x=>x.id===lid);
  if(!l) return;
  const wrap = document.getElementById('v2sql-quiz-'+lid);
  if(!wrap) return;
  wrap.querySelectorAll('.quiz-opt').forEach((b,i)=>{
    b.disabled=true;
    if(i===l.quiz.ans) b.classList.add('correct');
    else if(i===chosen) b.classList.add('wrong');
  });
  const exp = document.getElementById('v2sql-quiz-exp-'+lid);
  if(exp) exp.classList.add('show');
  if(chosen===l.quiz.ans){
    celebrate();
    markDone('doneLessons', lid);
    wrap.insertAdjacentHTML('beforeend',`<div class="row mt" style="gap:10px;margin-top:14px">
      <button class="btn btn-primary btn-sm" onclick="setSqlStage(${lid},5)">Continue &rarr;</button>

    wrap.insertAdjacentHTML('beforeend',`<div class="row mt" style="gap:10px;margin-top:14px">
      <button class="btn btn-primary btn-sm" onclick="v2QuizRetry(${lid})">Try Again</button>

async function _v2CoachCall(prompt, model, targetId){
  const key = getCoachKey();
  const el = document.getElementById(targetId);
  if(!key){
    if(el){ el.textContent='Add your Anthropic API key in Settings → AI Coach to enable hints.'; el.classList.add('show'); }
    return;
  }
  if(el){ el.textContent='Thinking…'; el.classList.add('show'); }
  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'x-api-key':key,'anthropic-version':'2023-06-01','content-type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model,max_tokens:350,messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    if(el) el.textContent = data.content?.[0]?.text || 'No response — check your key.';
  } catch(e){ if(el) el.textContent='Request failed — check your key in Settings.'; }
}

  'Unit 3: Joins':                {from:12, to:14},
  'Unit 4: Advanced SQL':         {from:15, to:17},
};
// Return contexts so labs launch FROM and RETURN TO the exact path position
// (contiguity — the lesson goal stays alive while you're in the lab).
let _capReturn = null; // {unit, from, to, nextLid} — capstone slice opened from the path
let _labReturn = null; // {lessonId, pos}          — JOIN/Agg lab opened from a lesson's path

let guided = null; // { lessonId, seq:[[type,idx]], pos, review?, reviewUnit?, nextLid? }
let _parsonsAttempts = {}; // tracks wrong-attempt count per drill idx for progressive scaffolding

function guidedSeqFor(lessonId){
  const M = {fills:'FILLS', bugs:'BUGS', parsons:'PARSONS'};
  const cards = (LESSON_CARDS[lessonId] || [])
    .filter(i => DATA.CARDS[i]).map(i => ['cards', i]);
  const drills = (LESSON_DRILLS[lessonId] || []).filter(s => M[s[0]] && DATA[M[s[0]]] && DATA[M[s[0]]][s[1]]);
  const lab = LESSON_LABS[lessonId] ? [['lab', LESSON_LABS[lessonId]]] : [];
  return cards.concat(drills, lab);
}

function startGuided(lessonId){
  const seq = guidedSeqFor(lessonId);
  if(!seq.length){ gotoNextLesson(lessonId); return; }
  guided = {lessonId, seq, pos:0};
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const pb = document.querySelectorAll('.nav-btn')[2]; if(pb) pb.classList.add('active');
  renderGuidedStep();
}

// Mixed review node at a unit boundary: ~6 items pulled from EARLIER lessons
// (interleaved retrieval — Rohrer/Cepeda). Soft-guide: fully skippable,
// never blocks the next lesson.
function startUnitReview(finishedUnit, nextLid){
  const nextPos = DATA.LESSONS.findIndex(l=>l.id===nextLid);
  const priorLessons = DATA.LESSONS.filter((l,i)=>i<nextPos);
  let cardPool=[], drillPool=[];
  priorLessons.forEach(l=>{
    (LESSON_CARDS[l.id]||[]).forEach(i=>{ if(DATA.CARDS[i]) cardPool.push(['cards',i]); });
    (LESSON_DRILLS[l.id]||[]).forEach(s=>drillPool.push(s));
  });
  const pick=(pool,n)=>{ const out=[]; while(pool.length && out.length<n){ out.push(pool.splice(Math.floor(Math.random()*pool.length),1)[0]); } return out; };
  // Prefer drills of distinct types so the review actually interleaves.
  const pickDrills=(pool,n)=>{ const out=[],seen={}; const shuffled=pick(pool,pool.length);
    for(const s of shuffled){ if(out.length>=n) break; if(!seen[s[0]]){ seen[s[0]]=1; out.push(s); } }
    for(const s of shuffled){ if(out.length>=n) break; if(!out.includes(s)) out.push(s); }
    return out; };
  const seq = pick(cardPool,3).concat(pickDrills(drillPool,3));
  if(!seq.length){ navigate('lesson', nextLid); return; }
  guided = {lessonId:null, seq, pos:0, review:true, reviewUnit:finishedUnit, nextLid};
  renderGuidedStep();
}

// Excel-style stable frame: the header row, progress dots, and the uniform
// bottom Back/Next bar keep their exact position on every step — only the
// step body (card / drill / lab pointer) swaps in the middle. No per-drill
// headers or advance buttons in guided mode, no layout jump between steps.
function renderGuidedStep(){
  if(!guided) return;
  const {seq, pos, lessonId, review} = guided;
  const step = seq[pos];
  const isLast = pos === seq.length-1;

  const backTop = review
    ? `<button class="btn btn-ghost btn-sm" onclick="guidedSkipAll()">Skip review →</button>`
    : `<button class="btn btn-ghost btn-sm" onclick="navigate('lesson',${lessonId})">← Back to lesson</button>`;
  const label = review
    ? `Unit review ${pos+1}/${seq.length} · mixing earlier skills`
    : `Practice ${pos+1}/${seq.length} · ${DATA.LESSONS.find(l=>l.id===lessonId).title}`;
  const dots = seq.map((_,i) => `<span style="width:20px;height:6px;border-radius:3px;background:${i<pos?'var(--green,#1a7f37)':i===pos?'var(--accent)':'rgba(127,127,127,.28)'};opacity:${i<=pos?1:.5}"></span>`).join('');

  let body;
  if(step[0]==='cards') body = guidedCardBody(step[1]);
  else if(step[0]==='lab') body = guidedLabBody(step[1]);
  else if(step[0]==='fills') body = renderFill(step[1]);
  else if(step[0]==='bugs') body = renderBug(step[1]);
  else body = renderParsons(step[1]);

  const nextLabel = isLast
    ? (review ? 'Finish review →' : 'Finish — next lesson →')
    : (step[0]==='cards' ? 'Got it — next →' : 'Next →');
  const backNav = pos>0
    ? `<button class="btn btn-ghost btn-sm" onclick="guidedPrev()">← Back</button>`
    : (review
      ? `<button class="btn btn-ghost btn-sm" onclick="guidedSkipAll()">Skip review</button>`
      : `<button class="btn btn-ghost btn-sm" onclick="navigate('lesson',${lessonId})">← Lesson</button>`);

  document.getElementById('main').innerHTML = `
    <div class="row mb">${backTop}<span class="text-muted text-sm" style="margin-left:auto">${label}</span></div>
    <div style="display:flex;gap:4px;align-items:center;margin:0 0 14px;flex-wrap:wrap">${dots}</div>
    ${review?`<p class="text-muted text-sm" style="margin:0 0 10px">Mixed review feels harder than fresh practice — that's normal, and it's where the material sticks.</p>`:''}
    ${body}
    <div class="row" style="justify-content:space-between;gap:10px;margin-top:20px">
      ${backNav}
      <button class="btn btn-primary" onclick="guidedNext()">${nextLabel}</button>
    </div>`;
  if(window.lucide) lucide.createIcons();
  window.scrollTo(0,0);
}

// "Tables in play" note derived from a drill's SQL — every exercise that asks
// the user to reason about a query must make its table names explicit, and any
// table alias (e.g. `sales s`) gets a one-line inline explanation.
function drillTablesNote(code){
  const KW = new Set(['SELECT','WHERE','GROUP','ORDER','LIMIT','ON','JOIN','INNER','LEFT','RIGHT','FULL','CROSS','AS','HAVING','UNION','EXCEPT','SET','VALUES','USING','AND','OR','NOT','WITH','BY']);
  const tables = [], aliases = [];
  for(const m of code.matchAll(/\b(?:FROM|JOIN)\s+([A-Za-z_][A-Za-z0-9_]*)(?:\s+(?:AS\s+)?([A-Za-z_][A-Za-z0-9_]*))?/gi)){
    const t = m[1];
    if(KW.has(t.toUpperCase())) continue;
    if(!tables.includes(t)) tables.push(t);
    const a = m[2];
    if(a && !KW.has(a.toUpperCase()) && !aliases.some(x => x[1] === a)) aliases.push([t, a]);
  }
  if(!tables.length) return '';
  const aliasNote = aliases.length
    ? `<br>Aliases: ${aliases.map(([t,a]) => `<code>${a}</code> = ${t}`).join(' · ')} — a short nickname given right after the table name, so <code>${aliases[0][1]}.column</code> means a column from <b>${aliases[0][0]}</b>.`
    : '';
  return `<p class="drill-tables">🗂 Tables in play: ${tables.map(t => `<code>${t}</code>`).join(' · ')}${aliasNote}</p>`;
}

// Bug Hunt — tap the correct fix (no free typing).
function _shuf(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
// Close the feedback loop on fills: a confirmed fragment is nice, but seeing what
// the COMPLETED query returns is the payoff. Runs the filled-in query against the
// live practice database; MySQL-only date fills get the SQLite callout instead.
// The engine loads lazily with the labs, so a fill answered outside the lab
// boots it here (async, silent on failure — the drill already confirmed).
async function _appendFillResult(f, res){
  if(!sqlDb){ try{ if(!await ensureDb(null)) return; }catch(e){ return; } }
  const html = _fillResultHTML(f);
  if(html && res && document.body.contains(res)) res.insertAdjacentHTML('beforeend', html);
}
function _fillResultHTML(f){
  if(typeof sqlDb === 'undefined' || !sqlDb) return '';
  const q = f.partial.replace('___', f.ans);
  try{
    const r = sqlDb.exec(q);
    if(!r.length) return '';
    const n = r[0].values.length;
    const shown = {columns:r[0].columns, values:r[0].values.slice(0,8)};
    const more = n>8 ? `<div class="terminal-info" style="padding:4px 0 0">…and ${n-8} more row${n-8!==1?'s':''}</div>` : '';
    return `<div style="margin-top:10px"><div class="text-muted" style="font-size:12px;margin-bottom:4px">Here's what the full query returns on the practice data (${n} row${n!==1?'s':''}):</div><div class="terminal-wrap"><div class="terminal-results">${_jcResultTable(shown)}${more}</div></div></div>`;
  }catch(e){
    if(/CURDATE|DATE_SUB|DATE_ADD|DATE_FORMAT|DATEDIFF|SUBDATE/i.test(f.partial))

// Tap-to-place (primary interaction; drag kept as a bonus). Tap a pool chip →
// appends to the answer; tap an answer chip → returns to the pool in original
// line order. Locked (scaffolded) chips ignore taps.
function tapChip(e){
  const chip = e.currentTarget;
  if(chip.getAttribute('draggable') === 'false') return;
  const pool = document.getElementById('parsons-pool');
  const answer = document.getElementById('parsons-answer');
  if(!pool || !answer) return;
  if(chip.parentElement === pool){
    answer.appendChild(chip);
  } else {
    const line = parseInt(chip.dataset.line);
    const after = [...pool.querySelectorAll('.parsons-chip')].find(c => parseInt(c.dataset.line) > line);
    pool.insertBefore(chip, after || null);
  }
  syncParsonsControls();
}

// A placed line can be nudged with ↑ ↓ so one line out of order costs one tap,
// not emptying the whole answer and starting again (playtest S3: "I'm not sure
// if we can put them movable"). Drag still works on desktop; touch has no drag.
function parsonsMoveChip(ev, dir){
  ev.stopPropagation();
  const chip = ev.currentTarget.closest('.parsons-chip');
  if(!chip) return;
  const sib = dir < 0 ? chip.previousElementSibling : chip.nextElementSibling;
  if(!sib) return;
  if(dir < 0) chip.parentElement.insertBefore(chip, sib);
  else chip.parentElement.insertBefore(sib, chip);
  syncParsonsControls();
}
function syncParsonsControls(){
  const pool = document.getElementById('parsons-pool');
  const answer = document.getElementById('parsons-answer');
  if(pool) pool.querySelectorAll('.pars-move').forEach(m => m.remove());
  if(!answer) return;
  const chips = [...answer.querySelectorAll('.parsons-chip')];
  chips.forEach((c, i) => {
    const locked = c.getAttribute('draggable') === 'false';
    let ctl = c.querySelector('.pars-move');
    if(locked){ if(ctl) ctl.remove(); return; }
    if(!ctl){
      ctl = document.createElement('span');
      ctl.className = 'pars-move';
      ctl.innerHTML = '<button type="button" aria-label="Move this line up">&uarr;</button>' +
                      '<button type="button" aria-label="Move this line down">&darr;</button>';
      ctl.children[0].onclick = e => parsonsMoveChip(e, -1);
      ctl.children[1].onclick = e => parsonsMoveChip(e, 1);
      c.appendChild(ctl);
    }
    ctl.children[0].disabled = i === 0;
    ctl.children[1].disabled = i === chips.length - 1;
  });
}

let draggedChip = null;
function dragStart(e){
  draggedChip = e.target;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function dragOver(e){ e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function dropChip(e, target){
  e.preventDefault();
  if(!draggedChip) return;
  draggedChip.classList.remove('dragging');
  const container = document.getElementById('parsons-' + target);
  container.appendChild(draggedChip);
  draggedChip = null;
}

function checkParsons(idx){
  const p = DATA.PARSONS[idx];
  const answer = document.getElementById('parsons-answer');
  const chips = [...answer.querySelectorAll('.parsons-chip')];
  if(chips.length !== p.answer.length){
    document.getElementById('parsons-result').innerHTML = `<span style="color:var(--yellow)">Move all lines to the answer area first.</span>`;
    return;
  }
  const userOrder = chips.map(c => parseInt(c.dataset.line));
  const correct = p.answer.every((v,i) => v === userOrder[i]);
  const res = document.getElementById('parsons-result');
  if(correct){
    res.innerHTML = `<span style="color:var(--green);font-weight:600">✓ Correct order!</span>`;
    celebrate();
    markDone('doneParsons', p.id);
    delete _parsonsAttempts[idx];
    setTimeout(() => {
      if(guided) guidedNext();
      else if(idx+1 < DATA.PARSONS.length) navigate('parsons', idx+1);
      else navigate('practice');
    }, 1200);
  } else {
    recordMiss(_drillLesson(), p.prompt);
    if(!_parsonsAttempts[idx]) _parsonsAttempts[idx] = 0;
    _parsonsAttempts[idx]++;
    const attempts = _parsonsAttempts[idx];
    if(attempts === 1){
      // 1st wrong: scaffold the first half in correct order, leave rest for user
      const half = Math.ceil(p.answer.length / 2);
      scaffoldParsons(idx, half);
      res.innerHTML = `<span style="color:var(--yellow)">✗ Not quite — the first ${half} line${half>1?'s are':' is'} placed for you. Tap the rest into order, and use ↑ ↓ on a placed line to move it.</span>`;
    } else {
      // 2nd wrong: show the full correct answer locked
      scaffoldParsons(idx, p.answer.length);
      const nxtBtn = guided
        ? '' // shell's uniform bottom nav is the advance control
        : idx+1 < DATA.PARSONS.length
          ? `<button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="navigate('parsons',${idx+1})">Next →</button>`
          : `<button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="navigate('practice')">Done →</button>`;
      res.innerHTML = `<span style="color:var(--accent)">Full answer shown — study the order, then move on.</span><br>${nxtBtn}`;
    }
  }
}
// Place the first `count` lines of the correct answer into the answer zone (locked/dimmed),
// return the rest to the pool in original line order.
function scaffoldParsons(idx, count){
  const p = DATA.PARSONS[idx];
  const pool = document.getElementById('parsons-pool');
  const answer = document.getElementById('parsons-answer');
  // collect all chips from both zones by their data-line index
  const allChips = {};
  [...pool.querySelectorAll('.parsons-chip'), ...answer.querySelectorAll('.parsons-chip')]
    .forEach(c => { allChips[parseInt(c.dataset.line)] = c; });
  pool.innerHTML = '';
  answer.innerHTML = '';
  const inAnswer = new Set();
  for(let i = 0; i < count; i++) inAnswer.add(p.answer[i]);
  // place scaffolded chips in correct order, visually locked
  for(let i = 0; i < count; i++){
    const chip = allChips[p.answer[i]];
    if(!chip) continue;
    chip.setAttribute('draggable','false');
    chip.style.opacity = '0.65';
    chip.style.cursor = 'default';
    chip.style.borderColor = 'rgba(47,109,240,.5)';
    chip.style.background = 'rgba(47,109,240,.10)';
    answer.appendChild(chip);
  }
  // remaining chips back to pool in original line-array order (don't reveal ordering)
  p.lines.forEach((_,lineIdx) => {
    if(inAnswer.has(lineIdx)) return;
    const chip = allChips[lineIdx];
    if(!chip) return;
    chip.setAttribute('draggable','true');
    chip.style.opacity = '';
    chip.style.cursor = '';
    chip.style.borderColor = '';
    chip.style.background = '';
    pool.appendChild(chip);
  });
  syncParsonsControls();
  // NOTE: this used to restack the columns (answer above pool) mid-exercise.
  // On mobile that swapped the layout out from under the learner right after a
  // wrong check — combined with the scaffold pulling their placed lines back to
  // the pool, it read as "my second tap jumped above my first" (playtest S3,
  // 2026-07-20). The column order must stay put for the whole exercise.
}

// Deterministic seeded generator (no Math.random) so every visitor gets the
// exact same products/sales data — answers and row counts stay reproducible.
function seedSalesData(db){
  db.run(`
    CREATE TABLE products (
      product_id TEXT PRIMARY KEY,
      name TEXT,
      category TEXT,
      price REAL
    );
    INSERT INTO products VALUES
    ('P01','House Blend Beans','Coffee',14.00),
    ('P02','Single Origin Ethiopia','Coffee',19.50),
    ('P03','Decaf Dark Roast','Coffee',15.00),
    ('P04','Cold Brew Concentrate','Coffee',11.00),
    ('P05','Earl Grey Tin','Tea',9.50),
    ('P06','Jasmine Green Tin','Tea',10.50),
    ('P07','Chai Sampler','Tea',12.00),
    ('P08','Pour-Over Kettle','Equipment',42.00),
    ('P09','Burr Grinder','Equipment',89.00),
    ('P10','French Press','Equipment',28.00),
    ('P11','Logo Mug','Merch',13.00),
    ('P12','Canvas Tote','Merch',18.00);
    CREATE TABLE sales (
      sale_id INTEGER PRIMARY KEY,
      product_id TEXT,
      customer_id TEXT,
      sale_date TEXT,
      qty INTEGER,
      region TEXT,
      amount REAL
    );`);
  const prices={P01:14,P02:19.5,P03:15,P04:11,P05:9.5,P06:10.5,P07:12,P08:42,P09:89,P10:28,P11:13,P12:18};
  const pids=Object.keys(prices);
  const custs=['C001','C002','C003','C004','C005','C006','C007','C008','C009','C010'];
  const regions=['North','South','East','West'];
  let s=42; const rnd=()=>{ s=(s*1103515245+12345)%2147483648; return s/2147483648; };
  const rows=[];
  for(let i=1;i<=180;i++){
    const pid=pids[Math.floor(rnd()*pids.length)];
    const cid=custs[Math.floor(rnd()*custs.length)];
    const month=1+Math.floor(rnd()*6);
    const day=1+Math.floor(rnd()*28);
    const date=`2024-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const qty=1+Math.floor(rnd()*4);
    const region=rnd()<0.08?null:regions[Math.floor(rnd()*4)];
    const amount=Math.round(qty*prices[pid]*100)/100;
    rows.push(`(${i},'${pid}','${cid}','${date}',${qty},${region?`'${region}'`:'NULL'},${amount})`);
  }
  db.run(`INSERT INTO sales VALUES ${rows.join(',')};`);
}

 {p:"Label each product 'premium' if price >= 25, else 'standard'.",sql:"SELECT name, price, CASE WHEN price >= 25 THEN 'premium' ELSE 'standard' END AS tier FROM products;"},
 {p:"Bucket sales: 'big' if amount >= 100, 'medium' if >= 40, else 'small'.",sql:"SELECT amount, CASE WHEN amount >= 100 THEN 'big' WHEN amount >= 40 THEN 'medium' ELSE 'small' END AS size FROM sales LIMIT 15;"}]},
"COALESCE":{tries:[
 {p:"Show region, but replace NULL with 'Unassigned'.",sql:"SELECT sale_id, COALESCE(region, 'Unassigned') AS region FROM sales LIMIT 20;"},
 {p:"Customers' email, falling back to '(no email)' — Eva has a NULL.",sql:"SELECT name, COALESCE(email, '(no email)') AS contact FROM customers;"}]},
"NULL":{tries:[
 {p:"Sales where region is missing.",sql:"SELECT * FROM sales WHERE region IS NULL;"},
 {p:"Prove that = NULL finds nothing (0 rows) — then remember to use IS NULL.",sql:"SELECT COUNT(*) FROM sales WHERE region = NULL;"}]},
"IS NULL":{tries:[
 {p:"Customers with no email on file.",sql:"SELECT name FROM customers WHERE email IS NULL;"},
 {p:"Sales that DO have a region (IS NOT NULL).",sql:"SELECT COUNT(*) FROM sales WHERE region IS NOT NULL;"}]},
"Subquery":{tries:[
 {p:"Sales above the average sale amount.",sql:"SELECT * FROM sales WHERE amount > (SELECT AVG(amount) FROM sales) LIMIT 15;"},
 {p:"Products more expensive than the average product.",sql:"SELECT name, price FROM products WHERE price > (SELECT AVG(price) FROM products);"}]},
"IN":{tries:[
 {p:"Products in the Coffee or Tea categories.",sql:"SELECT name, category FROM products WHERE category IN ('Coffee','Tea');"},
 {p:"Customers who appear in the sales table (IN + subquery).",sql:"SELECT name FROM customers WHERE id IN (SELECT DISTINCT customer_id FROM sales);"}]},
"CTE (WITH)":{tries:[
 {p:"CTE of revenue per product, then select the rows over 400 from it.",sql:"WITH product_rev AS (\n  SELECT product_id, SUM(amount) AS rev\n  FROM sales GROUP BY product_id\n)\nSELECT * FROM product_rev WHERE rev > 400;"},
 {p:"CTE of monthly revenue (strftime '%m'), then pick the best month.",sql:"WITH monthly AS (\n  SELECT strftime('%m', sale_date) AS month, SUM(amount) AS rev\n  FROM sales GROUP BY month\n)\nSELECT * FROM monthly ORDER BY rev DESC LIMIT 1;"}]},
"ROW_NUMBER()":{tries:[
 {p:"Number every sale from biggest amount to smallest.",sql:"SELECT sale_id, amount, ROW_NUMBER() OVER (ORDER BY amount DESC) AS rn FROM sales LIMIT 10;"},
 {p:"Rank products by price within the whole table.",sql:"SELECT name, price, ROW_NUMBER() OVER (ORDER BY price DESC) AS price_rank FROM products;"}]},
"OVER (...)":{tries:[
 {p:"Each sale next to the overall average amount (no GROUP BY needed).",sql:"SELECT sale_id, amount, AVG(amount) OVER () AS overall_avg FROM sales LIMIT 10;"},
 {p:"Running total of revenue by date.",sql:"SELECT sale_date, amount, SUM(amount) OVER (ORDER BY sale_date, sale_id) AS running_total FROM sales LIMIT 15;"}]},
"PARTITION BY":{tries:[
 {p:"Number sales 1,2,3… restarting per region.",sql:"SELECT region, amount, ROW_NUMBER() OVER (PARTITION BY region ORDER BY amount DESC) AS rn FROM sales LIMIT 20;"},
 {p:"Each product's price next to its category average.",sql:"SELECT name, category, price, AVG(price) OVER (PARTITION BY category) AS cat_avg FROM products;"}]},
"Alias (AS)":{tries:[
 {p:"Rename SUM(amount) to something readable.",sql:"SELECT SUM(amount) AS total_revenue FROM sales;"},
 {p:"Table aliases: shorten sales to s and products to p in a join.",sql:"SELECT p.name, s.qty FROM sales AS s JOIN products AS p ON s.product_id = p.product_id LIMIT 10;"}]},
"PRIMARY KEY":{tries:[
 {p:"Inspect the products table definition — which column is the PK? (PRAGMA shows pk=1.)",sql:"PRAGMA table_info(products);"},
 {p:"Prove uniqueness: count rows vs distinct product_ids — they match.",sql:"SELECT COUNT(*) AS rows_, COUNT(DISTINCT product_id) AS distinct_ids FROM products;"}]},
"FOREIGN KEY":{tries:[
 {p:"sales.customer_id references customers.id — find 'orphan' sales whose customer is NOT in customers (they're only in customers_old!).",sql:"SELECT DISTINCT s.customer_id FROM sales s LEFT JOIN customers c ON s.customer_id = c.id WHERE c.id IS NULL;"},
 {p:"Follow the FK the happy direction: each sale with its customer's status.",sql:"SELECT s.sale_id, c.name, c.status FROM sales s JOIN customers c ON s.customer_id = c.id LIMIT 10;"}]},
"Reconciliation":{tries:[
 {p:"Do customers and customers_old agree on row counts?",sql:"SELECT (SELECT COUNT(*) FROM customers) AS current_, (SELECT COUNT(*) FROM customers_old) AS old_;"},
 {p:"Who is in customers_old but missing from customers?",sql:"SELECT co.id, co.name FROM customers_old co LEFT JOIN customers c ON co.id = c.id WHERE c.id IS NULL;"},
 {p:"Does SUM(amount) match SUM(qty × price)? A classic totals check.",sql:"SELECT ROUND(SUM(s.amount),2) AS stored, ROUND(SUM(s.qty * p.price),2) AS computed FROM sales s JOIN products p ON s.product_id = p.product_id;"}]},
"RIGHT JOIN":{tries:[
 {p:"RIGHT JOIN keeps every row of the RIGHT table: all customers_old, matched or not.",sql:"SELECT s.sale_id, co.name FROM sales s RIGHT JOIN customers_old co ON s.customer_id = co.id LIMIT 20;"},
 {p:"Same result flipped as a LEFT JOIN — the usual rewrite.",sql:"SELECT s.sale_id, co.name FROM customers_old co LEFT JOIN sales s ON s.customer_id = co.id LIMIT 20;"}]},
"FULL OUTER JOIN":{tries:[
 {p:"All customers AND all customers_old, matched where possible.",sql:"SELECT c.id AS cur_id, co.id AS old_id FROM customers c FULL OUTER JOIN customers_old co ON c.id = co.id;"},
 {p:"Filter that to mismatches only — rows missing on either side.",sql:"SELECT c.id AS cur_id, co.id AS old_id FROM customers c FULL OUTER JOIN customers_old co ON c.id = co.id WHERE c.id IS NULL OR co.id IS NULL;"}]},
"CURDATE()":{note:"CURDATE() is MySQL. This lab runs SQLite, where the equivalent is <code>date('now')</code> — practice the idea with SQLite's spelling.",tries:[
 {p:"Today's date (SQLite spelling).",sql:"SELECT date('now') AS today;"},
 {p:"Sales made before today (all of them — data is from 2024).",sql:"SELECT COUNT(*) FROM sales WHERE sale_date < date('now');"}]},
"DATE_SUB(date, INTERVAL n unit)":{note:"DATE_SUB is MySQL. SQLite uses date modifiers: <code>date('now','-30 day')</code>.",tries:[
 {p:"The date 30 days ago.",sql:"SELECT date('now','-30 day') AS thirty_days_ago;"},
 {p:"Sales in the 90 days after 2024-03-01 (date + modifier on a literal).",sql:"SELECT COUNT(*) FROM sales WHERE sale_date >= '2024-03-01' AND sale_date < date('2024-03-01','+90 day');"}]},
"DATE_FORMAT(date, format)":{note:"DATE_FORMAT is MySQL. SQLite uses <code>strftime(format, date)</code> — %Y-%m gives '2024-03'.",tries:[
 {p:"Each sale's month as '2024-03' style.",sql:"SELECT sale_date, strftime('%Y-%m', sale_date) AS month FROM sales LIMIT 10;"},
 {p:"Revenue per month — the #1 analyst date pattern.",sql:"SELECT strftime('%Y-%m', sale_date) AS month, SUM(amount) AS revenue FROM sales GROUP BY month ORDER BY month;"}]},
"DATEDIFF(date1, date2)":{note:"DATEDIFF is MySQL. SQLite: subtract julianday() values to get days between dates.",tries:[
 {p:"Days between Jan 1 and Jun 30, 2024.",sql:"SELECT julianday('2024-06-30') - julianday('2024-01-01') AS days_between;"},
 {p:"Days since each customer's first purchase, relative to 2024-07-01.",sql:"SELECT customer_id, CAST(julianday('2024-07-01') - julianday(MIN(sale_date)) AS INTEGER) AS days_since_first FROM sales GROUP BY customer_id;"}]},
"Index":{tries:[
 {p:"Check the query plan for a region filter — SCAN means full table scan.",sql:"EXPLAIN QUERY PLAN SELECT * FROM sales WHERE region = 'North';"},
 {p:"Create an index on region, then re-run the plan — it becomes SEARCH … USING INDEX.",sql:"CREATE INDEX IF NOT EXISTS idx_sales_region ON sales(region);\nEXPLAIN QUERY PLAN SELECT * FROM sales WHERE region = 'North';"}]},
"Composite index":{tries:[
 {p:"Create a two-column index on (region, sale_date) and check the plan for a query filtering both.",sql:"CREATE INDEX IF NOT EXISTS idx_sales_region_date ON sales(region, sale_date);\nEXPLAIN QUERY PLAN SELECT * FROM sales WHERE region = 'East' AND sale_date >= '2024-03-01';"},
 {p:"Column order matters: filtering ONLY sale_date can't use that index's front column.",sql:"EXPLAIN QUERY PLAN SELECT * FROM sales WHERE sale_date >= '2024-03-01';"}]},
"Temporary Table":{tries:[
 {p:"Create a temp table of big sales, then query it.",sql:"CREATE TEMP TABLE IF NOT EXISTS big_sales AS SELECT * FROM sales WHERE amount >= 100;\nSELECT COUNT(*) FROM big_sales;"},
 {p:"Use the temp table in a join like any other table.",sql:"SELECT p.name, COUNT(*) AS big_sale_count FROM big_sales b JOIN products p ON b.product_id = p.product_id GROUP BY p.name ORDER BY big_sale_count DESC;"}]},
"View":{tries:[
 {p:"Create a view of revenue per category, then SELECT from it.",sql:"CREATE VIEW IF NOT EXISTS category_revenue AS\nSELECT p.category, SUM(s.amount) AS revenue\nFROM sales s JOIN products p ON s.product_id = p.product_id\nGROUP BY p.category;\nSELECT * FROM category_revenue ORDER BY revenue DESC;"},
 {p:"Views re-run live: filter the view like a table.",sql:"SELECT * FROM category_revenue WHERE revenue > 900;"}]}
};

const DRILL_GROUPS = [
 {label:"Core clauses", terms:["SELECT","FROM","WHERE","ORDER BY","LIMIT","DISTINCT","Alias (AS)"]},
 {label:"Joins & keys", terms:["INNER JOIN","LEFT JOIN","RIGHT JOIN","FULL OUTER JOIN","ON","PRIMARY KEY","FOREIGN KEY"]},
 {label:"Aggregates", terms:["GROUP BY","COUNT(*)","SUM(col)","AVG(col)","HAVING"]},
 {label:"Logic & NULLs", terms:["CASE WHEN","COALESCE","NULL","IS NULL","IN"]},
 {label:"Subqueries, CTEs & objects", terms:["Subquery","CTE (WITH)","Temporary Table","View"]},
 {label:"Window functions", terms:["ROW_NUMBER()","OVER (...)","PARTITION BY"]},
 {label:"Dates", terms:["CURDATE()","DATE_SUB(date, INTERVAL n unit)","DATE_FORMAT(date, format)","DATEDIFF(date1, date2)"]},
 {label:"Data quality & performance", terms:["Reconciliation","Index","Composite index"]},
];

function cardDef(term){ const c = DATA.CARDS.find(c=>c[0]===term); return c ? c[1] : ''; }
function drillTermList(){ return DRILL_GROUPS.flatMap(g=>g.terms); }

function renderLabCards(){
  const doneCount = state.doneCardDrills.length, total = drillTermList().length;
  const groupsHtml = DRILL_GROUPS.map(g=>`
    <h3 style="margin:18px 0 8px">${g.label}</h3>
    <div style="display:flex;flex-wrap:wrap;gap:8px">
      ${g.terms.map(t=>{
        const done = state.doneCardDrills.includes(t);
        return `<button onclick="navigate('card-drill','${t.replace(/'/g,"\\'")}')" style="padding:8px 14px;border-radius:8px;border:1.5px solid ${done?'var(--green,#1a7f37)':'var(--border)'};background:${done?'rgba(26,127,55,.08)':'var(--surf)'};color:${done?'var(--green,#1a7f37)':'var(--text,inherit)'};font:600 13px var(--mono);cursor:pointer">${done?'✓ ':''}${t}</button>`;
      }).join('')}
    </div>`).join('');
  document.getElementById('main').innerHTML = `
    <h1>SQL Lab</h1>
    ${labTabsHTML('carddrills')}
    <p>Every flashcard concept, runnable. Pick a card, try it on different columns and tables, then finish with <strong>Put It All Together</strong>.</p>
    <div class="card card-sm mb"><strong>${doneCount} / ${total}</strong> drills complete · Tables: <code style="font-family:var(--mono);font-size:13px">products</code>, <code style="font-family:var(--mono);font-size:13px">sales</code> (180 rows), plus <code style="font-family:var(--mono);font-size:13px">customers</code>, <code style="font-family:var(--mono);font-size:13px">orders</code>, <code style="font-family:var(--mono);font-size:13px">customers_old</code></div>
    ${groupsHtml}
    <div class="card mt" style="border:1.5px solid var(--accent)">
      <h3>🏁 Put It All Together</h3>
      <p class="text-muted text-sm">A 4-step mini-analysis that chains these concepts into one real answer.</p>
      <button class="btn btn-primary btn-sm" onclick="navigate('lab-capstone')">Start the capstone →</button>
    </div>`;
}

async function renderCardDrill(term){
  const d = CARD_DRILLS[term];
  if(!d) return navigate('lab-cards');
  const terms = drillTermList();
  const ti = terms.indexOf(term);
  const done = state.doneCardDrills.includes(term);
  const triesHtml = d.tries.map((t,i)=>`
    <div class="card card-sm mb">
      <p style="margin:0 0 8px"><strong>Try ${i+1}.</strong> ${t.p}</p>
      <div class="row">
        <button class="btn btn-primary btn-sm" onclick="loadDrillTry(${i})">Load into terminal</button>
        <button class="btn btn-ghost btn-sm" onclick="const a=document.getElementById('drill-ans-${i}');a.style.display=a.style.display==='none'?'block':'none'">Show answer</button>
        <button class="btn btn-ghost btn-sm" onclick="pasteDrillAnswer(${i})">⤵ Paste into terminal</button>
      </div>
      <div id="drill-ans-${i}" style="display:none;font-family:var(--mono);font-size:13px;white-space:pre;overflow-x:auto;background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:8px">${t.sql.replace(/</g,'&lt;')}</div>
    </div>`).join('');
  document.getElementById('main').innerHTML = `
    <div class="row mb">
      <button class="btn btn-ghost btn-sm" onclick="navigate('lab-cards')">← All card drills</button>
      <span class="text-muted text-sm">${ti+1} / ${terms.length}</span>
      ${done ? '<span class="badge badge-done">✓</span>' : ''}
    </div>
    <div class="card">
      <h2 style="font-family:var(--mono)">${term}</h2>
      <p class="text-muted">${cardDef(term)}</p>
      ${d.note ? `<div style="background:rgba(191,135,0,.1);border:1px solid rgba(191,135,0,.4);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px">💡 ${d.note}</div>` : ''}
      ${drillTablesNote(d.tries.map(t => t.sql).join('\n'))}
      ${triesHtml}
      <div class="terminal-wrap">
        <div class="terminal-toolbar">
          <div class="terminal-dot" style="background:#ff5f57"></div>
          <div class="terminal-dot" style="background:#febc2e"></div>
          <div class="terminal-dot" style="background:#28c840"></div>
          <span class="terminal-title">SQL Terminal</span>
        </div>
        <textarea class="terminal-editor" id="sql-editor" spellcheck="false" placeholder="-- Load a Try above, or write your own"></textarea>
        <div class="terminal-actions">
          <button class="btn btn-primary btn-sm" onclick="runSQL();_drillRan=true">▶ Run</button>
          <button class="btn btn-ghost btn-sm" onclick="document.getElementById('sql-editor').value=''">Clear</button>
        </div>
        <div class="terminal-results" id="sql-results"><span class="terminal-info">Results appear here…</span></div>
      </div>
      <div class="row mt">
        <button class="btn btn-primary btn-sm" onclick="finishDrill('${term.replace(/'/g,"\\'")}')">${done?'✓ Done — revisit any time':'Mark this card practiced ✓'}</button>
        ${ti+1<terms.length ? `<button class="btn btn-ghost btn-sm" onclick="navigate('card-drill','${terms[ti+1].replace(/'/g,"\\'")}')">Next card →</button>` : `<button class="btn btn-ghost btn-sm" onclick="navigate('lab-capstone')">Capstone →</button>`}
      </div>
    </div>`;
  _drillTries = d.tries; _drillRan = false;
  const ok = await ensureDb(document.getElementById('sql-results'));
  if(ok){ const el=document.getElementById('sql-results'); if(el) el.innerHTML='<span class="terminal-info">Ready — load a Try and hit Run.</span>'; }
}
let _drillTries = [], _drillRan = false;
function loadDrillTry(i){
  const t = _drillTries[i];
  const ed = document.getElementById('sql-editor');
  if(ed){ ed.value = `-- ${t.p}\n`; ed.focus(); }
}
// One-tap paste: selecting text out of an answer block on a phone is brutal,
// so the revealed answer can jump straight into the terminal.
function pasteDrillAnswer(i){
  const a = document.getElementById('drill-ans-'+i); if(a) a.style.display='block';
  const t = _drillTries[i];
  const ed = document.getElementById('sql-editor');
  if(t && ed){ ed.value = t.sql; ed.focus(); ed.scrollIntoView({behavior:'smooth',block:'center'}); }
}
function finishDrill(term){
  if(!_drillRan && !state.doneCardDrills.includes(term)){
    showToast('Run at least one query first — that\'s the practice!');
    return;
  }
  if(!state.doneCardDrills.includes(term)){
    state.doneCardDrills.push(term); saveState(); celebrate();
  }
  navigate('lab-cards');
}
function practiceCard(i){
  const term = DATA.CARDS[i][0];
  if(CARD_DRILLS[term]) navigate('card-drill', term);
  else navigate('lab-cards');
}

    current = inRange >= 0 ? inRange : _capReturn.from;
  }
  let lastStage = null;
  const stepsHtml = CAPSTONE.steps.map((st,i)=>{
    const done = state.doneCapstone.includes(i);
    const open = i === current;
    const stageHdr = st.stage !== lastStage ? `<div class="unit-label">${st.stage}</div>` : '';

    return `${stageHdr}

      <div id="cap-body-${i}" style="${open?'':'display:none'}">
      <p>${st.p}</p>
      <div class="terminal-wrap">
        <textarea class="terminal-editor" id="cap-ed-${i}" spellcheck="false" style="min-height:150px">${st.scaffold}</textarea>
        <div class="terminal-actions">
          <button class="btn btn-primary btn-sm" onclick="checkCapstone(${i})">▶ Run & check</button>
          <button class="btn btn-ghost btn-sm" onclick="const h=document.getElementById('cap-hint-${i}');h.style.display=h.style.display==='none'?'block':'none'">Hint</button>
          <button class="btn btn-ghost btn-sm" onclick="const a=document.getElementById('cap-ans-${i}');a.style.display=a.style.display==='none'?'block':'none'">Show answer</button>
          <button class="btn btn-ghost btn-sm" onclick="pasteCapAnswer(${i})">⤵ Paste answer</button>
        </div>
        <div id="cap-hint-${i}" style="display:none;font-size:13px;padding:10px 14px;background:rgba(191,135,0,.1);border-radius:8px;margin:8px 0">💡 ${st.hint}</div>
        <div id="cap-ans-${i}" style="display:none;font-family:var(--mono);font-size:12.5px;white-space:pre-wrap;background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:12px;margin:8px 0">${st.sql.replace(/</g,'&lt;')}</div>
        <div class="terminal-results" id="cap-res-${i}"><span class="terminal-info">Results appear here…</span></div>
      </div>
      </div>
    </div>`;}).join('');
  const nDone = state.doneCapstone.filter(i=>i<CAPSTONE.steps.length).length;
  const allDone = nDone >= CAPSTONE.steps.length;
  document.getElementById('main').innerHTML = `
    <h1>SQL Lab</h1>
    ${labTabsHTML('capstone')}
    <div class="card card-sm mb">${CAPSTONE.brief}</div>
    <div class="card card-sm mb" style="display:flex;align-items:center;gap:12px">
      <div style="flex:1;height:8px;border-radius:4px;background:var(--surf2);overflow:hidden"><div style="height:100%;width:${Math.round(nDone/CAPSTONE.steps.length*100)}%;background:var(--accent)"></div></div>

    </div>

function toggleCapStep(i){
  const b = document.getElementById('cap-body-'+i);
  if(b) b.style.display = b.style.display === 'none' ? '' : 'none';
}

// One-tap paste for the capstone: reveals the answer and drops it in the editor.
function pasteCapAnswer(i){
  const a = document.getElementById('cap-ans-'+i); if(a) a.style.display='block';
  const e = document.getElementById('cap-ed-'+i);
  if(e){ e.value = CAPSTONE.steps[i].sql; e.focus(); }
}

function openCapStep(i){
  const b = document.getElementById('cap-body-'+i);
  if(b) b.style.display = '';
  const c = document.getElementById('cap-step-'+i);
  if(c) c.scrollIntoView({behavior:'smooth',block:'start'});
}

function _resKey(res){
  if(!res.length) return 'EMPTY';
  return JSON.stringify({c:res[0].columns.map(c=>c.toLowerCase()), v:res[0].values});
}
function checkCapstone(i){
  const st = CAPSTONE.steps[i];
  const ed = document.getElementById('cap-ed-'+i);
  const out = document.getElementById('cap-res-'+i);
  if(!sqlDb){ out.innerHTML='<span class="terminal-error">SQL engine not ready yet.</span>'; return; }
  const sql = ed.value.trim();
  if(!sql || sql.replace(/--[^\n]*/g,'').trim()===''){ out.innerHTML='<span class="terminal-info">Write your query below the comments first.</span>'; return; }
  let userRes;
  try { userRes = sqlDb.exec(sql); }
  catch(e){ out.innerHTML=`<span class="terminal-error">Error: ${e.message}</span>`; return; }
  // render user result
  let html='';
  if(userRes.length){
    const {columns, values} = userRes[0];
    html = `<table><thead><tr>${columns.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${values.map(r=>`<tr>${r.map(v=>`<td>${v==null?'<em style="color:var(--muted)">NULL</em>':v}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
  } else html = '<span class="terminal-info">Query ran — no rows returned.</span>';
  const refRes = sqlDb.exec(st.sql);
  if(_resKey(userRes)===_resKey(refRes)){
    html += `<div style="margin-top:8px;color:var(--green,#1a7f37);font-weight:700">✓ Correct — matches the reference result.</div>`;
    if(!state.doneCapstone.includes(i)){ state.doneCapstone.push(i); saveState(); celebrate(); }
    const stepCard=document.getElementById('cap-step-'+i); if(stepCard) stepCard.style.borderColor='var(--green,#1a7f37)';
    const hdr=document.querySelector('#cap-step-'+i+' h3'); if(hdr && !hdr.textContent.startsWith('✅')) hdr.insertAdjacentText('afterbegin','✅ ');
    // collapse this step, open + scroll to the next not-done one (keeps other editors' text intact — no re-render)
    // From the guided path: when the unit's slice is complete, surface the return CTA.
    if(_capReturn && CAPSTONE.steps.every((_,k)=>k<_capReturn.from || k>_capReturn.to || state.doneCapstone.includes(k))){
      const stepEl=document.getElementById('cap-step-'+i);
      if(stepEl && !document.getElementById('cap-unit-done')){
        stepEl.insertAdjacentHTML('afterend', `<div class="card mb" id="cap-unit-done" style="border:1.5px solid var(--green,#1a7f37)">
          <h3>🔨 Unit slice done — it's yours now</h3>
          <p class="text-muted text-sm">Run these steps again until they feel fluid, explore the other labs, or head straight back to the path. Come back tomorrow and re-run them cold — that spaced repeat locks it in.</p>
          <button class="btn btn-primary btn-sm" onclick="const n=_capReturn.nextLid;_capReturn=null;navigate('lesson',n)">Continue path →</button>
        </div>`);
        document.getElementById('cap-unit-done').scrollIntoView({behavior:'smooth',block:'center'});
      }
      if(state.doneCapstone.filter(k=>k<CAPSTONE.steps.length).length>=CAPSTONE.steps.length){ const f=document.getElementById('cap-finale'); if(f) f.style.display=''; }
      out.innerHTML = html;
      return;
    }
    const nxt=CAPSTONE.steps.findIndex((_,k)=>k>i && !state.doneCapstone.includes(k));
    // No auto-collapse: the solved step stays open with its result so the learner
    // can actually read the answer they earned; they advance when they choose.
    if(nxt>=0){ html += `<div style="margin-top:10px"><button class="btn btn-primary btn-sm" onclick="openCapStep(${nxt})">Next step ↓</button> <span class="text-muted" style="font-size:12px">Your answer and result stay right here.</span></div>`; }
    if(state.doneCapstone.filter(k=>k<CAPSTONE.steps.length).length>=CAPSTONE.steps.length){ const f=document.getElementById('cap-finale'); if(f) f.style.display=''; }
  } else {
    html += `<div style="margin-top:8px;color:var(--red,#cf222e)">Not a match yet — check the requested columns, order, and filters. Same data, different shape counts as different.</div>`;
  }
  out.innerHTML = html;
}

// drops in the full answer. The grey help block under each terminal is persistent
// and grows one line per miss. A correct answer resets that challenge's counter.
let _jcAttempts = {}, _jcHelp = {};

function _jcResultTable(r){
  const {columns, values} = r;
  const thead = `<tr>${columns.map(c=>`<th>${c}</th>`).join('')}</tr>`;
  const tbody = values.map(row=>`<tr>${row.map(v=>`<td>${v==null?'<em style="color:var(--red);font-style:italic">NULL</em>':v}</td>`).join('')}</tr>`).join('');
  return `<table><thead>${thead}</thead><tbody>${tbody}</tbody></table>`;
}

function runJoinChallenge(i){
  const t = JOIN_TASKS[i];
  const editor = document.getElementById('jc-editor-'+i);
  const results = document.getElementById('jc-results-'+i);
  if(!results) return;
  if(!sqlDb){ results.innerHTML = '<span class="terminal-error">SQL engine not ready yet.</span>'; return; }
  const sql = editor ? editor.value.trim() : '';
  // A run that is only the comment scaffold / whitespace doesn't burn an attempt.
  if(!sql || /^(--[^\n]*\n?|\s)*$/.test(sql)){ results.innerHTML = '<span class="terminal-info">Write a query above first, then Run.</span>'; return; }

  let res, err = null;
  try { res = sqlDb.exec(sql); } catch(e){ err = e.message; res = []; }

  let correct = false;
  if(!err && res.length){
    try { const ar = sqlDb.exec(t.answer); if(ar.length) correct = JSON.stringify(ar[0].values) === JSON.stringify(res[0].values); } catch(e){}
  }

  if(correct){
    _jcAttempts[i] = 0;
    const n = res[0].values.length;
    results.innerHTML = _jcResultTable(res[0]) +
      `<div style="margin-top:10px"><span style="color:var(--green);font-weight:700">✓ Correct — ${n} row${n!==1?'s':''}</span> <span style="color:var(--muted);font-size:12px">— ${t.note}</span></div>`;
    if(typeof celebrate === 'function') celebrate();
    return;
  }

  const att = (_jcAttempts[i] || 0) + 1; _jcAttempts[i] = att;
  const log = _jcHelp[i] || (_jcHelp[i] = []);
  if(att === 1){
    log.push(`<strong>Try 1.</strong> ${t.hint} <span style="opacity:.85">(I filled the opening of the query in above — build on it.)</span>`);
    _labFillPartial('jc-editor-'+i, t.answer, 1/3);
  } else if(att === 2){
    log.push(`<strong>Try 2.</strong> Closer. I filled more of the query in above — carry on from where it stops. ${err ? 'Your last run had a syntax error, so check the SQL keywords.' : 'Compare your rows against what the prompt asks for.'}`);
    _labFillPartial('jc-editor-'+i, t.answer, 2/3);
  } else if(att === 3){
    log.push(`<strong>Try 3 — here's the full answer.</strong> Run it, then read it line by line against the prompt. ${t.note}`);
    if(editor){ editor.value = t.answer; editor.focus(); }
  } else {
    log.push(`<strong>The full answer is in the editor.</strong> Run it and compare it with what you had.`);
  }

  const head = err
    ? `<div style="color:var(--red);font-family:var(--mono);font-size:12px">Error: ${err}</div>`
    : (res.length
        ? _jcResultTable(res[0]) + `<div style="margin-top:6px;color:var(--muted);font-size:11px">${res[0].values.length} row${res[0].values.length!==1?'s':''} — not a match yet (target is ~${t.expectedRows})</div>`
        : `<div style="color:var(--muted)">Query ran — no rows returned. Check your JOIN condition and ON clause.</div>`);
  results.innerHTML = head;

  const help = document.getElementById('jc-help-'+i);
  if(help){ help.style.display = 'block'; help.innerHTML = log.map(l=>`<div style="margin:5px 0">${l}</div>`).join(''); }
  if(window.lucide && typeof grainRefreshIcons === 'function') grainRefreshIcons();
}

function resetJoinChallenge(i){
  _jcAttempts[i] = 0; _jcHelp[i] = [];
  const ed = document.getElementById('jc-editor-'+i); if(ed){ ed.value = JOIN_TASKS[i].scaffold; ed.focus(); }
  const help = document.getElementById('jc-help-'+i); if(help){ help.style.display = 'none'; help.innerHTML = ''; }
  const results = document.getElementById('jc-results-'+i); if(results) results.innerHTML = '<span class="terminal-info">Write your query above and Run.</span>';
}

// ─── SHARED LAB RUN + PROGRESSIVE SCAFFOLD ─────────────────────────────────
// Wrong-attempt counter per "<kind><taskIdx>" so each task escalates help
// the same way the Parsons drill does: miss 1 → auto-hint, miss 2 → first
// half of the answer filled in, miss 3 → full answer filled in.
let _labAttempts = {};

function _labOpenHint(kind){
  if(kind==='join') _joinHintOpen = true; else _aggHintOpen = true;
  const el = document.getElementById(kind+'-hint');
  const btn = document.getElementById(kind+'-hint-btn');
  if(el) el.style.display = 'block';
  if(btn) btn.style.color = 'var(--accent)';
}

function _labFillPartial(editorId, answer, frac){
  const lines = answer.split('\n');
  const keep = Math.max(1, Math.round(lines.length * frac));
  const ed = document.getElementById(editorId);
  if(ed){ ed.value = lines.slice(0, keep).join('\n') + '\n'; ed.focus(); }
}

function _runLabQuery(kind, taskIdx){
  const cfg = {
    join: { arr: JOIN_TASKS, editor:'join-editor', results:'join-results',
            norows:'Query ran — no rows returned. Check your JOIN condition and make sure the ON clause matches the right columns.' },
    agg:  { arr: AGG_TASKS,  editor:'agg-editor',  results:'agg-results',
            norows:'Query ran — no rows returned. Check your GROUP BY clause.' }
  }[kind];
  const editor = document.getElementById(cfg.editor);
  const results = document.getElementById(cfg.results);
  if(!results) return;
  if(!sqlDb){ results.innerHTML = '<span class="terminal-error">SQL engine not ready yet.</span>'; return; }
  const sql = editor ? editor.value.trim() : '';
  if(!sql){ results.innerHTML = '<span class="terminal-info">Enter a query above.</span>'; return; }
  const t = cfg.arr[taskIdx];
  let res, syntaxErrMsg = null;
  try { res = sqlDb.exec(sql); }
  catch(e){ syntaxErrMsg = e.message; res = []; }

  // Syntax error OR empty result → count as a miss and escalate help.
  if(syntaxErrMsg || !res.length){
    const key = kind + taskIdx;
    const att = (_labAttempts[key] || 0) + 1;
    _labAttempts[key] = att;
    let help;
    if(att === 1){
      _labOpenHint(kind);
      help = `Not quite — ${syntaxErrMsg ? 'your query had a syntax error' : 'no rows returned'}. <i data-lucide="lightbulb" style="width:14px;height:14px;vertical-align:-2px"></i> <strong>Hint opened below</strong> — adjust and Run again.`;
    } else if(att === 2){
      _labFillPartial(cfg.editor, cfg.arr[taskIdx].answer, 0.5);
      help = `Still off — I filled in the <strong>first half</strong> of the query for you. Finish it and Run again.`;
    } else {
      const ed = document.getElementById(cfg.editor);
      if(ed){ ed.value = cfg.arr[taskIdx].answer; ed.focus(); }
      help = `<strong>Full answer filled in</strong> — Run it to see the target result, then compare it line-by-line with the prompt.`;
    }
    const head = syntaxErrMsg
      ? `<div style="color:var(--red);font-family:var(--mono);font-size:12px;margin-bottom:8px">Error: ${syntaxErrMsg}</div>`
      : `<div style="color:var(--muted);margin-bottom:8px">Query ran — no rows returned.</div>`;
    results.innerHTML = head + `
      <div style="color:var(--text);font-size:12px;line-height:1.55;background:rgba(212,160,64,.12);border:1px solid rgba(212,160,64,.3);border-radius:6px;padding:8px 11px">${help}</div>`;
    return;
  }
  const {columns, values} = res[0];
  const thead = `<tr>${columns.map(c=>`<th>${c}</th>`).join('')}</tr>`;
  const tbody = values.map(row=>`<tr>${row.map(v=>`<td>${v==null?'<em style="color:var(--red);font-style:italic">NULL</em>':v}</td>`).join('')}</tr>`).join('');
  const tableHTML = `<table><thead>${thead}</thead><tbody>${tbody}</tbody></table>`;
  const n = values.length;

  // Correctness: compare the user's rows against the model answer's rows.
  let correct = false;
  try {
    const ar = sqlDb.exec(t.answer);
    if(ar.length) correct = JSON.stringify(ar[0].values) === JSON.stringify(values);
  } catch(e){ /* answer should always parse; fall through to wrong path */ }

  const key = kind + taskIdx;
  if(correct){
    _labAttempts[key] = 0;
    results.innerHTML = `${tableHTML}
      <div style="margin-top:10px;display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap">
        <span style="color:var(--green);font-weight:700">✓ Correct — ${n} row${n!==1?'s':''}</span>
        <span style="color:var(--muted);font-size:12px">— ${t.note}</span>
      </div>`;
    if(typeof celebrate === 'function') celebrate();
    return;
  }

  // Wrong → escalate help by attempt number.
  const att = (_labAttempts[key] || 0) + 1;
  _labAttempts[key] = att;
  let help;
  if(att === 1){
    _labOpenHint(kind);
    help = `Not quite — your result doesn't match the target yet. <i data-lucide="lightbulb" style="width:14px;height:14px;vertical-align:-2px"></i> <strong>Hint opened below</strong> — adjust and Run again.`;
  } else if(att === 2){
    _labFillPartial(cfg.editor, t.answer, 0.5);
    help = `Still off — I filled in the <strong>first half</strong> of the query for you. Finish it and Run again.`;
  } else {
    const ed = document.getElementById(cfg.editor);
    if(ed){ ed.value = t.answer; ed.focus(); }
    help = `<strong>Full answer filled in</strong> — Run it to see the target result, then compare it line-by-line with the prompt.`;
  }
  results.innerHTML = `${tableHTML}
    <div style="margin-top:10px;display:flex;flex-direction:column;gap:6px">
      <span style="color:var(--muted)">${n} row${n!==1?'s':''} <span style="font-size:11px">(expected ~${t.expectedRows})</span></span>
      <span style="color:var(--text);font-size:12px;line-height:1.55;background:rgba(212,160,64,.12);border:1px solid rgba(212,160,64,.3);border-radius:6px;padding:8px 11px">${help}</span>
    </div>`;
}


function toggleJoinCompare(){
  _joinCompareOpen = !_joinCompareOpen;
  const body = document.getElementById('compare-body');
  const chev = document.getElementById('compare-chev');
  if(body) body.style.display = _joinCompareOpen ? 'block' : 'none';

function _joinResultTable(sql, accentColor){
  if(!sqlDb) return '<span style="color:var(--muted);font-size:12px">DB not ready</span>';
  try {
    const res = sqlDb.exec(sql);
    if(!res.length) return '<div style="font-size:12px;color:var(--muted);padding:8px">No rows returned</div>';
    const {columns, values} = res[0];
    const th = columns.map(c=>`<th style="text-align:left;padding:5px 10px;border-bottom:2px solid ${accentColor};color:${accentColor};white-space:nowrap;font-size:12px">${c}</th>`).join('');
    const tb = values.map(r=>`<tr>${r.map(v=>`<td style="padding:4px 10px;border-bottom:1px solid rgba(127,127,127,.15);font-size:12px;white-space:nowrap">${v==null?'<em style="color:var(--red);font-style:italic">NULL</em>':v}</td>`).join('')}</tr>`).join('');
    return `<div style="overflow-x:auto"><table style="border-collapse:collapse;width:100%"><thead><tr>${th}</tr></thead><tbody>${tb}</tbody></table></div>
      <div style="margin-top:6px;font-size:11px;font-weight:700;color:${accentColor}">${values.length} row${values.length!==1?'s':''}</div>`;
  } catch(e){ return `<span style="color:var(--red);font-size:12px">Error: ${e.message}</span>`; }
}

function renderJoinCompare(){
  const content = document.getElementById('compare-content');
  if(!content || !sqlDb) return;
  const SQ_INNER = "SELECT c.name, o.order_id, o.amount FROM customers c INNER JOIN orders o ON c.id = o.customer_id";
  const SQ_LEFT  = "SELECT c.name, o.order_id, o.amount FROM customers c LEFT JOIN orders o ON c.id = o.customer_id";
  const col = (label, color, code, tableHTML, note) => `
    <div style="min-width:260px;flex:1">
      <div style="font-size:12px;font-weight:700;color:${color};text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">${label}</div>
      <div style="font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--surf2);border-radius:6px;padding:8px 10px;margin-bottom:10px;white-space:pre-wrap;line-height:1.5">${code}</div>
      ${tableHTML}
      <div style="margin-top:8px;font-size:12px;color:var(--muted);background:${color === 'var(--green)' ? 'rgba(57,185,80,.08)' : 'rgba(47,109,240,.08)'};border-radius:6px;padding:8px 10px;line-height:1.5">${note}</div>
    </div>`;
  content.innerHTML = `
    <p class="text-muted text-sm" style="margin-bottom:14px">Same two tables, same ON clause — only the JOIN keyword changes. Count the rows.</p>
    <div style="display:flex;gap:16px;flex-wrap:wrap">
      ${col('INNER JOIN','var(--green)',
        'SELECT c.name, o.order_id, o.amount\nFROM customers c\nINNER JOIN orders o\n  ON c.id = o.customer_id',
        _joinResultTable(SQ_INNER,'var(--green)'),
        'Only customers who have orders. Unmatched customers are <strong>dropped</strong>.')}
      ${col('LEFT JOIN','var(--accent)',
        'SELECT c.name, o.order_id, o.amount\nFROM customers c\nLEFT JOIN orders o\n  ON c.id = o.customer_id',
        _joinResultTable(SQ_LEFT,'var(--accent)'),
        'Every customer kept. Unmatched ones show <em style="color:var(--red)">NULL</em> — that\'s 4 extra rows vs INNER.')}
    </div>
    <div style="margin-top:16px;padding:12px 16px;background:var(--surf2);border-radius:8px;font-size:13px;color:var(--muted);line-height:1.65">
      <i data-lucide="lightbulb" style="width:14px;height:14px;vertical-align:-2px;color:var(--accent)"></i> <strong style="color:var(--text)">What changed:</strong> INNER returned 5 rows — only the orders that matched a customer. LEFT returned 9 rows — all 8 customers, but Alice's 2 orders made her appear twice. The 4 rows with <em style="color:var(--red)">NULL</em> are Bob, Eva, Frank, and Henry — customers who exist but placed no orders. Those rows are what INNER silently dropped.
    </div>`;
}
