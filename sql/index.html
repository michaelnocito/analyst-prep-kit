   quiz:{q:"COALESCE(region, 'Unassigned') returns what when region is NULL?", opts:["NULL, returned unchanged","'Unassigned' — first non-NULL value","It raises a runtime error","An empty string is returned instead"], ans:1, exp:"COALESCE returns its first non-NULL argument. When region is NULL it falls through to 'Unassigned', giving a NOT NULL target column a valid value instead of rejecting the row."}
  },
  {id:507, unit:"Unit 4: Data Migration", title:"Validation: Row Counts & Control Totals", sub:"COUNT(*) and SUM(col), source vs target.",
   story:"The data is loaded into the target. Now you prove it migrated correctly. The two baseline checks every migration sign-off requires: did every row arrive (row count), and did the values inside survive intact (control total)? You run identical aggregates on both sides and compare.",
   ral:{sql:"-- source\nSELECT COUNT(*) AS rows, SUM(amount) AS total FROM legacy_orders;\n-- target\nSELECT COUNT(*) AS rows, SUM(amount) AS total FROM orders;", say:"Count rows and sum the amount on both source and target — the two numbers must match after the migration.",
     lines:[["COUNT(*) source vs target","the row-count check: did every record arrive?"],["SUM(amount) source vs target","the control total: did the values arrive intact?"],["run identical aggregates on both","so the comparison is apples to apples"],["count matches but sum differs","rows arrived but values were truncated or converted wrong"]]},
   notes:"Row count answers 'did all records migrate?'; the control total (SUM of a key money or quantity column) answers 'did the data inside them survive?'. Pro tip: these two matching numbers are the baseline sign-off every reconciliation starts with.",
   viz:{columns:["check","source","target","match?"], rows:[["COUNT(*)","18,402","18,402","yes"],["SUM(amount)","$1,240,118","$1,240,118","yes"]], caption:"Identical counts and identical control totals on both sides = the migration reconciles. If the count matched but the sum did not, you would know rows arrived but values were corrupted."},
   quiz:{q:"Row counts match between source and target, but SUM(amount) is lower in the target. Most likely cause?", opts:["Some rows were silently dropped in transit","Values mis-cast on load — decimals lost","The query itself is written wrong","Sums never match; that's expected"], ans:1, exp:"A matching row count means every record arrived; a lower SUM means the values inside some rows changed — classic truncation or a bad type conversion (e.g. dropping cents). The control total caught a corruption the row count could not."}
  },
  {id:508, unit:"Unit 4: Data Migration", title:"Reconciliation: What Didn’t Make It", sub:"EXCEPT / MINUS and the LEFT JOIN orphan check.",
   story:"Your control total is off by a few rows. Now you find exactly which records didn't make it — and confirm nothing is orphaned. EXCEPT lists source rows missing from the target; a LEFT JOIN with a NULL check finds child rows whose parent never came across (broken referential integrity).",
   ral:{sql:"-- rows in source missing from target\nSELECT id FROM legacy_orders\nEXCEPT\nSELECT id FROM orders;\n\n-- orphans: orders with no matching customer\nSELECT o.id\nFROM orders o\nLEFT JOIN customers c ON o.customer_id = c.id\nWHERE c.id IS NULL;", say:"List the source IDs that aren't in the target, then list any orders whose customer is missing from the customers table.",
     lines:[["EXCEPT","return rows from the first query that are not in the second (MINUS in Oracle)"],["source EXCEPT target","pinpoints exactly which records failed to migrate"],["LEFT JOIN customers … WHERE c.id IS NULL","the no-match pattern: orders with no parent customer"],["orphans","child rows pointing at a parent that did not come across — broken integrity"]]},
   notes:"EXCEPT/MINUS pinpoints dropped records; the LEFT JOIN … WHERE parent IS NULL pattern finds orphans that violate referential integrity. Pro tip: the full reconciliation sequence is — tie out counts and control totals, then use EXCEPT to find missing rows and a left-join null-check to confirm no orphaned foreign keys.",
   viz:{columns:["check","result","meaning"], rows:[["source EXCEPT target","id 4471, 4489","2 orders never migrated"],["orphan order ids","id 5012","order points at a missing customer"]], caption:"EXCEPT surfaces the two dropped order ids; the left-join null-check surfaces one order whose customer_id has no matching parent. Both must be resolved before sign-off."},
   quiz:{q:"A LEFT JOIN from orders to customers with WHERE c.id IS NULL returns rows. What did you find?", opts:["Customers who placed no orders at all","Orphaned orders — no parent customer","Orders that were entered in twice","Nothing especially useful here"], ans:1, exp:"A LEFT JOIN keeps all orders; WHERE c.id IS NULL keeps only those with no matching customer. Those are orphans — order rows whose foreign key points at a customer that did not migrate, violating referential integrity."}
  },
  {id:601, unit:"Unit 5: From Question to Metric", title:"Define the Metric Before You Compute It", sub:"A number means nothing without its grain, filter, and time window.",
   story:"A stakeholder asks for \"our revenue this quarter.\" Before you touch SQL, the real work is pinning the definition: revenue from what — every order, or only paid ones? Per what — the whole company, or one region? When — order date or ship date, and which quarter exactly? A metric is a measure plus a grain plus a filter plus a time window. Nail those four and the query writes itself; skip them and you will hand back a confident, wrong number.",
   ral:{sql:"SELECT SUM(amount) AS q3_paid_revenue\nFROM orders\nWHERE status = 'paid'\n  AND order_date >= '2024-07-01'\n  AND order_date <  '2024-10-01';", say:"Sum the order amount, but only paid orders, only in the third quarter — defined by order date, with a half-open date range so nothing is double-counted at the boundary.",
     lines:[["SUM(amount)","the measure — what number are we actually producing"],["WHERE status = 'paid'","the filter — which rows count toward it (paid, not every order)"],["order_date >= '2024-07-01' AND < '2024-10-01'","the time window — half-open so Sept 30 is in and Oct 1 is out, no overlap"],["(no GROUP BY)","the grain — one number for the whole company; add GROUP BY region to change it"]]},
   notes:"The single most valuable analyst habit: restate a vague request as measure + grain + filter + window before writing SQL. Pro tip in an interview — when asked for \"revenue,\" ask back \"paid or booked? by when — order or ship date? at what grain?\" That one question signals you think in definitions, not just syntax. Use half-open date ranges (>= start AND < next-start) instead of BETWEEN to avoid the classic last-day, timestamp-boundary double-count.",
   viz:{columns:["definition part","this metric","the SQL that encodes it"], rows:[["Measure","revenue (dollars)","SUM(amount)"],["Filter","paid orders only","WHERE status = 'paid'"],["Time window","Q3 2024, by order date","order_date >= '07-01' AND < '10-01'"],["Grain","whole company","no GROUP BY"]]},
   quiz:{q:"Why use order_date >= '2024-07-01' AND order_date < '2024-10-01' instead of BETWEEN those two dates?", opts:["BETWEEN is slower on every modern database engine","Half-open ranges avoid a boundary double-count","BETWEEN cannot be used with date columns","There is no real difference between them"], ans:1, exp:"BETWEEN is inclusive on both ends, so a row timestamped exactly at the upper bound — or any time on that last day — can fall into two adjacent periods. A half-open range (>= start, < next start) puts every row in exactly one window, which is what makes period totals reconcile."}
  },
  {id:602, unit:"Unit 5: From Question to Metric", title:"Segment Customers with CASE", sub:"Bucket rows into named groups, then aggregate per group.",
   story:"\"How many customers are high, medium, and low value?\" There is no value_tier column — you have to derive it. CASE turns a continuous number (lifetime spend) into named buckets, and grouping by that expression counts each bucket. This is segmentation, the move behind every \"customers by tier,\" \"orders by size band,\" or \"users by tenure\" breakdown a business asks for.",
   ral:{sql:"SELECT\n  CASE\n    WHEN lifetime_spend >= 1000 THEN 'High'\n    WHEN lifetime_spend >= 250  THEN 'Medium'\n    ELSE 'Low'\n  END AS tier,\n  COUNT(*)        AS customers,\n  SUM(lifetime_spend) AS revenue\nFROM customers\nGROUP BY 1\nORDER BY revenue DESC;", say:"Label each customer High, Medium, or Low by their lifetime spend, then count the customers and total the revenue inside each label.",
     lines:[["CASE WHEN … THEN … END AS tier","derive a named bucket from a number — the segmentation rule"],["WHEN >= 1000 … WHEN >= 250 … ELSE","ordered top-down; the first matching branch wins, so bands can't overlap"],["GROUP BY 1","group by that first expression (the tier) — one row out per bucket"],["COUNT(*), SUM(lifetime_spend)","the per-segment measures: how many, and how much"]]},
   notes:"CASE branches are evaluated in order and short-circuit, so list them high-threshold first — flip the order and everyone falls into the first loose band. GROUP BY 1 references the first SELECT expression, which keeps you from repeating the whole CASE. Interview-ready framing: segmentation is \"derive a dimension that doesn't exist in the table, then aggregate by it\" — the same pattern whether the buckets are spend tiers, age bands, or RFM scores.",
   viz:{columns:["Category","Customers by value tier"], rows:[["High","420"],["Medium","1,180"],["Low","2,640"]], caption:"Customers by value tier"},
   quiz:{q:"The CASE lists WHEN lifetime_spend >= 250 before WHEN lifetime_spend >= 1000. What happens?", opts:["The query errors on overlapping conditions","Everyone over 250 is labeled 'Medium'","High and Medium counts simply swap","Nothing changes — order is ignored"], ans:1, exp:"CASE returns the first branch that matches, top to bottom. A customer with 5,000 spend hits the >= 250 branch first and is tagged 'Medium' — the 'High' branch below never runs. Always order CASE thresholds from most to least restrictive."}
  },
  {id:603, unit:"Unit 5: From Question to Metric", title:"Month-over-Month Growth with LAG", sub:"Compare each period to the one before it, in one pass.",
   story:"\"Are we growing?\" needs each month set next to the month before it. The clumsy way is a self-join; the analyst way is LAG — a window function that reaches back a row to pull the previous month's value into the current row. With the prior value in hand, the growth rate is just arithmetic. Period-over-period is the most-asked metric in any business review, and LAG is how you produce it.",
   ral:{sql:"SELECT\n  month,\n  revenue,\n  LAG(revenue) OVER (ORDER BY month) AS prev,\n  ROUND(100.0 * (revenue - LAG(revenue) OVER (ORDER BY month))\n        / LAG(revenue) OVER (ORDER BY month), 1) AS mom_pct\nFROM monthly_revenue\nORDER BY month;", say:"For each month, look back one row to grab the previous month's revenue, then express the change as a percentage of that previous month.",
     lines:[["LAG(revenue) OVER (ORDER BY month)","pull the value from the previous row, in month order — no self-join"],["revenue - prev","the absolute change month over month"],["100.0 * change / prev","express it as a percent of the prior month; 100.0 forces decimal division"],["first row's prev is NULL","there's nothing before month one, so its growth is undefined"]]},
   notes:"LAG(col) OVER (ORDER BY ...) is the period-over-period workhorse; LEAD looks forward. Two interview traps: the earliest period has a NULL prior (guard it or expect a blank), and integer division silently floors — write 100.0 (not 100) so the percentage isn't truncated to zero. Same pattern gives you year-over-year by ordering on year, or week-over-week by ordering on week.",
   viz:{columns:["Period","Revenue ($K)"], rows:[["Jan",180],["Feb",196],["Mar",188],["Apr",214],["May",247],["Jun",268]], caption:"Monthly revenue"},
   quiz:{q:"A month-over-month percent built with 100 * (rev - prev) / prev returns 0 for clearly growing months. The fix?", opts:["Add a WHERE clause to drop the very first month","Use 100.0 so the division is decimal","Replace LAG with a slow correlated subquery","Sort the months in descending order"], ans:1, exp:"When every operand is an integer, SQL does integer division and truncates the fraction toward zero — a real 8% growth becomes 0. Forcing one operand to a decimal (100.0) makes the whole expression floating-point, so the percentage survives."}
  },
  {id:604, unit:"Unit 5: From Question to Metric", title:"Running Totals with a Window Frame", sub:"Accumulate a measure across ordered rows — cumulative, MTD, YTD.",
   story:"A revenue chart shows each month in isolation; the business wants the line that climbs — total raised so far, cumulative through today. SUM() as a window function with an ORDER BY adds up every row from the start through the current one, giving a running total without collapsing the rows. It is how you build cumulative revenue, year-to-date, and \"progress toward goal\" lines.",
   ral:{sql:"SELECT\n  month,\n  revenue,\n  SUM(revenue) OVER (\n    ORDER BY month\n    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW\n  ) AS running_total\nFROM monthly_revenue\nORDER BY month;", say:"Keep each month's own revenue, and beside it carry a sum of every month from the first one through this one — the cumulative total to date.",
     lines:[["SUM(revenue) OVER (ORDER BY month …)","a windowed sum — aggregates without collapsing rows the way GROUP BY would"],["ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW","the frame: everything from the start up to and including this row"],["row stays, total accumulates","you still get one line per month, now with a climbing total"],["partition for per-group resets","add PARTITION BY year to restart the running total each year (YTD)"]]},
   notes:"A window aggregate keeps the detail rows and adds a calculated column — that's the difference from GROUP BY, which collapses them. The frame clause (ROWS BETWEEN …) is what makes it a running total rather than a grand total on every row; the explicit UNBOUNDED PRECEDING → CURRENT ROW also dodges a subtle default-frame gotcha when there are duplicate sort keys. Add PARTITION BY year to get year-to-date that resets each January — the standard \"progress against an annual goal\" line.",
   viz:{columns:["Period","Running total ($K)"], rows:[["Jan",180],["Feb",376],["Mar",564],["Apr",778],["May",1025],["Jun",1293]], caption:"Cumulative revenue to date"},
   quiz:{q:"How does SUM(revenue) OVER (ORDER BY month) differ from SUM(revenue) with GROUP BY month?", opts:["It keeps every row and adds a running total","It is just a slower way to write the same thing","It returns only the single grand total","It requires a primary key to work"], ans:0, exp:"GROUP BY collapses the rows into one total per month. The window version leaves all the detail rows in place and attaches an accumulating sum alongside each — which is exactly what a cumulative or year-to-date line needs."}
  },
  {id:605, unit:"Unit 5: From Question to Metric", title:"Funnel Conversion with Conditional Counts", sub:"Count distinct users at each step, then divide to get rates.",
   story:"Product asks: \"Of everyone who visited, how many signed up, activated, and paid?\" That is a funnel — counts that shrink at each stage, and the rates between them. You count distinct users who reached each step using conditional aggregation (COUNT of a CASE), all in one scan of an events table, then the conversion rate is one step over the previous. This single query answers most \"where are we losing people?\" questions.",
   ral:{sql:"SELECT\n  COUNT(DISTINCT user_id) AS visited,\n  COUNT(DISTINCT CASE WHEN step IN ('signup','activate','pay')\n        THEN user_id END) AS signed_up,\n  COUNT(DISTINCT CASE WHEN step IN ('activate','pay')\n        THEN user_id END) AS activated,\n  COUNT(DISTINCT CASE WHEN step = 'pay'\n        THEN user_id END) AS paid\nFROM events;", say:"In one pass over the events, count the distinct users who reached each stage — everyone who visited, then those who signed up or deeper, then activated or deeper, then paid.",
     lines:[["COUNT(DISTINCT user_id)","the top of the funnel — every unique visitor"],["COUNT(DISTINCT CASE WHEN … THEN user_id END)","count a user only if they reached this step or beyond — conditional aggregation"],["step IN ('activate','pay')","\"this stage or deeper\" so the funnel is monotonic — each level ⊆ the one above"],["rate = step / previous step","divide adjacent counts for the conversion between stages"]]},
   notes:"Conditional aggregation — COUNT/SUM wrapped around a CASE — pivots an event log into stage columns in a single scan, far cheaper than four separate queries joined together. The key correctness rule: each stage's condition must include all deeper stages ('activate' OR 'pay'), or a user who skipped straight to paying drops out of the middle and your funnel stops being monotonic. Conversion rate is just adjacent columns divided; the biggest drop-off is where you focus.",
   viz:{columns:["Category","Signup funnel (distinct users)"], rows:[["Visited","12,000"],["Signed up","4,200 · 35%"],["Activated","2,100 · 50%"],["Paid","760 · 36%"]], caption:"Signup funnel (distinct users)"},
   quiz:{q:"Why does the 'activated' count use step IN ('activate','pay') rather than step = 'activate'?", opts:["To make the query run faster","So users who paid still count as activated","Because = cannot be used on text-type columns","It is only a stylistic preference"], ans:1, exp:"A funnel must be monotonic: anyone who paid necessarily passed activation, even if no explicit 'activate' event was logged. Counting only step = 'activate' would exclude paying users from the activated stage, making a later stage look larger than an earlier one — a broken funnel."}
  },
  {id:606, unit:"Unit 5: From Question to Metric", title:"Cohort Retention", sub:"Group users by when they joined, then track who comes back.",
   story:"Growth can hide churn: you add users every month while older ones quietly leave. Cohort analysis catches it. You stamp each user with their signup month (their cohort), then measure how many are still active 1, 2, 3 months later. Reading down a column tells you whether retention is improving for newer cohorts — the question every subscription and product business lives or dies on. This is the capstone: a derived dimension, a time offset, and a rate, together.",
   ral:{sql:"SELECT\n  cohort_month,\n  months_since_signup,\n  COUNT(DISTINCT user_id) AS active,\n  ROUND(100.0 * COUNT(DISTINCT user_id)\n        / FIRST_VALUE(COUNT(DISTINCT user_id))\n          OVER (PARTITION BY cohort_month\n                ORDER BY months_since_signup), 1) AS retention_pct\nFROM cohort_activity\nGROUP BY cohort_month, months_since_signup\nORDER BY cohort_month, months_since_signup;", say:"For each signup cohort and each month after they joined, count who is still active, and divide by that cohort's starting size to get the percent retained.",
     lines:[["cohort_month","the derived dimension: the month a user first signed up — their cohort"],["months_since_signup","the time offset: 0 at join, 1 a month later, and so on"],["COUNT(DISTINCT user_id)","how many of that cohort were active in that offset month"],["÷ FIRST_VALUE(… month 0)","divide by the cohort's size at month 0 to turn counts into a retention rate"]]},
   notes:"Cohorting is segmentation by start date plus a time offset — the same \"derive a dimension, then aggregate\" muscle from the CASE lesson, now across time. Always normalize to each cohort's own month-0 size, or a big cohort and a small one aren't comparable. Read a retention table two ways: across a row to see one cohort decay, and down a column (same months-since) to see whether newer cohorts retain better than older ones — that diagonal-vs-vertical read is the insight interviewers look for.",
   viz:{columns:["cohort","month 0","month 1","month 2","month 3"], rows:[["Jan","100%","62%","48%","41%"],["Feb","100%","66%","53%","47%"],["Mar","100%","71%","59%","—"],["Apr","100%","74%","—","—"]]},
   quiz:{q:"In a retention table, newer cohorts (Mar, Apr) show higher month-1 retention than older ones (Jan). What does that suggest?", opts:["Nothing — cohorts are never comparable","Retention is improving for newer users","The older cohorts must be miscounted","Total user count is going down"], ans:1, exp:"Reading down the month-1 column holds the time-since-signup constant, so the cohorts are directly comparable. Rising values for later signup months mean each new cohort is sticking around better than the last — onboarding or product changes are working."}
  },
  {id:701, unit:"Unit 6: Financial Analysis", title:"Build the P&L from the Ledger", sub:"Pivot a general ledger into an income statement with conditional sums.",
   story:"Finance hands you a ledger: thousands of rows, each tagged with a statement line — Revenue, COGS, Operating Expense. They want an income statement: revenue at the top, cost of goods subtracted to gross profit, operating expense subtracted to operating income. You don't loop or run a query per line — one pass with conditional aggregation pivots the long ledger into the cascade. This is the move behind every P&L an analyst ever assembles from raw transactions.",
   ral:{sql:"SELECT\n  SUM(CASE WHEN line = 'Revenue' THEN amount ELSE 0 END) AS revenue,\n  SUM(CASE WHEN line = 'COGS'    THEN amount ELSE 0 END) AS cogs,\n  SUM(CASE WHEN line = 'Revenue' THEN amount\n           WHEN line = 'COGS'    THEN -amount\n           ELSE 0 END)                                  AS gross_profit\nFROM ledger\nWHERE fiscal_year = 2024;", say:"Total each account group into its own statement line in one pass, signing costs negative, so revenue, cost of goods, and gross profit come out side by side.",
     lines:[["SUM(CASE WHEN line = 'Revenue' THEN amount ELSE 0 END)","conditional aggregation — count a row toward this line only if it belongs to it"],["WHEN 'COGS' THEN -amount","sign the cost negative so the same SUM nets to gross profit (revenue − COGS)"],["ELSE 0","never leave it NULL — a single NULL would make the whole SUM return NULL"],["one scan, many lines","the P&L is just the ledger pivoted by account — not one query per line"]]},
   notes:"An income statement is a cascade: revenue − COGS = gross profit, − operating expense = operating income, − interest & tax = net income. Each subtotal isolates a different question — gross profit is production and pricing efficiency, operating income is the core business before financing. Interview-ready framing: 'a P&L is the ledger pivoted by statement line and cascaded into subtotals.' The conditional-sum pattern (SUM around a CASE) is the same one that builds a funnel or any pivot — learn it once, reuse it everywhere.",
   viz:{columns:["Step","Amount"], rows:[["Revenue","$4.0M"],["COGS","−1.6"],["Gross profit","$2.4M"],["Opex","−1.5"],["Operating income","$0.9M"]], caption:"The grey anchors are subtotals; the red bars are costs subtracting from the line above. The ledger's thousands of rows collapse into this five-step cascade with one conditional-sum query."},
   quiz:{q:"Why does the gross-profit expression use THEN -amount for COGS rows instead of a second SUM?", opts:["COGS rows are stored as negative numbers already","So one SUM nets revenue minus cost directly","SUM cannot add a column to itself twice","CASE is required before any aggregate function"], ans:1, exp:"Gross profit is revenue minus COGS. Signing the cost rows negative inside one CASE lets a single SUM net them together in the same pass, instead of computing two totals and subtracting them afterward. Same scan, fewer moving parts."}
  },
  {id:702, unit:"Unit 6: Financial Analysis", title:"Margins: Gross, Operating, Net", sub:"Normalize each profit line to revenue so you can compare across size and time.",
   story:"Two companies both book $4M in revenue. One keeps 22¢ of every dollar; the other keeps 6¢. Raw profit dollars hide that — a margin doesn't. A margin is a profit line divided by revenue, expressed as a percent, and it's how analysts compare a business to its past, its plan, and its peers regardless of size. The three that matter most strip out more cost at each step.",
   ral:{sql:"SELECT\n  ROUND(100.0 * gross_profit     / revenue, 1) AS gross_margin_pct,\n  ROUND(100.0 * operating_income / revenue, 1) AS operating_margin_pct,\n  ROUND(100.0 * net_income       / revenue, 1) AS net_margin_pct\nFROM income_statement\nWHERE fiscal_year = 2024;", say:"Divide each profit line by revenue to get the cents of profit kept per sales dollar — gross at the top, then operating, then net after everything.",
     lines:[["gross_profit / revenue","gross margin — efficiency of making the product (price vs cost of goods)"],["operating_income / revenue","operating margin — profitability of running the core business, before financing & tax"],["net_income / revenue","net margin — what's left after every cost, including interest and tax"],["100.0 * …","force decimal division — plain 100 would integer-truncate the percent to 0"]]},
   notes:"Each margin removes one more layer of cost, so they always step down: gross ≥ operating ≥ net. Gross margin moves on pricing and input costs; operating margin moves on overhead and efficiency; net margin moves on debt load and tax. A margin alone says nothing — read it against last year, against the budget, and against the industry (a grocer lives on 2% net, software on 25%). The integer-division trap (use 100.0) bites here exactly as it does in growth math.",
   viz:{columns:["Category","2024 margins (% of revenue)"], rows:[["Gross","60%"],["Operating","22%"],["Net","14%"]], caption:"2024 margins (% of revenue)"},
   quiz:{q:"A company's gross margin is healthy but its net margin is near zero. Where is the profit going?", opts:["Into the cost of producing each unit sold","To overhead, interest, and tax below the line","Nowhere — the two margins must always match","Into revenue that has not yet been collected"], ans:1, exp:"A healthy gross margin means the product itself is profitable. If net margin collapses anyway, the money is being eaten between gross profit and the bottom line — operating overhead, interest on debt, and taxes. The margin cascade points you straight at which layer to investigate."}
  },
  {id:703, unit:"Unit 6: Financial Analysis", title:"Liquidity & Leverage Ratios", sub:"The balance-sheet checks: can you pay the bills, and how much is borrowed?",
   story:"The income statement says whether you're profitable; the balance sheet says whether you'll survive the quarter. Two questions decide it. Liquidity: can you cover what's due soon with what you can turn to cash soon? Leverage: how much of the company is financed by debt versus owned outright? Three ratios answer both, and every credit analyst and CFO reads them first.",
   ral:{sql:"SELECT\n  ROUND(current_assets / current_liabilities, 2)                AS current_ratio,\n  ROUND((current_assets - inventory) / current_liabilities, 2)  AS quick_ratio,\n  ROUND(total_debt / total_equity, 2)                           AS debt_to_equity\nFROM balance_sheet\nWHERE as_of = '2024-12-31';", say:"Compare what you own to what you owe — current assets over current liabilities for liquidity, the same without inventory for the stricter test, and debt over equity for leverage.",
     lines:[["current_assets / current_liabilities","current ratio — above 1.0 means short-term assets cover short-term bills"],["(current_assets − inventory) / current_liabilities","quick ratio — drops inventory, the slowest current asset to turn to cash"],["total_debt / total_equity","debt-to-equity — how many dollars are borrowed for each dollar owned"],["ROUND(…, 2)","ratios are read to two decimals — 1.8, not 1.83274"]]},
   notes:"A ratio means nothing without a benchmark. A current ratio near 1.5–3 is comfortable for most industries; far above that can mean idle cash earning nothing. The quick ratio is the stress test — if inventory is hard to sell, can you still pay? Debt-to-equity above roughly 2 signals heavy financing risk for most non-financial firms, though capital-intensive industries run higher. Always compare to the same company over time and to peers in the same sector.",
   viz:{columns:["ratio","value","healthy range","read"], rows:[["Current ratio","1.80","1.5 – 3.0","Comfortable"],["Quick ratio","1.10","≥ 1.0","Covers bills without inventory"],["Debt-to-equity","0.70","< 2.0","Modestly leveraged"]], caption:"Each ratio is read against a benchmark, not in isolation. The quick ratio strips inventory out of the current ratio to ask the harder question: could you pay if nothing on the shelf sold?"},
   quiz:{q:"Why does the quick ratio subtract inventory from current assets?", opts:["Inventory is recorded on a separate statement","Inventory is the slowest asset to turn to cash","Inventory always loses value over a quarter","Including it would double-count current assets"], ans:1, exp:"The quick ratio is the stricter liquidity test. Inventory can take weeks or months to sell and collect on, so removing it asks whether the company could meet its short-term obligations from cash and receivables alone — the assets it could realize quickly."}
  },
  {id:704, unit:"Unit 6: Financial Analysis", title:"Time Value of Money: NPV", sub:"Discount a stream of future cash flows back to today's dollars.",
   story:"A project costs $500K up front and returns cash over five years. Should you fund it? You can't just add the inflows — a dollar arriving in year 5 is worth less than a dollar today, because today's dollar could be invested. Net present value discounts every future cash flow back to the present with a rate that reflects your required return, then sums the stream. Positive NPV means the project beats the hurdle; negative means it destroys value.",
   ral:{sql:"SELECT\n  ROUND(SUM(cash_flow / POWER(1 + 0.10, year)), 0) AS npv\nFROM project_cash_flows\nWHERE project = 'Line Expansion';\n-- year 0 = -500000 (upfront), years 1..5 = inflows; rate = 10%", say:"Divide each year's cash flow by one-plus-the-rate raised to that year, then add the discounted stream — the result is the project's value in today's dollars.",
     lines:[["POWER(1 + 0.10, year)","the discount factor — grows with the year, shrinking far-off cash flows more"],["cash_flow / factor","each year's cash flow restated in today's dollars (its present value)"],["year 0 ÷ POWER(…,0) = ÷1","the upfront cost isn't discounted — it's already in today's dollars"],["SUM(…) > 0","positive net present value means the stream clears the required return"]]},
   notes:"The discount rate is your required return — the cost of capital or the return you'd get on a comparable investment. A higher rate punishes distant cash flows harder, so risky long-dated projects need bigger payoffs to clear. The decision rule is simple: NPV > 0, accept. IRR is the cousin metric — the rate that makes NPV exactly zero — but it needs iteration to solve, which SQL doesn't do cleanly, so NPV at a chosen hurdle is the SQL-native call. Always state the rate you used; the same cash flows flip from accept to reject as it changes.",
   viz:{columns:["year","cash flow","factor (10%)","present value"], rows:[["0","−500,000","1.00","−500,000"],["1","150,000","1.10","136,364"],["2","160,000","1.21","132,231"],["3","170,000","1.33","127,724"],["4","180,000","1.46","122,940"],["5","190,000","1.61","117,971"]], caption:"Each inflow is divided by its discount factor to land in today's dollars. Summing the present-value column gives NPV ≈ +$137,230 — positive, so the project clears the 10% hurdle."},
   quiz:{q:"A project's NPV at a 10% discount rate is +$137,000. What does that tell you?", opts:["The project returns exactly 10% per year","It earns more than the 10% required return","It will pay back the cost within ten years","Its cash flows are larger every single year"], ans:1, exp:"A positive NPV at a given discount rate means the project's discounted cash flows more than cover the upfront cost at that required return — it creates value above the 10% hurdle. The rate at which NPV would hit exactly zero is the IRR, which here is above 10%."}
  },
  {id:705, unit:"Unit 6: Financial Analysis", title:"Budget vs Actual: Variance Analysis", sub:"The FP&A heartbeat — and the favorable/unfavorable sign trap.",
   story:"Every month, FP&A puts plan next to reality: what we budgeted versus what actually happened. The gap is the variance, and the whole conversation hangs on whether it's favorable or unfavorable. Here's the trap that catches juniors: the sign flips by line type. Beating the plan on revenue is good; beating it on cost is bad. A raw dollar variance without that judgment is only half an answer.",
   ral:{sql:"SELECT\n  a.line,\n  b.budget,\n  a.actual,\n  a.actual - b.budget                                AS variance,\n  ROUND(100.0 * (a.actual - b.budget) / b.budget, 1) AS variance_pct,\n  CASE\n    WHEN a.line_type = 'revenue' AND a.actual >= b.budget THEN 'Favorable'\n    WHEN a.line_type = 'cost'    AND a.actual <= b.budget THEN 'Favorable'\n    ELSE 'Unfavorable'\n  END AS verdict\nFROM actuals a\nJOIN budget b ON a.line = b.line\nWHERE a.period = '2024-Q4';", say:"Join each actual to its budget, take the difference for the variance, scale it to a percent, then label it favorable or unfavorable depending on whether the line is revenue or cost.",
     lines:[["a.actual − b.budget","the dollar variance — what reality did versus the plan"],["100.0 * variance / b.budget","percent variance — scales it so a $10K miss on $1M reads differently than on $20K"],["CASE … line_type = 'revenue' … 'cost' …","the verdict flips by line: revenue over plan is good, cost over plan is bad"],["JOIN budget ON line","line up each actual with its matching budgeted line before comparing"]]},
   notes:"A dollar variance with no favorable/unfavorable label is ambiguous — overspending and overearning are both 'positive' numbers, and only the line type tells them apart. Encode that judgment in the query so the report can't be misread. Then triage by materiality: chase variances that are big in both dollars and percent, not every small wiggle. This exact CASE-by-line-type is what an FP&A interviewer is listening for when they ask you to 'walk me through a variance report.'",
   viz:{columns:["line","budget","actual","variance","verdict"], rows:[["Revenue","1,000,000","1,080,000","+80,000","Favorable"],["COGS","400,000","445,000","+45,000","Unfavorable"],["Marketing","120,000","104,000","−16,000","Favorable"],["Headcount","260,000","290,000","+30,000","Unfavorable"]], caption:"Notice rows 1 and 2 both show a positive variance, yet one is favorable and one is not — revenue over plan is good, cost over plan is bad. The verdict column is the analyst's value-add over a raw subtraction."},
   quiz:{q:"Marketing spend came in $16K under budget. Why is that variance labeled favorable?", opts:["Any negative variance is always favorable","Spending under plan on a cost line saves money","Marketing is treated as a revenue line here","The percent variance happened to be small"], ans:1, exp:"On a cost line, coming in under budget means you spent less than planned, which is favorable. The sign of the dollar variance alone can't tell you that — the line type does. A negative variance is favorable for costs but unfavorable for revenue."}
  },
  {id:706, unit:"Unit 6: Financial Analysis", title:"Unit Economics: Contribution Margin & Break-Even", sub:"Does each sale make money, and how many sales cover the fixed base?",
   story:"Before the P&L nets out, ask the per-unit question: does one more sale make money after the costs that scale with it? Contribution margin is price minus variable cost — what each unit contributes toward fixed costs and profit. Divide the fixed costs by it and you get break-even: the volume where the business stops losing money. This is the model behind pricing, discount floors, and 'can we afford this promo?'",
   ral:{sql:"SELECT\n  price,\n  variable_cost,\n  price - variable_cost                             AS cm_per_unit,\n  ROUND(100.0 * (price - variable_cost) / price, 1) AS cm_ratio_pct,\n  CEIL(fixed_costs / (price - variable_cost))       AS breakeven_units\nFROM product_economics\nWHERE product = 'Pro Grinder';", say:"Subtract variable cost from price to get each unit's contribution, express it as a share of price, then divide the fixed costs by it to find how many units cover the fixed base.",
     lines:[["price − variable_cost","contribution margin per unit — what one sale adds toward fixed costs and profit"],["100.0 * cm / price","contribution-margin ratio — the contribution as a percent of price"],["fixed_costs / cm_per_unit","break-even units — how many sales it takes just to cover the fixed base"],["CEIL(…)","round up — you can't break even on a fraction of a unit"]]},
   notes:"The crucial split is fixed versus variable: only variable costs subtract in contribution margin, because only they scale with each unit. Fixed costs sit in the break-even denominator instead. Past break-even, every additional unit drops its full contribution margin straight to profit — that's operating leverage, and it's why high-fixed-cost businesses are scary below break-even and lucrative above it. Interview-ready: contribution margin answers 'should we take this order at this price?' — if price beats variable cost, the order still contributes.",
   viz:{columns:["Period","Revenue ($K)","Total cost ($K)"], rows:[["0",0,60],["200",40,84],["400",80,108],["600",120,132],["800",160,156],["1,000",200,180]], caption:"Break-even: total cost vs revenue"},
   quiz:{q:"Fixed costs are $60K and each unit contributes $150. What is break-even in units?", opts:["About 9,000 units, fixed times contribution","400 units — fixed costs over contribution","It cannot be found without the sale price","$60,000, the same as the fixed-cost base"], ans:1, exp:"Break-even units = fixed costs ÷ contribution margin per unit = 60,000 ÷ 150 = 400. Each unit throws off $150 toward the fixed base, so it takes 400 of them to cover $60,000; the 401st unit is the first to add profit."}
  },
  {id:801, unit:"Unit 7: Advanced Analyst Toolkit", title:"Profile the Data First", sub:"Before you trust a table, measure its shape and health in one pass.",
   story:"You're handed a table you've never seen and asked for a number by end of day. The rookie move is to start querying. The analyst move is to profile first: how many rows, how complete is each column, how many distinct entities, what range do the dates cover? Five minutes of profiling catches the nulls, duplicates, and stale data that would otherwise poison every answer you build on top.",
   ral:{sql:"SELECT\n  COUNT(*)                     AS rows,\n  COUNT(email)                 AS email_filled,\n  COUNT(*) - COUNT(email)      AS email_nulls,\n  COUNT(DISTINCT customer_id)  AS distinct_customers,\n  MIN(order_date)              AS first_date,\n  MAX(order_date)              AS last_date\nFROM orders;", say:"Count the rows, count how many fill each column, count the distinct keys, and read the earliest and latest dates — one pass that tells you the size, completeness, and range of the table before you trust it.",
     lines:[["COUNT(*)","total rows — the size of what you're working with"],["COUNT(email) vs COUNT(*)","COUNT(column) skips NULLs, so COUNT(*) − COUNT(email) is the count of missing emails"],["COUNT(DISTINCT customer_id)","how many unique entities — compare to COUNT(*) to sense duplication"],["MIN / MAX(order_date)","the date range — surfaces stale data or impossible future dates"]]},
   notes:"Profiling is the cheap insurance every good analyst buys before analysis. The three things it catches: completeness (nulls you'd otherwise average over), uniqueness (duplicates that inflate every total), and range (dates or values outside what's plausible). COUNT(*) counts rows; COUNT(column) counts only non-null values in that column — the gap between them is your null count, no separate query needed. Many databases also expose this through a profiling tool, but knowing the SQL means you can profile anything, anywhere.",
   viz:{columns:["check","result","read"], rows:[["rows","48,210","table size"],["email nulls","1,902","~4% missing — handle before grouping by email"],["distinct customers","31,544","fewer than rows — repeat buyers exist"],["date range","2021-01 → 2024-12","4 full years, no future dates"]], caption:"One profiling query, four health checks. The distinct-customer count below the row count tells you a customer appears on many orders — critical to know before you COUNT(*) and call it 'customers'."},
   quiz:{q:"Why does COUNT(*) - COUNT(email) return the number of rows missing an email?", opts:["COUNT(email) counts only the rows where email is not null","COUNT(*) counts twice as fast as a column count","Subtracting any two counts gives the null total","COUNT(email) includes a row only when email is null"], ans:0, exp:"COUNT(*) counts every row, while COUNT(email) counts only rows where email is non-null. The difference is exactly the rows where email is NULL — the missing-email count, with no separate IS NULL query needed."}
  },
  {id:802, unit:"Unit 7: Advanced Analyst Toolkit", title:"Validate the Grain", sub:"Know exactly what one row represents before you sum anything.",
   story:"Every table has a grain — the thing one row represents. One row per order? Per order line? Per shipment? Get it wrong and every total is wrong: join a one-row-per-order table to a one-row-per-line table and your revenue silently doubles. Before you trust that a key is unique, test it. Group by the supposed key and look for any group that appears more than once.",
   ral:{sql:"SELECT order_id, COUNT(*) AS rows\nFROM order_lines\nGROUP BY order_id\nHAVING COUNT(*) > 1\nORDER BY rows DESC;", say:"Group by the column you believe is unique and keep only the groups that appear more than once — any rows that come back mean the grain is finer than you assumed.",
     lines:[["GROUP BY order_id","collapse the table to one row per supposed key"],["HAVING COUNT(*) > 1","keep only the keys that repeat — the duplicates"],["any rows returned","order_id is NOT one row per order here — the grain is finer"],["the fix","either dedupe, or carry the true grain (order_id + line_no) through every join"]]},
   notes:"Grain is the single most common source of silently wrong numbers. A query that returns zero rows confirms the key is unique at that grain; any rows returned tell you it isn't — and that joining on it will fan out and inflate every downstream SUM and COUNT. Establish the grain before you aggregate, and when you join, make sure you know the grain of both sides. This check closes the loop with the reconciliation lesson: a tie-out that's off by a clean multiple is almost always a grain problem.",
   viz:{columns:["order_id","rows","meaning"], rows:[["10455","3","3 line items — one row per line, not per order"],["10473","2","2 line items"],["10488","2","2 line items"]], caption:"The query was supposed to return nothing. It returned these — proof that order_id repeats, so the table's grain is the order LINE, not the order. SUM(amount) grouped by order_id would be fine; joining orders to this on order_id would double-count."},
   quiz:{q:"The grain-check query returns several rows. What has it just told you?", opts:["The table is empty and needs reloading","The supposed key repeats, so the grain is finer","Every order has exactly one line item","The GROUP BY clause referenced the wrong column"], ans:1, exp:"Rows come back only for keys that appear more than once. So order_id is not unique — the table holds multiple rows per order, meaning its true grain is finer (the order line). Joining another table on order_id would fan out and inflate totals."}
  },
  {id:803, unit:"Unit 7: Advanced Analyst Toolkit", title:"Distribution & Outliers", sub:"The average lies on skewed data — read center, spread, and the extremes.",
   story:"A stakeholder asks for 'the typical order value.' You could return AVG(amount) and be confidently wrong: one $50,000 enterprise order drags the mean far above what a normal customer spends. The average alone hides the shape of the data. Read the median next to the mean, measure the spread, and flag the outliers that pull them apart — then you know whether 'average' even means anything here.",
   ral:{sql:"SELECT\n  AVG(amount)                                          AS mean,\n  PERCENTILE_CONT(0.5) WITHIN GROUP (ORDER BY amount)  AS median,\n  STDDEV(amount)                                       AS sd,\n  AVG(amount) + 3 * STDDEV(amount)                     AS high_fence\nFROM orders;", say:"Compute the mean and the median together, the standard deviation for spread, and a fence three standard deviations above the mean to flag the outliers that pull the two apart.",
     lines:[["AVG vs PERCENTILE_CONT(0.5)","mean vs median — a wide gap between them signals a skewed distribution"],["STDDEV(amount)","spread — the mean alone hides how dispersed the values are"],["AVG + 3 * STDDEV","a common high fence — rows above it are worth a closer look"],["mean ≫ median","right-skewed — a few large values are inflating the average"]]},
   notes:"When the mean and median diverge, the median is the more honest 'typical' value — it isn't dragged by extremes. Spread matters as much as center: two datasets with the same mean can behave completely differently. Outliers are a question, not a verdict: they may be data errors (fix them) or genuine extremes like that enterprise whale (keep them, but segment so they don't distort the everyday picture). Never silently delete an outlier — investigate why it's there first.",
   viz:{columns:["Statistic","Value"], rows:[["Min",5],["Q1",38],["Median",60],["Q3",95],["Max",180],["Outliers","540"]], caption:"Order value — the mean ($88) sits right of the median ($60), pulled by the $540 whale"},
   quiz:{q:"The mean order value is $88 but the median is $60. What does that gap tell you?", opts:["The data is right-skewed by a few large orders","Exactly half of all orders are above $88","There is a calculation error in one of the two","The orders are spread evenly across the range"], ans:0, exp:"The mean sitting well above the median is the signature of right skew: a handful of large orders pull the average up while the median — the true midpoint — stays near where most orders actually fall. Here the median ($60) is the more honest 'typical' value."}
  },
  {id:804, unit:"Unit 7: Advanced Analyst Toolkit", title:"Pareto: Find the Vital Few", sub:"A small share of items usually drives most of the total — rank and accumulate.",
   story:"Roughly 80% of revenue tends to come from 20% of products; most of your support tickets from a few issue types. The Pareto principle turns a long list into a short one worth acting on. The technique: rank the items, take a running total as a share of the grand total, and read down until the cumulative percent crosses 80%. Everything above that line is the 'vital few' you focus on.",
   ral:{sql:"SELECT\n  product,\n  revenue,\n  ROUND(100.0 * SUM(revenue) OVER (ORDER BY revenue DESC)\n              / SUM(revenue) OVER (), 1)  AS cum_pct\nFROM product_sales\nORDER BY revenue DESC;", say:"Order products by revenue, take a running total of revenue divided by the grand total, and read the cumulative percent down the ranked list to see how few products it takes to reach most of the sales.",
     lines:[["SUM(revenue) OVER (ORDER BY revenue DESC)","a running total down the ranked list — revenue captured so far"],["SUM(revenue) OVER ()","the grand total — an empty OVER () window spans every row"],["running ÷ grand","cumulative percent of revenue captured by the top N products"],["crosses 80% early","the vital few — the short list worth your attention"]]},
   notes:"This is Pareto (or ABC) analysis, and the two window functions are the whole trick: SUM(...) OVER (ORDER BY ... DESC) accumulates down the sorted list, while SUM(...) OVER () with an empty window returns the grand total on every row to divide by. The payoff is focus — instead of treating 200 products equally, you act on the handful driving most of the value and manage the long tail by exception. Watch for a flat curve: if no small group dominates, the distribution is even and Pareto isn't the right lens.",
   viz:{columns:["Category","Revenue ($K)","Cumulative %"], rows:[["A",480,"48%"],["B",250,"73%"],["C",110,"84%"],["D",80,"92%"],["E",50,"97%"],["F",30,"100%"]], caption:"Revenue by product, with cumulative %"},
   quiz:{q:"In the Pareto query, what does SUM(revenue) OVER () — with empty parentheses — return?", opts:["A running total that resets on each product","The grand total of revenue across every row","The revenue of only the current product","The average revenue per product in the list"], ans:1, exp:"An empty OVER () window has no ORDER BY and no partition, so it spans the entire result set — giving the grand total on every row. Dividing the ordered running total by that grand total is what produces the cumulative percentage."}
  },
  {id:805, unit:"Unit 7: Advanced Analyst Toolkit", title:"Correlation ≠ Causation", sub:"Quantify which drivers move with an outcome — and don't overclaim.",
   story:"Someone asks what's driving revenue. Correlation is the first tool: CORR measures how tightly two variables move together, from −1 to +1. It's a fast way to rank candidate drivers. But it comes with the most important caveat in analytics — a strong correlation is a hypothesis, not a conclusion. Ice-cream sales correlate with drownings; neither causes the other. Heat drives both.",
   ral:{sql:"SELECT\n  CORR(marketing_spend, revenue) AS r_spend,\n  CORR(discount_pct,    revenue) AS r_discount\nFROM weekly_metrics;", say:"Use CORR to measure how tightly each candidate driver tracks revenue on a scale from minus one to one, then compare the coefficients — while remembering a strong relationship still isn't proof of cause.",
     lines:[["CORR(x, y)","Pearson coefficient, −1 to +1 — near ±1 is a tight linear relationship"],["r near 0","little LINEAR relationship — a curved relationship can still hide here"],["compare |r|","the driver with the larger magnitude tracks revenue more closely"],["correlation ≠ causation","a lurking third variable can drive both — always the first thing to suspect"]]},
   notes:"Correlation ranks where to look; it never proves why. Three traps to name out loud: confounding (a third variable drives both), reverse causation (Y actually drives X), and coincidence (with enough variables, some will correlate by chance). Always eyeball a scatter alongside the number — a single outlier can manufacture a correlation that isn't real, and a strong curved relationship can read as r≈0. Treat a high r as 'worth a controlled test,' not 'case closed.'",
   viz:{columns:["Marketing spend ($K)","Revenue ($K)"], rows:[[10,55],[14,62],[18,70],[22,74],[25,88],[30,95],[34,103],[40,120]], caption:"r ≈ 0.97 — a tight positive correlation. But spend and revenue might both rise in busy seasons; the scatter justifies a controlled test, not a 'spend more, earn more' claim."},
   quiz:{q:"Weekly ice-cream sales correlate with drowning incidents at r = 0.9. What is the right conclusion?", opts:["Buying ice cream raises the risk of drowning","A third factor — hot weather — likely drives both","The correlation must be a calculation mistake","Drownings cause people to buy more ice cream"], ans:1, exp:"This is the classic confounding case. Hot weather independently raises both ice-cream sales and swimming (hence drownings), producing a strong correlation with no causal link between the two. A high r tells you to look for the mechanism — it never supplies one."}
  },
  {id:806, unit:"Unit 7: Advanced Analyst Toolkit", title:"Sanity-Check & Reconcile", sub:"Tie your number to a trusted control before anyone else sees it.",
   story:"The last step before you publish is the one juniors skip: does the number make sense, and does it tie to something already trusted? A reconciliation puts your computed figure next to a control — finance's closed total, last month's report, the source-system number — and subtracts. Zero means you tie out. Anything else means stop and find the gap, because the stakeholder will find it for you if you don't.",
   ral:{sql:"SELECT\n  computed,\n  control,\n  computed - control AS diff\nFROM (\n  SELECT\n    (SELECT SUM(amount) FROM orders        WHERE fy = 2024) AS computed,\n    (SELECT total       FROM control_totals WHERE fy = 2024) AS control\n) t;", say:"Put your computed total next to the trusted control figure and subtract — a difference of zero means you tie out, and anything else means find the gap before you publish.",
     lines:[["computed","the number your query produces"],["control","an independently trusted figure — finance's close, last report, the source system"],["diff = computed − control","zero is the goal; a non-zero diff is a flag, not a rounding excuse"],["reconcile before you publish","catch a bad join or filter before a stakeholder does"]]},

// ─── STATE ──────────────────────────────────────────────────────────────────
const SK = 'sqlkit-v1';
let state = {
  doneLessons: [],
  doneFills: [],
  doneBugs: [],
  doneParsons: [],
  doneCards: [],
  flagged: [],
  theme: 'light'
};
function loadState(){
  try { const s = JSON.parse(localStorage.getItem(SK)); if(s) state = {...state, ...s}; } catch(e){}
  document.documentElement.classList.toggle('light', state.theme === 'light');
  updateThemeBtn();
}
function saveState(){ localStorage.setItem(SK, JSON.stringify(state)); }
function markDone(arr, id){
  if(!state[arr].includes(id)){ state[arr].push(id); saveState(); }
}

// ─── FLAG FOR REVIEW ────────────────────────────────────────────────────────
const DRILL_TYPES = [
  {key:'fills',   data:'FILLS',   label:'Fill',   view:'fill'},
  {key:'bugs',    data:'BUGS',    label:'Bug',    view:'bug'},
  {key:'parsons', data:'PARSONS', label:'Order',  view:'parsons'}
];
function renderFlagged(){
  const el = document.getElementById('flaggedList');
  if(!el) return;
  const wrap = document.getElementById('flaggedCard');
  const conf = state.confidence || {};
  const rows = Object.keys(conf).filter(id => conf[id]==='low' || conf[id]==='mid')
    .map(id => DATA.LESSONS.find(x => x.id === +id)).filter(Boolean)
    .map(l => ({id:l.id, title:`Lesson ${lessonPos(l.id)+1} — ${l.title}`, sub: conf[l.id]==='low' ? 'Not yet' : 'Almost'}));
  if(wrap) wrap.style.display = rows.length ? '' : 'none';
  el.innerHTML = rows.map(r=>`<div class="flag-row" onclick="navigate('lesson',${r.id})">
      <div><span style="font-size:11px;color:var(--warn,#d9963a);font-family:var(--mono);margin-right:8px">${r.sub}</span><span class="flag-row-title" style="font-size:14px;font-weight:600">${r.title}</span></div>
      <div style="display:flex;gap:10px;align-items:center;flex-shrink:0"><button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();confGotIt(${r.id})" title="Mark as 'Have it' — removes from review list">✓ Got it now</button><span style="color:var(--accent);font-weight:700">→</span></div>
    </div>`).join('');
}

let currentView = 'home';
function navigate(view, ...args){
  guided = null; // any normal navigation exits the guided practice flow
  currentView = view;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const map = {home:0,lessons:1,practice:2,lab:3,'lab-join':3,'lab-agg':3,'lab-dates':3,'lab-clean':3,cards:4,glossary:5};
  const btns = document.querySelectorAll('.nav-btn');
  if(map[view] !== undefined && btns[map[view]]) btns[map[view]].classList.add('active');
  const main = document.getElementById('main');
  main.innerHTML = '';
  window.scrollTo(0,0);
  if(view==='home') renderHome();
  else if(view==='lessons') renderLessons();
  else if(view==='lesson') renderLesson(args[0]);
  else if(view==='practice') renderPractice();
  else if(view==='fill') renderFill(args[0]);
  else if(view==='bug') renderBug(args[0]);
  else if(view==='parsons') renderParsons(args[0]);
  else if(view==='lab') renderLab();
  else if(view==='lab-join') renderLabJoin();
  else if(view==='lab-agg') renderLabAgg();
  else if(view==='lab-dates') renderLabStub('dates');
  else if(view==='lab-clean') renderLabStub('clean');

}

// Per-lesson confidence self-rating (Grain). Persists to state.confidence; complements
// the 🚩 flag. Purely additive — never blocks progress.

  state.confidence = state.confidence || {};

function answerQuiz(lessonId, chosen){
  const l = DATA.LESSONS.find(x => x.id === lessonId);
  document.querySelectorAll('.quiz-opt').forEach((b,i) => {
    b.disabled = true;
    if(i === l.quiz.ans) b.classList.add('correct');
    else if(i === chosen && chosen !== l.quiz.ans) b.classList.add('wrong');
  });
  document.getElementById('quiz-exp').classList.add('show');
  if(chosen === l.quiz.ans){
    celebrate();
    setTimeout(() => finishLesson(lessonId), 1200);
  } else {
    const qw = document.getElementById('quiz-wrap');
    if(qw) qw.innerHTML += `<div class="mt row" style="gap:10px;margin-top:14px"><button class="btn btn-primary btn-sm" onclick="retryQuiz(${lessonId})">Try Again</button><button class="btn btn-ghost btn-sm" onclick="finishLesson(${lessonId})">Continue anyway</button></div>`;
  }
}
function retryQuiz(lessonId){
  const l = DATA.LESSONS.find(x => x.id === lessonId);
  const qw = document.getElementById('quiz-wrap');
  if(!qw) return;
  qw.innerHTML = `<h3>Quick Check</h3>
    <p class="text-muted text-sm" style="margin-bottom:14px">${l.quiz.q}</p>
    ${l.quiz.opts.map((o,i) => `<button class="quiz-opt" onclick="answerQuiz(${lessonId},${i})">${o}</button>`).join('')}

}

// Per-lesson reset: clears just THIS lesson's completion so the quiz is fresh.
function resetLesson(id){
  const i = state.doneLessons.indexOf(id);
  if(i > -1){ state.doneLessons.splice(i,1); saveState(); }
  showToast('↺ Lesson reset');
  navigate('lesson', id);
}

function finishLesson(id){
  markDone('doneLessons', id);
  const next = DATA.LESSONS.find(l => !state.doneLessons.includes(l.id));
  const qw = document.getElementById('quiz-wrap');
  if(qw){
    let primaryBtn, secondaryBtn = '';
    if(next){
      primaryBtn = `<button class="btn btn-primary" onclick="navigate('lesson',${next.id})">Next: ${next.title} &rarr;</button>`;
      secondaryBtn = `<button class="btn btn-ghost btn-sm" onclick="navigate('lessons')">All Lessons</button>`;
    } else {
      primaryBtn = `<button class="btn btn-primary" onclick="navigate('practice')">Start Practice &rarr;</button>`;

    const dc = (LESSON_DRILLS[id] || []).length;
    const practiceBtn = dc ? `<button class="btn btn-primary" onclick="startGuided(${id})">Practice this &rarr;</button>` : '';
    if(dc) primaryBtn = primaryBtn.replace('btn-primary', 'btn-ghost btn-sm'); // demote next-lesson to secondary
    qw.innerHTML += `<div class="mt row" style="gap:10px;flex-wrap:wrap">${practiceBtn}${primaryBtn}${secondaryBtn}</div>`;
    qw.lastElementChild?.scrollIntoView({behavior:'smooth', block:'center'}); // bring the new action buttons into view
  }
}

// ─── GUIDED PATH (lesson → its drills → next lesson) ────────────────────────
// Every drill linked to the FIRST lesson it applies to — all 36 (FILLS/BUGS/
// PARSONS ×12) appear exactly once across the guided path.
const LESSON_DRILLS = {
  1:  [['fills',0],['bugs',1],['parsons',0]],
  2:  [['fills',1],['bugs',0],['bugs',7],['parsons',1]],
  3:  [['fills',2],['fills',3],['bugs',2],['parsons',6]],
  4:  [['bugs',5],['parsons',3]],
  5:  [['fills',4],['fills',5],['bugs',4],['bugs',6],['parsons',2]],
  6:  [['fills',6],['bugs',3],['parsons',5]],
  7:  [['fills',7],['parsons',4]],
  8:  [['fills',8],['bugs',8],['parsons',8]],
  9:  [['fills',9],['bugs',9],['parsons',7]],
  10: [['fills',11],['bugs',11],['parsons',10]],
  11: [['fills',10],['bugs',10],['parsons',9]],
  12: [['parsons',11]],
  13: [['fills',12],['bugs',12],['parsons',12]],
  14: [['fills',13],['bugs',13],['parsons',13]],
  15: [['fills',14],['bugs',14]],
  16: [['fills',15],['bugs',15]]
};
let guided = null;
let _parsonsAttempts = {}; // tracks wrong-attempt count per drill idx for progressive scaffolding
function startGuided(lessonId){
  const M = {fills:'FILLS', bugs:'BUGS', parsons:'PARSONS'};
  const seq = (LESSON_DRILLS[lessonId] || []).filter(s => M[s[0]] && DATA[M[s[0]]] && DATA[M[s[0]]][s[1]]);
  if(!seq.length){ gotoNextLesson(lessonId); return; }
  guided = {lessonId, seq, pos:0};
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const pb = document.querySelectorAll('.nav-btn')[2]; if(pb) pb.classList.add('active');
  renderGuidedStep();
}
function renderGuidedStep(){
  if(!guided) return;
  const step = guided.seq[guided.pos];
  if(step[0]==='fills') renderFill(step[1]);
  else if(step[0]==='bugs') renderBug(step[1]);
  else if(step[0]==='parsons') renderParsons(step[1]);
  injectGuidedHeader();
}
function injectGuidedHeader(){
  if(!guided) return;
  const main = document.getElementById('main');
  const row = main.querySelector('.row.mb');
  if(!row) return;
  const {seq, pos, lessonId} = guided;
  const lesson = DATA.LESSONS.find(l => l.id === lessonId);
  const step = seq[pos];
  const fb = '';
  row.innerHTML = `<button class="btn btn-ghost btn-sm" onclick="navigate('lesson',${lessonId})">← Back to lesson</button><span style="margin-left:auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap">${fb}<span class="text-muted text-sm">Practice ${pos+1}/${seq.length} · ${lesson.title}</span></span>`;
  const dots = document.createElement('div');
  dots.style.cssText = 'display:flex;gap:4px;align-items:center;margin:0 0 14px';
  dots.innerHTML = seq.map((_,i) => `<span style="width:20px;height:6px;border-radius:3px;background:${i<=pos?'var(--accent)':'rgba(127,127,127,.28)'};opacity:${i<=pos?1:.5}"></span>`).join('') + `<button class="btn btn-ghost btn-sm" style="margin-left:8px" onclick="guidedNext()">Skip →</button>`;
  row.after(dots);
}
function guidedNext(){
  if(!guided) return;
  if(guided.pos < guided.seq.length-1){ guided.pos++; renderGuidedStep(); }
  else { gotoNextLesson(guided.lessonId); }
}
function gotoNextLesson(lid){
  guided = null;
  const _nxt=nextLessonId(lid);
  if(_nxt!==null) navigate('lesson', _nxt);
  else { navigate('home'); showToast('You finished every SQL lesson!'); }
}

let draggedChip = null;
function dragStart(e){
  draggedChip = e.target;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function dragOver(e){ e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function dropChip(e, target){
  e.preventDefault();
  if(!draggedChip) return;
  draggedChip.classList.remove('dragging');
  const container = document.getElementById('parsons-' + target);
  container.appendChild(draggedChip);
  draggedChip = null;
}

function checkParsons(idx){
  const p = DATA.PARSONS[idx];
  const answer = document.getElementById('parsons-answer');
  const chips = [...answer.querySelectorAll('.parsons-chip')];
  if(chips.length !== p.answer.length){
    document.getElementById('parsons-result').innerHTML = `<span style="color:var(--yellow)">Move all lines to the answer area first.</span>`;
    return;
  }
  const userOrder = chips.map(c => parseInt(c.dataset.line));
  const correct = p.answer.every((v,i) => v === userOrder[i]);
  const res = document.getElementById('parsons-result');
  if(correct){
    res.innerHTML = `<span style="color:var(--green);font-weight:600">✓ Correct order!</span>`;
    celebrate();
    markDone('doneParsons', p.id);
    delete _parsonsAttempts[idx];
    setTimeout(() => {
      if(guided) guidedNext();
      else if(idx+1 < DATA.PARSONS.length) navigate('parsons', idx+1);
      else navigate('practice');
    }, 1200);
  } else {
    if(!_parsonsAttempts[idx]) _parsonsAttempts[idx] = 0;
    _parsonsAttempts[idx]++;
    const attempts = _parsonsAttempts[idx];
    if(attempts === 1){
      // 1st wrong: scaffold the first half in correct order, leave rest for user
      const half = Math.ceil(p.answer.length / 2);
      scaffoldParsons(idx, half);
      res.innerHTML = `<span style="color:var(--yellow)">✗ Not quite — the first ${half} line${half>1?'s are':' is'} placed for you. Drag the rest into order.</span>`;
    } else {
      // 2nd wrong: show the full correct answer locked
      scaffoldParsons(idx, p.answer.length);
      const nxtBtn = guided
        ? `<button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="guidedNext()">Next →</button>`
        : idx+1 < DATA.PARSONS.length
          ? `<button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="navigate('parsons',${idx+1})">Next →</button>`
          : `<button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="navigate('practice')">Done →</button>`;
      res.innerHTML = `<span style="color:var(--accent)">Full answer shown — study the order, then move on.</span><br>${nxtBtn}`;
    }
  }
}
// Place the first `count` lines of the correct answer into the answer zone (locked/dimmed),
// return the rest to the pool in original line order.
function scaffoldParsons(idx, count){
  const p = DATA.PARSONS[idx];
  const pool = document.getElementById('parsons-pool');
  const answer = document.getElementById('parsons-answer');
  // collect all chips from both zones by their data-line index
  const allChips = {};
  [...pool.querySelectorAll('.parsons-chip'), ...answer.querySelectorAll('.parsons-chip')]
    .forEach(c => { allChips[parseInt(c.dataset.line)] = c; });
  pool.innerHTML = '';
  answer.innerHTML = '';
  const inAnswer = new Set();
  for(let i = 0; i < count; i++) inAnswer.add(p.answer[i]);
  // place scaffolded chips in correct order, visually locked
  for(let i = 0; i < count; i++){
    const chip = allChips[p.answer[i]];
    if(!chip) continue;
    chip.setAttribute('draggable','false');
    chip.style.opacity = '0.65';
    chip.style.cursor = 'default';
    chip.style.borderColor = 'rgba(47,109,240,.5)';
    chip.style.background = 'rgba(47,109,240,.10)';
    answer.appendChild(chip);
  }
  // remaining chips back to pool in original line-array order (don't reveal ordering)
  p.lines.forEach((_,lineIdx) => {
    if(inAnswer.has(lineIdx)) return;
    const chip = allChips[lineIdx];
    if(!chip) return;
    chip.setAttribute('draggable','true');
    chip.style.opacity = '';
    chip.style.cursor = '';
    chip.style.borderColor = '';
    chip.style.background = '';
    pool.appendChild(chip);
  });
  // Restack layout: Answer on top, Available Lines below (reads top→bottom naturally)
  const wrap = answer.closest('.parsons-wrap');
  if(wrap){
    wrap.style.flexDirection = 'column';
    const answerCol = answer.closest('.parsons-col');
    const poolCol = pool.closest('.parsons-col');
    if(answerCol && poolCol && wrap.firstElementChild !== answerCol){
      wrap.insertBefore(answerCol, poolCol);
    }
  }
}
function resetParsons(idx){ delete _parsonsAttempts[idx]; navigate('parsons', idx); }

    const thead = `<tr>${columns.map(c=>`<th>${c}</th>`).join('')}</tr>`;

// ─── SHARED LAB RUN + PROGRESSIVE SCAFFOLD ─────────────────────────────────
// Wrong-attempt counter per "<kind><taskIdx>" so each task escalates help
// the same way the Parsons drill does: miss 1 → auto-hint, miss 2 → first
// half of the answer filled in, miss 3 → full answer filled in.
let _labAttempts = {};

function _labOpenHint(kind){
  if(kind==='join') _joinHintOpen = true; else _aggHintOpen = true;
  const el = document.getElementById(kind+'-hint');
  const btn = document.getElementById(kind+'-hint-btn');
  if(el) el.style.display = 'block';
  if(btn) btn.style.color = 'var(--accent)';
}

function _labFillPartial(editorId, answer, frac){
  const lines = answer.split('\n');
  const keep = Math.max(1, Math.round(lines.length * frac));
  const ed = document.getElementById(editorId);
  if(ed){ ed.value = lines.slice(0, keep).join('\n') + '\n'; ed.focus(); }
}

function _runLabQuery(kind, taskIdx){
  const cfg = {
    join: { arr: JOIN_TASKS, editor:'join-editor', results:'join-results',
            norows:'Query ran — no rows returned. Check your JOIN condition and make sure the ON clause matches the right columns.' },
    agg:  { arr: AGG_TASKS,  editor:'agg-editor',  results:'agg-results',
            norows:'Query ran — no rows returned. Check your GROUP BY clause.' }
  }[kind];
  const editor = document.getElementById(cfg.editor);
  const results = document.getElementById(cfg.results);
  if(!results) return;
  if(!sqlDb){ results.innerHTML = '<span class="terminal-error">SQL engine not ready yet.</span>'; return; }
  const sql = editor ? editor.value.trim() : '';
  if(!sql){ results.innerHTML = '<span class="terminal-info">Enter a query above.</span>'; return; }
  const t = cfg.arr[taskIdx];
  let res, syntaxErrMsg = null;
  try { res = sqlDb.exec(sql); }
  catch(e){ syntaxErrMsg = e.message; res = []; }

  // Syntax error OR empty result → count as a miss and escalate help.
  if(syntaxErrMsg || !res.length){
    const key = kind + taskIdx;
    const att = (_labAttempts[key] || 0) + 1;
    _labAttempts[key] = att;
    let help;
    if(att === 1){
      _labOpenHint(kind);
      help = `Not quite — ${syntaxErrMsg ? 'your query had a syntax error' : 'no rows returned'}. <i data-lucide="lightbulb" style="width:14px;height:14px;vertical-align:-2px"></i> <strong>Hint opened below</strong> — adjust and Run again.`;
    } else if(att === 2){
      _labFillPartial(cfg.editor, cfg.arr[taskIdx].answer, 0.5);
      help = `Still off — I filled in the <strong>first half</strong> of the query for you. Finish it and Run again.`;
    } else {
      const ed = document.getElementById(cfg.editor);
      if(ed){ ed.value = cfg.arr[taskIdx].answer; ed.focus(); }
      help = `<strong>Full answer filled in</strong> — Run it to see the target result, then compare it line-by-line with the prompt.`;
    }
    const head = syntaxErrMsg
      ? `<div style="color:var(--red);font-family:var(--mono);font-size:12px;margin-bottom:8px">Error: ${syntaxErrMsg}</div>`
      : `<div style="color:var(--muted);margin-bottom:8px">Query ran — no rows returned.</div>`;
    results.innerHTML = head + `
      <div style="color:var(--text);font-size:12px;line-height:1.55;background:rgba(212,160,64,.12);border:1px solid rgba(212,160,64,.3);border-radius:6px;padding:8px 11px">${help}</div>`;
    return;
  }
  const {columns, values} = res[0];
  const thead = `<tr>${columns.map(c=>`<th>${c}</th>`).join('')}</tr>`;
  const tbody = values.map(row=>`<tr>${row.map(v=>`<td>${v==null?'<em style="color:var(--red);font-style:italic">NULL</em>':v}</td>`).join('')}</tr>`).join('');
  const tableHTML = `<table><thead>${thead}</thead><tbody>${tbody}</tbody></table>`;
  const n = values.length;

  // Correctness: compare the user's rows against the model answer's rows.
  let correct = false;
  try {
    const ar = sqlDb.exec(t.answer);
    if(ar.length) correct = JSON.stringify(ar[0].values) === JSON.stringify(values);
  } catch(e){ /* answer should always parse; fall through to wrong path */ }

  const key = kind + taskIdx;
  if(correct){
    _labAttempts[key] = 0;
    results.innerHTML = `${tableHTML}
      <div style="margin-top:10px;display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap">
        <span style="color:var(--green);font-weight:700">✓ Correct — ${n} row${n!==1?'s':''}</span>
        <span style="color:var(--muted);font-size:12px">— ${t.note}</span>
      </div>`;
    if(typeof celebrate === 'function') celebrate();
    return;
  }

  // Wrong → escalate help by attempt number.
  const att = (_labAttempts[key] || 0) + 1;
  _labAttempts[key] = att;
  let help;
  if(att === 1){
    _labOpenHint(kind);
    help = `Not quite — your result doesn't match the target yet. <i data-lucide="lightbulb" style="width:14px;height:14px;vertical-align:-2px"></i> <strong>Hint opened below</strong> — adjust and Run again.`;
  } else if(att === 2){
    _labFillPartial(cfg.editor, t.answer, 0.5);
    help = `Still off — I filled in the <strong>first half</strong> of the query for you. Finish it and Run again.`;
  } else {
    const ed = document.getElementById(cfg.editor);
    if(ed){ ed.value = t.answer; ed.focus(); }
    help = `<strong>Full answer filled in</strong> — Run it to see the target result, then compare it line-by-line with the prompt.`;
  }
  results.innerHTML = `${tableHTML}
    <div style="margin-top:10px;display:flex;flex-direction:column;gap:6px">
      <span style="color:var(--muted)">${n} row${n!==1?'s':''} <span style="font-size:11px">(expected ~${t.expectedRows})</span></span>
      <span style="color:var(--text);font-size:12px;line-height:1.55;background:rgba(212,160,64,.12);border:1px solid rgba(212,160,64,.3);border-radius:6px;padding:8px 11px">${help}</span>
    </div>`;
}

function _joinResultTable(sql, accentColor){
  if(!sqlDb) return '<span style="color:var(--muted);font-size:12px">DB not ready</span>';
  try {
    const res = sqlDb.exec(sql);
    if(!res.length) return '<div style="font-size:12px;color:var(--muted);padding:8px">No rows returned</div>';
    const {columns, values} = res[0];
    const th = columns.map(c=>`<th style="text-align:left;padding:5px 10px;border-bottom:2px solid ${accentColor};color:${accentColor};white-space:nowrap;font-size:12px">${c}</th>`).join('');
    const tb = values.map(r=>`<tr>${r.map(v=>`<td style="padding:4px 10px;border-bottom:1px solid rgba(127,127,127,.15);font-size:12px;white-space:nowrap">${v==null?'<em style="color:var(--red);font-style:italic">NULL</em>':v}</td>`).join('')}</tr>`).join('');
    return `<div style="overflow-x:auto"><table style="border-collapse:collapse;width:100%"><thead><tr>${th}</tr></thead><tbody>${tb}</tbody></table></div>
      <div style="margin-top:6px;font-size:11px;font-weight:700;color:${accentColor}">${values.length} row${values.length!==1?'s':''}</div>`;
  } catch(e){ return `<span style="color:var(--red);font-size:12px">Error: ${e.message}</span>`; }
}

function renderJoinCompare(){
  const content = document.getElementById('compare-content');
  if(!content || !sqlDb) return;
  const SQ_INNER = "SELECT c.name, o.order_id, o.amount FROM customers c INNER JOIN orders o ON c.id = o.customer_id";
  const SQ_LEFT  = "SELECT c.name, o.order_id, o.amount FROM customers c LEFT JOIN orders o ON c.id = o.customer_id";
  const col = (label, color, code, tableHTML, note) => `
    <div style="min-width:260px;flex:1">
      <div style="font-size:12px;font-weight:700;color:${color};text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">${label}</div>
      <div style="font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--surf2);border-radius:6px;padding:8px 10px;margin-bottom:10px;white-space:pre-wrap;line-height:1.5">${code}</div>
      ${tableHTML}
      <div style="margin-top:8px;font-size:12px;color:var(--muted);background:${color === 'var(--green)' ? 'rgba(57,185,80,.08)' : 'rgba(47,109,240,.08)'};border-radius:6px;padding:8px 10px;line-height:1.5">${note}</div>
    </div>`;
  content.innerHTML = `
    <p class="text-muted text-sm" style="margin-bottom:14px">Same two tables, same ON clause — only the JOIN keyword changes. Count the rows.</p>
    <div style="display:flex;gap:16px;flex-wrap:wrap">
      ${col('INNER JOIN','var(--green)',
        'SELECT c.name, o.order_id, o.amount\nFROM customers c\nINNER JOIN orders o\n  ON c.id = o.customer_id',
        _joinResultTable(SQ_INNER,'var(--green)'),
        'Only customers who have orders. Unmatched customers are <strong>dropped</strong>.')}
      ${col('LEFT JOIN','var(--accent)',
        'SELECT c.name, o.order_id, o.amount\nFROM customers c\nLEFT JOIN orders o\n  ON c.id = o.customer_id',
        _joinResultTable(SQ_LEFT,'var(--accent)'),
        'Every customer kept. Unmatched ones show <em style="color:var(--red)">NULL</em> — that\'s 4 extra rows vs INNER.')}
    </div>
    <div style="margin-top:16px;padding:12px 16px;background:var(--surf2);border-radius:8px;font-size:13px;color:var(--muted);line-height:1.65">
      <i data-lucide="lightbulb" style="width:14px;height:14px;vertical-align:-2px;color:var(--accent)"></i> <strong style="color:var(--text)">What changed:</strong> INNER returned 5 rows — only the orders that matched a customer. LEFT returned 9 rows — all 8 customers, but Alice's 2 orders made her appear twice. The 4 rows with <em style="color:var(--red)">NULL</em> are Bob, Eva, Frank, and Henry — customers who exist but placed no orders. Those rows are what INNER silently dropped.
    </div>`;
}

const AGG_TASKS = [

    prompt:"How many customers are in each status group? Show status and the count, sorted by count highest first.",
    scaffold:"-- Count customers per status, highest first\n\n",
    answer:"SELECT status, COUNT(*) AS customer_count\nFROM customers\nGROUP BY status\nORDER BY customer_count DESC;",
    hint:"GROUP BY splits rows into groups — one per distinct status value. COUNT(*) counts every row in each group. ORDER BY the alias (customer_count) DESC puts the biggest group first.",
    expectedRows:3,
    note:"3 rows — one per status (active, inactive, pending if present). GROUP BY collapsed all 8 customers into 3 summary rows." },
  { id:2, title:"Total revenue per customer", concept:"SUM + GROUP BY",

    scaffold:"-- Each customer's total revenue\n-- Only customers with at least one order\n\n",
    answer:"SELECT c.name, SUM(o.amount) AS total_revenue\nFROM customers c\nINNER JOIN orders o ON c.id = o.customer_id\nGROUP BY c.name;",
    hint:"INNER JOIN first to connect customers to their orders. GROUP BY c.name collapses multiple order rows per customer into one. SUM(o.amount) totals their spend.",
    expectedRows:4,
    note:"4 rows — one per customer with orders. Alice's two orders are collapsed and summed into a single total." },
  { id:3, title:"Filter groups with HAVING", concept:"HAVING — filter after grouping",

    answer:"SELECT status, COUNT(*) AS n\nFROM customers\nGROUP BY status\nHAVING COUNT(*) > 1;",
    hint:"WHERE runs before grouping — you can't use it to filter on COUNT(*). HAVING runs after GROUP BY, so you CAN filter on the aggregated result. Think of it as WHERE for groups.",
    expectedRows:2,

  { id:4, title:"Multiple aggregates at once", concept:"COUNT + SUM + AVG + MAX in one query",
