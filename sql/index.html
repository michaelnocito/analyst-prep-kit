      </div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;align-items:center">
        <span style="display:inline-flex;align-items:center;gap:6px;background:rgba(212,160,64,.12);border:1px solid rgba(212,160,64,.35);border-radius:20px;padding:4px 14px;font-size:12px;color:#d4a040;font-weight:600"><i data-lucide="construction" style="width:13px;height:13px;vertical-align:-2px"></i> Full lab in development</span>
        <button class="btn btn-primary btn-sm" onclick="navigate('lab-agg')">Try Aggregation Lab →</button>
      </div>
    </div>`;
}

function tryLabSample(key){
  const s = LAB_STUBS[key];
  if(!s) return;
  navigate('lab');
  setTimeout(() => {
    const ed = document.getElementById('sql-editor');
    if(ed){ ed.value = s.sample; ed.focus(); }
  }, 300);
}

// ─── FLASHCARDS ────────────────────────────────────────────────────────────
let cardIdx = 0, cardFlipped = false;
function renderCards(){
  cardIdx = 0; cardFlipped = false;
  renderCardAt(0);
}
function renderCardAt(i){
  const total = DATA.CARDS.length;
  const [term, def] = DATA.CARDS[i];
  document.getElementById('main').innerHTML = `
    <h1>Flashcards</h1>
    <p class="text-sm text-muted">${i+1} of ${total} — click card to flip</p>
    <div class="flashcard-outer" onclick="flipCard()">
      <div class="flashcard-inner" id="fc-inner">
        <div class="flashcard-face flashcard-front"><div class="flashcard-term">${term}</div></div>
        <div class="flashcard-face flashcard-back"><div class="flashcard-def">${def}</div></div>
      </div>
    </div>
    <p class="fc-hint">Click to reveal definition · ← → arrow keys to navigate</p>
    <div class="flashcard-nav">
      <button class="btn btn-ghost btn-sm" onclick="prevCard()">← Prev</button>
      <span class="text-muted text-sm">${i+1} / ${total}</span>
      <button class="btn btn-primary btn-sm" onclick="nextCard()">Next →</button>
    </div>`;
}
function flipCard(){
  cardFlipped = !cardFlipped;
  document.getElementById('fc-inner').classList.toggle('flipped', cardFlipped);
}
function nextCard(){ cardFlipped=false; cardIdx=(cardIdx+1)%DATA.CARDS.length; renderCardAt(cardIdx); }
function prevCard(){ cardFlipped=false; cardIdx=(cardIdx-1+DATA.CARDS.length)%DATA.CARDS.length; renderCardAt(cardIdx); }
document.addEventListener('keydown', e => {
  if(currentView==='cards'){
    if(e.key==='ArrowRight') nextCard();
    else if(e.key==='ArrowLeft') prevCard();
    else if(e.key===' '){ e.preventDefault(); flipCard(); }
  }
});

// ─── GLOSSARY ──────────────────────────────────────────────────────────────
function renderGlossary(){
  document.getElementById('main').innerHTML = `
    <h1>Glossary</h1>
    <input class="gloss-search" id="gloss-search" placeholder="Search terms…" oninput="filterGlossary()" autofocus>
    <div id="gloss-list">${renderGlossItems(DATA.GLOSSARY)}</div>`;
}
function renderGlossItems(items){
  return items.map(([t,d]) => `<div class="gloss-item"><div class="gloss-term">${t}</div><div class="gloss-def">${d}</div></div>`).join('');
}
function filterGlossary(){
  const q = document.getElementById('gloss-search').value.toLowerCase();
  const filtered = DATA.GLOSSARY.filter(([t,d]) => t.toLowerCase().includes(q) || d.toLowerCase().includes(q));
  document.getElementById('gloss-list').innerHTML = renderGlossItems(filtered);
}

// ─── SETTINGS ──────────────────────────────────────────────────────────────
function renderSettings(){
  document.getElementById('main').innerHTML = `
    <h1>Settings</h1>
    <div class="card">
      <div class="setting-row">
        <div><div class="setting-label">Theme</div><div class="setting-sub">Light or dark mode</div></div>
        <button class="btn btn-ghost btn-sm" onclick="toggleTheme()">${state.theme==='dark'?'Switch to Light':'Switch to Dark'}</button>
      </div>
      <div class="setting-row">
        <div><div class="setting-label">Reset Progress</div><div class="setting-sub">Clear all lesson and drill progress</div></div>
        <button class="btn btn-ghost btn-sm" style="color:var(--red);border-color:var(--red)" onclick="resetProgress()">Reset</button>
      </div>
    </div>`;
}
function resetProgress(){
  if(!confirm('Reset all progress? This cannot be undone.')) return;
  state.doneLessons=[]; state.doneFills=[]; state.doneBugs=[]; state.doneParsons=[]; state.doneCards=[];
  saveState();
  navigate('home');
}

// ─── CELEBRATE ─────────────────────────────────────────────────────────────
function celebrate(){
  const overlay = document.getElementById('celebrate-overlay');
  const colors = ['var(--clay-500)','var(--amber-400)','var(--leaf-500)','var(--teal-500)','var(--clay-300)'];
  overlay.innerHTML = '';
  for(let i=0;i<28;i++){
    const d = document.createElement('div');
    d.className = 'confetti';
    d.style.cssText = `left:${Math.random()*100}%;background:${colors[i%colors.length]};animation-delay:${Math.random()*.4}s;animation-duration:${.9+Math.random()*.6}s`;
    overlay.appendChild(d);
  }
  showToast('✓ Nice work!');
  setTimeout(()=>{ overlay.innerHTML=''; },1800);
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ─── INIT ──────────────────────────────────────────────────────────────────
loadState();
navigate('home');

/* -- Hint System JS ---- */
var _hd={hint:'',ans:'',state:0};
function cycleHint(){
  _hd.state++;
  var hp=document.getElementById('drill-hint');
  var ap=document.getElementById('drill-answer');
  var btn=document.getElementById('hint-cycle-btn');
  if(_hd.state===1){
    hp.textContent='\u{1F4A1} '+_hd.hint;
    hp.classList.add('show');
    if(btn)btn.textContent='Show Answer';
  } else {
    var esc=(_hd.ans+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    var match=findGlossaryTerm(_hd.ans+'');
    var matchTerm=match?(match.term!==undefined?match.term:match[0]):null;
    var learnHtml=matchTerm?'<button class="learn-more-link" onclick="openGlossaryFor(\''+matchTerm.replace(/'/g,"\\'")+'\')">&#x1F4D6; '+matchTerm+'</button>':'';
    ap.innerHTML='<pre class="answer-code">'+esc+'</pre><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><button class="copy-btn" onclick="doCopy(event)">&#x1F4CB; Copy</button>'+learnHtml+'</div>';
    ap.classList.add('show');
    if(btn)btn.style.display='none';
  }
}
function findGlossaryTerm(ansText){
  if(typeof DATA==='undefined'||!DATA.GLOSSARY)return null;
  var lower=(ansText+'').toLowerCase();
  return DATA.GLOSSARY.find(function(e){var t=(e.term!==undefined?e.term:e[0]).toLowerCase();return t.length>2&&lower.indexOf(t)!==-1;});
}
function openGlossaryFor(term){
  if(typeof navigate==='function')navigate('glossary');
  else if(typeof show==='function')show('glossary');
  setTimeout(function(){
    var s=document.getElementById('gloss-search')||document.getElementById('glossSearch');
    if(s){s.value=term;try{filterGlossary(term);}catch(e){try{filterGlossary();}catch(e2){}}}
  },80);
}
function doCopy(e){
  var btn=e.currentTarget||e.target,orig=btn.textContent;
  function done(){btn.textContent='✓ Copied!';setTimeout(function(){btn.textContent=orig;},1500);}
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(_hd.ans).then(done).catch(function(){_fbCopy(_hd.ans);done();});}
  else{_fbCopy(_hd.ans);done();}
}
function _fbCopy(t){var a=document.createElement('textarea');a.value=t;a.style.position='fixed';a.style.top='-9999px';document.body.appendChild(a);a.focus();a.select();try{document.execCommand('copy');}catch(_){}document.body.removeChild(a);}
/* -- End Hint System JS ---- */
/* Sprint mode removed. */

// ─── Lucide icons: render now + re-render after any #main view change ───────
(function(){
  // createIcons() in this Lucide build leaves data-lucide ON the generated <svg>,
  // so it re-matches its own output. Strip it after rendering, otherwise the
  // MutationObserver below would re-fire on createIcons's own mutations forever.
  function refresh(){
    if(!window.lucide) return;
    lucide.createIcons();
    document.querySelectorAll('svg[data-lucide]').forEach(function(s){ s.removeAttribute('data-lucide'); });
  }
  refresh();
  var main=document.getElementById('main');
  if(main && 'MutationObserver' in window){
    var queued=false;
    new MutationObserver(function(){
      if(queued) return; queued=true;
      queueMicrotask(function(){ queued=false; refresh(); });
    }).observe(main,{childList:true,subtree:true});
  }
})();
