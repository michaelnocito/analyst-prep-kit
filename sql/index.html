<link rel="stylesheet" href="../assets/grain/grain.css">
<style>
/* GRAIN design system. The kit's own semantic vars are re-pointed onto
   Grain tokens (assets/grain/) — no one-off hex. :root = warm dark
   variant; .light = the full Grain cream look (toggled via JS class).
   A dedicated Grain dark palette is a later token job (out of scope). */
:root{
  --bg:var(--stone-900);--surf:var(--stone-800);--surf2:var(--stone-700);
  --accent:var(--clay-400);--accent2:var(--clay-300);
  --text:var(--stone-50);--muted:var(--stone-300);--border:var(--stone-700);
  --red:var(--rust-400);--green:var(--leaf-400);--yellow:var(--amber-300);--warn:var(--amber-400);
  --font:var(--font-sans);--mono:var(--font-mono);
  --r:var(--radius-lg);--r2:var(--radius-sm);--shadow:var(--shadow-lg);
}
.light{
  --bg:var(--color-bg);--surf:var(--color-surface);--surf2:var(--stone-100);
  --accent:var(--clay-500);--accent2:var(--clay-600);
  --text:var(--stone-900);--muted:var(--stone-600);--border:var(--stone-200);
  --red:var(--rust-500);--green:var(--leaf-500);--yellow:var(--amber-600);--warn:var(--amber-600);
  --shadow:var(--shadow-md);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.6;min-height:100vh}
a{color:var(--accent);text-decoration:none}

/* NAV */
nav{background:var(--surf);border-bottom:1px solid var(--border);padding:0 18px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;position:sticky;top:0;z-index:100;height:56px}
.nav-brand{font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--text);margin-right:6px;white-space:nowrap;display:inline-flex;align-items:center;gap:9px;letter-spacing:var(--tracking-tight)}
.nav-logo{color:var(--accent);background:var(--surf2);width:30px;height:30px;display:inline-grid;place-items:center;border-radius:9px;flex-shrink:0}
.nav-logo .lucide{width:17px;height:17px}
.nav-btn{background:none;border:none;color:var(--muted);font:inherit;font-size:13px;padding:14px 10px;cursor:pointer;border-bottom:2px solid transparent;transition:.15s;white-space:nowrap}
.nav-btn:hover{color:var(--text)}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.nav-spacer{flex:1}
.nav-icon{font-size:16px;padding:14px 8px}

/* LAYOUT */
main{max-width:860px;margin:0 auto;padding:28px 20px 60px}
h1,h2,h3{font-family:var(--font-display);letter-spacing:var(--tracking-tight)}
h1{font-size:1.6rem;font-weight:700;margin-bottom:6px}
h2{font-size:1.15rem;font-weight:600;margin-bottom:14px}
h3{font-size:1rem;font-weight:600;margin-bottom:10px}
p{margin-bottom:12px;color:var(--muted)}
p strong{color:var(--text)}

/* CARDS */
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:22px 24px;margin-bottom:16px;box-shadow:var(--shadow)}
.card-sm{padding:14px 18px}
.card-accent{border-color:var(--accent)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--r2);font:600 14px var(--font);cursor:pointer;border:none;transition:.15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--text)}
.btn-sm{padding:7px 14px;font-size:13px}
.flag-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 2px;border-top:1px solid var(--border);cursor:pointer}
.flag-row:hover .flag-row-title{color:var(--accent)}

/* BADGE / PILL */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600}
.badge-unit{background:var(--surf2);color:var(--muted)}
.badge-done{background:var(--leaf-50);color:var(--leaf-700)}

/* PROGRESS BAR */
.prog-wrap{height:6px;background:var(--surf2);border-radius:3px;overflow:hidden;margin:6px 0}
.prog-bar{height:100%;background:var(--accent);border-radius:3px;transition:.4s}

/* HOME — resume card */
.resume-card{background:linear-gradient(135deg,var(--accent)18%,var(--accent2));border-radius:var(--r);padding:24px 28px;margin-bottom:20px;color:#fff}
.resume-card h2{color:#fff;margin-bottom:4px}
.resume-card p{color:rgba(255,255,255,.8);margin:0 0 16px}
.resume-card .btn{background:rgba(255,255,255,.2);color:#fff}
.resume-card .btn:hover{background:rgba(255,255,255,.35)}

/* HOME — path grid */
.path-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.path-tile{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:18px;cursor:pointer;transition:.15s;text-align:center}
.path-tile:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.path-tile .icon{font-size:1.8rem;margin-bottom:8px;color:var(--accent);line-height:1}
.path-tile h3{font-size:.95rem;margin:0 0 4px}
.path-tile p{font-size:12px;margin:0}

/* SKILL BARS */
.skill-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.skill-label{width:110px;font-size:13px;color:var(--muted);flex-shrink:0}
.skill-bar-wrap{flex:1;height:8px;background:var(--surf2);border-radius:4px;overflow:hidden}
.skill-bar{height:100%;background:var(--accent);border-radius:4px;transition:.6s}
.skill-pct{width:34px;font-size:12px;color:var(--muted);text-align:right}

/* LESSON LIST */
.unit-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:10px 0 4px;margin-top:8px}
.lesson-row{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--surf);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:8px;cursor:pointer;transition:.15s}
.lesson-row:hover{border-color:var(--accent);transform:translateX(3px)}
.lesson-num{width:28px;height:28px;border-radius:50%;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);flex-shrink:0}
.lesson-num.done{background:var(--accent);color:#fff}
.lesson-info{flex:1}
.lesson-title{font-weight:600;font-size:14px}
.lesson-sub{font-size:12px;color:var(--muted)}
.lesson-arrow{color:var(--muted);font-size:18px}

/* READ-ALOUD → Grain "Say It Out Loud" card */
.ral-block{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin:0;box-shadow:var(--shadow)}
.ral-head{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--surf2);border-bottom:1px solid var(--border);font-family:var(--font);font-weight:600;font-size:13px;color:var(--text)}
.ral-head .lucide{width:16px;height:16px;color:var(--accent)}
.ral-sql{font-family:var(--mono);font-size:13px;background:var(--stone-900);color:var(--stone-100);padding:16px 18px;margin:0;white-space:pre;overflow-x:auto;line-height:1.7}
.ral-body{padding:16px 18px}
.ral-say{font-size:14px;font-style:italic;color:var(--clay-800);background:var(--clay-50);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;padding:9px 13px 9px 11px;margin-bottom:14px;line-height:1.55;display:flex;gap:7px;align-items:flex-start}
.ral-say .lucide{width:15px;height:15px;color:var(--accent);flex-shrink:0;margin-top:3px}
.ral-line{display:flex;align-items:baseline;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)}
.ral-line:last-child{border:none}
.ral-chunk{font-family:var(--mono);font-size:12.5px;color:var(--clay-700);background:var(--clay-50);padding:2px 7px;border-radius:4px;flex-shrink:0}
.ral-arrow{color:var(--muted);flex-shrink:0}
.ral-desc{font-size:13px;color:var(--muted)}

/* Grain lesson-view helpers (story bridge, section eyebrow, confidence rater) */
.lesson-story{display:flex;gap:11px;align-items:flex-start;background:var(--amber-50);border:1px solid var(--amber-100);border-radius:var(--r2);padding:13px 15px;margin-bottom:18px;font-size:.9rem;line-height:1.65;color:var(--stone-800)}
.lesson-story .lucide{width:18px;height:18px;color:var(--amber-600);flex-shrink:0;margin-top:2px}
.lesson-eyebrow{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:var(--tracking-caps);color:var(--muted);margin:0 0 9px;display:flex;align-items:center;gap:7px}
.lesson-eyebrow .lucide{width:15px;height:15px;color:var(--accent)}
.card h3 .lucide{width:17px;height:17px;color:var(--accent);vertical-align:-3px;margin-right:6px}
.quiz-wrap h3 .lucide{width:17px;height:17px;color:var(--accent);vertical-align:-3px;margin-right:6px}
.conf-rater{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-top:16px;box-shadow:var(--shadow)}
.conf-head{display:flex;align-items:center;gap:8px;font-family:var(--font);font-weight:600;font-size:14px;color:var(--text);margin-bottom:4px}
.conf-head .lucide{width:17px;height:17px;color:var(--accent)}
.conf-sub{font-size:12.5px;color:var(--muted);margin:0 0 14px}
.conf-chips{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.conf-chip{display:flex;flex-direction:column;align-items:center;gap:5px;padding:13px 8px;border-radius:var(--r2);cursor:pointer;border:1.5px solid var(--border);background:var(--surf);color:var(--text);font:inherit;transition:.15s}
.conf-chip .lucide{width:20px;height:20px}
.conf-chip:hover{border-color:var(--accent)}
.conf-chip .conf-label{font-size:13px;font-weight:600}
.conf-chip[data-v="low"] .lucide{color:var(--red)}
.conf-chip[data-v="mid"] .lucide{color:var(--warn)}
.conf-chip[data-v="high"] .lucide{color:var(--green)}
.conf-chip.is-on{color:#fff}
.conf-chip.is-on .lucide{color:#fff}
.conf-chip[data-v="low"].is-on{background:var(--red);border-color:var(--red)}
.conf-chip[data-v="mid"].is-on{background:var(--warn);border-color:var(--warn)}
.conf-chip[data-v="high"].is-on{background:var(--green);border-color:var(--green)}

/* QUIZ */
.quiz-wrap{background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px;margin-top:20px}
.quiz-wrap h3{margin-bottom:14px}
.quiz-opt{display:block;width:100%;text-align:left;background:var(--surf);border:1px solid var(--border);border-radius:var(--r2);padding:11px 16px;margin-bottom:8px;cursor:pointer;font:inherit;font-size:14px;color:var(--text);transition:.15s}
.quiz-opt:hover{border-color:var(--accent)}
.quiz-opt.correct{background:var(--leaf-50);border-color:var(--green);color:var(--leaf-700)}
.quiz-opt.wrong{background:var(--rust-50);border-color:var(--red);color:var(--rust-700)}
.quiz-exp{margin-top:12px;padding:12px 14px;background:var(--surf);border-radius:var(--r2);font-size:13px;color:var(--muted);display:none}
.quiz-exp.show{display:block}

/* PRACTICE — drill picker */
.drill-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.drill-tile{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:18px;cursor:pointer;transition:.15s;text-align:center}
.drill-tile:hover{border-color:var(--accent);transform:translateY(-2px)}
.drill-tile .icon{font-size:1.6rem;margin-bottom:8px;color:var(--accent);line-height:1}
.drill-tile h3{font-size:.9rem;margin:0 0 4px}
.drill-tile p{font-size:11px;margin:0}
.drill-count{font-size:11px;color:var(--accent);font-weight:600;margin-top:4px}

/* FILLS */
.fill-prompt{font-size:14px;color:var(--muted);margin-bottom:10px}
.fill-partial{font-family:var(--mono);font-size:14px;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r2);padding:12px 16px;margin-bottom:16px;white-space:pre}
.fill-input{width:100%;font-family:var(--mono);font-size:14px;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r2);padding:11px 14px;color:var(--text);outline:none;transition:.15s}
.fill-input:focus{border-color:var(--accent)}
.fill-input.correct-in{border-color:var(--green);background:var(--leaf-50);color:var(--leaf-700)}
.fill-input.wrong-in{border-color:var(--red);background:var(--rust-50);color:var(--rust-700)}

/* BUGS */
.code-broken{font-family:var(--mono);font-size:13px;background:var(--rust-50);border:1px solid var(--red);border-radius:var(--r2);padding:14px 16px;margin:10px 0;white-space:pre;overflow-x:auto;color:var(--rust-700)}
.code-fixed{font-family:var(--mono);font-size:13px;background:var(--leaf-50);border:1px solid var(--green);border-radius:var(--r2);padding:14px 16px;margin:10px 0;white-space:pre;overflow-x:auto;color:var(--leaf-700);display:none}
.code-fixed.show{display:block}
.bug-issue{font-size:13px;color:var(--red);margin:8px 0}
.hint-btn{background:none;border:none;color:var(--muted);font:inherit;font-size:12px;cursor:pointer;padding:0;text-decoration:underline}
.hint-text{font-size:13px;color:var(--yellow);margin-top:8px;display:none}
.hint-text.show{display:block}

/* PARSONS */
.parsons-wrap{display:flex;gap:16px;margin:14px 0;flex-wrap:wrap}
.parsons-col{flex:1;min-width:200px}
.parsons-col label{font-size:12px;color:var(--muted);font-weight:600;display:block;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em}
.parsons-pool,.parsons-answer{min-height:80px;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r2);padding:8px;display:flex;flex-direction:column;gap:6px}
.parsons-answer{border-color:var(--accent)}
.parsons-chip{font-family:var(--mono);font-size:13px;background:var(--surf);border:1px solid var(--border);border-radius:var(--r2);padding:9px 12px;cursor:grab;user-select:none;transition:.15s}
.parsons-chip:hover{border-color:var(--accent);background:var(--surf2)}
.parsons-chip.dragging{opacity:.4}

/* LAB / TERMINAL */
.terminal-wrap{background:var(--stone-900);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.terminal-toolbar{background:var(--stone-800);padding:8px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--stone-700)}
.terminal-dot{width:12px;height:12px;border-radius:50%}
.terminal-title{font-size:12px;color:var(--stone-400);margin-left:4px}
.terminal-editor{width:100%;min-height:120px;background:transparent;border:none;color:var(--stone-100);font-family:var(--mono);font-size:13px;padding:14px 16px;resize:vertical;outline:none}
.terminal-actions{padding:10px 14px;display:flex;gap:10px;border-top:1px solid var(--stone-700);background:var(--stone-800)}
.terminal-results{padding:14px 16px;font-family:var(--mono);font-size:12px;min-height:60px;color:var(--stone-100);border-top:1px solid var(--stone-700);overflow-x:auto}
.terminal-results table{border-collapse:collapse;width:100%}
.terminal-results th{text-align:left;padding:4px 12px 4px 0;color:var(--clay-300);font-weight:600;border-bottom:1px solid var(--stone-700)}
.terminal-results td{padding:4px 12px 4px 0;color:var(--stone-100)}
.terminal-error{color:var(--red)}
.terminal-info{color:var(--muted);font-style:italic}

/* FLASHCARDS */
.flashcard-outer{perspective:1000px;height:200px;margin:20px 0;cursor:pointer}
.flashcard-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:.5s;border-radius:var(--r)}
.flashcard-inner.flipped{transform:rotateY(180deg)}
.flashcard-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r);display:flex;align-items:center;justify-content:center;padding:28px;text-align:center}
.flashcard-front{background:var(--surf);border:1px solid var(--border)}
.flashcard-back{background:var(--surf2);border:1px solid var(--accent);transform:rotateY(180deg)}
.flashcard-term{font-size:1.2rem;font-weight:700}
.flashcard-def{font-size:.95rem;color:var(--muted);line-height:1.7}
.flashcard-nav{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:12px}
.fc-hint{font-size:12px;color:var(--muted);text-align:center;margin-top:8px}

/* GLOSSARY */
.gloss-search{width:100%;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r2);padding:11px 14px;color:var(--text);font:inherit;font-size:14px;outline:none;margin-bottom:16px}
.gloss-search:focus{border-color:var(--accent)}
.gloss-item{border-bottom:1px solid var(--border);padding:14px 0}
.gloss-item:last-child{border:none}
.gloss-term{font-weight:700;font-size:14px;color:var(--accent);margin-bottom:4px}
.gloss-def{font-size:13px;color:var(--muted)}

/* CROSS-KIT LINKS */
.kit-links{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
.kit-link{padding:8px 16px;border:1px solid var(--border);border-radius:var(--r2);font-size:13px;color:var(--muted);transition:.15s}
.kit-link:hover{border-color:var(--accent);color:var(--accent)}

/* SETTINGS */
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border:none}
.setting-label{font-size:14px}
.setting-sub{font-size:12px;color:var(--muted)}

/* CELEBRATION */
#celebrate-overlay{position:fixed;inset:0;pointer-events:none;z-index:999}
.confetti{position:absolute;width:8px;height:8px;border-radius:2px;animation:fall 1.2s ease-in forwards}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent);color:#fff;padding:12px 24px;border-radius:var(--r);font-weight:600;font-size:14px;z-index:1000;transition:.35s;opacity:0;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* UTIL */
.row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.spacer{flex:1}
.text-accent{color:var(--accent)}
.text-muted{color:var(--muted)}
.text-sm{font-size:13px}
.mt{margin-top:16px}
.mb{margin-bottom:16px}
@media(max-width:600px){
  .path-grid,.drill-grid{grid-template-columns:1fr 1fr}
  .parsons-wrap{flex-direction:column}
  .nav-brand{display:none}
}

/* -- Sprint Bar ---------------------------------------- */
body{font-size:17px;line-height:1.65}
#sprint-bar{position:sticky;top:52px;z-index:99;font-family:inherit;font-size:13px;line-height:1}
#sprint-bar .sb-inner{display:flex;align-items:center;gap:12px;padding:0 20px;height:44px;background:var(--surf,#152622);border-bottom:1px solid rgba(47,109,240,.25);transition:background .2s;box-shadow:0 2px 10px rgba(0,0,0,.18)}
body.sprint-on #sprint-bar .sb-inner{background:var(--surf2,var(--surf,#1a302c));border-bottom-color:rgba(47,109,240,.55);box-shadow:0 2px 10px rgba(0,0,0,.25)}
#sprint-bar .sb-icon{color:var(--accent,#2f6df0);flex-shrink:0;font-size:15px}
#sprint-bar .sb-text{flex:1;color:rgba(200,200,200,.75);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
[data-theme="light"] #sprint-bar .sb-text{color:rgba(60,60,60,.65)}
#sprint-bar .sb-text b{color:var(--accent,#2f6df0);font-weight:700}
#sprint-bar .sb-btn{background:none;border:1.5px solid rgba(47,109,240,.4);color:rgba(200,200,200,.8);padding:7px 16px;border-radius:6px;font-size:13px;font-family:inherit;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:.15s;font-weight:600}
[data-theme="light"] #sprint-bar .sb-btn{color:rgba(60,60,60,.7)}
#sprint-bar .sb-btn:hover{border-color:var(--accent,#2f6df0);color:var(--accent,#2f6df0)}
#sprint-bar .sb-btn.sb-start{background:var(--accent,#2f6df0);color:#fff;border-color:var(--accent,#2f6df0)}
#sprint-bar .sb-btn.sb-start:hover{opacity:.85}
#sprint-bar .sb-btn.sb-exit{border-color:rgba(150,150,150,.3);font-weight:400}

<script>
localStorage.removeItem('apk-basics'); // Bare Basics mode removed
// ─── Interview Prep Pass (premium gate) ──────────────────────────────────────
if(window.apkPass) apkPass.setKit('sql');
function isPremiumLesson(l){ return l && l.id >= 501; }            // Units 4-7 = interview tracks
function isLockedLesson(l){ return isPremiumLesson(l) && !(window.apkPass && apkPass.isUnlocked()); }
// ─── DATA ──────────────────────────────────────────────────────────────────
const DATA = {

LESSONS: [
  // UNIT 0
  {id:101, unit:"Unit 0: Before You Query", title:"What a Database Is", sub:"Tables, rows, columns — the mental model behind every query.",
   story:"You've used Excel to answer questions from a spreadsheet. Now your company says the real data lives in the database — and SQL is how you ask it questions. Before you write a single query, you need the mental model: a database is a collection of tables, each one shaped like a spreadsheet but potentially holding millions of rows.",
   intro:"A database is an organized collection of tables. Each table has rows (one record each) and columns (one field each) — exactly like a spreadsheet, but built for fast querying at scale. Databases separate concerns: an <code>orders</code> table stores orders, a <code>customers</code> table stores customer details, a <code>products</code> table stores products. SQL is the language you use to ask questions across any of them.",
   ral:{sql:"-- A database is a collection of tables\n-- orders table  →  one row per order\n-- customers table →  one row per customer\n-- products table  →  one row per product",say:"Each table has one job. SQL lets you ask questions across all of them.",
     lines:[["Table","a 2D grid of rows × columns — the basic unit of a database"],["Row","one record — one order, one customer, one product"],["Column","one field — order_id, region, revenue, date"],["Database","a container that holds many related tables"],["Schema","the blueprint — the names and types of every column in every table"]]},
   notes:"A database is not one big flat table. The data is intentionally split across many tables so it can be stored efficiently and updated without duplicating information. SQL's job is stitching those tables back together to answer a question.",
   viz:{columns:["table_name","one_row_represents","example_columns"],rows:[["orders","one sale transaction","order_id, customer_id, product_id, revenue, date"],["customers","one unique customer","customer_id, name, region, email"],["products","one product SKU","product_id, name, category, price"]],caption:"Three tables, each with a single job. Notice that order rows reference customer_id and product_id — those are the keys that will link the tables together."},
   quiz:{q:"In a relational database, why is customer data stored in a separate table from order data?",opts:["It's a limitation of SQL","Separating them avoids duplication — each customer's details are stored once, not repeated on every order row","SQL can only read one table at a time","Databases can't store different data types in one table"],ans:1,exp:"Storing customer details on every order row would repeat the same name/email/region data thousands of times. A separate customers table stores each customer once — and orders just reference the customer_id. SQL joins reconnect them on demand."}
  },
  {id:102, unit:"Unit 0: Before You Query", title:"The Grain of a Table", sub:"What one row represents — the most important question before you query.",
   story:"You can picture what a database is. But before you write a single query, you need to ask: what does one row in this table mean? That's the grain. A row in orders is one sale. A row in customers is one customer. Confuse the grain — especially when joining tables — and your aggregations double-count silently.",
   intro:"The grain of a table is what one row represents. Before you query anything, state the grain out loud: 'one row = one order.' This becomes critical when you join tables. If your <code>orders</code> table has one row per order and your <code>products</code> table has one row per product, a join that doesn't respect the grain can fan out rows and silently multiply your revenue totals.",
   ral:{sql:"-- ALWAYS ask: what does one row mean?\n-- orders grain: one row = one sale transaction\n-- customers grain: one row = one unique customer\n-- daily_agg grain: one row = one day's totals",say:"State the grain before you query. It's the check that prevents silent double-counting.",
     lines:[["Grain","what one row represents — 'one row = one sale'"],["Grain mismatch","joining two tables at different grains → rows fan out → totals get multiplied"],["Check the grain","SELECT COUNT(*) vs SELECT COUNT(DISTINCT order_id) — if they differ, you have duplicates"],["Aggregation & grain","GROUP BY collapses to a new grain — by region, by month, etc."],["Why it matters","JOIN double-counting is the #1 silent error in SQL analytics"]]},
   notes:"Before any JOIN, confirm the grain of both tables. If orders has one row per line item (not per order) and you join on order_id, you'll get one row per line item — not per order. Your SUM(revenue) will count revenue once per item, not once per order. Always check.",
   viz:{columns:["scenario","COUNT(*)","COUNT(DISTINCT order_id)","conclusion"],rows:[["Clean orders table","500","500","grain is one row per order ✓"],["Line-item orders table","1,840","500","grain is one row per line item — totals will be inflated if you don't GROUP right"]],caption:"COUNT(*) vs COUNT(DISTINCT primary_key) is the grain check. When they match, you have one row per entity. When they differ, you're at a finer grain — factor that in before aggregating."},
   quiz:{q:"You join orders (500 rows) to a promotions table where each order can have multiple promotions. After the join you have 1,200 rows. What happened?",opts:["500 orders + 700 promotions were added as new rows","The join fanned out — each order now appears once per promotion it matched, so revenue totals will be inflated","SQL always adds extra rows on a join","You need to use DISTINCT to get 500 rows"],ans:1,exp:"When one table has multiple matching rows in the join table, the result fans out — one order row becomes multiple. This is grain mismatch: orders are at order grain but the result is now at order-promotion grain. SUM(revenue) now totals revenue once per promotion match — silently wrong."}
  },
  {id:103, unit:"Unit 0: Before You Query", title:"Keys & Why Tables Relate", sub:"How tables connect — and what a JOIN is actually doing.",
   story:"You know the grain of each table. Now you need to connect them. An orders row knows the customer_id — but the customer's name lives in the customers table. The key is the bridge: match the customer_id in orders to the id in customers and you can pull name, region, anything. That's what makes a database more powerful than one giant flat spreadsheet.",
   intro:"A <strong>primary key</strong> uniquely identifies every row in a table — like an order_id or customer_id. A <strong>foreign key</strong> is a column in one table that references the primary key of another. That's the link. When you write a JOIN, you're telling SQL: 'for every row in orders, find the matching row in customers where orders.customer_id = customers.id.' Keys make that match possible.",
   ral:{sql:"SELECT o.order_id, c.name, o.revenue\nFROM orders o\nJOIN customers c ON o.customer_id = c.id;",say:"For every order, find the matching customer and pull their name alongside the order's revenue.",
     lines:[["Primary key (PK)","uniquely identifies every row — orders.order_id, customers.id"],["Foreign key (FK)","a column referencing another table's PK — orders.customer_id points to customers.id"],["JOIN ... ON","the matching condition — only rows where these two columns are equal are combined"],["One-to-many","one customer → many orders (that's why customer data is separate)"],["Referential integrity","a FK should always point to a row that exists in the parent table"]]},
   notes:"The JOIN condition is where most SQL errors are made. Make sure you're joining on the right columns — the FK in one table to the PK in the other. Joining on a non-unique column can fan out your rows. And never join without an ON clause — that's a cross join, which returns every possible combination of rows from both tables.",
   viz:{columns:["orders row","orders.customer_id","→ match →","customers.id","customers.name"],rows:[["order #1001","C-45","matches","C-45","Maya Chen"],["order #1002","C-88","matches","C-88","Jordan Lee"],["order #1003","C-45","matches","C-45","Maya Chen (again)"]],caption:"The FK (orders.customer_id) bridges to the PK (customers.id). Maya appears twice because she placed two orders — one row in customers, two rows in orders. That's the one-to-many relationship."},
   quiz:{q:"In a JOIN between orders and customers, the ON clause should match which columns?",opts:["Any two columns with the same name","The foreign key in orders (customer_id) to the primary key in customers (id)","The revenue column to the price column","ORDER BY columns"],ans:1,exp:"A JOIN connects a FK in one table to the PK it references in another. orders.customer_id is the FK; customers.id is the PK. Matching these two columns is what stitches the tables together correctly."}
  },
  {id:104, unit:"Unit 0: Before You Query", title:"A Query Returns a Table; NULL = Unknown", sub:"The output shape of every SQL query — and the special case of missing data.",
   story:"Keys connect the tables. One more idea before you query: SQL always returns a result set shaped like a table — even a single number is wrapped in a 1×1 table. And empty cells in a database aren't blank — they're NULL, which means 'unknown.' NULL is not zero and not empty string. It has its own comparison rules, and ignoring them causes silent wrong totals.",
   intro:"Every SQL query returns a table — rows and columns, even if it's one row or one column. That's the contract. And when a value is missing or unknown, databases store NULL — a special sentinel meaning 'we don't know.' NULL is NOT zero. NULL is NOT an empty string. NULL doesn't equal NULL. Comparisons with NULL require <code>IS NULL</code> / <code>IS NOT NULL</code>, not <code>= NULL</code>.",
   ral:{sql:"SELECT name, revenue\nFROM orders\nWHERE region IS NULL;",say:"Show me every order where the region is unknown (NULL).",
     lines:[["NULL","means 'unknown' — not zero, not blank, not false"],["IS NULL","the correct way to check for NULL — never use = NULL"],["IS NOT NULL","the correct way to check for non-NULL values"],["COUNT(col)","counts only non-NULL values in that column"],["COUNT(*)","counts every row, including ones with NULLs"],["NULL in math","NULL + anything = NULL — one unknown makes the whole expression unknown"]]},
   notes:"COUNT(*) and COUNT(column) return different numbers when a column has NULLs. COUNT(*) counts every row; COUNT(revenue) skips rows where revenue is NULL. If your totals seem low, check for NULLs with SELECT COUNT(*) vs SELECT COUNT(revenue) — a difference tells you how many NULL rows there are.",
   viz:{columns:["order_id","region","revenue","COUNT(*) sees this row?","COUNT(revenue) sees this?"],rows:[["1001","West","150","yes ✓","yes ✓"],["1002","NULL","200","yes ✓","yes ✓"],["1003","East","NULL","yes ✓","no — NULL skipped"]],caption:"COUNT(*) counts all 3 rows. COUNT(revenue) counts only 2 (skips the NULL). COUNT(region) counts only 2 (skips the NULL row 1002). These distinctions change your totals silently if you're not expecting them."},
   quiz:{q:"You run SELECT COUNT(*) and get 500. You run SELECT COUNT(revenue) and get 480. What does this tell you?",opts:["The query has a bug","20 rows have a NULL value in the revenue column","revenue has 20 duplicate values","You should use SUM instead"],ans:1,exp:"COUNT(*) counts every row. COUNT(column) skips NULLs. A difference of 20 means 20 rows have revenue = NULL. Those rows are silently excluded from COUNT(revenue) — and will also be excluded from SUM(revenue) and AVG(revenue)."}
  },
  // UNIT 1
  {id:1, core:true, unit:"Unit 1: Foundations", title:"SELECT & FROM", sub:"Pull columns from a table",
   story:"You know the mental model: databases are tables, rows have a grain, keys connect tables, queries return tables. Now write your first actual question. SELECT names the columns you want; FROM names the table to get them from. That's the whole skeleton. Every query you'll ever write starts with these two words.",
   intro:"A SELECT query is like ordering at a deli counter: you name what you want (the columns) and which counter to get it from (the table). Every SQL query starts with <code>SELECT</code> to choose columns and <code>FROM</code> to name the table. Think of it as: &ldquo;Give me <em>these columns</em> from <em>this table</em>.&rdquo;",
   ral:{
     sql:"SELECT name, email\nFROM customers;",
     say:"Give me the name and email columns from the customers table.",
     lines:[
       ["SELECT","starts the query — list the columns you want"],
       ["name, email","two columns separated by a comma"],
       ["FROM","tells SQL which table to look in"],
       ["customers","the name of the table"],
       [";","ends the statement"]
     ]
   },
   notes:"Use <code>SELECT *</code> to grab every column — handy for exploration, but name columns explicitly in real queries.",
   viz:{columns:["name","email"],rows:[["Maya Chen","maya@co.com"],["Jordan Lee","jordan@co.com"],["Sam Rivera","sam@co.com"],["Alex Kim","alex@co.com"]],caption:"Two columns, one row per customer — exactly the columns you named in SELECT."},
   quiz:{q:"Which clause tells SQL which table to read from?",opts:["SELECT","FROM","WHERE","ORDER BY"],ans:1,exp:"FROM names the table. SELECT names the columns you want back."}
  },
  {id:2, core:true, unit:"Unit 1: Foundations", title:"WHERE", sub:"Filter rows by condition",
   story:"You can pull columns from a table. Your manager's first real question isn't 'show me everything' — it's 'show me just the West region.' WHERE is the filter: it checks a condition row by row and only returns the rows where it's true. SELECT tells SQL what to show; WHERE tells it which rows.",
   intro:"WHERE is like a guest list at the door — only the rows whose name is on it (the condition is true) get in. <code>WHERE</code> filters which rows come back. Only rows where the condition is TRUE are returned.",
   ral:{
     sql:"SELECT name\nFROM customers\nWHERE status = 'active';",
     say:"Give me the names of customers whose status is 'active'.",
     lines:[
       ["WHERE","filter clause — only keep rows that match"],
       ["status = 'active'","the condition: status column must equal the string 'active'"],
       ["= 'active'","single quotes wrap text values; use = not =="]
     ]
   },
   notes:"Common operators: <code>=</code> <code>!=</code> <code>&gt;</code> <code>&lt;</code> <code>BETWEEN</code> <code>LIKE</code> <code>IN</code>. Combine with <code>AND</code> / <code>OR</code>.",
   viz:{columns:["name"],rows:[["Maya Chen"],["Jordan Lee"],["Alex Kim"]],caption:"Only rows where status = 'active' survive the WHERE filter — Sam (inactive) and Taylor (pending) drop out."},
   quiz:{q:"What does WHERE do?",opts:["Picks which columns to show","Filters which rows are returned","Sorts the results","Groups rows together"],ans:1,exp:"WHERE filters rows. Only rows where the condition is true survive."}
  },
  {id:3, unit:"Unit 1: Foundations", title:"ORDER BY & LIMIT", sub:"Sort and cap your results",
   story:"You can filter rows. Your manager wants the highest-revenue orders first, not whatever order the database stored them in. ORDER BY sorts the result — ASC for smallest to largest, DESC for largest to smallest. LIMIT caps how many rows come back. Two small clauses that make query output readable.",
   intro:"ORDER BY and LIMIT are like a leaderboard: sort everyone by score, then show just the top few. <code>ORDER BY</code> sorts results. <code>LIMIT</code> caps how many rows come back — essential for large tables.",
   ral:{
     sql:"SELECT name, order_date\nFROM orders\nORDER BY order_date DESC\nLIMIT 5;",
     say:"Give me the name and order date from orders, sorted by most recent first, and just the top 5 results.",
     lines:[
       ["ORDER BY","sort the results by this column"],
       ["order_date DESC","sort by order_date, newest first (DESC = descending)"],
       ["LIMIT 5","return only the first 5 rows after sorting"]
     ]
   },
   notes:"<code>ASC</code> (ascending, A→Z, 0→9) is the default. <code>DESC</code> reverses it. Always use LIMIT when exploring large data.",
   viz:{columns:["name","order_date"],rows:[["Maya Chen","2026-05-30"],["Alex Kim","2026-05-28"],["Jordan Lee","2026-05-21"],["Sam Rivera","2026-05-14"],["Maya Chen","2026-05-02"]],caption:"Sorted newest-first by order_date, then LIMIT caps it at the top 5 rows."},
   quiz:{q:"What does DESC do in ORDER BY?",opts:["Filters duplicates","Sorts largest/newest first","Limits row count","Joins two tables"],ans:1,exp:"DESC = descending order — largest number or most-recent date appears first."}
  },
  {id:4, core:true, unit:"Unit 1: Foundations", title:"INNER JOIN", sub:"Match rows across two tables",
   story:"You can query one table cleanly. Your manager asks: 'Show me order revenue with the customer name.' The customer name lives in a different table. INNER JOIN stitches two tables together on a shared key — every order row gets its customer row glued on. The grain warning from Unit 0 applies here: mismatched grains silently double your totals.",
   intro:"An INNER JOIN is like matching socks from two laundry piles — you only keep the ones that have a partner in both piles. <code>INNER JOIN</code> links two tables on a shared column. Only rows with a match in both tables appear.",
   ral:{
     sql:"SELECT c.name, o.order_date\nFROM customers c\nINNER JOIN orders o ON c.id = o.customer_id;",
     say:"Give me each customer's name alongside their order dates by matching customers to their orders. Drop rows that don't have a match on both sides.",
     lines:[
       ["FROM customers c","start with customers, alias it c"],
       ["INNER JOIN orders o","bring in orders, alias it o"],
       ["ON c.id = o.customer_id","the join condition: match customer IDs"],
       ["c.name, o.order_date","use aliases to reference columns from each table"]
     ]
   },
   notes:"If a customer has no orders, they won't appear — that's what makes it an INNER join. Use aliases (short letters) to keep queries readable.",
   viz:{columns:["name","order_date"],rows:[["Maya Chen","2026-05-30"],["Maya Chen","2026-05-02"],["Jordan Lee","2026-05-21"],["Alex Kim","2026-05-28"]],caption:"Only customers who have orders appear — Sam and Taylor (no orders) are dropped by the INNER JOIN."},
   quiz:{q:"What happens to customers with no matching orders in an INNER JOIN?",opts:["They appear with NULLs","They are excluded","The query errors","They appear twice"],ans:1,exp:"INNER JOIN only keeps rows with a match in both tables. No match = excluded."}
  },
  // UNIT 2
  {id:5, core:true, unit:"Unit 2: Aggregates & Joins", title:"COUNT, SUM & GROUP BY", sub:"Summarize data by category",
   story:"You can join tables and filter rows. Now your manager wants summaries: 'How many orders per region? What's total revenue per product?' GROUP BY collapses rows into groups; COUNT and SUM run the math on each group. The same data, now aggregated — the move you'll make on almost every stakeholder question.",
   intro:"GROUP BY is like sorting a shoebox of receipts into stacks by store, then totalling each stack. Aggregate functions collapse many rows into one number. <code>GROUP BY</code> tells SQL which column to group on before aggregating.",
   ral:{
     sql:"SELECT status, COUNT(*) AS total\nFROM customers\nGROUP BY status;",
     say:"For each distinct status, count how many customers have it — and label that count 'total'.",
     lines:[
       ["COUNT(*)","count every row in the group"],
       ["AS total","alias — name this column 'total' in the output"],
       ["GROUP BY status","split rows into groups, one per distinct status value"],
       ["SELECT status","also show the status value for each group"]
     ]
   },
   notes:"<code>SUM(col)</code> adds values. <code>AVG(col)</code> averages. <code>MAX / MIN</code> find extremes. Every non-aggregate column in SELECT must appear in GROUP BY.",
   viz:{columns:["status","COUNT(*)","SUM(amt)","AVG(amt)","MAX(amt)","MIN(amt)"],rows:[["active","3","540","180","260","95"],["inactive","1","120","120","120","120"],["pending","1","80","80","80","80"]],caption:"GROUP BY collapses each status to one row — and the same grouping feeds every aggregate at once: COUNT, SUM, AVG, MAX, and MIN."},
   quiz:{q:"Which column must appear in GROUP BY if it's in SELECT without an aggregate?",opts:["The primary key","Any column used in WHERE","Every non-aggregate column in SELECT","Only text columns"],ans:2,exp:"Non-aggregate columns in SELECT must be in GROUP BY so SQL knows how to group the rows."}
  },
  {id:6, core:true, unit:"Unit 2: Aggregates & Joins", title:"LEFT JOIN & NULLs", sub:"Keep all rows from the left table",
   story:"INNER JOIN only keeps rows that match in both tables. Your manager asks: 'Show me all customers, even the ones who never placed an order.' INNER JOIN would drop them. LEFT JOIN keeps every row from the left table — and fills NULL into the right-table columns when there's no match. That's when the NULL lesson from Unit 0 becomes critical.",
   intro:"A LEFT JOIN is like taking class attendance: every student on your roster stays on the list, even the ones who turned in no homework (those columns just come back blank/NULL). <code>LEFT JOIN</code> keeps every row from the left table. If there's no match on the right, you get NULLs.",
   ral:{
     sql:"SELECT c.name, o.order_date\nFROM customers c\nLEFT JOIN orders o ON c.id = o.customer_id;",
     say:"Give me every customer's name and any matching order dates — keep customers even if they've never placed an order (their order_date will just be empty).",
     lines:[
       ["LEFT JOIN","keep all rows from the left (customers), match from right"],
       ["ON c.id = o.customer_id","the join condition"],
       ["o.order_date","will be NULL for customers with no orders"]
     ]
   },
   notes:"Use <code>WHERE o.customer_id IS NULL</code> after a LEFT JOIN to find customers with zero orders — a classic gap-finding pattern.",
   viz:{columns:["name","order_date"],rows:[["Maya Chen","2026-05-30"],["Jordan Lee","2026-05-21"],["Alex Kim","2026-05-28"],["Sam Rivera","NULL"],["Taylor Brooks","NULL"]],caption:"Every customer stays — the ones with no orders get NULL on the right. That's the LEFT JOIN keeping the whole left table."},
   quiz:{q:"What value fills the right-side columns when a LEFT JOIN finds no match?",opts:["0","Empty string","NULL","The row is dropped"],ans:2,exp:"NULL fills unmatched columns in a LEFT JOIN. The left row still appears."}
  },
  {id:7, core:true, unit:"Unit 2: Aggregates & Joins", title:"HAVING & Duplicates", sub:"Filter groups and remove dupes",
   story:"You can aggregate with GROUP BY. But WHERE filters rows before grouping — you can't use it to filter on an aggregated result like COUNT or SUM. HAVING filters after grouping: 'show me only regions where total revenue > 1000.' HAVING is WHERE for groups.",
   intro:"If WHERE bounces people at the club door, HAVING checks the groups already inside — it filters after everyone's been sorted into tables. You've already used <code>WHERE</code> to filter rows. <code>HAVING</code> works the same way — but it filters <em>after</em> grouping, so you can filter on aggregate results like COUNT or SUM. <code>DISTINCT</code> removes duplicate rows.",
   ral:{
     sql:"SELECT status, COUNT(*) AS n\nFROM customers\nGROUP BY status\nHAVING COUNT(*) > 2;",
     say:"For each status, count the customers — but only show statuses that have more than 2 customers.",
     lines:[
       ["HAVING COUNT(*) > 2","keep only groups where the count is greater than 2"],
       ["HAVING vs WHERE","WHERE filters rows before grouping; HAVING filters after"]
     ]
   },
   notes:"<code>SELECT DISTINCT col</code> deduplicates by that column. To find duplicate rows: GROUP BY all columns + HAVING COUNT(*) > 1.",
   viz:{columns:["Technique","What it does","Result"],rows:[["HAVING COUNT(*) > 2","filters GROUPS after aggregating","active (3) — others dropped"],["SELECT DISTINCT status","removes DUPLICATE rows","active, inactive, pending"]],caption:"Two different jobs: HAVING filters groups after GROUP BY (keeps only 'active'), while DISTINCT removes duplicate rows from the result."},
   quiz:{q:"What is the key difference between WHERE and HAVING?",opts:["WHERE is faster","WHERE filters before grouping; HAVING filters after","HAVING works with any column","They are interchangeable"],ans:1,exp:"WHERE runs before GROUP BY; HAVING runs after. Use HAVING to filter on aggregate results."}
  },
  {id:8, unit:"Unit 2: Aggregates & Joins", title:"CASE & COALESCE", sub:"Conditional logic in SQL",
   story:"You can filter groups. Your manager wants a new column: 'label orders over $200 as High, under as Low.' That's conditional logic inside the query — CASE is SQL's IF/ELSE. And COALESCE replaces NULLs with a fallback value so they don't disappear from your aggregations silently.",
   intro:"CASE is SQL's choose-your-own-adventure: depending on the answer to a question, it returns a different result. <code>CASE</code> is SQL's if/else. <code>COALESCE</code> returns the first non-NULL value from a list.",
   ral:{
     sql:"SELECT name,\n  CASE WHEN status='active' THEN 'Yes' ELSE 'No' END AS is_active\nFROM customers;",
     say:"Give me each customer's name and a 'Yes' or 'No' label — 'Yes' if their status is 'active', otherwise 'No'. Label that column 'is_active'.",
     lines:[
       ["CASE WHEN","start a conditional expression"],
       ["status='active' THEN 'Yes'","if this condition is true, return 'Yes'"],
       ["ELSE 'No'","default value when no condition matches"],
       ["END AS is_active","close the CASE; alias the new column"]
     ]
   },
   notes:"<code>COALESCE(email, phone, 'no contact')</code> — returns the first non-NULL. Useful for fallback values when data is incomplete.",
   viz:{columns:["name","is_active (CASE)","contact (COALESCE)"],rows:[["Maya Chen","Yes","maya@co.com"],["Jordan Lee","Yes","555-0182"],["Sam Rivera","No","no contact"],["Alex Kim","Yes","alex@co.com"]],caption:"Two conditional tools side by side: CASE builds the Yes/No column from status, while COALESCE(email, phone, 'no contact') fills the contact column with the first value that isn't NULL."},
   quiz:{q:"What does COALESCE(a, b, c) return?",opts:["The sum of a, b, c","The last non-NULL value","The first non-NULL value","Always returns a"],ans:2,exp:"COALESCE returns the first non-NULL value in the list. Great for providing fallbacks."}
  },
  {id:13, unit:"Unit 2: Aggregates & Joins", title:"RIGHT JOIN & FULL OUTER JOIN", sub:"Keep all rows from the right table — or from both",
   story:"You've used LEFT JOIN to keep all rows from the left table. But sometimes the question flips: 'Show me all orders, even if their customer record was deleted.' That keeps the right table complete. And occasionally you need everything from BOTH tables — customers with no orders AND orders with no customer. That's a FULL OUTER JOIN.",
   intro:"RIGHT JOIN is a mirror of LEFT JOIN — it keeps every row from the right table, filling NULLs on the left side when there's no match. FULL OUTER JOIN combines both: all rows from both tables, NULLs wherever a side has no match. MySQL doesn't support FULL OUTER JOIN directly, but you can simulate it with UNION.",
   ral:{
     sql:"-- RIGHT JOIN: keep all orders even if customer is gone\nSELECT c.name, o.order_id, o.amount\nFROM customers c\nRIGHT JOIN orders o ON c.id = o.customer_id;\n\n-- FULL OUTER JOIN (MySQL workaround)\nSELECT c.name, o.amount\nFROM customers c\nLEFT JOIN orders o ON c.id = o.customer_id\nUNION\nSELECT c.name, o.amount\nFROM customers c\nRIGHT JOIN orders o ON c.id = o.customer_id;",
     say:"Get every order with its customer name — even orphaned orders where the customer no longer exists. Then combine both directions with UNION to see every customer and every order at once.",
     lines:[
       ["RIGHT JOIN orders o","keep ALL rows from the right table (orders)"],
       ["c.name → NULL","when no matching customer exists, left-side columns come back NULL"],
       ["LEFT JOIN ... UNION ... RIGHT JOIN","the MySQL workaround for FULL OUTER JOIN — each half covers one side"],
       ["UNION","merges two result sets, removing exact duplicates"]
     ]
   },
   notes:"In practice, most analysts rewrite RIGHT JOINs as LEFT JOINs by swapping the table order — it reads more naturally and avoids confusion. FULL OUTER JOIN is rare in day-to-day work but a common interview question. The key is knowing WHEN each join is needed, not just the syntax.",
   viz:{columns:["JOIN type","Rows returned","NULLs where"],rows:[["INNER JOIN","Only matching rows","No NULLs from join"],["LEFT JOIN","All left + matching right","Right side when no match"],["RIGHT JOIN","Matching left + all right","Left side when no match"],["FULL OUTER JOIN","All rows from both","Either side when no match"]],caption:"All four join types at a glance. In practice, rewrite RIGHT JOINs as LEFT JOINs by flipping table positions — same result, more readable."},
   quiz:{q:"Some orders have a customer_id that no longer exists in the customers table. Which JOIN keeps all orders regardless?",opts:["INNER JOIN","LEFT JOIN with customers on left","RIGHT JOIN with customers on left, orders on right","CROSS JOIN"],ans:2,exp:"RIGHT JOIN keeps every row from the right table (orders) and fills NULLs for unmatched left-table columns. Equivalently: swap tables and use LEFT JOIN orders LEFT JOIN customers — same data, more readable."}
  },
  {id:14, unit:"Unit 2: Aggregates & Joins", title:"Date Functions", sub:"Filter, extract, and calculate with dates",
   story:"Almost every real analysis has a time dimension. 'Revenue last 30 days', 'orders by month', 'customers inactive for 90+ days' — all require date math. SQL has a small set of date functions that show up in nearly every production query. Learn these and you can answer any time-based question your manager throws at you.",
   intro:"Date functions let you filter by time period, group by month or year, and calculate how long ago something happened. The workhorses: CURDATE() for today, DATE_SUB() to go back in time, DATE_FORMAT() to group by month, and DATEDIFF() to measure gaps. These examples use MySQL syntax — PostgreSQL uses the same concepts with slightly different names.",
   ral:{
     sql:"-- Filter: last 30 days\nSELECT * FROM orders\nWHERE order_date >= DATE_SUB(CURDATE(), INTERVAL 30 DAY);\n\n-- Group by month\nSELECT DATE_FORMAT(order_date, '%Y-%m') AS month,\n       SUM(revenue) AS monthly_rev\nFROM orders\nGROUP BY month\nORDER BY month;",
     say:"First: filter orders to only the last 30 days by subtracting 30 days from today. Then: group revenue by month using DATE_FORMAT to extract year-month.",
     lines:[
       ["CURDATE()","today's date — no arguments needed"],
       ["DATE_SUB(date, INTERVAL n unit)","subtract n DAY / MONTH / YEAR from a date"],
       ["DATE_FORMAT(date, '%Y-%m')","format a date as text — '%Y-%m' gives '2024-03'"],
       ["DATEDIFF(date1, date2)","integer difference in days: date1 minus date2"],
       ["YEAR(date) / MONTH(date)","extract year or month as an integer"]
     ]
   },
   notes:"These are MySQL-specific. PostgreSQL equivalents: NOW() for today, date - INTERVAL '30 days' for subtraction, TO_CHAR(date, 'YYYY-MM') for formatting. Concepts are universal; only function names differ. Always confirm which database you're using before an interview.",
   viz:{columns:["Function","Example call","Result"],rows:[["CURDATE()","CURDATE()","2024-03-15 (today)"],["DATE_SUB()","DATE_SUB(CURDATE(), INTERVAL 1 MONTH)","2024-02-15"],["DATE_FORMAT()","DATE_FORMAT('2024-03-15', '%Y-%m')","'2024-03'"],["DATEDIFF()","DATEDIFF('2024-03-15', '2024-01-01')","74 (days)"],["YEAR() / MONTH()","YEAR('2024-03-15')","2024"]],caption:"Five date functions you'll use in nearly every time-series query. DATE_FORMAT is the most versatile — use it to group by any time granularity you need."},
   quiz:{q:"Which function returns today's date in MySQL?",opts:["TODAY()","NOW() — returns date+time","CURDATE() — returns date only","GETDATE()"],ans:2,exp:"CURDATE() returns today's date without a time component. NOW() returns the current date AND time. GETDATE() is SQL Server syntax. TODAY() doesn't exist in standard SQL."}
  },
  // UNIT 3
  {id:9, unit:"Unit 3: Advanced SQL", title:"Subqueries", sub:"Nest a query inside another",
   story:"You can add conditional logic inside a query. Now your manager asks: 'Show me customers who ordered more than the average revenue per customer.' The average is itself a query result. You embed one query inside another — the inner query runs first and hands its result to the outer. That's a subquery.",
   intro:"A subquery is like a sticky note inside a bigger task: SQL does the little note first, then uses that answer to finish the main job. A subquery is a SELECT inside another SELECT (or WHERE). The inner query runs first and its result is used by the outer query.",
   ral:{
     sql:"SELECT name\nFROM customers\nWHERE id IN (\n  SELECT customer_id FROM orders\n);",
     say:"Give me the names of customers whose ID appears in the orders table — in other words, customers who have placed at least one order.",
     lines:[
       ["WHERE id IN (...)","filter: only rows where id appears in the subquery result"],
       ["SELECT customer_id FROM orders","inner query runs first — returns all customer IDs that have orders"],
       ["id IN (...)","IN checks membership in a list/subquery result"]
     ]
   },
   notes:"Subqueries can appear in SELECT (scalar), FROM (derived table), or WHERE (filter). Keep them readable — if it gets complex, a CTE is cleaner.",
   viz:{columns:["name"],rows:[["Maya Chen"],["Jordan Lee"],["Alex Kim"]],caption:"The inner query lists the customer IDs that have orders; the outer query returns just those customers' names."},
   quiz:{q:"Which part of a subquery executes first?",opts:["The outer query","The inner (sub)query","Both at the same time","The ORDER BY clause"],ans:1,exp:"The inner query runs first. Its result is handed to the outer query."}
  },
  {id:10, unit:"Unit 3: Advanced SQL", title:"Window Functions", sub:"Rank and aggregate without collapsing rows",
   story:"You can nest queries. Your manager wants a ranking: 'Show each product's revenue and its rank — but keep every row.' GROUP BY would collapse everything into one row per product. Window functions aggregate without collapsing: each row keeps its detail and also gets a calculated value across the full set.",
   intro:"A window function is like ranking runners without pulling anyone off the track — every row keeps its place but also gets a label (its rank, a running total). Window functions compute a value across a set of rows (a 'window') without collapsing them like GROUP BY does.",
   ral:{
     sql:"SELECT name,\n  ROW_NUMBER() OVER (ORDER BY order_date) AS rn\nFROM orders;",
     say:"Give me each order's name and a sequential row number — numbered in the order the order dates occurred. Label the number column 'rn'.",
     lines:[
       ["ROW_NUMBER()","assign a sequential number to each row"],
       ["OVER (...)","defines the window — which rows to consider and how to sort them"],
       ["ORDER BY order_date","within the window, number rows by date"],
       ["AS rn","alias for the new column"]
     ]
   },
   notes:"Other window functions: <code>RANK()</code>, <code>DENSE_RANK()</code>, <code>LAG()</code>, <code>LEAD()</code>, <code>SUM() OVER (...)</code> for running totals. Add <code>PARTITION BY col</code> to restart numbering per group.",
   viz:{columns:["amount","ROW_NUMBER","RANK","DENSE_RANK","LAG(amount)"],rows:[["260","1","1","1","NULL"],["260","2","1","1","260"],["195","3","3","2","260"],["150","4","4","3","195"]],caption:"Window functions keep every row but number it differently: ROW_NUMBER is always unique, RANK ties-then-skips (1,1,3), DENSE_RANK ties without skipping (1,1,2), and LAG pulls the previous row's value. LEAD and SUM() OVER follow the same OVER() pattern."},
   quiz:{q:"What makes window functions different from GROUP BY aggregates?",opts:["They are faster","They don't collapse rows — each row keeps its own output","They only work on numbers","They require a subquery"],ans:1,exp:"Window functions calculate across rows but return a value for every row — no collapsing."}
  },
  {id:11, unit:"Unit 3: Advanced SQL", title:"CTEs", sub:"Name a query for reuse with WITH",
   story:"You can write subqueries. But deep nesting gets unreadable fast. CTEs let you name a query result and reference it by name in the next query. Same logic, readable structure: WITH gives each step a name, and the final SELECT reads from those names like tables.",
   intro:"A CTE is like prepping your ingredients before you cook: you name and set aside a result up front, then the main query uses it like any other table. A Common Table Expression (CTE) names a subquery so you can reference it like a table. It makes complex queries readable.",
   ral:{
     sql:"WITH active AS (\n  SELECT * FROM customers WHERE status = 'active'\n)\nSELECT name FROM active;",
     say:"First, build a temporary set called 'active' that holds only the customers whose status is 'active'. Then give me the names from that set.",
     lines:[
       ["WITH active AS (...)","define a named result set — the CTE"],
       ["SELECT * FROM customers WHERE status='active'","the CTE's query — runs first"],
       ["SELECT name FROM active","reference the CTE by name as if it were a table"]
     ]
   },
   notes:"CTEs are great for multi-step logic: clean data in one CTE, aggregate in another, filter in the final SELECT. They don't improve performance vs subqueries — just readability.",
   viz:{columns:["name"],rows:[["Maya Chen"],["Jordan Lee"],["Alex Kim"]],caption:"The 'active' CTE is built first, then the final SELECT reads from it like a table — same result as a subquery, far more readable."},
   quiz:{q:"What is the main benefit of a CTE over an inline subquery?",opts:["Faster execution","Can be used across multiple databases","Readability — name complex logic and reference it cleanly","Stores data permanently"],ans:2,exp:"CTEs improve readability. You name the logic once and reference it like a table — much cleaner than nesting subqueries."}
  },
  {id:12, unit:"Unit 3: Advanced SQL", title:"Reconciliation Queries", sub:"Find gaps, dupes, and mismatches",
   story:"You can write clean, readable SQL. Now the real-world trust check: 'Is this data actually right?' Reconciliation queries are the analyst's QA patterns — find duplicates, count NULLs, spot mismatches between two datasets. You can't trust an analysis until you've confirmed the data underneath it.",
   intro:"Reconciliation is like balancing a checkbook — you cross-check two records against each other to catch anything missing, doubled, or mismatched. Reconciliation means checking that data is complete, consistent, and correct. These are the patterns analysts use to QA datasets.",
   ral:{
     sql:"SELECT a.id\nFROM customers_old a\nLEFT JOIN customers b ON a.id = b.id\nWHERE b.id IS NULL;",
     say:"Find the IDs from customers_old that don't exist in the customers table — useful for spotting rows that were dropped between versions.",
     lines:[
       ["FROM customers_old a","the 'source' table — what we expect to exist"],
       ["LEFT JOIN customers b","try to match each row in the new table"],
       ["WHERE b.id IS NULL","keep only rows with no match — these are missing from the new table"]
     ]
   },
   notes:"Core recon patterns: missing rows (LEFT JOIN + IS NULL), duplicate keys (GROUP BY id HAVING COUNT > 1), value mismatches (JOIN + WHERE a.col != b.col), row counts (SELECT COUNT(*)).",
   viz:{columns:["Recon pattern","SQL shape","What it finds"],rows:[["Missing rows","LEFT JOIN … WHERE b.id IS NULL","IDs 107, 112, 118"],["Duplicate keys","GROUP BY id HAVING COUNT(*) > 1","ID 104 (appears twice)"],["Value mismatch","JOIN … WHERE a.amt <> b.amt","ID 109: 90 vs 95"]],caption:"The three core reconciliation patterns at a glance — find missing rows, duplicate keys, and value mismatches — each a different join/filter shape."},
   quiz:{q:"To find rows in table A that are missing from table B, you use:",opts:["INNER JOIN + WHERE b.id IS NULL","LEFT JOIN + WHERE b.id IS NULL","RIGHT JOIN + GROUP BY","FULL OUTER JOIN"],ans:1,exp:"LEFT JOIN keeps all of A. WHERE b.id IS NULL isolates rows that had no match in B — those are the missing ones."}
  },
  {id:15, unit:"Unit 3: Advanced SQL", title:"SQL Indexing", sub:"Speed up queries — and know when not to",
   story:"Your query runs fine on 1,000 rows. On 10 million rows, it times out. An index is the fix — a separate data structure the database uses to jump directly to the rows you need instead of reading every single row. Understanding when to use (and when NOT to use) an index is the difference between a query that runs in milliseconds and one that takes minutes.",
   intro:"An index in SQL is like the index at the back of a textbook — it doesn't hold the actual content, but it tells you exactly which page to turn to. Databases build indexes using a B-Tree structure (or Hash for equality lookups). Adding an index on a WHERE column turns a full table scan into a targeted lookup.",
   ral:{
     sql:"-- Create an index on department_id\nCREATE INDEX idx_emp_dept ON employees(department_id);\n\n-- This query now uses the index instead of scanning all rows\nSELECT * FROM employees\nWHERE department_id = 10;\n\n-- Composite index: column order matters\nCREATE INDEX idx_country_city ON addresses(country, city);",
     say:"Build an index on department_id so lookups by department skip the full table scan. Then create a composite index on (country, city) — the leftmost column is always searched first.",
     lines:[
       ["CREATE INDEX idx_name ON table(col)","build a B-Tree index on this column"],
       ["Full table scan","what happens WITHOUT an index — every row is checked sequentially"],
       ["B-Tree index","good for: WHERE =, WHERE >, WHERE BETWEEN, ORDER BY, JOIN ON"],
       ["Composite index (col1, col2)","covers queries filtering on col1 or (col1 + col2); column order matters"],
       ["Index trade-off","reads faster; writes slower — INSERT/UPDATE/DELETE must also update the index"]
     ]
   },
   notes:"Rule of thumb: index high-cardinality columns used in WHERE, JOIN, or ORDER BY. Don't index low-cardinality columns (gender, status with 2–3 values) — the full scan is actually faster because the index lookup itself has overhead. Never index small tables or columns that are updated constantly.",
   viz:{columns:["Scenario","Index it?","Why"],rows:[["WHERE email = 'x@y.com'","Yes","email is unique — index cuts millions of rows to 1 lookup"],["WHERE gender = 'F'","No","Only 2 values; scans ~50% of table anyway — overhead beats the gain"],["JOIN ON customer_id","Yes","Connecting on a key is the most common index use case"],["Frequently updated column","No","Every update must rebuild the index — write cost outweighs read benefit"],["Small 50-row table","No","Full scan of 50 rows is faster than the index overhead"]],caption:"Choose indexes by cardinality and access pattern. High-cardinality WHERE/JOIN columns win. Low-cardinality and write-heavy columns lose."},
   quiz:{q:"Which column is the best candidate for an index?",opts:["is_deleted (TRUE/FALSE only)","gender (M/F/Other)","customer_email (unique per customer)","status (active/inactive/pending)"],ans:2,exp:"customer_email has high cardinality — nearly every value is unique. Searching by email with an index jumps directly to the matching row. The other options all have 2–3 distinct values, so the database scans nearly the whole table anyway — index overhead doesn't help."}
  },
  {id:16, unit:"Unit 3: Advanced SQL", title:"Temp Tables vs Views", sub:"Intermediate storage choices and when to use each",
   story:"You're building a multi-step analysis — calculate intermediate results, then need them again in the next step. A CTE handles this inside a single query. But for heavier work across multiple queries in a session, you have two tools: a Temporary Table physically stores the result (like a whiteboard you erase when done); a View saves only the query definition (like a saved formula that re-runs every time you call it).",
   intro:"A Temporary Table stores actual data for the duration of your session — deleted automatically when the connection closes. A View stores a SQL query, not data. Every time you SELECT from a view, it re-runs the underlying query against the current data. Both are alternatives to CTEs, but they live at different scopes.",
   ral:{
     sql:"-- Temp Table: physically store the result\nCREATE TEMPORARY TABLE temp_top AS\nSELECT customer_id, SUM(revenue) AS total\nFROM orders\nGROUP BY customer_id\nHAVING total > 10000;\n\nSELECT * FROM temp_top;  -- reuse multiple times this session\n\n-- View: save the query definition\nCREATE VIEW high_value AS\nSELECT customer_id, SUM(revenue) AS total\nFROM orders\nGROUP BY customer_id\nHAVING total > 10000;\n\nSELECT * FROM high_value;  -- always fresh data",
     say:"The temp table stores today's snapshot of high-value customers for use later this session. The view re-runs the same query every time — so it always reflects the latest orders.",
     lines:[
       ["CREATE TEMPORARY TABLE","stores data physically; auto-deleted when session ends"],
       ["CREATE VIEW","stores only the SQL query definition — no physical data"],
       ["SELECT from view","re-runs the underlying query — always sees current data"],
       ["SELECT from temp table","reads the stored snapshot — fast for heavy intermediate results"],
       ["CTE vs Temp vs View","CTE = single query scope; Temp = session scope; View = permanent until dropped"]
     ]
   },
   notes:"Views are permanent (until you DROP VIEW). Temp tables are session-scoped — they disappear when the connection closes. CTEs exist only within the single query that defines them. Use CTEs for readability, temp tables for heavy multi-step ETL, and views for shared business logic or column-level access control.",
   viz:{columns:["Feature","Temp Table","View","CTE"],rows:[["Stores data?","Yes — physically","No — query only","No — inline"],["Lifetime","Current session","Permanent (until dropped)","Single query"],["Supports DML?","Yes","Usually read-only","No"],["Performance","Fast re-use of stored result","Re-runs on every SELECT","Evaluated inline"],["Best for","Multi-step ETL, heavy transforms","Shared logic, access control","Readability in one query"]],caption:"Three tools for intermediate logic — each at a different scope. CTE is per-query, Temp Table is per-session, View is permanent."},
   quiz:{q:"You want to give another analyst access to customer data but hide the salary column. Which tool fits best?",opts:["Temporary Table","CTE","View","Subquery"],ans:2,exp:"A View lets you define exactly which columns are exposed and restrict access via database permissions. The analyst queries the view and never sees the underlying salary column. A Temp Table is session-specific — it disappears when your connection closes and isn't accessible to others."}
  },
  {id:501, unit:"Unit 4: Data Migration", title:"Profiling: Counts & Uniqueness", sub:"COUNT(*), COUNT(DISTINCT) — the first thing you run.",
   story:"You've been handed a legacy customers table to migrate. Before touching it, you profile it. The very first numbers any migration analyst pulls: how many rows are there, how many are actually unique, and how many are missing a key field. Three counts tell you the shape of the mess.",
   ral:{sql:"SELECT\n  COUNT(*)               AS rows,\n  COUNT(DISTINCT email)  AS distinct_emails,\n  COUNT(email)           AS non_null_emails\nFROM legacy_customers;", say:"Count every row, count the distinct emails, and count the non-null emails — three numbers that reveal duplicates and gaps.",
     lines:[["COUNT(*)","counts every row, including duplicates and rows with NULLs"],["COUNT(DISTINCT email)","how many unique email values exist"],["COUNT(email)","counts non-NULL emails only — NULLs are skipped"],["COUNT(*) - COUNT(email)","the gap = how many rows are missing an email"],["COUNT(*) vs COUNT(DISTINCT id)","if these differ, your 'unique' key isn't unique"]]},
   notes:"Pro tip: this is the first thing to run on any unfamiliar source table. The gap between COUNT(*) and COUNT(DISTINCT primary_key) tells you whether the source has duplicate keys; the gap between COUNT(*) and COUNT(col) gives you the null rate for each column.",
   viz:{columns:["metric","value","what it means"], rows:[["rows","10,000","total records in source"],["distinct_emails","9,840","160 emails are shared/duplicated"],["non_null_emails","9,900","100 rows have no email at all"]], caption:"Three counts on one column expose two problems at once: 100 missing emails (10,000 - 9,900) and 60 duplicate emails among the rest. You now know the cleanup scope before writing a line of migration code."},
   quiz:{q:"COUNT(*) returns 10,000 but COUNT(DISTINCT customer_id) returns 9,980. What does that tell you?", opts:["The table contains 20 NULL customer ids","20 customer_ids are duplicated — not unique","The query was written incorrectly","20 rows silently failed to load in"], ans:1, exp:"COUNT(*) counts every row; COUNT(DISTINCT customer_id) counts unique ids. A 20-row gap means 20 customer_ids repeat — the key you planned to migrate on isn't actually unique. Fix before you migrate."}
  },
  {id:502, unit:"Unit 4: Data Migration", title:"Profiling: Finding Duplicates", sub:"GROUP BY … HAVING COUNT(*) > 1.",
   story:"Your counts showed 60 duplicate emails. Now you need to SEE them — which emails repeat, and how many times. GROUP BY collapses rows by email; HAVING keeps only the groups that appear more than once. This is the exact query every analyst writes to surface duplicate keys.",
   ral:{sql:"SELECT email, COUNT(*) AS n\nFROM legacy_customers\nGROUP BY email\nHAVING COUNT(*) > 1\nORDER BY n DESC;", say:"Group rows by email, count each group, and keep only the emails that appear more than once — worst offenders first.",
     lines:[["GROUP BY email","collapse rows into one group per distinct email"],["COUNT(*) AS n","how many rows share that email"],["HAVING COUNT(*) > 1","keep only groups with more than one row — the duplicates"],["HAVING vs WHERE","HAVING filters groups after aggregation; WHERE filters rows before it"],["ORDER BY n DESC","put the worst duplicates at the top"]]},
   notes:"WHERE can't see COUNT(*) — aggregates don't exist yet when WHERE runs, so duplicate-finding always uses HAVING. Pro tip: this is really about SQL's order of execution — WHERE filters rows first, HAVING filters groups after they're aggregated.",
   viz:{columns:["email","n"], rows:[["jordan@co.com","3"],["maya@co.com","2"],["sam@co.com","2"]], caption:"Only emails appearing more than once survive the HAVING filter. jordan@co.com shows up 3 times — these are the rows you must dedupe or merge before migrating."},
   quiz:{q:"Why must you use HAVING (not WHERE) to filter COUNT(*) > 1?", opts:["HAVING simply performs better here","WHERE runs before aggregation; HAVING after","The two clauses are interchangeable","WHERE cannot be used alongside GROUP BY"], ans:1, exp:"SQL evaluates WHERE before it groups and aggregates, so COUNT(*) is not available there. HAVING runs after GROUP BY, when the counts exist — that is why it is the clause for filtering aggregates."}
  },
  {id:503, unit:"Unit 4: Data Migration", title:"Profiling: Nulls & Format Chaos", sub:"IS NULL, COUNT FILTER, MIN/MAX(LENGTH), LIKE.",
   story:"Counts and duplicates done. Now the messy part: missing values and inconsistent formats. How many phone numbers are missing? And of the ones present, are they all the same shape — or a mix of '5551234' and '(555) 123-4567'? You quantify both in one pass.",
   ral:{sql:"SELECT\n  COUNT(*) FILTER (WHERE phone IS NULL) AS missing_phone,\n  MIN(LENGTH(phone))                    AS min_len,\n  MAX(LENGTH(phone))                    AS max_len\nFROM legacy_customers;", say:"Count how many phones are missing, and find the shortest and longest phone length — a wide length range means inconsistent formats.",
     lines:[["phone IS NULL","tests for missing values — never use = NULL"],["COUNT(*) FILTER (WHERE …)","count only rows matching a condition; turns \"any nulls?\" into \"exactly how many\""],["LENGTH(phone)","the character count of each value"],["MIN/MAX(LENGTH(…))","the spread of lengths exposes format chaos (7 vs 14 chars)"],["LIKE / REGEXP","WHERE phone NOT LIKE '___-___-____' finds malformed entries"]]},
   notes:"= NULL is always false — NULL means 'unknown', so it never equals anything, including itself. Use IS NULL / IS NOT NULL. And a MIN length of 7 with a MAX of 14 is your signal that formats are inconsistent and need a cleansing rule before load.",
   viz:{columns:["missing_phone","min_len","max_len"], rows:[["240","7","14"]], caption:"240 rows have no phone at all. Among those that do, lengths run 7 to 14 characters — some are bare digits, others carry area codes and dashes. Both findings become explicit rules in your cleansing step."},
   quiz:{q:"Why does WHERE phone = NULL return no rows, even when phones are missing?", opts:["NULL is secretly stored as a zero","NULL never equals anything; use IS NULL","The phone column is stored as text","The = operator only works on numbers"], ans:1, exp:"NULL represents 'unknown', so any comparison with = (even = NULL) evaluates to false/unknown and returns nothing. IS NULL is the only correct test for missing values."}
  },
  {id:504, unit:"Unit 4: Data Migration", title:"Cleansing: Standardize Text", sub:"TRIM, UPPER/LOWER, REPLACE.",
   story:"Profiling found trailing spaces on names and a mix of 'CA', 'ca', and 'Ca' for state. To a human those look equal; to SQL they're different strings that land in separate groups and break joins to your reference tables. One cleansing pass standardizes them.",
   ral:{sql:"SELECT\n  TRIM(name)              AS name,\n  UPPER(state)            AS state,\n  REPLACE(phone, '-', '') AS phone\nFROM legacy_customers;", say:"Strip surrounding spaces off the name, force the state to uppercase, and remove dashes from the phone — one clean pass.",
     lines:[["TRIM(name)","remove leading/trailing spaces: ' Maya ' becomes 'Maya'"],["UPPER(state)","force one case so 'ca', 'CA', 'Ca' all become 'CA' and match"],["REPLACE(phone, '-', '')","swap every dash for nothing, normalizing the format"],["why it matters","trailing spaces and mixed case silently break joins and GROUP BY"]]},
   notes:"'CA' and 'ca ' look identical to a person but are different strings to SQL — they fall into separate groups and fail key matches against a target reference table. Standardizing case and whitespace is a core cleansing step in any migration.",
   viz:{columns:["raw","cleaned"], rows:[["' Maya Chen '","Maya Chen"],["ca","CA"],["555-123-4567","5551234567"]], caption:"Same three values before and after TRIM / UPPER / REPLACE. Now every state code matches the target standard and the phone is a consistent digit string ready to validate."},
   quiz:{q:"Two rows with customer 'Maya' fail to join — one is stored as 'Maya', the other as 'Maya ' (trailing space). Best fix?", opts:["Delete one of the two Maya rows","TRIM both sides so the values match","Switch the query to a LEFT JOIN","Change the column's data type"], ans:1, exp:"The trailing space makes 'Maya ' a different string from 'Maya', so the join fails. TRIM removes surrounding whitespace on both sides so the keys match."}
  },
  {id:505, unit:"Unit 4: Data Migration", title:"Mapping: CASE WHEN (source → target)", sub:"The workhorse for source-to-target value mapping.",
   story:"Your source stores status as 'A', 'active', and '1' — all meaning the same thing. The target system only accepts 'Active' or 'Inactive'. You need to map every messy source value to the one standard target value. CASE WHEN is how you implement that mapping in SQL.",
   ral:{sql:"SELECT raw_status,\n  CASE\n    WHEN raw_status IN ('A','active','1') THEN 'Active'\n    WHEN raw_status IN ('I','inactive','0') THEN 'Inactive'\n    ELSE 'Unknown'\n  END AS status\nFROM legacy_customers;", say:"Map every messy source status to one of the target's standard values — anything unrecognized becomes 'Unknown'.",
     lines:[["CASE","start a rule that returns a value based on conditions"],["WHEN … IN ('A','active','1') THEN 'Active'","many source spellings collapse to one target value"],["ELSE 'Unknown'","the catch-all for source values you didn't plan for"],["END AS status","close the CASE and name the output column"],["the big idea","each WHEN is one source-to-target mapping rule, in SQL"]]},
   notes:"This is literally how you implement a source-to-target mapping document: each WHEN is one mapping rule, and the ELSE is your safety net that surfaces unmapped values instead of letting them slip through. Pro tip: always review everything landing in 'Unknown' — it catches gaps in the mapping spec.",
   viz:{columns:["raw_status","mapped status"], rows:[["A","Active"],["active","Active"],["1","Active"],["I","Inactive"],["X","Unknown"]], caption:"Five different source values, mapped to the target's three allowed values. 'X' was never in the spec, so the ELSE routes it to 'Unknown' — visible, not silently dropped."},
   quiz:{q:"Why include ELSE 'Unknown' rather than leaving it off?", opts:["It makes the CASE expression run faster","It surfaces unmapped values instead of NULL","CASE syntax requires an ELSE branch","It removes duplicate rows from output"], ans:1, exp:"Without ELSE, unmatched values return NULL and disappear into the noise. An explicit ELSE 'Unknown' makes unmapped source values visible so you can review and extend the mapping."}
  },
  {id:506, unit:"Unit 4: Data Migration", title:"Type Coercion & Defaults: CAST + COALESCE", sub:"CAST/CONVERT for types, COALESCE for NULL defaults.",
   story:"The target columns are strictly typed: signup_date is a DATE, amount is DECIMAL, and region is NOT NULL. But your source holds them all as text, with some regions blank. Load it as-is and the migration rejects the rows. CAST coerces the types; COALESCE supplies defaults.",
   ral:{sql:"SELECT\n  CAST(signup_date AS DATE)         AS signup_date,\n  CAST(amount AS DECIMAL(10,2))     AS amount,\n  COALESCE(region, 'Unassigned')    AS region\nFROM legacy_customers;", say:"Convert the text date into a real date, the text amount into a decimal number, and replace any missing region with 'Unassigned'.",
     lines:[["CAST(signup_date AS DATE)","coerce text like '2026-03-15' into a true DATE type"],["CAST(amount AS DECIMAL(10,2))","text '144.50' becomes a number you can SUM"],["COALESCE(region, 'Unassigned')","return the first non-NULL value: region, else the default"],["why it matters","typed target columns reject text; NOT NULL columns reject blanks"]]},
   notes:"Migrations fail at load when a text column meets a typed target column. CAST (or CONVERT in SQL Server) does the coercion; COALESCE supplies a default so NOT NULL target columns don't reject the row. COALESCE returns the first non-NULL argument and can be chained across several fallbacks.",
   viz:{columns:["source (text)","after CAST / COALESCE","target type"], rows:[["'2026-03-15'","2026-03-15","DATE"],["'144.50'","144.50","DECIMAL(10,2)"],["(blank)","Unassigned","VARCHAR NOT NULL"]], caption:"Each text value is coerced to the type the target demands, and the blank region is backfilled with a default so the NOT NULL column accepts the row. The data is now load-ready."},
