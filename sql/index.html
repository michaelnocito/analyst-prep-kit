<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SQL Prep Kit</title>
<style>
:root{--bg:#171513;--surf:#201d1a;--surf2:#292520;--accent:#58aaa2;--accent2:#3d7a74;--text:#e8e0d5;--dim:#9a8f84;--border:#3a342e;--success:#4caf78;--err:#e05c5c;--warn:#d4a843;--radius:8px;--font:'Segoe UI',system-ui,sans-serif;--mono:'Consolas',ui-monospace,monospace}
[data-theme="light"]{--bg:#ddd6c8;--surf:#ffffff;--surf2:#f5f0e9;--accent:#116d69;--accent2:#0d5551;--text:#1a1410;--dim:#6b5f52;--border:#c8bfb4;--success:#2d7a4a;--err:#c0392b;--warn:#b07d20}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}button,input,textarea{font:inherit}a{color:var(--accent);text-decoration:none}
nav{background:var(--surf);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:4px;height:52px;position:sticky;top:0;z-index:100}.nav-logo{font-weight:700;font-size:16px;margin-right:12px;color:var(--accent);white-space:nowrap}.nav-logo span{color:var(--text)}.nav-btn{background:var(--surf2);border:1px solid var(--border);color:var(--dim);cursor:pointer;padding:8px 14px;border-radius:10px;font-size:13px;transition:.15s}.nav-btn:hover{color:var(--text);border-color:var(--accent)}.nav-btn.active{background:rgba(88,170,162,.15);color:var(--accent);border-color:var(--accent)}.spacer{flex:1}.theme-btn,.settings-btn{background:none;border:1px solid var(--border);color:var(--text);cursor:pointer;padding:4px 10px;border-radius:6px;font-size:13px}.theme-btn:hover,.settings-btn:hover{border-color:var(--accent)}
.view{display:none;max-width:980px;margin:0 auto;padding:28px 20px}.view.active{display:block}.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}.card-sm{background:var(--surf2);border:1px solid var(--border);border-radius:var(--radius);padding:14px}.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:600;background:var(--surf2);color:var(--dim);border:1px solid var(--border)}.tag.accent{background:var(--accent);color:#fff;border-color:var(--accent)}.tag.success{background:var(--success);color:#fff;border-color:var(--success)}.tag.warn{background:rgba(212,168,67,.15);color:var(--warn);border-color:var(--warn)}
h1{font-size:24px;font-weight:700;margin-bottom:6px}h2{font-size:19px;font-weight:700;margin-bottom:12px}h3{font-size:15px;font-weight:600;margin-bottom:8px}p{line-height:1.6;color:var(--dim);margin-bottom:10px}.mono{font-family:var(--mono)}
.btn{display:inline-block;padding:9px 18px;border-radius:6px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:all .15s}.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}.btn-outline{background:none;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--accent);color:var(--accent)}.btn-ghost{background:none;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.92)}.btn-sm{padding:5px 12px;font-size:13px}
.resume-card{background:var(--accent);border-radius:var(--radius);padding:24px 28px;margin-bottom:16px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:space-between;gap:16px;cursor:pointer}.resume-card h2{color:#fff;margin-bottom:4px}.resume-card p{color:rgba(255,255,255,.82);margin:0}.resume-card-watermark{position:absolute;right:-10px;top:-10px;font-size:100px;font-weight:900;color:rgba(0,0,0,.1);font-family:var(--mono);line-height:1;user-select:none}
.path-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}.path-tile{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all .15s}.path-tile:hover{border-color:var(--accent);transform:translateY(-1px)}.path-tile h3{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--dim);margin-bottom:6px}.path-tile .count{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--text)}.path-tile .sub{font-size:12px;color:var(--dim);margin-top:2px}.prog-bar{height:4px;background:var(--surf2);border-radius:2px;margin-top:8px;overflow:hidden}.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s}
.readiness-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}.readiness-row:last-child{border:none}.readiness-label{width:180px;font-size:13px;flex-shrink:0}.readiness-bar-wrap{flex:1;height:6px;background:var(--surf2);border-radius:3px;overflow:hidden}.readiness-bar{height:100%;background:var(--accent);border-radius:3px}.readiness-pct{width:36px;text-align:right;font-size:13px;font-family:var(--mono);color:var(--dim)}
.lesson-grid,.drill-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}.lesson-card,.drill-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:.15s}.lesson-card:hover,.drill-card:hover{border-color:var(--accent);transform:translateY(-1px)}.lesson-card.done,.drill-card.done{border-color:var(--success)}.lesson-header{margin-bottom:20px}.lesson-progress{font-size:13px;color:var(--dim);margin-bottom:8px}.gotcha{background:var(--surf2);border-left:3px solid var(--warn);padding:10px 14px;border-radius:0 6px 6px 0;margin:10px 0;font-size:13px}.gotcha strong{color:var(--warn)}
.quiz-q{font-size:15px;font-weight:600;margin-bottom:14px;line-height:1.5}.quiz-opts{display:flex;flex-direction:column;gap:8px}.quiz-opt{background:var(--surf2);border:1px solid var(--border);border-radius:6px;padding:11px 14px;cursor:pointer;font-size:14px;text-align:left;color:var(--text);font-family:var(--mono);transition:all .15s}.quiz-opt:hover{border-color:var(--accent)}.quiz-opt.correct{border-color:var(--success);background:rgba(76,175,120,.1);color:var(--success)}.quiz-opt.wrong{border-color:var(--err);background:rgba(224,92,92,.1);color:var(--err)}.quiz-feedback{margin-top:12px;padding:10px 14px;border-radius:6px;font-size:14px;line-height:1.5}.quiz-feedback.ok{background:rgba(76,175,120,.1);border:1px solid var(--success);color:var(--success)}.quiz-feedback.bad{background:rgba(224,92,92,.1);border:1px solid var(--err);color:var(--err)}
.code-block{font-family:var(--mono);font-size:13px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px 14px;margin:10px 0;color:var(--accent);white-space:pre-wrap;overflow-x:auto;line-height:1.6}.drill-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;resize:vertical;min-height:44px}.drill-input:focus{border-color:var(--accent)}.drill-input.ok{border-color:var(--success)}.drill-input.bad{border-color:var(--err)}.check-row{display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap}.result-msg{font-size:13px;padding:8px 12px;border-radius:6px;margin-top:8px}.result-msg.ok{background:rgba(76,175,120,.12);border:1px solid var(--success);color:var(--success)}.result-msg.bad{background:rgba(224,92,92,.12);border:1px solid var(--err);color:var(--err)}
.parsons-pool,.parsons-answer{min-height:44px;border:2px dashed var(--border);border-radius:6px;padding:8px;display:flex;flex-wrap:wrap;gap:6px;transition:border-color .15s}.parsons-answer{border-color:var(--accent2);min-height:52px}.parsons-chip{background:var(--surf2);border:1px solid var(--border);border-radius:4px;padding:6px 12px;font-family:var(--mono);font-size:12px;cursor:pointer;user-select:none}.parsons-chip:hover{border-color:var(--accent)}.parsons-label{font-size:12px;color:var(--dim);margin:8px 0 6px;text-transform:uppercase;letter-spacing:.05em}.bug-card{border:1px solid var(--err);border-radius:var(--radius);padding:16px;margin-bottom:12px;background:rgba(224,92,92,.05)}
.fc-scene{perspective:600px;width:100%;max-width:500px;margin:0 auto 20px;height:220px;cursor:pointer}.fc-inner{width:100%;height:100%;transform-style:preserve-3d;transition:transform .4s;position:relative}.fc-inner.flipped{transform:rotateY(180deg)}.fc-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}.fc-front{background:var(--surf);border:2px solid var(--accent);font-size:18px;font-weight:700;font-family:var(--mono);color:var(--accent)}.fc-back{background:var(--accent);transform:rotateY(180deg);font-size:13px;color:#fff;line-height:1.6;flex-direction:column;gap:8px}.fc-nav{display:flex;align-items:center;justify-content:center;gap:16px}.fc-count{font-size:13px;color:var(--dim)}
.gloss-search{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:9px 14px;color:var(--text);font-size:14px;outline:none;margin-bottom:16px}.gloss-item{padding:12px 0;border-bottom:1px solid var(--border)}.gloss-term{font-weight:700;font-size:14px;color:var(--accent);margin-bottom:3px;font-family:var(--mono)}.gloss-def{font-size:13px;color:var(--dim);line-height:1.5}
.terminal-wrap{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-top:12px}.terminal-header{background:var(--surf2);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}.terminal-dots{display:flex;gap:6px}.terminal-dot{width:10px;height:10px;border-radius:50%}.terminal-label{font-size:12px;color:var(--dim);font-family:var(--mono)}.terminal-editor{width:100%;background:transparent;border:none;padding:14px;color:var(--text);font-family:var(--mono);font-size:13px;resize:vertical;min-height:120px;outline:none;line-height:1.6}.terminal-output{border-top:1px solid var(--border);padding:12px 14px;font-family:var(--mono);font-size:13px;min-height:60px;max-height:300px;overflow:auto;white-space:pre-wrap;line-height:1.6}.terminal-output.idle{color:var(--dim)}.terminal-output.ok{color:var(--success)}.terminal-output.err{color:var(--err)}.dataset-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.dataset-chip{background:var(--surf2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;cursor:pointer;color:var(--dim)}.dataset-chip.active,.dataset-chip:hover{border-color:var(--accent);color:var(--accent)}
.flash-overlay{position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0}.flash-overlay.go{animation:spflash .7s ease-out}@keyframes spflash{0%{opacity:0}18%{opacity:1}100%{opacity:0}}.settings-panel{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center}.settings-panel.open{display:flex}.settings-box{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:28px;width:340px;max-width:94vw}
@media(max-width:700px){.path-grid{grid-template-columns:1fr}.view{padding:16px 12px}nav{padding:0 10px;overflow:auto}.nav-logo{font-size:14px}}
</style>
</head>
<body>
<div class="flash-overlay" id="flashOverlay"></div>
<nav>
  <div class="nav-logo">SQL<span>Kit</span></div>
  <button class="nav-btn active" onclick="show('home')">Home</button>
  <button class="nav-btn" onclick="show('learn')">Learn</button>
  <button class="nav-btn" onclick="show('practice')">Practice</button>
  <button class="nav-btn" onclick="show('cards')">Cards</button>
  <button class="nav-btn" onclick="show('glossary')">Glossary</button>
  <div class="spacer"></div>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀</button>
  <button class="settings-btn" onclick="openSettings()">⚙</button>
</nav>
<div class="view active" id="view-home"></div>
<div class="view" id="view-learn"></div>
<div class="view" id="view-practice"></div>
<div class="view" id="view-cards"></div>
<div class="view" id="view-glossary"></div>
<div class="settings-panel" id="settingsPanel"><div class="settings-box"><h2 style="margin-bottom:16px">Settings</h2><p style="margin-bottom:16px">Reset all progress and start fresh.</p><button class="btn btn-outline btn-sm" onclick="resetAll()" style="border-color:var(--err);color:var(--err)">Reset all progress</button><br><br><button class="btn btn-outline btn-sm" onclick="closeSettings()">Close</button></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<script>
const DATA={
LESSONS:[
{id:'l1',wk:1,title:'SELECT & FROM',intro:'Every SQL query starts here. SELECT tells the database which columns you want; FROM tells it which table to look in.',sql:'SELECT first_name, last_name\nFROM customers;',explain:'Read it out loud: "Select first name and last name from the customers table."',gotcha:'Forgetting the semicolon is fine in most tools — but get in the habit.',quiz:[{q:'What does SELECT do?',opts:['Picks which columns to return','Filters rows','Sorts the result','Joins two tables'],a:0,fb:'SELECT lists the columns you want back from the query.'},{q:'What does FROM do?',opts:['Filters rows by condition','Names the table to query','Sorts the output','Counts rows'],a:1,fb:'FROM names the table.'},{q:'Which query returns every column?',opts:['SELECT all FROM customers','SELECT * FROM customers','SELECT customers','FROM customers SELECT'],a:1,fb:'SELECT * returns every column.'}]},
{id:'l2',wk:1,title:'WHERE',intro:'WHERE filters rows. Only rows where the condition is true come back.',sql:'SELECT *\nFROM orders\nWHERE amount > 100;',explain:'Read it: "Select everything from orders where amount is greater than 100."',gotcha:'Text values need quotes.',quiz:[{q:'What does WHERE do?',opts:['Selects columns','Filters rows by a condition','Sorts the result','Groups rows'],a:1,fb:'WHERE filters rows.'},{q:'Which WHERE clause finds customers in Texas?',opts:["WHERE state > 'TX'",'WHERE state = TX',"WHERE state = 'TX'",'WHERE TX = state'],a:2,fb:'String values need single quotes.'},{q:'Can you use WHERE without SELECT?',opts:['Yes','No, it is part of a larger query','Only with UPDATE','Only with DELETE'],a:1,fb:'WHERE is a clause inside a query.'}]},
{id:'l3',wk:1,title:'ORDER BY',intro:'ORDER BY sorts your results. ASC is low-to-high; DESC is high-to-low.',sql:'SELECT first_name, amount\nFROM orders\nORDER BY amount DESC;',explain:'Read it: "Select first name and amount from orders, ordered by amount, highest first."',gotcha:'Without ORDER BY, result order is not guaranteed.',quiz:[{q:'What does DESC mean in ORDER BY?',opts:['Delete rows','Sort descending','Sort ascending','Display every column'],a:1,fb:'DESC = highest to lowest.'},{q:'Where does ORDER BY go?',opts:['Before FROM','After SELECT','At the end','Right after WHERE'],a:2,fb:'ORDER BY comes at the end.'},{q:'Which sorts names A→Z?',opts:['ORDER BY name DESC','ORDER BY name ASC','SORT BY name','ORDER name'],a:1,fb:'ASC sorts low to high / A to Z.'}]},
{id:'l4',wk:1,title:'INNER JOIN',intro:'INNER JOIN returns only rows that match in both tables.',sql:'SELECT customers.first_name, orders.amount\nFROM customers\nINNER JOIN orders ON customers.id = orders.customer_id;',explain:'Read it: "Select first name and amount from customers joined to orders where the IDs match."',gotcha:'Unmatched rows are excluded.',quiz:[{q:'What does INNER JOIN return?',opts:['All rows from both tables','Only rows with a match in both tables','Rows with no match','NULL-padded rows'],a:1,fb:'INNER JOIN keeps matched rows only.'},{q:'What links the tables in ON?',opts:['Same column names','A matching key','Table names','Row count'],a:1,fb:'ON uses the matching key columns.'},{q:'A customer with no orders appears?',opts:['Yes','No','Only with *','Only with DISTINCT'],a:1,fb:'INNER JOIN drops unmatched rows.'}]},
{id:'l5',wk:1,title:'LEFT JOIN',intro:'LEFT JOIN keeps every row from the left table and fills unmatched right-side columns with NULL.',sql:'SELECT customers.first_name, orders.amount\nFROM customers\nLEFT JOIN orders ON customers.id = orders.customer_id;',explain:'Read it: "Keep every customer, fill NULL if they have no order."',gotcha:'NULL on the right side means no match.',quiz:[{q:'What makes LEFT JOIN different?',opts:['It is faster','It keeps all left-table rows','It removes NULLs','Nothing'],a:1,fb:'LEFT JOIN preserves the left table.'},{q:'Customer with no orders returns…',opts:['No row','A row with NULLs','An error','A zero amount'],a:1,fb:'The row appears with NULL order columns.'},{q:'Which is the left table?',opts:['The one in ON','The one after JOIN','The one after FROM','The larger table'],a:2,fb:'The left table is the one in FROM.'}]},
{id:'l6',wk:1,title:'COUNT & SUM',intro:'Aggregate functions collapse many rows into one number.',sql:'SELECT COUNT(*) AS total_orders,\nSUM(amount) AS revenue\nFROM orders;',explain:'Read it: "Count every row and sum the amount column from orders."',gotcha:'COUNT(column) skips NULLs; COUNT(*) does not.',quiz:[{q:'What does COUNT(*) return?',opts:['A sum','The number of rows','The largest value','The column names'],a:1,fb:'COUNT(*) counts rows.'},{q:'What does SUM do?',opts:['Counts rows','Adds up numeric values','Finds the average','Returns the maximum'],a:1,fb:'SUM adds numeric values.'},{q:'COUNT(email) vs COUNT(*)?',opts:['No difference','COUNT(email) skips NULL emails','COUNT(email) is faster','COUNT(*) counts distinct rows'],a:1,fb:'COUNT(column) skips NULLs in that column.'}]},
{id:'l7',wk:1,title:'GROUP BY',intro:'GROUP BY splits rows into groups so aggregate functions run on each group.',sql:'SELECT state, COUNT(*) AS customers\nFROM customers\nGROUP BY state;',explain:'Read it: "Count customers grouped by state."',gotcha:'Non-aggregate columns in SELECT must appear in GROUP BY.',quiz:[{q:'What does GROUP BY do?',opts:['Sorts','Filters','Splits rows into groups','Removes duplicates'],a:2,fb:'GROUP BY creates groups.'},{q:'You SELECT state and COUNT(*). Which goes in GROUP BY?',opts:['COUNT(*)','state','Both','Neither'],a:1,fb:'state goes in GROUP BY.'},{q:'HAVING vs WHERE?',opts:['Same thing','WHERE filters before grouping; HAVING after','HAVING filters individual rows','WHERE only works with JOIN'],a:1,fb:'WHERE is before grouping, HAVING is after.'}]},
{id:'l8',wk:2,title:'NULLs',intro:'NULL means unknown or missing — not zero, not empty string.',sql:'SELECT *\nFROM customers\nWHERE email IS NULL;',explain:'Read it: "Return customers where email is unknown."',gotcha:'Use IS NULL, not = NULL.',quiz:[{q:'How do you find missing email?',opts:['WHERE email = NULL','WHERE email IS NULL','WHERE email = ""','WHERE NULL(email)'],a:1,fb:'IS NULL is correct.'},{q:'NULL = NULL evaluates to…',opts:['TRUE','FALSE','NULL','1'],a:2,fb:'Comparisons with NULL return NULL.'},{q:'Which function gives a fallback?',opts:['ISNULL()','NVL()','COALESCE()','IFNULL() only'],a:2,fb:'COALESCE returns the first non-NULL value.'}]},
{id:'l9',wk:2,title:'Duplicates & DISTINCT',intro:'DISTINCT removes duplicates from your result; HAVING COUNT(*) > 1 finds duplicates in data.',sql:'SELECT email, COUNT(*) AS ct\nFROM customers\nGROUP BY email\nHAVING COUNT(*) > 1;',explain:'Read it: "Find emails that appear more than once."',gotcha:'DISTINCT changes output only — not table data.',quiz:[{q:'What does DISTINCT do?',opts:['Deletes duplicates from the table','Returns unique result rows','Counts duplicates','Sorts alphabetically'],a:1,fb:'DISTINCT filters the result set.'},{q:'Which query finds duplicate emails?',opts:['WHERE email APPEARS > 1','GROUP BY email HAVING COUNT(*) > 1','SELECT DISTINCT email','WHERE DUPLICATE(email)'],a:1,fb:'GROUP BY + HAVING COUNT(*) > 1.'},{q:'After SELECT DISTINCT email, how many rows exist in the table?',opts:['The same as before','Fewer','Zero','Depends'],a:0,fb:'DISTINCT does not modify the table.'}]},
{id:'l10',wk:2,title:'Reconciliation',intro:'Reconciliation queries compare two tables to find what is missing.',sql:'SELECT o.id, o.email\nFROM customers_old o\nLEFT JOIN customers c ON o.email = c.email\nWHERE c.email IS NULL;',explain:'Read it: "Show old customers whose email does not exist in the new customers table."',gotcha:'IS NULL on the right side of a LEFT JOIN means no match.',quiz:[{q:'What does IS NULL on the right side mean?',opts:['A bug','No matching row was found','The join failed','Both tables are empty'],a:1,fb:'It means no match was found.'},{q:'Which pattern finds rows in A missing from B?',opts:['INNER JOIN','LEFT JOIN + WHERE b.id IS NULL','RIGHT JOIN','FULL OUTER JOIN'],a:1,fb:'LEFT JOIN + IS NULL.'},{q:'What is reconciliation used for?',opts:['Sorting','Finding missing records after a migration or load','Counting rows','Updating data'],a:1,fb:'Reconciliation checks for missing records.'}]},
{id:'l11',wk:2,title:'CASE & COALESCE',intro:'CASE is SQL if/then/else. COALESCE returns the first non-NULL value.',sql:"SELECT first_name,\nCASE WHEN amount > 200 THEN 'high' WHEN amount > 100 THEN 'mid' ELSE 'low' END AS tier,\nCOALESCE(email, 'no email') AS contact\nFROM orders JOIN customers ON customers.id = orders.customer_id;",explain:'Read it: "Classify each order and replace NULL email with no email."',gotcha:'In COALESCE, argument order matters.',quiz:[{q:'What does CASE do?',opts:['Loops rows','Returns different values based on a condition','Deletes rows','Creates a new table'],a:1,fb:'CASE is a conditional expression.'},{q:'COALESCE(email, "no email") returns…',opts:['Always no email','email if not NULL, otherwise no email','NULL if email is NULL','An error'],a:1,fb:'COALESCE returns the first non-NULL argument.'},{q:'What is wrong with COALESCE("no email", email)?',opts:['Nothing','The fallback is always returned','COALESCE takes one arg','Need IS NULL instead'],a:1,fb:'The string literal is never NULL, so it always wins.'}]},
{id:'l12',wk:2,title:'Subqueries',intro:'A subquery is a query nested inside another query. The inner query runs first.',sql:"SELECT first_name\nFROM customers\nWHERE id IN (SELECT customer_id FROM orders WHERE amount > 200);",explain:'Read it: "Return customers whose ID appears in the list of high-value orders."',gotcha:'Think of the subquery as a temporary list.',quiz:[{q:'When does the subquery run?',opts:['After the outer query','At the same time','Before the outer query','Never'],a:2,fb:'The subquery runs first.'},{q:'What does IN do with a subquery result?',opts:['Joins tables','Checks whether a value is in the returned list','Counts the rows','Filters NULLs'],a:1,fb:'IN checks for membership in the returned list.'},{q:'What is a subquery?',opts:['A stored procedure','A query nested inside another query','A type of JOIN','A view'],a:1,fb:'A subquery is a SELECT inside another query.'}]}
],
CARDS:[['SELECT / FROM','SELECT names the columns you want. FROM names the table.'],['WHERE','Filters rows before any aggregation.'],['ORDER BY','Sorts the final result. DESC = high to low.'],['INNER JOIN','Returns only rows with a match in both tables.'],['LEFT JOIN','Returns all rows from the left table.'],['COUNT(*)','Counts every row including NULLs.'],['SUM','Adds all non-NULL numeric values in a column.'],['GROUP BY','Splits rows into groups so aggregate functions run on each group.'],['HAVING','Filters groups after aggregation.'],['NULL','Means unknown or missing — not zero.'],['COALESCE','Returns the first non-NULL argument.'],['CASE WHEN','SQL if/then/else.'],['Subquery','A SELECT inside another SELECT.'],['Reconciliation','LEFT JOIN + WHERE right.key IS NULL finds missing rows.'],['AS (alias)','Renames a column or table in the result.'],['ON','Specifies the join condition.'],['IN','Checks whether a value matches any item in a list.'],['IS NULL','The correct way to test for NULL.'],['BETWEEN','Inclusive range filter.'],['LIKE','Pattern match using % and _.'],['DDL vs DML','DDL defines structure. DML changes data.'],['AVG','Returns the average of non-NULL values.'],['MAX / MIN','Return the largest or smallest value.'],['DISTINCT','Returns only unique result rows.']],

function celebrate(ok){const el=q('#flashOverlay');el.style.background=ok?'rgba(76,175,120,.2)':'rgba(224,92,92,.2)';el.classList.remove('go');void el.offsetWidth;el.classList.add('go');try{const a=new(window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator(),g=a.createGain();o.type=ok?'sine':'sawtooth';o.frequency.value=ok?660:180;g.gain.value=.04;o.connect(g);g.connect(a.destination);o.start();if(ok)o.frequency.exponentialRampToValueAtTime(880,a.currentTime+.15);else o.frequency.exponentialRampToValueAtTime(90,a.currentTime+.2);g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+.25);o.stop(a.currentTime+.25)}catch(e){}}

function renderHome(){const drills=state.doneExercises.length+state.parsDone.length+state.bugDone.length;const html=`<div class="resume-card" onclick="show('learn')"><div><h2>Learn SQL by reading it out loud</h2><p>Real queries. Real SQLite. Real readiness.</p></div><button class="btn btn-ghost">Start Learning →</button><div class="resume-card-watermark">SQL</div></div><div class="path-grid"><div class="path-tile" onclick="show('learn')"><h3>Lessons</h3><div class="count">${state.doneLessons.length}/${DATA.LESSONS.length}</div><div class="sub">Concepts + quizzes</div><div class="prog-bar"><div class="prog-fill" style="width:${pct(state.doneLessons.length,DATA.LESSONS.length)}%"></div></div></div><div class="path-tile" onclick="show('practice')"><h3>Practice</h3><div class="count">${drills}</div><div class="sub">Drills solved</div><div class="prog-bar"><div class="prog-fill" style="width:${Math.min(100,drills*8)}%"></div></div></div><div class="path-tile" onclick="show('cards')"><h3>Flashcards</h3><div class="count">${DATA.CARDS.length}</div><div class="sub">Key concepts</div><div class="prog-bar"><div class="prog-fill" style="width:100%"></div></div></div></div><div class="card"><h2>Your Readiness Score</h2><div class="readiness-row"><div class="readiness-label">Learn tab</div><div class="readiness-bar-wrap"><div class="readiness-bar" style="width:${pct(state.doneLessons.length,DATA.LESSONS.length)}%"></div></div><div class="readiness-pct">${pct(state.doneLessons.length,DATA.LESSONS.length)}%</div></div><div class="readiness-row"><div class="readiness-label">Exercises</div><div class="readiness-bar-wrap"><div class="readiness-bar" style="width:${pct(state.doneExercises.length,DATA.EXERCISES.length)}%"></div></div><div class="readiness-pct">${pct(state.doneExercises.length,DATA.EXERCISES.length)}%</div></div><div class="readiness-row"><div class="readiness-label">Parsons</div><div class="readiness-bar-wrap"><div class="readiness-bar" style="width:${pct(state.parsDone.length,DATA.PARSONS.length)}%"></div></div><div class="readiness-pct">${pct(state.parsDone.length,DATA.PARSONS.length)}%</div></div><div class="readiness-row"><div class="readiness-label">Fix the Bug</div><div class="readiness-bar-wrap"><div class="readiness-bar" style="width:${pct(state.bugDone.length,DATA.BUGS.length)}%"></div></div><div class="readiness-pct">${pct(state.bugDone.length,DATA.BUGS.length)}%</div></div></div>`;q('#view-home').innerHTML=html}
function renderLearn(){if(state.lesson){return renderLesson(state.lesson)}const groups={1:'Week 1 · Reading & core querying',2:'Week 2 · Validation & applied patterns'};let html='<h1>Learn</h1><p>Open a lesson, read the query, and answer the quiz.</p>';Object.keys(groups).forEach(w=>{html+=`<div class="card"><div class="tag accent" style="margin-bottom:12px">${groups[w]}</div><div class="lesson-grid">`;DATA.LESSONS.filter(x=>x.wk==w).forEach(l=>{html+=`<div class="lesson-card ${state.doneLessons.includes(l.id)?'done':''}" onclick="openLesson('${l.id}')"><div class="tag ${state.doneLessons.includes(l.id)?'success':''}" style="margin-bottom:8px">${state.doneLessons.includes(l.id)?'Done':'Lesson'}</div><h3>${l.title}</h3><p>${l.intro}</p></div>`});html+='</div></div>'});q('#view-learn').innerHTML=html}

function renderLesson(id){const l=DATA.LESSONS.find(x=>x.id===id);let step=0,picked=null,locked=false;function draw(){let html=`<div class="card"><button class="btn btn-outline btn-sm" onclick="backLearn()">← Back</button><div class="lesson-header" style="margin-top:16px"><div class="lesson-progress">${l.title}</div><h1>${l.title}</h1><p>${l.intro}</p><div class="code-block">${l.sql.replace(/</g,'&lt;')}</div><p>${l.explain}</p><div class="gotcha"><strong>Gotcha:</strong> ${l.gotcha}</div></div><h2>Quiz</h2><div class="quiz-q">${l.quiz[step].q}</div><div class="quiz-opts">`;l.quiz[step].opts.forEach((o,i)=>{let cls='quiz-opt';if(locked&&i===l.quiz[step].a)cls+=' correct';if(locked&&picked===i&&i!==l.quiz[step].a)cls+=' wrong';html+=`<button class="${cls}" onclick="lessonPick(${i})">${o}</button>`});html+='</div>';if(locked)html+=`<div class="quiz-feedback ${picked===l.quiz[step].a?'ok':'bad'}">${l.quiz[step].fb}</div><div class="check-row"><button class="btn btn-primary btn-sm" onclick="lessonNext()">${step===l.quiz.length-1?'Finish lesson':'Next question'}</button></div>`;html+='</div>';q('#view-learn').innerHTML=html}window.lessonPick=i=>{if(locked)return;picked=i;locked=true;if(i===l.quiz[step].a)celebrate(true);else celebrate(false);draw()};window.lessonNext=()=>{if(step<l.quiz.length-1){step++;picked=null;locked=false;draw()}else{if(!state.doneLessons.includes(l.id))state.doneLessons.push(l.id);persist();state.lesson=null;renderLearn()}};draw()}

function renderPractice(){if(state.practiceMode==='exercise')return renderExercise(state.practiceId);if(state.practiceMode==='parsons')return renderParsons(state.practiceId);if(state.practiceMode==='bug')return renderBug(state.practiceId);if(state.practiceMode==='terminal')return renderTerminal();let html='<h1>Practice</h1><p>Three ways to drill: guided exercises, Parsons, and Fix the Bug.</p>';html+='<div class="card"><h2>Guided exercises</h2><div class="drill-grid">';DATA.EXERCISES.forEach(e=>{html+=`<div class="drill-card ${state.doneExercises.includes(e.id)?'done':''}" onclick="openExercise('${e.id}')"><div class="tag ${state.doneExercises.includes(e.id)?'success':''}" style="margin-bottom:8px">${state.doneExercises.includes(e.id)?'Solved':'Exercise'}</div><h3>${e.title}</h3><p>${e.final.prompt}</p></div>`});html+='</div></div>';html+='<div class="card"><h2>Parsons — put the query in order</h2><div class="drill-grid">';DATA.PARSONS.forEach(p=>{const l=DATA.LESSONS.find(x=>x.id===p.lid);html+=`<div class="drill-card ${state.parsDone.includes(p.id)?'done':''}" onclick="openParsons('${p.id}')"><div class="tag ${state.parsDone.includes(p.id)?'success':''}" style="margin-bottom:8px">${state.parsDone.includes(p.id)?'Solved':'Parsons'}</div><h3>${l.title}</h3><p>Tap the lines into the correct order.</p></div>`});html+='</div></div>';html+='<div class="card"><h2>Fix the Bug</h2><div class="drill-grid">';DATA.BUGS.forEach(b=>{const l=DATA.LESSONS.find(x=>x.id===b.lid);html+=`<div class="drill-card ${state.bugDone.includes(b.id)?'done':''}" onclick="openBug('${b.id}')"><div class="tag warn" style="margin-bottom:8px">Bug drill</div><h3>${l?l.title:b.title}</h3><p>${b.title}</p></div>`});html+='</div></div>';html+='<div class="card"><h2>SQL Terminal</h2><p>Run real queries against the demo dataset.</p><button class="btn btn-primary" onclick="openTerminal()">Open terminal</button></div>';q('#view-practice').innerHTML=html}

function tableFromRes(res){if(!res.length)return 'No rows returned.';const cols=res[0].columns, vals=res[0].values;let out=cols.join(' | ')+'\n'+cols.map(()=>'-').join('|')+'\n';vals.forEach(r=>out+=r.join(' | ')+'\n');return out}

window.runTerm=()=>{const sql=q('#termInput').value;const out=q('#termOut');try{const res=db.exec(sql);out.className='terminal-output ok';out.textContent=tableFromRes(res)}catch(e){out.className='terminal-output err';out.textContent=e.message}}
