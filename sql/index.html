const AGG_TASKS = [
  { id:1, title:"Count by group", concept:"GROUP BY + COUNT",
    prompt:"How many customers are in each status group? Show status and the count, sorted by count highest first.",
    scaffold:"-- Count customers per status, highest first\n\n",
    answer:"SELECT status, COUNT(*) AS customer_count\nFROM customers\nGROUP BY status\nORDER BY customer_count DESC;",
    hint:"GROUP BY splits rows into groups — one per distinct status value. COUNT(*) counts every row in each group. ORDER BY the alias (customer_count) DESC puts the biggest group first.",
    expectedRows:3,
    note:"3 rows — one per status (active, inactive, pending if present). GROUP BY collapsed all 8 customers into 3 summary rows." },
  { id:2, title:"Total revenue per customer", concept:"SUM + GROUP BY",
    prompt:"Show each customer's name and their total order revenue. Only include customers who have placed at least one order.",
    scaffold:"-- Each customer's total revenue\n-- Only customers with at least one order\n\n",
    answer:"SELECT c.name, SUM(o.amount) AS total_revenue\nFROM customers c\nINNER JOIN orders o ON c.id = o.customer_id\nGROUP BY c.name;",
    hint:"INNER JOIN first to connect customers to their orders. GROUP BY c.name collapses multiple order rows per customer into one. SUM(o.amount) totals their spend.",
    expectedRows:4,
    note:"4 rows — one per customer with orders. Alice's two orders are collapsed and summed into a single total." },
  { id:3, title:"Filter groups with HAVING", concept:"HAVING — filter after grouping",
    prompt:"Show only the customer statuses that have more than 1 customer. (Tip: HAVING filters groups; WHERE filters rows.)",
    scaffold:"-- Statuses with more than 1 customer\n-- Tip: use HAVING, not WHERE\n\n",
    answer:"SELECT status, COUNT(*) AS n\nFROM customers\nGROUP BY status\nHAVING COUNT(*) > 1;",
    hint:"WHERE runs before grouping — you can't use it to filter on COUNT(*). HAVING runs after GROUP BY, so you CAN filter on the aggregated result. Think of it as WHERE for groups.",
    expectedRows:2,
    note:"Returns only the statuses where more than 1 customer exists. Statuses with a single customer are filtered out by HAVING." },
  { id:4, title:"Multiple aggregates at once", concept:"COUNT + SUM + AVG + MAX in one query",
    prompt:"For each customer status, show the count of customers, total orders placed (sum of the orders column), average orders, and the highest order count in that group.",
    scaffold:"-- Summary stats per status: count, sum, avg, max\n\n",
    answer:"SELECT status,\n  COUNT(*) AS customers,\n  SUM(orders) AS total_orders,\n  ROUND(AVG(orders), 1) AS avg_orders,\n  MAX(orders) AS top_customer_orders\nFROM customers\nGROUP BY status\nORDER BY total_orders DESC;",
    hint:"All four aggregate functions — COUNT, SUM, AVG, MAX — run on the same GROUP BY grouping. They each collapse the rows in each group into one number. ROUND keeps the average tidy.",
    expectedRows:3,
    note:"3 rows — one per status. Each row now carries four aggregated facts about that group. This is the shape of nearly every summary report you'll build on the job." }
];

// ─── FLASHCARDS ────────────────────────────────────────────────────────────
let cardIdx = 0, cardFlipped = false;
function renderCards(){
  cardIdx = 0; cardFlipped = false;
  renderCardAt(0);
}
function renderCardAt(i){
  const total = DATA.CARDS.length;
  const [term, def] = DATA.CARDS[i];
  document.getElementById('main').innerHTML = `
    <h1>Flashcards</h1>
    <p class="text-sm text-muted">${i+1} of ${total} — click card to flip</p>
    <div class="flashcard-outer" onclick="flipCard()">
      <div class="flashcard-inner" id="fc-inner">
        <div class="flashcard-face flashcard-front"><div class="flashcard-def">${def}</div></div>
        <div class="flashcard-face flashcard-back"><div><div class="flashcard-term">${term}</div><button class="btn btn-primary btn-sm" style="margin-top:12px" onclick="event.stopPropagation();practiceCard(${i})">Practice it in the Lab →</button></div></div>
      </div>
    </div>
    <p class="fc-hint">Read the definition, recall the term, then click to check · ← → arrow keys to navigate</p>
    <div class="flashcard-nav">
      <button class="btn btn-ghost btn-sm" onclick="prevCard()">← Prev</button>
      <span class="text-muted text-sm">${i+1} / ${total}</span>
      <button class="btn btn-primary btn-sm" onclick="nextCard()">Next →</button>
    </div>`;
}
function flipCard(){
  cardFlipped = !cardFlipped;
  document.getElementById('fc-inner').classList.toggle('flipped', cardFlipped);
}
function nextCard(){ cardFlipped=false; cardIdx=(cardIdx+1)%DATA.CARDS.length; renderCardAt(cardIdx); }
function prevCard(){ cardFlipped=false; cardIdx=(cardIdx-1+DATA.CARDS.length)%DATA.CARDS.length; renderCardAt(cardIdx); }
document.addEventListener('keydown', e => {
  if(currentView==='cards'){
    if(e.key==='ArrowRight') nextCard();
    else if(e.key==='ArrowLeft') prevCard();
    else if(e.key===' '){ e.preventDefault(); flipCard(); }
  }
});

function renderGlossItems(items){
  return items.map(([t,d]) => `<div class="gloss-item"><div class="gloss-term">${t}</div><div class="gloss-def">${d}</div></div>`).join('');
}
function filterGlossary(){
  const q = document.getElementById('gloss-search').value.toLowerCase();
  const filtered = DATA.GLOSSARY.filter(([t,d]) => t.toLowerCase().includes(q) || d.toLowerCase().includes(q));
  document.getElementById('gloss-list').innerHTML = renderGlossItems(filtered);
}

/* -- Hint System JS ---- */
var _hd={hint:'',ans:'',state:0};
function cycleHint(){
  _hd.state++;
  var hp=document.getElementById('drill-hint');
  var ap=document.getElementById('drill-answer');
  var btn=document.getElementById('hint-cycle-btn');
  if(_hd.state===1){
    hp.textContent='\u{1F4A1} '+_hd.hint;
    hp.classList.add('show');
    if(btn)btn.textContent='Show Answer';
  } else {
    var esc=(_hd.ans+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    var match=findGlossaryTerm(_hd.ans+'');
    var matchTerm=match?(match.term!==undefined?match.term:match[0]):null;
    var learnHtml=matchTerm?'<button class="learn-more-link" onclick="openGlossaryFor(\''+matchTerm.replace(/'/g,"\\'")+'\')">&#x1F4D6; '+matchTerm+'</button>':'';
    ap.innerHTML='<pre class="answer-code">'+esc+'</pre>'+(learnHtml?'<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">'+learnHtml+'</div>':'');
    ap.classList.add('show');
    if(btn)btn.style.display='none';
  }
}
function findGlossaryTerm(ansText){
  if(typeof DATA==='undefined'||!DATA.GLOSSARY)return null;
  var lower=(ansText+'').toLowerCase();
  return DATA.GLOSSARY.find(function(e){var t=(e.term!==undefined?e.term:e[0]).toLowerCase();return t.length>2&&lower.indexOf(t)!==-1;});
}
function openGlossaryFor(term){
  if(typeof navigate==='function')navigate('glossary');
  else if(typeof show==='function')show('glossary');
  setTimeout(function(){
    var s=document.getElementById('gloss-search')||document.getElementById('glossSearch');
    if(s){s.value=term;try{filterGlossary(term);}catch(e){try{filterGlossary();}catch(e2){}}}
  },80);
}

// ─── Lucide icons: render now + re-render after any #main view change ───────
(function(){
  // createIcons() in this Lucide build leaves data-lucide ON the generated <svg>,
  // so it re-matches its own output. Strip it after rendering, otherwise the
  // MutationObserver below would re-fire on createIcons's own mutations forever.
  function refresh(){
    if(!window.lucide) return;
    lucide.createIcons();
    document.querySelectorAll('svg[data-lucide]').forEach(function(s){ s.removeAttribute('data-lucide'); });
  }
  refresh();
  var main=document.getElementById('main');
  if(main && 'MutationObserver' in window){
    var queued=false;
    new MutationObserver(function(){
      if(queued) return; queued=true;
      queueMicrotask(function(){ queued=false; refresh(); });
    }).observe(main,{childList:true,subtree:true});
  }
})();
