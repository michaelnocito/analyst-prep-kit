<style>
:root{
  --bg:var(--color-bg); --panel:var(--color-surface); --line:var(--color-border);
  --shadow:var(--shadow-md);
  --ink:var(--color-text); --dim:var(--color-text-muted);
  --accent:var(--color-primary); --accent-d:var(--color-primary-hover);
  --good:var(--color-success); --good-bg:var(--leaf-50);
  --bad:var(--color-danger); --bad-bg:var(--rust-50);
  --warm:var(--amber-600); --info:var(--teal-500); --info-bg:var(--teal-50);
  --tint:var(--stone-100); --tint-bd:var(--stone-200);
  --accent-soft:var(--clay-50); --accent-soft-bd:var(--clay-200);
  --track:var(--stone-100);
}
[data-theme="dark"]{
  --bg:var(--stone-900); --panel:var(--stone-800); --line:var(--stone-700);
  --shadow:var(--shadow-lg);
  --ink:var(--stone-50); --dim:var(--stone-300);
  --accent:var(--clay-400); --accent-d:var(--clay-300);
  --good:var(--leaf-400); --good-bg:var(--leaf-700);
  --bad:var(--rust-400); --bad-bg:var(--rust-700);
  --warm:var(--amber-300); --info:var(--teal-400); --info-bg:var(--teal-700);
  --tint:var(--stone-800); --tint-bd:var(--stone-700);
  --accent-soft:var(--clay-900); --accent-soft-bd:var(--clay-700);
  --track:var(--stone-700);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font:var(--weight-regular) 15px/1.55 var(--font-sans);-webkit-font-smoothing:antialiased;background:var(--bg);color:var(--ink);min-height:100vh}
a{color:var(--accent);text-decoration:none}
code,.mono{font-family:var(--font-mono)}
.lucide{width:1em;height:1em;display:inline-block;vertical-align:middle;stroke-width:2}
.wrap{max-width:860px;margin:0 auto;padding:0 20px 80px}
nav{position:sticky;top:0;z-index:20;background:var(--panel);border-bottom:1px solid var(--line);height:56px;display:flex;align-items:center;gap:14px;padding:0 20px}
nav .brand{display:flex;align-items:center;gap:8px;font-family:var(--font-display);font-weight:700;font-size:16px}
nav .brand .lucide{width:20px;height:20px;color:var(--accent)}
nav a.back{font-size:13px;color:var(--dim)}
nav .spacer{flex:1}
.icon-btn{background:none;border:1px solid var(--line);border-radius:8px;width:34px;height:34px;cursor:pointer;color:var(--ink);display:flex;align-items:center;justify-content:center}
h1{font-family:var(--font-display);font-size:28px;line-height:1.2;margin:28px 0 8px}
h2{font-family:var(--font-display);font-size:19px;margin:0 0 6px}
.sub{color:var(--dim);max-width:600px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-top:14px}
.card-sm{padding:12px 14px}
.btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:8px;padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn:hover{background:var(--accent-d);border-color:var(--accent-d)}
.btn:disabled{opacity:.45;cursor:default}
.btn-outline{background:none;color:var(--accent)}
.btn-outline:hover{background:var(--accent-soft)}
.btn-ghost{background:none;border-color:var(--line);color:var(--dim)}
.btn-ghost:hover{color:var(--ink)}
.btn-sm{padding:5px 10px;font-size:13px}
.label{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim)}
input[type=text],input[type=password],textarea,select{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 12px;font:inherit;font-size:14px;background:var(--panel);color:var(--ink)}
textarea{resize:vertical}
input:focus,textarea:focus,select:focus{outline:none;box-shadow:var(--focus-ring);border-color:var(--accent)}
.chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:6px 13px;font-size:13px;cursor:pointer;background:var(--panel);color:var(--ink);font-family:inherit}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.chip.rec{border-style:dashed}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.phasebar{display:flex;gap:6px;margin:22px 0 4px;flex-wrap:wrap}
.phase-pill{display:flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:6px 13px;font-size:13px;color:var(--dim);background:var(--panel);cursor:pointer;font-family:inherit}
.phase-pill.now{border-color:var(--accent);color:var(--accent);font-weight:600}
.phase-pill.done{border-color:var(--good);color:var(--good)}
.phase-pill:disabled{opacity:.4;cursor:default}
.steps-dots{display:flex;align-items:center;gap:6px;margin:18px 0}
.dot{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--tint-bd);color:var(--dim);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:12px}
.dot.now{border-color:var(--accent);color:var(--accent)}
.dot.done{background:var(--good);border-color:var(--good);color:#fff}
.dot-line{width:14px;height:1.5px;background:var(--tint-bd)}
.dot-line.done{background:var(--good)}
.proj-card{display:block;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-top:12px;cursor:pointer;transition:border-color .15s}
.proj-card:hover{border-color:var(--accent)}
.stamp{display:inline-block;font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;border:1.5px solid;border-radius:4px;padding:2px 8px;margin-right:6px}
.progress{height:7px;background:var(--track);border-radius:99px;overflow:hidden;margin-top:8px}
.progress i{display:block;height:100%;background:var(--good);border-radius:99px;transition:width .3s}
.stage-card{border:1px solid var(--line);border-radius:12px;margin-top:14px;background:var(--panel);overflow:hidden}
.stage-head{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none}
.stage-num{width:30px;height:30px;border-radius:8px;background:var(--accent-soft);border:1px solid var(--accent-soft-bd);color:var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:700;font-size:13px;flex-shrink:0}
.stage-head .t{flex:1}
.stage-head .t b{font-family:var(--font-display);font-size:15.5px}
.stage-head .t small{display:block;color:var(--dim);font-size:12.5px}
.stage-count{font-family:var(--font-mono);font-size:12px;color:var(--dim)}
.stage-body{border-top:1px solid var(--line);padding:6px 18px 16px}
.bp{background:var(--info-bg);border:1px solid var(--info);border-radius:8px;padding:10px 13px;font-size:13.5px;margin:12px 0;color:var(--ink)}
.bp b{color:var(--info)}
.ex{border-left:3px solid var(--accent);background:var(--panel);border-radius:0 8px 8px 0;padding:9px 13px;font-size:13px;margin:12px 0;color:var(--ink)}
.ex .ex-lbl{display:block;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:3px}
.ex code{font-size:12px}
.step-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px dashed var(--tint-bd)}
.step-row:last-child{border-bottom:none}
.step-row input[type=checkbox]{width:17px;height:17px;margin-top:2px;accent-color:var(--good);cursor:pointer;flex-shrink:0}
.step-row .txt{flex:1;font-size:14px}
.step-row.done .txt{color:var(--dim);text-decoration:line-through}
.skill-tag{display:inline-block;font-family:var(--font-mono);font-size:10.5px;letter-spacing:.05em;border:1px solid var(--tint-bd);background:var(--tint);border-radius:4px;padding:1px 6px;margin-left:6px;color:var(--dim);text-decoration:none!important}
.note-btn{background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;padding:0;font-family:inherit}
.note-btn:hover{color:var(--accent)}
.step-note{width:100%;margin-top:6px;font-size:13px;min-height:34px}
.plan-choice{border:1.5px solid var(--line);border-radius:12px;padding:16px 18px;margin-top:12px;cursor:pointer;background:var(--panel)}
.plan-choice:hover{border-color:var(--accent)}
.plan-choice b{font-family:var(--font-display)}
.plan-choice p{color:var(--dim);font-size:13.5px;margin-top:3px}
.err{color:var(--bad);font-size:13px;margin-top:8px}
.ok{color:var(--good);font-size:13px;margin-top:8px}
.review-doc{font-family:var(--font-mono);font-size:13px;background:var(--tint);border:1px solid var(--tint-bd);border-radius:8px;padding:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.row-actions{display:flex;justify-content:space-between;align-items:center;margin-top:18px;gap:10px;flex-wrap:wrap}
.feas-row{border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-top:10px}
.feas-opts{display:flex;gap:6px;margin-top:8px}
.feas-opt{border:1px solid var(--line);border-radius:6px;padding:4px 11px;font-size:12.5px;cursor:pointer;background:var(--panel);color:var(--ink);font-family:inherit;text-transform:capitalize}
.feas-opt.on{background:var(--accent);border-color:var(--accent);color:#fff}
.feas-opt.on.cut{background:var(--bad);border-color:var(--bad)}
.out-opt{display:block;width:100%;text-align:left;border:1.5px solid var(--line);border-radius:10px;padding:11px 14px;margin-top:8px;cursor:pointer;background:var(--panel);color:var(--ink);font-family:inherit}
.out-opt.on{border-color:var(--accent);background:var(--accent-soft)}
.out-opt b{font-size:14px}
.out-opt small{display:block;color:var(--dim);font-size:12.5px}
.edit-step{display:flex;gap:8px;align-items:center;margin-top:7px}
.edit-step input{flex:1}
.edit-step select{width:110px;flex-shrink:0}
.x-btn{background:none;border:none;color:var(--dim);cursor:pointer;padding:4px}
.x-btn:hover{color:var(--bad)}
.hint{font-size:12.5px;color:var(--dim);margin-top:6px}
.deliv-note{background:var(--accent-soft);border:1px solid var(--accent-soft-bd);border-radius:8px;padding:10px 13px;font-size:13.5px;margin-top:12px}
@media(max-width:600px){
  .wrap{padding:0 14px 60px}
  h1{font-size:23px}
  .btn{min-height:44px}
  .row-actions .btn{flex:1;justify-content:center}
}
</style>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
/* =============================================================
   PROJECT STUDIO — scope, plan, build, and present a real
   analyst portfolio project. Industry-standard stages
   (Ask → Prepare → Process → Analyze → Share → Act), job-first
   skills: Excel · SQL · Tableau lead; Power BI · Python optional.
   ============================================================= */

const LS_KEY = 'apk-projects-v1';
const COACH_KEY = 'apk-coach-key'; // shared BYOK key across the suite

/* ---------- data ---------- */
const SCOPE_STEPS = ['domain','question','criteria','feasibility','output','tools','review'];

const DOMAIN_CHIPS = ['Games','Weather','Job market','Sports','Music','Movies & TV','Food & recipes','E-commerce','Health & fitness','Something else'];

const OUTPUT_TYPES = [
  {id:'ranked_list', label:'Ranked list', hint:"A sorted table answering 'which ones are best/worst'"},
  {id:'dashboard', label:'Dashboard', hint:'Interactive, filterable view for ongoing exploration'},
  {id:'report', label:'Written report', hint:'A narrative with findings and a recommendation'},
  {id:'single_number', label:'A single number', hint:'One headline stat that settles the question'}
];

const TOOLS = [
  {id:'excel', label:'Excel', rec:true, why:'Assumed everywhere — pivots and lookups get you hired.'},
  {id:'sql', label:'SQL', rec:true, why:'The #1 hard-skill filter on analyst job posts.'},
  {id:'tableau', label:'Tableau', rec:true, why:'The dashboard is usually the deliverable interviewers open first.'},
  {id:'powerbi', label:'Power BI', rec:false, why:'Swap in for Tableau at Microsoft-stack shops.'},
  {id:'python', label:'Python', rec:false, why:'Great for data prep, but optional for entry-level.'}
];

/* The six industry-standard analysis stages (Ask → Prepare → Process →
   Analyze → Share → Act — the lifecycle taught in every entry-level
   analytics curriculum), each with a best-practice teaching note. */
const STAGES = [
  {key:'ask', title:'Ask', mission:'Nail down the question and what "answered" looks like.',
   bp:'Analysts who skip this stage produce technically-correct answers to the wrong question. Your scope doc IS this stage — keep it open while you work, and re-read it any time you feel lost in the data.'},
  {key:'prepare', title:'Prepare', mission:'Get the data, understand every column, and record where it came from.',
   bp:'Before writing a single formula or query, profile the data: row count, column list, what one row represents (the grain), and obvious gaps. A data dictionary — even a rough one — saves you hours later and impresses reviewers. Got a huge file (hundreds of MB, 100k+ rows)? Don\'t just double-click it — in Excel, use Data → Get Data → From File → From Text/CSV: the preview loads in seconds and lets you check your columns exist without importing anything. Cancel out once you\'ve confirmed the fields; if you do need it in a sheet, use Load To → Only Create Connection and pull a filtered subset via PivotTable rather than loading every row.',
   ex:'Profiling the 125k games, <code>MAX(Positive)</code> came back a flat <b>100</b> across every single game — impossible for Steam review counts. That one impossible number was the whole thread to pull. If a summary stat looks too clean to be real, it usually isn\'t.'},
  {key:'process', title:'Process', mission:'Clean the data and document every cleaning decision.',
   bp:'Cleaning decisions ARE analysis decisions. Never overwrite the raw data — keep raw and cleaned versions separate, and write down each rule you applied (what you dropped, what you filled, why). Interviewers ask about this constantly.',
   ex:'The flat-100 turned out to be a broken CSV header: the source file listed 39 columns for 40 fields, so every value after a fused column loaded one slot to the left. Fixed it in a <b>clean copy</b> (raw file left untouched), re-imported, and verified against one known record before trusting anything.'},
  {key:'analyze', title:'Analyze', mission:'Answer each scoped criterion with evidence.',
   bp:'Work criterion by criterion from your scope, not wherever the data looks interesting. Sanity-check every result against a second method (a pivot vs. a query, a spot-check of raw rows). Set thresholds from the real distribution of your data, not gut feel.',
   ex:'Thresholds were set from the data, not gut feel — counting how many games survived each filter (5,175 → 175) until the list was a credible size. A reality-check against real-world knowledge then caught records the numbers alone trusted: Portal 2 sitting in the under-20k-owners tier with 153k reviews, and Batman: Arkham City listed as "free" — both corrupted/stale rows, cut and documented.'},
  {key:'share', title:'Share', mission:'Turn the findings into the deliverable you defined in scoping.',
   bp:'Lead with the answer, not the process. One chart that makes the point beats five that show effort. Label everything so it reads without you in the room — that is the actual test of portfolio work.',
   ex:'The write-up opens with the answer — a ranked top-25 table — before any of the how. Scope and assumptions (language-agnostic, so some titles are non-English) are stated up front so a stranger can judge the list without needing the author in the room.'},
  {key:'act', title:'Act', mission:'State the recommendation, the limitations, and what you would do next.',
   bp:'"So what?" is the analyst\'s final exam. A recommendation with honest limitations reads as senior; a wall of charts with no conclusion reads as junior. Always include what you would do next with more time or data.'}
];

/* ---------- storage ---------- */
function loadAll(){ try{ return JSON.parse(localStorage.getItem(LS_KEY)||'{"projects":[]}'); }catch(e){ return {projects:[]}; } }
function saveAll(db){ localStorage.setItem(LS_KEY, JSON.stringify(db)); }
function getProj(id){ return DB.projects.find(p=>p.id===id); }
function saveProj(){ saveAll(DB); }

function newProject(){
  return {
    id:'proj_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6),
    createdAt:new Date().toISOString(),
    phase:'scope', // scope | plan | build | present
    scope:{domain:'',domainCustom:'',question:'',criteria:[''],feasibility:[],outputType:'',outputNote:'',tools:[],stamped:false},
    plan:{source:'',stages:[],locked:false},
    present:{checklist:[],notes:''}
  };
}

/* ---------- app state ---------- */
let DB = loadAll();
let VIEW = {name:'home'}; // {name:'home'} | {name:'project', id, phase} | scope wizard state inside
let SSTEP = 0;            // scope wizard step index
let AI = {loading:false,err:'',draft:null};

/* ---------- helpers ---------- */
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function domainLabel(sc){ return sc.domain==='Something else' ? sc.domainCustom : sc.domain; }
function projName(p){ return domainLabel(p.scope) || 'Untitled project'; }
function skillLabel(id){ const t=TOOLS.find(t=>t.id===id); return t?t.label:(id||''); }
function planSteps(p){ return p.plan.stages.flatMap(s=>s.steps); }
function planDone(p){ return planSteps(p).filter(s=>s.done).length; }
function phaseIndex(ph){ return ['scope','plan','build','present'].indexOf(ph); }

function render(){
  const el = document.getElementById('app');
  if(VIEW.name==='home') el.innerHTML = homeHTML();
  else el.innerHTML = projectHTML(getProj(VIEW.id));
  if(window.lucide) lucide.createIcons();
}

/* =============================================================
   HOME
   ============================================================= */
function homeHTML(){
  const list = DB.projects.slice().sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  let h = `
  <h1>Project Studio</h1>
  <p class="sub">Build a portfolio project the way working analysts do: <b>scope</b> the question, <b>plan</b> the steps, <b>build</b> through the industry-standard analysis stages, and <b>present</b> something you can put in front of a hiring manager.</p>
  <div style="margin-top:20px">
    <button class="btn" onclick="startProject()"><i data-lucide="plus"></i> Start a new project</button>
  </div>
  <div class="label" style="margin-top:28px">Worked examples</div>
  <div class="card">
    <div style="font-family:var(--font-display);font-weight:700;font-size:16px">Steam Hidden Gems <span class="stamp" style="border-color:var(--good);color:var(--good);margin-left:6px">FINISHED PROJECT</span></div>
    <div style="color:var(--dim);font-size:13.5px;margin-top:4px">A project built end-to-end with this exact workflow: a SQL analysis of ~125,000 Steam games that surfaces 166 hidden gems. See how a real project handled each stage:</div>
    <div style="margin-top:12px;padding:12px 14px;border-left:3px solid var(--accent);background:var(--panel);border-radius:0 8px 8px 0">
      <div style="font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--accent);font-weight:700">The scope question</div>
      <div style="font-size:14px;margin-top:3px">"Which Steam games are hidden gems I'd love but have never heard of?"</div>
    </div>
    <div style="margin-top:12px;display:grid;gap:8px">
      <div style="font-size:13px"><b>Prepare</b> — noticed <code>MAX(Positive)</code> returned a flat 100 across every game (impossible); traced it to a broken CSV header that shifted every column by one, and fixed it in a clean copy.</div>
      <div style="font-size:13px"><b>Analyze</b> — tuned thresholds from the data itself (2,000-review floor, 95%+ positive, low ownership), watching the list shrink 5,175 → 175 to a credible size.</div>
      <div style="font-size:13px"><b>Share / validate</b> — reality-checked the output: caught Portal 2 and Batman: Arkham City as corrupted/stale records the numbers alone would have trusted.</div>
    </div>
    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap"><a class="note-btn" href="https://github.com/michaelnocito/steam-hidden-gems" target="_blank" rel="noopener" style="text-decoration:none">Read the full project on GitHub ↗</a><a class="note-btn" href="../guides/handle-large-datasets/" target="_blank" rel="noopener" style="text-decoration:none">How to Handle Large Datasets →</a></div>
  </div>
  <div class="card">
    <div style="font-family:var(--font-display);font-weight:700;font-size:16px">Telco Customer Churn <span class="stamp" style="border-color:var(--good);color:var(--good);margin-left:6px">FINISHED PROJECT</span></div>
    <div style="color:var(--dim);font-size:13.5px;margin-top:4px">A second worked example, in Python instead of SQL, and one that ends where a business project has to end: with recommendations someone could act on. 7,043 telecom customers, four risk personas, three retention plays.</div>
    <div style="margin-top:12px;padding:12px 14px;border-left:3px solid var(--accent);background:var(--panel);border-radius:0 8px 8px 0">
      <div style="font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--accent);font-weight:700">The scope question</div>
      <div style="font-size:14px;margin-top:3px">"We know churn is 26.5%. Who is actually leaving, and what makes them different?"</div>
    </div>
    <div style="margin-top:12px;display:grid;gap:8px">
      <div style="font-size:13px"><b>Prepare</b> — cleaned the raw Kaggle export in pandas. <code>TotalCharges</code> imported as text because a handful of rows held a blank string; chasing those rows down showed they were brand-new customers with zero tenure, so the blank meant 0 rather than missing.</div>
      <div style="font-size:13px"><b>Analyze</b> — split the base by tenure into four personas, which turned one flat 26.5% into 47% churn in year one versus 10% for the loyal core, then traced the mechanism to contract type (43% month-to-month versus 3% two-year).</div>
      <div style="font-size:13px"><b>Share / present</b> — one script rebuilds every chart, and each of the three recommendations names the number it is aimed at, ending with an estimate of about 400 customers retained a year.</div>
    </div>
    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap"><a class="note-btn" href="https://github.com/michaelnocito/telco-churn-analysis" target="_blank" rel="noopener" style="text-decoration:none">Read the full project on GitHub ↗</a><a class="note-btn" href="https://public.tableau.com/app/profile/michael.nocito8651/viz/TelcoCustomerChurnRiskPersonas/Story1" target="_blank" rel="noopener" style="text-decoration:none">Click through the Tableau story ↗</a><a class="note-btn" href="../guides/exploratory-data-analysis/" target="_blank" rel="noopener" style="text-decoration:none">Exploratory Data Analysis →</a></div>

  if(!list.length){
    h += `<div class="card" style="text-align:center;color:var(--dim)">No projects yet. Start one above — the first phase walks you through scoping like an analyst intake meeting.</div>`;
  }else{
    for(const p of list){
      const steps = planSteps(p);
      const pct = steps.length ? Math.round(planDone(p)/steps.length*100) : 0;
      const phLabel = {scope:'Scoping',plan:'Planning',build:'Building',present:'Presenting'}[p.phase];
      h += `<div class="proj-card" onclick="openProject('${p.id}')">

      </div>`;
    }
  }
  return h;
}

function scopeHTML(p){

  });

  }

    });
    body += `</div>${sc.criteria.length<6?`<button class="btn btn-ghost btn-sm" style="margin-top:10px" onclick="scCritAdd()"><i data-lucide="plus"></i> Add criterion</button>`:''}`;
  }
  else if(step==='feasibility'){

function scopeDocText(sc){
  const feas = feasRows(sc).map(f=>`  • ${f.criterion}: ${f.status.toUpperCase()}${f.note?' ('+f.note+')':''}`).join('\n');
  return `DOMAIN    ${domainLabel(sc)||'—'}
QUESTION  ${sc.question||'—'}
CRITERIA
${sc.criteria.filter(c=>c.trim()).map(c=>'  • '+c).join('\n')||'  —'}
FEASIBILITY
${feas||'  —'}
OUTPUT    ${(OUTPUT_TYPES.find(o=>o.id===sc.outputType)||{}).label||'—'}${sc.outputNote?' — '+sc.outputNote:''}
TOOLS     ${sc.tools.map(skillLabel).join(', ')||'—'}`;
}

function scopeStepValid(sc, step){
  if(step==='domain') return !!domainLabel(sc);
  if(step==='question') return sc.question.trim().length>5;
  if(step==='criteria') return sc.criteria.filter(c=>c.trim()).length>=1;
  if(step==='output') return !!sc.outputType;
  if(step==='tools') return sc.tools.length>=1;
  return true;
}
function feasRows(sc){
  const filled = sc.criteria.filter(c=>c.trim());
  return filled.map(crit=>{
    const f = sc.feasibility.find(x=>x.criterion===crit);
    return f || {criterion:crit,status:'direct',note:''};
  });
}
function scP(){ return getProj(VIEW.id); }
function scSet(k,v){ scP().scope[k]=v; saveProj(); render(); }
function scType(k,v){ scP().scope[k]=v; saveProj(); refreshNextBtn(); } // no full re-render mid-typing (would drop cursor/focus)
function refreshNextBtn(){
  const btn = document.getElementById('scNextBtn');
  if(!btn) return;
  const canNext = scopeStepValid(scP().scope, SCOPE_STEPS[SSTEP]);
  btn.disabled = !canNext;
}
function scCrit(i,v){ scP().scope.criteria[i]=v; saveProj(); refreshNextBtn(); }
function scCritAdd(){ scP().scope.criteria.push(''); saveProj(); render(); }
function scCritDel(i){ const sc=scP().scope; sc.criteria.splice(i,1); if(!sc.criteria.length)sc.criteria=['']; saveProj(); render(); }
function scFeas(i,status){ const sc=scP().scope; const rows=feasRows(sc); rows[i]={...rows[i],status}; sc.feasibility=rows; saveProj(); render(); }
function scFeasNote(i,v){ const sc=scP().scope; const rows=feasRows(sc); rows[i]={...rows[i],note:v}; sc.feasibility=rows; saveProj(); }
function scTool(id){ const sc=scP().scope; sc.tools = sc.tools.includes(id) ? sc.tools.filter(t=>t!==id) : [...sc.tools,id]; saveProj(); render(); }
function scNext(){ const sc=scP().scope; if(SCOPE_STEPS[SSTEP]==='criteria') sc.feasibility=feasRows(sc); SSTEP=Math.min(SSTEP+1,SCOPE_STEPS.length-1); saveProj(); render(); }
function scBack(){ SSTEP=Math.max(SSTEP-1,0); render(); }
function scStamp(){ const p=scP(); p.scope.stamped=true; p.phase='plan'; saveProj(); render(); }

/* --- option A: template --- */
function planTemplate(){
  const p=getProj(VIEW.id);
  p.plan = {source:'template', locked:false, stages: buildTemplatePlan(p.scope)};
  saveProj(); render();
}
let _sid=0;
function mkStep(text,skill){ return {id:'s'+(Date.now().toString(36))+(_sid++), text, skill:skill||'', done:false, notes:''}; }

function buildTemplatePlan(sc){
  const t = id=>sc.tools.includes(id);
  const outLabel = (OUTPUT_TYPES.find(o=>o.id===sc.outputType)||{}).label || 'deliverable';
  const vizTool = t('tableau') ? 'Tableau' : t('powerbi') ? 'Power BI' : 'Excel charts';
  const stages = [];

  stages.push({key:'ask', steps:[
    mkStep('Re-read your scoping doc and write the question at the top of a fresh notes file.',''),
    mkStep('For each criterion, write one sentence on how you expect to measure it.',''),
    mkStep('Write down 2–3 things you expect to find (your hypotheses) — you\'ll check yourself against these at the end.','')
  ]});

  const prep = [
    mkStep('Locate and download the dataset; save an untouched copy in a raw/ folder.',''),
    mkStep('Profile the data: row count, column list, and what one row represents (the grain).', t('sql')?'sql':'excel'),
    mkStep('Build a mini data dictionary: each column you\'ll use, its type, and what it means.','excel')
  ];
  if(t('sql')) prep.push(mkStep('Load the raw data into a SQL database (one table, matching column types).','sql'));
  stages.push({key:'prepare', steps:prep});

  const proc = [
    mkStep('List the data-quality problems you can see: nulls, duplicates, weird formats, range strings.', t('sql')?'sql':'excel'),
    mkStep('Clean each problem and write down the rule you applied (a cleaning log).', t('sql')?'sql':'excel'),
    mkStep('Derive the calculated fields your criteria need (ratios, parsed numbers, flags).', t('sql')?'sql':'excel'),
    mkStep('Validate the cleaned data: row counts before/after, spot-check 10 rows by hand.', t('sql')?'sql':'excel')
  ];
  if(t('python')) proc.push(mkStep('Optional: script the cleaning in Python/pandas so it\'s reproducible in one run.','python'));
  stages.push({key:'process', steps:proc});

  const ana = [
    mkStep('Look at the real distributions of your key fields before setting any thresholds (percentiles, not gut feel).', t('sql')?'sql':'excel'),
    mkStep('Answer criterion 1 with a query or pivot; save the result and one sentence of interpretation.', t('sql')?'sql':'excel'),
    mkStep('Repeat for each remaining criterion — one result + one sentence each.', t('sql')?'sql':'excel'),
    mkStep('Combine the criteria into your final answer set (the ranked list, score, or segment).', t('sql')?'sql':'excel'),
    mkStep('Sanity-check the top results a second way — do the winners actually make sense?', t('excel')?'excel':'sql')
  ];
  stages.push({key:'analyze', steps:ana});

  const share = [];
  if(sc.outputType==='dashboard' || t('tableau') || t('powerbi')){
    share.push(mkStep(`Sketch the ${outLabel.toLowerCase()} on paper first: what's the headline view, what are the filters?`,''));
    share.push(mkStep(`Build the main view in ${vizTool}: your answer front and center.`, t('tableau')?'tableau':t('powerbi')?'powerbi':'excel'));
    share.push(mkStep(`Add supporting views/filters (genre, price, category — whatever your criteria used).`, t('tableau')?'tableau':t('powerbi')?'powerbi':'excel'));
  }else{
    share.push(mkStep(`Draft the ${outLabel.toLowerCase()}: lead with the answer, then the evidence per criterion.`,''));
    share.push(mkStep('Build 2–3 charts that carry the argument (one idea per chart, labeled to stand alone).', t('tableau')?'tableau':'excel'));
  }
  share.push(mkStep('Title and label everything so it reads without you in the room.',''));
  stages.push({key:'share', steps:share});

  stages.push({key:'act', steps:[
    mkStep('Write the recommendation: what should someone do with this answer?',''),
    mkStep('Write the limitations honestly: proxies used, data gaps, thresholds you chose.',''),
    mkStep('Write "next steps": what you\'d do with more time or better data.',''),
    mkStep('Check back against your hypotheses from the Ask stage — what surprised you?','')
  ]});
  return stages;
}

function planCustomStart(){
  const el=document.getElementById('plan-extra');
  el.innerHTML = `<div class="card card-sm" style="margin-top:14px">
    <div class="label">Paste your plan</div>
    <p class="hint">One step per line. Start a stage with a line like <span class="mono">## Analyze</span> (stages: Ask, Prepare, Process, Analyze, Share, Act). Lines before any heading go to Ask. Tag a skill in brackets, e.g. <span class="mono">Build the pivot [excel]</span>.</p>
    <textarea id="customPlan" rows="10" style="margin-top:8px" placeholder="## Prepare&#10;Download the dataset [excel]&#10;Load into SQLite [sql]&#10;## Analyze&#10;..."></textarea>
    <div style="margin-top:10px"><button class="btn" onclick="planCustomImport()">Import plan</button></div>
    <div id="customErr" class="err"></div>
  </div>`;

function planCustomImport(){
  const raw = document.getElementById('customPlan').value;
  const stages = parseCustomPlan(raw);
  const total = stages.reduce((n,s)=>n+s.steps.length,0);
  if(!total){ document.getElementById('customErr').textContent='No steps found — add at least one line that isn\'t a heading.'; return; }
  const p=getProj(VIEW.id);
  p.plan = {source:'custom', locked:false, stages};
  saveProj(); render();
}
function parseCustomPlan(raw){
  const keyByTitle = {};
  STAGES.forEach(s=>keyByTitle[s.title.toLowerCase()]=s.key);
  const buckets = {}; STAGES.forEach(s=>buckets[s.key]=[]);
  let cur='ask';
  raw.split(/\r?\n/).forEach(line=>{
    const l=line.trim();
    if(!l) return;
    const hm = l.match(/^#{1,3}\s*(.+)$/) || l.match(/^(ask|prepare|process|analyze|analyse|share|act)\s*:?\s*$/i);
    if(hm){
      let name=hm[1].trim().toLowerCase().replace(/:$/,'');
      if(name==='analyse') name='analyze';
      if(keyByTitle[name]){ cur=keyByTitle[name]; return; }
      // unknown heading: treat as a step? no — skip into current stage as plain text
    }
    let skill='';
    const sm = l.match(/\[(excel|sql|tableau|powerbi|power bi|python)\]\s*$/i);
    let text=l.replace(/^[-*\d.)\s]+/,'').trim();
    if(sm){ skill=sm[1].toLowerCase().replace(' ',''); text=text.replace(/\s*\[[^\]]*\]\s*$/,''); }
    if(text && !/^#{1,3}/.test(l)) buckets[cur].push(mkStep(text,skill));
  });
  return STAGES.map(s=>({key:s.key, steps:buckets[s.key]})).filter(s=>true);
}

function planAIStart(){

    <div id="aiErr" class="err"></div>
  </div>`;
  el.scrollIntoView({behavior:'smooth'});

async function planAIGenerate(){
  const key = document.getElementById('aiKey').value.trim();
  const errEl = document.getElementById('aiErr');
  if(!key){ errEl.textContent='Enter an API key first, or use the template instead.'; return; }
  localStorage.setItem(COACH_KEY,key);
  const btn=document.getElementById('aiGo'); btn.disabled=true; btn.textContent='Drafting… (10–20s)';
  errEl.textContent='';
  const p=getProj(VIEW.id);
  const prompt = `You are a senior data analyst mentoring a beginner building a portfolio project. Draft a step-by-step project plan from their scoping document.

Rules:
- Use EXACTLY these six stages, in order: ask, prepare, process, analyze, share, act.
- 3-6 steps per stage. Each step is one concrete action the learner can check off, written for a beginner.
- Tailor steps to their tools. Allowed skill tags: excel, sql, tableau, powerbi, python, or "" for tool-neutral steps.
- Teach best practice inside the steps (keep raw data untouched, log cleaning decisions, set thresholds from real distributions, lead with the answer).
- Respond with ONLY valid JSON, no prose, in this shape:
{"stages":[{"key":"ask","steps":[{"text":"...","skill":""}]},...]}

Scoping document:
${scopeDocText(p.scope)}`;
  try{
    const r = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'x-api-key':key,'anthropic-version':'2023-06-01','content-type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:2500,messages:[{role:'user',content:prompt}]})
    });
    const data = await r.json();
    if(data.error) throw new Error(data.error.message||'API error');
    const text = (data.content||[]).map(b=>b.text||'').join('');
    const m = text.match(/\{[\s\S]*\}/);
    const parsed = JSON.parse(m?m[0]:text);
    const valid = STAGES.map(s=>{
      const found = (parsed.stages||[]).find(x=>(x.key||'').toLowerCase()===s.key);
      const steps = ((found&&found.steps)||[]).map(st=>mkStep(String(st.text||'').slice(0,300), (st.skill||'').toLowerCase().replace(' ','')));
      return {key:s.key, steps};
    });
    if(!valid.reduce((n,s)=>n+s.steps.length,0)) throw new Error('Claude returned no usable steps.');
    p.plan = {source:'ai', locked:false, stages:valid};
    saveProj(); render();
  }catch(e){
    errEl.textContent = 'Couldn\'t generate: '+(e.message||'check your key and try again.');
    btn.disabled=false; btn.innerHTML='<i data-lucide="sparkles"></i> Draft my step-by-step';
    if(window.lucide) lucide.createIcons();
  }
}

/* --- plan editor (all three sources land here) --- */
function planEditHTML(p){
  const srcLabel = {template:'Guided template',custom:'Your imported plan',ai:'Drafted by Claude'}[p.plan.source]||'Plan';
  let h = `<div class="card">
    <h2>Your step-by-step <span class="stamp" style="border-color:var(--info);color:var(--info);vertical-align:middle">${srcLabel.toUpperCase()}</span></h2>
    <p class="sub" style="font-size:13.5px">Edit anything — add, reword, or remove steps. When it looks right, lock it in and start building. (You can still edit steps later from the Build phase.)</p>`;
  STAGES.forEach((sg,si)=>{
    const st = p.plan.stages.find(x=>x.key===sg.key) || {key:sg.key,steps:[]};
    h += `<div class="stage-card"><div class="stage-head" style="cursor:default">
      <span class="stage-num">${si+1}</span>
      <span class="t"><b>${sg.title}</b><small>${sg.mission}</small></span>
      <span class="stage-count">${st.steps.length} steps</span>
    </div><div class="stage-body">`;
    st.steps.forEach((s,i)=>{
      h += `<div class="edit-step">
        <input type="text" value="${esc(s.text)}" oninput="peText('${sg.key}',${i},this.value)">
        <select onchange="peSkill('${sg.key}',${i},this.value)">
          <option value="">no tag</option>
          ${TOOLS.map(t=>`<option value="${t.id}" ${s.skill===t.id?'selected':''}>${t.label}</option>`).join('')}
        </select>
        <button class="x-btn" onclick="peDel('${sg.key}',${i})"><i data-lucide="x"></i></button>
      </div>`;
    });
    h += `<button class="btn btn-ghost btn-sm" style="margin-top:10px" onclick="peAdd('${sg.key}')"><i data-lucide="plus"></i> Add step</button>
    </div></div>`;
  });
  h += `<div class="row-actions">
    <button class="btn btn-ghost" onclick="planReset()">Start over (pick another source)</button>
    <button class="btn" onclick="planLock()"><i data-lucide="hammer"></i> Lock plan → start building</button>
  </div></div>`;
  return h;
}
function peStage(key){ const p=getProj(VIEW.id); let st=p.plan.stages.find(x=>x.key===key); if(!st){st={key,steps:[]};p.plan.stages.push(st);} return st; }
function peText(key,i,v){ peStage(key).steps[i].text=v; saveProj(); }
function peSkill(key,i,v){ peStage(key).steps[i].skill=v; saveProj(); }
function peDel(key,i){ peStage(key).steps.splice(i,1); saveProj(); render(); }
function peAdd(key){ peStage(key).steps.push(mkStep('','')); saveProj(); render(); }
function planReset(){ if(!confirm('Discard this plan and choose a different source?'))return; const p=getProj(VIEW.id); p.plan={source:'',stages:[],locked:false}; saveProj(); render(); }
function planLock(){
  const p=getProj(VIEW.id);
  p.plan.stages.forEach(st=>st.steps=st.steps.filter(s=>s.text.trim()));
  if(!planSteps(p).length){ alert('Your plan has no steps yet.'); return; }
  p.plan.locked=true; p.phase='build'; saveProj(); render();
}

/* =============================================================
   PHASE 3 — BUILD (work the plan)
   ============================================================= */
let OPEN_STAGE = null;
function buildHTML(p){
  const total = planSteps(p).length, done = planDone(p);
  const pct = total?Math.round(done/total*100):0;
  if(OPEN_STAGE===null){
    // open the first stage with an unfinished step
    const firstOpen = p.plan.stages.find(st=>st.steps.some(s=>!s.done));
    OPEN_STAGE = firstOpen ? firstOpen.key : (p.plan.stages[0]&&p.plan.stages[0].key);
  }
  let h = `<div class="card card-sm" style="display:flex;align-items:center;gap:14px">
    <div style="flex:1"><div class="label">Build progress</div>
    <div class="progress"><i style="width:${pct}%"></i></div></div>
    <div class="mono" style="font-size:13px;color:var(--dim)">${done}/${total}</div>
  </div>`;
  STAGES.forEach((sg,si)=>{
    const st = p.plan.stages.find(x=>x.key===sg.key) || {steps:[]};
    if(!st.steps.length) return;
    const sDone = st.steps.filter(s=>s.done).length;
    const open = OPEN_STAGE===sg.key;
    h += `<div class="stage-card">
      <div class="stage-head" onclick="toggleStage('${sg.key}')">
        <span class="stage-num" style="${sDone===st.steps.length?'background:var(--good-bg);border-color:var(--good);color:var(--good)':''}">${sDone===st.steps.length?'✓':si+1}</span>
        <span class="t"><b>${sg.title}</b><small>${sg.mission}</small></span>
        <span class="stage-count">${sDone}/${st.steps.length}</span>
        <i data-lucide="${open?'chevron-up':'chevron-down'}" style="color:var(--dim)"></i>
      </div>`;
    if(open){
      h += `<div class="stage-body"><div class="bp"><b>Best practice —</b> ${sg.bp}</div>`;
      if(sg.ex) h += `<div class="ex"><span class="ex-lbl">How Steam Hidden Gems handled this →</span>${sg.ex}</div>`;
      st.steps.forEach((s,i)=>{
        h += `<div class="step-row ${s.done?'done':''}">
          <input type="checkbox" ${s.done?'checked':''} onchange="stepDone('${sg.key}',${i},this.checked)">
          <div style="flex:1"><span class="txt">${esc(s.text)}</span>${s.skill?`<span class="skill-tag">${skillLabel(s.skill).toUpperCase()}</span>`:''}
            <div><button class="note-btn" onclick="toggleNote('${s.id}')">${s.notes?'Edit note':'+ note'}</button> ${stepLearnLink(s)}</div>
            <textarea class="step-note" id="note-${s.id}" style="display:${s.notes?'block':'none'}" placeholder="What you did, what you found, decisions made..." oninput="stepNote('${sg.key}',${i},this.value)">${esc(s.notes)}</textarea>
          </div>
        </div>`;
      });
      h += `<button class="btn btn-ghost btn-sm" style="margin-top:10px" onclick="peAdd('${sg.key}');OPEN_STAGE='${sg.key}'"><i data-lucide="plus"></i> Add step</button></div>`;
    }
    h += `</div>`;
  });
  h += `<div class="row-actions">
    <span class="hint">Notes you write here flow into the final project export.</span>
    <button class="btn" onclick="toPresent()" ${done===total&&total>0?'':'disabled'}><i data-lucide="presentation"></i> All steps done → present it</button>
  </div>`;
  if(done<total) h+=`<div class="hint" style="text-align:right">Finish (or delete) every step to unlock the Present phase.</div>`;
  return h;
}
function toggleStage(key){ OPEN_STAGE = OPEN_STAGE===key?null:key; render(); }
function stepDone(key,i,v){ const st=peStage(key); st.steps[i].done=v; saveProj(); render(); }
/* "New to this?" links — steps that assume technical prereq knowledge get a
   pointer to the basics (Mike's playtest feedback: the SQL-load step assumed
   you already knew how to make a database). Specific how-to lessons first,
   then the step's tagged kit as the general fallback. */
const KIT_HOME = {excel:'../excel/', sql:'../sql/', tableau:'../tableau/', powerbi:'../powerbi/', python:'../python/'};
function stepLearnLink(s){
  if(!s.skill || !KIT_HOME[s.skill]) return '';
  let href = KIT_HOME[s.skill], label = skillLabel(s.skill)+' basics';
  if(s.skill==='sql' && /\b(load|import|create|set ?up)\b/i.test(s.text) && /\b(database|table|csv|raw)\b/i.test(s.text)){
    href = '../sql/#lesson-105'; label = 'How to set up a SQL database';
  }
  return `<a class="note-btn" href="${href}" target="_blank" rel="noopener" style="text-decoration:none">📚 New to this? ${label} →</a>`;
}
function stepNote(key,i,v){ peStage(key).steps[i].notes=v; saveProj(); }
function toggleNote(id){ const el=document.getElementById('note-'+id); el.style.display = el.style.display==='none'?'block':'none'; if(el.style.display==='block')el.focus(); }
function toPresent(){
  const p=getProj(VIEW.id);
  if(!p.present.checklist.length) p.present.checklist = defaultDeliverables(p.scope);
  p.phase='present'; saveProj(); render();
}

/* =============================================================
   PHASE 4 — PRESENT
   ============================================================= */
function defaultDeliverables(sc){
  const items = [
    'A short README: the question, the data source, and the answer in the first three lines.',
    'The methodology write-up: how you cleaned, what you measured, and why (your cleaning log + criteria).',
    'The main deliverable, polished: titled, labeled, readable without you explaining it.',
    'A limitations & next-steps section — honest about proxies, gaps, and what you\'d do with more time.'
  ];
  if(sc.outputType==='dashboard') items.splice(2,0,'A published/shareable link to the dashboard (Tableau Public or Power BI publish-to-web).');
  if(sc.tools.includes('sql')) items.push('Your key SQL queries saved in a .sql file with one comment line each explaining intent.');
  if(sc.tools.includes('excel')) items.push('The workbook organized: raw / clean / analysis tabs clearly separated and named.');
  if(sc.tools.includes('python')) items.push('The prep script or notebook runnable top-to-bottom in one pass.');
  return items.map(t=>({id:'d'+Math.random().toString(36).slice(2,8), text:t, done:false}));
}
function presentHTML(p){
  const cl = p.present.checklist;
  const done = cl.filter(c=>c.done).length;
  let h = `<div class="card">
    <h2>Package it for a hiring manager</h2>
    <p class="sub" style="font-size:13.5px">A portfolio project isn't done when the analysis is done — it's done when a stranger can understand it in two minutes. Check these off as you package it.</p>`;
  cl.forEach((c,i)=>{
    h += `<div class="step-row ${c.done?'done':''}">
      <input type="checkbox" ${c.done?'checked':''} onchange="delivDone(${i},this.checked)">
      <span class="txt">${esc(c.text)}</span>
    </div>`;
  });
  h += `<div class="deliv-note"><b>Interview tip:</b> practice a 90-second walkthrough out loud — question, approach, answer, one limitation. That walkthrough is what gets asked about, not the code.</div>
  <div class="label" style="margin-top:16px">Presentation notes</div>
  <textarea rows="4" style="margin-top:6px" placeholder="Your headline finding, the story you'll tell, links to the published work..." oninput="presNote(this.value)">${esc(p.present.notes)}</textarea>
  <div class="row-actions">
    <button class="btn btn-outline" onclick="copyExport()"><i data-lucide="copy"></i> Copy project doc</button>
    <button class="btn" onclick="downloadExport()"><i data-lucide="download"></i> Download project doc (.md)</button>
  </div>
  <div id="expMsg" class="ok"></div>
  <div class="hint">The export bundles your scope, full step-by-step with notes, and this checklist — a ready skeleton for the project's README.</div>
  ${done===cl.length&&cl.length?'<div class="ok" style="margin-top:10px">✓ Fully packaged. Put it in front of people.</div>':''}
  </div>`;
  return h;
}
function delivDone(i,v){ const p=getProj(VIEW.id); p.present.checklist[i].done=v; saveProj(); render(); }
function presNote(v){ getProj(VIEW.id).present.notes=v; saveProj(); }

function exportMD(p){
  const sc=p.scope;
  let md = `# ${projName(p)} — analysis project\n\n**Question:** ${sc.question}\n\n**Deliverable:** ${(OUTPUT_TYPES.find(o=>o.id===sc.outputType)||{}).label||''} ${sc.outputNote?'— '+sc.outputNote:''}\n**Tools:** ${sc.tools.map(skillLabel).join(', ')}\n\n## Scope\n\n### Criteria\n${sc.criteria.filter(c=>c.trim()).map(c=>'- '+c).join('\n')}\n\n### Data feasibility\n${feasRows(sc).map(f=>`- ${f.criterion}: **${f.status}**${f.note?' — '+f.note:''}`).join('\n')}\n\n## Step-by-step\n`;
  STAGES.forEach((sg,si)=>{
    const st=p.plan.stages.find(x=>x.key===sg.key);
    if(!st||!st.steps.length) return;
    md += `\n### ${si+1}. ${sg.title} — ${sg.mission}\n`;
    st.steps.forEach(s=>{
      md += `- [${s.done?'x':' '}] ${s.text}${s.skill?' `['+skillLabel(s.skill)+']`':''}\n`;
      if(s.notes.trim()) md += `  - _${s.notes.trim().replace(/\n/g,' ')}_\n`;
    });
  });
  md += `\n## Presentation checklist\n${p.present.checklist.map(c=>`- [${c.done?'x':' '}] ${c.text}`).join('\n')}\n`;
  if(p.present.notes.trim()) md += `\n## Presentation notes\n${p.present.notes}\n`;
  md += `\n---\n_Scoped, planned, and built with Project Studio — Analyst Prep Kit._\n`;
  return md;
}
function copyExport(){
  navigator.clipboard.writeText(exportMD(getProj(VIEW.id))).then(()=>{
    document.getElementById('expMsg').textContent='Copied to clipboard.';
  });
}
function downloadExport(){
  const p=getProj(VIEW.id);
  const blob = new Blob([exportMD(p)],{type:'text/markdown'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(projName(p).toLowerCase().replace(/[^a-z0-9]+/g,'-')||'project')+'-project.md';
  a.click(); URL.revokeObjectURL(a.href);
}

/* ---------- theme (cross-kit contract) ---------- */
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  const ic=document.getElementById('themeIcon');
  if(ic){ ic.innerHTML = `<i data-lucide="${t==='dark'?'sun':'moon'}"></i>`; if(window.lucide) lucide.createIcons(); }
}
function toggleTheme(){
  const t = document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  localStorage.setItem('apk-theme',t); applyTheme(t);
}
applyTheme(localStorage.getItem('apk-theme')||'light');

render();
</script>
<script src="../assets/apk-footer.js" defer></script>
