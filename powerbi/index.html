   build:{q:"Your manager should be able to pick a region themselves while viewing the report. What do you add?",opts:["A report-level filter on Region","A slicer on the canvas bound to Region","A visual-level filter on each chart","A drill-through page per region"],ans:1,exp:"Viewers interact with slicers — they sit on the canvas and invite clicking. Filters in the pane are the author's tool and are invisible to most viewers. Twelve visual-level filters is twelve places to keep in sync."},
   close:"You can pick the right control for the job: slicers for viewers, pane filters for authors, scoped to exactly the right level. Next: drill-through and cross-filtering.",
   unlock:"'Edit Interactions' is the answer to a whole family of layout puzzles — like a slicer that should drive the four detail charts but leave the year-to-date headline card alone. Most Power BI users never find the feature; report builders who know it stop fighting their own slicers."
  },
  {id:10, unit:"Unit 3: Reports & Insights", title:"Drill-Through & Cross-Filtering", sub:"Letting data guide the story",
   story:"Slicers filter the page. Drill-through is the next level: right-click a data point, drill through to a detail page focused on that item. Cross-filtering is when clicking a bar in one chart automatically filters the other charts on the page. Both are on by default — understanding them stops you from being confused when a chart 'randomly' changes.",
   intro:"Drill-through is the 'zoom in' on a map app — click a region and jump to a detailed page about just that spot. Drill-through pages let users right-click a data point and jump to a detail page. Cross-filtering means selecting one visual automatically filters the others on the same page.",
   ral:{
     code:"Drill-through:\n1. Create a detail page\n2. Drag a field to 'Drill-through' in Filters pane\n3. Right-click any data point in your report → Drill through →\n\nCross-filter:\n• Clicking a bar in one visual highlights/filters others",
     say:"For drill-through, create a detail page and drag a field into the Drill-through area; users right-click any data point to jump there. Cross-filtering happens automatically — clicking a bar in one visual highlights and filters the others on the page.",
     lines:[
       ["Drill-through field","the key that connects the summary page to the detail page"],
       ["Right-click → Drill through","how end users navigate to the detail page"],
       ["Back button","Power BI auto-adds a back button to drill-through pages"],
       ["Cross-filtering","default behavior — clicking a visual element filters others"],
       ["Edit Interactions","use to change cross-filter to highlight, or disable it entirely"]
     ]
   },
   notes:"Drill-through is perfect for an executive summary → detail workflow. Add the dimension (e.g., Customer Name) to the drill-through field well on your detail page, and any visual showing that dimension becomes drill-through-enabled.",
   viz:{title:"Drill-through & cross-filtering",html:`<div style="display:flex;gap:14px;flex-wrap:wrap;font-size:11px">
     <div style="border:1px solid var(--border);border-radius:8px;padding:10px;min-width:150px">
       <div style="font-weight:700;margin-bottom:6px">🔎 Drill-through</div>
       <div style="color:var(--dim)">Right-click <b style="color:var(--accent)">West</b> →</div>
       <div>jumps to a <b>detail page</b> filtered to West</div>
     </div>
     <div style="border:1px solid var(--border);border-radius:8px;padding:10px;min-width:185px">
       <div style="font-weight:700;margin-bottom:6px">↔ Cross-filtering</div>
       <div>Click <b style="color:var(--accent)">West</b> on the Region chart →</div>
       <div>the Product chart on the <b>same page</b> filters to West</div>
     </div>
   </div>`,caption:"Two ways visuals interact: drill-through right-clicks to a separate detail page; cross-filtering clicks one visual to filter the others on the same page."},
   quiz:{q:"To create a drill-through page in Power BI, what must you add to the detail page?",opts:["A back button","A slicer for the drill field","The field in the page's Drill-through field well","A bookmark"],ans:2,exp:"Adding a field to the Drill-through well in the Filters pane registers that page as a drill-through destination for that dimension. Power BI auto-creates the Back button."},
   parsons:{prompt:"Arrange the drill-through setup, from new page to the user's click.",lines:["Create the detail page with its visuals","Drag Customer Name into the page's Drill-through field well","Power BI auto-adds the Back button","User right-clicks a customer → Drill through → detail page"],answer:[0,1,2,3]},
   compare:"The page and its drill-through field exist before any user can navigate — drill-through is authored plumbing, not a default behavior. The right-click is the last step because everything before it is what makes the option appear in that menu.",
   build:{q:"You click the 'West' bar in the Region chart and the Product chart next to it changes too. What is that?",opts:["Drill-through","Cross-filtering — selecting in one visual filters the others on the page","A page-level filter","A broken relationship"],ans:1,exp:"Cross-filtering is the default same-page interaction: a selection in one visual filters or highlights the rest. Drill-through navigates to a different page via right-click — different feature, different gesture."},
   close:"You can wire a summary-to-detail flow and explain why charts react to each other. Next: design principles — making the report worth looking at.",
   unlock:"Drill-through inverts dashboard economics: instead of cramming every breakdown onto one page 'in case someone asks,' you keep the summary clean and let the right-click carry people to detail. One drill-through page often replaces three cluttered report pages."
  },
  {id:11, unit:"Unit 3: Reports & Insights", title:"Dashboard Design Principles", sub:"Layout, hierarchy, and visual clarity",
   story:"Your interactions work correctly. Now make the report readable. Layout hierarchy: most important KPI at the top-left (where eyes go first). One or two accent colors, maximum. White space matters more than people think. Every visual should answer one specific question — if it can't be labeled with a question, remove it.",
   intro:"A cluttered report is a road sign with twenty messages — technically all true, completely useless at 60 mph. A technically correct report that&rsquo;s visually cluttered won&rsquo;t be used. These four principles — hierarchy, alignment, color restraint, and context — separate a good report from a great one.",
   ral:{
     code:"1. Hierarchy   → most important number top-left, largest\n2. Alignment   → snap visuals to grid, equal spacing\n3. Color       → 1-2 accent colors max, grey for context\n4. Context     → every number needs a comparison (vs LY, vs target)",
     say:"Four design principles for a dashboard: put the most important number top-left and largest. Snap everything to a grid with equal spacing. Use one or two accent colors plus grey for context. And every number needs a comparison — versus last year, versus target.",
     lines:[
       ["Hierarchy","F-pattern reading — put KPI cards top-left, details below"],
       ["Alignment","use the Format → Align tools — never eyeball spacing"],
       ["Color restraint","use your accent color only for the most important values"],
       ["Grey for context","prior period lines, benchmarks — grey recedes, letting color lead"],
       ["Comparison","a number without context is trivia — always show vs target or vs prior"]
     ]
   },
   notes:"The &ldquo;fewer clicks&rdquo; rule: if your audience needs more than 2 clicks to answer their most common question, redesign the report. Every drill-through should earn its complexity.",
   viz:{title:"Report layout & hierarchy",html:`<div style="font-size:11px;display:flex;flex-direction:column;gap:8px">
     <div style="display:flex;gap:8px"><div style="flex:1;border:2px solid var(--accent);border-radius:6px;padding:11px;text-align:center;color:var(--accent);font-weight:700">⭐ Headline KPI</div><div style="flex:1;border:1px solid var(--border);border-radius:6px;padding:11px;text-align:center;color:var(--dim)">KPI</div><div style="flex:1;border:1px solid var(--border);border-radius:6px;padding:11px;text-align:center;color:var(--dim)">KPI</div></div>
     <div style="border:1px solid var(--border);border-radius:6px;padding:20px;text-align:center;color:var(--dim)">📊 Supporting detail chart</div>
   </div>`,caption:"We read top-left first, so your most important KPI goes there. Big headline numbers up top, supporting detail below — the layout walks the eye from 'what happened' to 'why'."},
   quiz:{q:"According to the hierarchy principle, where should your most important KPI card be placed?",opts:["Bottom-right (most prominent)","Center of the canvas","Top-left (F-pattern reading)","Top-right"],ans:2,exp:"Users read dashboards in an F-pattern — top-left first, then across, then down. Place your headline number top-left to ensure it's seen first."},
   parsons:{prompt:"Arrange the design pass you run on a finished report, in the order the principles apply.",lines:["Hierarchy: headline KPI top-left, largest","Alignment: snap visuals to the grid, equal spacing","Color: one or two accents, grey for context","Context: every number gets a comparison (vs LY, vs target)"],answer:[0,1,2,3]},
   compare:"Structure before styling: hierarchy and alignment decide where things sit, color and context decide how they read. Running the pass in this order stops you from polishing a chart you're about to move.",
   build:{q:"A report shows 'Revenue: $1.2M' as its headline card. What's the design flaw?",opts:["The number should be bottom-right","No comparison — $1.2M means nothing without vs target or vs last year","Revenue should always be a bar chart, not a card","The card needs more accent colors"],ans:1,exp:"A number without context is trivia. Is $1.2M good? Add the comparison — vs target, vs prior year — and the card answers the question instead of raising it. Placement top-left is right for a headline, and more color would hurt, not help."},
   close:"You can make a correct report readable — hierarchy, alignment, restraint, context. Next: publishing, so someone other than you can actually see it.",
   unlock:"Color restraint has a mechanical trick: build the whole report in greys first, then spend your one accent color only on the values that answer the page's core question. If everything is highlighted, nothing is — grey-first makes that impossible to fake."
  },
  {id:12, unit:"Unit 3: Reports & Insights", title:"Publishing & Sharing", sub:"Power BI Service, workspaces, and access",
   story:"Your dashboard is clean and correct. The final step: publish to Power BI Service so your manager can view it in a browser with no software. Create a workspace, publish from Desktop, share the link or embed in Teams. Schedule a data refresh so it stays current without you manually re-running anything.",
   intro:"Publishing is like moving a doc to a shared drive — your file goes from your desk (Desktop) to a place the whole team can open it (the Service). Publishing sends your .pbix file to the Power BI Service (the web app). From there you can share dashboards, set up automatic refresh, and control who sees what.",
   ral:{
     code:"Desktop: File → Publish → Select workspace\n           ↓\nPower BI Service (app.powerbi.com)\n  ├─ Workspace  → where the report lives\n  ├─ Dashboard  → pinned visuals from reports\n  └─ Share      → link or direct access",
     say:"From Desktop, click File then Publish and choose your workspace. The report lives in the Power BI Service. A dashboard is a separate page where you pin individual visuals from reports. Share gives others a link or direct access.",
     lines:[
       ["Publish","sends the .pbix to the Service — report + dataset uploaded"],
       ["Workspace","a container in the Service — like a folder with access control"],
       ["Dashboard","a collection of pinned tiles from one or more reports"],
       ["Share","gives specific users view access to a report or dashboard"],
       ["Scheduled Refresh","set data to auto-refresh on a schedule — requires a gateway for on-premise data"]
     ]
   },
   notes:"Sharing a report gives view access to that report only. If you want users to explore data themselves, consider giving them access to the workspace or using an App. Apps are the cleanest delivery method for end users.",
   viz:{title:"Publish & share",html:`<div style="display:flex;align-items:center;gap:8px;font-size:11px;justify-content:center;flex-wrap:wrap">
     <div style="border:1px solid var(--border);border-radius:6px;padding:8px 12px;text-align:center">🖥️ Power BI<br>Desktop</div>
     <span style="color:var(--accent);font-weight:700">→ Publish →</span>
     <div style="border:2px solid var(--accent);border-radius:6px;padding:8px 12px;text-align:center;color:var(--accent)">☁️ Workspace<br>(the Service)</div>
     <span style="color:var(--accent);font-weight:700">→ Share →</span>
     <div style="border:1px solid var(--border);border-radius:6px;padding:8px 12px;text-align:center">👥 Your<br>team</div>
   </div>`,caption:"You build in Power BI Desktop, Publish to a Workspace in the Power BI Service (the cloud), then share it. A workspace is the shared folder where your team's reports and dashboards live."},
   quiz:{q:"What is a Power BI workspace?",opts:["A single report page","A container in the Service for organizing reports, datasets, and dashboards with access control","The desktop application","The Filters pane on a report"],ans:1,exp:"A workspace is a collaboration space in the Power BI Service. You add members with different roles (Admin, Member, Contributor, Viewer) and publish content to it. Apps are built from workspaces for cleaner end-user delivery."},
   parsons:{prompt:"Arrange the path from your desktop file to your manager's browser.",lines:["Build the report in Power BI Desktop (.pbix)","File → Publish → choose the workspace","The report lives in the Power BI Service","Share the link — your manager views it in a browser"],answer:[0,1,2,3]},
   compare:"Desktop builds, the Service delivers. Publish is the handoff in the middle — everything before it is your private working copy, everything after it is what the team sees. That split is also why edits in Desktop don't appear until you publish again.",
   build:{q:"Your report uses a local Excel file and must stay current in the Service without you re-publishing daily. What do you set up?",opts:["Email the .pbix to your team every morning","Scheduled Refresh — with a gateway for the on-premise file","A second workspace","Cross-filtering on every page"],ans:1,exp:"Scheduled Refresh re-runs your queries in the Service on a timer. Because the Excel file lives on a local machine, the Service needs a data gateway to reach it. Re-publishing only updates the report design — refresh is about the data."},
   close:"You can take a report from your desktop to the whole team — published, shared, and refreshing on schedule. That's the core curriculum done. Next: the Data Migration track, where these skills meet a real project.",
   unlock:"'Who can see this?' is the question that gets analysts in trouble, not 'is the DAX right?' Workspace roles (Admin/Member/Contributor/Viewer) plus row-level security are the real answer — knowing to bring up access control unprompted reads as production experience in interviews."
  },
{id:401, unit:"Unit 4: Data Migration", title:"Profiling Source Data", sub:"Power Query: Column quality, distribution, profile.",
   story:"You're migrating data into a Power BI model. Before building a single measure, you profile the source in Power Query — the Shape phase is where migration analysts live. Column quality, distribution, and profile turn \"looks fine\" into exact counts of valid, error, empty, and distinct values.",
   ral:{code:"View ▸ Column quality       → valid / error / empty %\nView ▸ Column distribution  → distinct & unique counts\nView ▸ Column profile       → full stats for one column", say:"Turn on Column quality, distribution, and profile in the Power Query View ribbon to see valid/error/empty percentages and distinct counts for every column before you load.",
     lines:[["Column quality","% valid, error, and empty per column — your completeness snapshot"],["Column distribution","distinct vs unique value counts — spot repeated keys"],["Column profile","min / max / count / error / empty for the selected column"],["profile whole table","switch off the 1,000-row sample so the profile covers every row"]]},
   notes:"By default Power Query profiles only the first 1,000 rows — click the status bar and choose \"Column profiling based on entire data set\" so your migration profile reflects every row. Distinct ≠ unique: distinct counts each value once; unique counts only values that appear exactly once.",
   viz:{html:"<div style=\"overflow-x:auto\"><table style=\"border-collapse:collapse;font-family:var(--mono);font-size:13px;width:100%\"><thead><tr><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">column</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">valid %</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">empty %</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">read</th></tr></thead><tbody><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Email</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">99%</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">1%</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">100 empty</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Phone</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">97.6%</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">2.4%</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">240 empty</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Amount</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">100%</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">0%</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">complete</td></tr></tbody></table></div>", caption:"Power Query's Column quality bar across fields: Email and Phone have gaps to default or fix in the Shape phase; Amount is complete — all before any data reaches the model."},
   quiz:{q:"By default, Power Query column profiling is based on…", opts:["The entire dataset, always","First 1,000 rows — not all of them","A random 10% sample of the rows","Only the numeric columns count"], ans:1, exp:"Power Query profiles the top 1,000 rows by default for speed. For a migration you switch to \"based on entire data set\" (status bar) so the quality and distinct counts reflect every row."},
   parsons:{prompt:"Arrange the profiling setup: turn the panes on, widen the sample, then read.",lines:["View ▸ tick Column quality + Column distribution","Status bar → 'Column profiling based on entire data set'","Read valid / error / empty % per column","Decide the fixes before anything loads to the model"],answer:[0,1,2,3]},
   compare:"Panes on first, full-dataset second — profiling the default 1,000-row sample can pass a million-row table that's 30% broken further down. Reading and deciding come last because they're only trustworthy after the first two steps.",
   build:{q:"Column distribution shows 5,000 distinct but only 4,200 unique values for CustomerID. What does that mean?",opts:["800 IDs appear more than once — distinct counts each value, unique counts single-appearance values","The column has 800 nulls","The profile is corrupted","5,000 minus 4,200 rows failed to load"],ans:0,exp:"Distinct counts every value once; unique counts only values appearing exactly once. The 800-value gap is IDs that repeat — a duplicate signal to chase before this column anchors a relationship."},
   close:"You can profile a source with exact numbers instead of a scroll-and-squint. Next: removing the duplicates the profile just exposed.",
   unlock:"A profile screenshot pasted into the kickoff ticket — valid %, empty %, distinct counts per column — is migration gold: it's the 'before' photo that proves what the source looked like when arguments start later about where the bad data came from."
  },
{id:402, unit:"Unit 4: Data Migration", title:"Removing Duplicates", sub:"Power Query: Remove / Keep Duplicates, Applied Steps.",
   story:"Profiling flagged repeated CustomerIDs — common from an upstream join. In Power Query you review and remove them in the Shape phase, before the data ever reaches the model, so every duplicate fix is one repeatable step.",
   ral:{code:"Select the key column(s)\nHome ▸ Remove Rows ▸ Remove Duplicates\n-- review first:  Home ▸ Keep Rows ▸ Keep Duplicates", say:"Select the key column, then Remove Duplicates from the Home ribbon — or Keep Duplicates first to review every repeated row before deleting.",
     lines:[["select the key column(s)","Remove Duplicates acts on the columns you select"],["Remove Duplicates","keeps the first occurrence of each key, drops the rest"],["Keep Duplicates","the review move — shows only rows whose key repeats"],["Applied Steps","every transform is recorded and re-runs automatically on refresh"]]},
   notes:"Power Query records each transform as an Applied Step, so your dedupe re-runs automatically on every refresh — unlike a one-off Excel cleanup. Use \"Keep Duplicates\" to inspect repeats first; they often reveal an upstream grain problem worth fixing at the source.",
   viz:{html:"<div style=\"overflow-x:auto\"><table style=\"border-collapse:collapse;font-family:var(--mono);font-size:13px;width:100%\"><thead><tr><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">CustomerID</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">Name</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">action</th></tr></thead><tbody><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">C-100</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Maya Chen</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">kept (first)</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">C-100</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Maya Chen</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">removed</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">C-101</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Jordan Lee</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">kept</td></tr></tbody></table></div>", caption:"Remove Duplicates on CustomerID keeps the first row per key and drops the rest — recorded as an Applied Step that re-runs on every refresh."},
   quiz:{q:"Why dedupe in Power Query rather than after the data loads?", opts:["It's the only place it's possible","An Applied Step re-runs each refresh","DAX cannot detect duplicates","It's simply faster to type out"], ans:1, exp:"Power Query transforms are Applied Steps that re-execute on every data refresh. Deduping there makes the fix permanent and repeatable, not a manual cleanup you'd have to repeat each time."},
   parsons:{prompt:"Arrange the dedupe: review the repeats before you delete them.",lines:["Select the key column (CustomerID)","Home ▸ Keep Rows ▸ Keep Duplicates — inspect the repeats","Home ▸ Remove Rows ▸ Remove Duplicates","The Applied Step re-runs on every refresh"],answer:[0,1,2,3]},
   compare:"Keep Duplicates before Remove Duplicates — reviewing first is what separates a fix from a blind delete. Repeats often reveal an upstream grain problem worth fixing at the source instead of masking here.",
   build:{q:"You want to LOOK at the repeated rows before deleting anything. Which command?",opts:["Home ▸ Remove Rows ▸ Remove Duplicates","Home ▸ Keep Rows ▸ Keep Duplicates","Transform ▸ Format ▸ Clean","View ▸ Column quality"],ans:1,exp:"Keep Duplicates filters the view to only the rows whose key repeats — the review move. Remove Duplicates deletes immediately; Clean strips characters; Column quality shows percentages, not the rows themselves."},
   close:"You can dedupe with a review step, recorded so it re-runs forever. Next: text cleansing — the hidden characters that break matching.",
   unlock:"Before removing duplicates, sort the repeats by a timestamp column if one exists — Remove Duplicates keeps the FIRST occurrence, so the sort decides whether you keep the oldest or newest record of each key. That choice is a business rule, not a technical one."
  },
{id:403, unit:"Unit 4: Data Migration", title:"Cleansing Text", sub:"Power Query: Transform ▸ Format (Trim, Clean, case).",
   story:"Lookups and relationships keep failing on values that look identical — trailing spaces and mixed case from a legacy export. In Power Query, Transform ▸ Format standardizes a whole column so its keys match the target.",
   ral:{code:"Transform ▸ Format ▸ Trim        -- remove surrounding spaces\nTransform ▸ Format ▸ Clean       -- remove non-printing characters\nTransform ▸ Format ▸ UPPERCASE   -- one consistent case", say:"Use Transform ▸ Format to Trim surrounding spaces, Clean non-printing characters, and force a consistent case so values match across tables.",
     lines:[["Trim","removes leading and trailing spaces"],["Clean","removes non-printing characters (line breaks, tabs) that exports leave behind"],["UPPERCASE / Capitalize","one consistent case so \"ca\" and \"CA\" match"],["why it matters","mismatched whitespace or case silently breaks relationships between tables"]]},
   notes:"Trim + Clean is the standard one-two punch for legacy exports: Trim handles spaces, Clean removes the non-printing characters (line breaks, tabs) that Trim can't. Inconsistent text is the #1 cause of broken relationships in a Power BI model.",
   viz:{html:"<div style=\"overflow-x:auto\"><table style=\"border-collapse:collapse;font-family:var(--mono);font-size:13px;width:100%\"><thead><tr><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">raw</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">after Trim / Clean / UPPER</th></tr></thead><tbody><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">'  West '</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">WEST</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">ca</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">CA</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">'New York' + line break</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">NEW YORK</td></tr></tbody></table></div>", caption:"Each value standardized via Transform ▸ Format — now the keys match the target standard and the relationships resolve."},
   quiz:{q:"A relationship won’t match two values that look identical on screen. Likely fix in Power Query?", opts:["Rebuild the entire data model","Trim/Clean off hidden spaces","Add a new DAX measure here","Change the visual's type"], ans:1, exp:"On-screen-identical values often differ by a trailing space or a non-printing character. Transform ▸ Format ▸ Trim and Clean remove them so the relationship keys finally match."},
   parsons:{prompt:"Standardize the Region column — arrange the cleansing sequence.",lines:["Select the Region column","Transform ▸ Format ▸ Trim — strip surrounding spaces","Transform ▸ Format ▸ Clean — remove non-printing characters","Transform ▸ Format ▸ UPPERCASE — one consistent case"],answer:[0,1,2,3]},
   compare:"Trim then Clean then case: spaces first, invisible characters second, casing last. Each step targets a different way two 'identical' values can differ — running all three is what makes the keys actually match.",
   build:{q:"Two Region values print identically but a relationship refuses to match them. Which pair of transforms removes what you can't see?",opts:["UPPERCASE + lowercase","Trim + Clean","Replace Values + Remove Duplicates","Split Column + Merge Columns"],ans:1,exp:"Trim removes leading/trailing spaces; Clean removes non-printing characters like line breaks and tabs. Those are the two invisible differences — case differences are visible, and the other commands change data rather than reveal hidden characters."},
   close:"You can make text keys actually match, not just look like they match. Next: types and nulls — the other silent model-breakers.",
   unlock:"Legacy exports fail in themes: mainframe extracts pad with trailing spaces, web exports smuggle line breaks into address fields. After one Trim+Clean rescue you'll start running the pair preemptively on every text key column — it costs nothing and removes a whole category of 3 a.m. mysteries."
  },
{id:404, unit:"Unit 4: Data Migration", title:"Type Coercion & Replacing Nulls", sub:"Power Query: Data Type + Replace Values.",
   story:"The model needs typed columns: Amount numeric, Date a real date (for time intelligence), Region non-blank. The source loaded everything as text. You set types and replace nulls in the Shape phase, before the model — a text date breaks every time-intelligence measure.",
   ral:{code:"Transform ▸ Data Type ▸ Decimal Number   (Amount)\nTransform ▸ Data Type ▸ Date            (Signup)\nReplace Values ▸ null → \"Unassigned\"     (Region)", say:"Set Amount to a decimal number and Signup to a date via the column type, then Replace Values to turn nulls in Region into 'Unassigned'.",
     lines:[["Data Type ▸ Decimal Number","coerce text amounts into numbers you can aggregate"],["Data Type ▸ Date","a real date enables time-intelligence DAX (a text date breaks it)"],["Replace Values: null → default","backfill a default so required columns aren’t blank"],["Changed Type step","verify it — don’t trust auto-detect on imported data"]]},
   notes:"A date column left as Text silently breaks every time-intelligence function (TOTALYTD, SAMEPERIODLASTYEAR). Set types in Power Query, not DAX — and check the \"Changed Type\" step rather than trusting auto-detection. Replace Values backfills defaults for columns the model requires.",
   viz:{html:"<div style=\"overflow-x:auto\"><table style=\"border-collapse:collapse;font-family:var(--mono);font-size:13px;width:100%\"><thead><tr><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">source (text)</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">after type / replace</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">model type</th></tr></thead><tbody><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">'144.50'</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">144.50</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Decimal</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">'2026-03-15'</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">2026-03-15</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Date</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">null</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Unassigned</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Text</td></tr></tbody></table></div>", caption:"Each column coerced to the type the model needs and nulls backfilled — so aggregations work and time intelligence has a real date to run on."},
   quiz:{q:"Your Revenue column imported as Text. A measure Total = SUM(Sales[Revenue]) returns what — and where do you fix it?", opts:["The correct sum; no fix needed","BLANK — fix the type in Power Query","An error; fix it over in DAX","0; fix it in the visual itself"], ans:1, exp:"SUM on a Text column returns BLANK with no error. The fix belongs in Power Query (Changed Type) so the column enters the model as a number — not a DAX workaround."},
   parsons:{prompt:"Arrange the typing pass: numbers, then dates, then null backfill, then verify.",lines:["Transform ▸ Data Type ▸ Decimal Number (Amount)","Transform ▸ Data Type ▸ Date (Signup)","Replace Values: null → \"Unassigned\" (Region)","Verify the Changed Type step — don't trust auto-detect"],answer:[0,1,2,3]},
   compare:"Types first, defaults second, verification last. The Changed Type check closes the loop — Power Query's auto-detection guessed once already, and this pass exists precisely because its guesses can't be trusted on imported data.",
   build:{q:"The Region column has nulls, but the model requires every row to have a region. What's the Power Query move?",opts:["Delete the rows with null Region","Replace Values: null → \"Unassigned\"","Change Region's type to Whole Number","Write a DAX measure that skips blanks"],ans:1,exp:"Replace Values backfills a default so required columns aren't blank — the rows keep their revenue and history under an honest 'Unassigned' label. Deleting rows throws away real data, and a DAX skip hides the gap instead of handling it."},
   close:"You can deliver typed, non-null columns to the model — the shape DAX needs. Next: proving the migration actually worked.",
   unlock:"'Unassigned' beats blank for a subtle reporting reason: a null silently falls off most visuals, but 'Unassigned' shows up as its own bar. The gap stays visible to stakeholders — which is exactly the pressure that gets the source system fixed."
  },
{id:405, unit:"Unit 4: Data Migration", title:"Validation & Reconciliation", sub:"COUNTROWS, SUM control totals, Left Anti merge.",
   story:"Data's loaded into the model. Prove it: did every row arrive (count), did the values survive (control total), and exactly which source rows are missing? COUNTROWS and SUM measures tie out source vs target; a Merge Queries anti-join lists what didn't make it.",
   ral:{code:"Source Rows  = COUNTROWS(Source)\nTarget Rows  = COUNTROWS(Sales)\nSource Total = SUM(Source[Amount])\nTarget Total = SUM(Sales[Amount])\n-- Power Query: Merge Queries ▸ Left Anti  → rows only in source", say:"Build COUNTROWS and SUM measures on both source and target and compare them, then use a Left Anti merge in Power Query to list the source rows with no match in the target.",
     lines:[["COUNTROWS(table)","the row-count check on each side — did every record arrive?"],["SUM(table[Amount])","the control total — did the values arrive intact?"],["Merge Queries ▸ Left Anti","keeps source rows with NO match in the target — the records that didn’t migrate"],["Right Anti / orphans","flips it to find target rows with no source parent"]]},
   notes:"A Left Anti join in Merge Queries is Power BI's EXCEPT: it returns exactly the source rows missing from the target. Pair it with matching COUNTROWS and SUM control-total measures (source vs model) for sign-off — the count proves rows arrived, the total proves the values survived.",
   viz:{html:"<div style=\"overflow-x:auto\"><table style=\"border-collapse:collapse;font-family:var(--mono);font-size:13px;width:100%\"><thead><tr><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">check</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">source</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">target</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">match?</th></tr></thead><tbody><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">COUNTROWS</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">18,402</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">18,400</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">no — 2 missing</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">SUM(Amount)</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">$1,240,118</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">$1,240,118</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">yes</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Left Anti ids</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">4471, 4489</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">—</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">did not migrate</td></tr></tbody></table></div>", caption:"Counts are off by two; the control total ties out for rows that arrived; the Left Anti merge names the exact ids that didn't migrate. Resolve before sign-off."},
   quiz:{q:"A Left Anti merge of Source against Target returns rows. What did you find?", opts:["Duplicate source rows","Source rows with no target match","Rows that matched fine","Orphans over in the target"], ans:1, exp:"A Left Anti join keeps only the left (source) rows with no match on the right (target) — exactly the records that failed to migrate. It's the Power Query equivalent of SQL's EXCEPT."},
   parsons:{prompt:"Arrange the sign-off: counts on both sides, control totals, then name the missing rows.",lines:["Source Rows = COUNTROWS(Source)","Target Rows = COUNTROWS(Sales)","Compare the counts and the SUM control totals","Merge Queries ▸ Left Anti → list the rows that didn't migrate"],answer:[0,1,2,3]},
   compare:"Counts prove rows arrived, totals prove values survived, and the Left Anti merge names exactly what's missing. The order matters because the anti-join is expensive detective work — you only run it once the counts tell you something IS missing.",
   build:{q:"You need the opposite list — target rows that have no matching source parent (orphans). Which merge?",opts:["Left Anti (Source against Target)","Right Anti — keeps target rows with no source match","Inner — keeps only the matches","Full Outer — keeps everything"],ans:1,exp:"Right Anti flips the direction: it keeps the right-side (target) rows with no match on the left — records that exist in the new system with no source parent. Left Anti found what failed to migrate; Right Anti finds what shouldn't be there."},
   close:"You can prove a migration: counts tie, totals tie, and every exception has a name. That's the Data Migration track complete. Next: From Question to Metric — turning stakeholder asks into DAX.",
   unlock:"Sign-off language matters: 'counts and control totals tie, exceptions listed with owners' is a sentence a project manager can forward to a steering committee. The Left Anti row list is what turns 'it's mostly fine' into an auditable artifact."
  },
{id:601, unit:"Unit 5: From Question to Metric", title:"Define the Measure Before You Compute It", sub:"CALCULATE encodes the measure, the filter, and the time window together.",
   story:"A stakeholder asks for \"our revenue this quarter.\" Before you write DAX, pin the definition: revenue from which rows — every order or only paid? Over what window — which quarter, by which date table? A measure is an aggregation plus a filter context, and CALCULATE is the function that sets that context. Name the filter context in plain English first and the DAX falls right out of the sentence.",
   ral:{code:"Q3 Paid Sales =\nCALCULATE(\n    SUM(Sales[Amount]),\n    Sales[Status] = \"Paid\",\n    DATESBETWEEN('Date'[Date],\n        DATE(2024,7,1), DATE(2024,9,30))\n)", say:"Sum the amount, but inside a filter context that keeps only paid rows and only dates in the third quarter — paid revenue for Q3.",
     lines:[["CALCULATE(SUM(Sales[Amount]), …)","the measure to compute, then the filters that scope it"],["Sales[Status] = \"Paid\"","the filter: replace the status context with paid only"],["DATESBETWEEN('Date'[Date], …)","the time window, applied through a proper Date table"],["filter context = the definition","everything that makes this number specific lives in CALCULATE's arguments"]]},
   notes:"CALCULATE is the only function that modifies filter context, and its filter arguments are how you encode a metric's definition. Always drive date logic through a dedicated, marked Date table rather than the fact table's date column — time-intelligence functions depend on it. Interview habit: restate a vague \"revenue\" as measure + filter + window in words (\"sum of amount, paid only, dated in Q3\"), and the CALCULATE writes itself argument-for-argument.",
   viz:{html:"<div style=\"overflow-x:auto\"><table style=\"border-collapse:collapse;font-family:var(--mono);font-size:13px;width:100%\"><thead><tr><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">definition part</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">this measure</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">the DAX piece</th></tr></thead><tbody><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Measure</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">revenue (dollars)</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">SUM(Sales[Amount])</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Filter</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">paid orders only</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Sales[Status] = \"Paid\"</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Window</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Q3 2024, by Date table</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">DATESBETWEEN('Date'[Date], …)</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Engine</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">modify the context</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">CALCULATE(...)</td></tr></tbody></table></div>"},
   quiz:{q:"Why route the Q3 window through 'Date'[Date] rather than filtering Sales[OrderDate] directly?", opts:["Sales columns cannot be filtered at all","A marked Date table powers time intelligence","It makes the measure render more quickly","DATESBETWEEN only accepts text columns"], ans:1, exp:"Time-intelligence functions (DATESBETWEEN, DATEADD, TOTALYTD) require a contiguous, marked Date table to walk the calendar correctly. Filtering the fact table's own date column works for one static range but won't support the period comparisons you'll build next."},
   parsons:{prompt:"Arrange the Q3 Paid Sales measure — the expression first, then each filter.",lines:["Q3 Paid Sales =","CALCULATE(","SUM(Sales[Amount]),","Sales[Status] = \"Paid\",","DATESBETWEEN('Date'[Date], DATE(2024,7,1), DATE(2024,9,30)))"],answer:[0,1,2,3,4]},
   compare:"The measure reads exactly like its plain-English definition: sum of amount (the measure), paid only (the filter), dated in Q3 (the window). If you can say the definition as a sentence, the CALCULATE arguments fall out in that order.",
   build:{q:"A stakeholder asks for 'our revenue this quarter.' What's your first move?",opts:["Write SUM(Sales[Amount]) and put it on a card","Pin the definition — which rows count and which window applies — then encode it in CALCULATE","Ask IT for a bigger dataset","Build the visual first and define the measure later"],ans:1,exp:"A vague ask hides two decisions: which rows (every order or only paid?) and which window (calendar Q3 by which date?). Pin both in words first and the CALCULATE writes itself — skip that step and you'll ship a number the stakeholder didn't mean."},
   close:"You can turn a vague ask into a precise measure: aggregation, filter, window, all encoded in CALCULATE. Next: segmentation with SWITCH(TRUE()).",
   unlock:"The restate-then-encode habit doubles as stakeholder management: replying 'so that's sum of amount, paid orders only, July through September?' catches definition mismatches in the meeting, before you've built anything — the cheapest possible moment to catch them."
  },
{id:602, unit:"Unit 5: From Question to Metric", title:"Segment with SWITCH(TRUE())", sub:"Bucket a number into named tiers in a calculated column.",
   story:"\"How many customers are high, medium, and low value?\" There is no tier column — you derive it. SWITCH(TRUE()) walks a list of conditions and returns the first that holds, turning lifetime spend into a named band. As a calculated column it becomes a real dimension you can slice, group, and put on an axis. This is segmentation, the move behind every \"customers by tier\" or \"orders by size\" breakdown.",
   ral:{code:"Customer Tier =\nSWITCH(\n    TRUE(),\n    Customers[LifetimeSpend] >= 1000, \"High\",\n    Customers[LifetimeSpend] >= 250,  \"Medium\",\n    \"Low\"\n)", say:"For each customer, check the conditions top to bottom and return the first label that is true — High at a thousand or more, then Medium at 250, otherwise Low.",
     lines:[["SWITCH(TRUE(), cond, result, …)","the DAX idiom for if/else-if chains — first true condition wins"],[">= 1000 listed before >= 250","order matters: SWITCH stops at the first match, so highest threshold first"],["final \"Low\"","the bare last value is the else — returned when nothing above matched"],["calculated column, not a measure","tiers must be a fixed attribute to slice and group by — compute it per row"]]},
   notes:"SWITCH(TRUE()) evaluates conditions in order and returns at the first TRUE, so list thresholds most-restrictive first or a $5,000 customer falls into Medium. Make the tier a calculated column (a stored row attribute) when you need to slice or put it on an axis; make it a measure only when the buckets depend on the filter context. Interview framing: segmentation is \"derive a dimension the model doesn't have, then aggregate by it.\"",
   viz:{html:"<div style=\"overflow-x:auto\"><table style=\"border-collapse:collapse;font-family:var(--mono);font-size:13px;width:100%\"><thead><tr><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">Category</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">Customers by value tier</th></tr></thead><tbody><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">High</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">420</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Medium</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">1,180</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Low</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">2,640</td></tr></tbody></table></div>", caption:"Customers by value tier"},
   quiz:{q:"In SWITCH(TRUE()), the >= 250 condition is listed before >= 1000. Where does a $5,000 customer land?", opts:["In \"High\", as intended","In \"Medium\", the first match","It errors on the overlap","In a blank, unlabeled tier instead"], ans:1, exp:"SWITCH(TRUE()) returns at the first condition that evaluates TRUE. A $5,000 spend satisfies >= 250 first, so it's labeled \"Medium\" and the High branch never runs. Order conditions from most to least restrictive."},
   parsons:{prompt:"Arrange the Customer Tier column — thresholds from most to least restrictive, else last.",lines:["Customer Tier =","SWITCH(","TRUE(),","Customers[LifetimeSpend] >= 1000, \"High\",","Customers[LifetimeSpend] >= 250, \"Medium\",","\"Low\")"],answer:[0,1,2,3,4,5]},
   compare:"The threshold order IS the logic: SWITCH(TRUE()) stops at the first true condition, so >= 1000 must come before >= 250 or every big spender lands in Medium. The bare \"Low\" sits last as the catch-all else.",
   build:{q:"You need to put Customer Tier on a bar chart axis and in a slicer. Should it be a calculated column or a measure?",opts:["A measure — measures are always preferred","A calculated column — slicers and axes need a stored row attribute","Either works identically","Neither — tiers require a separate table"],ans:1,exp:"Axes and slicers group by stored attributes, so the tier must exist as a column value on each row. A measure has no per-row value to slice by — it only returns numbers inside a filter context. Measures win for aggregations; columns win for dimensions you derive."},
   close:"You can derive a dimension the model doesn't have and slice by it. Next: month-over-month growth with DATEADD.",
   unlock:"Segmentation is the analyst's quiet superpower in meetings: 'high/medium/low value' turns a 4,000-row customer list into three actionable groups. The thresholds themselves are a business conversation — bring the SWITCH, let stakeholders own the cutoffs."
  },
{id:603, unit:"Unit 5: From Question to Metric", title:"Month-over-Month Growth with DATEADD", sub:"Shift the date context back a month, then compare.",
   story:"\"Are we growing?\" needs this month set against last month. DAX does it with time intelligence: DATEADD shifts the current filter context back one month so you can evaluate the same measure for the prior period, then DIVIDE turns the difference into a growth rate. Period-over-period is the most-asked number in any review, and this VAR-and-DATEADD shape is the standard way to produce it.",
   ral:{code:"Sales MoM % =\nVAR Cur  = [Total Sales]\nVAR Prev =\n    CALCULATE([Total Sales],\n        DATEADD('Date'[Date], -1, MONTH))\nRETURN\n    DIVIDE(Cur - Prev, Prev)", say:"Capture this period's total, then recompute the same total with the dates shifted back one month, and express the difference as a fraction of that prior month.",
     lines:[["VAR Cur = [Total Sales]","this period's value in the current filter context"],["DATEADD('Date'[Date], -1, MONTH)","shift the whole date context back one month"],["CALCULATE([Total Sales], …)","re-evaluate the same measure under that shifted context — last month's value"],["DIVIDE(Cur - Prev, Prev)","growth as a share of the prior month; DIVIDE returns blank if Prev is empty"]]},
   notes:"DATEADD needs a contiguous marked Date table — gaps in the calendar make it return blank. Capture values into VARs so the measure reads as plain arithmetic and each piece is evaluated once. Use DIVIDE rather than \"/\" so the earliest month (no prior period) yields a blank instead of an error. Swap MONTH for YEAR to get year-over-year, or use SAMEPERIODLASTYEAR — the same RETURN line.",
   viz:{html:"<div style=\"overflow-x:auto\"><table style=\"border-collapse:collapse;font-family:var(--mono);font-size:13px;width:100%\"><thead><tr><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">Period</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">Sales ($K)</th></tr></thead><tbody><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Jan</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">180</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Feb</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">196</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Mar</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">188</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Apr</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">214</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">May</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">247</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Jun</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">268</td></tr></tbody></table></div>", caption:"Monthly sales"},
   quiz:{q:"Why wrap the growth ratio in DIVIDE(Cur - Prev, Prev) instead of writing (Cur - Prev) / Prev?", opts:["DIVIDE evaluates the measure faster","It returns blank when Prev is empty","The / operator is invalid in DAX","DIVIDE rounds the result for you"], ans:1, exp:"The first period has no prior month, so Prev is blank and a bare \"/\" throws a divide-by-zero/blank error that shows as an error in the visual. DIVIDE returns BLANK() (or an optional alternate) instead, keeping the report clean."},
   parsons:{prompt:"Arrange the MoM measure: capture now, shift back, then divide the difference.",lines:["Sales MoM % =","VAR Cur = [Total Sales]","VAR Prev = CALCULATE([Total Sales], DATEADD('Date'[Date], -1, MONTH))","RETURN DIVIDE(Cur - Prev, Prev)"],answer:[0,1,2,3]},
   compare:"VARs first, RETURN last — capture this month and last month as named values, then the growth line reads as plain arithmetic. Prev needs CALCULATE because DATEADD only shifts context; something has to re-evaluate the measure inside that shifted context.",
   build:{q:"Change this measure from month-over-month to year-over-year. What's the edit?",opts:["Replace DATEADD with TOTALYTD","Change DATEADD('Date'[Date], -1, MONTH) to -1, YEAR","Multiply the result by 12","Change DIVIDE to the / operator"],ans:1,exp:"DATEADD's third argument is the shift unit — swap MONTH for YEAR and Prev becomes the same period last year. (SAMEPERIODLASTYEAR is the equivalent shorthand.) TOTALYTD accumulates rather than shifts, and the arithmetic doesn't change."},
   close:"You can answer 'are we growing?' with a period-over-period measure that survives the first month gracefully. Next: running totals with TOTALYTD.",
   unlock:"The VAR pattern is also a debugging tool: point a card at just Cur, then just Prev, and you can see exactly which half of a wrong growth number is lying. Measures written as one giant nested expression can't be inspected that way."
  },
{id:604, unit:"Unit 5: From Question to Metric", title:"Running Totals with TOTALYTD", sub:"Accumulate a measure across the calendar — year-to-date in one call.",
   story:"A monthly bar shows each month alone; the business wants the climbing line — total so far this year, cumulative to date. DAX gives you TOTALYTD, which re-evaluates a measure over every date from January 1 through the current context, and resets each January. It's the built-in way to build year-to-date revenue and progress-toward-goal lines without hand-writing the date math.",
   ral:{code:"Sales YTD =\nTOTALYTD([Total Sales], 'Date'[Date])\n\n-- general running total (any frame):\nSales Running =\nCALCULATE([Total Sales],\n    FILTER(ALL('Date'[Date]),\n        'Date'[Date] <= MAX('Date'[Date])))", say:"Take the running year-to-date sum of sales across the date table — every day from the first of the year up to the current point — and let it restart each January.",
     lines:[["TOTALYTD([Total Sales], 'Date'[Date])","accumulate the measure from Jan 1 to the current date context"],["resets each year","year-to-date by design — the running total starts over every January"],["FILTER(ALL('Date'[Date]), … <= MAX(…))","the manual pattern: clear the date filter, then keep all dates up to today"],["CALCULATE around it","the running total is just the measure under that everything-so-far context"]]},
   notes:"TOTALYTD is shorthand for CALCULATE over a year-to-date date set; TOTALQTD and TOTALMTD do the quarter and month. When you need a window the built-ins don't cover, the FILTER(ALL('Date'[Date]), <= MAX(...)) pattern is the general running-total engine — clear the date context, then re-apply 'everything up to here.' Both depend on a marked Date table. Use ALL (not ALLSELECTED) when the running total should ignore the page's date slicer.",
   viz:{html:"<div style=\"overflow-x:auto\"><table style=\"border-collapse:collapse;font-family:var(--mono);font-size:13px;width:100%\"><thead><tr><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">Period</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">Sales YTD ($K)</th></tr></thead><tbody><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Jan</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">180</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Feb</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">376</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Mar</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">564</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Apr</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">778</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">May</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">1025</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Jun</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">1293</td></tr></tbody></table></div>", caption:"Year-to-date sales"},
   quiz:{q:"What does the FILTER(ALL('Date'[Date]), 'Date'[Date] <= MAX('Date'[Date])) pattern produce?", opts:["Only the single current date's value alone","A running total of every date up to now","The grand total on every single row","An error unless a slicer is applied"], ans:1, exp:"ALL clears the existing date filter, then the condition keeps every date up to and including the current row's max — so CALCULATE evaluates the measure over everything so far, giving a running total. It's the general-purpose version of TOTALYTD."},
   parsons:{prompt:"Arrange the general running-total pattern: clear the date filter, then keep everything up to now.",lines:["Sales Running =","CALCULATE([Total Sales],","FILTER(ALL('Date'[Date]),","'Date'[Date] <= MAX('Date'[Date])))"],answer:[0,1,2,3]},
   compare:"ALL clears before FILTER keeps — that inside-out order is the whole trick. Clear the date context so every date is visible, then re-admit only the dates up to the current point, and CALCULATE evaluates the measure over that 'everything so far' set.",
   build:{q:"You need a quarter-to-date running total instead of year-to-date. Which built-in?",opts:["TOTALYTD with a fourth argument","TOTALQTD([Total Sales], 'Date'[Date])","SAMEPERIODLASTYEAR","DATEADD with QUARTER"],ans:1,exp:"TOTALQTD is the quarter cousin of TOTALYTD (TOTALMTD does months) — same accumulate-and-reset behavior with a quarterly reset. SAMEPERIODLASTYEAR and DATEADD shift periods; they don't accumulate."},
   close:"You can build the climbing line — YTD with one call, or any window with the FILTER/ALL pattern. Next: funnel conversion.",
   unlock:"The FILTER(ALL(...), <= MAX(...)) shape is worth memorizing because it generalizes past dates: swap the date column for a rank and you get cumulative share; add ALLSELECTED and it respects slicers. One pattern, half a dozen dashboard staples."
  },
{id:605, unit:"Unit 5: From Question to Metric", title:"Funnel Conversion with CALCULATE", sub:"Distinct users per stage, then DIVIDE adjacent stages.",
   story:"Product asks: \"Of everyone who visited, how many signed up, activated, and paid?\" That is a funnel — distinct-user counts that shrink at each stage, and the rates between them. Each stage is a DISTINCTCOUNT scoped by CALCULATE to that step or deeper; the conversion rate is one stage over the one above it via DIVIDE. These few measures answer most \"where are we losing people?\" questions on a dashboard.",
   ral:{code:"Visited =\nDISTINCTCOUNT(Events[UserID])\n\nActivated =\nCALCULATE(DISTINCTCOUNT(Events[UserID]),\n    Events[Step] IN { \"activate\", \"pay\" })\n\nActivation % =\nDIVIDE([Activated], [Visited])", say:"Count distinct users overall, then count distinct users whose step is activate or deeper, and divide the deeper stage by the broader one for the conversion rate.",
     lines:[["DISTINCTCOUNT(Events[UserID])","count each user once however many events they fired"],["CALCULATE(…, Events[Step] IN {…})","scope the count to users who reached this stage"],["IN { \"activate\", \"pay\" }","\"this stage or deeper\" keeps the funnel monotonic — each level ⊆ the one above"],["DIVIDE([Activated], [Visited])","conversion between stages is the deeper count over the broader one"]]},
   notes:"DISTINCTCOUNT counts people, not events — the right grain for a funnel; a plain COUNTROWS would inflate every stage. The monotonic rule is the trap: each stage's IN set must include all deeper steps, or a user who jumped straight to paying drops out of the middle and a later stage looks bigger than an earlier one. DIVIDE keeps an empty stage from erroring. The widest gap between two stages is where the business is leaking.",
   viz:{html:"<div style=\"overflow-x:auto\"><table style=\"border-collapse:collapse;font-family:var(--mono);font-size:13px;width:100%\"><thead><tr><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">Category</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">Signup funnel (distinct users)</th></tr></thead><tbody><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Visited</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">12,000</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Signed up</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">4,200 · 35%</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Activated</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">2,100 · 50%</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Paid</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">760 · 36%</td></tr></tbody></table></div>", caption:"Signup funnel (distinct users)"},
   quiz:{q:"Why does the Activated measure filter Events[Step] IN { \"activate\", \"pay\" } rather than just \"activate\"?", opts:["DAX cannot filter on a single value","So users who paid still count as activated","To make the measure evaluate faster","IN sets are required by DISTINCTCOUNT"], ans:1, exp:"A funnel must shrink at every step: anyone who paid necessarily passed activation. Filtering to only \"activate\" would exclude paying users from the activated stage, making a later stage exceed an earlier one. Including all deeper steps keeps the funnel monotonic."},
   parsons:{prompt:"Arrange the Activated stage measure — the count, scoped to activate-or-deeper.",lines:["Activated =","CALCULATE(","DISTINCTCOUNT(Events[UserID]),","Events[Step] IN { \"activate\", \"pay\" })"],answer:[0,1,2,3]},
   compare:"Same CALCULATE shape as every scoped measure: the aggregation first, then the filter. The funnel-specific part is inside the filter — the IN set includes every deeper step so paying users still count as activated.",
   build:{q:"Visited and Activated exist as measures. Which measure is the activation conversion rate?",opts:["Activation % = [Activated] - [Visited]","Activation % = DIVIDE([Activated], [Visited])","Activation % = DIVIDE([Visited], [Activated])","Activation % = COUNTROWS(Events)"],ans:1,exp:"Conversion is the deeper stage over the broader one — Activated over Visited, with DIVIDE for safety. Flipping the ratio gives a number over 100%, and subtraction gives a user count, not a rate."},
   close:"You can build the funnel every product meeting asks about — distinct users per stage and the rates between them. Next: the capstone, cohort retention.",
   unlock:"The widest gap between two funnel stages is where the business is leaking — and pointing at it is how a dashboard drives a decision. 'Activation to paid is our weakest step at 36%' starts a roadmap conversation; a wall of counts doesn't."
  },
{id:606, unit:"Unit 5: From Question to Metric", title:"Cohort Retention", sub:"Stamp a signup cohort, then normalize active users to month 0.",
   story:"Growth can hide churn: you add customers every month while older ones quietly leave. Cohort analysis catches it. You stamp each customer with their signup month — a cohort column — count how many are active at each month-offset, then divide by the cohort's starting size to get retention. Read down a column and you see whether newer cohorts retain better than older ones. This is the capstone: a derived dimension, a time offset, and a normalized rate.",
   ral:{code:"-- calculated column on Customers:\nCohort Month =\nSTARTOFMONTH(Customers[SignupDate])\n\n-- retention measure, normalized to the cohort's size:\nRetention % =\nVAR Active = DISTINCTCOUNT(Activity[CustomerID])\nVAR Size =\n    CALCULATE(DISTINCTCOUNT(Activity[CustomerID]),\n        'Offset'[MonthsSince] = 0)\nRETURN DIVIDE(Active, Size)", say:"Tag each customer with the month they signed up, count how many of a cohort are active at each months-since offset, and divide by the cohort's month-0 size to turn counts into a retention rate.",
     lines:[["Cohort Month = STARTOFMONTH(SignupDate)","the derived dimension: the month a customer first signed up"],["MonthsSince offset","the time axis: 0 at join, 1 a month later — a disconnected helper table"],["VAR Size = CALCULATE(…, MonthsSince = 0)","the cohort's starting count, found by forcing the offset back to 0"],["DIVIDE(Active, Size)","normalize each cohort to its own month-0 size so cohorts compare"]]},
   notes:"A cohort matrix is segmentation by signup month crossed with a months-since-signup offset — the same \"derive a dimension, then aggregate\" muscle as SWITCH, now across time. The offset usually comes from a small disconnected table so it can sit on the matrix columns. The crucial move is normalizing each cohort to its own month-0 size (the Size VAR), or a big cohort and a small one can't be compared. Read across a row to watch one cohort decay; read down a column to see whether newer cohorts retain better — the vertical read interviewers look for.",
   viz:{html:"<div style=\"overflow-x:auto\"><table style=\"border-collapse:collapse;font-family:var(--mono);font-size:13px;width:100%\"><thead><tr><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">cohort</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">month 0</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">month 1</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">month 2</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">month 3</th></tr></thead><tbody><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Jan</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">100%</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">62%</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">48%</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">41%</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Feb</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">100%</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">66%</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">53%</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">47%</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Mar</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">100%</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">71%</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">59%</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">—</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Apr</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">100%</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">74%</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">—</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">—</td></tr></tbody></table></div>"},
   quiz:{q:"Why divide each cohort's active count by its own month-0 size (the Size VAR)?", opts:["To rank the cohorts from largest down to smallest","So cohorts of different sizes are comparable","To remove cohorts with missing months","To collapse all cohorts into one total"], ans:1, exp:"Raw active counts can't be compared across cohorts of different sizes — a big cohort always shows bigger numbers. Dividing by each cohort's own month-0 count rescales every cohort to 100% at the start, turning counts into retention rates you can read down a column."},
   parsons:{prompt:"Arrange the Retention % measure: actives, then the month-0 size, then normalize.",lines:["Retention % =","VAR Active = DISTINCTCOUNT(Activity[CustomerID])","VAR Size = CALCULATE(DISTINCTCOUNT(Activity[CustomerID]), 'Offset'[MonthsSince] = 0)","RETURN DIVIDE(Active, Size)"],answer:[0,1,2,3]},
   compare:"Two VARs, one RETURN: the active count in the current cell's context, the same count forced back to month 0, and the ratio between them. The Size VAR is the capstone move — CALCULATE overriding the offset is what lets every cell see its own cohort's starting line.",
   build:{q:"Which function stamps each customer with a Cohort Month calculated column?",opts:["Cohort Month = TOTALYTD(Customers[SignupDate])","Cohort Month = STARTOFMONTH(Customers[SignupDate])","Cohort Month = DATEADD(Customers[SignupDate], -1, MONTH)","Cohort Month = MAX(Customers[SignupDate])"],ans:1,exp:"STARTOFMONTH collapses any signup date to the first of its month — every customer who joined in March gets the same March stamp, which is exactly what makes them a cohort. TOTALYTD accumulates measures, DATEADD shifts, MAX aggregates."},
   close:"You built the cohort matrix — a derived dimension, a time offset, and a normalized rate working together. That's the From Question to Metric track complete. Next: Financial Analysis.",
   unlock:"The vertical read is what separates analysts in an interview: across a row shows one cohort decaying (expected), but down a column compares cohorts at the same age — if month-1 retention climbs cohort over cohort, whatever the product changed is working. Say that unprompted and the room notices."
  },
{id:701, unit:"Unit 6: Financial Analysis", title:"Build the P&L with CALCULATE", sub:"Each statement line is a measure; the subtotals reference them.",
   story:"A ledger table holds every transaction tagged with a statement line — Revenue, COGS, Opex. You want an income statement on a card or matrix: revenue, cost of goods to gross profit, operating expense to operating income. In DAX each line is a measure — CALCULATE filters the ledger to that line — and the subtotals are measures that reference the others. Build them once and they recompute under any slicer, by month, region, or product.",
   ral:{code:"Revenue = CALCULATE(SUM(Ledger[Amount]), Ledger[Line] = \"Revenue\")\nCOGS    = CALCULATE(SUM(Ledger[Amount]), Ledger[Line] = \"COGS\")\nOpex    = CALCULATE(SUM(Ledger[Amount]), Ledger[Line] = \"Opex\")\n\nGross Profit     = [Revenue] - [COGS]\nOperating Income = [Gross Profit] - [Opex]", say:"Write one measure per statement line that filters the ledger to that line and sums it, then build gross profit and operating income as measures that subtract one line measure from another.",
     lines:[["CALCULATE(SUM(Amount), Line = \"Revenue\")","total the ledger with the filter context set to one statement line"],["[Revenue] - [COGS]","gross profit: a measure built from other measures, not a new aggregation"],["[Gross Profit] - [Opex]","operating income: the cascade continues by referencing the prior subtotal"],["measures recompute in context","slice by month or region and every line and subtotal recalculates"]]},
   notes:"An income statement is a cascade of subtotals — revenue − COGS = gross profit, − opex = operating income, − interest & tax = net income — and each isolates a different question. CALCULATE is the engine: it sets the filter context so SUM totals only the rows for one line. Building subtotals as measures that reference other measures (not fresh CALCULATE calls) keeps the model DRY and the logic readable — fix the Revenue measure once and every dependent number follows. Because they're measures, the whole P&L responds live to any slicer on the report.",
   viz:{html:"<div style=\"overflow-x:auto\"><table style=\"border-collapse:collapse;font-family:var(--mono);font-size:13px;width:100%\"><thead><tr><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">Step</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">Amount</th></tr></thead><tbody><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Revenue</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">$760K</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">COGS</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">−300</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Gross profit</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">$460K</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Opex</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">−290</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Operating income</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">$170K</td></tr></tbody></table></div>", caption:"Power BI's native waterfall visual draws exactly this: each grey anchor is a subtotal measure, each red bar a cost subtracting from the line above. Slice by month and the whole cascade redraws."},
   quiz:{q:"Why write Gross Profit as [Revenue] - [COGS] instead of a fresh CALCULATE over the ledger?", opts:["CALCULATE cannot be used twice in one model","It reuses the line measures, so fixes flow through","Subtraction runs faster than any aggregation","Measures cannot reference a table column directly"], ans:1, exp:"Referencing the existing [Revenue] and [COGS] measures keeps the model DRY: correct the Revenue definition once and gross profit, operating income, and every margin built on them update automatically. A separate CALCULATE would duplicate the filter logic and drift out of sync."},
   parsons:{prompt:"Arrange the P&L cascade: line measures first, then the subtotals that reference them.",lines:["Revenue = CALCULATE(SUM(Ledger[Amount]), Ledger[Line] = \"Revenue\")","COGS = CALCULATE(SUM(Ledger[Amount]), Ledger[Line] = \"COGS\")","Gross Profit = [Revenue] - [COGS]","Operating Income = [Gross Profit] - [Opex]"],answer:[0,1,2,3]},
   compare:"Lines before subtotals — Gross Profit can't reference [Revenue] and [COGS] until they exist, and Operating Income continues the cascade off Gross Profit. Each subtotal is subtraction between measures, never a fresh trip to the ledger.",
