function answerQuiz(lessonId, chosen){
  const l = DATA.LESSONS.find(x => x.id === lessonId);
  document.querySelectorAll('.quiz-opt').forEach((b,i) => {
    b.disabled = true;
    if(i === l.quiz.ans) b.classList.add('correct');
    else if(i === chosen && chosen !== l.quiz.ans) b.classList.add('wrong');
  });
  document.getElementById('quiz-exp').classList.add('show');
  if(chosen === l.quiz.ans){
    celebrate();
    setTimeout(() => finishLesson(lessonId), 1200);
  } else {
    const qw = document.getElementById('quiz-wrap');
    if(qw) qw.innerHTML += `<div class="mt row"><button class="btn btn-ghost btn-sm" onclick="retryQuiz(${lessonId})">↩ Try Again</button><button class="btn btn-ghost btn-sm" onclick="finishLesson(${lessonId})">Continue anyway →</button></div>`;
  }
}
function retryQuiz(lid){ renderLesson(lid); }

function finishLesson(id){
  markDone('doneLessons', id);
  const next = DATA.LESSONS.find(l => !state.doneLessons.includes(l.id));
  const qw = document.getElementById('quiz-wrap');
  if(qw){
    const dc = (LESSON_DRILLS[id] || []).length;
    const practiceBtn = dc ? `<button class="btn btn-primary" onclick="startGuided(${id})">Practice this →</button>` : '';
    const nextCls = dc ? 'btn-outline btn-sm' : 'btn-primary';
    const nextBtn = next ? `<button class="btn ${nextCls}" onclick="navigate('lesson',${next.id})">Next: ${next.title} →</button>` : `<button class="btn ${nextCls}" onclick="navigate('practice')">Start Practice →</button>`;
    qw.innerHTML += `<div class="mt row" style="gap:10px;flex-wrap:wrap">${practiceBtn}${nextBtn}<button class="btn btn-ghost btn-sm" onclick="navigate('lessons')">All Lessons</button></div>`;
    qw.lastElementChild?.scrollIntoView({behavior:'smooth', block:'center'}); // bring the new action buttons into view
  }
}

// Zero-dependency parametric SVG (same generators as the SQL kit — PBI is a
// SQL-clone so the CSS vars match). Rendered in the Worked Example stage AFTER
// the output table — the table stays the ground truth; the chart is what an
// analyst would put on the report page.
const _svgNS='xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif" style="width:100%;height:auto;max-width:520px;display:block"';
function _chartScale(vals, H, pad){
  const max=Math.max(...vals,0), min=Math.min(...vals,0), span=(max-min)||1;
  return { y:v=>pad+(max-v)/span*(H-2*pad), zero:pad+(max-0)/span*(H-2*pad), max, min };
}
function svgLineChart(c){
  const W=520,H=280,P=36,L=64,vals=c.values,n=vals.length;
  const s=_chartScale(vals,H,P), x=i=>L+i*(W-L-20)/(n-1);
  const pts=vals.map((v,i)=>`${x(i)},${s.y(v).toFixed(1)}`).join(' ');
  const dots=vals.map((v,i)=>`<circle cx="${x(i)}" cy="${s.y(v).toFixed(1)}" r="3.5" fill="var(--accent)"/><text x="${x(i)}" y="${(s.y(v)-10).toFixed(1)}" fill="var(--text)" font-size="11" text-anchor="middle">${c.fmt?c.fmt(v):v}</text>`).join('');
  const lbls=c.labels.map((t,i)=>`<text x="${x(i)}" y="${H-8}" fill="var(--muted)" font-size="11" text-anchor="middle">${t}</text>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" ${_svgNS} role="img"><title>${c.title}</title><text x="${L}" y="20" fill="var(--text)" font-size="12" font-weight="600">${c.title}</text><line x1="${L}" y1="${H-P+6}" x2="${W-16}" y2="${H-P+6}" stroke="var(--border)" stroke-width="1.5"/><polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2.5"/>${dots}${lbls}</svg>`;
}
function svgBarChart(c){
  const W=520,H=280,P=40,L=64,vals=c.values,n=vals.length;
  const s=_chartScale(vals,H,P), bw=Math.min(72,(W-L-24)/n*0.62), gap=(W-L-24)/n;
  const bars=vals.map((v,i)=>{
    const bx=L+12+i*gap+(gap-bw)/2, y0=s.zero, y1=s.y(v);
    const top=Math.min(y0,y1), h=Math.max(2,Math.abs(y0-y1));
    const col=c.colors?`var(--${c.colors[i]})`:'var(--accent)';
    return `<rect x="${bx.toFixed(1)}" y="${top.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="2" fill="${col}"/>
      <text x="${(bx+bw/2).toFixed(1)}" y="${(top-6).toFixed(1)}" fill="var(--text)" font-size="11" text-anchor="middle">${c.fmt?c.fmt(v):v}</text>
      <text x="${(bx+bw/2).toFixed(1)}" y="${H-8}" fill="var(--muted)" font-size="11" text-anchor="middle">${c.labels[i]}</text>`;
  }).join('');
  const zero=`<line x1="${L}" y1="${s.zero.toFixed(1)}" x2="${W-12}" y2="${s.zero.toFixed(1)}" stroke="var(--muted)" stroke-width="1.5"/>`;
  return `<svg viewBox="0 0 ${W} ${H}" ${_svgNS} role="img"><title>${c.title}</title><text x="${L}" y="20" fill="var(--text)" font-size="12" font-weight="600">${c.title}</text>${zero}${bars}</svg>`;
}
function svgParetoChart(c){
  const W=520,H=280,P=40,L=64,vals=c.values,n=vals.length;
  const s=_chartScale(vals,H,P), gap=(W-L-24)/n, bw=Math.min(64,gap*0.62);
  const yPct=p=>P+(100-p)/100*(H-2*P);
  const bars=vals.map((v,i)=>{
    const bx=L+12+i*gap+(gap-bw)/2;
    return `<rect x="${bx.toFixed(1)}" y="${s.y(v).toFixed(1)}" width="${bw}" height="${(s.zero-s.y(v)).toFixed(1)}" rx="2" fill="var(--accent)"/><text x="${(bx+bw/2).toFixed(1)}" y="${H-8}" fill="var(--muted)" font-size="11" text-anchor="middle">${c.labels[i]}</text>`;
  }).join('');
  const cx=i=>L+12+i*gap+gap/2;
  const line=c.cumPct.map((p,i)=>`${cx(i).toFixed(1)},${yPct(p).toFixed(1)}`).join(' ');
  const dots=c.cumPct.map((p,i)=>`<circle cx="${cx(i).toFixed(1)}" cy="${yPct(p).toFixed(1)}" r="3" fill="var(--warn)"/><text x="${cx(i).toFixed(1)}" y="${(yPct(p)-8).toFixed(1)}" fill="var(--warn)" font-size="10" text-anchor="middle">${p}%</text>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" ${_svgNS} role="img"><title>${c.title}</title><text x="${L}" y="20" fill="var(--text)" font-size="12" font-weight="600">${c.title}</text><line x1="${L}" y1="${s.zero.toFixed(1)}" x2="${W-12}" y2="${s.zero.toFixed(1)}" stroke="var(--muted)" stroke-width="1.5"/>${bars}<polyline points="${line}" fill="none" stroke="var(--warn)" stroke-width="2"/>${dots}</svg>`;
}
function pbiChartHTML(c){
  const svg = c.type==='line'?svgLineChart(c) : c.type==='bar'?svgBarChart(c) : c.type==='pareto'?svgParetoChart(c) : '';
  if(!svg) return '';
  return `<div class="card" style="margin-top:16px"><div class="lesson-eyebrow"><i data-lucide="bar-chart-3"></i> See the chart</div>${svg}${c.caption?`<p class="text-muted text-sm" style="margin:10px 0 0">${c.caption}</p>`:''}</div>`;
}

// ─── SPACED RECALL QUEUE (Phase D port from Excel: +1/+3/+7 lesson positions) ─
let _pendingRecalls = [], _recallLesson = null;
function _getRecallQ(){ return JSON.parse(localStorage.getItem('pbikt-recalls')||'[]'); }
function _saveRecallQ(a){ localStorage.setItem('pbikt-recalls',JSON.stringify(a)); }
function _queueRecalls(id, l){
  if(!l.reinforces||!l.reinforces.length) return;
  let arr=_getRecallQ().filter(e=>e.srcId!==id);
  const conf=(state.confidence||{})[id];
  if(conf==='low'||conf==='mid'){
    const pos=lessonPos(id);
    for(const off of [1,3,7]) arr.push({cues:l.reinforces, srcId:id, dueAt:pos+off});
  }
  _saveRecallQ(arr);
}
function _dequeueRecalls(id){
  const pos=lessonPos(id), arr=_getRecallQ();
  const due=arr.filter(e=>e.dueAt===pos);
  _saveRecallQ(arr.filter(e=>e.dueAt!==pos));
  return due;
}
// Dequeue only when the viewed lesson changes — stage advances re-render the
// same lesson and must not re-consume the queue.
function _syncRecalls(id, l){
  if(_recallLesson===id) return;
  if(l) _queueRecalls(id, l);
  _pendingRecalls = _dequeueRecalls(id);
  _recallLesson = id;
}
function _recallsHTML(){
  return _pendingRecalls.map((e,i)=>`<div class="recall-card">
    <div class="recall-header"><i data-lucide="repeat-2"></i> Quick recall — no peeking</div>
    <ul class="recall-cues">${e.cues.map(c=>`<li>${c}</li>`).join('')}</ul>
    <div class="recall-btns">
      <button class="btn btn-primary btn-sm" onclick="recallGotIt(${i})">I remembered it</button>
      <button class="btn btn-ghost btn-sm" onclick="recallNope(${i})">Nope, remind me again</button>
    </div>
  </div>`).join('');
}
function _refreshRecalls(){
  const el=document.getElementById('v2-recalls');
  if(!el) return;
  if(!_pendingRecalls.length){el.style.display='none';return;}
  el.innerHTML=_recallsHTML();
  if(window.lucide) lucide.createIcons();
}
function recallGotIt(i){
  _pendingRecalls.splice(i,1);
  const w=parseInt(localStorage.getItem('pbikt-recall-wins')||'0')+1;
  localStorage.setItem('pbikt-recall-wins',String(w));
  _refreshRecalls();
}
function recallNope(i){
  const e=_pendingRecalls.splice(i,1)[0];
  const arr=_getRecallQ();
  arr.push({cues:e.cues, srcId:e.srcId, dueAt:lessonPos(_recallLesson)+1});
  _saveRecallQ(arr);
  _refreshRecalls();
}

  const l = DATA.LESSONS.find(x=>x.id===lid);
  if(!l||!l.parsons) return;
  const ans = document.getElementById('v2pbi-ans-'+lid);
  if(!ans) return;
  const chips = [...ans.querySelectorAll('.v2-pars-chip')];
  if(chips.length !== l.parsons.answer.length){
    const fb = document.getElementById('v2pbi-pars-fb-'+lid);
    if(fb) fb.innerHTML='<span style="color:var(--warn);font-size:13px">Move all pieces to the answer area first.</span>';
    return;
  }
  const userOrder = chips.map(c=>+c.dataset.idx);
  const correct = l.parsons.answer.every((v,i)=>v===userOrder[i]);
  _v2ParsAttempt[lid] = {lines: chips.map(c=>c.textContent)};
  _v2ParsWasWrong[lid] = !correct;
  if(correct){
    delete _v2ParsWasWrong[lid];
    celebrate();
    const fb = document.getElementById('v2pbi-pars-fb-'+lid);
    if(fb) fb.innerHTML=`<span style="color:var(--ok,#3a9d6a);font-size:13px;font-weight:600">Correct — that's the right order.</span>
      <div class="row mt" style="gap:10px;margin-top:14px"><button class="btn btn-primary btn-sm" onclick="setPbiStage(${lid},3)">Continue &rarr;</button></div>`;
  } else {
    const fb = document.getElementById('v2pbi-pars-fb-'+lid);
    if(fb) fb.innerHTML='<span style="color:var(--red);font-size:13px;font-weight:600">Not quite — try reordering the pieces.</span>';
    const btn = document.getElementById('v2pbi-coach-try-'+lid);
    if(btn) btn.style.display='';
  }
}

function v2BuildPick(btn, lid){
  const l = DATA.LESSONS.find(x=>x.id===lid);
  if(!l||!l.build) return;
  const wrap = document.getElementById('v2pbi-build-'+lid);
  if(!wrap) return;
  wrap.querySelectorAll('.quiz-opt').forEach(b=>b.disabled=true);
  const isCorrect = btn.dataset.correct==='1';
  btn.classList.add(isCorrect?'correct':'wrong');
  if(!isCorrect) wrap.querySelectorAll('.quiz-opt')[l.build.ans].classList.add('correct');
  const fb = document.getElementById('v2pbi-build-fb-'+lid);
  if(fb) fb.innerHTML=`<div class="quiz-exp show" style="margin-top:10px">${l.build.exp}</div>`;
  if(!isCorrect){ const cb=document.getElementById('v2pbi-coach-build-'+lid); if(cb) cb.style.display=''; }
  const row = isCorrect
    ? `<div class="row mt" style="gap:10px;margin-top:14px"><button class="btn btn-primary btn-sm" onclick="setPbiStage(${lid},5)">Continue &rarr;</button></div>`
    : `<div class="row mt" style="gap:10px;margin-top:14px"><button class="btn btn-primary btn-sm" onclick="setPbiStage(${lid},4)">Try Again</button><button class="btn btn-ghost btn-sm" onclick="setPbiStage(${lid},5)">Continue anyway</button></div>`;
  if(fb) fb.insertAdjacentHTML('beforeend', row);
}

function v2QuizAnswer(lid, chosen){
  const l = DATA.LESSONS.find(x=>x.id===lid);
  if(!l) return;
  const wrap = document.getElementById('v2pbi-quiz-'+lid);
  if(!wrap) return;
  wrap.querySelectorAll('.quiz-opt').forEach((b,i)=>{
    b.disabled=true;
    if(i===l.quiz.ans) b.classList.add('correct');
    else if(i===chosen) b.classList.add('wrong');
  });
  const exp = document.getElementById('v2pbi-quiz-exp-'+lid);
  if(exp) exp.classList.add('show');
  if(chosen===l.quiz.ans){
    celebrate();
    markDone('doneLessons', lid);
    wrap.insertAdjacentHTML('beforeend',`<div class="row mt" style="gap:10px;margin-top:14px">
      <button class="btn btn-primary btn-sm" onclick="setPbiStage(${lid},6)">Continue &rarr;</button>
    </div>`);
  } else {
    wrap.insertAdjacentHTML('beforeend',`<div class="row mt" style="gap:10px;margin-top:14px">
      <button class="btn btn-primary btn-sm" onclick="v2QuizRetry(${lid})">Try Again</button>
      <button class="btn btn-ghost btn-sm" onclick="markDone('doneLessons',${lid});setPbiStage(${lid},6)">Continue anyway</button>
    </div>`);
  }
}

function v2QuizRetry(lid){
  const l = DATA.LESSONS.find(x=>x.id===lid);
  if(!l) return;
  const wrap = document.getElementById('v2pbi-quiz-'+lid);
  if(!wrap) return;
  wrap.innerHTML=`<h3><i data-lucide="circle-check-big"></i> Quick Check</h3>
    <p class="text-muted text-sm" style="margin-bottom:14px">${l.quiz.q}</p>
    ${l.quiz.opts.map((o,i)=>`<button class="quiz-opt" onclick="v2QuizAnswer(${lid},${i})">${o}</button>`).join('')}
    <div class="quiz-exp" id="v2pbi-quiz-exp-${lid}">${l.quiz.exp}</div>
      <div class="row" style="margin-top:14px"><button class="btn btn-ghost btn-sm" onclick="setPbiStage(${lid},4)">&larr; Back</button></div>`;
  if(window.lucide) lucide.createIcons();
}

function v2ResetLesson(id){
  const i = state.doneLessons.indexOf(id);
  if(i>-1) state.doneLessons.splice(i,1);
  state.lessonStage = state.lessonStage||{};
  delete state.lessonStage[id];
  delete _v2ParsAttempt[id];
  delete _v2ParsWasWrong[id];
  saveState();
  showToast('↺ Lesson reset');
  navigate('lesson', id);
}

// AI Coach — Mode 1 (Haiku, stuck-help) + Mode 3 (Sonnet, gap analysis)
// Shares the Anthropic key with the Excel & Python kits via localStorage['apk-coach-key'].
function getCoachKey(){ return localStorage.getItem('apk-coach-key')||''; }
function setCoachKey(k){ localStorage.setItem('apk-coach-key', k.trim()); showToast('Key saved'); }

async function _v2CoachCall(prompt, model, targetId){
  const key = getCoachKey();
  const el = document.getElementById(targetId);
  if(!key){
    if(el){ el.textContent='Add your Anthropic API key in Settings → AI Coach to enable hints.'; el.classList.add('show'); }
    return;
  }
  if(el){ el.textContent='Thinking…'; el.classList.add('show'); }
  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'x-api-key':key,'anthropic-version':'2023-06-01','content-type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model,max_tokens:350,messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    if(el) el.textContent = data.content?.[0]?.text || 'No response — check your key.';
  } catch(e){ if(el) el.textContent='Request failed — check your key in Settings.'; }
}

function v2CoachStuck(lid, stageName){
  const l = DATA.LESSONS.find(x=>x.id===lid);
  if(!l) return;
  const p = l.parsons;
  const isTry = stageName==='try';
  const prompt = isTry
    ? `You are a concise Power BI & DAX tutor. A student is arranging lines in order. Puzzle: "${p.prompt}"\nLines available:\n${p.lines.map((t,i)=>`${i}: ${t}`).join('\n')}\nGive ONE short hint (1-2 sentences) that nudges them toward the right order without revealing it.`
    : `You are a concise Power BI & DAX tutor. A student answered a multiple-choice question about "${l.title}" incorrectly. Question: "${l.build.q}"\nGive ONE short hint (1-2 sentences) pointing toward the correct answer without stating it.`;
  _v2CoachCall(prompt, 'claude-haiku-4-5-20251001', `v2pbi-coach-resp-${isTry?'try':'build'}-${lid}`);
}

function v2CoachGap(lid){
  const l = DATA.LESSONS.find(x=>x.id===lid);
  if(!l) return;
  const p = l.parsons;
  const att = _v2ParsAttempt[lid];
  const correctLines = p.answer.map(i=>p.lines[i]).join('\n');
  const attemptLines = att ? att.lines.join('\n') : '(skipped)';
  const prompt = `You are a Power BI & DAX tutor giving brief gap analysis. Lesson: "${l.title}".\nCorrect order:\n${correctLines}\nStudent's order:\n${attemptLines}\nIn 2-3 sentences, explain the key difference and why the correct order matters. Be direct — no filler.`;
  _v2CoachCall(prompt, 'claude-sonnet-4-6', `v2pbi-coach-resp-gap-${lid}`);
}

// ─── GUIDED PATH (lesson → its drills → next lesson) ────────────────────────
// Every drill linked to the FIRST lesson it applies to — all 36 (FILLS/BUGS/
// PARSONS ×12) appear exactly once. Concept lessons (1/3/11/12) have no DAX
// drills, so the guided flow advances straight past them.
const LESSON_DRILLS = {
  1:  [],
  2:  [['parsons',8]],
  3:  [],
  4:  [['bugs',11]],
  5:  [['fills',8],['fills',11],['bugs',0],['bugs',2],['bugs',4],['bugs',7]],
  6:  [['fills',0],['fills',1],['fills',2],['fills',6],['fills',7],['fills',10],['bugs',1],['bugs',6],['parsons',0],['parsons',2],['parsons',5],['parsons',10]],
  7:  [['fills',3],['fills',9],['bugs',5],['bugs',9],['parsons',1],['parsons',7]],
  8:  [['fills',4],['fills',5],['bugs',3],['bugs',8],['bugs',10],['parsons',3],['parsons',4],['parsons',6]],
  9:  [['parsons',9]],
  10: [['parsons',11]],
  11: [],
  12: []
};
let guided = null;
function startGuided(lessonId){
  const M = {fills:'FILLS', bugs:'BUGS', parsons:'PARSONS'};
  const seq = (LESSON_DRILLS[lessonId] || []).filter(s => M[s[0]] && DATA[M[s[0]]] && DATA[M[s[0]]][s[1]]);
  if(!seq.length){ gotoNextLesson(lessonId); return; }
  guided = {lessonId, seq, pos:0};
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const pb = document.querySelectorAll('.nav-btn')[2]; if(pb) pb.classList.add('active');
  renderGuidedStep();
}
function renderGuidedStep(){
  if(!guided) return;
  const step = guided.seq[guided.pos];
  if(step[0]==='fills') renderFill(step[1]);
  else if(step[0]==='bugs') renderBug(step[1]);
  else if(step[0]==='parsons') renderParsons(step[1]);
  injectGuidedHeader();
}
function injectGuidedHeader(){
  if(!guided) return;
  const main = document.getElementById('main');
  const row = main.querySelector('.row.mb');
  if(!row) return;
  const {seq, pos, lessonId} = guided;
  const lesson = DATA.LESSONS.find(l => l.id === lessonId);
  const step = seq[pos];
  const stepFlag = '';
  row.innerHTML = `<button class="btn btn-ghost btn-sm" onclick="navigate('lesson',${lessonId})">← Back to lesson</button><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;margin-left:auto">${stepFlag}<span class="text-muted text-sm">Practice ${pos+1}/${seq.length} · ${lesson.title}</span></div>`;
  const dots = document.createElement('div');
  dots.style.cssText = 'display:flex;gap:4px;align-items:center;margin:0 0 14px';

var _hd={hint:'',ans:'',state:0};
function cycleHint(){
  _hd.state++;
  var hp=document.getElementById('drill-hint');
  var ap=document.getElementById('drill-answer');
  var btn=document.getElementById('hint-cycle-btn');
  if(_hd.state===1){
    hp.textContent='\u{1F4A1} '+_hd.hint;
    hp.classList.add('show');
    if(btn)btn.textContent='Show Answer';
  } else {
    var esc=(_hd.ans+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    var match=findGlossaryTerm(_hd.ans+'');
    var matchTerm=match?(match.term!==undefined?match.term:match[0]):null;
    var learnHtml=matchTerm?'<button class="learn-more-link" onclick="openGlossaryFor(\''+matchTerm.replace(/'/g,"\\'")+'\')">&#x1F4D6; '+matchTerm+'</button>':'';
    ap.innerHTML='<pre class="answer-code">'+esc+'</pre><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><button class="copy-btn" onclick="doCopy(event)">&#x1F4CB; Copy</button>'+learnHtml+'</div>';
    ap.classList.add('show');
    if(btn)btn.style.display='none';
  }
}
function findGlossaryTerm(ansText){
  if(typeof DATA==='undefined'||!DATA.GLOSSARY)return null;
  var lower=(ansText+'').toLowerCase();
  return DATA.GLOSSARY.find(function(e){var t=(e.term!==undefined?e.term:e[0]).toLowerCase();return t.length>2&&lower.indexOf(t)!==-1;});
}
function openGlossaryFor(term){
  if(typeof navigate==='function')navigate('glossary');
  else if(typeof show==='function')show('glossary');
  setTimeout(function(){
    var s=document.getElementById('gloss-search')||document.getElementById('glossSearch');
    if(s){s.value=term;try{filterGlossary(term);}catch(e){try{filterGlossary();}catch(e2){}}}
  },80);
}
function doCopy(e){
  var btn=e.currentTarget||e.target,orig=btn.textContent;
  function done(){btn.textContent='✓ Copied!';setTimeout(function(){btn.textContent=orig;},1500);}
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(_hd.ans).then(done).catch(function(){_fbCopy(_hd.ans);done();});}
  else{_fbCopy(_hd.ans);done();}
}
function _fbCopy(t){var a=document.createElement('textarea');a.value=t;a.style.position='fixed';a.style.top='-9999px';document.body.appendChild(a);a.focus();a.select();try{document.execCommand('copy');}catch(_){}document.body.removeChild(a);}

// ─── Lucide icons: render now + re-render after any #main view change ───────
(function(){
  // This Lucide build leaves data-lucide ON the generated <svg>, so createIcons
  // re-matches its own output; strip it or the observer loops forever.
  function refresh(){
    if(!window.lucide) return;
    lucide.createIcons();
    document.querySelectorAll('svg[data-lucide]').forEach(function(s){ s.removeAttribute('data-lucide'); });
  }
  refresh();
  var main=document.getElementById('main');
  if(main && 'MutationObserver' in window){
    var queued=false;
    new MutationObserver(function(){
      if(queued) return; queued=true;
      queueMicrotask(function(){ queued=false; refresh(); });
    }).observe(main,{childList:true,subtree:true});
  }
})();

    if(u){lb.style.display='none';lo.style.display='inline-block';if(u.email){em.textContent=u.email;em.style.display='inline-block';}}
    else{lb.style.display='inline-block';lo.style.display='none';em.style.display='none';}
  }catch(e){lb.style.display='inline-block';}
}
setTimeout(initAuthUI,600);
</script>
