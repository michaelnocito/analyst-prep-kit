<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Power BI Dashboards · Free Practice, No Install</title>
<meta name="description" content="Build Power BI dashboards from scratch. Free interactive practice. Learn DAX, visualizations, and data modeling. No installation required.">
<link rel="stylesheet" href="../assets/grain/grain.css">
<style>
/* GRAIN design system. The kit's own semantic vars are re-pointed onto Grain
   tokens (assets/grain/) — no one-off hex. :root = warm dark variant;
   .light = the full Grain cream look (toggled via JS class). A dedicated
   Grain dark palette is a later token job (out of scope). */
:root{
  --bg:var(--stone-900);--surf:var(--stone-800);--surf2:var(--stone-700);
  --accent:var(--clay-400);--accent2:var(--clay-300);
  --text:var(--stone-50);--muted:var(--stone-300);--border:var(--stone-700);
  --red:var(--rust-400);--green:var(--leaf-400);--yellow:var(--amber-300);--warn:var(--amber-400);
  --font:var(--font-sans);--mono:var(--font-mono);
  --r:var(--radius-lg);--r2:var(--radius-sm);--shadow:var(--shadow-lg);
}
.light{
  --bg:var(--color-bg);--surf:var(--color-surface);--surf2:var(--stone-100);
  --accent:var(--clay-500);--accent2:var(--clay-600);
  --text:var(--stone-900);--muted:var(--stone-600);--border:var(--stone-200);
  --red:var(--rust-500);--green:var(--leaf-500);--yellow:var(--amber-600);--warn:var(--amber-600);
  --shadow:var(--shadow-md);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.6;min-height:100vh}
a{color:var(--accent);text-decoration:none}

/* NAV */
nav{background:var(--surf);border-bottom:1px solid var(--border);padding:0 18px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;position:sticky;top:0;z-index:100;height:56px}
.nav-brand{font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--text);padding:0 10px 0 0;margin-right:6px;border-right:1px solid var(--border);white-space:nowrap;display:inline-flex;align-items:center;gap:9px;letter-spacing:var(--tracking-tight)}
.nav-logo-mark{color:var(--accent);background:var(--surf2);width:30px;height:30px;display:inline-grid;place-items:center;border-radius:9px;flex-shrink:0}
.nav-logo-mark .lucide{width:17px;height:17px}
.ws-spot{cursor:pointer;transition:background .15s,outline .15s}
.ws-spot:hover{outline:2px solid var(--accent);outline-offset:-2px}
.ws-spot.lit{outline:2px solid var(--accent);outline-offset:-2px;background:rgba(47,109,240,.16)!important}
.ws-spot.good{outline:2px solid #2e9e6b;outline-offset:-2px;background:rgba(46,158,107,.20)!important}
.ws-spot.bad{outline:2px solid #c0392b;outline-offset:-2px;background:rgba(192,57,43,.18)!important}
.nav-btn{background:none;border:none;color:var(--muted);font:inherit;font-size:13px;padding:14px 10px;cursor:pointer;border-bottom:2px solid transparent;transition:.15s;white-space:nowrap}
.nav-btn:hover{color:var(--text)}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.nav-spacer{flex:1}
.nav-icon{font-size:16px;padding:14px 8px}

/* LAYOUT */
main{max-width:860px;margin:0 auto;padding:28px 20px 60px}
h1,h2,h3{font-family:var(--font-display);letter-spacing:var(--tracking-tight)}
h1{font-size:1.6rem;font-weight:700;margin-bottom:6px}
h2{font-size:1.15rem;font-weight:600;margin-bottom:14px}
h3{font-size:1rem;font-weight:600;margin-bottom:10px}
p{margin-bottom:12px;color:var(--muted)}
p strong{color:var(--text)}

/* CARDS */
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:22px 24px;margin-bottom:16px;box-shadow:var(--shadow)}
.card-sm{padding:14px 18px}
.card-accent{border-color:var(--accent)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--r2);font:600 14px var(--font);cursor:pointer;border:none;transition:.15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--text)}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:7px 14px;font-size:13px}
.flag-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 2px;border-top:1px solid var(--border);cursor:pointer}
.flag-row:hover .flag-row-title{color:var(--accent)}

/* BADGE / PILL */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600}
.badge-unit{background:var(--surf2);color:var(--muted)}
.badge-done{background:var(--leaf-50);color:var(--leaf-700)}

/* PROGRESS BAR */
.prog-wrap{height:6px;background:var(--surf2);border-radius:3px;overflow:hidden;margin:6px 0}
.prog-bar{height:100%;background:var(--accent);border-radius:3px;transition:.4s}

/* HOME — resume card */
.resume-card{background:var(--accent);border-radius:var(--r);padding:24px 28px;margin-bottom:20px;color:#fff}
.resume-card h2{color:#fff;margin-bottom:4px}
.resume-card p{color:rgba(255,255,255,.8);margin:0 0 16px}
.resume-card .btn{background:rgba(255,255,255,.15);color:#fff}
.resume-card .btn:hover{background:rgba(255,255,255,.28)}

/* HOME — path grid */
.path-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.path-tile{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:18px;cursor:pointer;transition:.15s;text-align:center}
.path-tile:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.path-tile .icon{font-size:1.8rem;margin-bottom:8px;color:var(--accent);line-height:1}
.drill-tile .icon{font-size:1.6rem;margin-bottom:8px;color:var(--accent);line-height:1}
.path-tile h3{font-size:.95rem;margin:0 0 4px}
.path-tile p{font-size:12px;margin:0}

/* SKILL BARS */
.skill-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.skill-label{width:130px;font-size:13px;color:var(--muted);flex-shrink:0}
.skill-bar-wrap{flex:1;height:8px;background:var(--surf2);border-radius:4px;overflow:hidden}
.skill-bar{height:100%;background:var(--accent);border-radius:4px;transition:.6s}
.skill-pct{width:34px;font-size:12px;color:var(--muted);text-align:right}

/* LESSON LIST */
.unit-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:10px 0 4px;margin-top:8px}
.lesson-row{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--surf);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:8px;cursor:pointer;transition:.15s}
.lesson-row:hover{border-color:var(--accent);transform:translateX(3px)}
.lesson-num{width:28px;height:28px;border-radius:50%;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);flex-shrink:0}
.lesson-num.done{background:var(--accent);color:#fff}
.lesson-info{flex:1}
.lesson-title{font-weight:600;font-size:14px}
.lesson-sub{font-size:12px;color:var(--muted)}
.lesson-arrow{color:var(--muted);font-size:18px}

/* READ-ALOUD → Grain "Say It Out Loud" card */
.ral-block{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin:0;box-shadow:var(--shadow)}
.ral-head{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--surf2);border-bottom:1px solid var(--border);font-family:var(--font);font-weight:600;font-size:13px;color:var(--text)}
.ral-head .lucide{width:16px;height:16px;color:var(--accent)}
.ral-code{font-family:var(--mono);font-size:13px;background:var(--stone-900);color:var(--stone-100);padding:16px 18px;margin:0;white-space:pre;overflow-x:auto;line-height:1.7}
.ral-body{padding:16px 18px}
.ral-say{font-size:14px;font-style:italic;color:var(--clay-800);background:var(--clay-50);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;padding:9px 13px 9px 11px;margin-bottom:14px;line-height:1.55;display:flex;gap:7px;align-items:flex-start}
.ral-say .lucide{width:15px;height:15px;color:var(--accent);flex-shrink:0;margin-top:3px}
.ral-line{display:flex;align-items:baseline;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)}
.ral-line:last-child{border:none}
.ral-chunk{font-family:var(--mono);font-size:12.5px;color:var(--clay-700);background:var(--clay-50);padding:2px 7px;border-radius:4px;flex-shrink:0}
.ral-arrow{color:var(--muted);flex-shrink:0}
.ral-desc{font-size:13px;color:var(--muted)}

/* Grain lesson-view helpers (story bridge, section eyebrow, confidence rater) */
.lesson-story{display:flex;gap:11px;align-items:flex-start;background:var(--amber-50);border:1px solid var(--amber-100);border-radius:var(--r2);padding:13px 15px;margin-bottom:18px;font-size:.9rem;line-height:1.65;color:var(--stone-800)}
.lesson-story .lucide{width:18px;height:18px;color:var(--amber-600);flex-shrink:0;margin-top:2px}
.lesson-eyebrow{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:var(--tracking-caps);color:var(--muted);margin:0 0 9px;display:flex;align-items:center;gap:7px}
.lesson-eyebrow .lucide{width:15px;height:15px;color:var(--accent)}
.card h3 .lucide{width:17px;height:17px;color:var(--accent);vertical-align:-3px;margin-right:6px}
.quiz-wrap h3 .lucide{width:17px;height:17px;color:var(--accent);vertical-align:-3px;margin-right:6px}
.conf-rater{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-top:16px;box-shadow:var(--shadow)}
.conf-head{display:flex;align-items:center;gap:8px;font-family:var(--font);font-weight:600;font-size:14px;color:var(--text);margin-bottom:4px}
.conf-head .lucide{width:17px;height:17px;color:var(--accent)}
.conf-sub{font-size:12.5px;color:var(--muted);margin:0 0 14px}
.conf-chips{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.conf-chip{display:flex;flex-direction:column;align-items:center;gap:5px;padding:13px 8px;border-radius:var(--r2);cursor:pointer;border:1.5px solid var(--border);background:var(--surf);color:var(--text);font:inherit;transition:.15s}
.conf-chip .lucide{width:20px;height:20px}
.conf-chip:hover{border-color:var(--accent)}
.conf-chip .conf-label{font-size:13px;font-weight:600}
.conf-chip[data-v="low"] .lucide{color:var(--red)}
.conf-chip[data-v="mid"] .lucide{color:var(--warn)}
.conf-chip[data-v="high"] .lucide{color:var(--green)}
.conf-chip.is-on{color:#fff}
.conf-chip.is-on .lucide{color:#fff}
.conf-chip[data-v="low"].is-on{background:var(--red);border-color:var(--red)}
.conf-chip[data-v="mid"].is-on{background:var(--warn);border-color:var(--warn)}
.conf-chip[data-v="high"].is-on{background:var(--success,var(--green));border-color:var(--success,var(--green))}

/* QUIZ */
.quiz-wrap{background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px;margin-top:20px}
.quiz-wrap h3{margin-bottom:14px}
.quiz-opt{display:block;width:100%;text-align:left;background:var(--surf);border:1px solid var(--border);border-radius:var(--r2);padding:11px 16px;margin-bottom:8px;cursor:pointer;font:inherit;font-size:14px;color:var(--text);transition:.15s;overflow-wrap:anywhere}
.quiz-opt:hover{border-color:var(--accent)}
.quiz-opt.correct{background:var(--leaf-50);border-color:var(--green);color:var(--leaf-700)}
.quiz-opt.wrong{background:var(--rust-50);border-color:var(--red);color:var(--rust-700)}
.quiz-exp{margin-top:12px;padding:12px 14px;background:var(--surf);border-radius:var(--r2);font-size:13px;color:var(--muted);display:none}
.quiz-exp.show{display:block}

/* PRACTICE */
.drill-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.drill-tile{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:18px;cursor:pointer;transition:.15s;text-align:center}
.drill-tile:hover{border-color:var(--accent);transform:translateY(-2px)}
.drill-tile .icon{font-size:1.6rem;margin-bottom:8px}
.drill-tile h3{font-size:.9rem;margin:0 0 4px}
.drill-tile p{font-size:11px;margin:0}
.drill-count{font-size:11px;color:var(--accent);font-weight:600;margin-top:4px}

/* FILLS */
.fill-prompt{font-size:14px;color:var(--muted);margin-bottom:10px}
.fill-partial{font-family:var(--mono);font-size:13px;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r2);padding:12px 16px;margin-bottom:16px;white-space:pre}
.fill-input{width:100%;font-family:var(--mono);font-size:14px;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r2);padding:11px 14px;color:var(--text);outline:none;transition:.15s}
.fill-input:focus{border-color:var(--accent)}
.fill-input.correct-in{border-color:var(--green);background:var(--leaf-50);color:var(--leaf-700)}
.fill-input.wrong-in{border-color:var(--red);background:var(--rust-50);color:var(--rust-700)}

/* BUGS */
.code-broken{font-family:var(--mono);font-size:13px;background:var(--rust-50);border:1px solid var(--red);border-radius:var(--r2);padding:14px 16px;margin:10px 0;white-space:pre;overflow-x:auto;color:var(--rust-700)}
.code-fixed{font-family:var(--mono);font-size:13px;background:var(--leaf-50);border:1px solid var(--green);border-radius:var(--r2);padding:14px 16px;margin:10px 0;white-space:pre;overflow-x:auto;color:var(--leaf-700);display:none}
.code-fixed.show{display:block}
.bug-issue{font-size:13px;color:var(--red);margin:8px 0}
.hint-btn{background:none;border:none;color:var(--muted);font:inherit;font-size:12px;cursor:pointer;padding:0;text-decoration:underline}
.hint-text{font-size:13px;color:var(--yellow);margin-top:8px;display:none}
.hint-text.show{display:block}

/* PARSONS */
.parsons-wrap{display:flex;gap:16px;margin:14px 0;flex-wrap:wrap}
.parsons-col{flex:1;min-width:200px}
.parsons-col label{font-size:12px;color:var(--muted);font-weight:600;display:block;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em}
.parsons-pool,.parsons-answer{min-height:80px;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r2);padding:8px;display:flex;flex-direction:column;gap:6px}
.parsons-answer{border-color:var(--accent)}
.parsons-chip{font-family:var(--mono);font-size:13px;background:var(--surf);border:1px solid var(--border);border-radius:var(--r2);padding:9px 12px;cursor:grab;user-select:none;transition:.15s}
.parsons-chip:hover{border-color:var(--accent);background:var(--surf2)}
.parsons-chip.dragging{opacity:.4}

/* DAX LAB */
.dax-search{width:100%;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r2);padding:11px 14px;color:var(--text);font:inherit;font-size:14px;outline:none;margin-bottom:16px;transition:.15s}
.dax-search:focus{border-color:var(--accent)}
.dax-item{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;margin-bottom:12px;cursor:pointer;transition:.15s}
.dax-item:hover{border-color:var(--accent)}
.dax-item-header{display:flex;align-items:center;gap:10px;margin-bottom:0}
.dax-item.open .dax-item-body{display:block}
.dax-item-name{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--accent)}
.dax-item-desc{font-size:13px;color:var(--muted);margin-left:auto}
.dax-item-body{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.dax-syntax{font-family:var(--mono);font-size:13px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;margin-bottom:10px;white-space:pre;overflow-x:auto;color:var(--text)}
.dax-example{font-family:var(--mono);font-size:12px;background:var(--surf2);border-left:3px solid var(--accent);padding:10px 14px;border-radius:0 var(--r2) var(--r2) 0;margin-bottom:8px;white-space:pre;overflow-x:auto;color:var(--accent)}
.dax-note{font-size:13px;color:var(--muted)}
.dax-tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;background:var(--surf2);color:var(--muted);border:1px solid var(--border);margin-right:4px}

/* FLASHCARDS */
.flashcard-outer{perspective:1000px;height:200px;margin:20px 0;cursor:pointer}
.flashcard-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:.5s;border-radius:var(--r)}
.flashcard-inner.flipped{transform:rotateY(180deg)}
.flashcard-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r);display:flex;align-items:center;justify-content:center;padding:28px;text-align:center}
.flashcard-front{background:var(--surf);border:1px solid var(--border)}
.flashcard-back{background:var(--surf2);border:1px solid var(--accent);transform:rotateY(180deg)}
.flashcard-term{font-size:1.2rem;font-weight:700}
.flashcard-def{font-size:.95rem;color:var(--muted);line-height:1.7}
.flashcard-nav{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:12px}
.fc-hint{font-size:12px;color:var(--muted);text-align:center;margin-top:8px}

/* GLOSSARY */
.gloss-search{width:100%;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r2);padding:11px 14px;color:var(--text);font:inherit;font-size:14px;outline:none;margin-bottom:16px}
.gloss-search:focus{border-color:var(--accent)}
.gloss-item{border-bottom:1px solid var(--border);padding:14px 0}
.gloss-item:last-child{border:none}
.gloss-term{font-weight:700;font-size:14px;color:var(--accent);margin-bottom:4px}
.gloss-def{font-size:13px;color:var(--muted)}

/* CROSS-KIT */
.kit-links{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
.kit-link{padding:8px 16px;border:1px solid var(--border);border-radius:var(--r2);font-size:13px;color:var(--muted);transition:.15s}
.kit-link:hover{border-color:var(--accent);color:var(--accent)}

/* SETTINGS */
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border:none}
.setting-label{font-size:14px}
.setting-sub{font-size:12px;color:var(--muted)}

/* CELEBRATION */
#celebrate-overlay{position:fixed;inset:0;pointer-events:none;z-index:999}
.confetti{position:absolute;width:8px;height:8px;border-radius:2px;animation:fall 1.2s ease-in forwards}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent);color:#fff;padding:12px 24px;border-radius:var(--r);font-weight:600;font-size:14px;z-index:1000;transition:.35s;opacity:0;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* UTIL */
.row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.spacer{flex:1}
.text-accent{color:var(--accent)}
.text-muted{color:var(--muted)}
.text-sm{font-size:13px}
.mt{margin-top:16px}
.mb{margin-bottom:16px}
@media(max-width:600px){
  /* High #1: primary stage CTA = full-width, thumb-height button on mobile */
  .v2-stage-card div[style*="display:flex"]{flex-wrap:wrap}
  .v2-stage-card .btn-primary{flex:1 1 100%;width:100%;min-height:48px;font-size:15px;order:2}
  /* High #3: keep the mobile nav on one horizontally-scrollable row so wrapped tabs can't overflow onto the page title */
  nav{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  nav::-webkit-scrollbar{display:none}
  .path-grid,.drill-grid{grid-template-columns:1fr 1fr}
  .parsons-wrap{flex-direction:column}
  .nav-brand{display:none}
}

/* -- Sprint Bar ---------------------------------------- */
body{font-size:17px;line-height:1.65}

// ─── DATA ──────────────────────────────────────────────────────────────────
const DATA = {

LESSONS: [
  // UNIT 0
  {id:101, unit:"Unit 0: Before You Build", title:"How Power BI Sees Data (Table & Grain)", sub:"Tables, rows, and what one row represents.",
   story:"Your manager says the team is moving to Power BI for all reporting. Before you drag a single field onto a canvas, you need to understand how Power BI thinks about data: tables. Everything — sales, customers, products — lives in a table, and each table has a grain: what one row means. Get the grain right and every measure and visual that follows makes sense.",
   intro:"Power BI works with tables — exactly like a database or a spreadsheet. Every data source you connect to becomes a table in your model. Each table has rows (records) and columns (fields). And each table has a grain: what one row represents. One row = one sale? One row = one customer? Misidentifying the grain is the root cause of most incorrect Power BI measures — especially double-counting in DAX.",
   ral:{code:"Sales table:   one row = one transaction\nCustomers:     one row = one unique customer\nProducts:      one row = one product SKU\nDaily_Agg:     one row = one day's totals",
     say:"Each table has one job. State the grain before you build any measure.",
     lines:[["Table","a 2D grid: rows × columns — the basic data unit in Power BI"],["Row (record)","one observation — one sale, one customer, one product"],["Column (field)","one attribute — Region, Revenue, Date, ProductID"],["Grain","what one row represents — state this before writing any measure"],["Double-counting","what happens when you join tables at different grains"]]},
   notes:"Power BI's star schema (one fact table + multiple dimension tables) is designed to keep grain consistent. Your Sales table should be at transaction grain; Products and Customers tables are at their own grain. Relating them correctly in the Model View is what prevents double-counting.",
   viz:{bars:[{label:"Sales",value:90,display:"1 row = 1 sale"},{label:"Customers",value:60,display:"1 row = 1 customer"},{label:"Products",value:40,display:"1 row = 1 SKU"}],title:"Each table — one grain",caption:"Three tables, three grains. Sales rows are at transaction level; Customers and Products are at entity level. Relate them on their shared keys and the measures stay correct."},
   quiz:{q:"Your Sales table has one row per order LINE ITEM, not per order. Where does that grain actually become dangerous?",opts:["In relationships — joining another table on OrderID fans out and inflates totals","In plain SUM measures — SUM double-counts the line items","Everywhere — line-item grain is always wrong for a fact table","Nowhere — grain never affects a Power BI model"],ans:0,exp:"Plain SUM is safe at any grain — it adds every line row, so totals stay correct. The danger is relational: relate another table on OrderID (which repeats across line items) and rows fan out, inflating every measure that crosses that relationship. Line-item grain is a fine — even standard — fact-table grain; you just have to relate on keys that are unique on their 'one' side."},
   parsons:{prompt:"Arrange the grain check — count all rows, count the unique keys, then compare the two.",lines:["Total Rows = COUNTROWS(Sales)","Unique Orders = DISTINCTCOUNT(Sales[OrderID])","-- equal → one row per order · different → finer grain"],answer:[0,1,2]},
   compare:"The grain check is two measures read side by side: COUNTROWS counts every row, DISTINCTCOUNT counts unique keys. The comparison comes last — neither number means anything on its own.",
   build:{q:"You suspect the Sales table is at line-item grain, not order grain. Which pair of measures proves it?",opts:["COUNTROWS(Sales) vs DISTINCTCOUNT(Sales[OrderID]) — if they differ, rows are finer than orders","SUM(Sales[Revenue]) vs AVERAGE(Sales[Revenue])","COUNT(Sales[OrderID]) vs COUNTROWS(Sales) — these are always equal","MAX(Sales[OrderID]) vs MIN(Sales[OrderID])"],ans:0,exp:"COUNTROWS counts every row; DISTINCTCOUNT counts unique order IDs. If they differ, one order spans multiple rows — line-item grain. SUM/AVERAGE/MAX tell you about values, not grain."},
   close:"You can state and prove the grain of any table before you build on it. Next: data types — the other thing to verify before a single measure gets written.",
   unlock:"Analysts who state the grain out loud — 'one row is one line item' — catch fan-out bugs in the Model View before they ever ship a wrong total. It's the cheapest habit in Power BI and the one that saves the most rework."
  },
  {id:102, unit:"Unit 0: Before You Build", title:"Data Types & Why They Matter in Power BI", sub:"Why type mismatches break aggregations silently.",
   story:"You've got the table and grain concept down. Now the next thing Power BI checks before it does anything: data type. A number stored as text won't aggregate. A date column recognized as text won't let you use time intelligence. Power BI color-codes every column's type in the Data and Model views — checking and fixing types early saves hours of confusion later.",
   intro:"Power BI assigns a data type to every column: Whole Number, Decimal Number, Text, Date, Date/Time, True/False, and more. The type determines what you can do: you can SUM a number, you can filter a date by year, you can concatenate text. Wrong type = silent errors — your SUM returns blank, your time intelligence fails, your chart shows nothing. Fix types in Power Query before they reach your model.",
   ral:{code:"Whole Number → counts, IDs, quantities\nDecimal     → prices, rates, percentages\nText        → names, codes, categories\nDate        → dates (not datetime unless you need time)\nTrue/False  → boolean flags",
     say:"Check every column's type before building measures. A number stored as text is invisible to SUM.",
     lines:[["Whole Number","integers — counts, IDs, quantities"],["Decimal Number","floating point — prices, rates, calculated fields"],["Text","strings — names, codes, region labels"],["Date","calendar dates — enables time intelligence functions"],["Wrong type","a revenue column typed as Text sums to blank — no error, just wrong"]]},
   notes:"Power Query flags type issues with the column header icon. A yellow triangle means mismatched or inferred type. Always verify types in the 'Changed Type' step — don't trust Power BI's auto-detection on imported data, especially from CSV or Excel where numbers often import as text.",
   viz:{bars:[{label:"Whole Number",value:100,display:"SUM, COUNT, AVERAGE ✓"},{label:"Decimal",value:100,display:"All math ✓"},{label:"Text",value:30,display:"SUM → blank ✗"},{label:"Date",value:80,display:"Time intelligence ✓"}],title:"What each type allows",caption:"Type determines capability. Text columns look like numbers but SUM returns blank — no error message. Fix the type in Power Query before you start building."},
   quiz:{q:"Your Revenue column imports as type Text. You create a measure: Total Revenue = SUM(Sales[Revenue]). What does the measure return?",opts:["The correct sum","0","BLANK — SUM on a text column returns blank","An error message"],ans:2,exp:"SUM on a text column returns BLANK in Power BI — no error, just silence. The card visual shows empty. This is one of the most common beginner traps. Fix the type in Power Query before it reaches your model."},
   parsons:{prompt:"Revenue imported as Text. Arrange the fix, start to finish.",lines:["Open Power Query (Transform Data)","Select the Revenue column","Change type: Text → Decimal Number","Close & Apply"],answer:[0,1,2,3]},
   compare:"The fix happens in Power Query, before the data reaches the model — that's why opening the editor comes first and Close & Apply comes last. Fixing types after the fact (in DAX) treats the symptom, not the source.",
   build:{q:"Your Date column imported as Text, so time intelligence fails. Where do you fix it?",opts:["Write a DAX calculated column that converts the text to a date","In Power Query — change the column type to Date, then Close & Apply","In the visual — change the field's summarization","Rename the column to 'Date' so Power BI detects it"],ans:1,exp:"Type fixes belong in Power Query, the Shape phase. A DAX conversion column works but leaves the broken text column in your model and doubles the storage. The column's name has nothing to do with its type."},
   close:"You can spot and fix a wrong type before it silently blanks a measure. Next: aggregation — the single idea underneath every visual you'll ever build.",
   unlock:"The 'Changed Type' step Power Query auto-inserts is a snapshot of its guesses, not the truth. Experienced analysts read that step like a checklist on every new source — it's where CSV imports quietly turn revenue into text."
  },
  {id:103, unit:"Unit 0: Before You Build", title:"What 'Aggregate' Means in Power BI", sub:"The one idea underneath every KPI card and bar chart.",
   story:"Types are correct. Your manager asks for 'total revenue.' The Revenue column has one row per transaction — thousands of them. An aggregation collapses those rows into one number: SUM totals them, COUNT counts them, AVERAGE averages them. Every visual in Power BI is an aggregation of an underlying table. This idea is what makes DAX measures finally click.",
   intro:"Every visual in Power BI aggregates rows into a summary. A bar chart of Revenue by Region collapses all West transactions into one bar — it's SUM(Revenue) WHERE Region = 'West'. A KPI card showing Total Revenue is the same SUM applied to the whole table. The aggregation is always there, even when you don't write it explicitly. DAX measures just make it explicit and controllable.",
   ral:{code:"Total Revenue = SUM(Sales[Revenue])   -- explicit aggregation\nOrder Count  = COUNTROWS(Sales)       -- count rows = count orders\nAvg Order    = AVERAGE(Sales[Revenue]) -- mean over all rows",
     say:"A measure is a named aggregation. Power BI evaluates it against the current filter context — the region selected, the date range active, the row in the table.",
     lines:[["Aggregation","collapsing many rows into one number: SUM, COUNT, AVERAGE, MIN, MAX"],["Implicit aggregation","drag Revenue into Values — Power BI defaults to SUM automatically"],["Explicit aggregation (measure)","write SUM(table[col]) yourself — full control"],["Filter context","the active filters (slicer, row context, visual filter) that determine which rows the aggregation sees"],["Why it matters","every wrong total in Power BI is a filter-context or aggregation mistake"]]},
   notes:"When you drag a numeric column directly into a visual, Power BI applies an implicit aggregation (usually SUM). That's often what you want — but not always. If you drag a Revenue column and it shows one number per row instead of a total, Power BI chose 'Don't summarize.' Right-click the field → Summarize → Sum to fix it.",
   viz:{bars:[{label:"West",value:412},{label:"East",value:388},{label:"North",value:195},{label:"South",value:284}],title:"SUM(Revenue) by Region — each bar is an aggregation",caption:"Each bar collapses all transaction rows for that region into one SUM. The visual doesn't show raw rows — it shows the aggregation. That's every Power BI visual, every time."},
   quiz:{q:"You drag Revenue into the Values field of a bar chart and see one separate bar per transaction row instead of one total bar per region. What happened?",opts:["You need to add a Region field to the Axis","The Revenue column is set to 'Don't Summarize' — change it to Sum","The data model has no relationships","You need to write a DAX measure first"],ans:1,exp:"'Don't Summarize' means Power BI treats the column as a row identifier instead of an aggregate. Right-click the Revenue field in Values and change the summarization to Sum to get one aggregated bar per category."},
   parsons:{prompt:"Arrange what actually happens when a bar chart shows West's revenue — from raw rows to the number on screen.",lines:["1. Start: every row in the Sales table","2. Filter context: keep only Region = \"West\"","3. Aggregate: SUM(Sales[Revenue]) over those rows","4. Result: one number — the West bar"],answer:[0,1,2,3]},
   compare:"Filter first, then aggregate. Power BI narrows the rows to the current context (the West bar, the active slicer) before SUM ever runs — that's why one measure can produce a different number in every bar of the same chart.",
   build:{q:"Dragging Revenue into Values gives you an implicit SUM. Which measure is the explicit version of the same thing?",opts:["Revenue = Sales[Revenue]","Total Revenue = SUM(Sales[Revenue])","Total Revenue = COUNTROWS(Sales)","Total Revenue = AGGREGATE(Sales[Revenue])"],ans:1,exp:"SUM(Sales[Revenue]) is exactly what the implicit aggregation does — written out where you can see and control it. A bare column reference isn't a valid measure, COUNTROWS counts rows instead of summing, and AGGREGATE isn't a DAX function."},
   close:"You can see the aggregation inside every visual now — the collapse from many rows to one number. Next: the three-phase loop that organizes every Power BI project.",
   unlock:"Once you read every visual as 'filter context + aggregation,' debugging flips: a wrong number is never mysterious — either the wrong rows survived the filter, or the wrong math ran over them. Every DAX bug is one of those two."
  },
  {id:104, unit:"Unit 0: Before You Build", title:"Load vs Shape vs Analyze (The Power BI Loop)", sub:"The three-phase workflow every Power BI project follows.",
   story:"You understand aggregation. Now the Power BI loop that every dashboard is built on: Load (bring data in via Get Data), Shape (clean and transform in Power Query), Analyze (build measures and visuals on the Report canvas). Each phase has its own tools and its own mistakes. Knowing which phase you're in tells you where to look when something goes wrong.",
   intro:"Power BI has three phases: 1. <strong>Load</strong> — connect to a source (Excel, CSV, SQL, SharePoint, API) via Get Data. 2. <strong>Shape</strong> — clean and transform in Power Query (rename columns, fix types, remove blanks, unpivot tables). 3. <strong>Analyze</strong> — build the data model (relationships), write DAX measures, and lay out visuals on the Report canvas. Each phase is the right place for specific tasks — editing a column's name belongs in Power Query, not DAX.",
   ral:{code:"Phase 1 — Load:   Home → Get Data → choose source\nPhase 2 — Shape:  Power Query Editor → transform\nPhase 3 — Analyze: Model View + Report canvas + DAX",
     say:"Load brings the data in. Shape makes it clean and correct. Analyze builds the measures and visuals. Do things in this order — fixing the wrong phase is always more work.",
     lines:[["Get Data","Load phase — connect to CSV, Excel, SQL, SharePoint, APIs"],["Power Query","Shape phase — transform before data reaches your model"],["Model View","Analyze phase — define table relationships (star schema)"],["DAX measure","Analyze phase — write aggregations and calculations"],["Wrong phase","cleaning data in DAX instead of Power Query = slow, fragile reports"]]},
   notes:"The most common mistake is doing Shape work in the Analyze phase. Adding a clean-up calculated column in DAX when you should have fixed it in Power Query makes your model heavier and harder to maintain. Ask: 'Does this change the data before it reaches my model?' If yes — Power Query. If no — DAX.",
   viz:{html:`<div style="display:flex;gap:8px;font-size:11px;flex-wrap:wrap"><div style="flex:1;min-width:120px;border:1px solid var(--border);border-radius:8px;padding:10px"><div style="font-weight:700;color:var(--accent);margin-bottom:6px">1. Load</div><div style="color:var(--txt2)">Get Data → connect to source → tables appear in your model</div></div><div style="font-size:16px;color:var(--accent);align-self:center">→</div><div style="flex:1;min-width:120px;border:1px solid var(--border);border-radius:8px;padding:10px"><div style="font-weight:700;color:var(--accent);margin-bottom:6px">2. Shape</div><div style="color:var(--txt2)">Power Query → fix types, clean columns, remove blanks</div></div><div style="font-size:16px;color:var(--accent);align-self:center">→</div><div style="flex:1;min-width:120px;border:1px solid var(--border);border-radius:8px;padding:10px"><div style="font-weight:700;color:var(--accent);margin-bottom:6px">3. Analyze</div><div style="color:var(--txt2)">Model View → relationships · DAX → measures · Report canvas → visuals</div></div></div>`,caption:"The three-phase loop. Load → Shape → Analyze. Doing things out of order (fixing data in DAX, building visuals before relationships are set) causes the most common Power BI frustrations."},
   quiz:{q:"You notice a column is named 'dt_order' and should be 'Order Date'. Where should you rename it?",opts:["In a DAX calculated column: Order Date = [dt_order]","In Power Query — rename the column in the Shape phase","In the Report canvas — rename the visual label","In the Model View — rename the table"],ans:1,exp:"Renaming a column is a Shape task — it should happen in Power Query before the data reaches your model. Doing it in DAX creates a duplicate column; doing it in the Report canvas only changes one visual's label, not the field name everywhere."},
   parsons:{prompt:"Arrange the three phases of every Power BI project, in the order they happen.",lines:["Load: Get Data → connect to the source","Shape: Power Query → fix types, clean columns, remove blanks","Analyze: relationships, DAX measures, visuals on the canvas"],answer:[0,1,2]},
   compare:"Load, then Shape, then Analyze — data flows one way. That order is also your debugging map: a wrong number in a visual traces backward through the phases until you find where it broke.",
   build:{q:"Your imported CSV has 40 blank rows at the bottom that are polluting your counts. Which phase removes them?",opts:["Load — pick a different connector","Shape — remove the blank rows in Power Query","Analyze — write a DAX measure that skips blanks","Analyze — filter every visual to exclude blanks"],ans:1,exp:"Removing junk rows is a Shape task: do it once in Power Query and it re-runs on every refresh. A DAX workaround or per-visual filter has to be repeated everywhere and leaves the dirty rows in your model."},
   close:"You can name which phase any task belongs to — and that tells you where to fix things. That's Unit 0 done: grain, types, aggregation, and the loop. Next: a tour of the Desktop interface where all of it happens.",
   unlock:"'Which phase does this belong to?' is also an interview answer. Asked how you'd clean messy data in Power BI, leading with 'in Power Query, before it reaches the model — so the cleanup re-runs on refresh' signals you've actually shipped reports."
  },
  // UNIT 1
  {id:1, unit:"Unit 1: The Interface & Data", title:"The Power BI Interface", sub:"Navigate Desktop like a pro",
   story:"You've got the mental model: tables with a grain, types, aggregation, the three-phase loop. Now open Power BI Desktop and orient yourself. Three views on the left — Report, Data, Model. Fields pane on the right. Learn the layout now so you stop looking for things when the real work starts.",
   intro:"Power BI Desktop is like a workshop with three benches — one to see the data, one to wire the tables together, one to lay out the report. Power BI Desktop has three views and a set of panes that control everything. Before you build anything, knowing <em>where things live</em> saves hours of searching.",
   ral:{
     code:"Report View → canvas + visualizations\nData View   → see raw table data\nModel View  → manage relationships between tables",
     say:"Three views in Power BI Desktop: Report View is your canvas, Data View shows the raw tables, and Model View is where you manage how tables relate.",
     lines:[
       ["Report View","where you build and arrange visuals on a canvas"],
       ["Data View","shows the actual rows and columns of your loaded tables"],
       ["Model View","where you draw and manage relationships — the diagram view"],
       ["Fields Pane","right side — all your tables and columns, drag from here"],
       ["Visualizations Pane","right side — pick a chart type, configure field wells"]
     ]
   },
   notes:"The Filters pane (right side) has three levels: visual, page, and report. A filter applied at report level affects every page. Start with report-level filters for your date range.",
   viz:{title:"Power BI Desktop",html:`<div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;font-size:11px;display:flex">
     <div style="flex:1;padding:26px 10px;text-align:center;color:var(--dim);border-right:1px solid var(--border)">🖼️ Report canvas — your visuals go here</div>
     <div style="width:104px;padding:9px;border-right:1px solid var(--border);background:var(--surf2)"><div style="font-weight:700">Visualizations</div><div style="margin-top:6px;color:var(--dim)">📊 📈 🥧 🔢</div><div style="color:var(--dim);margin-top:6px">Axis / Values / Legend</div></div>
     <div style="width:96px;padding:9px;background:var(--surf2)"><div style="font-weight:700">Fields</div><div style="margin-top:6px;color:var(--dim)">▸ Sales</div><div style="color:var(--dim)">▸ Customers</div><div style="color:var(--dim)">▸ Date</div></div>
   </div>`,caption:"Three panes you'll use constantly: the Report canvas (center) where visuals live, the Visualizations pane (pick a chart, fill its field wells), and the Fields pane listing every table and column."},
   quiz:{q:"Which Power BI Desktop view lets you see and manage how tables are related to each other?",opts:["Report View","Data View","Model View","Filters Pane"],ans:2,exp:"Model View displays the relationship diagram. You drag between key columns here to create or edit relationships."},
   parsons:{prompt:"Fresh data just loaded. Arrange the sanity-check path through the three views: raw rows first, then relationships, then build.",lines:["Data View — spot-check the loaded rows and types","Model View — confirm the relationships connect correctly","Report View — build the visual on the canvas"],answer:[0,1,2]},
   compare:"Rows first, relationships second, visuals last. Each view checks the layer the next one depends on — a visual built on an unchecked model is where 'the numbers look wrong' tickets come from.",
   build:{q:"You need to connect Sales[CustomerID] to Customers[CustomerID]. Where do you go?",opts:["Report View — drag both fields into the same visual","Data View — sort both tables by CustomerID","Model View — drag between the two key columns","The Filters pane — add a filter on CustomerID"],ans:2,exp:"Relationships are created in Model View by dragging between key columns. Putting fields in one visual doesn't relate the tables — without the relationship, the visual shows the same repeated total instead of per-customer numbers."},
   close:"You know where everything lives: Report to build, Data to inspect, Model to relate. Next: getting data in — Get Data and Power Query.",
   unlock:"The fastest interface habit isn't a shortcut key — it's checking Model View immediately after loading data. Nearly every 'my visual repeats the same number' problem is visible there as a missing relationship line, before you've wasted time rebuilding charts."
  },
  {id:2, core:true, unit:"Unit 1: The Interface & Data", title:"Connecting to Data", sub:"Get Data and Power Query basics",
   story:"You know the layout. The first step in every project: Get Data — point Power BI at a source (CSV, Excel, SQL, SharePoint) and pull the tables in. Power Query is the shaping layer that opens automatically — rename columns, fix types, remove blanks — before the data ever touches your model.",
   intro:"Loading data is like unpacking groceries — Get Data brings the bags in, and Power Query is the counter where you wash and chop before anything goes in the fridge (the model). Power BI reads data from almost anywhere. The Get Data workflow loads it in; Power Query Editor is where you clean it before it enters the model.",
   ral:{
     code:"Home → Get Data → Excel / SQL Server / Web / ...\n↓\nPower Query Editor (Transform Data)\n↓\nClose & Apply  →  data enters the model",
     say:"From the Home ribbon, click Get Data to load from Excel, SQL Server, the Web, or other sources. The data goes through Power Query for cleanup and transformation, then Close & Apply commits it to the model.",
     lines:[
       ["Get Data","the entry point — choose your source type"],
       ["Power Query Editor","a full ETL environment — rename columns, filter rows, change types"],
       ["Applied Steps","every transformation is recorded as a step — non-destructive"],
       ["Close & Apply","saves your query and loads data into the model"],
       ["Refresh","re-runs your query against the source to pull in new data"]
     ]
   },
   notes:"Always check data types in Power Query — a date column loaded as text will break every time-intelligence DAX function. Look for the type icon left of each column name.",
   viz:{title:"Power Query Editor",html:`<div style="display:grid;grid-template-columns:160px 1fr;gap:10px;font-size:11px">
     <div style="border:1px solid var(--border);border-radius:6px;padding:9px;background:var(--surf2)"><div style="font-weight:700">Applied Steps</div><div style="margin-top:6px;color:var(--dim)">1. Source</div><div style="color:var(--dim)">2. Promoted Headers</div><div style="color:var(--dim)">3. Changed Type</div><div style="color:var(--dim)">4. Removed Duplicates</div></div>
     <div style="border:1px solid var(--border);border-radius:6px;padding:12px;color:var(--dim);display:flex;align-items:center">🔧 Clean and reshape the data here, then <b style="color:var(--accent);margin:0 4px">Close &amp; Apply</b> loads it into the model.</div>
   </div>`,caption:"Power Query is where data gets cleaned before it ever reaches your report. Each transform is recorded as an 'Applied Step', so the whole cleanup re-runs automatically every time the data refreshes."},
   quiz:{q:"Where do you clean and transform data before it loads into the Power BI model?",opts:["Report View canvas","Model View","Power Query Editor","DAX formula bar"],ans:2,exp:"Power Query Editor (Transform Data) is the ETL layer. Changes here are recorded as Applied Steps and re-run on every refresh."},
   parsons:{prompt:"Arrange the data-loading workflow from first click to fresh data next month.",lines:["Home → Get Data → choose the source","Power Query Editor — clean and transform","Close & Apply — load into the model","Refresh — re-run the steps against new data"],answer:[0,1,2,3]},
   compare:"Get Data starts it, Refresh keeps it alive. The middle two steps are the payoff: because cleanup lives in Power Query as Applied Steps, Refresh replays the whole cleanup automatically — you never re-clean by hand.",
   build:{q:"Your source CSV has misnamed columns and text-typed numbers. When do you fix them?",opts:["After loading — fix them with DAX calculated columns","In Power Query, before Close & Apply","In each visual's formatting pane","Edit the CSV by hand before every refresh"],ans:1,exp:"Fix it once in Power Query and the Applied Steps re-run on every refresh. DAX fixes bloat the model, visual formatting only masks one chart, and hand-editing the source dies the first time someone else refreshes."},
   close:"You can load data and clean it in a way that survives every refresh. Next: your first visual — chart type plus field wells.",
   unlock:"Applied Steps make Power Query self-documenting: the step list IS the audit trail of everything done to the data. When a stakeholder asks 'did you exclude test orders?', the answer is a step name, not a memory."
  },
  {id:3, unit:"Unit 1: The Interface & Data", title:"Building Your First Visual", sub:"Drag, drop, and configure",
   story:"Data is loaded and shaped. Now the core Power BI move: click the visual type you want, then drag fields to assign them. A bar chart needs a category on the Axis and a measure in Values. Power BI aggregates automatically. That's the Analyze phase in practice.",
   intro:"Building a visual is like filling out a form — pick the chart, then drop your fields into its blanks (the field wells). Every visual in Power BI starts the same way: pick a chart type, then drag fields into the three field wells — Axis, Values, and Legend. The rest is formatting.",
   ral:{
     code:"1. Click a chart type in the Visualizations pane\n2. Drag a field to Axis   → what to group by\n3. Drag a field to Values → what to measure\n4. Drag a field to Legend → how to color-code",
     say:"Pick a chart type from the Visualizations pane, drag a field to Axis to set what you're grouping by, drag a field to Values to set what you're measuring, then drag a field to Legend to color-code by a third dimension.",
     lines:[
       ["Axis","the X-axis grouping — usually a category or date"],
       ["Values","the Y-axis measure — usually a number to aggregate"],
       ["Legend","breaks the visual into color-coded series"],
       ["Drill-down arrows","appear top-right of a visual — expand a date hierarchy"],
       ["Format Visual pane","paintbrush icon — colors, labels, titles, borders"]
     ]
   },
   notes:"If you drag a numeric column to Axis instead of Values, Power BI will try to aggregate it. Use the dropdown next to the field in the well to change aggregation (Sum, Average, Count, etc.).",
   viz:{title:"Revenue by Region",bars:[{label:"West",value:412,display:"$412"},{label:"East",value:388,display:"$388"},{label:"South",value:284,display:"$284"},{label:"North",value:195,display:"$195"}],caption:"Drop Region on the axis and Revenue into Values — Power BI draws this bar chart for you, no formulas typed."},
   quiz:{q:"In Power BI's field wells, which well controls the Y-axis (what gets measured)?",opts:["Axis","Values","Legend","Tooltips"],ans:1,exp:"Values is where you drop the numeric field being measured. Power BI automatically aggregates it (Sum by default). Axis controls grouping (the X-axis)."},
   parsons:{prompt:"Build 'Revenue by Region, split by Channel' — arrange the steps.",lines:["Click the bar-chart icon in the Visualizations pane","Drag Region to Axis","Drag Revenue to Values","Drag Channel to Legend"],answer:[0,1,2,3]},
   compare:"Chart type first, then the wells: Axis is what you group by, Values is what you measure, Legend is the optional color split. Same three wells, every visual — only the chart icon changes.",
   build:{q:"You want average order value by region, but the chart shows summed revenue. What do you change?",opts:["Move Revenue from Values to Axis","Open the dropdown on Revenue in the Values well and switch Sum to Average","Drag Region to Legend instead of Axis","Add a second Revenue field to Values"],ans:1,exp:"The aggregation lives on the field in the Values well — the dropdown switches Sum to Average, Count, Min, or Max. Moving fields between wells changes what's grouped or measured, not how it's aggregated."},
   close:"You can build a visual and control its aggregation deliberately. Next: relationships — using fields from more than one table in the same visual.",
   unlock:"The Legend well is the cheapest insight multiplier in Power BI: one drag turns 'revenue by region' into 'revenue by region AND channel' — the comparison view stakeholders usually wanted but didn't know to ask for."
  },
  {id:4, core:true, unit:"Unit 1: The Interface & Data", title:"Relationships & the Data Model", sub:"Star schema and how Power BI joins tables",
   story:"You can build visuals from one table. But your sales table doesn't have the product category — it's in a separate products table. The Data Model is where you tell Power BI how the tables relate. Connect Order's ProductID to Products' ID (a star schema), and every visual can use fields from both tables without any join syntax.",
   intro:"A data model is like a hub airport — one central fact table in the middle, dimension tables as the destinations, all connected by direct routes (keys). A data model is multiple tables connected by keys. Power BI uses a star schema — one central fact table surrounded by dimension tables. Get this right and every visual just works.",
   ral:{
     code:"Fact Table: Sales (OrderID, CustomerID, ProductID, Amount, Date)\n      │                    │                 │\n  Customers           Products           Dates\n  (CustomerID, Name)  (ProductID, Name)  (Date, Month, Year)",
     say:"A star schema puts the Sales fact table in the middle (events: who bought what when) with dimension tables joining out — Customers, Products, Dates — that hold the descriptive details.",
     lines:[
       ["Fact Table","the big table with numeric events — sales rows, transactions"],
       ["Dimension Table","lookup tables — who, what, when — used for filtering and grouping"],
       ["Relationship","a line between tables on a shared key — one-to-many is standard"],
       ["One-to-many","one row in the dimension links to many rows in the fact table"],
       ["Cross-filter direction","controls which table filters the other — usually single (dim → fact)"]
     ]
   },
   notes:"Avoid many-to-many relationships if you can — they cause ambiguous filter paths. If two fact tables both need a date dimension, create a separate Dates table and relate each fact table to it.",
   viz:{title:"Star schema",html:`<div style="text-align:center;font-size:11px">
     <div style="display:flex;justify-content:center;gap:22px;margin-bottom:10px"><div style="border:1px solid var(--dim-blue);border-radius:6px;padding:6px 11px;color:var(--dim-blue)">📋 Customers</div><div style="border:1px solid var(--dim-blue);border-radius:6px;padding:6px 11px;color:var(--dim-blue)">📋 Date</div></div>
     <div style="border:2px solid var(--accent);border-radius:6px;padding:8px 16px;display:inline-block;color:var(--accent);font-weight:700">⭐ Sales (fact)</div>
     <div style="display:flex;justify-content:center;gap:22px;margin-top:10px"><div style="border:1px solid var(--dim-blue);border-radius:6px;padding:6px 11px;color:var(--dim-blue)">📋 Products</div><div style="border:1px solid var(--dim-blue);border-radius:6px;padding:6px 11px;color:var(--dim-blue)">📋 Region</div></div>
   </div>`,caption:"A star schema: one central fact table (Sales — the numbers you measure) surrounded by dimension tables (Customers, Products, Date, Region — the descriptions). Relationships link them, so a slicer on any dimension filters the facts."},
   quiz:{q:"In a star schema, what is the fact table?",opts:["A lookup table with category names","The central table containing numeric transactions or events","The date dimension table","Any table with a primary key"],ans:1,exp:"The fact table holds the measurable events — sales rows, clicks, orders. Dimension tables (customers, products, dates) are connected to it via keys and used for filtering and grouping."},
   parsons:{prompt:"Arrange the star-schema build, from identifying tables to setting filter direction.",lines:["Identify the fact table: Sales — the numeric events","Identify the dimensions: Customers, Products, Dates","Relate each dimension's key to its matching Sales column","Set cross-filter direction: single, dimension → fact"],answer:[0,1,2,3]},
   compare:"Facts and dimensions get named before anything gets related — you can't wire tables correctly until you know which one is the hub. Filter direction comes last because it only exists once the relationship does.",
   build:{q:"Customers has one row per customer; Sales has many rows per customer. What relationship should Power BI create on CustomerID?",opts:["Many-to-many, both directions","One-to-many: Customers (one side) → Sales (many side)","One-to-one — each table keeps its own rows","No relationship — use a merged table instead"],ans:1,exp:"One row per customer on the dimension side, many sales rows on the fact side — the classic one-to-many. Many-to-many with both-direction filtering creates ambiguous paths, and merging the tables throws away the star schema."},
   close:"You can wire a star schema: facts in the middle, dimensions around it, filters flowing one way. That's Unit 1 done. Next: DAX — calculated columns versus measures.",
   unlock:"When a model misbehaves, senior analysts read the relationship lines' 1 and * markers before touching any DAX. A * where a 1 should be means duplicate keys on the 'one' side — the fan-out from Lesson 1, drawn right on the diagram."
  },
  // UNIT 2
  {id:5, core:true, unit:"Unit 2: DAX & Measures", title:"Calculated Columns vs Measures", sub:"Row context vs filter context",
   story:"Your model is connected. Now the two ways to create new values in Power BI: a Calculated Column runs row by row and stores the result in the table — like an Excel formula filled down. A Measure runs at query time and respects whatever filters are active. Measures are almost always what you want for KPIs and aggregations.",
   intro:"Calculated columns vs measures is like meal-prep vs cooking to order: a column cooks a value for every row up front and stores it; a measure cooks only what the visual asks for, on the spot. This is the most important conceptual distinction in DAX. Calculated columns are computed row by row when the data loads. Measures are computed at query time based on what's currently filtered. <em>If DAX syntax looks unfamiliar, it borrows heavily from Excel formulas — review the Excel kit if you'd like a refresher before diving in.</em>",
   ral:{
     code:"-- Calculated Column (stored in table, row by row)\nProfit = Sales[Revenue] - Sales[Cost]\n\n-- Measure (computed dynamically on filter context)\nTotal Profit = SUM(Sales[Profit])",
     say:"A calculated column runs row-by-row when the data loads and gets stored — like Profit equals Revenue minus Cost. A measure computes on the fly against the current filter context — like Total Profit equals the sum of the Profit column.",
     lines:[
       ["Calculated Column","added to a table — one value per row — uses row context"],
       ["Sales[Revenue]","column reference — row context gives you the value for that row"],
       ["Measure","not stored in a table — computed when a visual renders"],
       ["SUM(Sales[Profit])","aggregates the column across the current filter context"],
       ["Filter context","whatever slicers, filters, and visual groupings are active"]
     ]
   },
   notes:"Use measures for aggregations (SUM, COUNT, AVERAGE). Use calculated columns for row-level classifications or lookups you need to filter or group by. Overusing calculated columns inflates model size.",
   viz:{title:"Calculated column vs measure",html:`<div style="display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start;font-size:11px">
     <div style="border:1px solid var(--border);border-radius:8px;overflow:hidden">
       <div style="background:var(--surf2);padding:5px 10px;font-weight:700;border-bottom:1px solid var(--border)">Calculated column — stored per row</div>
       <table style="border-collapse:collapse;font-family:var(--mono)"><thead><tr><th style="padding:4px 10px;text-align:left;color:var(--dim)">Revenue</th><th style="padding:4px 10px;text-align:left;color:var(--dim)">Cost</th><th style="padding:4px 10px;text-align:left;color:var(--accent)">Profit</th></tr></thead><tbody>
       <tr><td style="padding:4px 10px">200</td><td style="padding:4px 10px">120</td><td style="padding:4px 10px;color:var(--accent)">80</td></tr>
       <tr><td style="padding:4px 10px">150</td><td style="padding:4px 10px">90</td><td style="padding:4px 10px;color:var(--accent)">60</td></tr></tbody></table>
     </div>
     <div style="border:1px solid var(--accent);border-radius:8px;padding:14px 18px;min-width:150px;text-align:center">
       <div style="font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--dim)">Measure — computed on the fly</div>
       <div style="font-size:1.6rem;font-weight:700;color:var(--accent);margin-top:4px">$140</div>
       <div style="color:var(--dim);margin-top:2px">Total Profit = SUM(Profit)</div>
     </div>
   </div>`,caption:"Two different things: a calculated column stores Profit on every row (left), while a measure aggregates on the fly for whatever's in the visual (Total Profit, right)."},
   quiz:{q:"A measure in DAX is evaluated based on…",opts:["Each row of the table when data loads","The current filter context at query time","The primary key of the fact table","The sort order of the visual"],ans:1,exp:"Measures are dynamic — they recalculate every time a slicer, filter, or visual grouping changes. That's what makes them powerful for interactive reports."},
   parsons:{prompt:"Arrange the two definitions: the row-by-row column first, then the measure that aggregates it.",lines:["Profit = Sales[Revenue] - Sales[Cost]","-- stored per row when data loads (row context)","Total Profit = SUM(Sales[Profit])","-- computed per visual at query time (filter context)"],answer:[0,1,2,3]},
   compare:"The calculated column has to exist before the measure can sum it — row-level values first, aggregation second. Each definition is followed by its context: the column lives in row context, the measure in filter context.",
   build:{q:"You need a KPI card showing total revenue that responds to the Region slicer. Which do you create?",opts:["A calculated column: Revenue Total = Sales[Revenue]","A measure: Total Revenue = SUM(Sales[Revenue])","A calculated column: Total = SUM(Sales[Revenue])","A new table with one row per region"],ans:1,exp:"KPIs that react to slicers are measures — they recompute against the current filter context. A calculated column stores values row by row at load time and can't respond to a slicer; putting SUM in a column just repeats the grand total on every row."},
   close:"You can pick the right tool: columns for row-level values you group by, measures for numbers that react to filters. Next: the everyday DAX aggregations.",
   unlock:"Model-size review tip: sort your tables by column count and look for calculated columns that only feed one visual. Each one is baked into RAM at load; converting the aggregation-shaped ones to measures is the fastest slimming a bloated model can get."
  },
  {id:6, core:true, unit:"Unit 2: DAX & Measures", title:"Basic DAX Aggregations", sub:"SUM, COUNT, AVERAGE, DIVIDE",
   story:"You understand when to use a Measure. Now write your first ones in DAX: SUM, COUNT, AVERAGE, DIVIDE. DAX syntax looks like Excel formulas — Total Revenue = SUM(Sales[Revenue]) — with one key difference: every measure is evaluated against the current filter context, so the same measure returns different numbers depending on what slicer or row is active.",
   intro:"A basic measure is a pocket calculator for a column — point it at the numbers and it sums, averages, or counts them. Most measures you'll write are simple aggregations over a column. DAX has the same building blocks as SQL aggregates — with a few important differences.",
   ral:{
     code:"Total Revenue = SUM(Sales[Revenue])\nOrder Count   = COUNTROWS(Sales)\nAvg Order     = AVERAGE(Sales[Revenue])\nMargin %      = DIVIDE([Total Revenue] - [Total Cost], [Total Revenue])",
     say:"Total Revenue sums the Revenue column. Order Count counts the rows in Sales. Avg Order is the average. Margin Percent uses DIVIDE for safe division — returns blank instead of an error if the denominator is zero.",
     lines:[
       ["SUM(Sales[Revenue])","add up every value in the Revenue column"],
       ["COUNTROWS(Sales)","count the number of rows in the Sales table"],
       ["AVERAGE(Sales[Revenue])","sum divided by count of non-blank values"],
       ["DIVIDE(numerator, denominator)","safe division — returns blank instead of error on divide-by-zero"],
       ["[Total Revenue]","square brackets reference a measure — not a column"]
     ]
   },
   notes:"Use DIVIDE() instead of / for all division in DAX. If the denominator is ever zero or blank, / throws an error that breaks your visual. DIVIDE returns blank or an optional alternate result.",
   viz:{title:"DAX aggregations",html:`<div style="display:flex;gap:10px;flex-wrap:wrap;font-size:11px">${[["SUM","$1,279","total revenue"],["AVERAGE","$256","avg per sale"],["COUNTROWS","25","number of sales"],["DISTINCTCOUNT","4","unique regions"]].map(c=>`<div style="border:1px solid var(--border);border-radius:8px;padding:10px 14px;min-width:106px"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--dim)">${c[0]}</div><div style="font-size:1.3rem;font-weight:700;color:var(--accent);margin-top:2px">${c[1]}</div><div style="color:var(--dim)">${c[2]}</div></div>`).join('')}</div>`,caption:"The four everyday DAX aggregations on the same Sales table: SUM totals, AVERAGE means, COUNTROWS counts rows, and DISTINCTCOUNT counts unique values — each returns one number, recomputed for whatever's in the visual."},
   quiz:{q:"Why should you use DIVIDE() instead of / in DAX?",opts:["DIVIDE is faster","DIVIDE handles divide-by-zero gracefully instead of returning an error","/ only works in calculated columns","DIVIDE works with text columns"],ans:1,exp:"DIVIDE(numerator, denominator, [alternateResult]) returns blank (or your alternateResult) when the denominator is zero or blank. The / operator throws an error that can break your visuals."},
   parsons:{prompt:"Arrange the Margin % measure — DIVIDE first, then numerator, then denominator.",lines:["Margin % = DIVIDE(","[Total Revenue] - [Total Cost],","[Total Revenue]",")"],answer:[0,1,2,3]},
   compare:"DIVIDE wraps the whole calculation: function name first, then the numerator expression, then the denominator, then the close. Note the square brackets — both inputs are measures being reused, not columns.",
   build:{q:"Which measure counts how many orders are in the Sales table?",opts:["Order Count = COUNTROWS(Sales)","Order Count = SUM(Sales[OrderID])","Order Count = COUNT(Sales)","Order Count = COUNTROWS(Sales[OrderID])"],ans:0,exp:"COUNTROWS takes a table and counts its rows. SUM on an ID column adds the ID numbers together — a meaningless total. COUNT takes a column, not a table, and COUNTROWS takes a table, not a column."},
   close:"You can write the four everyday measures — and divide safely. Next: CALCULATE, the function that bends filter context to your will.",
   unlock:"The bracket convention is a readability contract: Sales[Revenue] is a column, [Total Revenue] is a measure. Reference measures inside other measures (like Margin % does) and a logic fix in [Total Revenue] flows through every measure built on it — DAX's version of not repeating yourself."
  },
  {id:7, core:true, unit:"Unit 2: DAX & Measures", title:"CALCULATE & Filter Context", sub:"The most powerful function in DAX",
   story:"You can write basic DAX aggregations. Now the most powerful function in DAX: CALCULATE. It evaluates any expression inside a modified filter context. CALCULATE(SUM(Revenue), Region = 'West') returns West revenue no matter what the active slicer says. Understanding CALCULATE is the unlock for advanced DAX.",
   intro:"CALCULATE is like changing the TV channel before you read the guide — it swaps the filter context first, then reads the result. <code>CALCULATE</code> does two things: it evaluates an expression AND lets you modify the filter context it runs in. Almost every advanced DAX measure uses it.",
   ral:{
     code:"West Revenue = CALCULATE(\n    SUM(Sales[Revenue]),\n    Sales[Region] = \"West\"\n)",
     say:"West Revenue uses CALCULATE to change the filter context — it sums Revenue, but only for rows where Region equals \"West\". CALCULATE is how you override the natural filter to compute something specific.",
     lines:[
       ["CALCULATE(","evaluate the following expression..."],
       ["SUM(Sales[Revenue]),","...this is the expression — total revenue"],
       ["Sales[Region] = \"West\"","...but only where Region equals West"],
       ["filter argument","replaces or adds to the existing filter context"],
       ["result","the total revenue for West, regardless of what slicer is set"]
     ]
   },
   notes:"CALCULATE is the gateway to ALL, ALLEXCEPT, FILTER, USERELATIONSHIP, and time intelligence. Any time you need to compute something &ldquo;ignoring&rdquo; or &ldquo;overriding&rdquo; a filter, CALCULATE is how you do it.",
   viz:{measure:{name:"West Revenue",value:"$412"},caption:"CALCULATE(SUM(Sales[Revenue]), Sales[Region] = \"West\") overrides the filter context to total just the West region — even if the rest of the report shows everything."},
   quiz:{q:"What does CALCULATE do to the filter context?",opts:["It ignores all existing filters","It evaluates an expression and can add, replace, or remove filters","It only works with SUM","It copies the filter context from another measure"],ans:1,exp:"CALCULATE evaluates its first argument (any DAX expression) within a modified filter context. The filter arguments can add new filters, override existing ones, or remove them with ALL."},
   parsons:{prompt:"Arrange the West Revenue measure — CALCULATE takes the expression first, then the filter.",lines:["West Revenue = CALCULATE(","SUM(Sales[Revenue]),","Sales[Region] = \"West\"",")"],answer:[0,1,2,3]},
   compare:"Expression first, filter second — CALCULATE always reads as 'compute this, under these conditions.' Swapping them is the most common CALCULATE syntax error, because the English phrasing ('for West, sum revenue') runs the other way.",
   build:{q:"You need each region's revenue as a % of ALL regions, even when a slicer filters to one region. Which measure gives the denominator?",opts:["All Revenue = SUM(Sales[Revenue])","All Revenue = CALCULATE(SUM(Sales[Revenue]), ALL(Sales))","All Revenue = CALCULATE(SUM(Sales[Revenue]), Sales[Region] = \"All\")","All Revenue = DIVIDE(SUM(Sales[Revenue]), 1)"],ans:1,exp:"ALL(Sales) removes the filters on the table, so the measure totals every region regardless of the slicer. A plain SUM respects the slicer and gives you the filtered total; \"All\" isn't a region value in the data."},
   close:"You can override filter context on purpose now — the core skill of advanced DAX. Next: time intelligence, CALCULATE's most-used application.",
   unlock:"Nearly every 'fancy' DAX pattern — % of total, share of parent, YoY growth — is just CALCULATE plus one context modifier (ALL, ALLEXCEPT, a time shift). Learn to name what the filter argument is doing and unfamiliar measures start reading like sentences."
  },
  {id:8, unit:"Unit 2: DAX & Measures", title:"Time Intelligence", sub:"YTD, prior period, and date comparisons",
   story:"You can override filter context with CALCULATE. Time intelligence is its most common application: year-to-date revenue, prior-period comparison, month-over-month growth. Functions like TOTALYTD and DATEADD run your measure at a different point in time — essential for any sales or financial dashboard.",
   intro:"Time intelligence is your data's calendar app — it already knows what 'last month' and 'year to date' mean, so you don't have to spell out the dates. Time intelligence functions let you compare periods, accumulate year-to-date totals, and measure change over time. They require a proper Date table with continuous dates.",
   ral:{
     code:"YTD Revenue       = TOTALYTD([Total Revenue], Dates[Date])\nPrior Year Rev    = CALCULATE([Total Revenue], SAMEPERIODLASTYEAR(Dates[Date]))\nRevenue vs LY %   = DIVIDE([Total Revenue] - [Prior Year Rev], [Prior Year Rev])",
     say:"YTD Revenue gives the running total from the start of the year. Prior Year Rev uses SAMEPERIODLASTYEAR to grab the same metric one year ago. Then Revenue vs LY Percent compares the two using safe division.",
     lines:[
       ["TOTALYTD(","sum from Jan 1 through the current date in context"],
       ["Dates[Date]","the date column from your Date table — must be continuous"],
       ["SAMEPERIODLASTYEAR(Dates[Date])","shifts the filter context back exactly one year"],
       ["CALCULATE([Total Revenue], ...)","evaluate Total Revenue in the shifted time window"],
       ["DIVIDE(..., [Prior Year Rev])","safe division — calculates YoY % change"]
     ]
   },
   notes:"Time intelligence only works if: (1) you have a dedicated Date table, (2) it has no gaps in dates, (3) it's marked as a Date Table in Power BI. Without these, TOTALYTD and SAMEPERIODLASTYEAR return wrong results.",
   viz:{title:"Time intelligence",html:`<div style="overflow-x:auto;font-size:11px"><table style="border-collapse:collapse;font-family:var(--mono);width:100%">
     <thead><tr><th style="text-align:left;padding:5px 10px;border-bottom:2px solid var(--accent);color:var(--accent)">Month</th><th style="text-align:left;padding:5px 10px;border-bottom:2px solid var(--accent);color:var(--accent)">TOTALYTD</th><th style="text-align:left;padding:5px 10px;border-bottom:2px solid var(--accent);color:var(--accent)">Prior yr · SAMEPERIODLASTYEAR</th><th style="text-align:left;padding:5px 10px;border-bottom:2px solid var(--accent);color:var(--accent)">YoY % · DIVIDE</th></tr></thead>
     <tbody>
     <tr><td style="padding:5px 10px">Jan</td><td style="padding:5px 10px">$402</td><td style="padding:5px 10px">$360</td><td style="padding:5px 10px">+12%</td></tr>
     <tr><td style="padding:5px 10px">Feb</td><td style="padding:5px 10px">$810</td><td style="padding:5px 10px">$735</td><td style="padding:5px 10px">+10%</td></tr>
     <tr><td style="padding:5px 10px">Mar</td><td style="padding:5px 10px">$1,279</td><td style="padding:5px 10px">$1,150</td><td style="padding:5px 10px">+11%</td></tr></tbody></table></div>`,caption:"Three time-intelligence functions together: TOTALYTD accumulates the year, SAMEPERIODLASTYEAR pulls the prior-year figure, and DIVIDE turns the two into a YoY % change. All need a marked Date table."},
   quiz:{q:"What is required for DAX time intelligence functions to work correctly?",opts:["A calculated column for year","A dedicated, gap-free Date table marked as a Date Table","Any date column in the fact table","The DATEADD function"],ans:1,exp:"Time intelligence functions traverse the Date table. It must have continuous dates (no gaps), cover your full data range, and be marked as a Date Table (right-click the table in Model View)."},
   parsons:{prompt:"Arrange the YoY comparison build: this year's number, last year's number, then the % change.",lines:["Total Revenue = SUM(Sales[Revenue])","Prior Year Rev = CALCULATE([Total Revenue], SAMEPERIODLASTYEAR(Dates[Date]))","Revenue vs LY % = DIVIDE([Total Revenue] - [Prior Year Rev], [Prior Year Rev])"],answer:[0,1,2]},
   compare:"The measures stack: the base measure exists first, the time-shifted version wraps it with CALCULATE, and the % change references both. Build in this order and each step is testable on a card before the next one depends on it.",
   build:{q:"Which measure gives a running total of revenue from January 1 through the current date in context?",opts:["YTD Revenue = TOTALYTD([Total Revenue], Dates[Date])","YTD Revenue = SUM(Dates[Date])","YTD Revenue = CALCULATE([Total Revenue], Dates[Year] = 2026)","YTD Revenue = DATEADD([Total Revenue], -1, YEAR)"],ans:0,exp:"TOTALYTD accumulates the measure from the start of the year through the current date context. Filtering to a year gives the full-year total (not a running one), and DATEADD shifts dates — it takes a date column, not a measure, as its first argument."},
   close:"You can compare any measure across time — YTD, prior year, growth. That's the DAX core complete. Next: slicers and filters, the controls your audience actually touches.",
   unlock:"When time intelligence returns numbers that are wrong-but-plausible, check the Date table first: a gap, or forgetting 'Mark as Date Table', silently breaks the traversal. Analysts who've been burned keep one reusable Dates table (a CALENDAR() script) and paste it into every new model."
  },
  // UNIT 3
  {id:9, unit:"Unit 3: Reports & Insights", title:"Slicers & Filters", sub:"Controlling what your audience sees",
   story:"Your measures handle time. Now the user-facing controls: slicers and filters. A Slicer is a visual on the canvas — your manager clicks 'West' and every visual updates. Page Filters and Report Filters narrow all visuals at different scopes. Visual Filters apply to just one chart. Knowing which to reach for keeps dashboards clean.",
   intro:"A slicer is a TV remote sitting on the report — viewers press a button and everything updates; the Filters pane is the settings menu doing the same thing quietly behind the scenes. Slicers are on-canvas interactive filters. The Filters pane applies filters behind the scenes. Understanding the difference — and when to use each — makes reports cleaner and more intuitive.",
   ral:{
     code:"Slicer     → visible on canvas, user clicks to filter\nFilter Pane → hidden controls, pre-set by the report author\n\nFilter hierarchy (most powerful first):\n  Visual-level → Page-level → Report-level",
     say:"A Slicer is a control sitting on the canvas that the user clicks. The Filter Pane has hidden filters set by you, the author. Filters apply in this hierarchy: Visual-level is most specific, then Page-level, then Report-level.",
     lines:[
       ["Slicer","a visual the user interacts with — can be list, dropdown, or date range"],
       ["Visual-level filter","only affects that one visual — invisible to the user by default"],
       ["Page-level filter","affects all visuals on the current page"],
       ["Report-level filter","affects all pages and all visuals — use for persistent context"],
       ["Edit interactions","control which visuals a slicer affects — Format → Edit Interactions"]
     ]
   },
   notes:"Use &ldquo;Edit Interactions&rdquo; (Format menu) to control slicer scope — you can make a slicer filter some visuals but not others on the same page. This is essential for comparison layouts.",
   viz:{title:"Slicers & Filters",html:`<div style="display:flex;gap:14px;flex-wrap:wrap;font-size:11px">
     <div style="border:1px solid var(--border);border-radius:8px;padding:10px;min-width:130px">
       <div style="font-weight:700;margin-bottom:6px">🔘 Slicer (on canvas)</div>
       <div style="color:var(--accent)">West ▣</div><div style="color:var(--dim)">East ▢ · North ▢</div>
       <div style="color:var(--dim);margin-top:6px;font-size:10px">viewers click it</div>
     </div>
     <div style="border:1px solid var(--border);border-radius:8px;padding:10px;min-width:175px">
       <div style="font-weight:700;margin-bottom:6px">⛢ Filters pane (author-set)</div>
       <div>① Visual-level <span style="color:var(--dim)">— one chart</span></div>
       <div>② Page-level <span style="color:var(--dim)">— this page</span></div>
       <div>③ Report-level <span style="color:var(--dim)">— every page</span></div>
     </div>
   </div>`,caption:"Two filtering tools: a Slicer is a click-to-filter control on the canvas; the Filters pane lets the author set filters at three scopes — visual, page, and whole report."},
   quiz:{q:"Which filter level affects every visual on every page of a report?",opts:["Visual-level filter","Page-level filter","Report-level filter","Slicer"],ans:2,exp:"Report-level filters apply across all pages. Use them for global context like 'only show last 3 years.' Page-level filters scope to one page; visual-level filters scope to one chart."},
   parsons:{prompt:"Arrange the filter scopes from narrowest to widest.",lines:["Visual-level — one chart only","Page-level — every visual on this page","Report-level — every visual on every page"],answer:[0,1,2]},
   compare:"Narrow to wide: visual, page, report. When a chart shows a number you don't expect, walk the same ladder — check the visual's own filters first, then the page's, then the report's. The answer is always on one of the three rungs.",
