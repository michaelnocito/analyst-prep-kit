    .map(l => ({id:l.id, title:`Lesson ${lessonPos(l.id)+1} — ${l.title}`, sub: conf[l.id]==='low' ? 'Not yet' : 'Almost'}));
  if(wrap) wrap.style.display = rows.length ? '' : 'none';
  el.innerHTML = rows.map(r=>`<div class="flag-row" onclick="navigate('lesson',${r.id})">
      <div><span style="font-size:11px;color:var(--warn,#d9963a);font-family:var(--mono);margin-right:8px">${r.sub}</span><span class="flag-row-title" style="font-size:14px;font-weight:600">${r.title}</span></div>
      <div style="display:flex;gap:10px;align-items:center;flex-shrink:0"><button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();confGotIt(${r.id})" title="Mark as 'Have it' — removes from review list">✓ Got it now</button><span style="color:var(--accent);font-weight:700">→</span></div>
    </div>`).join('');
}
function confGotIt(lessonId){
  state.confidence = state.confidence || {};
  state.confidence[lessonId] = 'high';
  saveState();
  renderFlagged();
}

let currentView = 'home';
function navigate(view, ...args){
  guided = null; // any normal navigation exits the guided practice flow
  currentView = view;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const map = {home:0,lessons:1,practice:2,lab:3,cards:4,glossary:5,workspace:6};

  if(map[view] !== undefined && btns[map[view]]) btns[map[view]].classList.add('active');

}

function lessonPbiHTML(v){
  let inner='';
  if(v.html)inner+=v.html;
  if(v.measure) inner+=`<div style="display:inline-block;min-width:150px;background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin-bottom:${v.bars?'14px':'0'}"><div style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--dim)">${v.measure.name}</div><div style="font-size:1.8rem;font-weight:700;color:var(--accent);margin-top:2px">${v.measure.value}</div></div>`;
  if(v.bars){
    const max=Math.max(...v.bars.map(b=>b.value));
    inner+=`<div style="display:flex;flex-direction:column;gap:8px">${v.bars.map(b=>`<div style="display:flex;align-items:center;gap:10px"><span style="width:80px;font-size:12px;color:var(--dim);text-align:right;flex-shrink:0">${b.label}</span><div style="flex:1;background:var(--surf2);border-radius:4px;height:22px"><div style="width:${Math.round(b.value/max*100)}%;background:var(--accent);height:100%;border-radius:4px;min-width:2px"></div></div><span style="width:56px;font-size:12px;font-family:var(--mono);flex-shrink:0">${b.display!==undefined?b.display:b.value}</span></div>`).join('')}</div>`;
  }
  return `<div class="card" style="border-color:var(--accent);margin-top:16px"><div class="lesson-eyebrow"><i data-lucide="monitor"></i> ${v.title||'See it on screen'}</div>${inner}${v.caption?`<p style="font-size:.9rem;color:var(--muted);margin:12px 0 0;line-height:1.6">${v.caption}</p>`:''}</div>`;

function answerQuiz(lessonId, chosen){
  const l = DATA.LESSONS.find(x => x.id === lessonId);
  document.querySelectorAll('.quiz-opt').forEach((b,i) => {
    b.disabled = true;
    if(i === l.quiz.ans) b.classList.add('correct');
    else if(i === chosen && chosen !== l.quiz.ans) b.classList.add('wrong');
  });
  document.getElementById('quiz-exp').classList.add('show');
  if(chosen === l.quiz.ans){
    celebrate();
    setTimeout(() => finishLesson(lessonId), 1200);
  } else {
    const qw = document.getElementById('quiz-wrap');
    if(qw) qw.innerHTML += `<div class="mt row"><button class="btn btn-ghost btn-sm" onclick="retryQuiz(${lessonId})">↩ Try Again</button><button class="btn btn-ghost btn-sm" onclick="finishLesson(${lessonId})">Continue anyway →</button></div>`;
  }
}
function retryQuiz(lid){ renderLesson(lid); }

function finishLesson(id){
  markDone('doneLessons', id);
  const next = DATA.LESSONS.find(l => !state.doneLessons.includes(l.id));
  const qw = document.getElementById('quiz-wrap');
  if(qw){
    const dc = (LESSON_DRILLS[id] || []).length;
    const practiceBtn = dc ? `<button class="btn btn-primary" onclick="startGuided(${id})">Practice this →</button>` : '';
    const nextCls = dc ? 'btn-outline btn-sm' : 'btn-primary';
    const nextBtn = next ? `<button class="btn ${nextCls}" onclick="navigate('lesson',${next.id})">Next: ${next.title} →</button>` : `<button class="btn ${nextCls}" onclick="navigate('practice')">Start Practice →</button>`;
    qw.innerHTML += `<div class="mt row" style="gap:10px;flex-wrap:wrap">${practiceBtn}${nextBtn}<button class="btn btn-ghost btn-sm" onclick="navigate('lessons')">All Lessons</button></div>`;
    qw.lastElementChild?.scrollIntoView({behavior:'smooth', block:'center'}); // bring the new action buttons into view
  }
}

// ─── GUIDED PATH (lesson → its drills → next lesson) ────────────────────────
// Every drill linked to the FIRST lesson it applies to — all 36 (FILLS/BUGS/
// PARSONS ×12) appear exactly once. Concept lessons (1/3/11/12) have no DAX
// drills, so the guided flow advances straight past them.
const LESSON_DRILLS = {
  1:  [],
  2:  [['parsons',8]],
  3:  [],
  4:  [['bugs',11]],
  5:  [['fills',8],['fills',11],['bugs',0],['bugs',2],['bugs',4],['bugs',7]],
  6:  [['fills',0],['fills',1],['fills',2],['fills',6],['fills',7],['fills',10],['bugs',1],['bugs',6],['parsons',0],['parsons',2],['parsons',5],['parsons',10]],
  7:  [['fills',3],['fills',9],['bugs',5],['bugs',9],['parsons',1],['parsons',7]],
  8:  [['fills',4],['fills',5],['bugs',3],['bugs',8],['bugs',10],['parsons',3],['parsons',4],['parsons',6]],
  9:  [['parsons',9]],
  10: [['parsons',11]],
  11: [],
  12: []
};
let guided = null;
function startGuided(lessonId){
  const M = {fills:'FILLS', bugs:'BUGS', parsons:'PARSONS'};
  const seq = (LESSON_DRILLS[lessonId] || []).filter(s => M[s[0]] && DATA[M[s[0]]] && DATA[M[s[0]]][s[1]]);
  if(!seq.length){ gotoNextLesson(lessonId); return; }
  guided = {lessonId, seq, pos:0};
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const pb = document.querySelectorAll('.nav-btn')[2]; if(pb) pb.classList.add('active');
  renderGuidedStep();
}
function renderGuidedStep(){
  if(!guided) return;
  const step = guided.seq[guided.pos];
  if(step[0]==='fills') renderFill(step[1]);
  else if(step[0]==='bugs') renderBug(step[1]);
  else if(step[0]==='parsons') renderParsons(step[1]);
  injectGuidedHeader();
}
function injectGuidedHeader(){
  if(!guided) return;
  const main = document.getElementById('main');
  const row = main.querySelector('.row.mb');
  if(!row) return;
  const {seq, pos, lessonId} = guided;
  const lesson = DATA.LESSONS.find(l => l.id === lessonId);
  const step = seq[pos];
  const stepFlag = '';
  row.innerHTML = `<button class="btn btn-ghost btn-sm" onclick="navigate('lesson',${lessonId})">← Back to lesson</button><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;margin-left:auto">${stepFlag}<span class="text-muted text-sm">Practice ${pos+1}/${seq.length} · ${lesson.title}</span></div>`;
  const dots = document.createElement('div');
  dots.style.cssText = 'display:flex;gap:4px;align-items:center;margin:0 0 14px';
  dots.innerHTML = seq.map((_,i) => `<span style="width:20px;height:6px;border-radius:3px;background:${i<=pos?'var(--accent)':'rgba(127,127,127,.28)'};opacity:${i<=pos?1:.5}"></span>`).join('') + `<button class="btn btn-ghost btn-sm" style="margin-left:8px" onclick="guidedNext()">Skip →</button>`;
  row.after(dots);
}
function guidedNext(){
  if(!guided) return;
  if(guided.pos < guided.seq.length-1){ guided.pos++; renderGuidedStep(); }
  else { gotoNextLesson(guided.lessonId); }
}
function gotoNextLesson(lid){
  guided = null;
  const _nxt=nextLessonId(lid);
  if(_nxt!==null) navigate('lesson', _nxt);
  else { navigate('home'); showToast('You finished every Power BI lesson!'); }
}

// Bug Hunt — tap the correct fix (no free typing).
function _shuf(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function _bugAdvance(idx){
  return guided
    ? `<button class="btn btn-primary btn-sm" onclick="guidedNext()">Next →</button>`
    : idx+1 < DATA.BUGS.length
      ? `<button class="btn btn-primary btn-sm" onclick="navigate('bug',${idx+1})">Next Bug →</button>`
      : `<button class="btn btn-primary btn-sm" onclick="navigate('practice')">All Done →</button>`;
}
function pickBugFix(btn, idx){
  const b = DATA.BUGS[idx];
  const res = document.getElementById('bug-result');
  if(btn.dataset.correct === '1'){
    btn.style.background='var(--green,#1a7f37)'; btn.style.color='#fff'; btn.style.borderColor='var(--green,#1a7f37)';
    document.querySelectorAll('#bugChoices .bug-choice').forEach(x=>x.disabled=true);
    document.getElementById('bug-fix').classList.add('show');
    res.innerHTML = `<span style="color:var(--green);font-weight:600">✓ Fixed!</span>`;
    celebrate();
    markDone('doneBugs', b.id);
    document.getElementById('bug-next').innerHTML = _bugAdvance(idx);
  } else {
    btn.style.background='rgba(207,34,46,.12)'; btn.style.borderColor='var(--red,#cf222e)'; btn.style.color='var(--red,#cf222e)'; btn.style.opacity='.8'; btn.disabled=true;
    res.innerHTML = `<span style="color:var(--red)">Not quite — try another, or use the hint.</span>`;
  }
}

let draggedChip = null;
function dragStart(e){ draggedChip = e.target; e.target.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
function dragOver(e){ e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function dropChip(e, target){
  e.preventDefault();
  if(!draggedChip) return;
  draggedChip.classList.remove('dragging');
  document.getElementById('parsons-' + target).appendChild(draggedChip);
  draggedChip = null;
}

function checkParsons(idx){
  const p = DATA.PARSONS[idx];
  const chips = [...document.getElementById('parsons-answer').querySelectorAll('.parsons-chip')];
  if(chips.length !== p.answer.length){
    document.getElementById('parsons-result').innerHTML = `<span style="color:var(--yellow)">Move all lines to the answer area first.</span>`;
    return;
  }
  const userOrder = chips.map(c => parseInt(c.dataset.line));
  const correct = p.answer.every((v,i) => v === userOrder[i]);
  if(correct){
    document.getElementById('parsons-result').innerHTML = `<span style="color:var(--green);font-weight:600">✓ Correct order!</span>`;
    celebrate();
    markDone('doneParsons', p.id);
    setTimeout(() => { if(guided) guidedNext(); else if(idx+1 < DATA.PARSONS.length) navigate('parsons', idx+1); else navigate('practice'); }, 1200);
  } else {
    document.getElementById('parsons-result').innerHTML = `<span style="color:var(--red)">✗ Not quite — try reordering.</span>`;
  }
}

/* -- Hint System JS ---- */
var _hd={hint:'',ans:'',state:0};
function cycleHint(){
  _hd.state++;
  var hp=document.getElementById('drill-hint');
  var ap=document.getElementById('drill-answer');
  var btn=document.getElementById('hint-cycle-btn');
  if(_hd.state===1){
    hp.textContent='\u{1F4A1} '+_hd.hint;
    hp.classList.add('show');
    if(btn)btn.textContent='Show Answer';
  } else {
    var esc=(_hd.ans+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    var match=findGlossaryTerm(_hd.ans+'');
    var matchTerm=match?(match.term!==undefined?match.term:match[0]):null;
    var learnHtml=matchTerm?'<button class="learn-more-link" onclick="openGlossaryFor(\''+matchTerm.replace(/'/g,"\\'")+'\')">&#x1F4D6; '+matchTerm+'</button>':'';
    ap.innerHTML='<pre class="answer-code">'+esc+'</pre><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><button class="copy-btn" onclick="doCopy(event)">&#x1F4CB; Copy</button>'+learnHtml+'</div>';
    ap.classList.add('show');
    if(btn)btn.style.display='none';
  }
}
function findGlossaryTerm(ansText){
  if(typeof DATA==='undefined'||!DATA.GLOSSARY)return null;
  var lower=(ansText+'').toLowerCase();
  return DATA.GLOSSARY.find(function(e){var t=(e.term!==undefined?e.term:e[0]).toLowerCase();return t.length>2&&lower.indexOf(t)!==-1;});
}
function openGlossaryFor(term){
  if(typeof navigate==='function')navigate('glossary');
  else if(typeof show==='function')show('glossary');
  setTimeout(function(){
    var s=document.getElementById('gloss-search')||document.getElementById('glossSearch');
    if(s){s.value=term;try{filterGlossary(term);}catch(e){try{filterGlossary();}catch(e2){}}}
  },80);
}
function doCopy(e){
  var btn=e.currentTarget||e.target,orig=btn.textContent;
  function done(){btn.textContent='✓ Copied!';setTimeout(function(){btn.textContent=orig;},1500);}
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(_hd.ans).then(done).catch(function(){_fbCopy(_hd.ans);done();});}
  else{_fbCopy(_hd.ans);done();}
}
function _fbCopy(t){var a=document.createElement('textarea');a.value=t;a.style.position='fixed';a.style.top='-9999px';document.body.appendChild(a);a.focus();a.select();try{document.execCommand('copy');}catch(_){}document.body.removeChild(a);}

/* Sprint mode removed. */
localStorage.removeItem('apk-sprint');

// ─── Lucide icons: render now + re-render after any #main view change ───────
(function(){
  // This Lucide build leaves data-lucide ON the generated <svg>, so createIcons
  // re-matches its own output; strip it or the observer loops forever.
  function refresh(){
    if(!window.lucide) return;
    lucide.createIcons();
    document.querySelectorAll('svg[data-lucide]').forEach(function(s){ s.removeAttribute('data-lucide'); });
  }
  refresh();
  var main=document.getElementById('main');
  if(main && 'MutationObserver' in window){
    var queued=false;
    new MutationObserver(function(){
      if(queued) return; queued=true;
      queueMicrotask(function(){ queued=false; refresh(); });
    }).observe(main,{childList:true,subtree:true});
  }
})();
</script>
