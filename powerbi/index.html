   build:{q:"You fix a definition bug in the [Revenue] measure. What happens to Gross Profit, Operating Income, and the margins?",opts:["Nothing — each measure stores its own copy of the logic","They all update automatically — they reference [Revenue]","Only Gross Profit updates","The model must be re-published first"],ans:1,exp:"That's the payoff of measures referencing measures: the fix flows through the whole cascade instantly. If each subtotal had its own CALCULATE over the ledger, you'd be hunting for every copy of the filter logic — and missing one."},
   close:"You can build a live income statement — line measures, cascading subtotals, recomputing under any slicer. Next: margins, where those lines become comparable.",
   unlock:"A P&L matrix sliced by month is the report CFOs actually open. The DAX is modest — the impressive part is the shape: statement lines as measures means one model serves the total company view, the per-region view, and the per-product view without a formula changing."
  },
{id:702, unit:"Unit 6: Financial Analysis", title:"Margins with DIVIDE", sub:"Each profit line over revenue — safely, with DIVIDE.",
   story:"Two product lines each post $760K in revenue. One keeps 22¢ on the dollar, the other 6¢. Revenue can't tell them apart — a margin can. A margin is a profit line over revenue, and in DAX you write it with DIVIDE, not the slash operator, so a filter that drives revenue to zero or blank returns a clean blank instead of an error. Format the measure as a percent and it reads like a report.",
   ral:{code:"Gross Margin %     = DIVIDE([Gross Profit], [Revenue])\nOperating Margin % = DIVIDE([Operating Income], [Revenue])\nNet Margin %       = DIVIDE([Net Income], [Revenue])\n\n-- set Format to Percentage on each measure", say:"Divide each profit measure by revenue using DIVIDE — gross, operating, and net margin — and format the result as a percent to read the cents of profit kept per sales dollar.",
     lines:[["DIVIDE([Gross Profit], [Revenue])","gross margin — efficiency of making the product (price vs cost of goods)"],["DIVIDE([Operating Income], [Revenue])","operating margin — profitability of the core business, before interest & tax"],["DIVIDE([Net Income], [Revenue])","net margin — what survives after every cost, down to the bottom line"],["DIVIDE, not /","returns blank on a zero or blank denominator instead of an error"]]},
   notes:"Each margin strips out one more layer of cost, so they step down: gross ≥ operating ≥ net. Gross margin moves on pricing and input costs; operating margin on overhead; net margin on debt and tax. The DAX-specific habit: always use DIVIDE(numerator, denominator) over the slash — in a matrix some cells will have no revenue in context, and DIVIDE returns blank there while / throws an error that blanks the whole visual. Set the measure's format to Percentage so the model stores the ratio and the report shows 22%.",
   viz:{html:"<div style=\"overflow-x:auto\"><table style=\"border-collapse:collapse;font-family:var(--mono);font-size:13px;width:100%\"><thead><tr><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">Category</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">2024 margins (% of revenue)</th></tr></thead><tbody><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Gross</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">60%</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Operating</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">22%</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Net</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">14%</td></tr></tbody></table></div>", caption:"2024 margins (% of revenue)"},
   quiz:{q:"Why write a margin with DIVIDE([Profit],[Revenue]) instead of [Profit] / [Revenue]?", opts:["DIVIDE automatically formats the result as a percent","It returns blank when revenue is zero or blank","The slash operator is not valid DAX syntax","DIVIDE is required inside every CALCULATE call"], ans:1, exp:"In a matrix, some rows will have no revenue in their filter context. DIVIDE handles that gracefully — a zero or blank denominator yields blank, not an error — so the visual keeps rendering. The slash operator raises a divide-by-zero error that can blank the entire visual."},
   parsons:{prompt:"Arrange the margin ladder the way the P&L steps down, then format.",lines:["Gross Margin % = DIVIDE([Gross Profit], [Revenue])","Operating Margin % = DIVIDE([Operating Income], [Revenue])","Net Margin % = DIVIDE([Net Income], [Revenue])","Set each measure's Format to Percentage"],answer:[0,1,2,3]},
   compare:"Gross, then operating, then net — the same top-to-bottom order as the statement, each stripping one more cost layer, so gross ≥ operating ≥ net. Formatting comes last: the model stores the ratio, the report shows 22%.",
   build:{q:"Gross margin is 60% but operating margin is 22%. What lives in the 38-point gap?",opts:["Interest and tax","Operating expenses — overhead like salaries, rent, marketing","Cost of goods sold","A DIVIDE rounding error"],ans:1,exp:"The step from gross to operating removes opex — the overhead of running the business. COGS was already gone before gross margin, and interest and tax come off later, between operating and net."},
   close:"You can compare businesses of any size on the same scale — cents kept per dollar at each cost layer. Next: the balance-sheet ratios.",
   unlock:"Margins are where 'which product line is better?' gets settled: two lines with identical revenue can differ 3× in what they keep. Presenting margin next to revenue in the same matrix quietly redirects the meeting from 'who sold the most' to 'who earned the most.'"
  },
{id:703, unit:"Unit 6: Financial Analysis", title:"Liquidity & Leverage Ratios", sub:"Three balance-sheet ratios as measures.",
   story:"The income statement says whether you're profitable; the balance sheet says whether you'll survive the quarter. Two questions decide it. Liquidity: can you cover what's due soon with what turns to cash soon? Leverage: how much of the company runs on borrowed money? Three measures — each a DIVIDE of two balance-sheet measures — answer both, and they drive the KPI cards a lender or CFO checks first.",
   ral:{code:"Current Ratio  = DIVIDE([Current Assets], [Current Liabilities])\nQuick Ratio    = DIVIDE([Current Assets] - [Inventory], [Current Liabilities])\nDebt to Equity = DIVIDE([Total Debt], [Total Equity])", say:"Divide current assets by current liabilities for the current ratio, the same without inventory for the quick ratio, and total debt by total equity for leverage — each with DIVIDE.",
     lines:[["DIVIDE([Current Assets], [Current Liabilities])","current ratio — above 1.0 means short-term assets cover short-term bills"],["DIVIDE([Current Assets] - [Inventory], [Current Liabilities])","quick ratio — the stricter test, with inventory removed"],["DIVIDE([Total Debt], [Total Equity])","debt-to-equity — borrowed dollars per dollar of ownership"],["format as a decimal","show 1.80, not 180% — ratios are read as multiples, not percentages"]]},
   notes:"A ratio only means something against a benchmark. A current ratio of 1.5–3 is comfortable for most industries; much higher can mean cash sitting idle. The quick ratio strips out inventory — the slowest current asset to turn to cash — to ask whether you could pay if the shelves didn't clear. Debt-to-equity above roughly 2 signals heavy financing risk for most non-financial firms. As measures these respond to a date slicer, so you can trend a ratio over quarters on a line chart — far more telling than one static number.",
   viz:{html:"<div style=\"overflow-x:auto\"><table style=\"border-collapse:collapse;font-family:var(--mono);font-size:13px;width:100%\"><thead><tr><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">ratio</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">value</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">healthy range</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">read</th></tr></thead><tbody><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Current ratio</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">1.80</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">1.5 – 3.0</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Comfortable</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Quick ratio</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">1.10</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">≥ 1.0</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Covers bills without inventory</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Debt-to-equity</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">0.70</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">< 2.0</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Modestly leveraged</td></tr></tbody></table></div>", caption:"Each ratio is one DIVIDE read against a benchmark. As measures they trend over time under a date slicer — a falling current ratio across quarters is the real warning, not its level in any single one."},
   quiz:{q:"Building these as measures rather than fixed numbers gives you which advantage?", opts:["The ratios automatically format as percentages","They recompute and trend under a date slicer","They no longer need a denominator value","They prevent users from filtering the report"], ans:1, exp:"A measure carries no stored value — it recomputes in whatever filter context the report supplies. Put a date slicer on the page and the same Current Ratio measure trends across quarters, so you can watch liquidity erode over time instead of judging a single static snapshot."},
   parsons:{prompt:"Arrange the three ratios — the loose test, the strict test, then leverage — and the format rule.",lines:["Current Ratio = DIVIDE([Current Assets], [Current Liabilities])","Quick Ratio = DIVIDE([Current Assets] - [Inventory], [Current Liabilities])","Debt to Equity = DIVIDE([Total Debt], [Total Equity])","Format as decimals — ratios read as multiples, not percents"],answer:[0,1,2,3]},
   compare:"Liquidity before leverage, loose before strict: the quick ratio is the current ratio with inventory removed, so it only makes sense after the current ratio exists. The formatting note is the difference between a card reading 1.80 and a confusing 180%.",
   build:{q:"Why does the quick ratio subtract Inventory from current assets?",opts:["Inventory is a liability, not an asset","Inventory is the slowest current asset to turn into cash — the strict test excludes it","Inventory is always overstated","DIVIDE cannot handle three measures"],ans:1,exp:"The quick ratio asks whether you could cover short-term bills even if nothing on the shelves sold. Inventory is a real current asset, but it converts to cash slowest — removing it turns a comfortable test into a strict one."},
   close:"You can read whether a company survives the quarter — coverage and leverage as live, trendable measures. Next: NPV, where DAX has no built-in and you build one.",
   unlock:"The trend beats the level: a current ratio of 1.6 looks fine on a card, but 2.4 → 2.0 → 1.6 across three quarters is a warning. Ratios-as-measures under a date slicer give you the trajectory for free — the read a static spreadsheet snapshot can't offer."
  },
{id:704, unit:"Unit 6: Financial Analysis", title:"Time Value of Money: NPV in DAX", sub:"No native NPV — build it with SUMX and a discount factor.",
   story:"A project costs $500K today and returns cash over five years. Should you fund it? A dollar in year 5 is worth less than a dollar today, so you discount each flow before summing. Excel has =NPV; DAX does not — so you build it, and that's a genuinely impressive thing to show in an interview. SUMX walks a cash-flow table row by row, discounting each amount by its year, and adds them up.",
   ral:{code:"NPV =\nVAR Rate = 0.10\nRETURN\n    SUMX(\n        CashFlows,\n        DIVIDE(CashFlows[Amount], (1 + Rate) ^ CashFlows[Year])\n    )\n-- Year 0 row holds -500000; (1+Rate)^0 = 1, so it isn't discounted", say:"Walk the cash-flow table with SUMX, dividing each row's amount by one-plus-the-rate raised to that row's year, and sum the discounted stream into today's dollars.",
     lines:[["SUMX(CashFlows, …)","iterate the table row by row, evaluating the expression per row, then total"],["(1 + Rate) ^ CashFlows[Year]","the discount factor — grows with the year, shrinking far-off flows more"],["Year 0 → factor 1","the upfront cost isn't discounted: (1 + Rate) ^ 0 = 1"],["VAR Rate","name the hurdle rate once — or swap in a what-if parameter to make it interactive"]]},
   notes:"DAX ships no NPV or IRR function, so you construct NPV with an iterator: SUMX evaluates the discount expression for each row of the cash-flow table and sums the results. The row-context iteration is the key DAX idea — SUMX is doing per-row math that a plain SUM can't. Wire the rate to a what-if parameter and the report recalculates NPV live as a user drags the hurdle rate. IRR — the rate where NPV hits zero — needs iteration to solve and isn't practical in a measure, so present NPV at a chosen rate and note IRR separately if asked.",
   viz:{html:"<div style=\"overflow-x:auto\"><table style=\"border-collapse:collapse;font-family:var(--mono);font-size:13px;width:100%\"><thead><tr><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">year</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">cash flow</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">factor (10%)</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">present value</th></tr></thead><tbody><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">0</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">−500,000</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">1.00</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">−500,000</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">1</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">150,000</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">1.10</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">136,364</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">2</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">160,000</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">1.21</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">132,231</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">3</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">170,000</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">1.33</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">127,724</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">4</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">180,000</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">1.46</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">122,940</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">5</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">190,000</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">1.61</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">117,971</td></tr></tbody></table></div>", caption:"SUMX discounts each row by (1.10)^year and totals the present-value column to ≈ +$137,230 — positive, so the project clears the 10% hurdle. Wire Rate to a what-if slider and this recomputes live."},
   quiz:{q:"Why is NPV built with SUMX rather than a plain SUM over the cash-flow table?", opts:["SUM cannot read a column of negative numbers","SUMX discounts each row by its own year first","SUM always ignores the row at year zero","SUMX is the only function allowed inside VAR"], ans:1, exp:"Each cash flow must be discounted by its own year before being added, which is per-row math. SUMX provides the row context to evaluate Amount / (1+Rate)^Year for each row, then sums the results. A plain SUM can only total the raw amounts — it has no way to apply a different discount factor per row."},
   parsons:{prompt:"Arrange the NPV measure: name the rate, then iterate the flows, discounting each by its year.",lines:["NPV =","VAR Rate = 0.10","RETURN SUMX(","CashFlows,","DIVIDE(CashFlows[Amount], (1 + Rate) ^ CashFlows[Year]))"],answer:[0,1,2,3,4]},
   compare:"Rate named once up front, then SUMX walks the table: for every row, amount over (1+rate) raised to that row's year. The per-row exponent is why this needs an iterator — no plain aggregation can apply a different factor to each row.",
   build:{q:"The Year 0 row holds the −500,000 upfront cost. What does the discount factor do to it?",opts:["Discounts it by 10% like every other row","Nothing — (1 + Rate) ^ 0 = 1, so today's money stays at face value","Excludes it from the SUMX entirely","Converts it to a positive number"],ans:1,exp:"Anything to the power of zero is 1, so the year-0 flow divides by 1 and passes through undiscounted — which is exactly right: today's dollars are already in today's terms. The discounting only bites as Year grows."},
   close:"You built a finance function DAX doesn't ship — SUMX doing per-row math a plain SUM can't. Next: budget vs actual, where the verdict depends on context.",
   unlock:"'DAX has no NPV, so I built it with SUMX' is a double interview signal: it proves you know the tool's real edges AND that iterators (SUMX, the X-family) unlock per-row logic. Wire the rate to a what-if slider and it becomes a live demo."
  },
{id:705, unit:"Unit 6: Financial Analysis", title:"Budget vs Actual: Variance Analysis", sub:"Variance measures, and a verdict that reads the line in context.",
   story:"Every month, FP&A puts plan next to reality in a matrix: budget, actual, variance. The conversation turns on whether each variance is favorable or unfavorable, and here's the trap — the sign flips by line type. Beating plan on revenue is good; beating it on cost is bad. The verdict measure has to read which line it's sitting on, and SELECTEDVALUE pulls that from the current filter context.",
   ral:{code:"Variance   = [Actual] - [Budget]\nVariance % = DIVIDE([Actual] - [Budget], [Budget])\n\nVerdict =\nIF(\n    SELECTEDVALUE(Lines[Type]) = \"Revenue\",\n    IF([Variance] >= 0, \"Favorable\", \"Unfavorable\"),\n    IF([Variance] <= 0, \"Favorable\", \"Unfavorable\")\n)", say:"Subtract budget from actual for the variance and divide for the percent, then in the verdict read the current line's type with SELECTEDVALUE so revenue over plan reads favorable and cost over plan reads unfavorable.",
     lines:[["[Actual] - [Budget]","the dollar variance — what reality did versus the plan"],["DIVIDE([Actual] - [Budget], [Budget])","percent variance — scales the gap so $10K on $1M reads differently than on $20K"],["SELECTEDVALUE(Lines[Type])","read the one line type in the current row's context — revenue or cost"],["IF(… nested …)","the verdict flips by line: revenue over plan is good, cost over plan is bad"]]},
   notes:"A dollar variance with no favorable/unfavorable tag is ambiguous — overspending and overearning are both positive numbers, and only the line type separates them. SELECTEDVALUE is the move that makes the verdict context-aware: in a matrix sliced by line, it returns the single line type for the current row (and a fallback when the context isn't a single value). Encode the judgment in the measure so the matrix can't be misread, then triage by materiality — the variances that are large in both dollars and percent.",
   viz:{html:"<div style=\"overflow-x:auto\"><table style=\"border-collapse:collapse;font-family:var(--mono);font-size:13px;width:100%\"><thead><tr><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">line</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">budget</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">actual</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">variance</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">verdict</th></tr></thead><tbody><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Revenue</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">1,000,000</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">1,080,000</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">+80,000</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Favorable</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">COGS</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">400,000</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">445,000</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">+45,000</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Unfavorable</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Marketing</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">120,000</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">104,000</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">−16,000</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Favorable</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Headcount</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">260,000</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">290,000</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">+30,000</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Unfavorable</td></tr></tbody></table></div>", caption:"Rows 1 and 2 both show a positive variance, yet one is favorable and one is not — revenue over plan is good, cost over plan is bad. SELECTEDVALUE lets the verdict measure know which line it's on."},
   quiz:{q:"What is SELECTEDVALUE(Lines[Type]) doing inside the Verdict measure?", opts:["Summing every line type across the matrix","Reading the current row's single line type","Sorting the lines into revenue then cost","Forcing the variance to always be positive"], ans:1, exp:"In a matrix sliced by line, each row's filter context narrows to one line type. SELECTEDVALUE returns that single value — 'Revenue' or 'Cost' — so the IF can apply the right sign convention per row. Without it, the measure couldn't tell whether a positive variance was good or bad."},
   parsons:{prompt:"Arrange the variance kit: dollars, percent, then the context-aware verdict.",lines:["Variance = [Actual] - [Budget]","Variance % = DIVIDE([Actual] - [Budget], [Budget])","Verdict = IF(SELECTEDVALUE(Lines[Type]) = \"Revenue\",","IF([Variance] >= 0, \"Favorable\", \"Unfavorable\"),","IF([Variance] <= 0, \"Favorable\", \"Unfavorable\"))"],answer:[0,1,2,3,4]},
   compare:"Dollar variance, percent variance, then the verdict that reads both — and inside the verdict, the revenue branch comes before the cost branch because SELECTEDVALUE's test picks which sign convention applies. Same number, opposite meaning, depending on the line.",
   build:{q:"COGS came in $45K over budget. What does the Verdict measure return, and why?",opts:["Favorable — more spending means more activity","Unfavorable — a cost line over plan is bad","Favorable — the variance is positive","Blank — SELECTEDVALUE fails on cost lines"],ans:1,exp:"For cost lines the sign convention flips: over plan is unfavorable. That's the whole reason the verdict reads the line type — a +$45K variance is great on revenue and a problem on COGS, and only the context distinguishes them."},
   close:"You can put plan next to reality and encode the judgment so the matrix can't be misread. Next: unit economics — the per-unit view.",
   unlock:"FP&A triages variances on materiality — big in BOTH dollars and percent. A 40% variance on a $2K line is noise; 4% on a $10M line is a real conversation. Add a materiality flag next to the verdict and your matrix pre-sorts the meeting agenda."
  },
{id:706, unit:"Unit 6: Financial Analysis", title:"Unit Economics: Contribution Margin & Break-Even", sub:"Per-unit profit, and the volume that covers the fixed base.",
   story:"Before the P&L nets out, ask the per-unit question: does one more sale make money after the costs that scale with it? Contribution margin is price minus variable cost — what each unit kicks in toward fixed costs and profit. Divide the fixed costs by it and you get break-even: the unit count where the business stops losing money. As measures, these power a pricing dashboard where a what-if price slider moves break-even live.",
   ral:{code:"CM per Unit = [Price] - [Variable Cost]\nCM Ratio    = DIVIDE([Price] - [Variable Cost], [Price])\n\nBreak-even Units =\nROUNDUP(DIVIDE([Fixed Costs], [Price] - [Variable Cost]), 0)", say:"Subtract variable cost from price for the contribution per unit, express it as a share of price with DIVIDE, then divide fixed costs by it and round up for the break-even unit count.",
     lines:[["[Price] - [Variable Cost]","contribution margin per unit — what each sale adds toward fixed costs and profit"],["DIVIDE([Price] - [Variable Cost], [Price])","contribution-margin ratio — contribution as a percent of price"],["DIVIDE([Fixed Costs], [CM per Unit])","break-even units — how many sales it takes to cover the fixed base"],["ROUNDUP(…, 0)","round up — you can't break even on a fraction of a unit"]]},
   notes:"The make-or-break split is fixed versus variable: only variable costs subtract in contribution margin, because only they scale with each unit — fixed costs sit in the break-even denominator instead. Past break-even, every extra unit drops its full contribution margin straight to profit; that's operating leverage. As measures, wire Price to a what-if parameter and the report shows break-even moving as you test prices — a live pricing tool. Contribution margin also answers 'should we take this discounted order?': if price still beats variable cost, it contributes to the fixed base.",
   viz:{html:"<div style=\"overflow-x:auto\"><table style=\"border-collapse:collapse;font-family:var(--mono);font-size:13px;width:100%\"><thead><tr><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">Period</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">Revenue ($K)</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">Total cost ($K)</th></tr></thead><tbody><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">0</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">0</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">60</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">200</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">40</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">84</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">400</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">80</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">108</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">600</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">120</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">132</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">800</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">160</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">156</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">1,000</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">200</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">180</td></tr></tbody></table></div>", caption:"Break-even: total cost vs revenue"},
   quiz:{q:"Which cost belongs in the break-even denominator as part of contribution margin?", opts:["Fixed cost, since it is the largest expense","Variable cost, which scales with each unit","Both costs added together per unit sold","Neither — break-even uses revenue alone"], ans:1, exp:"Contribution margin is price minus variable cost, because only variable cost moves with each unit. Fixed cost doesn't belong in the per-unit margin — it sits in the numerator of the break-even formula, which divides total fixed costs by the per-unit contribution to find how many units cover them."},
   parsons:{prompt:"Arrange the unit-economics build: per-unit margin, its ratio, then break-even.",lines:["CM per Unit = [Price] - [Variable Cost]","CM Ratio = DIVIDE([Price] - [Variable Cost], [Price])","Break-even Units =","ROUNDUP(DIVIDE([Fixed Costs], [Price] - [Variable Cost]), 0)"],answer:[0,1,2,3]},
   compare:"Contribution margin exists before break-even can divide by it — the per-unit profit is the engine, break-even just asks how many engine-turns cover the fixed base. ROUNDUP closes it out because you can't break even on a fraction of a unit.",
   build:{q:"A customer offers to buy at a discount: below list price, but still above variable cost. Fixed costs are already covered this month. Take it?",opts:["No — never sell below list price","Yes — price above variable cost contributes margin straight to profit","No — discounts always lose money","Only if it raises the average selling price"],ans:1,exp:"With fixed costs covered, every sale above variable cost drops its full contribution straight to profit — that's operating leverage. The comparison that matters is price vs variable cost, not price vs list."},
   close:"You can answer the per-unit questions — what each sale contributes and how many sales cover the base. That's the Financial Analysis track complete. Next: the Advanced Analyst Toolkit.",
   unlock:"Break-even reframes pricing talks from opinion to arithmetic: 'at $49 we need 1,224 units, at $59 we need 968' is a sentence that ends debates. Wire price to a what-if slider and stakeholders can argue with the slider instead of with you."
  },
{id:801, unit:"Unit 7: Advanced Analyst Toolkit", title:"Profile the Data First", sub:"Power Query's profiling panes + DAX checks, before you trust a table.",
   story:"A dataset lands in a model and someone wants a report by end of day. Don't start dragging fields — profile first. Power Query has a profiling pane built for exactly this: column quality (valid / error / empty), column distribution, and a column profile with min, max, and distinct counts. Back it with three DAX measures and you know the size, completeness, and uniqueness of the table before you trust a single visual.",
   ral:{code:"// Power Query ▸ View ▸ tick Column quality + Column distribution\n//            ▸ set the status bar to \"based on entire data set\"\n\nRows         = COUNTROWS(Orders)\nEmail Blanks = COUNTBLANK(Orders[Email])\nDistinct Cust = DISTINCTCOUNT(Orders[CustomerID])", say:"Turn on Power Query's column-quality and distribution panes to see nulls and shape per column, then back them with DAX — COUNTROWS for size, COUNTBLANK for gaps, DISTINCTCOUNT for unique entities.",
     lines:[["Column quality pane","valid / error / empty percent per column — completeness with no formula"],["\"based on entire data set\"","the profiling bar defaults to the first 1,000 rows only — a classic gotcha"],["COUNTROWS vs DISTINCTCOUNT(key)","table size vs unique entities — a gap means the key repeats"],["COUNTBLANK(column)","the null count per column — know it before you group on that field"]]},
   notes:"Power Query's profiling panes are the fastest profiler in the stack — but the single biggest trap is the status bar reading 'based on the top 1000 rows.' On a million-row table that's a misleading sample; always switch it to 'entire data set' before you trust the percentages. The DAX trio (COUNTROWS, COUNTBLANK, DISTINCTCOUNT) makes the same checks live and sliceable, so you can profile a column within any filter. DISTINCTCOUNT below COUNTROWS is your first signal of a grain problem, which the next lesson tackles head-on.",
   viz:{html:"<div style=\"overflow-x:auto\"><table style=\"border-collapse:collapse;font-family:var(--mono);font-size:13px;width:100%\"><thead><tr><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">check</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">result</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">read</th></tr></thead><tbody><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">COUNTROWS</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">96,420</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">table size</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">email blanks</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">3,805</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">~4% missing — handle before slicing by email</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">DISTINCTCOUNT(CustomerID)</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">31,544</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">far below rows — customers repeat</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">DISTINCTCOUNT(OrderID)</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">48,210</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">also below rows — grain looks finer</td></tr></tbody></table></div>", caption:"Both distinct counts sit below the row count — customers repeat (expected) and so do order IDs (a grain flag). Profiling surfaces both before any measure is written on top of them."},
   quiz:{q:"Power Query's column profile shows stats for only 1,000 rows by default. How do you profile the whole table?", opts:["Set profiling to 'based on entire data set'","Re-import the source as a CSV file","Add a COUNTROWS measure to the model first","Sort the column in ascending order"], ans:0, exp:"The profiling status bar defaults to the top 1,000 rows, which can badly misrepresent a large table. Clicking it and choosing 'based on entire data set' profiles every row — essential before you trust the quality and distribution percentages."},
   parsons:{prompt:"Arrange the DAX profiling trio, then the read that ties them together.",lines:["Rows = COUNTROWS(Orders)","Email Blanks = COUNTBLANK(Orders[Email])","Distinct Cust = DISTINCTCOUNT(Orders[CustomerID])","Read all three together before building a single visual"],answer:[0,1,2,3]},
   compare:"Size, gaps, uniqueness — three one-line measures that together describe a table you've never seen. The read comes last because no single number means much alone: 3,805 blanks matters relative to 96,420 rows.",
   build:{q:"DISTINCTCOUNT(Orders[CustomerID]) is 31,544 but COUNTROWS(Orders) is 96,420. What did you learn?",opts:["A third of the rows failed to load","Customers repeat across orders — the table's grain is finer than one row per customer","The CustomerID column is corrupt","Nothing — the numbers are unrelated"],ans:1,exp:"Distinct entities far below the row count means the key repeats — each customer averages about three orders here. Expected for a fact table, but it tells you CustomerID can't be the 'one' side of a relationship without a deduped dimension."},
   close:"You can size up an unknown table in three measures and one profiling pane. Next: proving the grain before you build on it.",
   unlock:"Profiling live in DAX (not just Power Query) has a hidden advantage: the measures respond to slicers, so you can profile WITHIN a segment — 'how complete is Email among enterprise accounts?' — a question the static profiling pane can't answer."
  },
{id:802, unit:"Unit 7: Advanced Analyst Toolkit", title:"Validate the Grain", sub:"The 'one' side of a relationship must be unique — prove it.",
   story:"Every table has a grain — what one row represents — and in a Power BI model it matters twice over: a wrong grain inflates your totals, AND the 'one' side of every relationship must have a unique key or the model breaks. Before you build a relationship on a column, prove it's unique: compare the row count to the distinct count of that key.",
   ral:{code:"Row Count     = COUNTROWS(Orders)\nDistinct Keys = DISTINCTCOUNT(Orders[OrderID])\nGrain OK      = [Row Count] = [Distinct Keys]   // TRUE only if one row per order", say:"Compare the row count to the distinct count of the key — if they're equal the grain is one row per order, and if the rows exceed the distinct keys the key repeats and any relationship built on it will fan out.",
     lines:[["COUNTROWS vs DISTINCTCOUNT(OrderID)","equal means the key is unique — one row per order"],["rows > distinct keys","the key repeats; the grain is finer than you assumed"],["the 'one' side must be unique","Power BI needs a unique key to build a one-to-many relationship"],["the fix","relate on the true unique key, or build a deduped dimension table"]]},
   notes:"Grain is doubly important in a model. First, the usual danger: a non-unique key fans out on relationships and inflates measures. Second, the modeling rule: the 'one' side of a one-to-many relationship MUST be unique — if it isn't, Power BI either refuses the relationship or forces a many-to-many, which changes filter behavior in ways that quietly distort every measure. The COUNTROWS = DISTINCTCOUNT test is your proof of grain. When a reconciliation comes back off by a clean multiple, a fanned-out relationship is the first suspect.",
   viz:{html:"<div style=\"overflow-x:auto\"><table style=\"border-collapse:collapse;font-family:var(--mono);font-size:13px;width:100%\"><thead><tr><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">check</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">value</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">read</th></tr></thead><tbody><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Row Count</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">96,420</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">every row in Orders</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Distinct OrderID</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">48,210</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">unique orders</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Grain OK</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">FALSE</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">rows ≠ distinct — OrderID repeats, grain is the line</td></tr></tbody></table></div>", caption:"Rows are exactly double the distinct order count, so OrderID is not unique — the grain is the order line. Building a one-to-many on OrderID would fan out and double every measure that crosses the relationship."},
   quiz:{q:"[Row Count] is 96,420 but DISTINCTCOUNT of the key is 48,210. What does that mean?", opts:["The key repeats — the grain is finer than one per order","The table is somehow missing half of its rows entirely","DISTINCTCOUNT counted the blanks twice","The relationship is already one-to-one"], ans:0, exp:"More rows than distinct keys means the key appears multiple times — here exactly twice, so the grain is the order line, not the order. The 'one' side of a relationship must be unique, so OrderID can't anchor a one-to-many without fanning out."},
   parsons:{prompt:"Arrange the grain proof, then the response when it fails.",lines:["Row Count = COUNTROWS(Orders)","Distinct Keys = DISTINCTCOUNT(Orders[OrderID])","Grain OK = [Row Count] = [Distinct Keys]","If FALSE: dedupe, or relate on the true unique key"],answer:[0,1,2,3]},
   compare:"Count, distinct-count, compare — the check is two measures and an equality. The fourth line is the part people skip: a failed check demands a decision (dedupe or re-key), not a shrug, before any relationship gets built on that column.",
   build:{q:"Power BI needs the 'one' side of a one-to-many relationship to have what property?",opts:["A numeric data type","A unique key — every value appears exactly once","At least 1,000 rows","An alphabetical sort order"],ans:1,exp:"The 'one' side must be unique or the relationship can't be one-to-many — Power BI refuses it or forces many-to-many, which changes filter behavior and quietly distorts measures. Proving uniqueness is what the COUNTROWS = DISTINCTCOUNT test is for."},
   close:"You can prove a key before trusting it with a relationship. Next: distributions — where the average starts lying.",
   unlock:"When a reconciliation is off by a clean multiple — exactly 2×, exactly 3× — stop hunting for missing rows. That fingerprint is a fanned-out relationship: each parent matched N children. The grain check on the join key finds it in under a minute."
  },
{id:803, unit:"Unit 7: Advanced Analyst Toolkit", title:"Distribution & Outliers", sub:"AVERAGE lies on skewed data — put MEDIAN and spread beside it.",
   story:"A card shows AVERAGE order value and a stakeholder anchors on it. But one $9,980 enterprise order drags that average far above what a normal customer spends — the mean hides the shape. Put a MEDIAN measure next to the AVERAGE, add STDEV.P for spread, and the gap between mean and median tells you instantly whether the data is skewed and whether 'average' is even meaningful.",
   ral:{code:"Mean Order   = AVERAGE(Orders[Amount])\nMedian Order = MEDIAN(Orders[Amount])\nSpread (SD)  = STDEV.P(Orders[Amount])\nSkew Flag    = IF([Mean Order] > 1.2 * [Median Order], \"right-skewed\", \"~symmetric\")", say:"Show the average and the median side by side with the standard deviation for spread, and flag the column right-skewed whenever the mean sits well above the median.",
     lines:[["AVERAGE vs MEDIAN","mean vs midpoint — a wide gap signals a skewed distribution"],["STDEV.P(Amount)","spread — the average alone hides how dispersed the values are"],["Mean > 1.2 × Median","a simple, defensible rule of thumb for flagging right skew"],["show both on the card","never present a mean on skewed data without the median beside it"]]},
   notes:"DAX has MEDIAN, AVERAGE, and STDEV.P built in, so there's no excuse for a lonely average on a skewed measure. When mean and median diverge, the median is the more honest 'typical' — it isn't dragged by extremes. A histogram visual (or the Power Query distribution pane) shows the shape directly; the long right tail is what pulls the mean up. Outliers are a question, not a verdict — an enterprise whale is real and worth keeping, but segment it out so it doesn't distort the everyday view a card implies.",
   viz:{html:"<div style=\"overflow-x:auto\"><table style=\"border-collapse:collapse;font-family:var(--mono);font-size:13px;width:100%\"><thead><tr><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">Bin</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">Count</th></tr></thead><tbody><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">$0</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">140</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">$40</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">170</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">$80</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">95</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">$120</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">44</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">$160</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">20</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">$200+</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">9</td></tr></tbody></table></div>", caption:"Order-value distribution (right-skewed)"},
   quiz:{q:"A measure shows AVERAGE order value well above MEDIAN order value. What does that signal?", opts:["Right skew from a few large orders","A perfectly symmetric spread","An error in the STDEV.P measure","No variation at all in the data"], ans:0, exp:"The average sitting above the median is the fingerprint of right skew: a handful of large orders pull the mean up while the median — the true midpoint — stays near where most orders fall. Show the median beside the average so the card isn't misleading."},
   parsons:{prompt:"Arrange the honest-average kit: center twice, spread, then the skew flag.",lines:["Mean Order = AVERAGE(Orders[Amount])","Median Order = MEDIAN(Orders[Amount])","Spread (SD) = STDEV.P(Orders[Amount])","Skew Flag = IF([Mean Order] > 1.2 * [Median Order], \"right-skewed\", \"~symmetric\")"],answer:[0,1,2,3]},
   compare:"Two centers, one spread, one verdict. The flag comes last because it reads the mean and median that must already exist — and its 1.2 threshold is a rule of thumb you can defend, not a law.",
   build:{q:"Mean order value is $86, median is $52. Which number goes in the headline, and why?",opts:["The mean — it uses every data point","The median — on right-skewed data it's the honest 'typical order'","Both are equally representative","Neither — use the maximum"],ans:1,exp:"A mean far above the median means a few whales are dragging it up — the typical customer spends near $52, not $86. The median resists extremes. Keep the mean visible for the finance view, but the 'typical' claim belongs to the median."},
   close:"You can tell when an average is lying and show the honest number beside it. Next: Pareto — finding the vital few.",
   unlock:"Outliers are a question, not a verdict: that $9,980 enterprise order is real revenue, not an error to delete. The pro move is segmentation — report 'typical order (excl. enterprise)' and 'enterprise' separately, so neither view distorts the other."
  },
{id:804, unit:"Unit 7: Advanced Analyst Toolkit", title:"Pareto / ABC Analysis", sub:"A running share measure that ranks the vital few.",
   story:"Around 80% of revenue tends to come from 20% of products. Pareto (ABC) analysis turns a long list into a short one worth acting on. In DAX you build a cumulative-share measure: for each product, sum the revenue of every product ranked at or above it, then divide by the grand total. Drop it on a chart sorted by revenue and the cumulative line shows how few products reach most of the sales.",
   ral:{code:"Cumulative Revenue =\nVAR cur = [Revenue]\nRETURN\n    SUMX(\n        FILTER(ALLSELECTED(Product[Name]), [Revenue] >= cur),\n        [Revenue]\n    )\n\nCumulative % =\nDIVIDE([Cumulative Revenue], CALCULATE([Revenue], ALLSELECTED(Product[Name])))", say:"For each product, sum the revenue of every product ranked at least as high, then divide by the grand total across all selected products — the running share that powers a Pareto chart.",
     lines:[["VAR cur = [Revenue]","capture this product's revenue before the row context is replaced"],["FILTER(ALLSELECTED(…), [Revenue] >= cur)","every product at least as big as the current one — the ones ranked above it"],["SUMX(…, [Revenue])","add their revenue — the cumulative total down the ranking"],["DIVIDE by ALLSELECTED total","the grand total ignoring the row's own filter — turns it into cumulative %"]]},
   notes:"This is the canonical DAX running-total-over-a-ranking pattern, and ALLSELECTED is the key: it removes the current product's filter (so the measure can see all the other products to rank against) while still respecting any slicers the user set. The payoff is focus — act on the A items driving most of the value, manage the long C-tail by exception. Sort the visual by revenue descending and add the Cumulative % line; if that line climbs a straight diagonal instead of bending early, no small group dominates and Pareto isn't the right lens.",
   viz:{html:"<div style=\"overflow-x:auto\"><table style=\"border-collapse:collapse;font-family:var(--mono);font-size:13px;width:100%\"><thead><tr><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">Category</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">Revenue ($K)</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">Cumulative %</th></tr></thead><tbody><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">A</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">600</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">50%</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">B</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">290</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">74%</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">C</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">130</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">85%</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">D</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">95</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">93%</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">E</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">55</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">98%</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">F</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">30</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">100%</td></tr></tbody></table></div>", caption:"Revenue by product, with cumulative %"},
   quiz:{q:"In the cumulative measure, ALLSELECTED(Product[Name]) is used so that:", opts:["The ranking ignores the row's own product filter","Slicers are permanently removed from the report","Only one product is ever returned","The measure recalculates more quickly"], ans:0, exp:"To rank a product against the others, the measure must see beyond the single product in the current row context. ALLSELECTED lifts that row's own filter — exposing all products to compare against — while still honoring any slicers the user applied, which is exactly what a cumulative ranking needs."},
   parsons:{prompt:"Arrange the cumulative-revenue measure: capture this product, then sum everyone ranked at or above it.",lines:["Cumulative Revenue =","VAR cur = [Revenue]","RETURN SUMX(","FILTER(ALLSELECTED(Product[Name]), [Revenue] >= cur),","[Revenue])"],answer:[0,1,2,3,4]},
   compare:"The VAR capture must come first — once FILTER starts iterating other products, [Revenue] means THEIR revenue, so the current product's value has to be saved before the context shifts. Then FILTER finds everyone at least as big, and SUMX totals them.",
   build:{q:"On the Pareto chart, the cumulative % line climbs as a nearly straight diagonal instead of bending early. What's the read?",opts:["The measure is broken","No small group dominates — value is spread evenly, so Pareto isn't the right lens here","The top product is missing","The data needs to be re-sorted"],ans:1,exp:"The early bend IS the Pareto signal — a few items grabbing most of the value. A straight diagonal means every item contributes about equally, so 'focus on the vital few' doesn't apply; that's a finding in itself, not a failure."},
   close:"You can rank the vital few and prove how much of the total they carry. Next: correlation — and the claim you must never make from it.",
   unlock:"ABC analysis earns its keep at the other end too: the C-tail. A hundred products delivering 5% of revenue each cost real catalog, inventory, and support overhead — 'manage by exception or retire' is a recommendation the cumulative line hands you for free."
  },
{id:805, unit:"Unit 7: Advanced Analyst Toolkit", title:"Correlation ≠ Causation", sub:"DAX has no CORR — use a scatter + trend line, and never overclaim.",
   story:"Someone asks what's driving revenue. Correlation is the first tool — but here's an honest DAX fact worth knowing in an interview: there's no native CORR() function. The everyday move is a scatter visual with a trend line from the Analytics pane, which shows direction and tightness at a glance. A Pearson coefficient can be hand-built as a measure, but it's an advanced pattern — and either way, correlation is never causation.",
   ral:{code:"// DAX ships no CORR(). The everyday read:\n//   Scatter visual: X = SUM(Spend), Y = SUM(Revenue), details = Week\n//   Analytics pane ▸ Trend Line  (direction + how tight the fit is)\n//\n// For a number, Pearson r is a hand-built measure\n//   (covariance ÷ the product of the two standard deviations) —\n//   an advanced pattern; always read it beside the scatter.", say:"Build a scatter of spend against revenue by week and add a trend line to see the relationship, and for a coefficient know the Pearson pattern exists — but never report it without eyeballing the scatter, and never call correlation causation.",
     lines:[["Scatter + Analytics-pane Trend Line","direction and tightness at a glance — the everyday correlation read in Power BI"],["no native CORR()","Pearson r is a hand-built measure (covariance ÷ SD·SD) — an impressive interview point"],["read the number beside the scatter","one outlier can fake a coefficient — the plot guards against it"],["correlation ≠ causation","a lurking third variable can drive both — the first thing to suspect"]]},
   notes:"That DAX has no CORR() is a genuinely useful thing to know — like NPV, it's a measure you construct rather than call, and saying so signals you actually work in the tool. For everyday analysis the scatter-plus-trend-line is enough to rank candidate drivers. The caveat is the most important one in analytics: name the three traps — confounding (a third variable drives both), reverse causation, and coincidence. A strong trend earns a controlled test, never a causal claim, and the scatter beside the number guards against a single outlier manufacturing a relationship that isn't there.",
   viz:{html:"<div style=\"overflow-x:auto\"><table style=\"border-collapse:collapse;font-family:var(--mono);font-size:13px;width:100%\"><thead><tr><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">Marketing spend ($K)</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">Revenue ($K)</th></tr></thead><tbody><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">10</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">54</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">14</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">60</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">18</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">69</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">22</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">73</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">25</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">85</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">30</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">93</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">34</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">104</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">39</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">116</td></tr></tbody></table></div>", caption:"The trend line rises tightly (r ≈ 0.98). But spend and revenue may both climb in busy weeks — the scatter earns a controlled test, not a 'spend more, earn more' claim."},
   quiz:{q:"DAX has no CORR(). For a quick read of how two measures relate, the everyday move is to:", opts:["Use a scatter visual with a trend line","Trust a single KPI card's number","Sort one of the columns descending","Add the two measures together"], ans:0, exp:"With no native correlation function, the practical read is a scatter chart (spend on one axis, revenue on the other) plus a trend line from the Analytics pane — it shows direction and tightness at a glance. A hand-built Pearson measure exists but should always be read beside that scatter."},
   parsons:{prompt:"Arrange the correlation read, from building the visual to the discipline at the end.",lines:["Build a scatter: X = SUM(Spend), Y = SUM(Revenue), details = Week","Analytics pane ▸ add a Trend Line","Read direction and tightness — eyeball for outliers","Suspect confounders before making any causal claim"],answer:[0,1,2,3]},
   compare:"Visual first, line second, read third, discipline last. The outlier eyeball matters because one extreme week can manufacture a relationship that isn't there — and the final step is the one that separates analysts from headline writers.",
   build:{q:"The trend line shows spend and revenue rising together tightly (r ≈ 0.98). What does that earn?",opts:["The claim: 'spending more causes more revenue'","A controlled test — both may be driven by a third variable, like seasonality","An immediate budget increase","Nothing — correlation is meaningless"],ans:1,exp:"A strong correlation earns an experiment, never a causal claim. Busy season can drive both spend and revenue up together (confounding), or revenue targets might drive spend (reverse causation). The trend is real evidence — of a relationship worth testing, not a lever proven."},
   close:"You can read a relationship honestly — scatter, trend line, and the three traps named. Next: the final discipline, reconciling before you publish.",
   unlock:"'DAX has no CORR()' is the kind of specific tool knowledge that lands in interviews — it shows you've actually reached for it. So does naming the traps unprompted: confounding, reverse causation, coincidence. One sentence each, and you sound like someone who's been burned properly."
  },
{id:806, unit:"Unit 7: Advanced Analyst Toolkit", title:"Sanity-Check & Reconcile", sub:"Tie your measure to a trusted control before you publish the report.",
   story:"The last step before a report goes live is the one juniors skip: does the number make sense, and does it tie to something already trusted? Build a reconciliation: put your model's measure next to a control figure from a separate trusted table, subtract, and flag the gap. Zero means you tie out. Anything else means stop and find it, because a stakeholder will the moment the dashboard is shared.",
   ral:{code:"Computed  = [Revenue]                    // your model total\nControl   = SUM(ControlTotals[Amount])   // the trusted figure\nVariance  = [Computed] - [Control]\nTie Check = IF(ABS([Variance]) < 1, \"✓ ties\", \"✕ check\")", say:"Put your model's measure next to a trusted control total from a separate table, subtract for the variance, and flag anything that doesn't tie to zero before the report is published.",
     lines:[["Computed = [Revenue]","the number your model produces"],["Control = SUM(ControlTotals[…])","an independently trusted figure loaded as its own table"],["Variance = Computed − Control","zero is the goal; a non-zero variance is a flag, not a rounding excuse"],["IF(ABS(Variance) < 1, …)","a self-flagging status — the report card reconciles itself"]]},
   notes:"A measure that matches a known control earns trust; one that doesn't is a bug you haven't found yet. Loading the control figures as their own table lets the reconciliation live on the report and refresh with the data — it can't be forgotten. When the variance is non-zero, the usual suspects are this unit's whole syllabus: a relationship that fanned out (grain), a filter or slicer that dropped rows, or duplicates. A variance that's a clean multiple of the truth screams grain. The ABS(...) < 1 tolerance avoids a false flag from sub-dollar rounding.",
   viz:{html:"<div style=\"overflow-x:auto\"><table style=\"border-collapse:collapse;font-family:var(--mono);font-size:13px;width:100%\"><thead><tr><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">metric</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">computed</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">control</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">variance</th><th style=\"text-align:left;padding:6px 12px;border-bottom:2px solid var(--accent);color:var(--accent);white-space:nowrap\">status</th></tr></thead><tbody><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Model revenue</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">4,021,880</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">4,021,880</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">0</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">✓ ties</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Order count</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">96,420</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">48,210</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">+48,210</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">✕ exactly 2× — grain</td></tr><tr><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">Customers</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">31,544</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">31,544</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">0</td><td style=\"padding:5px 12px;border-bottom:1px solid var(--border);white-space:nowrap\">✓ ties</td></tr></tbody></table></div>", caption:"Revenue and customers tie out; the order count is exactly double the control — the clean multiple that signals a fanned-out relationship (counting order lines as orders). The reconciliation caught it before the report shipped."},
   quiz:{q:"[Variance] = [Computed] - [Control] returns a clean 2× of the control. What's the first thing to check?", opts:["A relationship that fanned out the grain","Whether the report's theme colors changed","Whether a slicer somewhere is hidden from view","The font size on the card"], ans:0, exp:"A clean 2× variance is the classic fingerprint of a grain problem — typically a one-to-many relationship onto a finer-grained table (like order lines) that fans each order into two rows. It has nothing to do with formatting; check the grain and cardinality of every relationship the measure crosses."},
   parsons:{prompt:"Arrange the reconciliation: your number, the trusted number, the gap, the flag.",lines:["Computed = [Revenue]","Control = SUM(ControlTotals[Amount])","Variance = [Computed] - [Control]","Tie Check = IF(ABS([Variance]) < 1, \"✓ ties\", \"✕ check\")"],answer:[0,1,2,3]},
   compare:"Your model's number and the independent control both exist before the variance can subtract them, and the tie check reads the variance last. The ABS(...) < 1 tolerance is deliberate — sub-dollar rounding shouldn't cry wolf.",
   build:{q:"Why load the control totals as their own table in the model, rather than checking against a spreadsheet on the side?",opts:["Power BI can't open spreadsheets","The reconciliation lives on the report and re-runs with every refresh — it can't be forgotten","Control totals are too large for Excel","Separate tables render faster"],ans:1,exp:"A side-spreadsheet check happens once and goes stale. A control table in the model makes the tie check a living measure — every refresh re-proves the number, and a break shows up on the report the day it happens, not the day a stakeholder notices."},
   close:"You ship numbers that tie to a trusted control — the habit that makes stakeholders trust the next dashboard too. That's the Advanced Analyst Toolkit, and the whole Power BI kit, complete.",
   unlock:"'Does it tie?' is the last question before publishing and the first question after a stakeholder challenge. Analysts who build the reconciliation INTO the report answer in one glance; analysts who don't spend the afternoon re-deriving a number under pressure."
  }
],

DAX_REFERENCE: [
  {name:"SUM", tag:"Aggregation",
   desc:"Add up all values in a column.",
   syntax:"SUM(TableName[ColumnName])",
   example:"Total Revenue = SUM(Sales[Revenue])",
   note:"Only works on numeric columns. Respects filter context."},
  {name:"SUMX", tag:"Iterator",
   desc:"Evaluate an expression for each row, then sum the results.",
   syntax:"SUMX(Table, Expression)",
   example:"Revenue After Discount =\nSUMX(Sales, Sales[Quantity] * Sales[Price] * (1 - Sales[Discount]))",
   note:"Use SUMX when the value you need doesn't exist as a column — you compute it row by row first."},
  {name:"COUNT / COUNTA", tag:"Aggregation",
   desc:"COUNT counts numeric values; COUNTA counts non-blank values of any type.",
   syntax:"COUNT(Table[Column])\nCOUNTA(Table[Column])",
   example:"Revenue Entries = COUNT(Sales[Revenue])",
   note:"For counting rows (including text/date rows), COUNTROWS is usually better."},
  {name:"COUNTROWS", tag:"Aggregation",
   desc:"Count the number of rows in a table.",
   syntax:"COUNTROWS(TableName)",
   example:"Order Count = COUNTROWS(Sales)",
   note:"Counts ALL rows, including those with blank values. Use DISTINCTCOUNT for unique values."},
  {name:"DISTINCTCOUNT", tag:"Aggregation",
   desc:"Count the number of distinct (unique) values in a column.",
   syntax:"DISTINCTCOUNT(Table[Column])",
   example:"Unique Customers = DISTINCTCOUNT(Sales[CustomerID])",
   note:"Blank values count as one distinct value."},
  {name:"AVERAGE / AVERAGEX", tag:"Aggregation",
   desc:"Average of a column (AVERAGE) or row-by-row expression (AVERAGEX).",
   syntax:"AVERAGE(Table[Column])\nAVERAGEX(Table, Expression)",
   example:"Avg Order = AVERAGE(Sales[Revenue])",
   note:"Ignores blank values. AVERAGEX iterates like SUMX — useful for weighted averages."},
  {name:"DIVIDE", tag:"Math",
   desc:"Safe division that returns blank (or an alternate value) on divide-by-zero.",
   syntax:"DIVIDE(Numerator, Denominator [, AlternateResult])",
   example:"Margin % = DIVIDE(\n    SUM(Sales[Revenue]) - SUM(Sales[Cost]),\n    SUM(Sales[Revenue])\n)",
   note:"Always prefer DIVIDE over / in DAX. AlternateResult defaults to blank."},
  {name:"CALCULATE", tag:"Filter Context",
   desc:"Evaluate an expression in a modified filter context.",
   syntax:"CALCULATE(Expression [, Filter1 [, Filter2 ...]])",
   example:"West Revenue = CALCULATE(\n    SUM(Sales[Revenue]),\n    Sales[Region] = \"West\"\n)",
   note:"The most important DAX function. Every advanced measure uses it. Filter arguments replace (not add to) filters on the same column."},
  {name:"ALL", tag:"Filter Context",
   desc:"Remove all filters from a table or column — used inside CALCULATE.",
   syntax:"ALL(Table)\nALL(Table[Column])\nALL()  -- removes all filters from all tables",
   example:"Total All Regions = CALCULATE(\n    SUM(Sales[Revenue]),\n    ALL(Sales[Region])\n)",
   note:"Use for % of total calculations. ALL(Table) only removes filters from that table. ALL() removes everything."},
  {name:"ALLEXCEPT", tag:"Filter Context",
   desc:"Remove all filters from a table except the specified columns.",
   syntax:"ALLEXCEPT(Table, Table[Column1] [, Table[Column2]])",
   example:"Region Share = DIVIDE(\n    SUM(Sales[Revenue]),\n    CALCULATE(SUM(Sales[Revenue]), ALLEXCEPT(Sales, Sales[Region]))\n)",
   note:"Useful when you want to keep some filters active while removing others."},
  {name:"FILTER", tag:"Filter Context",
   desc:"Return a subset of a table where a condition is true.",
   syntax:"FILTER(Table, Condition)",
   example:"Big Orders = CALCULATE(\n    COUNTROWS(Sales),\n    FILTER(Sales, Sales[Revenue] > 1000)\n)",
   note:"FILTER returns a table, not a scalar — use it as a filter argument inside CALCULATE. Prefer simpler column filters when possible (they're faster)."},
  {name:"IF", tag:"Logical",
   desc:"Return one value if a condition is true, another if false.",
   syntax:"IF(Condition, TrueResult [, FalseResult])",
   example:"Status = IF(SUM(Sales[Revenue]) >= [Target], \"On Track\", \"Behind\")",
   note:"FalseResult defaults to blank if omitted. For multiple conditions, consider SWITCH."},
  {name:"SWITCH", tag:"Logical",
   desc:"Evaluate an expression against a list of values and return the matching result.",
   syntax:"SWITCH(Expression, Value1, Result1 [, Value2, Result2 ...] [, Else])",
   example:"Quarter Label = SWITCH(\n    MONTH(Dates[Date]),\n    1, \"Q1\", 2, \"Q1\", 3, \"Q1\",\n    4, \"Q2\", 5, \"Q2\", 6, \"Q2\",\n    \"H2\"\n)",
   note:"Use SWITCH(TRUE(), condition1, result1, ...) for range-based conditions — effectively a DAX if/else-if chain."},
  {name:"RELATED", tag:"Relationship",
   desc:"In a calculated column, look up a value from a related table (many-to-one direction).",
   syntax:"RELATED(RelatedTable[Column])",
   example:"-- In Sales table:\nProduct Category = RELATED(Products[Category])",
   note:"Only works in calculated columns (row context). For measures, use CALCULATE with a filter or a LOOKUPVALUE."},
  {name:"LOOKUPVALUE", tag:"Relationship",
   desc:"Look up a value from a table based on one or more search conditions — no relationship needed.",
   syntax:"LOOKUPVALUE(ResultColumn, SearchColumn1, SearchValue1 [,...])",
   example:"Product Name =\nLOOKUPVALUE(Products[Name], Products[ProductID], Sales[ProductID])",
   note:"Useful when tables aren't related in the model. If multiple rows match, it returns an error — ensure your lookup column is unique."},
  {name:"TOTALYTD", tag:"Time Intelligence",
   desc:"Accumulate a measure from January 1 to the current date in context.",
   syntax:"TOTALYTD(Expression, DateColumn [, Filter] [, YearEndDate])",
   example:"YTD Revenue = TOTALYTD(SUM(Sales[Revenue]), Dates[Date])",
   note:"Requires a dedicated, gap-free Date table marked as a Date Table. Default year-end is Dec 31."},
  {name:"SAMEPERIODLASTYEAR", tag:"Time Intelligence",
   desc:"Shift the date filter context back exactly one year.",
   syntax:"SAMEPERIODLASTYEAR(DateColumn)",
   example:"LY Revenue = CALCULATE(\n    SUM(Sales[Revenue]),\n    SAMEPERIODLASTYEAR(Dates[Date])\n)",
   note:"Returns a table of dates one year prior. Must be used inside CALCULATE. Requires a Date table."},
  {name:"DATEADD", tag:"Time Intelligence",
   desc:"Shift the date context by a specified number of intervals.",
   syntax:"DATEADD(DateColumn, NumberOfIntervals, Interval)",
   example:"Prior Month = CALCULATE(\n    SUM(Sales[Revenue]),\n    DATEADD(Dates[Date], -1, MONTH)\n)",
   note:"Intervals: DAY, MONTH, QUARTER, YEAR. More flexible than SAMEPERIODLASTYEAR."},
  {name:"RANKX", tag:"Ranking",
   desc:"Rank items in a table based on a measure.",
   syntax:"RANKX(Table, Expression [, Value] [, Order] [, Ties])",
   example:"Revenue Rank =\nRANKX(ALL(Products[Name]), [Total Revenue])",
   note:"ALL(Products[Name]) removes the filter so all products are ranked together. Dense ranking (no gaps) uses Ties=DENSE."},
  {name:"SELECTEDVALUE", tag:"Context",
   desc:"Return the single selected value of a column, or an alternate if multiple values are selected.",
   syntax:"SELECTEDVALUE(Column [, AlternateResult])",
   example:"Selected Region =\nSELECTEDVALUE(Sales[Region], \"All Regions\")",
   note:"Useful for dynamic titles and conditional measures based on slicer selection."}
]

}; // end DATA

  }
  const done = state.doneLessons.includes(l.id);
  _syncRecalls(l.id, l);
  if(l.parsons){ v2PbiBody(l, done); return; }

  const ralLines = l.ral.lines.map(([chunk, desc]) =>
    `<div class="ral-line"><span class="ral-chunk">${chunk}</span><span class="ral-arrow">→</span><span class="ral-desc">${desc}</span></div>`

function rateConf(lessonId, level, btn){
  state.confidence = state.confidence || {};
  state.confidence[lessonId] = level;
  saveState();
  const wrap = btn.closest('.conf-chips');
  if(wrap) wrap.querySelectorAll('.conf-chip').forEach(c => c.classList.toggle('is-on', c===btn));
  if(window.lucide) lucide.createIcons();
  // Re-sync the spaced-recall queue to the (possibly changed) confidence.
  const _rl = DATA.LESSONS.find(x=>x.id===lessonId);
  if(_rl) _queueRecalls(lessonId, _rl);
}

// "See it on screen" — a KPI card and/or a simple bar visual (pure HTML).
function lessonPbiHTML(v){
  let inner='';

  if(v.measure) inner+=`<div style="display:inline-block;min-width:150px;background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin-bottom:${v.bars?'14px':'0'}"><div style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--dim)">${v.measure.name}</div><div style="font-size:1.8rem;font-weight:700;color:var(--accent);margin-top:2px">${v.measure.value}</div></div>`;
