<title>Tableau Certification Prep · Analyst Prep Kit</title>

<style>
/* GRAIN design system — same token re-pointing as the Final Exam Kit. */
:root{--bg:var(--stone-900);--surf:var(--stone-800);--surf2:var(--stone-700);--surf3:var(--stone-600);--accent:var(--clay-400);--accdim:var(--clay-700);--text:var(--stone-50);--dim:var(--stone-300);--dim2:var(--stone-400);--border:var(--stone-700);--border2:var(--stone-600);--good:var(--leaf-400);--warn:var(--amber-300);--bad:var(--rust-400);--font:var(--font-sans);--mono:var(--font-mono);--r-sm:6px;--r-md:8px;--r-lg:12px}
[data-theme="light"]{--bg:var(--color-bg);--surf:var(--color-surface);--surf2:var(--stone-100);--surf3:var(--stone-200);--accent:var(--clay-500);--accdim:var(--clay-100);--text:var(--stone-900);--dim:var(--stone-600);--dim2:var(--stone-500);--border:var(--stone-200);--border2:var(--stone-300);--good:var(--leaf-500);--warn:var(--amber-600);--bad:var(--rust-500)}

/* Per-domain colors — distinct, cream-readable hues from the Grain palette */
:root{--c-d1:#2A6E72;--c-d2:#97640C;--c-d3:#557A30;--c-d4:#BE3B22}

h1,h2,h3,h4,.nav-title,.cta-title,.study-title,.exam-title-block,.exam-mini-title{font-family:var(--font-display);letter-spacing:var(--tracking-tight)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;line-height:1.6;font-size:15px}
a{color:var(--accent);text-decoration:none}
button{cursor:pointer;font-family:var(--font);color:inherit}

nav{display:flex;align-items:center;gap:10px;padding:12px 20px;background:var(--surf);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;flex-wrap:wrap}
.nav-btn{background:var(--surf2);border:1px solid var(--border);color:var(--dim);padding:6px 12px;border-radius:var(--r-md);font-size:13px;transition:.15s}
.nav-btn:hover{border-color:var(--accent);color:var(--text)}
.nav-btn.active{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent);border-color:var(--accent)}
.nav-btn .lucide{width:14px;height:14px;vertical-align:-2px;margin-right:3px}
#themeIcon .lucide{width:15px;height:15px;vertical-align:-3px}
.nav-title{font-size:15px;font-weight:700;color:var(--text);display:inline-flex;align-items:center;gap:9px}
.logo-mark{color:var(--accent);background:var(--surf2);width:30px;height:30px;display:inline-grid;place-items:center;border-radius:9px;flex-shrink:0}
.logo-mark .lucide{width:17px;height:17px}
.cta-icon .lucide{width:28px;height:28px;color:var(--accent)}
.sv-cap .lucide{width:13px;height:13px;vertical-align:-2px;margin-right:4px}
.nav-spacer{flex:1}

main{max-width:780px;margin:0 auto;padding:32px 20px 80px}

/* HOME */
.hero{text-align:center;margin-bottom:36px}
.hero-eyebrow{font-size:11px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase;margin-bottom:14px}
.hero h1{font-size:clamp(1.8rem,4.5vw,2.4rem);font-weight:700;line-height:1.2;margin-bottom:14px;letter-spacing:-.01em}
.hero h1 span{color:var(--accent)}
.hero p{color:var(--dim);font-size:15px;line-height:1.75;max-width:560px;margin:0 auto}

.cta-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px}
@media(max-width:560px){.cta-row{grid-template-columns:1fr}}
.cta-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-lg);padding:22px;cursor:pointer;text-align:left;transition:.15s;text-decoration:none;color:inherit;display:block}
.cta-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.cta-card.primary{border-color:var(--accent);background:linear-gradient(135deg,var(--surf),color-mix(in srgb,var(--accent) 6%,transparent))}
.cta-icon{font-size:28px;margin-bottom:10px}
.cta-title{font-size:17px;font-weight:700;margin-bottom:6px}
.cta-desc{font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:12px}
.cta-link{font-size:13px;color:var(--accent);font-weight:600}

.method-callout{background:var(--surf);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--r-md);padding:14px 18px;font-size:13.5px;line-height:1.65;color:var(--dim);margin-bottom:28px}
.method-callout strong{color:var(--accent)}

/* Exam-facts card */
.facts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:28px}
.fact-chip{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-md);padding:12px;text-align:center}
.fact-chip .chip-num{font-size:18px;font-weight:700;color:var(--accent);display:block;margin-bottom:2px}
.fact-chip .chip-label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em}

.domain-weights{display:flex;flex-direction:column;gap:8px;margin-bottom:28px}
.dw-row{display:flex;align-items:center;gap:12px;background:var(--surf);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 14px}
.dw-label{flex:1;font-size:13.5px;font-weight:600}
.dw-bar{flex:2;height:8px;background:var(--surf2);border-radius:4px;overflow:hidden}
.dw-fill{height:100%;border-radius:4px}
.dw-pct{font-size:13px;font-weight:700;font-family:var(--mono);min-width:38px;text-align:right}

/* STUDY GUIDE */
.study-intro{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 22px;margin-bottom:22px}
.study-intro p{font-size:14.5px;line-height:1.7;color:var(--text);margin-bottom:8px}
.study-intro p:last-child{margin-bottom:0;color:var(--dim);font-size:13px}

.study-section{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:14px;overflow:hidden}
.study-head{display:flex;align-items:center;gap:12px;padding:14px 20px;cursor:pointer;user-select:none}
.study-head:hover{background:var(--surf2)}
.study-pill{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:3px 9px;border-radius:20px;border:1px solid currentColor;white-space:nowrap}
.study-title{flex:1;font-size:16px;font-weight:600}
.study-toggle{color:var(--dim);font-size:13px;transition:transform .15s}
.study-section.open .study-toggle{transform:rotate(90deg)}
.study-body{display:none;padding:0 22px 18px 22px;border-top:1px solid var(--border)}
.study-section.open .study-body{display:block}
.study-body ul{list-style:none;padding:0;margin:14px 0 0 0}
.study-body li{padding:8px 0 8px 22px;font-size:14px;line-height:1.6;color:var(--text);position:relative;border-bottom:1px dashed var(--border)}
.study-body li:last-child{border-bottom:none}
.study-body li::before{content:'▸';position:absolute;left:0;color:var(--accent);font-size:13px;top:9px}
.study-body code{background:var(--surf2);padding:1px 6px;border-radius:4px;font-family:var(--mono);font-size:13px;color:var(--accent)}
.study-link{display:inline-block;margin-top:12px;font-size:13px;color:var(--accent)}
.study-link:hover{text-decoration:underline}
.study-viz{background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin:14px 0 2px}
.study-viz .sv-cap{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);font-weight:700;margin-bottom:9px}
.study-viz em{color:var(--text);font-style:italic}
.miscon{margin-top:14px;padding:12px 14px;background:var(--surf2);border-left:3px solid var(--warn);border-radius:var(--r-md);font-size:13.5px;line-height:1.65}
.miscon strong{color:var(--warn)}

.expand-all{font-size:13px;background:none;border:1px solid var(--border);color:var(--dim);padding:6px 14px;border-radius:var(--r-md);margin-bottom:16px}
.expand-all:hover{border-color:var(--accent);color:var(--text)}

/* EXAM */
.exam-header{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 22px;margin-bottom:22px;position:sticky;top:65px;z-index:50}
.exam-header-row{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:10px;flex-wrap:wrap}
.exam-title-block{flex:1}
.exam-mini-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:2px}
.exam-q-progress{font-size:18px;font-weight:700}
.exam-q-progress span{color:var(--accent)}
.exam-timer{font-family:var(--mono);font-size:16px;font-weight:700;padding:6px 12px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--surf2)}
.exam-timer.low{color:var(--bad);border-color:var(--bad)}
.exam-submit-btn{background:var(--accent);color:#fff;border:none;padding:10px 18px;border-radius:var(--r-md);font-size:14px;font-weight:600;white-space:nowrap}
.exam-submit-btn:hover{opacity:.9}
.exam-submit-btn:disabled{opacity:.45;cursor:not-allowed}
.exam-progress-bar{height:4px;background:var(--surf2);border-radius:2px;overflow:hidden}
.exam-progress-fill{height:100%;background:linear-gradient(90deg,var(--accdim),var(--accent));width:0;transition:width .3s}

.start-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-lg);padding:26px;text-align:center;margin-bottom:20px}
.start-card h2{font-size:20px;margin-bottom:10px}
.start-card p{color:var(--dim);font-size:14px;line-height:1.7;max-width:520px;margin:0 auto 18px}
.start-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

.section-header{display:flex;align-items:center;gap:10px;margin:28px 0 14px 0;padding-bottom:10px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.section-header:first-child{margin-top:0}
.section-header .section-pill{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:3px 10px;border-radius:20px;border:1px solid currentColor}
.section-header .section-name{font-size:15px;font-weight:600;color:var(--text)}
.section-header .section-count{font-size:12px;color:var(--dim);margin-left:auto}

.q-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 22px;margin-bottom:14px;transition:border-color .2s}
.q-card.answered{border-color:var(--accent)}
.q-card.correct{border-color:var(--good);background:linear-gradient(180deg,var(--surf),color-mix(in srgb,var(--accent) 4%,transparent))}
.q-card.incorrect{border-color:var(--bad);background:linear-gradient(180deg,var(--surf),color-mix(in srgb,var(--bad) 4%,transparent))}
.q-num{font-size:11px;font-weight:700;color:var(--dim);letter-spacing:.06em;margin-bottom:6px}
.q-num .ms-tag{color:var(--accent);margin-left:8px}
.q-text{font-size:15px;line-height:1.6;margin-bottom:14px;color:var(--text)}
.q-text code{background:var(--surf2);padding:2px 7px;border-radius:4px;font-family:var(--mono);font-size:13.5px;color:var(--accent);border:1px solid var(--border)}
.q-text pre{background:var(--surf2);padding:10px 14px;border-radius:var(--r-md);font-family:var(--mono);font-size:13px;margin:10px 0;overflow-x:auto;border:1px solid var(--border);color:var(--text)}

.choices{display:flex;flex-direction:column;gap:8px}
.choice{background:var(--surf2);border:1px solid var(--border);border-radius:var(--r-md);padding:11px 14px;font-size:14px;text-align:left;color:var(--text);transition:.15s;line-height:1.5;display:flex;gap:10px;align-items:flex-start;width:100%}
.choice:hover{border-color:var(--accent)}
.choice.selected{background:color-mix(in srgb,var(--accent) 12%,transparent);border-color:var(--accent);color:var(--text)}
.choice.correct-answer{background:color-mix(in srgb,var(--accent) 15%,transparent);border-color:var(--good);color:var(--text)}
.choice.wrong-answer{background:color-mix(in srgb,var(--bad) 10%,transparent);border-color:var(--bad);color:var(--text)}
.choice-letter{font-weight:700;color:var(--dim);min-width:18px;font-family:var(--mono);font-size:13px;flex-shrink:0;margin-top:1px}
.choice.selected .choice-letter,.choice.correct-answer .choice-letter{color:var(--accent)}
.choice.wrong-answer .choice-letter{color:var(--bad)}
.choice-text{flex:1}

.explanation{display:none;margin-top:12px;padding:12px 14px;background:var(--surf2);border-left:3px solid var(--accent);border-radius:var(--r-md);font-size:13.5px;line-height:1.65;color:var(--text)}
.explanation.show{display:block}
.explanation strong{color:var(--accent)}

/* RESULTS */
.results-hero{text-align:center;margin-bottom:28px}
.results-eyebrow{font-size:11px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase;margin-bottom:10px}
.score-big{font-size:64px;font-weight:800;line-height:1;color:var(--accent);margin-bottom:6px}
.score-big small{font-size:24px;font-weight:600;color:var(--dim)}
.score-verdict{font-size:18px;font-weight:600;margin-bottom:4px}
.score-sub{color:var(--dim);font-size:14px;line-height:1.6;max-width:520px;margin:0 auto}
.scaled-box{display:inline-block;margin-top:14px;padding:10px 18px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--surf);font-size:14px}
.scaled-box strong{font-family:var(--mono);font-size:18px}

.results-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.results-row{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 18px}
.results-row-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.results-pill{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:3px 10px;border-radius:20px;border:1px solid currentColor}
.results-section-name{font-weight:600;font-size:14px;color:var(--text)}
.results-score{font-size:14px;font-weight:600;font-family:var(--mono);color:var(--text)}
.results-bar{height:6px;background:var(--surf2);border-radius:3px;overflow:hidden}
.results-bar-fill{height:100%;border-radius:3px;transition:width .8s ease-out}
.results-hint{font-size:12.5px;color:var(--dim);margin-top:8px;line-height:1.55}
.results-hint a{color:var(--accent)}

.results-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:24px}
.btn{padding:11px 22px;border-radius:var(--r-md);font-size:14px;font-weight:600;border:none;transition:.15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}

/* FOOTER */
footer{margin-top:50px;padding-top:24px;border-top:1px solid var(--border);text-align:center;color:var(--dim);font-size:12px}
.footer-links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
.footer-links a{color:var(--dim)}
.footer-links a:hover{color:var(--accent)}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent);color:#fff;padding:12px 22px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.3);opacity:0;transition:.3s;z-index:300}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>

<script>
/* ============== STATE ============== */
const STORE = 'apk-tabcert';
const EXAM_MINUTES = 60;
const state = JSON.parse(localStorage.getItem(STORE) || '{}');
state.answers = state.answers || {};          // {qid: number | number[] (ms)}
state.submitted = state.submitted || false;
state.openSections = state.openSections || {};
state.examStart = state.examStart || null;    // epoch ms when a timed run began
state.timed = state.timed !== undefined ? state.timed : null; // null = not chosen yet
state.view = location.hash ? (state.view || 'home') : 'home';
function save(){ localStorage.setItem(STORE, JSON.stringify(state)); }

/* ============== DOMAINS (official Desktop Specialist blueprint) ============== */
const DOMAIN_INFO = {
  d1:{label:'Domain 1', name:'Connecting to & Preparing Data', weight:25, color:'var(--c-d1)',
      hint:`Lessons 14–16 of the Tableau Kit (Unit 4) cover live vs. extract, the data model, and data properties.`,
      kitPath:'../tableau/'},
  d2:{label:'Domain 2', name:'Exploring & Analyzing Data', weight:35, color:'var(--c-d2)',
      hint:`The heart of the Tableau Kit: chart lessons (3–4, 30–32), Grouping (9), and Unit 5 (Sets, Hierarchies, Parameters, Dual-Axis).`,
      kitPath:'../tableau/'},
  d3:{label:'Domain 3', name:'Sharing Insights', weight:25, color:'var(--c-d3)',
      hint:`Dashboards (10), Tooltips & Annotations (11), and Telling a Story (13) in the Tableau Kit cover the core; the study guide here covers formatting, actions, and export.`,
      kitPath:'../tableau/'},
  d4:{label:'Domain 4', name:'Understanding Tableau Concepts', weight:15, color:'var(--c-d4)',
      hint:`Dimensions vs. Measures (2) and Aggregation (8) in the Tableau Kit, plus the discrete vs. continuous section of the study guide.`,
      kitPath:'../tableau/'}
};
const DOMAIN_ORDER = ['d1','d2','d3','d4'];

/* ============== STUDY GUIDE ============== */
const STUDY = [
  {key:'d1', title:'Connecting to & Preparing Data — 25% of the exam',
    must:[
      `<strong>Live vs. Extract</strong>: live queries the source on every interaction (always current, speed depends on the source); an extract is a snapshot saved as a <code>.hyper</code> file (fast, portable, works offline, but only as fresh as its last refresh).`,
      `<strong>Say it out loud</strong>: "Live is a phone call to the database. An extract is a photocopy I carry with me."`,
      `<strong>When to extract</strong>: slow source, need offline access, want to lighten load on a production database, or publishing where the source isn't reachable.`,
      `<strong>File types</strong>: <code>.twb</code> = workbook only (no data) · <code>.twbx</code> = packaged workbook WITH data · <code>.tds</code> = data source connection info only · <code>.tdsx</code> = packaged data source · <code>.hyper</code> = the extract data itself.`,
      `<strong>Joins</strong> merge tables into one flat table at the row level, BEFORE analysis. Join types: inner (matches only), left (all left + matches), right, full outer (everything).`,
      `<strong>Unions</strong> stack tables with the same columns on top of each other — more ROWS, not more columns. Jan sales + Feb sales + Mar sales = union.`,
      `<strong>Relationships</strong> (the default since 2020.2) are flexible "noodles" between logical tables: Tableau decides the join at query time per viz, at the right level of detail — avoiding duplicate-row inflation that a bad join causes.`,
      `<strong>When to use which</strong>: same columns stacked → union · need one flat table with row-level control → join · tables at different granularities (orders vs. targets) → relationship.`,
      `<strong>Data properties</strong>: rename fields, assign <em>aliases</em> to member values (display names — dimensions only), change data type (the icon: <code>#</code> number, <code>Abc</code> string, 📅 date, 🌐 geographic), assign a <em>geographic role</em> so maps work, and set <em>default properties</em> (default aggregation, number format, color).`
    ],
    miscon:`<strong>Misconception to bust:</strong> "An extract auto-updates." It doesn't — an extract is frozen at the moment you made it (or last refreshed it). If the exam asks which connection shows data added to the source five minutes ago, the answer is <em>live</em>.`,
    viz:`<div style="display:flex;gap:10px;flex-wrap:wrap">
      <div style="border:1px solid var(--border);border-radius:6px;padding:8px 12px;background:var(--surf)">📞 <b>Live</b> <span style="color:var(--dim);font-size:13px">always current · source speed</span></div>
      <div style="border:1px solid var(--border);border-radius:6px;padding:8px 12px;background:var(--surf)">📄 <b>Extract</b> <span style="color:var(--dim);font-size:13px">snapshot (.hyper) · fast · offline</span></div>
    </div>`},
  {key:'d2', title:'Exploring & Analyzing Data — 35% of the exam',
    must:[
      `<strong>Chart choice rules</strong>: trend over time → line · compare categories → bar · relationship between two measures → scatter · geographic → map (density map for concentration of many points) · part-of-whole by category → stacked bar · exact values in a grid → crosstab (text table); add color to a crosstab → highlight table.`,
      `<strong>Dual axis</strong> = two measures, two independent axes, overlaid (revenue as bars + units as a line). Right-click the second axis → <em>Synchronize Axis</em> to align scales. <strong>Combined (blended) axis</strong> = multiple measures sharing ONE axis and one scale (drag the second measure onto the existing axis).`,
      `<strong>Groups</strong> combine members of a dimension into a bigger bucket (e.g. 50 states → 4 regions). Static membership; shown with a paperclip icon.`,
      `<strong>Sets</strong> are TRUE custom fields that split data into IN / OUT. <em>Dynamic sets</em> use a condition ("top 10 by sales") and update as data changes; <em>fixed sets</em> are a frozen list of members.`,
      `<strong>Group vs. Set, out loud</strong>: "A group renames and combines. A set asks a yes/no question of every row."`,
      `<strong>Hierarchies</strong> let users drill down along a built path (Category ▸ Sub-Category ▸ Product) with the +/− control on the pill. Build by dragging one dimension onto another in the Data pane.`,
      `<strong>Filter order of operations</strong>: Extract → Data source → Context → Dimension → Measure. A <em>context filter</em> is computed first, so "top N" filters compute within it.`,
      `<strong>Date filters</strong>: relative date ("last 3 months" — moves with today), range of dates (fixed start/end), or discrete date parts (just 2024, just Q2).`,
      `<strong>Quick table calculations</strong> transform what's already in the viz — running total, % of total, difference, percent difference, rank, moving average — from the pill's menu, no formula needed.`,
      `<strong>Bins & histograms</strong>: bins chop a continuous measure into equal-width buckets (a new dimension); a histogram is the bar chart of counts per bin. Show Me builds both at once.`,
      `<strong>Calculated fields</strong> create new fields with formulas: <code>[Revenue] - [Cost]</code>, <code>IF [Units] > 100 THEN "High" END</code>.`,
      `<strong>Parameters</strong> are single-value controls the USER can change (a number, a date, a chosen field). A parameter does nothing alone — it must be referenced in a calculation, filter, set, or reference line.`,
      `<strong>Totals</strong>: Analysis ▸ Totals → grand totals (rows/columns) and subtotals. <strong>Reference lines</strong> mark a constant, average, or parameter value on an axis.`
    ],
    miscon:`<strong>Misconception to bust:</strong> "A parameter filters my view by itself." It never does. A parameter is just a value the user picks — until a calculated field, filter, set, or reference line USES that value, nothing on the canvas changes. Exam answers that say "the parameter automatically filters" are wrong.`,
    viz:`<div style="display:flex;gap:8px;flex-wrap:wrap">
      <span style="padding:3px 9px;border-radius:4px;background:var(--surf);border:1px solid var(--border);font-size:12px">📎 <b>Group</b> combine members</span>
      <span style="padding:3px 9px;border-radius:4px;background:var(--surf);border:1px solid var(--border);font-size:12px">⭕ <b>Set</b> IN / OUT by rule</span>
      <span style="padding:3px 9px;border-radius:4px;background:var(--surf);border:1px solid var(--border);font-size:12px">🪜 <b>Hierarchy</b> drill down</span>
      <span style="padding:3px 9px;border-radius:4px;background:var(--surf);border:1px solid var(--border);font-size:12px">🎛️ <b>Parameter</b> user-set value</span>
    </div>`},
  {key:'d3', title:'Sharing Insights — 25% of the exam',
    must:[
      `<strong>Formatting lives on the Marks card</strong>: drop a field on Color, Size, Label, Detail, Tooltip, Shape. Change fonts via Format ▸ Font (worksheet, rows, columns levels).`,
      `<strong>Shapes</strong>: change the mark type to Shape, then assign shapes per member on the Shape card (including custom shape palettes).`,
      `<strong>Viz animations</strong> (Format ▸ Animations) smoothly transition marks when data changes or filters apply — on/off per workbook or sheet, with duration control.`,
      `<strong>Legends</strong>: show or hide from the worksheet menu or the legend's own ✕; a legend appears automatically when you drop a field on Color/Size/Shape.`,
      `<strong>Dashboards</strong> combine multiple sheets plus objects (text, images, web pages, blanks). Tiled = snap-to-grid; Floating = layered.`,
      `<strong>Dashboard actions</strong> make it interactive: <em>Filter</em> (click a mark → filter other sheets), <em>Highlight</em> (click → spotlight related marks), <em>URL</em> (click → open a link), <em>Parameter</em> (click → set a parameter value). "Use as Filter" on a sheet is the one-click filter action.`,
      `<strong>Device-specific layouts</strong>: one dashboard, custom arrangements per device (Default/Desktop, Tablet, Phone). Add via the Device Preview / device panel — same sheets, different layout per device.`,
      `<strong>Stories</strong> are a sequence of <em>story points</em> (each a captioned snapshot of a sheet or dashboard) for a guided narrative. Story ≠ dashboard: dashboards show at once; stories walk through in order.`,
      `<strong>Sharing & export</strong>: package as <code>.twbx</code> for someone without your data source · export image or PDF · export the crosstab to Excel or the <em>underlying data</em> as CSV · publish to Tableau Server/Cloud/Public · and yes, <strong>export to PowerPoint</strong> (File ▸ Export As PowerPoint) — each sheet/dashboard becomes a slide image.`
    ],
    miscon:`<strong>Misconception to bust:</strong> "A story is just a dashboard with tabs." A story is its own sheet type: an ordered sequence of story points, each with a caption, built for walking an audience through a narrative one step at a time. If the question says "guided, step-by-step presentation of an analysis," the answer is a story — not a dashboard.`,
    viz:`<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
      <span style="padding:4px 9px;border-radius:6px;background:var(--surf);border:1px solid var(--border);font-size:12px"><b style="color:var(--accent)">Filter</b> narrows other sheets</span>
      <span style="color:var(--dim)">·</span>
      <span style="padding:4px 9px;border-radius:6px;background:var(--surf);border:1px solid var(--border);font-size:12px"><b style="color:var(--accent)">Highlight</b> spotlights marks</span>
      <span style="color:var(--dim)">·</span>
      <span style="padding:4px 9px;border-radius:6px;background:var(--surf);border:1px solid var(--border);font-size:12px"><b style="color:var(--accent)">URL</b> opens a link</span>
      <span style="color:var(--dim)">·</span>
      <span style="padding:4px 9px;border-radius:6px;background:var(--surf);border:1px solid var(--border);font-size:12px"><b style="color:var(--accent)">Parameter</b> sets a value</span>
    </div>`},
  {key:'d4', title:'Understanding Tableau Concepts — 15% of the exam',
    must:[
      `<strong>Dimensions vs. Measures</strong>: dimensions are qualitative — they slice ("by region, by product, by month"). Measures are quantitative — they aggregate ("how much revenue, how many units"). You can convert either way.`,
      `<strong>Discrete (blue) vs. Continuous (green)</strong>: discrete = separate labeled buckets → creates <em>headers</em>. Continuous = an unbroken range → creates an <em>axis</em>. This is a separate idea from dimension/measure — a measure can be discrete, a dimension (like an exact date) can be continuous.`,
      `<strong>Say it out loud</strong>: "Blue makes headers, green makes axes."`,
      `<strong>Date parts vs. date values</strong>: date PART = discrete bucket that ignores the year boundary (all Januaries together — compare seasonality). Date VALUE (truncated date) = continuous timeline (Jan 2024 ≠ Jan 2025 — see trend). Right-click-drag a date to choose; the first section of the menu is parts, the second is values.`,
      `<strong>Default aggregation</strong>: a measure dropped into a viz aggregates immediately — SUM by default for most numbers (change the default under the field's Default Properties). Others: AVG, MIN, MAX, COUNT, COUNTD, MEDIAN.`,
      `<strong>Adding dimensions changes the aggregation level</strong>: one SUM(Revenue) with nothing else = one grand-total bar. Add Region → one sum per region. Add Product too → one sum per region-product combination. The measure doesn't change; the <em>level of detail</em> it's computed at does.`,
      `<strong>ATTR()</strong> shows a dimension's value if it's the same for every row in the partition, or <code>*</code> if it varies — that's what a <code>*</code> in a tooltip means.`
    ],
    miscon:`<strong>Misconception to bust:</strong> "Blue = dimension, green = measure." Close but wrong — blue/green is discrete/continuous, and both dimensions and measures can be either. The exam loves this one: an exact date (a dimension) on a continuous axis is green; a binned or discrete measure is blue.`,
    viz:`<div style="display:flex;gap:8px;flex-wrap:wrap">
      <span style="padding:3px 9px;border-radius:4px;background:rgba(91,140,245,.15);color:#5b8cf5;border:1px solid rgba(91,140,245,.5);font-family:var(--mono);font-size:12px">▦ Discrete (blue) → headers</span>
      <span style="padding:3px 9px;border-radius:4px;background:rgba(109,191,139,.15);color:#6dbf8b;border:1px solid rgba(109,191,139,.5);font-family:var(--mono);font-size:12px"># Continuous (green) → axis</span>
    </div><div style="color:var(--dim);font-size:12px;margin-top:7px">Separate idea from dimension vs. measure — either can be either color</div>`}
];

const QUESTIONS = [
  /* ---------- DOMAIN 1 · Connecting to & Preparing Data (11) ---------- */
  {id:'q1', domain:'d1', type:'mc', q:`A row was added to the source database five minutes ago. Which connection type shows it in your viz right now, without any manual step?`,
    choices:[`An extract connection`, `A live connection`, `Either — both stay current automatically`, `Neither — you must always rebuild the data source`],
    correct:1,
    explain:`Live queries the source on every interaction, so new rows appear immediately. An extract is a snapshot — it only updates when refreshed.`},
  {id:'q2', domain:'d1', type:'ms', q:`Which are good reasons to use an extract instead of a live connection? <em>Choose all that apply.</em>`,
    choices:[`You need to work offline on a plane`, `The source database is slow and you want faster interaction`, `You need every viz to reflect source changes in real time`, `You want to reduce query load on a busy production database`],
    correct:[0,1,3],
    explain:`Extracts shine for speed, portability/offline work, and taking load off the source. The one thing they can't do is stay real-time current — that's live's job.`},
  {id:'q3', domain:'d1', type:'mc', q:`What file format does Tableau use to store extract data?`,
    choices:[`<code>.twb</code>`, `<code>.tds</code>`, `<code>.hyper</code>`, `<code>.csv</code>`],
    correct:2,
    explain:`Extracts are stored as <code>.hyper</code> files (Tableau's in-memory data engine format). <code>.twb</code> is a workbook, <code>.tds</code> is data source connection metadata.`},
  {id:'q4', domain:'d1', type:'mc', q:`A <code>.tds</code> file contains:`,

    correct:1,
    explain:`A <code>.tds</code> (Tableau Data Source) saves how to connect plus your field customizations (renames, defaults) — not the data itself. <code>.tdsx</code> packages it WITH data.`},
  {id:'q5', domain:'d1', type:'mc', q:`You have a January sales table and a February sales table with identical columns, and you want one table with all the rows. Use a:`,
    choices:[`Inner join`, `Left join`, `Union`, `Relationship`],
    correct:2,
    explain:`Same columns, stacked rows → union. Joins add columns by matching keys; unions add rows.`},
  {id:'q6', domain:'d1', type:'mc', q:`An inner join between Orders and Returns keeps:`,
    choices:[`All rows from both tables`, `Only rows that have a match in both tables`, `All Orders rows, with nulls where there is no Return`, `Only rows that do NOT match`],
    correct:1,
    explain:`Inner = intersection. If you wanted every order regardless of whether it was returned, that's a left join from Orders.`},
  {id:'q7', domain:'d1', type:'mc', q:`The key advantage of a relationship over a join when combining an Orders table (row per order line) with a Targets table (row per region per quarter):`,
    choices:[
      `Relationships are the only way to combine two tables.`,
      `A relationship queries each table at its own level of detail, avoiding the duplicated rows a join would create between different granularities.`,
      `Relationships permanently merge the tables into one, which is faster.`,
      `Joins can't combine tables from the same data source.`],
    correct:1,
    explain:`Joining tables of different granularity duplicates rows and inflates SUMs. Relationships (the "noodle") stay flexible — Tableau builds the right join per viz at query time.`},
  {id:'q8', domain:'d1', type:'mc', q:`In the data model canvas, a relationship between two logical tables is shown as:`,
    choices:[`A Venn diagram icon`, `A flexible line ("noodle") connecting the tables`, `A merged single table`, `A red warning triangle`],

    explain:`Relationships display as a line between logical tables. Venn diagram icons are the classic join editor, inside a logical table's physical layer.`},
  {id:'q9', domain:'d1', type:'mc', q:`Your "region_cd" field shows values like "N", "S", "E", "W" and you want them displayed as "North", "South", "East", "West" without changing the underlying data. Use:`,

  {id:'q10', domain:'d1', type:'mc', q:`Tableau imported your "State" field as a plain string, and double-clicking it won't build a map. The fix:`,

  {id:'q37', domain:'d3', type:'mc', q:`You need to walk executives through your analysis step by step — context first, then the anomaly, then the recommendation — each step captioned. Build a:`,
    choices:[`Dashboard with many floating sheets`, `Story, with one story point per step`, `Crosstab`, `Hierarchy`],
    correct:1,
    explain:`Stories are ordered, captioned story points (each a sheet or dashboard snapshot) — Tableau's guided-narrative format.`},
  {id:'q38', domain:'d3', type:'ms', q:`A colleague has Tableau Desktop but no access to your database. Which let them open your work with the data included? <em>Choose all that apply.</em>`,
    choices:[
      `Send a <code>.twbx</code> packaged workbook (with an extract).`,
      `Send a <code>.twb</code> file alone.`,
      `Publish to Tableau Server/Cloud with the extract and share the link.`,
      `Send a <code>.tds</code> file alone.`],
    correct:[0,2],
    explain:`<code>.twbx</code> packages the workbook WITH its data; publishing with an extract also carries the data. <code>.twb</code> and <code>.tds</code> contain no data — they'd still need the database.`},

  /* ---------- DOMAIN 4 · Understanding Tableau Concepts (7) ---------- */
  {id:'q39', domain:'d4', type:'mc', q:`In Tableau, dimensions and measures differ in that:`,
    choices:[
      `Dimensions are qualitative fields that slice the data; measures are quantitative fields that get aggregated.`,
      `Dimensions are always text; measures are always currency.`,
      `Dimensions go only on Rows; measures only on Columns.`,
      `Measures can't be used in calculated fields.`],
    correct:0,
    explain:`Dimensions answer "by what?" (region, product, month); measures answer "how much?" (revenue, units). Either can go on any shelf, and fields can be converted between the two.`},
  {id:'q40', domain:'d4', type:'mc', q:`A blue pill versus a green pill in Tableau indicates:`,
    choices:[
      `Dimension (blue) vs. measure (green) — always.`,
      `Discrete (blue) vs. continuous (green).`,
      `Filtered (blue) vs. unfiltered (green).`,
      `Text (blue) vs. numeric (green) data types.`],
    correct:1,
    explain:`The trap answer is A. Blue/green = discrete/continuous. Most dimensions happen to be discrete and most measures continuous, but both can be either — an exact date (dimension) can be green.`},
  {id:'q41', domain:'d4', type:'mc', q:`A DISCRETE field on Columns produces ______, while a CONTINUOUS field produces ______.`,
    choices:[`an axis · headers`, `headers · an axis`, `a filter · a parameter`, `colors · sizes`],
    correct:1,
    explain:`"Blue makes headers, green makes axes." Discrete = labeled buckets; continuous = an unbroken numeric/date axis.`},
  {id:'q42', domain:'d4', type:'mc', q:`You want all Januaries from every year combined into one bucket to study seasonality. Use the date as a:`,
    choices:[
      `Date VALUE (continuous, e.g. MONTH truncated) — Jan 2024 and Jan 2025 stay separate.`,
      `Date PART (discrete MONTH) — all Januaries collapse into one "January" bucket.`,
      `Relative date filter.`,
      `String.`],
    correct:1,
    explain:`Date parts ignore the year boundary (seasonality: compare all Januaries); date values keep the timeline continuous (trend). Right-click-drag a date field to pick explicitly.`},
  {id:'q43', domain:'d4', type:'mc', q:`When you drag the measure [Revenue] into a view, Tableau by default:`,
    choices:[
      `Shows every raw row value.`,
      `Aggregates it — typically as SUM(Revenue).`,
      `Converts it to a dimension.`,
      `Asks you to pick an aggregation first.`],
    correct:1,
    explain:`Measures aggregate on entry — SUM by default (changeable per-pill or via the field's Default Properties → Aggregation).`},
  {id:'q44', domain:'d4', type:'mc', q:`A view shows one bar: SUM(Revenue) = 4.2M. You add Region (4 members) to Rows, then Product (10 members) too. What happens to the aggregation?`,
    choices:[
      `Still one number — dimensions don't affect measures.`,
      `The SUM recomputes at each level of detail: 4 bars (one per region), then up to 40 (one per region-product combination).`,
      `The measure switches to AVG automatically.`,
      `Tableau throws an error.`],
    correct:1,
    explain:`Each dimension you add sets a finer level of detail, and the aggregate recomputes per combination. The total across all bars still reconciles to 4.2M.`},
  {id:'q45', domain:'d4', type:'mc', q:`A tooltip shows <code>*</code> for the Customer Name. This means:`,
    choices:[
      `The field contains an error.`,
      `The mark covers multiple customer values, so ATTR() can't show a single one.`,
      `The customer's name is literally "*".`,
      `The field is filtered out.`],
    correct:1,
    explain:`<code>*</code> = "more than one value here." ATTR() returns the value when it's unique in the partition, and <code>*</code> when it varies.`}
];

/* ============== RENDER ============== */
function render(){
  const app = document.getElementById('app');
  document.querySelectorAll('nav .nav-btn').forEach(b=>b.classList.remove('active'));
  const navId = 'nav' + state.view.charAt(0).toUpperCase() + state.view.slice(1);
  document.getElementById(navId)?.classList.add('active');
  document.getElementById('navResults').style.display = state.submitted ? '' : 'none';

  if(state.view === 'home') app.innerHTML = renderHome();
  else if(state.view === 'study') app.innerHTML = renderStudy();
  else if(state.view === 'exam') app.innerHTML = renderExam();
  else if(state.view === 'results') app.innerHTML = renderResults();
  attachFooter(app);
  if(typeof grainRefreshIcons === 'function') grainRefreshIcons();
  syncTimerLoop();
}

function setView(v, opts){
  if(v === 'results' && !state.submitted){ toast('Finish and submit the exam to see results.'); return; }
  state.view = v;
  save();
  render();
  if(opts && opts.scrollToSection){
    const el = document.getElementById('study-' + opts.scrollToSection);
    if(el){ el.scrollIntoView({behavior:'smooth', block:'start'}); return; }
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

/* Deep-link routing — #study, #study-d1..d4, #exam, #home, #results */
function handleHash(){
  const h = location.hash.replace(/^#/, '');
  if(!h) return;
  if(h === 'study'){ setView('study'); return; }
  if(h.startsWith('study-')){
    const key = h.slice('study-'.length);
    if(DOMAIN_INFO[key]){
      state.openSections[key] = true;
      save();
      setView('study', {scrollToSection: key});
    }
    return;
  }
  if(h === 'exam') setView('exam');
  else if(h === 'home') setView('home');
  else if(h === 'results' && state.submitted) setView('results');
}
window.addEventListener('hashchange', handleHash);

/* ============== EXAM + TIMER ============== */
function timeLeftMs(){
  if(!state.timed || !state.examStart) return null;
  return Math.max(0, state.examStart + EXAM_MINUTES*60000 - Date.now());
}
function fmtTime(ms){
  const s = Math.ceil(ms/1000);
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}
let timerInterval = null;
function syncTimerLoop(){
  clearInterval(timerInterval);
  if(state.view !== 'exam' || state.submitted || !state.timed || !state.examStart) return;
  timerInterval = setInterval(()=>{
    const left = timeLeftMs();
    const el = document.getElementById('examTimer');
    if(el){
      el.textContent = fmtTime(left);
      el.classList.toggle('low', left < 5*60000);
    }
    if(left <= 0){
      clearInterval(timerInterval);
      toast("Time's up — exam submitted.");
      submitExam(true);
    }
  }, 500);
}

function startExam(timed){
  state.timed = timed;
  state.examStart = Date.now();
  save();
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderExam(){
  // Not started yet → mode chooser
  if(state.examStart === null && !state.submitted){
    return `
      <div class="start-card">
        <h2>Practice Exam · 45 questions</h2>
        <p>Weighted to the official blueprint: ${DOMAIN_ORDER.map(k=>`${DOMAIN_INFO[k].weight}% ${DOMAIN_INFO[k].name}`).join(' · ')}. Includes multiple-response questions ("choose all that apply") — the real exam has them too, and there's no partial credit. Your answers grade all at once when you submit, like the real thing.</p>
        <div class="start-actions">
          <button class="btn btn-primary" onclick="startExam(true)">Start timed — 60:00 ⏱</button>
          <button class="btn btn-ghost" onclick="startExam(false)">Start untimed practice</button>
        </div>
      </div>
      <div class="method-callout">
        <strong>Exam-day pacing:</strong> 60 minutes ÷ 45 questions = 80 seconds each. Answer everything — there's no penalty for guessing. Flag the long scenario questions mentally and come back.
      </div>
    `;
  }

  const answered = Object.keys(state.answers).length;
  const total = QUESTIONS.length;
  const pct = Math.round(100*answered/total);
  const left = timeLeftMs();

  let topBtn;
  if(state.submitted) topBtn = `<button class="exam-submit-btn" onclick="setView('results')">View results →</button>`;
  else topBtn = `<button class="exam-submit-btn" onclick="submitExam()" ${answered===0?'disabled':''}>${answered===total?'Submit exam':'Submit ('+answered+'/'+total+' answered)'}</button>`;

  let html = `
    <div class="exam-header">
      <div class="exam-header-row">
        <div class="exam-title-block">
          <div class="exam-mini-title">Desktop Specialist practice exam${state.timed===false?' · untimed':''}</div>
          <div class="exam-q-progress"><span>${answered}</span> of ${total} answered</div>
        </div>
        ${(!state.submitted && state.timed && left!==null) ? `<span class="exam-timer${left<5*60000?' low':''}" id="examTimer">${fmtTime(left)}</span>` : ''}
        ${topBtn}
      </div>
      <div class="exam-progress-bar"><div class="exam-progress-fill" style="width:${pct}%"></div></div>
      ${state.submitted?'':'<div style="font-size:13px;color:var(--dim);margin-top:8px">Answers grade all at once on submit — no feedback until then, just like the real exam. Multiple-response questions need every correct option and no wrong ones.</div>'}
    </div>
  `;

  for(const dkey of DOMAIN_ORDER){
    const d = DOMAIN_INFO[dkey];
    const qs = QUESTIONS.filter(q => q.domain === dkey);
    html += `
      <div class="section-header" id="sec-${dkey}">
        <span class="section-pill" style="color:${d.color}">${d.label} · ${d.weight}%</span>
        <span class="section-name">${d.name}</span>
        <span class="section-count">${qs.length} questions</span>
      </div>
      ${qs.map(q => renderQuestion(q)).join('')}
    `;
  }

  if(!state.submitted){
    html += `<div style="text-align:center;margin-top:24px"><button class="exam-submit-btn" onclick="submitExam()" ${answered===0?'disabled':''}>${answered===total?'Submit exam & see results':'Submit ('+answered+' of '+total+' answered)'}</button></div>`;
  }
  return html;
}

function renderQuestion(q){
  const idx = QUESTIONS.findIndex(x=>x.id===q.id) + 1;
  const ans = state.answers[q.id];
  const isMs = q.type === 'ms';
  const hasAns = isMs ? (Array.isArray(ans) && ans.length>0) : (ans !== undefined);
  let stateCls = '';
  if(state.submitted) stateCls = isCorrect(q) ? ' correct' : ' incorrect';
  else if(hasAns) stateCls = ' answered';

  const body = `<div class="choices">${q.choices.map((c,i)=>{
    const picked = isMs ? (Array.isArray(ans) && ans.includes(i)) : ans === i;
    const isRight = isMs ? q.correct.includes(i) : q.correct === i;
    let cls = 'choice';
    if(state.submitted){
      if(isRight) cls += ' correct-answer';
      else if(picked) cls += ' wrong-answer';
    } else if(picked){
      cls += ' selected';
    }
    const letter = String.fromCharCode(65+i);
    const mark = isMs ? (picked ? '☑' : '☐') : letter;
    return `<button class="${cls}" onclick="${isMs?`answerMs('${q.id}',${i})`:`answerMc('${q.id}',${i})`}" ${state.submitted?'disabled':''}>
      <span class="choice-letter">${mark}</span>
      <span class="choice-text">${c}</span>
    </button>`;
  }).join('')}</div>`;

  const explanation = state.submitted
    ? `<div class="explanation show"><strong>${isCorrect(q) ? 'Correct.' : 'Heads up: '}</strong> ${q.explain}</div>`
    : '';

  return `
    <div class="q-card${stateCls}" id="q-${q.id}">
      <div class="q-num">Question ${idx} of ${QUESTIONS.length}${isMs?'<span class="ms-tag">· multiple response</span>':''}</div>
      <div class="q-text">${q.q}</div>
      ${body}
      ${explanation}
    </div>
  `;
}

function answerMc(qid, idx){
  if(state.submitted) return;
  state.answers[qid] = idx;
  save();
  render();
}
function answerMs(qid, idx){
  if(state.submitted) return;
  let cur = Array.isArray(state.answers[qid]) ? state.answers[qid].slice() : [];
  if(cur.includes(idx)) cur = cur.filter(i=>i!==idx);
  else cur.push(idx);
  if(cur.length) state.answers[qid] = cur;
  else delete state.answers[qid];
  save();
  render();
}

function isCorrect(q){
  const ans = state.answers[q.id];
  if(q.type === 'ms'){
    if(!Array.isArray(ans)) return false;
    const a = ans.slice().sort().join(',');
    const c = q.correct.slice().sort().join(',');
    return a === c;
  }
  return ans === q.correct;
}

function submitExam(auto){
  if(state.submitted) return;
  const answered = Object.keys(state.answers).length;
  if(!auto && answered < QUESTIONS.length){
    if(!confirm(`You've answered ${answered} of ${QUESTIONS.length}. Unanswered questions count as wrong (like the real exam). Submit anyway?`)) return;
  }
  state.submitted = true;
  save();
  setView('results');
}

function calcScore(){
  const byDomain = {};
  let total = 0;
  for(const d of DOMAIN_ORDER){
    const qs = QUESTIONS.filter(q=>q.domain===d);
    const correct = qs.filter(isCorrect).length;
    byDomain[d] = {correct, total: qs.length};
    total += correct;
  }
  return {total, byDomain, outOf: QUESTIONS.length};
}

/* Estimated scaled score: the real exam reports 100–1000 with 750 to pass.
   Simple linear mapping of percent-correct onto that band — an approximation,
   labeled as such in the UI. */
function scaledEstimate(correct, outOf){
  return Math.round(100 + 900 * (correct / outOf));
}

function verdictFor(scaled){
  if(scaled >= 850) return {label:'Comfortably above the passing line — book the exam.', tone:'good'};
  if(scaled >= 750) return {label:'At or above the 750 passing line — close the weak domain, then book it.', tone:'good'};
  if(scaled >= 650) return {label:'Close. One focused week on the weakest domains gets you over.', tone:'warn'};
  if(scaled >= 500) return {label:'Real gaps. Work the study guide and the Tableau Kit lessons first.', tone:'warn'};
  return {label:'Cold start. Do the Tableau Kit lessons end to end, then retake this.', tone:'bad'};
}

function renderResults(){
  const score = calcScore();
  const scaled = scaledEstimate(score.total, score.outOf);
  const pct = Math.round(100 * score.total / score.outOf);
  const v = verdictFor(scaled);
  const pass = scaled >= 750;
  return `
    <div class="results-hero">
      <div class="results-eyebrow">Practice exam · Results</div>
      <div class="score-big">${score.total}<small>/${score.outOf}</small></div>
      <div class="score-verdict">${pct}% — ${v.label}</div>
      <div class="scaled-box">Estimated scaled score: <strong style="color:${pass?'var(--good)':'var(--bad)'}">${scaled}</strong> <span style="color:var(--dim)">/ 1000 · passing = 750</span></div>
      <p class="score-sub" style="margin-top:14px">The real exam converts raw answers to a 100–1000 scaled score with its own weighting; this estimate maps your percent correct onto that band. Treat 800+ here as "ready," 750–799 as "nearly."</p>
    </div>

    <div class="results-grid">
      ${DOMAIN_ORDER.map(k=>{
        const d = DOMAIN_INFO[k];
        const s = score.byDomain[k];
        const p = Math.round(100*s.correct/s.total);
        const hint = p === 100 ? 'Clean sweep. Move on.'
          : p >= 75 ? `Mostly there — reread the <a href="#study-${k}" onclick="setView('study',{scrollToSection:'${k}'});return false;">${d.label} study section</a> once.`
          : p >= 50 ? `Shaky at ${d.weight}% of the exam — that's real points. <a href="#study-${k}" onclick="setView('study',{scrollToSection:'${k}'});return false;">Study section</a> + <a href="${d.kitPath}">Tableau Kit lessons</a>.`
          : `Focus here first — ${d.weight}% of the exam. ${d.hint} <a href="${d.kitPath}">Open the Tableau Kit</a>.`;
        return `
          <div class="results-row">
            <div class="results-row-top">
              <span class="results-pill" style="color:${d.color}">${d.label} · ${d.weight}%</span>
              <span class="results-section-name">${d.name}</span>
              <span class="results-score">${s.correct}/${s.total}</span>
            </div>
            <div class="results-bar"><div class="results-bar-fill" style="width:${p}%;background:${d.color}"></div></div>
            <div class="results-hint">${hint}</div>
          </div>
        `;
      }).join('')}
    </div>

    <div class="results-actions">
      <button class="btn btn-ghost" onclick="setView('exam')">Review answers &amp; explanations</button>
      <button class="btn btn-ghost" onclick="setView('study')">Open study guide</button>
      <button class="btn btn-primary" onclick="retake()">Retake exam <i data-lucide="rotate-ccw" style="width:14px;height:14px;vertical-align:-2px"></i></button>
    </div>
  `;
}

function retake(){
  if(!confirm('Clear your answers and retake the practice exam?')) return;
  state.answers = {};
  state.submitted = false;
  state.examStart = null;
  state.timed = null;
  state.view = 'exam';
  save();
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('apk-theme', next);
  document.getElementById('themeIcon').innerHTML = '<i data-lucide="' + (next === 'dark' ? 'sun' : 'moon') + '"></i>';
  if(window.grainRefreshIcons)grainRefreshIcons();else if(window.lucide)lucide.createIcons();
}
(function initTheme(){
  const saved = localStorage.getItem('apk-theme');
  if(saved) document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('themeIcon').innerHTML = '<i data-lucide="' + (document.documentElement.getAttribute('data-theme')==='dark'?'sun':'moon') + '"></i>';
})();

function resetAll(){
  if(!confirm('Clear all answers and reset the exam + study guide?')) return;
  localStorage.removeItem(STORE);
  location.reload();
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._t);
  window._t = setTimeout(()=>t.classList.remove('show'), 2200);
}

render();
handleHash();
</script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
// Same robust Lucide refresh as the other kits — strip data-lucide from output
// and pause the observer during refresh so it never loops.
function grainRefreshIcons(){
  if(!window.lucide) return;
  if(window._grainObs) window._grainObs.disconnect();
  lucide.createIcons();
  document.querySelectorAll('svg[data-lucide]').forEach(function(s){ s.removeAttribute('data-lucide'); });
  if(window._grainObs) window._grainObs.observe(document.body,{childList:true,subtree:true});
}
(function(){
  function init(){
    grainRefreshIcons();
    if(window.MutationObserver && !window._grainObs){
      window._grainObs=new MutationObserver(grainRefreshIcons);
      window._grainObs.observe(document.body,{childList:true,subtree:true});
    }
  }
  init();
  if(typeof window.lucide==='undefined'){
    var n=0, t=setInterval(function(){ if(window.lucide||++n>60){ clearInterval(t); init(); } },50);
  }
})();
</script>
