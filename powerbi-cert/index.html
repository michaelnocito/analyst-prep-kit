<style>
/* GRAIN design system — same token re-pointing as the Final Exam Kit. */
:root{--bg:var(--stone-900);--surf:var(--stone-800);--surf2:var(--stone-700);--surf3:var(--stone-600);--accent:var(--clay-400);--accdim:var(--clay-700);--text:var(--stone-50);--dim:var(--stone-300);--dim2:var(--stone-400);--border:var(--stone-700);--border2:var(--stone-600);--good:var(--leaf-400);--warn:var(--amber-300);--bad:var(--rust-400);--font:var(--font-sans);--mono:var(--font-mono);--r-sm:6px;--r-md:8px;--r-lg:12px}
[data-theme="light"]{--bg:var(--color-bg);--surf:var(--color-surface);--surf2:var(--stone-100);--surf3:var(--stone-200);--accent:var(--clay-500);--accdim:var(--clay-100);--text:var(--stone-900);--dim:var(--stone-600);--dim2:var(--stone-500);--border:var(--stone-200);--border2:var(--stone-300);--good:var(--leaf-500);--warn:var(--amber-600);--bad:var(--rust-500)}

/* Per-domain colors — distinct, cream-readable hues from the Grain palette */
:root{--c-d1:#2A6E72;--c-d2:#97640C;--c-d3:#557A30;--c-d4:#BE3B22}

h1,h2,h3,h4,.nav-title,.cta-title,.study-title,.exam-title-block,.exam-mini-title{font-family:var(--font-display);letter-spacing:var(--tracking-tight)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;line-height:1.6;font-size:15px}
a{color:var(--accent);text-decoration:none}
button{cursor:pointer;font-family:var(--font);color:inherit}

nav{display:flex;align-items:center;gap:10px;padding:12px 20px;background:var(--surf);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;flex-wrap:wrap}
.nav-btn{background:var(--surf2);border:1px solid var(--border);color:var(--dim);padding:6px 12px;border-radius:var(--r-md);font-size:13px;transition:.15s}
.nav-btn:hover{border-color:var(--accent);color:var(--text)}
.nav-btn.active{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent);border-color:var(--accent)}
.nav-btn .lucide{width:14px;height:14px;vertical-align:-2px;margin-right:3px}
#themeIcon .lucide{width:15px;height:15px;vertical-align:-3px}
.nav-title{font-size:15px;font-weight:700;color:var(--text);display:inline-flex;align-items:center;gap:9px}
.logo-mark{color:var(--accent);background:var(--surf2);width:30px;height:30px;display:inline-grid;place-items:center;border-radius:9px;flex-shrink:0}
.logo-mark .lucide{width:17px;height:17px}
.cta-icon .lucide{width:28px;height:28px;color:var(--accent)}
.sv-cap .lucide{width:13px;height:13px;vertical-align:-2px;margin-right:4px}
.nav-spacer{flex:1}

main{max-width:780px;margin:0 auto;padding:32px 20px 80px}

/* HOME */
.hero{text-align:center;margin-bottom:36px}
.hero-eyebrow{font-size:11px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase;margin-bottom:14px}
.hero h1{font-size:clamp(1.8rem,4.5vw,2.4rem);font-weight:700;line-height:1.2;margin-bottom:14px;letter-spacing:-.01em}
.hero h1 span{color:var(--accent)}
.hero p{color:var(--dim);font-size:15px;line-height:1.75;max-width:560px;margin:0 auto}

.cta-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px}
@media(max-width:560px){.cta-row{grid-template-columns:1fr}}
.cta-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-lg);padding:22px;cursor:pointer;text-align:left;transition:.15s;text-decoration:none;color:inherit;display:block}
.cta-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.cta-card.primary{border-color:var(--accent);background:linear-gradient(135deg,var(--surf),color-mix(in srgb,var(--accent) 6%,transparent))}
.cta-icon{font-size:28px;margin-bottom:10px}
.cta-title{font-size:17px;font-weight:700;margin-bottom:6px}
.cta-desc{font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:12px}
.cta-link{font-size:13px;color:var(--accent);font-weight:600}

.method-callout{background:var(--surf);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--r-md);padding:14px 18px;font-size:13.5px;line-height:1.65;color:var(--dim);margin-bottom:28px}

/* Exam-facts card */
.facts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:28px}
.fact-chip{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-md);padding:12px;text-align:center}
.fact-chip .chip-num{font-size:18px;font-weight:700;color:var(--accent);display:block;margin-bottom:2px}
.fact-chip .chip-label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em}

.domain-weights{display:flex;flex-direction:column;gap:8px;margin-bottom:28px}
.dw-row{display:flex;align-items:center;gap:12px;background:var(--surf);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 14px}
.dw-label{flex:1;font-size:13.5px;font-weight:600}
.dw-bar{flex:2;height:8px;background:var(--surf2);border-radius:4px;overflow:hidden}
.dw-fill{height:100%;border-radius:4px}

/* STUDY GUIDE */
.study-intro{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 22px;margin-bottom:22px}
.study-intro p{font-size:14.5px;line-height:1.7;color:var(--text);margin-bottom:8px}

.study-section{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:14px;overflow:hidden}
.study-head{display:flex;align-items:center;gap:12px;padding:14px 20px;cursor:pointer;user-select:none}
.study-head:hover{background:var(--surf2)}

.study-title{flex:1;font-size:16px;font-weight:600}
.study-toggle{color:var(--dim);font-size:13px;transition:transform .15s}
.study-section.open .study-toggle{transform:rotate(90deg)}
.study-body{display:none;padding:0 22px 18px 22px;border-top:1px solid var(--border)}
.study-section.open .study-body{display:block}

.study-body li{padding:8px 0 8px 22px;font-size:14px;line-height:1.6;color:var(--text);position:relative;border-bottom:1px dashed var(--border)}

.study-body code{background:var(--surf2);padding:1px 6px;border-radius:4px;font-family:var(--mono);font-size:13px;color:var(--accent)}
.study-link{display:inline-block;margin-top:12px;font-size:13px;color:var(--accent)}

.study-viz{background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin:14px 0 2px}
.study-viz .sv-cap{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);font-weight:700;margin-bottom:9px}

.miscon{margin-top:14px;padding:12px 14px;background:var(--surf2);border-left:3px solid var(--warn);border-radius:var(--r-md);font-size:13.5px;line-height:1.65}
.miscon strong{color:var(--warn)}

.expand-all{font-size:13px;background:none;border:1px solid var(--border);color:var(--dim);padding:6px 14px;border-radius:var(--r-md);margin-bottom:16px}

.exam-title-block{flex:1}

.start-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-lg);padding:26px;text-align:center;margin-bottom:20px}

.section-header{display:flex;align-items:center;gap:10px;margin:28px 0 14px 0;padding-bottom:10px;border-bottom:1px solid var(--border);flex-wrap:wrap}

.section-header .section-pill{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:3px 10px;border-radius:20px;border:1px solid currentColor}

.q-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 22px;margin-bottom:14px;transition:border-color .2s}
.q-card.answered{border-color:var(--accent)}

.q-card.incorrect{border-color:var(--bad);background:linear-gradient(180deg,var(--surf),color-mix(in srgb,var(--bad) 4%,transparent))}
.q-num{font-size:11px;font-weight:700;color:var(--dim);letter-spacing:.06em;margin-bottom:6px}
.q-num .ms-tag{color:var(--accent);margin-left:8px}
.q-text{font-size:15px;line-height:1.6;margin-bottom:14px;color:var(--text)}

.results-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.results-row{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 18px}
.results-row-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.results-pill{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:3px 10px;border-radius:20px;border:1px solid currentColor}

.results-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:24px}
.btn{padding:11px 22px;border-radius:var(--r-md);font-size:14px;font-weight:600;border:none;transition:.15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}

/* FOOTER */
footer{margin-top:50px;padding-top:24px;border-top:1px solid var(--border);text-align:center;color:var(--dim);font-size:12px}

<script>
/* ============== STATE ============== */
const STORE = 'apk-pbicert';
const EXAM_MINUTES = 100;
const state = JSON.parse(localStorage.getItem(STORE) || '{}');
state.answers = state.answers || {};
state.submitted = state.submitted || false;
state.openSections = state.openSections || {};
state.examStart = state.examStart || null;
state.timed = state.timed !== undefined ? state.timed : null;
state.view = location.hash ? (state.view || 'home') : 'home';
function save(){ localStorage.setItem(STORE, JSON.stringify(state)); }

/* ============== DOMAINS (official PL-300 skills outline, April 2026) ============== */
const DOMAIN_INFO = {
  d1:{label:'Domain 1', name:'Prepare the Data', weight:'25–30%', mid:27.5, color:'var(--c-d1)',
      hint:`Power BI Kit Units on Power Query — connecting, profiling, cleaning, and shaping data before it hits the model.`,
      kitPath:'../powerbi/'},
  d2:{label:'Domain 2', name:'Model the Data', weight:'25–30%', mid:27.5, color:'var(--c-d2)',
      hint:`Power BI Kit lessons on star schema, relationships, and DAX (measures, CALCULATE, time intelligence).`,
      kitPath:'../powerbi/'},
  d3:{label:'Domain 3', name:'Visualize & Analyze the Data', weight:'25–30%', mid:27.5, color:'var(--c-d3)',
      hint:`Power BI Kit dashboard-design lessons plus the Chart Literacy Kit for visual choice.`,
      kitPath:'../powerbi/'},
  d4:{label:'Domain 4', name:'Manage & Secure Power BI', weight:'15–20%', mid:17.5, color:'var(--c-d4)',
      hint:`Power BI Kit publishing lessons; the study guide here covers workspaces, refresh, gateways, and row-level security.`,
      kitPath:'../powerbi/'}
};
const DOMAIN_ORDER = ['d1','d2','d3','d4'];

/* ============== STUDY GUIDE ============== */
const STUDY = [
  {key:'d1', title:'Prepare the Data — Power Query territory',
    must:[
      `<strong>Power Query is the kitchen, the model is the dining room.</strong> Everything in this domain happens BEFORE data enters the model: connect, profile, clean, shape, load. The language behind it is M — but the exam tests the UI actions, not M syntax.`,
      `<strong>Import vs. DirectQuery vs. DirectLake</strong>: Import copies data into the model (fastest visuals, data as fresh as the last refresh) · DirectQuery leaves data at the source and queries live (always current, slower visuals, source must be reachable) · DirectLake reads Fabric OneLake delta tables directly (lakehouse speed without import).`,
      `<strong>Say it out loud</strong>: "Import is a photocopy, DirectQuery is a phone call." Same mental model as Tableau's extract vs. live.`,
      `<strong>Profiling tools</strong> (View ribbon in Power Query): Column quality (valid/error/empty %), Column distribution (distinct vs. unique counts), Column profile (stats + value distribution). By default they profile the first 1,000 rows — switch to the entire dataset from the status bar.`,
      `<strong>Cleaning moves</strong>: replace values/errors, remove rows, fill down (for those merged-cell gaps), change data type, trim/clean text. Fixing a data-type error means fixing it in Power Query, not in DAX afterward.`,
      `<strong>Shaping moves</strong>: pivot (rows → columns), unpivot (columns → rows — the fix for "months as column headers"), transpose (flip the whole grid), group by (aggregate rows), split column.`,
      `<strong>Merge vs. Append</strong>: merge = SQL join (adds COLUMNS by matching keys, you pick the join kind) · append = SQL union (stacks ROWS of same-shaped tables). Same rhyme as Tableau: join wide, union tall.`,
      `<strong>Reference vs. Duplicate</strong> a query: duplicate = independent full copy of all steps; reference = a new query that starts from the ORIGINAL's output (changes upstream flow into it).`,
      `<strong>Parameters</strong> in Power Query hold a reusable value (a server name, a file path, a threshold) you can swap without editing every query.`,
      `<strong>Build fact and dimension tables here</strong>: split the one giant flat export into a fact table (events/transactions) and dimension tables (customer, product, date) with proper keys — that's what Domain 2's star schema will need.`
    ],
    miscon:`<strong>Misconception to bust:</strong> "I'll just clean it with DAX later." Power Query (M) transforms data BEFORE it loads; DAX calculates AFTER it's in the model. Type fixes, nulls, unpivoting, merging — that's all Power Query work. If a question asks where to fix source-data problems, the answer is Power Query, not a DAX measure.`,
    viz:`<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
      <span style="padding:4px 9px;border-radius:6px;background:var(--surf);border:1px solid var(--border);font-size:12px">🔌 Connect</span><span style="color:var(--dim)">→</span>
      <span style="padding:4px 9px;border-radius:6px;background:var(--surf);border:1px solid var(--border);font-size:12px">🔍 Profile</span><span style="color:var(--dim)">→</span>
      <span style="padding:4px 9px;border-radius:6px;background:var(--surf);border:1px solid var(--border);font-size:12px">🧹 Clean</span><span style="color:var(--dim)">→</span>
      <span style="padding:4px 9px;border-radius:6px;background:var(--surf);border:1px solid var(--border);font-size:12px">🔄 Shape</span><span style="color:var(--dim)">→</span>
      <span style="padding:4px 9px;border-radius:6px;background:var(--surf);border:1px solid var(--border);font-size:12px;color:var(--accent)"><b>Load to model</b></span>
    </div><div style="color:var(--dim);font-size:12px;margin-top:7px">Power Query (M) does all of this — before DAX ever sees the data</div>`},
  {key:'d2', title:'Model the Data — star schema + DAX, the heaviest domain in practice',
    must:[
      `<strong>Star schema</strong>: one fact table (transactions/events, the numbers) surrounded by dimension tables (who/what/where/when). Flat single tables and deeply snowflaked chains both underperform it.`,
      `<strong>Relationships</strong>: typically one-to-many from dimension (one side) to fact (many side). Cross-filter direction: single (dimension filters fact — the default and the safe choice) vs. both (bidirectional — use sparingly, it creates ambiguity and performance cost).`,
      `<strong>A common date table</strong> is near-mandatory: a dedicated Date dimension, marked as a date table, related to every fact date — that's what makes time intelligence work reliably.`,
      `<strong>Role-playing dimensions</strong>: one physical Date table used in multiple roles (Order Date, Ship Date). Power BI allows one ACTIVE relationship; the others are inactive and activated per-measure with <code>USERELATIONSHIP()</code>.`,
      `<strong>Measures vs. calculated columns</strong>: measures compute at query time in filter context (cheap, flexible — your default); calculated columns compute row-by-row at refresh and are STORED in the model (cost memory; use only when you need the value on a row, e.g. to slice by it).`,
      `<strong>CALCULATE is the most important function in DAX</strong>: it evaluates an expression in a MODIFIED filter context — <code>CALCULATE(SUM(Sales[Amount]), Region[Name]="West")</code> means "total sales, but pretend only West is selected."`,
      `<strong>Say it out loud</strong>: "Every measure runs inside the filters coming from the visual. CALCULATE lets me overwrite those filters."`,
      `<strong>X-functions iterate</strong>: <code>SUMX(Sales, Sales[Qty] * Sales[Price])</code> evaluates row-by-row then sums. Plain <code>SUM</code> only takes a single existing column.`,
      `<strong>Time intelligence</strong>: <code>TOTALYTD</code>, <code>SAMEPERIODLASTYEAR</code>, <code>DATEADD</code>, <code>DATESINPERIOD</code> — all need that marked date table. Semi-additive measures (account balances) use <code>LASTDATE</code>-style logic: sum across accounts, but take the LAST value across time, not the sum.`,
      `<strong>Performance</strong>: remove unneeded columns and rows (columns cost the most in a columnar engine), prefer measures over calculated columns, reduce granularity if detail isn't needed, and find slow visuals/measures with Performance Analyzer + DAX query view.`
    ],
    miscon:`<strong>Misconception to bust:</strong> "Calculated column or measure — whatever, they both use DAX." The exam pushes on this constantly. A calculated column is computed at refresh, stored per row, and consumes memory; a measure is computed at query time in the visual's filter context and stores nothing. Default to a measure; reach for a calculated column only when you need the value ON the row (to slice, filter, or relate by it).`,
    viz:`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;font-size:11px;text-align:center;max-width:330px">
      <div></div><div style="border:1px solid var(--border);border-radius:6px;padding:6px;background:var(--surf)">📅 Date</div><div></div>
      <div style="border:1px solid var(--border);border-radius:6px;padding:6px;background:var(--surf)">👤 Customer</div>
      <div style="border:1px solid var(--accent);border-radius:6px;padding:6px;background:var(--surf);font-weight:700">★ Sales<br>(fact)</div>
      <div style="border:1px solid var(--border);border-radius:6px;padding:6px;background:var(--surf)">📦 Product</div>
      <div></div><div style="border:1px solid var(--border);border-radius:6px;padding:6px;background:var(--surf)">🌐 Region</div><div></div>
    </div><div style="color:var(--dim);font-size:12px;margin-top:7px">One-to-many, single direction, dimension → fact. Mark the Date table.</div>`},
  {key:'d3', title:'Visualize & Analyze the Data — reports that answer questions',
    must:[
      `<strong>Visual choice</strong>: trend → line · category comparison → bar/column · part-of-whole → stacked bar or treemap · two measures → scatter · KPI vs. target → card/gauge/KPI visual · geographic → map. (Same rules the <a href="../chart-literacy/">Chart Literacy Kit</a> teaches.)`,
      `<strong>Paginated reports</strong> are the exception to "interactive": pixel-perfect, print/PDF-oriented, multi-page operational output (invoices, statements). "Formatted for printing, many pages" → paginated.`,
      `<strong>Slicers vs. filters</strong>: a slicer is an ON-CANVAS visual users see and click; the Filters pane is at visual / page / report scope. Sync slicers extends one slicer across pages.`,
      `<strong>Conditional formatting</strong> colors visuals by rules or by a measure's value (background, font, data bars, icons).`,
      `<strong>Interactions</strong>: by default clicking a visual cross-highlights the others; Edit Interactions changes it to cross-filter or none, per visual pair.`,
      `<strong>Drillthrough</strong> = right-click a data point → jump to a detail page filtered to that point. Different from drill DOWN (hierarchy levels within one visual).`,
      `<strong>Bookmarks</strong> capture a report state (filters, visibility, sort) for navigation, reset buttons, and story-style toggles — pair with the Selection pane to show/hide groups of visuals.`,
      `<strong>Tooltips</strong>: report-page tooltips show a mini page on hover, not just a value list.`,
      `<strong>Analytics features</strong>: reference lines and error bars, forecasting on line charts, anomaly detection, the Analyze ▸ "explain the increase" feature, grouping/binning/clustering, AI visuals (Key influencers, Decomposition tree, Q&A), and Copilot for narrative summaries and report-page suggestions.`,
      `<strong>Mobile & accessibility</strong>: build a separate mobile layout per report page; set tab order and alt text, mind color contrast for accessibility.`
    ],
    miscon:`<strong>Misconception to bust:</strong> "Drillthrough and drill down are the same thing." Drill DOWN moves along a hierarchy inside one visual (Year → Quarter → Month). DrillTHROUGH right-click-jumps to a whole different page, filtered to the clicked data point. The exam phrases both; match the word to the motion.`,
    viz:`<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
      <span style="padding:4px 9px;border-radius:6px;background:var(--surf);border:1px solid var(--border);font-size:12px"><b style="color:var(--accent)">Drill down</b> hierarchy, same visual</span>
      <span style="color:var(--dim)">vs.</span>
      <span style="padding:4px 9px;border-radius:6px;background:var(--surf);border:1px solid var(--border);font-size:12px"><b style="color:var(--accent)">Drillthrough</b> new page, filtered to the click</span>
    </div>`},
  {key:'d4', title:'Manage & Secure Power BI — the Service side',
    must:[
      `<strong>The flow</strong>: build in Power BI Desktop → publish to a WORKSPACE in the Service → distribute via an APP (the packaged, read-friendly bundle for consumers).`,
      `<strong>Workspace roles</strong>, most → least power: Admin (everything incl. deleting the workspace and managing access) · Member (publish/edit + share) · Contributor (create/edit content, no app-audience management by default) · Viewer (read only).`,
      `<strong>Dashboards vs. reports</strong>: a dashboard is a Service-only single canvas of PINNED tiles from one or more reports; reports are multi-page and built in Desktop. Pin a visual → it becomes a dashboard tile.`,
      `<strong>Refresh</strong>: imported semantic models need a scheduled refresh in the Service. If the source is on-premises (a local SQL Server, files on a network share), you need an <strong>on-premises data gateway</strong>. Pure-cloud sources don't need one.`,
      `<strong>Row-level security (RLS)</strong>: define roles with DAX filter rules in DESKTOP (e.g. <code>[Region] = USERPRINCIPALNAME()</code>-mapped rules), then assign members to those roles in the SERVICE. Test with "View as."`,
      `<strong>RLS caveat</strong>: workspace Admins/Members/Contributors see ALL data regardless of RLS — RLS applies to viewers/app consumers.`,
      `<strong>Sensitivity labels</strong> (from Microsoft Purview) classify content (Confidential, etc.) and follow the data on export.`,
      `<strong>Endorsement</strong>: Promoted (self-serve "this is good") vs. Certified (blessed by an authorized reviewer — the stronger signal).`,
      `<strong>Alerts & subscriptions</strong>: data alerts fire on dashboard tiles (cards, gauges, KPIs) when a threshold crosses; subscriptions email report/dashboard snapshots on a schedule.`
    ],
    miscon:`<strong>Misconception to bust:</strong> "RLS locks down everyone." Workspace members with edit rights (Admin, Member, Contributor) bypass RLS entirely — they see all the data. RLS constrains report CONSUMERS (Viewer role / app audiences). If a question has an admin still seeing everything "despite RLS," that's not a bug, that's the design.`,
    viz:`<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
      <span style="padding:4px 9px;border-radius:6px;background:var(--surf);border:1px solid var(--border);font-size:12px">🖥️ Desktop <span style="color:var(--dim)">build</span></span><span style="color:var(--dim)">→</span>
      <span style="padding:4px 9px;border-radius:6px;background:var(--surf);border:1px solid var(--border);font-size:12px">📁 Workspace <span style="color:var(--dim)">publish</span></span><span style="color:var(--dim)">→</span>
      <span style="padding:4px 9px;border-radius:6px;background:var(--surf);border:1px solid var(--border);font-size:12px">📦 App <span style="color:var(--dim)">distribute</span></span>
    </div><div style="color:var(--dim);font-size:12px;margin-top:7px">On-prem source? Add a gateway. Viewers only? RLS applies.</div>`}

  /* ---------- DOMAIN 1 · Prepare the Data (14) ---------- */
  {id:'q1', domain:'d1', type:'mc', q:`Your report must always show data that is current to the second, straight from an Azure SQL database, and the dataset is far too large to copy. Choose:`,
    choices:[`Import mode`, `DirectQuery mode`, `A CSV export refreshed weekly`, `A calculated table`],
    correct:1,
    explain:`DirectQuery leaves the data at the source and queries it live — always current, no copy. Import would snapshot it and be only as fresh as the last refresh.`},
  {id:'q2', domain:'d1', type:'mc', q:`The main trade-off you accept when choosing DirectQuery over Import:`,
    choices:[
      `Data can never be refreshed.`,

      `The model file becomes much larger.`,
      `You can no longer use slicers.`],
    correct:1,
    explain:`Import is fastest because data lives in the in-memory engine. DirectQuery trades speed (and some functionality) for freshness and no data duplication.`},
  {id:'q3', domain:'d1', type:'mc', q:`In Power Query, "Column quality" and "Column distribution" profile which rows by default?`,

  {id:'q4', domain:'d1', type:'mc', q:`A column of order amounts imported as text ("1,204.50"). The correct place and move:`,

  {id:'q5', domain:'d1', type:'mc', q:`Your export has month names as COLUMN HEADERS (Jan, Feb, Mar…) and you need them as rows in a single Month column. The Power Query transform is:`,

  {id:'q6', domain:'d1', type:'mc', q:`Combining a Sales table and a Customers table side-by-side by Customer ID in Power Query is a:`,

  {id:'q7', domain:'d1', type:'mc', q:`You merge Orders with Returns and must keep EVERY order, matched or not. The join kind is:`,

  {id:'q8', domain:'d1', type:'mc', q:`Twelve identical monthly CSV files must become one long table. In Power Query, use:`,

  {id:'q9', domain:'d1', type:'mc', q:`The difference between REFERENCING and DUPLICATING a query:`,

  {id:'q10', domain:'d1', type:'mc', q:`You maintain dev and prod versions of the same report, differing only in the database server they point to. The cleanest Power Query tool:`,

  {id:'q11', domain:'d1', type:'mc', q:`One giant flat sales export should become a proper model. The prepare-the-data move is:`,

  {id:'q15', domain:'d2', type:'mc', q:`The recommended shape for a Power BI data model is:`,

  {id:'q21', domain:'d2', type:'mc', q:`What does <code>CALCULATE(SUM(Sales[Amount]), 'Region'[Name] = "West")</code> return in a card visual with no other filters?`,

  {id:'q22', domain:'d2', type:'mc', q:`<code>SUM(Sales[Qty] * Sales[Price])</code> fails. The working version is:`,

  {id:'q23', domain:'d2', type:'mc', q:`"Same period last year" revenue for comparison. The idiomatic DAX:`,

  {id:'q24', domain:'d2', type:'mc', q:`Account BALANCES summed across accounts but taken as the LAST value across time (not summed across months) is called a:`,

/* ============== RENDER ============== */
function render(){
  const app = document.getElementById('app');
  document.querySelectorAll('nav .nav-btn').forEach(b=>b.classList.remove('active'));
  const navId = 'nav' + state.view.charAt(0).toUpperCase() + state.view.slice(1);
  document.getElementById(navId)?.classList.add('active');
  document.getElementById('navResults').style.display = state.submitted ? '' : 'none';

  if(state.view === 'home') app.innerHTML = renderHome();
  else if(state.view === 'study') app.innerHTML = renderStudy();
  else if(state.view === 'exam') app.innerHTML = renderExam();
  else if(state.view === 'results') app.innerHTML = renderResults();
  attachFooter(app);
  if(typeof grainRefreshIcons === 'function') grainRefreshIcons();
  syncTimerLoop();
}

function setView(v, opts){
  if(v === 'results' && !state.submitted){ toast('Finish and submit the exam to see results.'); return; }
  state.view = v;
  save();
  render();
  if(opts && opts.scrollToSection){
    const el = document.getElementById('study-' + opts.scrollToSection);
    if(el){ el.scrollIntoView({behavior:'smooth', block:'start'}); return; }
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

function handleHash(){
  const h = location.hash.replace(/^#/, '');
  if(!h) return;
  if(h === 'study'){ setView('study'); return; }
  if(h.startsWith('study-')){
    const key = h.slice('study-'.length);
    if(DOMAIN_INFO[key]){
      state.openSections[key] = true;
      save();
      setView('study', {scrollToSection: key});
    }
    return;
  }
  if(h === 'exam') setView('exam');
  else if(h === 'home') setView('home');
  else if(h === 'results' && state.submitted) setView('results');
}
window.addEventListener('hashchange', handleHash);

/* ============== EXAM + TIMER ============== */
function timeLeftMs(){
  if(!state.timed || !state.examStart) return null;
  return Math.max(0, state.examStart + EXAM_MINUTES*60000 - Date.now());
}
function fmtTime(ms){
  const s = Math.ceil(ms/1000);
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}
let timerInterval = null;
function syncTimerLoop(){
  clearInterval(timerInterval);
  if(state.view !== 'exam' || state.submitted || !state.timed || !state.examStart) return;
  timerInterval = setInterval(()=>{
    const left = timeLeftMs();
    const el = document.getElementById('examTimer');
    if(el){
      el.textContent = fmtTime(left);
      el.classList.toggle('low', left < 10*60000);
    }
    if(left <= 0){
      clearInterval(timerInterval);
      toast("Time's up — exam submitted.");
      submitExam(true);
    }
  }, 500);
}

function startExam(timed){
  state.timed = timed;
  state.examStart = Date.now();
  save();
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderExam(){
  if(state.examStart === null && !state.submitted){
    return `
      <div class="start-card">
        <h2>Practice Exam · 50 questions</h2>
        <p>Weighted to the official PL-300 outline: 14 Prepare · 14 Model · 13 Visualize &amp; Analyze · 9 Manage &amp; Secure. Includes multiple-response questions ("choose all that apply") with exact-match grading — no partial credit, like the real exam. Answers grade all at once when you submit.</p>
        <div class="start-actions">
          <button class="btn btn-primary" onclick="startExam(true)">Start timed — 100:00 ⏱</button>
          <button class="btn btn-ghost" onclick="startExam(false)">Start untimed practice</button>
        </div>
      </div>
      <div class="method-callout">
        <strong>Exam-day pacing:</strong> 100 minutes for 40–60 questions leaves roughly 2 minutes each, but case studies eat time — bank minutes on the quick recall questions. Answer everything; there's no penalty for guessing.
      </div>
    `;
  }

  const answered = Object.keys(state.answers).length;
  const total = QUESTIONS.length;
  const pct = Math.round(100*answered/total);
  const left = timeLeftMs();

  let topBtn;
  if(state.submitted) topBtn = `<button class="exam-submit-btn" onclick="setView('results')">View results →</button>`;
  else topBtn = `<button class="exam-submit-btn" onclick="submitExam()" ${answered===0?'disabled':''}>${answered===total?'Submit exam':'Submit ('+answered+'/'+total+' answered)'}</button>`;

  let html = `
    <div class="exam-header">
      <div class="exam-header-row">
        <div class="exam-title-block">
          <div class="exam-mini-title">PL-300 practice exam${state.timed===false?' · untimed':''}</div>
          <div class="exam-q-progress"><span>${answered}</span> of ${total} answered</div>
        </div>
        ${(!state.submitted && state.timed && left!==null) ? `<span class="exam-timer${left<10*60000?' low':''}" id="examTimer">${fmtTime(left)}</span>` : ''}
        ${topBtn}
      </div>
      <div class="exam-progress-bar"><div class="exam-progress-fill" style="width:${pct}%"></div></div>
      ${state.submitted?'':'<div style="font-size:13px;color:var(--dim);margin-top:8px">Answers grade all at once on submit — no feedback until then, just like the real exam. Multiple-response questions need every correct option and no wrong ones.</div>'}
    </div>
  `;

  for(const dkey of DOMAIN_ORDER){
    const d = DOMAIN_INFO[dkey];
    const qs = QUESTIONS.filter(q => q.domain === dkey);
    html += `
      <div class="section-header" id="sec-${dkey}">
        <span class="section-pill" style="color:${d.color}">${d.label} · ${d.weight}</span>
        <span class="section-name">${d.name}</span>
        <span class="section-count">${qs.length} questions</span>
      </div>
      ${qs.map(q => renderQuestion(q)).join('')}
    `;
  }

  if(!state.submitted){
    html += `<div style="text-align:center;margin-top:24px"><button class="exam-submit-btn" onclick="submitExam()" ${answered===0?'disabled':''}>${answered===total?'Submit exam & see results':'Submit ('+answered+' of '+total+' answered)'}</button></div>`;
  }
  return html;
}

function renderQuestion(q){
  const idx = QUESTIONS.findIndex(x=>x.id===q.id) + 1;
  const ans = state.answers[q.id];
  const isMs = q.type === 'ms';
  const hasAns = isMs ? (Array.isArray(ans) && ans.length>0) : (ans !== undefined);
  let stateCls = '';
  if(state.submitted) stateCls = isCorrect(q) ? ' correct' : ' incorrect';
  else if(hasAns) stateCls = ' answered';

  const body = `<div class="choices">${q.choices.map((c,i)=>{
    const picked = isMs ? (Array.isArray(ans) && ans.includes(i)) : ans === i;
    const isRight = isMs ? q.correct.includes(i) : q.correct === i;
    let cls = 'choice';
    if(state.submitted){
      if(isRight) cls += ' correct-answer';
      else if(picked) cls += ' wrong-answer';
    } else if(picked){
      cls += ' selected';
    }
    const letter = String.fromCharCode(65+i);
    const mark = isMs ? (picked ? '☑' : '☐') : letter;
    return `<button class="${cls}" onclick="${isMs?`answerMs('${q.id}',${i})`:`answerMc('${q.id}',${i})`}" ${state.submitted?'disabled':''}>
      <span class="choice-letter">${mark}</span>
      <span class="choice-text">${c}</span>
    </button>`;
  }).join('')}</div>`;

  const explanation = state.submitted
    ? `<div class="explanation show"><strong>${isCorrect(q) ? 'Correct.' : 'Heads up: '}</strong> ${q.explain}</div>`
    : '';

  return `
    <div class="q-card${stateCls}" id="q-${q.id}">
      <div class="q-num">Question ${idx} of ${QUESTIONS.length}${isMs?'<span class="ms-tag">· multiple response</span>':''}</div>
      <div class="q-text">${q.q}</div>
      ${body}
      ${explanation}
    </div>
  `;
}

function answerMc(qid, idx){
  if(state.submitted) return;
  state.answers[qid] = idx;
  save();
  render();
}
function answerMs(qid, idx){
  if(state.submitted) return;
  let cur = Array.isArray(state.answers[qid]) ? state.answers[qid].slice() : [];
  if(cur.includes(idx)) cur = cur.filter(i=>i!==idx);
  else cur.push(idx);
  if(cur.length) state.answers[qid] = cur;
  else delete state.answers[qid];
  save();
  render();
}

function isCorrect(q){
  const ans = state.answers[q.id];
  if(q.type === 'ms'){
    if(!Array.isArray(ans)) return false;
    const a = ans.slice().sort().join(',');
    const c = q.correct.slice().sort().join(',');
    return a === c;
  }
  return ans === q.correct;
}

function submitExam(auto){
  if(state.submitted) return;
  const answered = Object.keys(state.answers).length;
  if(!auto && answered < QUESTIONS.length){
    if(!confirm(`You've answered ${answered} of ${QUESTIONS.length}. Unanswered questions count as wrong (like the real exam). Submit anyway?`)) return;
  }
  state.submitted = true;
  save();
  setView('results');
}

function calcScore(){
  const byDomain = {};
  let total = 0;
  for(const d of DOMAIN_ORDER){
    const qs = QUESTIONS.filter(q=>q.domain===d);
    const correct = qs.filter(isCorrect).length;
    byDomain[d] = {correct, total: qs.length};
    total += correct;
  }
  return {total, byDomain, outOf: QUESTIONS.length};
}

/* Estimated scaled score: Microsoft exams report 1–1000 with 700 to pass.
   Simple linear mapping of percent-correct onto that band — an approximation,
   labeled as such in the UI. */
function scaledEstimate(correct, outOf){
  return Math.round(1000 * (correct / outOf));
}

function verdictFor(scaled){
  if(scaled >= 800) return {label:'Comfortably above the passing line — book the exam.', tone:'good'};
  if(scaled >= 700) return {label:'At or above the 700 passing line — close the weak domain, then book it.', tone:'good'};
  if(scaled >= 600) return {label:'Close. One focused week on the weakest domains gets you over.', tone:'warn'};
  if(scaled >= 450) return {label:'Real gaps. Work the study guide and the Power BI Kit lessons first.', tone:'warn'};
  return {label:'Cold start. Do the Power BI Kit lessons end to end, then retake this.', tone:'bad'};
}

function renderResults(){
  const score = calcScore();
  const scaled = scaledEstimate(score.total, score.outOf);
  const pct = Math.round(100 * score.total / score.outOf);
  const v = verdictFor(scaled);
  const pass = scaled >= 700;
  return `
    <div class="results-hero">
      <div class="results-eyebrow">Practice exam · Results</div>
      <div class="score-big">${score.total}<small>/${score.outOf}</small></div>
      <div class="score-verdict">${pct}% — ${v.label}</div>
      <div class="scaled-box">Estimated scaled score: <strong style="color:${pass?'var(--good)':'var(--bad)'}">${scaled}</strong> <span style="color:var(--dim)">/ 1000 · passing = 700</span></div>
      <p class="score-sub" style="margin-top:14px">Microsoft converts raw answers to a 1–1000 scaled score with its own weighting; this estimate maps your percent correct onto that band. Treat 750+ here as "ready," 700–749 as "nearly."</p>
    </div>

    <div class="results-grid">
      ${DOMAIN_ORDER.map(k=>{
        const d = DOMAIN_INFO[k];
        const s = score.byDomain[k];
        const p = Math.round(100*s.correct/s.total);
        const hint = p === 100 ? 'Clean sweep. Move on.'
          : p >= 75 ? `Mostly there — reread the <a href="#study-${k}" onclick="setView('study',{scrollToSection:'${k}'});return false;">${d.label} study section</a> once.`
          : p >= 50 ? `Shaky at ${d.weight} of the exam — that's real points. <a href="#study-${k}" onclick="setView('study',{scrollToSection:'${k}'});return false;">Study section</a> + <a href="${d.kitPath}">Power BI Kit lessons</a>.`
          : `Focus here first — ${d.weight} of the exam. ${d.hint} <a href="${d.kitPath}">Open the Power BI Kit</a>.`;
        return `
          <div class="results-row">
            <div class="results-row-top">
              <span class="results-pill" style="color:${d.color}">${d.label} · ${d.weight}</span>
              <span class="results-section-name">${d.name}</span>
              <span class="results-score">${s.correct}/${s.total}</span>
            </div>
            <div class="results-bar"><div class="results-bar-fill" style="width:${p}%;background:${d.color}"></div></div>
            <div class="results-hint">${hint}</div>
          </div>
        `;
      }).join('')}
    </div>

    <div class="results-actions">
      <button class="btn btn-ghost" onclick="setView('exam')">Review answers &amp; explanations</button>
      <button class="btn btn-ghost" onclick="setView('study')">Open study guide</button>
      <button class="btn btn-primary" onclick="retake()">Retake exam <i data-lucide="rotate-ccw" style="width:14px;height:14px;vertical-align:-2px"></i></button>
    </div>
  `;
}

function retake(){
  if(!confirm('Clear your answers and retake the practice exam?')) return;
  state.answers = {};
  state.submitted = false;
  state.examStart = null;
  state.timed = null;
  state.view = 'exam';
  save();
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

  `;

}

/* ============== UTIL ============== */
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('apk-theme', next);
  document.getElementById('themeIcon').innerHTML = '<i data-lucide="' + (next === 'dark' ? 'sun' : 'moon') + '"></i>';
  if(window.grainRefreshIcons)grainRefreshIcons();else if(window.lucide)lucide.createIcons();
}
(function initTheme(){
  const saved = localStorage.getItem('apk-theme');
  if(saved) document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('themeIcon').innerHTML = '<i data-lucide="' + (document.documentElement.getAttribute('data-theme')==='dark'?'sun':'moon') + '"></i>';
})();

function resetAll(){
  if(!confirm('Clear all answers and reset the exam + study guide?')) return;
  localStorage.removeItem(STORE);
  location.reload();
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._t);
  window._t = setTimeout(()=>t.classList.remove('show'), 2200);
}

render();
handleHash();
</script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
function grainRefreshIcons(){
  if(!window.lucide) return;
  if(window._grainObs) window._grainObs.disconnect();
  lucide.createIcons();
  document.querySelectorAll('svg[data-lucide]').forEach(function(s){ s.removeAttribute('data-lucide'); });
  if(window._grainObs) window._grainObs.observe(document.body,{childList:true,subtree:true});
}
(function(){
  function init(){
    grainRefreshIcons();
    if(window.MutationObserver && !window._grainObs){
      window._grainObs=new MutationObserver(grainRefreshIcons);
      window._grainObs.observe(document.body,{childList:true,subtree:true});
    }
  }
  init();
  if(typeof window.lucide==='undefined'){
    var n=0, t=setInterval(function(){ if(window.lucide||++n>60){ clearInterval(t); init(); } },50);
  }
})();
</script>
<script src="../assets/apk-footer.js" defer></script>
